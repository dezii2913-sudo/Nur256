<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>NUR 256 — Units 1–3 Study Lab</title>
<style>
:root{
  color-scheme: light;
  --bg:#f5f3ff; --bg2:#fff;
  --ink:#2e1065; --muted:#7c6ba6;
  --card:#ffffff; --card-border:#e4d9fb;
  --pink:#7c3aed; --pink-soft:#ede9fe;
  --purple:#6d28d9; --purple-soft:#ede9fe;
  --select:#b7a4e0; --select-soft:#f3effe;
  --teal:#6366f1; --teal-soft:#e0e7ff;
  --green:#22c55e; --green-soft:#dcfce7;
  --red:#dc2626; --red-soft:#fee2e2;
  --amber:#d97706; --amber-soft:#fef3c7;
  --blue:#4f46e5; --blue-soft:#e0e7ff;
}
[data-theme="night"]{
  color-scheme: dark;
  --bg:#16081f; --bg2:#1e0f2b;
  --ink:#f3e8ff; --muted:#b09dc9;
  --card:#241436; --card-border:#43286b;
  --pink:#a78bfa; --pink-soft:#2a1640;
  --purple:#c4b5fd; --purple-soft:#2a1640;
  --select:#b7a4e0; --select-soft:#33234d;
  --teal:#818cf8; --teal-soft:#241b45;
  --green-soft:#123321; --red-soft:#3a1f1f; --amber-soft:#3a2f12;
  --blue:#a78bfa; --blue-soft:#2a1640;
}
html{background:var(--bg)}
*{box-sizing:border-box}
body{
  margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;
  transition:background .3s,color .3s;padding-bottom:80px;
}
.topbar{background:linear-gradient(120deg,var(--pink),var(--purple));color:#fff;padding:18px 16px 60px}
.topbar h1{margin:0 0 4px;font-size:1.5rem;display:flex;align-items:center;gap:10px}
.topbar .sub{opacity:.92;font-size:.9rem}
.toggles{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tbtn{border:none;background:rgba(255,255,255,.25);color:#fff;padding:9px 14px;border-radius:30px;font-weight:700;font-size:.85rem;cursor:pointer;backdrop-filter:blur(4px)}
.progwrap{max-width:920px;margin:-40px auto 0;padding:0 16px}
.progbar-bg{background:var(--card);border-radius:20px;padding:14px 18px;box-shadow:0 4px 18px rgba(0,0,0,.12)}
.progbar{height:8px;background:var(--card-border);border-radius:10px;overflow:hidden;margin-bottom:8px}
.progbar>div{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:.3s}
.progtext{font-size:.82rem;font-weight:700;text-align:center;color:var(--muted)}
.nav{display:flex;gap:8px;overflow-x:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.nav button{border:2px solid var(--card-border);background:var(--card);color:var(--ink);padding:10px 16px;border-radius:30px;font-weight:700;font-size:.85rem;white-space:nowrap;cursor:pointer}
.nav button.active{background:var(--purple);color:#fff;border-color:var(--purple);transform:scale(1.04)}
.content{max-width:920px;margin:0 auto;padding:18px;background:var(--bg)}
.section{display:none}
.section.active{display:block}
.sec-title{font-size:1.5rem;font-weight:800;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.sec-emoji{font-size:1.3em}
.intro-line{color:var(--muted);margin:0 0 16px;font-size:.95rem}
.card{background:var(--card);border:2px solid var(--card-border);border-radius:18px;padding:16px 18px;margin:12px 0;box-shadow:0 4px 18px rgba(190,18,60,.08)}
.card h3{margin:0 0 10px;font-size:1.15rem}
.card ul.clean{margin:6px 0;padding-left:20px}
.card ul.clean li{margin-bottom:6px}
.hy{background:var(--amber-soft);border-left:5px solid var(--amber);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.9rem}
.mnem{background:var(--purple-soft);border-radius:12px;padding:12px 14px;margin:10px 0}
.mnem .tag{font-size:.72rem;font-weight:800;text-transform:uppercase;color:var(--purple);letter-spacing:.5px}
.mnem .big{font-size:1.05rem;font-weight:700;margin-top:4px}
.why-chain{background:var(--teal-soft);border-radius:10px;padding:10px 14px;margin:8px 0;font-size:.92rem}
table.lab{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85rem}
table.lab th{background:var(--purple);color:#fff;padding:8px;text-align:left;font-size:.8rem}
table.lab td{padding:8px;border-bottom:1px solid var(--card-border)}
table.lab tr:nth-child(even){background:var(--bg2)}
.tipbar{background:var(--teal-soft);border-radius:12px;padding:12px 14px;font-size:.88rem;margin:10px 0}
.center{text-align:center}
.btn{border:none;color:#fff;padding:11px 20px;border-radius:12px;font-weight:800;cursor:pointer;font-size:.95rem}
.btn.ghost{background:var(--card);color:var(--ink);border:2px solid var(--card-border)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* quiz */
.quiz-card{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:16px;margin:12px 0}
.q-text{font-weight:700;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;background:var(--bg2);border:2px solid var(--card-border);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:.9rem}
.opt.sel-multi{border-color:var(--select);background:var(--select-soft)}
.opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.opt.disabled{pointer-events:none;opacity:.85}
.submit-multi{margin-top:8px;background:linear-gradient(90deg,var(--teal),var(--green));color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:800;cursor:pointer}
.rationale{margin-top:10px;background:var(--bg2);border-left:4px solid var(--purple);border-radius:8px;padding:10px 12px;font-size:.85rem;display:none}
.rationale.show{display:block}
.quiz-score{font-size:1.15rem;font-weight:800;text-align:center;padding:16px;background:var(--purple-soft);border-radius:14px;margin:12px 0}
.topic-filter-btn{background:var(--teal-soft);color:var(--teal);border:2px solid var(--teal);border-radius:30px;padding:9px 16px;font-weight:800;font-size:.85rem;cursor:pointer;margin:6px 0}
/* flash game */
.flash-progress{text-align:center;font-size:.85rem;color:var(--muted);margin-bottom:10px;font-weight:700}
.flash-card{background:var(--card);border:3px solid var(--purple);border-radius:20px;padding:34px 22px;min-height:160px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.12rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.12);transition:transform .15s,background .2s,border-color .2s}
.flash-card:active{transform:scale(.97)}
.flash-card.flipped{border-color:var(--teal);background:var(--teal-soft)}
.flash-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;display:block}
.flash-btns{display:flex;gap:10px;margin-top:14px}
.flash-btn{flex:1;padding:14px;border-radius:14px;border:none;font-weight:800;cursor:pointer;font-size:.92rem}
.flash-btn.learning{background:var(--amber-soft);color:var(--amber);border:2px solid var(--amber)}
.flash-btn.gotit{background:var(--green-soft);color:var(--green);border:2px solid var(--green)}
/* wrong answer vault */
.vault-empty{text-align:center;padding:30px 16px;font-size:1rem}
.vault-tag{display:inline-block;background:var(--purple-soft);color:var(--purple);font-size:.72rem;font-weight:800;border-radius:20px;padding:2px 10px;margin-bottom:8px}
.vault-solved{background:var(--green-soft);border:2px solid var(--green);color:var(--green);border-radius:10px;padding:8px 12px;margin-top:8px;font-size:.85rem;font-weight:700;text-align:center}
/* match game */
.match-stats{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;font-weight:800;font-size:.88rem;margin:10px 0;color:var(--ink)}
.match-wrap{position:relative}
.match-svg{display:block;position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.match-columns{display:flex;gap:10px;position:relative;z-index:2}
.match-col{flex:1 1 0;display:flex;flex-direction:column;gap:9px;min-width:0}
.match-item{width:100%;box-sizing:border-box;background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:11px 8px;font-size:.74rem;font-weight:700;cursor:pointer;text-align:left;transition:border-color .15s,background .15s,transform .1s;line-height:1.3;word-break:break-word;overflow-wrap:anywhere;white-space:normal}
.match-item:active{transform:scale(.98)}
.match-item.selected{border-color:var(--purple);background:var(--purple-soft)}
.match-item.matched{border-color:var(--green);background:var(--green-soft);color:var(--green);cursor:default;opacity:.75}
.match-item.shake{border-color:var(--red);background:var(--red-soft);animation:matchshake .35s}
@keyframes matchshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
/* exam: dropdown-match type */
.dm-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:2px solid var(--card-border);border-radius:12px;margin-bottom:8px;flex-wrap:wrap}
.dm-term{font-weight:800;flex:1 1 140px;min-width:120px}
.dm-select{flex:1 1 200px;padding:9px;border-radius:10px;border:2px solid var(--card-border);background:var(--bg2);color:var(--ink);font-size:.85rem}
.dm-row.dm-correct{border-color:var(--green);background:var(--green-soft)}
.dm-row.dm-wrong{border-color:var(--red);background:var(--red-soft)}
/* exam: order/sequence type */
.order-pool{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.order-chip{background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:11px 12px;font-size:.85rem;font-weight:700;cursor:pointer;text-align:left}
.order-chip:disabled{opacity:.35;cursor:default}
.order-answer{display:flex;flex-direction:column;gap:6px;margin:10px 0;min-height:40px;padding:8px;border:2px dashed var(--card-border);border-radius:12px}
.order-answer-item{display:flex;align-items:center;gap:8px;background:var(--purple-soft);border:2px solid var(--purple);border-radius:10px;padding:8px 10px;font-size:.82rem;font-weight:700}
.order-answer-item .num{background:var(--purple);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.order-answer-item.order-correct{background:var(--green-soft);border-color:var(--green)}
.order-answer-item.order-wrong{background:var(--red-soft);border-color:var(--red)}
/* drill */
.drill-top{display:flex;justify-content:space-between;font-size:.8rem;font-weight:700;margin-bottom:6px}
.drill-bar{height:8px;background:var(--card-border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.drill-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:.3s}
.drill-final{font-size:1.6rem;font-weight:800;color:var(--purple);margin:10px 0}
/* exam layout */
.mode-btn{flex:1;border:2px solid var(--card-border);background:var(--card);color:var(--ink);padding:12px;border-radius:12px;font-weight:800;cursor:pointer}
.mode-btn.active{background:linear-gradient(90deg,var(--purple),var(--pink));color:#fff;border-color:transparent}
.exam-mode-toggle{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.exam-mode-toggle .mode-btn{flex:1 1 90px;font-size:.85rem;padding:10px 6px}
.exam-q{background:var(--card);border:2px solid var(--card-border);border-radius:16px;padding:16px;margin:12px 0}
.qnum{font-size:.78rem;font-weight:800;color:var(--muted)}
.qtype{float:right;background:var(--teal-soft);color:var(--teal);padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:800}
.qtext{font-weight:700;margin:8px 0 14px;clear:both}
#examDots{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;justify-content:center}
.dot{width:12px;height:12px;border-radius:50%;background:var(--card-border);cursor:pointer}
.dot.answered{background:var(--purple)}
.dot.current{outline:2px solid var(--pink);outline-offset:2px}
.dot.dot-correct{background:var(--green)}
.dot.dot-wrong{background:var(--red)}
.exam-nav{display:flex;justify-content:space-between;gap:10px;margin:14px 0}
/* back to top */
#backToTopBtn{position:fixed;bottom:22px;right:18px;z-index:999;width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-size:1.3rem;box-shadow:0 4px 14px rgba(0,0,0,.25);cursor:pointer;display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .25s,transform .15s}
#backToTopBtn.show{display:flex;opacity:1}
#backToTopBtn:active{transform:scale(.9)}
/* jeopardy */
.jep-board{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:14px 0}
.jep-cat{background:var(--purple);color:#fff;font-weight:800;font-size:.7rem;text-align:center;padding:8px 4px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:50px;line-height:1.2}
.jep-tile{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-weight:900;font-size:1.1rem;text-align:center;padding:16px 4px;border-radius:8px;cursor:pointer;border:none;min-height:50px}
.jep-tile:disabled{background:var(--card-border);color:var(--muted);cursor:default;opacity:.5}
.jep-modal{background:var(--card);border:3px solid var(--purple);border-radius:18px;padding:24px 18px;margin:16px 0;text-align:center}
.jep-clue{font-size:1.05rem;font-weight:700;margin-bottom:16px;min-height:60px;display:flex;align-items:center;justify-content:center}
.jep-score{text-align:center;font-size:1.3rem;font-weight:800;color:var(--purple);margin:10px 0}
.jep-opt{width:100%;text-align:left;background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;font-weight:700;font-size:.9rem;color:var(--ink)}
.jep-opt.jep-correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.jep-opt.jep-wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.jep-opt:disabled{opacity:.55;cursor:default}
/* triage / Priority ER */
.tri-hud{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0}
.tri-stat{background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:8px 14px;font-weight:800;font-size:.85rem}
.tri-timerbar{height:12px;background:var(--card-border);border-radius:10px;overflow:hidden;margin:8px 0 14px}
.tri-timerbar>div{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));transition:width .1s linear}
.tri-timerbar.low>div{background:linear-gradient(90deg,var(--red),var(--amber))}
.tri-scenario{background:var(--purple-soft);border:2px solid var(--purple);border-radius:14px;padding:16px;margin-bottom:12px}
.tri-scenario .tri-badge{display:inline-block;background:var(--purple);color:#fff;font-size:.7rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-radius:20px;padding:2px 10px;margin-bottom:8px}
.tri-scenario .tri-stem{font-weight:700;font-size:1rem}
.tri-opt{width:100%;text-align:left;background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink);transition:transform .08s}
.tri-opt:active{transform:scale(.99)}
.tri-opt.tri-correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.tri-opt.tri-wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.tri-opt:disabled{cursor:default}
.tri-feedback{background:var(--bg2);border-left:4px solid var(--purple);border-radius:8px;padding:11px 13px;font-size:.85rem;margin:10px 0}
.tri-streak{color:var(--amber)}
.tri-combo{position:fixed;top:20%;left:50%;transform:translateX(-50%);background:var(--amber);color:#fff;font-weight:900;font-size:1.4rem;padding:10px 22px;border-radius:30px;z-index:1000;box-shadow:0 6px 20px rgba(0,0,0,.3);animation:comboPop .8s ease}
@keyframes comboPop{0%{transform:translateX(-50%) scale(.5);opacity:0}30%{transform:translateX(-50%) scale(1.1);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:0}}
.tri-lives{font-size:1.1rem;letter-spacing:2px}
/* millionaire */
.mill-ladder{display:flex;flex-direction:column-reverse;gap:3px;margin:14px 0;max-height:340px;overflow-y:auto}
.mill-rung{padding:7px 12px;border-radius:8px;font-size:.8rem;font-weight:700;text-align:center;background:var(--card);border:2px solid var(--card-border)}
.mill-rung.mill-current{background:linear-gradient(90deg,var(--amber),var(--pink));color:#fff;border-color:transparent;transform:scale(1.03)}
.mill-rung.mill-passed{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.mill-rung.mill-milestone{border-style:dashed;border-width:3px}
.mill-lifelines{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.mill-lifeline-btn{background:var(--teal-soft);color:var(--teal);border:2px solid var(--teal);border-radius:20px;padding:8px 14px;font-weight:800;font-size:.8rem;cursor:pointer}
.mill-lifeline-btn:disabled{opacity:.3;cursor:default;text-decoration:line-through}
.mill-opt{width:100%;text-align:left;background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;font-weight:700;font-size:.9rem}
.mill-opt.mill-selected{border-color:var(--amber);background:var(--amber-soft)}
.mill-opt.mill-correct{background:var(--green-soft);border-color:var(--green)}
.mill-opt.mill-wrong{background:var(--red-soft);border-color:var(--red)}
.mill-opt:disabled{opacity:.4;cursor:default}

/* ===== GLOBAL FIT GUARD — nothing spills past the screen edge on any device ===== */
html,body{max-width:100%;overflow-x:hidden}
img,svg,video,canvas,table{max-width:100%}
pre,code{white-space:pre-wrap;overflow-wrap:anywhere}
.card,.quiz-card,.exam-q{overflow-wrap:anywhere;word-break:break-word}

/* ===== RESPONSIVE BREAKPOINTS (auto — no toggle needed) ===== */
/* Large screens: give the reading column a little more room */
@media (min-width:1100px){
  .content,.progwrap{max-width:1040px}
}
/* Tablets and small laptops */
@media (max-width:820px){
  .grid3{grid-template-columns:1fr 1fr}
  .content{padding:16px 14px}
}
/* Phones — the main target */
@media (max-width:640px){
  .content{padding:14px 12px}
  .progwrap{padding:0 12px}
  .grid2,.grid3{grid-template-columns:1fr;gap:12px}
  .topbar{padding:16px 14px 54px}
  .topbar h1{font-size:1.25rem}
  .topbar .sub{font-size:.82rem}
  .sec-title{font-size:1.28rem}
  /* Jeopardy: keep the 5-column board but shrink so it never overflows */
  .jep-board{gap:4px}
  .jep-cat{font-size:.55rem;padding:6px 2px;min-height:44px}
  .jep-tile{font-size:.92rem;padding:12px 2px;min-height:44px}
  .jep-clue{font-size:.98rem;min-height:auto}
  .jep-opt{font-size:.85rem;padding:11px 13px}
  /* Match: keep two columns, keep text legible */
  .match-columns{gap:7px}
  .match-item{font-size:.8rem;padding:10px 7px}
  /* Priority ER: HUD wraps, options stay tappable */
  .tri-hud{gap:8px}
  .tri-stat{font-size:.76rem;padding:7px 10px}
  .tri-scenario{padding:14px}
  .tri-scenario .tri-stem{font-size:.95rem}
  .tri-opt{font-size:.86rem;padding:12px 13px}
  /* Millionaire: ladder + options fit narrow screens */
  .mill-ladder{max-height:220px}
  .mill-rung{font-size:.72rem;padding:6px 8px}
  .mill-opt{font-size:.86rem;padding:11px 13px}
  .mill-lifeline-btn{font-size:.75rem;padding:7px 11px}
  /* Exam controls */
  .exam-mode-toggle .mode-btn{font-size:.8rem;padding:9px 5px}
  .dm-select{flex-basis:140px}
  /* Flash card a touch shorter so the buttons sit in view */
  .flash-card{min-height:140px;padding:26px 18px;font-size:1.05rem}
}
/* Very small phones */
@media (max-width:380px){
  .nav button{padding:9px 12px;font-size:.8rem}
  .jep-cat{font-size:.48rem}
  .jep-tile{font-size:.82rem;padding:10px 1px}
  .match-item{font-size:.74rem;padding:9px 6px}
  .tri-opt,.mill-opt,.jep-opt{font-size:.82rem}
  .sec-title{font-size:1.18rem}
}
</style>
</head>
<body data-theme="day">

<div class="topbar">
  <h1>🏥 NUR 256 — Units 1–3 Study Lab</h1>
  <div class="sub">Perioperative • Prioritization • Respiratory • Acid–Base & Electrolytes • Diabetes • Skin • Cancer & EOL</div>
  <div class="toggles">
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">🌙 Night</button>
    <button class="tbtn" id="shuffleBtn" onclick="toggleShuffle()">🔀 Shuffle: OFF</button>
  </div>
</div>

<div class="progwrap">
  <div class="progbar-bg">
    <div class="progbar"><div id="progbar"></div></div>

/* ===== PROGRESS ===== */
let answeredQs=new Set(), totalTrackable=0;
(function restoreProgress(){ try{ const r=localStorage.getItem('nur256u13_progress'); if(r) answeredQs=new Set(JSON.parse(r)); }catch(e){} })();
function bumpProgress(qid){ answeredQs.add(qid); try{ localStorage.setItem('nur256u13_progress', JSON.stringify([...answeredQs])); }catch(e){} updateProg(); }
function updateProg(){
  const pct = totalTrackable ? Math.min(100, Math.round(answeredQs.size/totalTrackable*100)) : 0;
  const pb=document.getElementById('progbar'); if(pb) pb.innerHTML=`<div style="width:${pct}%"></div>`;
  const msgs=["Let's build this out! 💪","Warming up! 🔥","Nice momentum! ⭐","Crushing it! 🚀","Almost there! 🎯","Units 1–3 ready! 👑"];
  const m=msgs[Math.min(msgs.length-1,Math.floor(pct/20))];
  const pt=document.getElementById('progtext'); if(pt)pt.textContent=`${answeredQs.size} quiz questions answered • ${m}`;
}
function resetAllProgress(){ if(!confirm('Reset all saved progress? This cannot be undone.'))return; answeredQs=new Set(); try{ localStorage.removeItem('nur256u13_progress'); }catch(e){} updateProg(); alert('Progress reset. Fresh start! 💜'); }

/* ===== NAV / SECTIONS ===== */

SECTIONS.forEach((s,i)=>{

  else{ btn.textContent=s.label; }
  if(i===0)btn.classList.add('active');

});
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='vault' && typeof renderVaultSection==='function') renderVaultSection();
  if(id==='flash' && typeof startFlash==='function') startFlash();
  if(id==='jeopardy' && typeof renderJeopardy==='function') renderJeopardy();
  if(id==='millionaire' && typeof startMillionaire==='function' && !millionaireStarted) renderMillionaireIntro();
  if(id==='drill' && typeof renderDrillIntro==='function') renderDrillIntro();
  if(id==='triage' && typeof renderTriageIntro==='function') renderTriageIntro();
  if(id==='exam' && typeof initExam==='function') initExam();
  if(id==='match' && typeof startMatchGame==='function') startMatchGame('match');
  if(typeof matchTimerInt!=='undefined' && matchTimerInt && id!=='match'){ clearInterval(matchTimerInt); matchTimerInt=null; }
}

function stripLabel(text){ return text.replace(/^[A-Za-z]\.\s*/,''); }
function relabel(optsArr){ const L=['A','B','C','D','E','F']; return optsArr.map((o,i)=>L[i]+'. '+stripLabel(o)); }
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);}
function prepareQuestion(qOrig){
  let opts=qOrig.opts.slice();
  let correct=qOrig.type==='multi'?qOrig.correct.slice():qOrig.correct;
  if(shuffleAnswers){
    const order=shuffle(opts.map((_,i)=>i));
    const newOpts=order.map(i=>opts[i]);
    if(qOrig.type==='multi'){
      const correctSet=new Set(correct);
      correct=order.map((origIdx,newIdx)=>correctSet.has(origIdx)?newIdx:null).filter(x=>x!==null);
    } else { correct=order.indexOf(correct); }
    opts=newOpts;
  }
  return {...qOrig, opts:relabel(opts), correct};
}
let quizTotalCounted=new Set();
function renderQuiz(containerId, questions, title, source, indexMap){
  const host=document.getElementById(containerId);
  if(!host)return;
  host.innerHTML='';
  const wrap=document.createElement('div');
  if(title){ const h=document.createElement('h3'); h.textContent='📝 '+title; h.style.color='var(--pink)'; wrap.appendChild(h); }
  questions.forEach((qOrig,localIdx)=>{
    const qi = indexMap ? indexMap[localIdx] : localIdx;
    const q=prepareQuestion(qOrig);
    const qid=containerId+'-'+qi;
    if(!quizTotalCounted.has(qid)){ quizTotalCounted.add(qid); totalTrackable++; }
    const card=document.createElement('div'); card.className='quiz-card';
    const qt=document.createElement('div'); qt.className='q-text'; qt.textContent=(localIdx+1)+'. '+q.q; card.appendChild(qt);
    const opts=document.createElement('div'); opts.className='opts'; card.appendChild(opts);
    const rat=document.createElement('div'); rat.className='rationale'; rat.innerHTML='<b>Rationale:</b> '+q.rat;
    if(q.type==='multi'){
      const chosen=new Set();
      q.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{ if(chosen.has(i)){chosen.delete(i);btn.classList.remove('sel-multi');}else{chosen.add(i);btn.classList.add('sel-multi');} };
        opts.appendChild(btn);
      });
      const sub=document.createElement('button'); sub.className='submit-multi'; sub.textContent='Check Answer';
      sub.onclick=()=>{
        const correct=new Set(q.correct);
        let allRight=chosen.size===correct.size;
        opts.querySelectorAll('.opt').forEach((b,i)=>{
          b.classList.add('disabled');
          if(correct.has(i))b.classList.add('correct');
          else if(chosen.has(i)){b.classList.add('wrong');allRight=false;}
        });
        if(!allRight){ addToVault({id:qid,q:q.q,opts:q.opts,type:'multi',correct:q.correct,rat:q.rat,source:source||title||''}); }
        rat.classList.add('show'); sub.style.display='none'; bumpProgress(qid);
      };
      card.appendChild(sub);
    } else {
      q.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{
          opts.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));
          if(i===q.correct)btn.classList.add('correct');
          else{
            btn.classList.add('wrong'); opts.querySelectorAll('.opt')[q.correct].classList.add('correct');
            addToVault({id:qid,q:q.q,opts:q.opts,type:'single',correct:q.correct,rat:q.rat,source:source||title||''});
          }
          rat.classList.add('show'); bumpProgress(qid);
        };
        opts.appendChild(btn);
      });
    }
    card.appendChild(rat);
    wrap.appendChild(card);
  });
  host.appendChild(wrap);
}

/* ===== WRONG ANSWER VAULT ===== */
let wrongVault=[];
(function restoreVault(){ try{ const r=localStorage.getItem('nur256u13_vault'); if(r) wrongVault=JSON.parse(r); }catch(e){} })();
function saveVault(){ try{ localStorage.setItem('nur256u13_vault', JSON.stringify(wrongVault)); }catch(e){} }
function addToVault(entry){
  const idx=wrongVault.findIndex(v=>v.id===entry.id);
  if(idx>=0) wrongVault[idx]=entry; else wrongVault.push(entry);
  saveVault();
  const badge=document.getElementById('vaultCount'); if(badge) badge.textContent=wrongVault.length;
}
function removeFromVault(id){
  wrongVault=wrongVault.filter(v=>v.id!==id);
  saveVault();
  const badge=document.getElementById('vaultCount'); if(badge) badge.textContent=wrongVault.length;
}
(function initVaultBadge(){ const b=document.getElementById('vaultCount'); if(b) b.textContent=wrongVault.length; })();
function renderVaultSection(){
  const host=document.getElementById('sec-vault');
  if(!host)return;
  if(wrongVault.length===0){
    host.innerHTML=`
    <h2 class="sec-title"><span class="sec-emoji">🗄️</span> Wrong Answer Vault</h2>
    <p class="intro-line">Every question you miss anywhere in this guide — including the Exam, Jeopardy, and Millionaire — automatically lands here so you can drill your actual weak spots.</p>
    <div class="card"><div class="vault-empty">🎉<br><b>Your vault is empty!</b><br>Go answer some questions — anything you miss shows up here automatically. Get it right here and it clears itself out.</div></div>`;
    return;
  }
  let html=`
    <h2 class="sec-title"><span class="sec-emoji">🗄️</span> Wrong Answer Vault</h2>
    <p class="intro-line">The exact questions you've missed, pulled from every section. Re-answer them — get one right and it clears itself out.</p>
    <div class="card" style="border-color:var(--red)">
      <h3>📋 ${wrongVault.length} question${wrongVault.length===1?'':'s'} to review</h3>
      <button class="btn" style="background:var(--red)" onclick="if(confirm('Clear the entire vault?')){wrongVault=[];saveVault();document.getElementById('vaultCount').textContent='0';renderVaultSection();}">🗑️ Clear entire vault</button>
    </div>`;
  wrongVault.forEach(entry=>{
    const safeId=entry.id.replace(/[^a-zA-Z0-9-]/g,'');
    html+=`<div class="card" id="vaultcard-${safeId}">
      <span class="vault-tag">${entry.source||'Review'}</span>
      <div class="q-text">${entry.q}</div>
      <div id="vbody-${safeId}"></div>
      <div class="rationale" id="vrat-${safeId}"><b>Rationale:</b> ${entry.rat}</div>
    </div>`;
  });
  host.innerHTML=html;
  wrongVault.forEach(rawEntry=>{
    const safeId=rawEntry.id.replace(/[^a-zA-Z0-9-]/g,'');
    const bodyHost=document.getElementById('vbody-'+safeId);
    const ratHost=document.getElementById('vrat-'+safeId);
    const entry=prepareQuestion(rawEntry);
    const optsHost=document.createElement('div'); optsHost.className='opts'; bodyHost.appendChild(optsHost);
    if(entry.type==='multi'){
      const chosen=new Set();
      entry.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{ if(chosen.has(i)){chosen.delete(i);btn.classList.remove('sel-multi');}else{chosen.add(i);btn.classList.add('sel-multi');} };
        optsHost.appendChild(btn);
      });
      const sub=document.createElement('button'); sub.className='submit-multi'; sub.textContent='Check Answer';
      sub.onclick=()=>{
        const correct=new Set(entry.correct);
        let allRight=chosen.size===correct.size;
        optsHost.querySelectorAll('.opt').forEach((b,i)=>{
          b.classList.add('disabled');
          if(correct.has(i))b.classList.add('correct');
          else if(chosen.has(i)){b.classList.add('wrong');allRight=false;}
        });
        ratHost.classList.add('show'); sub.style.display='none';
        if(allRight){
          const solved=document.createElement('div'); solved.className='vault-solved'; solved.textContent='✅ Correct! Removing from vault...';
          optsHost.parentElement.appendChild(solved);
          setTimeout(()=>{ removeFromVault(rawEntry.id); const el=document.getElementById('vaultcard-'+safeId); if(el)el.remove(); if(wrongVault.length===0)renderVaultSection(); },900);
        }
      };
      optsHost.appendChild(sub);
    } else {
      entry.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{
          optsHost.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));
          const gotItRight = i===entry.correct;
          if(gotItRight)btn.classList.add('correct');
          else{ btn.classList.add('wrong'); optsHost.querySelectorAll('.opt')[entry.correct].classList.add('correct'); }
          ratHost.classList.add('show');
          if(gotItRight){
            const solved=document.createElement('div'); solved.className='vault-solved'; solved.textContent='✅ Correct! Removing from vault...';
            optsHost.parentElement.appendChild(solved);
            setTimeout(()=>{ removeFromVault(entry.id); const el=document.getElementById('vaultcard-'+safeId); if(el)el.remove(); if(wrongVault.length===0)renderVaultSection(); },900);
          }
        };
        optsHost.appendChild(btn);
      });
    }
  });
}
</script>

let currentMatchGame=null, matchRoundPairs=[], matchLeftOrder=[], matchRightOrder=[], matchSelectedLeft=null, matchMatchedCount=0, matchStartTime=0, matchTimerInt=null, matchBestTime=null, matchProgress={};

function buildCycleOrder(pairs){

<script>
document.getElementById('sec-why').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🧠</span> Why Engine</h2>
<p class="intro-line">Mechanism first. When you know WHY, the trick wording stops working — exactly the skill his harder questions test.</p>
<div class="card" style="border-color:var(--pink)"><h3>🔪 Perioperative phases — why each nurse's focus differs</h3>
  <p class="why-chain"><b>Reason it forward:</b> risk changes as the patient moves through surgery. <b>Pre-op</b> nothing's happened → verify & prepare. <b>Intra-op</b> the patient is unconscious and defenseless → safety. <b>PACU</b> anesthesia is wearing off, reflexes not back → the airway, because it can be lost in seconds.</p>
  <div class="mnem"><div class="tag">Lock it in</div><div class="big">Pre-op VERIFIES · Intra-op = SAFETY · PACU = AIRWAY</div></div></div>
<div class="card" style="border-color:var(--purple)"><h3>🔄 ADPIE — why assessment is always first</h3>
  <p class="why-chain"><b>Reason it forward:</b> every later step depends on data. You can't diagnose, plan, act, or evaluate without knowing what's happening — so when two choices both "act," the one that <em>gathers data</em> usually wins. After ANY intervention you <b>evaluate</b> by reassessing.</p></div>
<div class="card" style="border-color:var(--teal)"><h3>⚗️ Acid–base — why ROME works</h3>
  <p class="why-chain"><b>Reason it forward:</b> CO₂ is an acid gas, so respiratory & pH move <b>opposite</b>. Bicarb is a base, so metabolic & pH move <b>together</b>. Compensation: pH back in range = full; both abnormal but pH still off = partial; other value normal = uncompensated.</p>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">ROME — Respiratory Opposite, Metabolic Equal</div></div></div>
<div class="card" style="border-color:var(--red)"><h3>🩸 DKA — why fluids first, why ketones appear</h3>
  <p class="why-chain"><b>Reason it forward:</b> no insulin → cells burn fat → <b>ketoacids</b> (acidosis, fruity breath, Kussmaul). High glucose pulls water into urine → <b>dehydration</b>. Insulin pushes glucose, water & potassium into cells, so giving it before fluids crashes BP and K⁺. Order: <b>fluids → insulin → watch K⁺ → add dextrose</b>.</p></div>
<div class="card" style="border-color:var(--amber)"><h3>🍬 Hypoglycemia — why not to feed the unconscious</h3>
  <p class="why-chain"><b>Reason it forward:</b> glucose <70 starves the brain — adrenaline first ("cold & clammy"), then the brain fails (confusion, seizure). An unconscious patient can't protect their airway, so food risks aspiration → give <b>glucagon</b> (or D50). Conscious → <b>Rule of 15</b>.</p></div>
<div class="card" style="border-color:var(--teal)"><h3>🫁 Post-op lungs — why timing gives it away</h3>
  <p class="why-chain"><b>Reason it forward:</b> shallow breathing collapses alveoli → <b>atelectasis</b> (gradual). Infected collapsed alveoli → <b>pneumonia</b> (over days, fever, productive cough). A leg clot lodging in the lung → <b>PE</b> (sudden, sharp pain, dropping O₂). Onset is the discriminator.</p></div>
<div class="card" style="border-color:var(--pink)"><h3>🔬 Skin — why staging depends on what you see</h3>
  <p class="why-chain"><b>Reason it forward:</b> pressure injuries stage by depth. Intact skin + non-blanchable redness = Stage 1 max; bone/muscle visible = Stage 4; base hidden by eschar = unstageable (can't judge depth through dead tissue). Prevention targets the cause — reposition q2h; massage & high HOB harm.</p></div>`;
</script>

<h2 class="sec-title"><span class="sec-emoji">🧭</span> The Answer Method</h2>
<p class="intro-line">Run every "who first / what first" question through this ladder. On his harder items every option is plausible — the ladder is your tiebreaker.</p>
<div class="card" style="border-color:var(--purple)">
  <ol style="padding-left:20px;line-height:1.9">

    <li><b>Life over limb, then safety.</b> Threat to life &gt; threat to function; safety risk (fall, seizure) &gt; routine care.</li>

    <li><b>Acute & unexpected beats chronic & expected.</b> Stable chronic or expected post-op findings are rarely the priority.</li>
    <li><b>Least invasive / safest first</b> when nothing is emergent.</li>

    <li><b>Expected vs unexpected</b> → many distractors are true but <em>expected</em> findings.</li>

<script>
document.getElementById('sec-adpie').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🔄</span> The Nursing Process (ADPIE)</h2>
<p class="intro-line">The backbone of NCLEX priority questions. Assessment is first; evaluation closes the loop.</p>
<div class="card"><h3>🔤 The five steps</h3>
  <table class="lab">
    <tr><th>Step</th><th>What it is</th><th>Test cue</th></tr>
    <tr><td><b>A — Assess</b></td><td>Collect subjective & objective data</td><td>Always FIRST; "check," "auscultate," "ask"</td></tr>
    <tr><td><b>D — Diagnose</b></td><td>Analyze data → nursing diagnosis (actual or risk)</td><td>Cluster/interpret; a <em>nursing</em> not medical problem</td></tr>
    <tr><td><b>P — Plan</b></td><td>Set measurable, patient-centered goals</td><td>SMART, prioritized (Maslow/ABC)</td></tr>
    <tr><td><b>I — Implement</b></td><td>Carry out interventions</td><td>Independent, dependent, or collaborative</td></tr>
    <tr><td><b>E — Evaluate</b></td><td>Goal met / partially / not met</td><td>AFTER acting; if not met → reassess & revise</td></tr>
  </table></div>
<div class="card" style="border-color:var(--purple)"><h3>🧩 Where students lose points</h3>
  <ul class="clean">
    <li><b>Assess vs. implement:</b> if not a clear ABC emergency, <b>assess first</b>.</li>
    <li><b>Nursing vs. medical dx:</b> "impaired gas exchange" (nursing) vs "pneumonia" (medical).</li>
    <li><b>Intervention types:</b> Independent = nurse-initiated · Dependent = needs an order · Collaborative = with other disciplines.</li>
    <li><b>Evaluation loop:</b> after any action you <b>reassess</b>.</li>
    <li><b>Goal quality:</b> measurable, patient-centered ("client will…"), time-bound, realistic.</li>
  </ul></div>
<div class="card"><h3>📶 Prioritizing among problems</h3>
  <p style="margin:0">Order competing diagnoses with <b>ABCs</b>, then <b>Maslow</b> (physiologic → safety → psychosocial). <em>Actual</em> problems usually outrank <em>risk</em> — but a high-acuity imminent risk (e.g., seizure) can outrank a low-acuity actual one. Weigh acuity, not just the label.</p></div>
<div class="card" style="border-color:var(--red)"><h3>⚠️ When you DON'T assess first (act-first exceptions)</h3>
  <p style="margin:0 0 8px">"Assessment first" is the default — but on the exam it becomes the <b>wrong</b> answer in these situations. The discriminator: <b>stable client or missing data → assess first · unstable client, an obvious life threat, or a defined emergency protocol → act first.</b></p>
  <ul class="clean">
    <li><b>The data is already in the stem.</b> If the question hands you the finding ("SpO₂ 82%," "no pulse," "peaked T waves"), re-assessing is the trap — act on what you were given.</li>
    <li><b>Immediate life threat (ABCs).</b> No pulse → <b>CPR</b>. Active hemorrhage → <b>direct pressure</b>. Anaphylaxis → <b>epinephrine</b>. Choking/obstructed airway → <b>clear it</b>. Fire → <b>RACE (Rescue first)</b>. You still glance at the ABC, but you don't do a <em>full</em> assessment before treating an obvious threat.</li>
    <li><b>Defined emergency protocols (memorize the first move):</b> Transfusion reaction → <b>STOP the blood</b> first · Autonomic dysreflexia → <b>sit upright / raise HOB</b> first · Air embolism → <b>clamp the line, left-side Trendelenburg</b> · Active seizure → <b>protect from injury</b>.</li>
    <li><b>Safety-first moments.</b> A client falling, seizing, or in immediate physical danger — secure safety before you assess.</li>
  </ul>
  <p style="margin:8px 0 0"><b>When genuinely unsure and the client is stable, assessment is still the safest default.</b> But if the stem is screaming that someone is crashing — or already hands you the abnormal finding — "assess" is the distractor.</p></div>
<div id="quiz-adpie"></div>`;
renderQuiz('quiz-adpie',[
  {q:'A nurse enters to give scheduled oral metoprolol and finds the client diaphoretic and reporting palpitations. Which action should the nurse take FIRST?',type:'single',opts:['Administer the metoprolol since it lowers heart rate','Obtain an apical pulse and blood pressure','Notify the provider about the palpitations','Document the client\'s report'],correct:1,rat:'The trap: medicating, notifying, and documenting all act on incomplete data. New diaphoresis and palpitations demand assessment first — an apical pulse and BP tell you whether metoprolol is even safe. You can\'t medicate, report, or chart what you haven\'t assessed.'},

  {q:'Which are examples of INDEPENDENT nursing interventions? (Select all that apply)',type:'multi',opts:['Repositioning a client every 2 hours','Administering IV antibiotics','Teaching pursed-lip breathing','Elevating an edematous extremity','Titrating an insulin drip per protocol'],correct:[0,2,3],rat:'The trap: IV antibiotics need an order (dependent) and titrating a drip follows a protocol (dependent/collaborative). Repositioning, teaching, and limb elevation are nurse-initiated — independent.'},

  {q:'For "impaired gas exchange," which reassessment finding BEST shows the goal is being met?',type:'single',opts:['The client says they feel better','The antibiotic is discontinued','SpO₂ improved from 89% to 96% on room air','The white blood cell count is pending'],correct:2,rat:'The trap: subjective report, a medical decision, and a pending lab give no measurable evidence. Evaluating gas exchange needs objective oxygenation data — a measurable SpO₂ rise.'},

  {q:'Which nursing diagnosis is written correctly?',type:'single',opts:['Pneumonia related to infection','Impaired gas exchange related to alveolar-capillary changes as evidenced by SpO₂ 88%','Client needs oxygen therapy','Provider will order a chest x-ray'],correct:1,rat:'The trap: "pneumonia" is medical, "needs oxygen" is an intervention, "provider will order" is a medical action. Only the impaired-gas-exchange statement follows nursing-diagnosis format (response + etiology + defining data).'},
  {q:'A nurse finds a distended, firm bladder and no void in 8 hours. Interpreting this as urinary retention represents moving from assessment to which step?',type:'single',opts:['Evaluation','Diagnosis','Planning','Implementation (catheterize without an order)'],correct:1,rat:'The trap: catheterizing needs an order and jumps ahead; evaluation/planning come later. Interpreting the data into a problem — urinary retention — is the diagnosis step.'},
  {q:'Which are appropriately patient-centered, measurable outcomes? (Select all that apply)',type:'multi',opts:['Client will report pain ≤3/10 within 1 hour of analgesic','Nurse will reposition the client every 2 hours','Client will demonstrate correct insulin injection before discharge','Client will be comfortable','Client will maintain SpO₂ ≥94% on room air by day 2'],correct:[0,2,4],rat:'The trap: "nurse will reposition" is a nursing action and "be comfortable" isn\'t measurable. The other three are client-centered, observable, and time-bound.'},
  {q:'A confused client pulls at their IV and tries to climb over the rail. Applying the nursing process, the priority is to:',type:'single',opts:['Document the behavior','Assess for causes of confusion (oxygenation, glucose, pain, full bladder)','Apply restraints to prevent a fall','Notify the family'],correct:1,rat:'The trap: restraints are a last resort; documenting/notifying delay care. New confusion is a symptom — assessing reversible causes is both the assessment step and the least-restrictive priority.'},
  {q:'A goal to "walk to the bathroom independently" was NOT met due to persistent dizziness. The most appropriate action is to:',type:'single',opts:['Remove the goal from the plan','Reassess and revise the plan to address the dizziness','Continue the same plan unchanged','Document goal met to speed discharge'],correct:1,rat:'The trap: deleting, repeating a failed plan, or falsely charting all break the process. A not-met goal feeds back into reassessment and revision.'},
  {q:'For a client with new shortness of breath, which sequence correctly applies the nursing process?',type:'single',opts:['Diagnose, assess, plan, evaluate, implement','Assess breath sounds/vitals, identify impaired gas exchange, set an oxygenation goal, apply oxygen, then reassess','Implement oxygen, assess, plan, diagnose, evaluate','Plan a goal, assess, implement, diagnose, evaluate'],correct:1,rat:'The trap: the others scramble the order — acting or diagnosing before assessing. The correct flow is Assess → Diagnose → Plan → Implement → Evaluate.'},
  {q:'A client on a blood transfusion suddenly reports low back pain, chills, and a fever. Which action should the nurse take FIRST?',type:'single',opts:['Assess the vital signs and lung sounds','Stop the transfusion','Notify the provider','Slow the transfusion rate and keep monitoring'],correct:1,rat:'The trap: assessing feels right, but a suspected transfusion reaction has a defined first move — STOP the blood immediately to limit exposure, THEN keep the line open with saline, assess, and notify. Slowing it still infuses more of the reacting blood.'},
  {q:'A nurse finds a client unresponsive, not breathing, with no pulse. The FIRST action is to:',type:'single',opts:['Perform a focused head-to-toe assessment','Begin chest compressions','Check blood glucose','Auscultate the apical pulse for a full minute'],correct:1,rat:'The trap: "assess first" does NOT apply to a coded, pulseless client. You confirmed no pulse — that IS the assessment. The next step is CPR. A full assessment or glucose check wastes lifesaving time.'},
  {q:'The monitor shows a client\'s SpO₂ has dropped to 82% and they are restless and using accessory muscles. Which action is the priority?',type:'single',opts:['Reassess the oxygen saturation with a new probe','Apply oxygen and reposition to high-Fowler\'s','Document the findings and continue monitoring','Call the provider before doing anything'],correct:1,rat:'The trap: the abnormal finding is already in front of you, so re-checking the probe delays care for a client who is visibly hypoxic. Act on an obvious airway/breathing threat — oxygen and positioning — then reassess the response.'},
  {q:'A client with a spinal cord injury suddenly has a pounding headache, flushing, and BP 210/110. The nurse should FIRST:',type:'single',opts:['Complete a full neuro assessment','Raise the head of bed and sit the client upright','Palpate the bladder for distention','Notify the provider and wait'],correct:1,rat:'This is autonomic dysreflexia — a hypertensive emergency with a defined first move: sit the client UP (raise HOB) to drop the blood pressure via orthostasis, THEN find and remove the trigger (often a full bladder). Assessing or waiting first risks stroke/seizure.'},
  {q:'Which situations call for the nurse to ACT before completing a full assessment? (Select all that apply)',type:'multi',opts:['A stable client reports mild intermittent nausea','A client is actively hemorrhaging from a surgical site','A client is choking and cannot speak or cough','A client\'s telemetry shows ventricular fibrillation','A client asks a question about their discharge diet'],correct:[1,2,3],rat:'The trap: only the immediate life threats override "assess first." Hemorrhage (apply pressure), a fully obstructed airway (clear it), and V-fib (defibrillate/CPR) demand action now. The stable nausea and the discharge question are non-urgent — assessment/teaching there is appropriate.'},
  {q:'A nurse is about to give a scheduled dose of digoxin and the stem notes the apical pulse is 52 and irregular. The BEST action is to:',type:'single',opts:['Recount the apical pulse for another full minute first','Hold the dose and notify the provider','Give the dose since it was ordered','Give half the dose'],correct:1,rat:'The trap: the assessment is already done for you — the stem gave you a pulse of 52 (below the 60 hold parameter). Re-counting delays the right action. Hold digoxin and notify; giving or half-dosing ignores the parameter.'}
],'Nursing Process (ADPIE) Check');
</script>

<script>
document.getElementById('sec-periop').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🔪</span> Perioperative Nursing</h2>
<p class="intro-line">Three phases, three jobs. Know each nurse's focus, the emergencies, and expected-vs-unexpected findings — his distractors live in that gap.</p>
<div class="grid3">
  <div class="card" style="border-color:var(--blue)"><h3>Pre-op</h3><p style="font-weight:800;color:var(--blue);margin:0 0 6px">Focus: verify</p>
    <ul class="clean"><li>Assess incl. <b>last oral intake</b> (NPO)</li><li>Verify <b>informed consent</b></li><li>Confirm pre-admission testing</li><li>Remove <b>prosthesis</b>, dentures, jewelry</li><li>Baseline vitals + perfusion</li></ul></div>
  <div class="card" style="border-color:var(--amber)"><h3>Intra-op</h3><p style="font-weight:800;color:var(--amber);margin:0 0 6px">Focus: SAFETY</p>
    <ul class="clean"><li><b>Positioning</b> — prevent skin/nerve injury</li><li>Fire-hazard prevention</li><li><b>Specimen</b> handling</li><li>Sterile field</li><li>Instrument & sponge counts</li></ul></div>
  <div class="card" style="border-color:var(--red)"><h3>PACU</h3><p style="font-weight:800;color:var(--red);margin:0 0 6px">Focus: AIRWAY</p>
    <ul class="clean"><li><b>Airway + gag reflex</b> first</li><li>Breathing, O₂ sat, LOC</li><li>Circulation — hemorrhage/shock</li><li>Pain & nausea</li><li>Drowsy-but-arousable is expected</li></ul></div>
</div>
<div class="card"><h3>🩹 Emergencies at a glance</h3>
  <ul class="clean">
    <li><b>Malignant hyperthermia:</b> rising end-tidal CO₂ (earliest) → rigidity, tachycardia, late high temp. Stop agent, <b>dantrolene</b>, cool. Screen family hx.</li>
    <li><b>Transfusion reaction:</b> low back pain, chills, fever, tachycardia → <b>STOP</b>, NS to keep line open, notify.</li>
    <li><b>Hypovolemic shock:</b> falling BP + compensatory tachycardia + restless + oliguria → treat circulation.</li>
    <li><b>Opioid depression:</b> RR ≤8, unarousable → <b>naloxone</b>; reassess after opioids.</li>
    <li><b>Evisceration:</b> organs out → sterile saline gauze, low-Fowler's knees flexed, NPO, notify. <b>Dehiscence</b> = edges separate, no organs.</li>
    <li><b>Chest tube:</b> tidaling normal; <b>continuous water-seal bubbling = air leak</b>; spreading crepitus → report.</li>
    <li><b>PCA:</b> only the <b>patient</b> presses the button. <b>Time-out:</b> correct patient, procedure, site.</li>
  </ul></div>
<div id="quiz-periop"></div>`;
renderQuiz('quiz-periop',[
  {q:'A client is 30 minutes into a unit of packed red blood cells when they report low back pain and chills. Temperature has risen 1.1°C and heart rate is climbing. The nurse\'s FIRST action is to:',type:'single',opts:['Administer prescribed acetaminophen for the fever','Slow the infusion and keep monitoring','Stop the transfusion and keep the line open with normal saline','Recheck the unit against the client\'s armband'],correct:2,rat:'The trap: treating fever, slowing the rate, or re-verifying all delay stopping the exposure. Back pain, chills, fever, and rising HR signal a hemolytic reaction — STOP the transfusion first and maintain the line with saline; verification and notification follow.'},
  {q:'During induction with a volatile anesthetic and succinylcholine, end-tidal CO₂ rises sharply before any temperature change. The nurse anticipates preparing:',type:'single',opts:['Naloxone','Dantrolene','Epinephrine','Protamine sulfate'],correct:1,rat:'The trap: waiting for "hyperthermia" misses it — rising end-tidal CO₂ is the EARLIEST malignant hyperthermia sign. Dantrolene is the treatment. Naloxone reverses opioids, epinephrine treats anaphylaxis/arrest, protamine reverses heparin.'},
  {q:'Four hours post-op: BP dropped from 124/80 to 88/52, HR rose from 78 to 124, the client is restless, and urine output is 15 mL in the last hour. This is:',type:'single',opts:['Expected post-anesthesia recovery','Compensated hypovolemia requiring prompt intervention','A normal response to pain medication','Fluid overload from IV fluids'],correct:1,rat:'The trap: restlessness gets dismissed as anesthesia/pain. But falling BP, compensatory tachycardia, restlessness, and oliguria (<30 mL/hr) are classic early hypovolemic shock. Overload would raise BP and output.'},
  {q:'Reviewing four post-op clients, which finding requires IMMEDIATE follow-up?',type:'single',opts:['Serosanguineous drainage on the dressing','Absent bowel sounds 4 hours after abdominal surgery','Oxygen saturation of 85% with shallow respirations','Pain 6/10 one hour after oral analgesic'],correct:2,rat:'"Immediate follow-up" = find the abnormal one. Serosanguineous drainage and briefly absent bowel sounds are expected; 6/10 pain warrants reassessment but isn\'t emergent. SpO₂ 85% with shallow breathing is an airway/breathing threat.'},
  {q:'A post-op abdominal incision has opened with a loop of bowel protruding. Which actions are appropriate? (Select all that apply)',type:'multi',opts:['Cover with sterile gauze moistened with normal saline','Gently reinsert the bowel into the abdomen','Position in low-Fowler\'s with knees flexed','Keep the client NPO','Prepare for likely surgical repair'],correct:[0,2,3,4],rat:'The trap: pushing organs back is intuitive but wrong (contamination/injury). For evisceration keep viscera moist and sterile, reduce wound tension, keep NPO, and prepare for the OR. The surgeon repositions the bowel.'},
  {q:'A client on a morphine PCA is difficult to arouse with a respiratory rate of 7. The nurse\'s FIRST priority is to:',type:'single',opts:['Stop the PCA and document the sedation level','Stimulate the client and prepare to administer naloxone','Call the family to sit with the client','Decrease the PCA basal rate and keep monitoring'],correct:1,rat:'The trap: stopping the PCA or lowering the rate addresses the cause but not the immediate danger. A RR of 7 with an unarousable client is opioid-induced respiratory depression — support breathing: stimulate and give naloxone first.'},
  {q:'Which statement the evening before surgery requires follow-up BEFORE the procedure?',type:'single',opts:['"I signed consent after the surgeon explained everything."','"I stopped eating and drinking at midnight."','"I took my usual full-dose aspirin this morning."','"I removed my rings and gave them to my spouse."'],correct:2,rat:'"Requires follow-up" = find the problem. NPO status, signed consent, and removing jewelry are correct. Full-dose aspirin (antiplatelet) raises bleeding risk and is typically held — notify the surgical team.'},
  {q:'Which chest-tube finding requires the nurse to notify the provider?',type:'single',opts:['Gentle rise and fall of water-seal fluid with respiration','Continuous vigorous bubbling in the water-seal chamber','50 mL of serosanguineous drainage over the shift','The drainage system positioned below chest level'],correct:1,rat:'The trap: tidaling, modest drainage, and correct positioning are all fine. Continuous vigorous bubbling in the WATER-SEAL chamber signals an air leak that must be investigated and reported.'},
  {q:'A client returns from PACU drowsy but arousable with an oral airway in place and the gag reflex returning. The priority action is to:',type:'single',opts:['Remove the oral airway now that the gag reflex is present and the client can protect their airway','Leave the airway in until the client is fully oriented','Offer sips of water to test swallowing','Ambulate the client to prevent atelectasis'],correct:0,rat:'The trap: leaving an airway in with a returning gag reflex triggers gagging/vomiting; water or ambulation is unsafe now. Once the gag reflex returns and the client can protect their airway, remove the oral airway — airway remains the PACU priority.'},
  {q:'Which are primary responsibilities of the intraoperative (circulating) nurse? (Select all that apply)',type:'multi',opts:['Positioning to prevent pressure and nerve injury','Verifying informed consent is on the chart','Accurate sponge and instrument counts','Correct labeling of surgical specimens','Removing the client\'s dentures and jewelry'],correct:[0,1,2,3],rat:'The trap: removing dentures/jewelry is a PRE-op task. Intra-op focus is safety: positioning, confirming consent is present, accurate counts, and specimen handling.'},
  {q:'A client says, "I\'m not sure what they\'ll do to my knee, but I signed the paper anyway." The nurse\'s BEST action is to:',type:'single',opts:['Reassure the client the surgeon is experienced','Witness the signed consent and proceed','Notify the surgeon that the client doesn\'t understand the procedure','Explain the surgical procedure in detail'],correct:2,rat:'The trap: explaining the procedure is the surgeon\'s duty, and a signature without understanding isn\'t valid consent. Notify the surgeon so the client can be properly informed before proceeding.'},
  {q:'The greatest intraoperative risk that careful positioning aims to prevent is:',type:'single',opts:['Postoperative nausea','Skin breakdown and peripheral nerve injury','Malignant hyperthermia','Wound dehiscence'],correct:1,rat:'The trap: dehiscence and MH are real but not positioning-related. An anesthetized client can\'t feel pressure or reposition, so prolonged pressure risks skin breakdown and nerve compression.'},
  {q:'Which post-op tasks can be delegated to unlicensed assistive personnel? (Select all that apply)',type:'multi',opts:['Recording vitals on a stable client 12 hours post-op','Assisting a stable client to ambulate','Assessing a new incision for infection','Emptying and recording a Jackson-Pratt drain','Reinforcing teaching about deep breathing'],correct:[0,1,3],rat:'The trap: assessment and teaching are RN-only. UAP may take vitals on stable clients, assist stable ambulation, and record drain output — routine, predictable tasks.'},
  {q:'Pain is 8/10 four hours after abdominal surgery. After giving the ordered IV opioid, the MOST important follow-up action is to:',type:'single',opts:['Chart that the medication was given','Reassess pain and respiratory status within the expected onset time','Encourage immediate ambulation','Offer a heating pad to the incision'],correct:1,rat:'The trap: charting isn\'t the priority, immediate ambulation is premature, and heat on a fresh incision is inappropriate. After an opioid, evaluation means reassessing BOTH pain relief and respiratory status.'},
  {q:'Spreading crepitus is noted in the tissue around a chest-tube site. The priority action is to:',type:'single',opts:['Apply a pressure dressing over the site','Document it as an expected outcome','Notify the provider promptly','Clamp the chest tube to stop the spread'],correct:2,rat:'The trap: clamping can cause a tension pneumothorax, a dressing won\'t fix the cause, and this isn\'t expected. Spreading subcutaneous emphysema must be reported promptly.'},
  {q:'A client scheduled for surgery has an INR of 3.8 this morning. This value most directly increases the risk of:',type:'single',opts:['Surgical-site infection','Excessive intraoperative and postoperative bleeding','Malignant hyperthermia','Delayed emergence from anesthesia'],correct:1,rat:'The trap: the other complications aren\'t coagulation-driven. An INR of 3.8 is well above the safe surgical range — marked anticoagulation and bleeding risk. Notify the team before proceeding.'},
  {q:'Before a same-day-surgery client who had general anesthesia is discharged, the MOST essential criterion is:',type:'single',opts:['The client states they feel ready to go home','A responsible adult is available to drive and stay with them','The client has eaten a full meal','The client\'s pain is completely gone'],correct:1,rat:'The trap: feeling ready, eating fully, and being pain-free aren\'t required. Residual sedation makes driving/being alone unsafe — a responsible adult to transport and monitor is the essential safety requirement.'}
],'Perioperative Check');
</script>

<script>
document.getElementById('sec-priority').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🎯</span> Prioritization & Delegation</h2>
<p class="intro-line">Same ABC → life/safety → nursing-process method. On his hardest items every client sounds sick — the ladder decides.</p>
<div class="card"><h3>🤝 Delegation quick rules</h3>
  <p>Delegate only <b>stable, predictable, routine</b> tasks (vitals on stable clients, ADLs, ambulation, I&O, feeding without swallowing risk). The RN keeps <b>assessment, teaching, evaluation, medication administration</b>, and any <b>unstable</b> client.</p>
  <div class="hy">⭐ "Delegate the stable, keep the unstable." If a choice involves judgment, teaching, or an unpredictable client — it stays with the RN.</div></div>
<div class="card"><h3>🪜 Tie-breakers</h3>
  <ul class="clean"><li>Airway &gt; Breathing &gt; Circulation &gt; Disability/Safety.</li><li>Acute/unstable &gt; chronic/stable. Unexpected &gt; expected.</li><li>Actual life threat &gt; risk — unless the risk is high-acuity/imminent (seizure).</li><li>Nothing emergent? Assess before intervening; least invasive first.</li></ul></div>
<div id="quiz-priority"></div>`;
renderQuiz('quiz-priority',[
  {q:'After shift report on four clients, which should the nurse assess FIRST?',type:'single',opts:['A COPD client whose respiratory rate rose from 20 to 32 with new accessory-muscle use','A client 1 day post-op reporting incisional pain 6/10','A heart failure client who gained 1 kg since yesterday','A diabetic client whose morning glucose is 210'],correct:0,rat:'The trap: all have abnormal data, so students pick the biggest number. A rising RR with accessory-muscle use is an acute Breathing change — active decompensation. The others are concerning but stable/expected.'},
  {q:'Which client should the nurse see FIRST?',type:'single',opts:['A client with potassium 5.9 and peaked T waves on the monitor','A client with a scheduled dressing change','A client requesting medication for chronic back pain','A client waiting for discharge teaching'],correct:0,rat:'The trap: pain and discharge feel time-sensitive, but K⁺ 5.9 WITH ECG changes is a cardiac emergency that can become lethal. It outranks routine care.'},
  {q:'A nurse finds an elderly client on the floor after an unwitnessed fall. FIRST action?',type:'single',opts:['Notify the provider','Complete an incident report','Call for assistance and assess for injury and level of consciousness','Help the client back into bed'],correct:2,rat:'The trap: helping the client up seems kind but could worsen an occult injury; notifying/documenting come after data. Assess first — airway, LOC, injury — before moving, calling, or charting.'},
  {q:'In mass-casualty triage, which client is tagged for care FIRST?',type:'single',opts:['A client with a respiratory rate of 6 and shallow breathing','A client with a closed femur fracture and stable vitals','A client with full-thickness burns to 70% of the body and no pulse','A client with minor lacerations, walking and talking'],correct:0,rat:'The trap: severe burns look most dramatic, but a pulseless 70% burn is expectant, and the walking-wounded/stable fracture can wait. A RR of 6 is a failing but treatable airway/breathing — the highest-priority survivable threat.'},
  {q:'Which tasks may the RN delegate to UAP? (Select all that apply)',type:'multi',opts:['Feeding a stable client with no swallowing precautions','Assessing lung sounds on a new admission','Assisting a stable client with a bed bath','Obtaining a routine glucose fingerstick where policy allows','Teaching incentive spirometer use'],correct:[0,2,3],rat:'The trap: assessment and teaching are never delegated. Feeding without swallowing risk, hygiene, and a routine fingerstick per policy are appropriate; lung assessment and teaching require the RN.'},
  {q:'A client is in acute alcohol withdrawal. The HIGHEST-priority nursing diagnosis is:',type:'single',opts:['Imbalanced nutrition: less than body requirements','Risk for injury related to seizures','Disturbed sleep pattern','Ineffective coping'],correct:1,rat:'The trap: nutrition, sleep, and coping are real but not life-threatening. The defining danger of withdrawal is seizures — a high-acuity imminent safety risk.'},
  {q:'A charge nurse must assign a newly admitted client with unstable vital signs to:',type:'single',opts:['An LPN/LVN','A registered nurse (RN)','A UAP','Any available staff'],correct:1,rat:'The trap: an LPN can do much, but an unstable, unpredictable client requires the RN\'s ongoing assessment and judgment.'},
  {q:'Which finding requires the nurse to intervene MOST urgently?',type:'single',opts:['A post-op client with urine output of 45 mL/hr','A pneumonia client with SpO₂ 90% on 2 L','A client with new-onset confusion and slurred speech','A client with a chronic wound and stable vitals'],correct:2,rat:'The trap: SpO₂ 90% draws the eye but is stable on O₂ and expected; adequate output and a stable chronic wound are fine. New confusion and slurred speech signal an acute neurologic change (possible stroke) — sudden and time-critical.'},
  {q:'Prioritizing several nursing diagnoses, which is addressed FIRST?',type:'single',opts:['Impaired skin integrity','Ineffective airway clearance','Deficient knowledge','Anxiety'],correct:1,rat:'The trap: all valid, not equal. Airway clearance tops both ABCs and Maslow\'s physiologic needs.'},
  {q:'About to give digoxin, the nurse finds an apical rate of 52, irregular, and the client reports yellow halos around lights. The BEST action is to:',type:'single',opts:['Give the digoxin as scheduled','Hold the dose and notify the provider; anticipate a digoxin level','Give half the dose and reassess','Delegate a pulse recheck to the UAP'],correct:1,rat:'The trap: giving, half-dosing, or delegating the recheck all ignore danger signs. Bradycardia of 52 with visual halos suggests digoxin toxicity — hold the dose (never give a partial dose independently), notify, and anticipate a level.'},
  {q:'Which client should the nurse assess FIRST?',type:'single',opts:['A diabetic reporting shakiness, sweating, and a glucose of 54','A client requesting a laxative','A client asking about discharge meds','A client with stable chronic pain rated 4/10'],correct:0,rat:'The trap: the others are legitimate but non-urgent. Glucose 54 with adrenergic symptoms is acute hypoglycemia — treat immediately before it progresses to seizures/LOC.'},
  {q:'A UAP reports a delegated, previously stable client became dizzy and diaphoretic while walking. The nurse should FIRST:',type:'single',opts:['Reassign the client to a different UAP','Assess the client\'s vital signs and neurologic status','Document that the UAP followed the plan','Tell the UAP to finish more slowly'],correct:1,rat:'The trap: reassigning, documenting, or continuing skip the change in status. New dizziness and diaphoresis are red flags; the RN can\'t delegate the follow-up assessment.'},
  {q:'Which situation is the nurse\'s LOWEST priority?',type:'single',opts:['A client with SpO₂ 88% and increasing dyspnea','A client with chest pain radiating to the jaw','A client with a scheduled, expected morning insulin dose','A client with a heart rate of 38 and dizziness'],correct:2,rat:'"LOWEST priority" flips the search. Dropping O₂ with dyspnea, cardiac chest pain, and symptomatic bradycardia of 38 are all acute. A scheduled, expected insulin dose in a stable client is routine — the lowest priority.'},
  {q:'Which statements about delegation are correct? (Select all that apply)',type:'multi',opts:['The RN remains accountable for delegated task outcomes','Only stable, predictable tasks are delegated to UAP','Assessment and evaluation can be delegated to an experienced UAP','The RN must ensure the UAP is competent for the task','Client teaching may be delegated to save time'],correct:[0,1,3],rat:'The trap: experience doesn\'t let a UAP assess, evaluate, or teach. The RN stays accountable, delegates only stable/predictable tasks, and verifies competence.'},
  {q:'Prioritizing four post-op clients, which is seen FIRST?',type:'single',opts:['A client whose SpO₂ dropped to 86% with restlessness','A client with a small amount of serosanguineous drainage','A client asking for ice chips','A client due for a routine heparin injection'],correct:0,rat:'The trap: three options are routine/expected. Falling O₂ of 86% with restlessness (often the first sign of hypoxia) is an airway/breathing emergency.'},
  {q:'A UAP says, "I don\'t feel comfortable taking vitals on the new post-op client — they seem really out of it." The nurse\'s BEST response is:',type:'single',opts:['"You\'re assigned to them, so please go ahead."','"I\'ll assess the client myself, since a change in level of consciousness needs a nurse."','"Just take the vitals quickly and report back."','"Document that the client is sedated and move on."'],correct:1,rat:'The trap: pushing the UAP ahead ignores a reported change. "Out of it" suggests an altered LOC — an unstable finding needing RN assessment. The nurse takes over rather than delegating a possibly deteriorating client.'}
],'Prioritization Check');
</script>

<script>
document.getElementById('sec-resp').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🫁</span> Respiratory & Post-op Pulmonary</h2>
<p class="intro-line">He brought up pneumonia and chest tubes — so know the whole post-op lung picture and how to tell the complications apart. Onset is the discriminator.</p>
<div class="card"><h3>🔎 Telling the complications apart</h3>
  <table class="lab">
    <tr><th>Complication</th><th>Onset</th><th>Hallmarks</th><th>Nurse action</th></tr>
    <tr><td><b>Atelectasis</b> (most common)</td><td>1–2 days, gradual</td><td>Diminished bases, low fever, ↓O₂</td><td>Incentive spirometry, deep breathing/cough, ambulate</td></tr>
    <tr><td><b>Pneumonia</b></td><td>Builds over days</td><td>Fever, productive cough, crackles, ↑WBC</td><td>Spirometry, mobilize; antibiotics per order</td></tr>
    <tr><td><b>Pulmonary embolism</b></td><td><b>Sudden</b></td><td>Sudden chest pain, dyspnea, anxiety, tachycardia, dropping O₂</td><td>O₂, raise HOB, rapid response — emergency</td></tr>
  </table>
  <div class="mnem"><div class="tag">Discriminator = onset</div><div class="big">Sudden = PE · Gradual = atelectasis · Over days = pneumonia</div></div>
  <div class="hy">⭐ Prevent all three with the same core moves: deep breathe, incentive spirometry, cough, ambulate early.</div></div>
<div class="card" style="border-color:var(--teal)"><h3>🫁 Chest tubes & COPD</h3>
  <ul class="clean">
    <li>Chest tube purpose: re-establish negative pressure, re-expand the lung.</li>
    <li><b>The 3 chambers:</b> <b>①  Collection</b> — drainage collects here; mark and record output (report &gt;100 mL/hr of bright red). <b>②  Water seal</b> — one-way valve; <b>gentle tidaling normal</b>, <b>continuous bubbling = AIR LEAK</b>. <b>③  Suction control</b> — <b>gentle continuous bubbling here IS expected</b> (or a dry dial).</li>
    <li>Gentle <b>tidaling</b> normal; <b>continuous water-seal bubbling = air leak</b>; spreading crepitus → report.</li>
    <li>Keep the system upright, below chest level; don't routinely clamp.</li>
    <li>COPD: <b>pursed-lip breathing</b>; accessory-muscle use = distress; O₂ target ~88–92%; smoking = #1 risk.</li>
  </ul></div>
<div class="card" style="border-color:var(--red)"><h3>🦠 Tuberculosis — RIPE therapy (Casteel: "KNOW THIS")</h3>
  <table class="lab">
    <tr><th>Drug</th><th>Watch for</th></tr>
    <tr><td><b>R</b>ifampin</td><td>Orange/red body fluids (harmless), ↑ liver enzymes</td></tr>
    <tr><td><b>I</b>soniazid (INH)</td><td>Hepatotoxicity; peripheral neuropathy → give <b>B6 (pyridoxine)</b></td></tr>
    <tr><td><b>P</b>yrazinamide</td><td>Hepatotoxicity; ↑ uric acid (gout)</td></tr>
    <tr><td><b>E</b>thambutol</td><td><b>Optic neuritis</b> — vision changes, report!</td></tr>
  </table>
  <p style="margin:8px 0 0">Treatment lasts <b>6–12 months</b> — adherence is everything. No longer infectious after <b>3 consecutive negative sputum cultures</b>. All RIPE drugs → watch <b>liver toxicity</b>. <span class="hy">⭐ "Rifampin turns pee oRange."</span></p>
</div>
<div class="grid2">
  <div class="card" style="border-color:var(--amber)"><h3>🆘 Status asthmaticus</h3>
    <p style="margin:0">Life-threatening attack <b>not responding</b> to routine therapy. <b>ABG trap:</b> EARLY = respiratory <b>alkalosis</b> (hyperventilating); LATE = respiratory <b>acidosis</b> (tiring out, retaining CO₂) → danger sign. Tx: O₂, albuterol, corticosteroids, intubate if needed.</p>
    <p style="margin:6px 0 0"><b>Rescue vs. maintenance:</b> SABA (<b>albuterol</b>) = acute rescue; LABA (salmeterol) = maintenance, <b>never alone</b>; inhaled corticosteroids = long-term control (<b>rinse mouth</b>).</p>
  </div>
  <div class="card"><h3>🫁 Artificial airways</h3>
    <ul class="clean">
      <li><b>ET tube cuff pressure = 20–25 mmHg.</b> Too HIGH → tracheal ischemia/necrosis; too LOW → aspiration risk.</li>
      <li><b>Tracheostomy</b> = surgical airway for long-term ventilation, obstruction, or aspiration prevention. Early complications: bleeding, pneumothorax, <b>tube dislodgement</b>, air embolism.</li>
      <li>A dislodged airway is an <b>emergency</b> — protect the airway, keep the obturator/spare at the bedside.</li>
    </ul>
  </div>
</div>
<div class="card" style="border-color:var(--purple)"><h3>🛡️ VAP bundle + aspiration pearl</h3>
  <p style="margin:0 0 6px">Prevent ventilator-associated pneumonia — <b>"Heads up, clean mouth, wake up, protect gut &amp; legs":</b></p>
  <ul class="clean">
    <li><b>H</b>ead of bed elevated <b>30–45°</b></li>
    <li><b>O</b>ral care with <b>chlorhexidine</b></li>
    <li><b>B</b> — daily <b>sedation vacations</b> / wean-readiness</li>
    <li>Peptic (stress) ulcer prophylaxis + DVT prophylaxis</li>
  </ul>
  <p class="hy" style="margin:8px 0 0">⭐ Aspiration pneumonia is more common in the <b>RIGHT lung</b> — the right mainstem bronchus is straighter and wider.</p>
</div>
<div id="quiz-resp"></div>`;
renderQuiz('quiz-resp',[
  {q:'Three days post-op a client suddenly develops sharp pleuritic chest pain, dyspnea, anxiety, tachycardia, and an SpO₂ that drops to 86%. Which complication is most likely?',type:'single',opts:['Atelectasis','Pulmonary embolism','Pneumonia','Anxiety attack'],correct:1,rat:'The trap: anxiety and tachypnea can mimic a panic attack, and pneumonia also causes dyspnea — but those build gradually. The SUDDEN onset with hypoxia is the discriminator for a PE (a DVT that traveled). Never write off sudden dyspnea as anxiety.'},
  {q:'A nurse is teaching a post-op client why incentive spirometry matters. Which explanation is most accurate?',type:'single',opts:['"It clears mucus already in your lungs."','"It re-expands small air sacs that collapse from shallow breathing, preventing pneumonia."','"It strengthens your heart muscle."','"It prevents blood clots in your legs."'],correct:1,rat:'The trap: it doesn\'t primarily clear mucus, strengthen the heart, or prevent clots (that\'s early ambulation/anticoagulation). Sustained deep inhalation re-expands alveoli that collapse (atelectasis) from shallow post-op breathing, heading off pneumonia.'},
  {q:'A nurse notes continuous vigorous bubbling in the water-seal chamber of a chest-drainage system. What does this indicate and what should the nurse do?',type:'single',opts:['Normal function; continue monitoring','An air leak; assess the system and report it','The lung has fully re-expanded; prepare for removal','Suction is too high; lower it and document'],correct:1,rat:'The trap: bubbling in the SUCTION-control chamber is expected, but bubbling in the WATER-SEAL chamber is not — continuous water-seal bubbling means an air leak. The nurse assesses connections/insertion site and reports it; it does not mean the lung re-expanded.'},
  {q:'Which findings distinguish pneumonia from simple atelectasis in a post-op client? (Select all that apply)',type:'multi',opts:['Fever that builds over several days','Productive cough','Onset within seconds','Elevated white blood cell count','Crackles on auscultation'],correct:[0,1,3,4],rat:'The trap: an abrupt, second-to-minute onset points to a PE, not pneumonia. Pneumonia builds over days with fever, productive cough, elevated WBC, and crackles.'},
  {q:'A client with COPD has an SpO₂ of 90% on 2 L nasal cannula. A new nurse wants to increase the oxygen to 6 L. What is the experienced nurse\'s BEST guidance?',type:'single',opts:['"Yes, push the oxygen up until the saturation is 100%."','"For many COPD clients, keep O₂ modest (about 88–92%); high-flow can blunt their drive to breathe."','"Oxygen is never given to COPD clients."','"Switch immediately to a non-rebreather mask."'],correct:1,rat:'The trap: the extremes ("push to 100%" and "never give oxygen") are both wrong. Some COPD clients rely on a hypoxic drive, so oxygen is titrated to a modest target (≈88–92%) rather than maximized — but it is never withheld from a hypoxic client.'},
  {q:'Which breathing technique should the nurse teach a client with COPD to reduce air trapping?',type:'single',opts:['Rapid, shallow breathing','Pursed-lip breathing','Breath-holding for 10 seconds','Deep breathing using accessory muscles'],correct:1,rat:'The trap: accessory-muscle use is a sign of distress, not a technique, and rapid/shallow or breath-holding worsen gas exchange. Pursed-lip breathing prolongs exhalation, keeps airways open, and reduces air trapping.'},
  {q:'A post-op client has diminished breath sounds at both lung bases, a low-grade fever, and a slightly reduced SpO₂ on day 2. Which nursing action is the priority?',type:'single',opts:['Notify the provider for antibiotics','Encourage incentive spirometry, coughing, and early ambulation','Prepare for chest-tube insertion','Restrict fluids to reduce secretions'],correct:1,rat:'The trap: antibiotics and chest tubes over-treat what is most likely atelectasis, and restricting fluids thickens secretions. Diminished bases with a low fever on day 2 point to atelectasis — the priority is re-expanding the lungs with spirometry, coughing, and ambulation.'},
  {q:'A client\'s chest-tube drainage system is accidentally knocked over and the tubing disconnects. What should the nurse do FIRST?',type:'single',opts:['Clamp the chest tube near the insertion site','Submerge the tube\'s end in a bottle of sterile water/saline','Lay the client flat','Call the provider before doing anything'],correct:1,rat:'The trap: clamping risks a tension pneumothorax and laying flat/calling first delays protection. Placing the open end in sterile water re-establishes a water seal and prevents air from entering the pleural space — then notify and replace the system.'},
  {q:'A nurse assesses a client and finds a respiratory rate of 8, pinpoint pupils, and difficulty waking after receiving hydromorphone. Which is the priority action?',type:'single',opts:['Document the sedation and recheck in an hour','Administer naloxone and support ventilation','Encourage the client to take deep breaths and leave the room','Give the next scheduled opioid dose on time'],correct:1,rat:'The trap: documenting-and-waiting or giving more opioid is dangerous, and "encourage deep breaths" undertreats. RR 8, pinpoint pupils, and difficulty arousing are opioid toxicity — reverse with naloxone and support breathing.'},
