  {q:'Which clients are at INCREASED risk for developing post-op atelectasis and pneumonia? (Select all that apply)',type:'multi',opts:['A client with upper abdominal surgery and shallow breathing from pain','A smoker with COPD','A young, ambulatory client using incentive spirometry hourly','An older adult on bed rest','A client with an effective, well-controlled cough'],correct:[0,1,3],rat:'The trap: the protective options (spirometry, effective cough) reduce risk, not raise it. Painful upper-abdominal incisions, COPD/smoking, and immobility all promote alveolar collapse and secretion pooling.'},
  {q:'A client reports pleuritic chest pain and dyspnea. The nurse suspects a pulmonary embolism. Which is the priority nursing action?',type:'single',opts:['Administer a scheduled stool softener','Apply oxygen, raise the head of the bed, and call the rapid response team','Encourage ambulation to move the clot','Massage the client\'s calf to relieve a possible DVT'],correct:1,rat:'The trap: ambulating or massaging the calf can dislodge more clot — dangerous. A suspected PE is an emergency: oxygenate, position for breathing, and summon rapid response/notify the provider immediately.'},
  {q:'Which statement by a client about deep breathing and coughing after surgery indicates a need for further teaching?',type:'single',opts:['"I should splint my incision with a pillow when I cough."','"I\'ll use my incentive spirometer about every hour while awake."','"I\'ll avoid coughing so I don\'t pop my stitches."','"Getting up to walk will help my lungs too."'],correct:2,rat:'"Needs further teaching" = find the wrong statement. Splinting, hourly spirometry, and early ambulation are correct. Avoiding coughing lets secretions pool and promotes atelectasis/pneumonia — coughing (splinted) is encouraged.'},
  {q:'A nurse is monitoring a client after chest-tube placement. Which finding is EXPECTED and requires no intervention?',type:'single',opts:['Continuous bubbling in the water-seal chamber','Tidaling (fluid rising and falling with respiration) in the water-seal chamber','Sudden absence of breath sounds on the affected side','Subcutaneous emphysema spreading up the neck'],correct:1,rat:'The trap: three options are abnormal (air leak, possible tension/blockage, spreading crepitus). Tidaling — fluid moving with respiration — reflects normal pressure changes and is expected.'},
  {q:'A client with pneumonia is receiving oxygen and antibiotics. Which finding BEST indicates the treatment is working?',type:'single',opts:['The client requests a different meal','Breath sounds clear and SpO₂ rises to 96% on room air','The chest x-ray is scheduled','The client is sleeping'],correct:1,rat:'The trap: meal requests, a scheduled test, and sleeping don\'t measure gas exchange. Clearing breath sounds and a rising SpO₂ on room air are objective evidence the pneumonia and oxygenation are improving.'},
  {q:'A post-op client suddenly becomes restless and confused with an SpO₂ of 84%. What should the nurse do FIRST?',type:'single',opts:['Administer a sedative for the restlessness','Assess the airway and breathing and apply oxygen','Restrain the client for safety','Document the behavior change and continue rounds'],correct:1,rat:'The trap: restlessness/confusion look behavioral, and sedating or restraining a hypoxic client is dangerous. Restlessness is an early sign of HYPOXIA — assess airway/breathing and oxygenate first; the mental change is the clue, not the problem.'},
  {q:'A nurse observes gentle continuous bubbling in the SUCTION-CONTROL chamber of a chest drainage system. What does this indicate?',type:'single',opts:['An air leak requiring immediate action','Expected functioning of the suction-control chamber','The lung has collapsed further','The tubing is obstructed'],correct:1,rat:'The trap: students learn "bubbling = air leak," but that rule applies to the WATER-SEAL chamber. Gentle continuous bubbling in the SUCTION-CONTROL chamber is expected and shows suction is working. Continuous bubbling in the water seal is the air leak.'},
  {q:'Match each chest tube chamber to its function. Which pairings are correct? (Select all that apply)',type:'multi',opts:['Collection chamber — drainage collects and is measured here','Water-seal chamber — acts as a one-way valve; tidaling is normal','Suction-control chamber — regulates the amount of suction applied','Water-seal chamber — continuous bubbling here signals an air leak','Collection chamber — bubbling here is expected'],correct:[0,1,2,3],rat:'The trap: the collection chamber should never bubble — it simply collects drainage. The other four are correct descriptions of the three-chamber system.'},
  {q:'A client on RIPE therapy for TB reports their urine and tears have turned orange. The nurse should:',type:'single',opts:['Hold all TB medications and notify the provider','Reassure the client this is a harmless effect of rifampin','Treat it as a sign of liver failure','Increase fluid intake to flush the "toxin"'],correct:1,rat:'The trap: orange/red body fluids look alarming but are an expected, harmless effect of rifampin. Holding therapy risks resistance. (Liver toxicity would show as jaundice, RUQ pain, or rising enzymes — a different picture.)'},
  {q:'Which finding in a client on isoniazid (INH) requires the nurse to question the plan or intervene?',type:'single',opts:['The client is also prescribed vitamin B6 (pyridoxine)','The client reports numbness and tingling in the feet','The client\'s sputum is being collected monthly','The client takes the dose on an empty stomach'],correct:1,rat:'INH causes peripheral neuropathy; numbness/tingling signals it — B6 is given to prevent it, so its presence is appropriate. Report the neuropathy and watch for hepatotoxicity.'},
  {q:'A client in status asthmaticus initially had a respiratory alkalosis on ABG. An hour later the ABG shows a normalizing then rising PaCO₂. The nurse recognizes this as:',type:'single',opts:['A reassuring sign the attack is resolving','A danger sign that the client is tiring and retaining CO₂','An expected finding that needs no action','Evidence of metabolic compensation'],correct:1,rat:'The trap: a "normal" CO₂ mid-attack looks reassuring but is ominous — the client who was blowing off CO₂ is now tiring and retaining it (moving toward respiratory acidosis). This signals impending respiratory failure; prepare for possible intubation.'},
  {q:'The nurse is caring for a client with a new tracheostomy. Which item is most important to keep at the bedside?',type:'single',opts:['A second IV pump','The obturator and a spare trach tube','A padded tongue blade','An extra pillow'],correct:1,rat:'If the tube dislodges (an early emergency), the obturator and a spare tube are needed to re-establish the airway immediately. Airway safety drives the priority.'},
  {q:'Which actions are part of preventing ventilator-associated pneumonia (VAP)? (Select all that apply)',type:'multi',opts:['Keep the head of bed elevated 30–45°','Provide oral care with chlorhexidine','Keep the client deeply sedated at all times','Perform daily sedation vacations / wean-readiness checks','Provide stress-ulcer and DVT prophylaxis'],correct:[0,1,3,4],rat:'The trap: keeping a client DEEPLY sedated works against the bundle — daily sedation vacations shorten ventilator time. HOB elevation, chlorhexidine oral care, sedation vacations, and ulcer/DVT prophylaxis are the bundle.'}
],'Respiratory Check');
</script>

<script>
document.getElementById('sec-acidbase').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">⚗️</span> Acid–Base & Electrolytes</h2>
<p class="intro-line">Normal values are given on the final — but train the interpretation so you're fast, and know which imbalance kills first.</p>
<div class="card"><h3>🧪 Normal ABG values & ROME</h3>
  <table class="lab">
    <tr><th>Value</th><th>Range</th><th>Meaning</th></tr>
    <tr><td>pH</td><td>7.35 – 7.45</td><td>&lt;7.35 acidosis, &gt;7.45 alkalosis</td></tr>
    <tr><td>PaCO₂</td><td>35 – 45 mmHg</td><td>Respiratory (lungs)</td></tr>
    <tr><td>HCO₃⁻</td><td>22 – 26 mEq/L</td><td>Metabolic (kidneys)</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">ROME — Respiratory Opposite, Metabolic Equal</div></div>
  <div class="hy">⭐ Compensation: pH back in range = full · both values abnormal + pH still off = partial · other value normal = uncompensated. Vomiting → alkalosis; diarrhea/DKA → acidosis.</div></div>
<div class="card" style="border-color:var(--amber)"><h3>⚡ Electrolytes — what kills</h3>
  <table class="lab">
    <tr><th>Electrolyte</th><th>Normal</th><th>Key danger</th></tr>
    <tr><td>Sodium (Na⁺)</td><td>135–145 mEq/L</td><td><b>Hypo</b> → cerebral edema, seizures · <b>Hyper</b> → thirst, neuro changes</td></tr>
    <tr><td>Potassium (K⁺)</td><td>3.5–5.0 mEq/L</td><td><b>Hyper</b> → arrhythmia, peaked T waves · <b>Hypo</b> → flat T, U waves</td></tr>
    <tr><td>Chloride (Cl⁻)</td><td>98–106 mEq/L</td><td>Follows sodium; shifts with acid–base balance</td></tr>
    <tr><td>Calcium (total)</td><td>9.0–10.5 mg/dL</td><td><b>Hypo</b> → Trousseau's/Chvostek's, tetany · <b>Hyper</b> → weakness, stones</td></tr>
    <tr><td>Magnesium (Mg²⁺)</td><td>1.5–2.5 mEq/L</td><td><b>Hypo</b> → mirrors low calcium; hyperreflexia · <b>Hyper</b> → ↓reflexes</td></tr>
    <tr><td>Phosphorus (PO₄)</td><td>3.0–4.5 mg/dL</td><td><b>Inverse of calcium</b> — up when Ca is down</td></tr>
    <tr><td>Bicarbonate (HCO₃⁻)</td><td>22–26 mEq/L</td><td>The metabolic acid–base value</td></tr>
  </table>
  <div class="hy">⭐ CKD: kidneys can't clear potassium → avoid high-K foods (bananas, oranges, potatoes, salt substitutes).</div></div>
<div class="card" style="border-color:var(--purple)"><h3>🔬 Lab values to memorize — renal &amp; CBC</h3>
  <table class="lab">
    <tr><th>Renal</th><th>Normal</th><th>Meaning</th></tr>
    <tr><td><b>BUN</b></td><td>10–20 mg/dL</td><td>↑ with dehydration, kidney injury, GI bleed, high protein</td></tr>
    <tr><td><b>Creatinine</b></td><td>0.6–1.2 mg/dL</td><td>Best marker of kidney function (↑ = worse)</td></tr>
    <tr><td>BUN : creatinine ratio</td><td>10:1 – 20:1</td><td>High ratio → dehydration/pre-renal</td></tr>
    <tr><td>GFR</td><td>≥ 90 mL/min</td><td>&lt; 60 for 3+ months = chronic kidney disease</td></tr>
  </table>
  <table class="lab" style="margin-top:10px">
    <tr><th>CBC</th><th>Normal</th><th>Meaning</th></tr>
    <tr><td><b>WBC</b></td><td>5,000–10,000 /mm³</td><td>↑ infection · ↓ neutropenia (infection risk)</td></tr>
    <tr><td><b>RBC</b></td><td>Men 4.7–6.1 · Women 4.2–5.4 million/mm³</td><td>↓ anemia · ↑ polycythemia</td></tr>
    <tr><td>Hemoglobin (Hgb)</td><td>Men 14–18 · Women 12–16 g/dL</td><td>Oxygen-carrying capacity</td></tr>
    <tr><td>Hematocrit (Hct)</td><td>Men 42–52% · Women 37–47%</td><td>≈ 3 × Hgb</td></tr>
    <tr><td><b>Platelets</b> (= thrombocytes)</td><td>150,000–400,000 /mm³</td><td>&lt; 150k = thrombocytopenia (bleeding) · clotting cells</td></tr>
  </table>
  <p class="hy" style="margin:8px 0 0">⭐ "Platelets" and "thrombocytes" are the same cells — clotting. Below 150,000 → bleeding precautions (soft toothbrush, electric razor, no invasive procedures).</p>
</div>
<div class="card"><h3>🎯 Other high-yield numbers</h3>
  <table class="lab">
    <tr><th>Test</th><th>Normal</th></tr>
    <tr><td>Arterial pH</td><td>7.35–7.45</td></tr>
    <tr><td>PaCO₂ / HCO₃⁻</td><td>35–45 mmHg / 22–26 mEq/L</td></tr>
    <tr><td>PaO₂ / SaO₂</td><td>80–100 mmHg / 95–100%</td></tr>
    <tr><td>Fasting glucose</td><td>70–99 mg/dL</td></tr>
    <tr><td>A1C</td><td>&lt; 5.7% normal · ≥ 6.5% diabetes</td></tr>
    <tr><td>aPTT (heparin)</td><td>30–40 s normal · <b>therapeutic ~60–100 s</b></td></tr>
    <tr><td>PT / INR (warfarin)</td><td>11–12.5 s / 0.8–1.1 · <b>therapeutic INR 2–3</b></td></tr>
    <tr><td>Digoxin level</td><td>0.5–2.0 ng/mL</td></tr>
  </table>
</div>
<div class="card" style="border-color:var(--blue)"><h3>💧 IV fluid tonicity — which fluid, and why</h3>
  <table class="lab">
    <tr><th>Type</th><th>What it does</th><th>Use / watch</th></tr>
    <tr><td><b>Isotonic</b><br>(0.9% NS, LR)</td><td>Stays in the vessels → expands blood volume</td><td>Dehydration, hypotension, shock, blood loss. <b>NS is the ONLY fluid hung with blood.</b></td></tr>
    <tr><td><b>Hypotonic</b><br>(0.45% NS)</td><td>Water shifts OUT of vessels INTO cells → cells plump up</td><td>Cellular dehydration, hypernatremia. <b>Watch: cerebral edema — avoid in head injury.</b></td></tr>
    <tr><td><b>Hypertonic</b><br>(3% saline, D5NS)</td><td>Pulls water OUT of cells INTO vessels → expands volume</td><td>Severe hyponatremia, cerebral edema. <b>Watch: fluid overload/pulmonary edema — give slowly.</b></td></tr>
  </table>
  <p style="margin:8px 0 0"><b>Decision shortcut:</b> dry/low BP/shock → <b>isotonic</b> · cells dry → <b>hypotonic</b> · sodium dangerously low → <b>hypertonic</b>. <span class="hy">⭐ NS = "Needs Salt" · LR ≈ blood plasma. Any IV running → check lungs, BP, HR, urine output, edema.</span></p>
</div>
<div class="card"><h3>🔢 Anion gap — sub-typing metabolic acidosis</h3>
  <ul class="clean">
    <li><b>Normal gap (8–12):</b> a direct <b>loss of bicarbonate</b> — diarrhea, diuretics.</li>
    <li><b>High gap:</b> <b>added acids</b> — lactic acidosis, <b>DKA</b>, renal failure.</li>
    <li>In acidosis, K⁺ shifts <b>out</b> of cells → <b>hyperkalemia</b>; as you correct it, K⁺ can swing low. <b>Kussmaul</b> respirations = lungs blowing off CO₂ to compensate.</li>
  </ul>
</div>
<div id="quiz-acidbase"></div>`;
renderQuiz('quiz-acidbase',[
  {q:'A client in DKA has an ABG of pH 7.28, PaCO₂ 30, HCO₃ 14. How does the nurse interpret this?',type:'single',opts:['Uncompensated respiratory acidosis','Fully compensated metabolic alkalosis','Partially compensated metabolic acidosis','Uncompensated respiratory alkalosis'],correct:2,rat:'The trap: the low CO₂ tempts you toward a respiratory read. But low pH + low bicarb = metabolic acidosis (ketoacids); the low CO₂ is the lungs compensating (Kussmaul). Both values abnormal with pH still out of range = partially compensated.'},
  {q:'An anxious client is hyperventilating with numbness and tingling in the fingertips. ABG: pH 7.49, PaCO₂ 30, HCO₃ 24. This represents:',type:'single',opts:['Uncompensated respiratory alkalosis','Partially compensated metabolic alkalosis','Uncompensated respiratory acidosis','Fully compensated respiratory alkalosis'],correct:0,rat:'The trap: the high pH could look "metabolic," but per ROME a low CO₂ driving a high pH is respiratory. The bicarb is still normal (no compensation) and pH is out of range — uncompensated respiratory alkalosis from hyperventilation.'},
  {q:'A client has been vomiting for three days. Which acid-base imbalance and electrolyte change should the nurse anticipate?',type:'single',opts:['Metabolic acidosis with hyperkalemia','Metabolic alkalosis with hypokalemia','Respiratory acidosis with hypernatremia','Respiratory alkalosis with hypocalcemia'],correct:1,rat:'The trap: it\'s easy to confuse the GI directions. Vomiting loses hydrochloric ACID → metabolic alkalosis, and potassium is lost/shifts as well → hypokalemia. Diarrhea would do the opposite (metabolic acidosis).'},
  {q:'A client\'s potassium is 6.2 mEq/L. Which finding requires the MOST immediate action?',type:'single',opts:['Muscle weakness in the legs','Peaked T waves and a widening QRS on the ECG','Mild abdominal cramping','Nausea'],correct:1,rat:'The trap: weakness, cramping, and nausea are real hyperkalemia symptoms but not immediately lethal. Peaked T waves with a widening QRS signal impending life-threatening dysrhythmia — the priority.'},
  {q:'Which client is at greatest risk for a life-threatening complication and should be seen FIRST?',type:'single',opts:['A client with a sodium of 128 who is becoming confused','A client with a calcium of 9.5','A client with a potassium of 4.2','A client with a magnesium of 2.0'],correct:0,rat:'The trap: three values are normal. A sodium of 128 with new confusion signals hyponatremia causing cerebral edema — a risk for seizures and the priority.'},
  {q:'While taking a client\'s blood pressure, the nurse observes the hand and fingers contract into a spasm. This finding suggests:',type:'single',opts:['Hyperkalemia','Hypocalcemia (Trousseau\'s sign)','Hypernatremia','Metabolic acidosis'],correct:1,rat:'The trap: cuff-induced spasm can be mistaken for a positioning artifact. A carpopedal spasm during BP-cuff inflation is a positive Trousseau\'s sign — hypocalcemia (often with hypomagnesemia). Chvostek\'s (cheek-tap twitch) tells the same story.'},
  {q:'A client with chronic kidney disease is being taught about diet. Which food choice indicates the teaching was effective?',type:'single',opts:['A banana with breakfast','A baked potato with dinner','Applesauce as a snack','Orange juice with lunch'],correct:2,rat:'The trap: three options are high-potassium (banana, potato, orange juice) — dangerous for failing kidneys that can\'t clear potassium. Applesauce is low in potassium, so choosing it shows understanding.'},
  {q:'A client with a nasogastric tube to continuous suction is at risk for which acid-base imbalance?',type:'single',opts:['Metabolic acidosis','Metabolic alkalosis','Respiratory acidosis','Respiratory alkalosis'],correct:1,rat:'The trap: students associate "tubes" with acidosis. NG suction removes acidic gastric contents (like vomiting), so the client loses acid → metabolic alkalosis.'},
  {q:'A client is admitted with severe diarrhea for several days. The nurse anticipates which ABG pattern?',type:'single',opts:['↑pH, ↑HCO₃ (metabolic alkalosis)','↓pH, ↓HCO₃ (metabolic acidosis)','↑pH, ↓CO₂ (respiratory alkalosis)','↓pH, ↑CO₂ (respiratory acidosis)'],correct:1,rat:'The trap: diarrhea and vomiting are easy to mix up. Diarrhea loses bicarbonate (base) from the lower GI tract → metabolic acidosis (low pH, low HCO₃).'},
  {q:'A client with COPD retains CO₂. The nurse expects the compensating organ over time to be the:',type:'single',opts:['Lungs, by breathing faster','Kidneys, by retaining bicarbonate','Heart, by increasing output','Liver, by producing albumin'],correct:1,rat:'The trap: the lungs are the problem here, so they can\'t compensate for themselves. In chronic respiratory acidosis the kidneys compensate by retaining bicarbonate to buffer the acid.'},
  {q:'Which clients are at risk for hyperkalemia? (Select all that apply)',type:'multi',opts:['A client with acute kidney injury and low urine output','A client taking a potassium-sparing diuretic','A client with extensive crush/tissue injury','A client with prolonged vomiting','A client receiving large amounts of loop diuretic'],correct:[0,1,2],rat:'The trap: vomiting and loop diuretics cause LOSS of potassium (hypokalemia). Failing kidneys, potassium-sparing diuretics, and cellular breakdown (crush injury) all release or retain potassium → hyperkalemia.'},
  {q:'A client\'s ABG shows pH 7.31, PaCO₂ 52, HCO₃ 26 after receiving too much opioid. This is:',type:'single',opts:['Metabolic acidosis','Respiratory acidosis','Metabolic alkalosis','Respiratory alkalosis'],correct:1,rat:'The trap: a low pH tempts "metabolic acidosis," but check the driver. The CO₂ is high (opioid-induced hypoventilation) and bicarb is normal — low pH from high CO₂ is respiratory acidosis.'},
  {q:'A client with hypocalcemia is at risk for which finding? (Select all that apply)',type:'multi',opts:['Positive Chvostek\'s sign','Muscle twitching and tetany','Peaked T waves','Numbness and tingling around the mouth','Laryngospasm'],correct:[0,1,3,4],rat:'The trap: peaked T waves are a HYPERkalemia sign, not hypocalcemia. Low calcium increases neuromuscular excitability — Chvostek\'s, tetany, perioral tingling, and laryngospasm.'},
  {q:'A nurse reviews a client with a sodium of 118 mEq/L. Which is the priority nursing concern?',type:'single',opts:['Constipation','Seizure precautions for cerebral edema','Dry skin','Increased appetite'],correct:1,rat:'The trap: minor symptoms distract from the danger. Severe hyponatremia shifts water into brain cells → cerebral edema and seizures. Seizure precautions and neuro monitoring are the priority.'},
  {q:'A client\'s ABG is pH 7.37, PaCO₂ 60, HCO₃ 34. How is this best interpreted?',type:'single',opts:['Uncompensated respiratory acidosis','Fully compensated respiratory acidosis','Uncompensated metabolic alkalosis','Normal ABG'],correct:1,rat:'The trap: pH 7.37 looks "normal," so students pick normal. But both CO₂ and bicarb are abnormal while pH sits at the acidic end of normal — the kidneys fully compensated a respiratory acidosis (pH back in range, primary from the acidic-side pH + high CO₂).'},
  {q:'Which lab value should the nurse report to the provider IMMEDIATELY?',type:'single',opts:['Potassium 6.8 mEq/L','Sodium 140 mEq/L','Calcium 9.4 mg/dL','Magnesium 2.1 mEq/L'],correct:0,rat:'The trap: three values are within normal limits. A potassium of 6.8 is critically high and can cause fatal dysrhythmias — report immediately and anticipate cardiac monitoring and treatment.'},
  {q:'A client with a head injury and cerebral edema is prescribed IV fluid. Which order should the nurse QUESTION?',type:'single',opts:['3% hypertonic saline','0.45% hypotonic saline','0.9% normal saline','Lactated Ringer\'s'],correct:1,rat:'The trap: hypotonic fluid shifts water INTO cells — dangerous in a brain that\'s already swelling. Avoid hypotonic solutions in head injury; hypertonic saline is actually used to pull fluid OUT of the swollen brain.'},
  {q:'A client is in hypovolemic shock after blood loss. Which IV fluid is most appropriate to expand intravascular volume?',type:'single',opts:['0.45% NS (hypotonic)','0.9% NS or Lactated Ringer\'s (isotonic)','D10W (hypertonic)','Sterile water'],correct:1,rat:'Isotonic fluids stay in the vessels and expand blood volume — the goal in shock/blood loss. Hypotonic pulls fluid into cells; sterile water alone is never given IV (causes hemolysis).'},
  {q:'A client is starting a blood transfusion. Which IV solution must be used to prime the line and run with the blood?',type:'single',opts:['0.45% normal saline','0.9% normal saline','Lactated Ringer\'s','D5W'],correct:1,rat:'Only 0.9% normal saline is compatible with blood. Solutions with calcium (LR) can cause clotting, and dextrose/hypotonic fluids cause hemolysis of the red cells.'},
  {q:'A client with diarrhea for several days has a low pH, low bicarbonate, and a NORMAL anion gap. This best fits:',type:'single',opts:['High-anion-gap metabolic acidosis from added acids','Normal-anion-gap metabolic acidosis from bicarbonate loss','Respiratory acidosis','Metabolic alkalosis'],correct:1,rat:'The trap: DKA/lactic acidosis raise the anion gap (added acids). Diarrhea directly loses bicarbonate, producing a normal-gap metabolic acidosis. Match the mechanism to the gap.'},
  {q:'Which value best reflects kidney function and is the more specific marker of the two?',type:'single',opts:['BUN','Creatinine','Sodium','Hematocrit'],correct:1,rat:'Both BUN (10–20) and creatinine (0.6–1.2) rise with kidney impairment, but creatinine is the more specific marker — BUN also rises with dehydration, GI bleeds, and high protein intake.'},
  {q:'A client\'s platelet count is 90,000/mm³. Which nursing action is appropriate?',type:'single',opts:['No action — this is a normal value','Institute bleeding precautions (soft toothbrush, electric razor, no invasive procedures)','Place the client in protective isolation','Restrict potassium-rich foods'],correct:1,rat:'Normal platelets (thrombocytes) are 150,000–400,000. At 90,000 the client is thrombocytopenic and at risk for bleeding — use bleeding precautions. (Protective isolation is for neutropenia, a low WBC.)'},
  {q:'Which lab result should prompt the nurse to place a client on neutropenic (protective) precautions?',type:'single',opts:['WBC 2,000/mm³','Platelets 250,000/mm³','Hemoglobin 14 g/dL','BUN 15 mg/dL'],correct:0,rat:'Normal WBC is 5,000–10,000. A WBC of 2,000 means neutropenia — the client can\'t fight infection, so protective precautions apply. The other values are within normal limits.'},
  {q:'A client on a heparin drip has an aPTT of 95 seconds. How should the nurse interpret this?',type:'single',opts:['Dangerously low — increase the rate','Within the therapeutic range for heparin','Normal baseline — no anticoagulation yet','Indicates the antidote is needed immediately'],correct:1,rat:'Baseline aPTT is about 30–40 seconds; the therapeutic range on heparin is roughly 60–100 seconds (1.5–2× normal). 95 seconds is therapeutic — monitor and continue, watching for bleeding.'}
],'Acid–Base & Electrolytes Check');
</script>

<script>
document.getElementById('sec-diabetes').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🩸</span> Diabetes — Full Picture</h2>
<p class="intro-line">The DKA ABG case tells you diabetes is fair game. This includes the teaching he stressed — sick-day rules, insulin during illness, and ketones.</p>
<div class="card"><h3>🔀 Type 1 vs 2 · diagnostics</h3>
  <table class="lab">
    <tr><th>Feature</th><th>Type 1</th><th>Type 2 (~90%)</th></tr>
    <tr><td>Core problem</td><td>Autoimmune → <b>no insulin</b></td><td><b>Insulin resistance</b> + relative deficiency</td></tr>
    <tr><td>Emergency</td><td><b>DKA</b> (ketones, acidosis)</td><td><b>HHS</b> (glucose >600, no ketosis)</td></tr>
  </table>
  <p style="margin:6px 0 0">Diagnostic: fasting BG ≥126 or <b>A1C ≥6.5%</b> (~3-month average). Goal A1C <b>&lt;7%</b>. The 3 P's: polyuria, polydipsia, polyphagia.</p></div>
<div class="card"><h3>💉 Insulin essentials</h3>
  <table class="lab">
    <tr><th>Type</th><th>Example</th><th>Onset</th><th>Peak</th><th>Duration</th><th>Key point</th></tr>
    <tr><td>Rapid</td><td>Lispro, Aspart</td><td><b>10–20 min</b></td><td>1–3 h</td><td>3–5 h</td><td>Give 0–15 min before meals — <b>food must be there</b></td></tr>
    <tr><td>Short/Regular</td><td>Humulin R</td><td><b>30–60 min</b></td><td>2–4 h</td><td>5–8 h</td><td>Give <b>30 min before</b> meals · <b>only insulin given IV</b></td></tr>
    <tr><td>Intermediate</td><td>NPH (cloudy)</td><td><b>1–2 h</b></td><td>4–12 h</td><td>14–24 h</td><td>Peak = hypoglycemia window · roll to mix</td></tr>
    <tr><td>Long/Basal</td><td>Glargine, Detemir</td><td><b>1–2 h</b></td><td><b>no peak</b></td><td>~24 h (detemir 12–24)</td><td>SQ only, never IV · <b>do not mix</b></td></tr>
  </table>
  <div class="mnem"><div class="tag">Mixing</div><div class="big">Clear before cloudy — Regular before NPH ("RN")</div></div>
  <div class="hy">⭐ Metformin: hold around IV contrast (~48 h) — lactic acidosis risk.</div></div>
<div class="card" style="border-color:var(--red)"><h3>🤒 Sick-day rules, illness & ketones (his teaching)</h3>
  <ul class="clean">
    <li><b>Never stop insulin during illness</b> — even if eating less. Illness raises stress hormones and blood glucose, so insulin needs often <b>increase</b>, not decrease.</li>
    <li><b>Check glucose every 3–4 hours</b> and <b>check urine/blood ketones</b> when glucose is high (often >240) or when ill.</li>
    <li><b>Positive/moderate–large ketones</b> = warning sign of impending DKA → notify the provider.</li>
    <li>Keep <b>hydrated</b> — sugar-free fluids if glucose is high; carb-containing fluids if not eating solids, to prevent hypoglycemia.</li>
    <li>Ketones form because <b>without enough insulin the body burns fat</b>, producing ketoacids → the acidosis of DKA (fruity breath, Kussmaul breathing).</li>
    <li>DKA/HHS treatment order: <b>IV fluids → regular insulin → monitor & replace potassium → add dextrose</b> near glucose 200.</li>
  </ul></div>
<div class="card"><h3>🌙 Morning hyperglycemia — Somogyi vs. dawn</h3>
  <table class="lab">
    <tr><th></th><th>Somogyi effect</th><th>Dawn phenomenon</th></tr>
    <tr><td><b>Cause</b></td><td>Nighttime <b>hypo</b>glycemia → rebound release of counter-regulatory hormones</td><td>Early-morning surge of growth hormone/cortisol</td></tr>
    <tr><td><b>2–3 a.m. glucose</b></td><td><b>LOW</b></td><td><b>Normal or high</b></td></tr>
    <tr><td><b>Fix</b></td><td><b>DECREASE</b> evening insulin (or add a bedtime snack)</td><td><b>INCREASE</b> evening insulin / adjust timing</td></tr>
  </table>
  <p class="hy" style="margin:8px 0 0">⭐ Both show high morning glucose — the <b>2–3 a.m. check tells them apart</b>, and the treatments are opposite. Classic trick question.</p></div>
<div class="card" style="border-color:var(--amber)"><h3>🍬 Hypoglycemia & complications</h3>
  <p><b>Hypoglycemia (&lt;70):</b> conscious → <b>Rule of 15</b> (15 g fast carbs, recheck 15 min). Unconscious → <b>glucagon</b> IM/SubQ or D50 IV; never feed. "Cold & clammy — need candy."</p>
  <p style="margin:6px 0 0"><b>Complications:</b> macrovascular (MI, stroke, PAD); microvascular (retino-, neuro-, nephropathy). <b>Foot care:</b> inspect daily, no barefoot, no heating pads. Perioperative glucose target ≈140–180.</p></div>
<div class="card" style="border-color:var(--purple)"><h3>⚠️ Metabolic syndrome + the other types (high-yield, often missed)</h3>
  <p style="margin:0 0 6px"><b>Metabolic syndrome</b> = the "before you get diabetes" cluster that predicts Type 2 <em>and</em> heart disease/stroke. Diagnosed with <b>3 or more</b> of:</p>
  <ul class="clean">
    <li><b>Central (abdominal) obesity</b> — waist &gt;40 in (men), &gt;35 in (women); "apple-shaped."</li>
    <li><b>Hypertension</b></li>
    <li><b>Dyslipidemia</b> — low HDL + high LDL/triglycerides</li>
    <li><b>Insulin resistance</b> with elevated fasting glucose (hyperinsulinemia)</li>
  </ul>
  <p style="margin:8px 0 0"><b>LADA</b> ("Type 1.5") = autoimmune beta-cell destruction like Type 1 but slower/adult-onset — often mis-labeled Type 2 at first; antibody testing distinguishes it. <b>Gestational</b> = develops in pregnancy, usually resolves after delivery but raises the mother's future Type 2 risk. <b>Prediabetes</b> = fasting 100–125 or A1C 5.7–6.4% — reversible with lifestyle change.</p>
</div>
<div id="quiz-diabetes"></div>`;
renderQuiz('quiz-diabetes',[
  {q:'A client with type 1 diabetes calls the clinic with a stomach virus, is vomiting, and "hasn\'t taken any insulin because I can\'t keep food down." What is the nurse\'s BEST guidance?',type:'single',opts:['"That\'s correct — skip insulin until you can eat again."','"Continue your insulin, check your glucose and ketones every few hours, and sip fluids."','"Take double your insulin to cover the illness."','"Stop checking your glucose and rest until you feel better."'],correct:1,rat:'The trap: skipping insulin when not eating is a classic and dangerous misconception — illness raises glucose via stress hormones, so insulin is still needed and DKA can develop. The client keeps taking insulin, monitors glucose and ketones frequently, and stays hydrated. Doubling blindly or stopping monitoring are also unsafe.'},
  {q:'A client with type 1 diabetes has a blood glucose of 320 mg/dL and reports feeling ill. Which action should the nurse teach the client to take?',type:'single',opts:['Exercise vigorously to lower the glucose','Check urine or blood for ketones','Withhold all fluids','Skip the next insulin dose'],correct:1,rat:'The trap: exercise with high glucose and possible ketones can worsen ketoacidosis, and withholding fluids/insulin is dangerous. With hyperglycemia and illness the client should check for ketones — their presence signals impending DKA.'},
  {q:'A client asks why ketones appear in diabetic ketoacidosis. Which explanation is correct?',type:'single',opts:['"Excess insulin makes your body store fat."','"Without enough insulin your cells can\'t use glucose, so they burn fat, producing acidic ketones."','"Ketones come from eating too much protein."','"Ketones mean your blood sugar is too low."'],correct:1,rat:'The trap: ketones are tied to insulin LACK and high (not low) glucose, and they come from fat breakdown, not protein or excess insulin. No insulin → cells can\'t use glucose → fat is burned for fuel → ketoacids accumulate → acidosis.'},
  {q:'A client in DKA is dehydrated with a glucose of 640. Which order should the nurse implement FIRST?',type:'single',opts:['IV regular insulin bolus','IV 0.9% normal saline','Subcutaneous long-acting insulin','Oral fluids with juice'],correct:1,rat:'The trap: insulin feels like the obvious DKA treatment, but giving it first — before restoring volume — can cause dangerous hypotension and potassium shifts. Fluids come first, then insulin, then potassium monitoring.'},
  {q:'Shortly after starting an insulin infusion for DKA, which electrolyte value should the nurse monitor most closely?',type:'single',opts:['Sodium','Potassium','Calcium','Chloride'],correct:1,rat:'The trap: DKA is about glucose, so students overlook potassium. Insulin drives potassium into cells, so serum potassium can fall sharply — a normal or high starting level can plummet, risking dysrhythmias.'},
  {q:'When mixing NPH and regular insulin in one syringe, which technique is correct?',type:'single',opts:['Draw up NPH (cloudy) first, then regular','Draw up regular (clear) first, then NPH','Draw them up in separate syringes only','The order does not matter'],correct:1,rat:'The trap: it\'s easy to reverse. "Clear before cloudy" (RN — Regular then NPH) prevents contaminating the clear regular vial with the cloudy NPH.'},
  {q:'A nurse gives a client rapid-acting insulin lispro at 0800. To prevent hypoglycemia, the nurse should ensure the client:',type:'single',opts:['Eats a meal within about 15 minutes','Delays eating for 2 hours','Exercises immediately','Skips the next meal'],correct:0,rat:'The trap: delaying food or exercising after rapid insulin invites hypoglycemia. Lispro acts within 5–15 minutes, so the meal should be available immediately after the dose.'},
  {q:'A client with type 2 diabetes is scheduled for a CT scan with IV contrast. Which medication should the nurse anticipate holding?',type:'single',opts:['Glargine (Lantus)','Metformin','Aspirin','Lisinopril'],correct:1,rat:'The trap: students may hold the insulin instead. Metformin is held around IV contrast (~48 h) because of the risk of contrast-induced kidney injury and lactic acidosis.'},
  {q:'A client presents with a glucose of 880, severe dehydration, and altered mental status, but urine ketones are negative and pH is normal. This is most consistent with:',type:'single',opts:['DKA','Hyperosmolar hyperglycemic state (HHS)','Hypoglycemia','Somogyi effect'],correct:1,rat:'The trap: extreme hyperglycemia suggests DKA, but the absence of ketones and acidosis rules it out. HHS occurs in type 2 diabetes with profound hyperglycemia and dehydration WITHOUT significant ketosis.'},
  {q:'A conscious client with diabetes becomes shaky, diaphoretic, and confused; the glucose reads 52. What should the nurse do FIRST?',type:'single',opts:['Administer IM glucagon','Give 15 g of fast-acting carbohydrate and recheck in 15 minutes','Give the scheduled insulin dose','Start an insulin drip'],correct:1,rat:'The trap: glucagon and insulin are wrong for a conscious hypoglycemic client — insulin worsens it, glucagon is reserved for the unconscious. A conscious client gets the Rule of 15: 15 g fast carbs, recheck in 15 minutes.'},
  {q:'A client is found unconscious with a glucose of 38 and no IV access. What is the appropriate intervention?',type:'single',opts:['Give orange juice by mouth','Administer glucagon IM or subcutaneously','Give oral glucose gel between the cheek and gum','Wait and recheck in 15 minutes'],correct:1,rat:'The trap: putting juice or gel in the mouth of an unconscious client risks aspiration, and waiting is dangerous at 38. Without IV access, glucagon IM/SubQ is the correct treatment.'},
  {q:'Which statements by a client indicate correct understanding of diabetic sick-day management? (Select all that apply)',type:'multi',opts:['"I\'ll keep taking my insulin even if I\'m not eating much."','"I\'ll check my blood sugar every 3 to 4 hours."','"I\'ll test for ketones if my sugar stays high."','"I\'ll stop my insulin if I can\'t eat solid food."','"I\'ll keep drinking fluids to stay hydrated."'],correct:[0,1,2,4],rat:'The trap: "stop insulin if I can\'t eat" is the dangerous misconception — illness raises glucose and DKA can develop. Correct sick-day rules keep insulin going, monitor glucose and ketones frequently, and maintain hydration.'},
  {q:'Which foot-care instructions are appropriate for a client with diabetic neuropathy? (Select all that apply)',type:'multi',opts:['Inspect the feet daily, using a mirror if needed','Walk barefoot indoors to toughen the soles','Avoid heating pads and hot water bottles on the feet','Wear well-fitting, closed-toe shoes','Trim toenails straight across'],correct:[0,2,3,4],rat:'The trap: going barefoot invites unnoticed injury in numb feet. Daily inspection, avoiding heat sources, protective footwear, and straight-across nail trimming all prevent injury and infection in neuropathic feet.'},
  {q:'A client\'s A1C is 8.9%. How should the nurse interpret and act on this value?',type:'single',opts:['It reflects today\'s glucose and is normal','It reflects ~3 months of glucose control and is above goal, needing regimen review','It indicates hypoglycemia','It requires no follow-up'],correct:1,rat:'The trap: A1C is not a snapshot of today\'s sugar. It reflects the average glucose over ~3 months; a value of 8.9% is well above the <7% goal and signals poor control needing intervention.'},
  {q:'A client taking NPH insulin at 0700 is at greatest risk for hypoglycemia at which time?',type:'single',opts:['Immediately at 0700','Mid-to-late morning through early afternoon (its peak)','At bedtime','Only if they skip breakfast entirely'],correct:1,rat:'The trap: risk isn\'t at injection time. NPH peaks roughly 4–12 hours after the dose, so a 0700 dose puts the hypoglycemia window in the late morning to afternoon — the nurse ensures meals/snacks cover that peak.'},
  {q:'A client with diabetes is NPO for surgery in the morning. Which concern should the nurse prioritize regarding their diabetes?',type:'single',opts:['They will definitely develop DKA','Balancing insulin needs against NPO status to avoid hypoglycemia while controlling stress hyperglycemia','They should take their full usual insulin dose','Diabetes has no effect on surgery'],correct:1,rat:'The trap: the extremes (definite DKA, take full dose, no effect) are wrong. Surgery is a balancing act — NPO status risks hypoglycemia if usual insulin is given, while surgical stress raises glucose; insulin is adjusted and glucose monitored (target ≈140–180).'},
  {q:'A client with diabetes has a fruity odor to the breath and deep, rapid respirations. The nurse recognizes these as signs of:',type:'single',opts:['Hypoglycemia','Diabetic ketoacidosis','A resolved infection','Normal recovery'],correct:1,rat:'The trap: deep rapid breathing might be mistaken for anxiety. Fruity (acetone) breath and Kussmaul respirations are hallmark DKA findings — the lungs blowing off CO₂ to compensate for ketoacidosis.'},
  {q:'Which client teaching about insulin storage and administration is correct? (Select all that apply)',type:'multi',opts:['Rotate injection sites within the same general area','Only regular insulin can be given intravenously','Never mix long-acting insulin (glargine) with other insulins','Roll cloudy NPH gently to mix; do not shake vigorously','Vigorously shake all insulin before drawing it up'],correct:[0,1,2,3],rat:'The trap: vigorous shaking causes foaming/bubbles and inaccurate dosing. Correct teaching: rotate sites, only regular goes IV, don\'t mix glargine, and gently roll NPH to mix.'},
  {q:'Which findings, when clustered together, indicate metabolic syndrome? (Select all that apply)',type:'multi',opts:['Waist circumference 42 inches in a male client','Blood pressure consistently elevated','Low HDL with high triglycerides','Elevated fasting glucose with insulin resistance','A1C of 4.5%'],correct:[0,1,2,3],rat:'The trap: an A1C of 4.5% is normal/low and not part of the cluster. Metabolic syndrome = 3+ of central obesity, hypertension, dyslipidemia (low HDL/high triglycerides), and insulin resistance with elevated fasting glucose.'},
  {q:'An adult is diagnosed with Type 2 diabetes but is thin, and standard oral agents fail to control glucose. Antibody testing is positive. This best fits:',type:'single',opts:['Gestational diabetes','LADA (latent autoimmune diabetes in adults)','Prediabetes','Metabolic syndrome'],correct:1,rat:'LADA ("Type 1.5") is slow-onset autoimmune beta-cell destruction in adults, often first mislabeled as Type 2. The positive antibodies and failure of oral agents point away from typical Type 2.'},
  {q:'A client had gestational diabetes that resolved after delivery. Which statement shows correct understanding of the long-term implication?',type:'single',opts:['"I can never develop diabetes again since it went away."','"I have a significantly higher risk of developing Type 2 diabetes later."','"My baby is protected from all metabolic problems."','"I should start lifelong insulin now as a precaution."'],correct:1,rat:'Gestational diabetes usually resolves after delivery but markedly raises the mother\'s future Type 2 risk — so ongoing screening and lifestyle measures matter. It does not require lifelong insulin now.'},
  {q:'A client has high morning glucose. A 2–3 a.m. check shows a glucose of 48. The nurse recognizes this pattern as:',type:'single',opts:['Dawn phenomenon — increase the evening insulin','Somogyi effect — decrease the evening insulin or add a bedtime snack','Normal overnight variation — no change','HHS — start IV fluids'],correct:1,rat:'The trap: both Somogyi and dawn phenomenon produce HIGH morning glucose, so students reflexively add insulin. A LOW 2–3 a.m. glucose means rebound (Somogyi) — the fix is to DECREASE evening insulin, not increase it.'},
  {q:'A client has elevated morning glucose, and the 2–3 a.m. glucose is normal-to-high. This indicates:',type:'single',opts:['Somogyi effect — reduce evening insulin','Dawn phenomenon — related to an early-morning hormone surge','Insulin overdose overnight','Hypoglycemia unawareness'],correct:1,rat:'A normal or high 2–3 a.m. glucose rules out rebound. Dawn phenomenon results from an early-morning surge of growth hormone and cortisol, so the evening insulin is typically increased or its timing adjusted — the opposite of the Somogyi fix.'}
],'Diabetes Check');
</script>

<script>
document.getElementById('sec-skin').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🔬</span> Skin — High Yield</h2>
<p class="intro-line">He flagged skin as heavy — the three skin cancers, pressure-injury staging, and wound drainage. Staging depends on what you can see.</p>
<div class="card"><h3>🎗️ The three skin cancers & ABCDE</h3>
  <table class="lab">
    <tr><th>Type</th><th>Looks like</th><th>Behavior</th></tr>
    <tr><td>Basal cell (most common)</td><td>Pearly/waxy, sun-exposed</td><td>Rarely metastasizes</td></tr>
    <tr><td>Squamous cell</td><td>Scaly, crusted, ulcerated</td><td>Can metastasize</td></tr>
    <tr><td>Melanoma (most deadly)</td><td>Irregular, multicolored mole</td><td>Metastasizes early</td></tr>
  </table>
  <div class="mnem"><div class="tag">Melanoma ABCDE</div><div class="big">Asymmetry · Border irregular · Color varied · Diameter >6mm · Evolving</div></div>
  <div class="hy">⭐ Biggest modifiable risk = UV/sun. Ragged edge on the stem = <b>B (Border)</b>.</div></div>
<div class="card" style="border-color:var(--amber)"><h3>📊 Pressure injury staging</h3>
  <table class="lab">
    <tr><th>Stage</th><th>Defining feature</th></tr>
    <tr><td>Stage 1</td><td><b>Intact skin</b>, non-blanchable redness</td></tr>
    <tr><td>Stage 2</td><td>Partial-thickness — shallow ulcer/blister</td></tr>
    <tr><td>Stage 3</td><td>Full-thickness — subcutaneous <b>fat visible</b></td></tr>
    <tr><td>Stage 4</td><td>Full-thickness — <b>bone/tendon/muscle exposed</b></td></tr>
    <tr><td>Unstageable</td><td>Base covered by slough/eschar — depth hidden</td></tr>
    <tr><td>Deep tissue injury</td><td>Purple/maroon, skin may be intact</td></tr>
  </table>
  <div class="hy">⭐ Intact skin + non-blanchable = Stage 1 · bone/muscle visible = Stage 4 · eschar-covered = unstageable. Prevention: reposition q2h (strongest evidence); don't massage prominences; Braden lower = higher risk.</div></div>
<div class="card"><h3>💧 Wound drainage</h3>
  <table class="lab">
    <tr><th>Drainage</th><th>Appearance</th><th>Meaning</th></tr>
    <tr><td>Serous</td><td>Clear, watery</td><td>Normal early healing</td></tr>
    <tr><td>Sanguineous</td><td>Bright red</td><td>Fresh/active bleeding</td></tr>
    <tr><td>Serosanguineous</td><td>Pink, watery</td><td>Expected post-op</td></tr>
    <tr><td><b>Purulent</b></td><td>Thick yellow/green</td><td><b>Infection</b></td></tr>
  </table></div>
<div class="card" style="border-color:var(--purple)"><h3>📋 Braden Scale — all 6 subscales</h3>
  <table class="lab">
    <tr><th>Subscale</th><th>What it rates</th></tr>
    <tr><td>Sensory perception</td><td>Ability to feel and respond to pressure/discomfort</td></tr>
    <tr><td>Moisture</td><td>How wet the skin stays (incontinence, drainage, sweat)</td></tr>
    <tr><td>Activity</td><td>Level of physical activity (bedfast → walks frequently)</td></tr>
    <tr><td>Mobility</td><td>Ability to change and control body position</td></tr>
    <tr><td>Nutrition</td><td>Usual food/protein intake</td></tr>
    <tr><td>Friction &amp; shear</td><td>Sliding/dragging against surfaces during moves</td></tr>
  </table>
  <p style="margin:8px 0 0">Each is scored <b>1–4</b> except friction/shear (<b>1–3</b>) → total <b>6–23</b>. <b>Lower total = HIGHER risk</b> (≤9 very high · 10–12 high · 13–14 moderate · 15–18 mild · 19–23 minimal).</p>
  <p class="hy" style="margin:8px 0 0">⭐ Reversed scale — low score, high risk. It predicts risk (prevention), not the depth of an existing wound.</p></div>
<div class="card"><h3>🩹 Wound healing — phases &amp; closure</h3>
  <table class="lab">
    <tr><th>Phase</th><th>What happens</th></tr>
    <tr><td>1. <b>Hemostasis</b></td><td>Immediate — vasoconstriction, platelets, clot forms</td></tr>
    <tr><td>2. <b>Inflammatory</b></td><td>~1–4 days — redness, warmth, swelling, WBCs clean the wound (expected, not infection)</td></tr>
    <tr><td>3. <b>Proliferative</b></td><td>~4–21 days — <b>granulation tissue</b> (red, moist), new vessels, epithelialization</td></tr>
    <tr><td>4. <b>Maturation/remodeling</b></td><td>21 days → up to 1–2 years — collagen remodels, scar strengthens/fades</td></tr>
  </table>
  <table class="lab" style="margin-top:10px">
    <tr><th>Closure</th><th>Description</th></tr>
    <tr><td><b>Primary intention</b></td><td>Clean edges approximated (sutures/staples) — minimal scar, fastest</td></tr>
    <tr><td><b>Secondary intention</b></td><td>Left open to granulate in from the base (pressure injuries, infected wounds) — more scarring</td></tr>
    <tr><td><b>Tertiary (delayed primary)</b></td><td>Left open first (contamination/edema), closed later</td></tr>
  </table></div>
<div class="card"><h3>🧹 Debridement — removing nonviable tissue</h3>
  <table class="lab">
    <tr><th>Type</th><th>How it works</th></tr>
    <tr><td><b>Sharp/surgical</b></td><td>Scalpel/scissors — fastest, for extensive necrosis or infection</td></tr>
    <tr><td><b>Mechanical</b></td><td>Wet-to-dry dressings, irrigation — nonselective, can harm healthy tissue</td></tr>
    <tr><td><b>Enzymatic/chemical</b></td><td>Topical enzyme ointment dissolves dead tissue — selective, slower</td></tr>
    <tr><td><b>Autolytic</b></td><td>Body's own enzymes under a moisture-retentive dressing — most selective, slowest, least painful</td></tr>
  </table>
  <p class="hy" style="margin:8px 0 0">⭐ Never debride <b>stable, dry, intact eschar on a heel</b> — it acts as a natural barrier. Healthy red granulation tissue is protected, not removed.</p></div>
<div id="quiz-skin"></div>`;
renderQuiz('quiz-skin',[
  {q:'A nurse assesses a reddened area over a bedbound client\'s sacrum. The skin is intact and the redness does not blanch (turn white) with fingertip pressure. How should the nurse stage this?',type:'single',opts:['Stage 2','Stage 3','Stage 1','Deep tissue injury'],correct:2,rat:'The trap: non-blanchable redness sounds severe, but the defining line is whether the skin is open. Intact skin with non-blanchable erythema is Stage 1; staging only advances once the skin breaks. Deep tissue injury is purple/maroon, not simply red.'},
  {q:'A wound\'s base is fully covered with thick, dry black eschar so the depth cannot be visualized. How is this documented?',type:'single',opts:['Stage 3, because eschar means fat is exposed','Stage 4, because eschar is the deepest injury','Unstageable, because the depth cannot be determined until debrided','Deep tissue injury, because eschar is discolored'],correct:2,rat:'The trap: options A and B guess a depth from eschar alone, and D confuses eschar with the intact discoloration of a deep tissue injury. When slough/eschar hides the base, the depth is unknown — unstageable until debrided.'},
  {q:'Which nursing intervention has the STRONGEST evidence for preventing pressure injuries in an immobile client?',type:'single',opts:['Massaging bony prominences at each turn','Repositioning at least every 2 hours','Keeping the head of the bed at 60–90° most of the day','Applying lotion to reddened areas'],correct:1,rat:'The trap: massage and lotion feel like skin care but massage damages fragile capillaries, and a high HOB increases sacral shear. Relieving sustained pressure — scheduled repositioning — targets the actual cause and has the strongest evidence.'},
  {q:'A nurse observes thick, yellow-green drainage with an odor from a surgical wound. This finding indicates:',type:'single',opts:['Normal healing','Expected serosanguineous drainage','Infection (purulent drainage)','Fresh bleeding'],correct:2,rat:'The trap: it\'s easy to confuse drainage types. Purulent drainage — thick, yellow/green, often odorous — signals infection, unlike clear serous, pink serosanguineous, or red sanguineous drainage.'},
  {q:'A client has a pearly, waxy nodule with a rolled border on the sun-exposed area of the ear. Which type of skin cancer is most likely?',type:'single',opts:['Basal cell carcinoma','Squamous cell carcinoma','Melanoma','Actinic keratosis'],correct:0,rat:'The trap: any sun-exposed lesion could seem like melanoma, but the pearly/waxy nodule with a rolled border is classic basal cell carcinoma — the most common and least aggressive, rarely metastasizing.'},
  {q:'When teaching skin self-examination, the nurse explains that which mole feature corresponds to the "B" in ABCDE?',type:'single',opts:['One half looks different from the other','Irregular, ragged, or notched edges','Multiple colors within the lesion','A size larger than a pencil eraser'],correct:1,rat:'The trap: each option maps to a different letter. Irregular, ragged edges = Border (B). Differing halves = Asymmetry, multiple colors = Color, and large size = Diameter.'},
  {q:'Which clients are at INCREASED risk for pressure injury development? (Select all that apply)',type:'multi',opts:['A client with urinary and fecal incontinence','An immobile client on prolonged bed rest','A well-nourished client who repositions independently','A client with impaired sensation from neuropathy','A client with poor nutrition and low albumin'],correct:[0,1,3,4],rat:'The trap: the independent, well-nourished client is protected, not at risk. Moisture from incontinence, immobility, impaired sensation, and poor nutrition all raise pressure-injury risk.'},
  {q:'A nurse finds a reddened, intact area over a client\'s heel. What is the appropriate action?',type:'single',opts:['Massage the area firmly to improve circulation','Reposition to relieve pressure and continue to monitor; do not massage','Apply a warm compress to the area','Document it but take no further action since the skin is intact'],correct:1,rat:'The trap: massage and heat seem therapeutic but can further damage already-compromised tissue, and doing nothing ignores an early warning. Relieving pressure without traumatizing the tissue addresses the cause of a Stage 1 injury.'},
  {q:'A client\'s pressure injury shows full-thickness tissue loss with visible subcutaneous fat but no exposed bone, tendon, or muscle. This is which stage?',type:'single',opts:['Stage 2','Stage 3','Stage 4','Unstageable'],correct:1,rat:'The trap: full-thickness makes students jump to Stage 4. Visible fat WITHOUT exposed bone/tendon/muscle is Stage 3; Stage 4 requires those deeper structures to be exposed.'},
  {q:'A Braden Scale score is used to assess pressure injury risk. Which statement about the score is correct?',type:'single',opts:['A higher score means higher risk','A lower score means higher risk','The score measures wound depth','The score only applies after an injury forms'],correct:1,rat:'The trap: intuitively "higher = worse," but the Braden Scale is reversed — a LOWER score means HIGHER risk. It predicts risk (prevention), not depth of an existing wound.'},
  {q:'Which statement by a client indicates a need for further teaching about skin cancer prevention?',type:'single',opts:['"I\'ll wear sunscreen and reapply it when outdoors."','"A tan from a tanning bed is a safe way to get color."','"I\'ll check my moles for changes in size or color."','"I\'ll wear a hat and protective clothing in the sun."'],correct:1,rat:'"Needs further teaching" = find the wrong statement. Tanning beds emit UV radiation and increase skin cancer risk — they are not safe. Sunscreen, self-checks, and protective clothing are all correct.'},
  {q:'A nurse is caring for a client with a Stage 3 pressure injury with red, moist granulation tissue in the wound bed. Which is the appropriate goal?',type:'single',opts:['Debride the healthy red tissue','Protect the granulation tissue and maintain a moist wound environment','Let the wound dry out completely','Massage the wound bed to stimulate growth'],correct:1,rat:'The trap: debriding or drying out healthy granulation tissue harms healing, and massaging a wound bed is inappropriate. Red granulation tissue is healthy — protect it and keep the bed appropriately moist to support healing.'},
  {q:'A client reports a mole that has changed: it is now asymmetric, has irregular borders, contains several colors, and has grown. What is the nurse\'s BEST action?',type:'single',opts:['Reassure the client that moles normally change','Advise the client to have it evaluated by a provider promptly','Tell the client to apply an over-the-counter cream','Recommend the client cover it and monitor for a year'],correct:1,rat:'The trap: reassurance, creams, or a year of watching delay diagnosis of a possible melanoma. Multiple ABCDE changes warrant prompt provider evaluation — early detection is critical because melanoma metastasizes early.'},
  {q:'Which findings would the nurse expect with an infected surgical wound? (Select all that apply)',type:'multi',opts:['Purulent drainage','Increasing erythema and warmth around the incision','Fever','Decreasing pain and clean, approximated edges','Foul odor'],correct:[0,1,2,4],rat:'The trap: decreasing pain with clean, approximated edges describes NORMAL healing, not infection. Purulent drainage, spreading redness/warmth, fever, and odor are the signs of wound infection.'},
  {q:'A nurse is prioritizing skin care for four clients. Which requires attention FIRST?',type:'single',opts:['A client with intact skin and a Stage 1 area needing repositioning','A client whose wound has new purulent drainage and a fever','A client with a healing surgical incision and pink drainage','A client requesting lotion for dry skin'],correct:1,rat:'The trap: three situations are routine or expected. New purulent drainage with fever signals an active wound infection — a systemic concern — making that client the priority over prevention, normal healing, and comfort measures.'},
  {q:'Which are subscales of the Braden Scale? (Select all that apply)',type:'multi',opts:['Sensory perception','Moisture','Mobility','Friction and shear','Wound depth'],correct:[0,1,2,3],rat:'The trap: wound depth is NOT a Braden subscale — Braden predicts RISK before a wound forms. The six subscales are sensory perception, moisture, activity, mobility, nutrition, and friction/shear.'},
  {q:'A client\'s Braden Scale total is 11. How should the nurse interpret this?',type:'single',opts:['Minimal risk — routine care is sufficient','High risk for pressure injury — implement aggressive prevention','The wound is Stage 3','No risk because the skin is intact'],correct:1,rat:'The Braden total ranges 6–23 and is reversed: LOWER = higher risk. A score of 11 falls in the high-risk range, so aggressive prevention (q2h repositioning, moisture control, nutrition, support surfaces) is indicated.'},
  {q:'A post-op wound is red, warm, and slightly swollen on day 2 with no purulent drainage or fever. The nurse recognizes this as:',type:'single',opts:['An infection requiring antibiotics','The expected inflammatory phase of healing','The maturation phase','Evidence of dehiscence'],correct:1,rat:'The trap: redness, warmth, and swelling look like infection but are the normal inflammatory phase (about days 1–4). Infection would add purulent drainage, fever, and increasing pain.'},
  {q:'Place the phases of wound healing in order. Which sequence is correct?',type:'single',opts:['Inflammatory → hemostasis → proliferative → maturation','Hemostasis → inflammatory → proliferative → maturation','Proliferative → hemostasis → inflammatory → maturation','Hemostasis → proliferative → inflammatory → maturation'],correct:1,rat:'Healing runs hemostasis (clot) → inflammatory (cleanup, days 1–4) → proliferative (granulation, days 4–21) → maturation/remodeling (21 days up to 1–2 years).'},
  {q:'A deep pressure injury is left open to heal by granulating in from the base. This is healing by:',type:'single',opts:['Primary intention','Secondary intention','Tertiary intention','Autolytic intention'],correct:1,rat:'The trap: primary intention is a clean, sutured wound with edges approximated. A wound left open to fill in with granulation tissue heals by secondary intention, with more scarring and a longer course.'},
  {q:'Which debridement method uses the body\'s own enzymes under a moisture-retentive dressing?',type:'single',opts:['Sharp/surgical','Mechanical','Enzymatic','Autolytic'],correct:3,rat:'Autolytic debridement lets the body\'s own enzymes soften and liquefy necrotic tissue under an occlusive/moisture-retentive dressing — the most selective and least painful, but the slowest.'},
  {q:'A client has stable, dry, intact eschar on the heel. What is the appropriate nursing action?',type:'single',opts:['Debride it immediately','Leave it intact and protect it, monitoring for signs of infection','Apply a wet-to-dry dressing to soften it','Massage the area to increase circulation'],correct:1,rat:'The trap: eschar usually needs removal, BUT stable, dry, intact heel eschar acts as a natural biological cover and should be left in place and protected. Debride only if it becomes unstable, boggy, draining, or infected.'}
],'Skin Check');
</script>

<script>
document.getElementById('sec-cancer').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🎗️</span> Cancer & End-of-Life</h2>
<p class="intro-line">General oncology concepts that are fair game (deep chemo pharmacology was Unit 4), plus the goals-of-care distinctions he stressed.</p>
<div class="card"><h3>🔬 Basics & warning signs</h3>
  <table class="lab">
    <tr><th>Type</th><th>Arises from</th></tr>
    <tr><td>Carcinoma (most common)</td><td>Epithelial — skin, breast, lung, colon</td></tr>
    <tr><td>Sarcoma</td><td>Connective — bone, muscle, cartilage, fat</td></tr>
    <tr><td>Leukemia</td><td>Blood-forming marrow</td></tr>
    <tr><td>Lymphoma</td><td>Lymphatic tissue</td></tr>
  </table>
  <p style="margin:6px 0 0"><b>Malignant</b> = invades & metastasizes; <b>benign</b> = stays local. <b>CAUTION</b>: Change in bowel/bladder · A sore that won't heal · Unusual bleeding · Thickening/lump · Indigestion/dysphagia · Obvious mole change · Nagging cough.</p></div>
<div class="card"><h3>📊 Staging &amp; grading — how bad, how far</h3>
  <ul class="clean">
    <li><b>TNM staging</b> — <b>T</b>umor size/extent · <b>N</b>odes involved · <b>M</b>etastasis. Higher numbers = more advanced.</li>
    <li><b>Grade</b> — how abnormal the cells look under the microscope (differentiation). <b>Higher grade = less differentiated = more aggressive.</b></li>
    <li><b>Stage 0</b> = in situ (local) → <b>Stage IV</b> = distant metastasis.</li>
    <li>Staging guides treatment and prognosis; grading describes the cells themselves.</li>
  </ul></div>
<div class="card" style="border-color:var(--purple)"><h3>🧪 How cancer is tested for (high-yield)</h3>
  <p style="margin:0 0 8px"><b>Biopsy is the ONLY definitive way to diagnose cancer</b> — it confirms malignancy and the exact cell type. Everything else screens, locates, or monitors.</p>
  <table class="lab">
    <tr><th>Method</th><th>What it does</th></tr>
    <tr><td><b>Biopsy</b> (FNA, core, incisional, excisional)</td><td><b>Definitive diagnosis</b> — samples tissue for the pathologist. Bone marrow biopsy → leukemia/lymphoma</td></tr>
    <tr><td><b>CT</b></td><td>Cross-sectional imaging — size, location, staging</td></tr>
    <tr><td><b>MRI</b></td><td>Soft tissue detail — brain, spine, cord compression</td></tr>
    <tr><td><b>PET scan</b></td><td>Metabolic activity — finds active/metastatic disease body-wide</td></tr>
    <tr><td><b>Bone scan</b></td><td>Detects bone metastasis</td></tr>
    <tr><td><b>Ultrasound</b></td><td>Solid vs. fluid-filled (cystic) masses</td></tr>
    <tr><td><b>Endoscopy</b> (colonoscopy, bronchoscopy, cystoscopy)</td><td>Directly visualize AND biopsy internal tissue</td></tr>
  </table></div>
<div class="card"><h3>🩸 Tumor markers &amp; screening tests</h3>
  <table class="lab">
    <tr><th>Marker</th><th>Points toward</th></tr>
    <tr><td><b>PSA</b></td><td>Prostate cancer</td></tr>
    <tr><td><b>CA-125</b></td><td>Ovarian cancer</td></tr>
    <tr><td><b>CEA</b></td><td>Colorectal (also GI) — monitors recurrence</td></tr>
    <tr><td><b>AFP</b></td><td>Liver (hepatocellular) &amp; testicular</td></tr>
    <tr><td><b>CA 19-9</b></td><td>Pancreatic cancer</td></tr>
    <tr><td><b>CA 15-3 / 27-29</b></td><td>Breast cancer</td></tr>
  </table>
  <p style="margin:8px 0 0"><b>Screening by cancer:</b> Breast → <b>mammogram</b> · Cervical → <b>Pap smear + HPV</b> · Colorectal → <b>colonoscopy</b> (gold standard) or stool FOBT/FIT · Prostate → <b>PSA + DRE</b> · Skin → visual exam + <b>ABCDE</b> · Lung → <b>low-dose CT</b> for high-risk smokers.</p>
  <p class="hy" style="margin:8px 0 0">⭐ Tumor markers are used to <b>monitor</b> treatment/recurrence and support diagnosis — they do NOT diagnose cancer alone. Only <b>biopsy</b> confirms it.</p></div>
<div class="card" style="border-color:var(--red)"><h3>💉 Chemo effects & neutropenia</h3>
  <p>Chemo hits rapidly dividing cells: <b>bone marrow</b> (neutropenia/infection, thrombocytopenia/bleeding, anemia/fatigue), <b>GI mucosa</b> (nausea, stomatitis), <b>hair</b> (alopecia).</p>
  <div class="hy">⭐ <b>Fever in a neutropenic client = emergency</b> — infection signs are blunted. Neutropenic precautions: strict hand hygiene, private room, no fresh flowers or raw produce. Thrombocytopenia → bleeding precautions (soft toothbrush, electric razor).</div></div>
<div class="card"><h3>☢️ Radiation therapy — skin care</h3>
  <ul class="clean">
    <li><b>Do NOT wash off the markings</b> (they guide the beam).</li>
    <li>Wash gently with lukewarm water and mild soap; <b>pat dry</b>.</li>
    <li><b>No lotions, powders, or deodorant</b> in the field unless approved; nothing with metal.</li>
    <li>Protect the area from sun and extreme temperatures (no heating pads/ice).</li>
    <li>Expect fatigue and localized skin changes; <b>internal radiation (brachytherapy)</b> → the client emits radiation, so apply time–distance–shielding precautions.</li>
  </ul></div>
<div class="card" style="border-color:var(--red)"><h3>🚨 Oncologic emergencies</h3>
  <table class="lab">
    <tr><th>Emergency</th><th>Recognize it</th></tr>
    <tr><td><b>Febrile neutropenia</b></td><td>Fever + ANC &lt;500 → sepsis risk; cultures + antibiotics NOW</td></tr>
    <tr><td><b>Tumor lysis syndrome</b></td><td>After chemo, cells burst → <b>↑K⁺, ↑phosphate, ↑uric acid, ↓calcium</b> → hydrate, monitor cardiac/renal</td></tr>
    <tr><td><b>Spinal cord compression</b></td><td>New/worsening back pain + leg weakness/numbness → emergency imaging</td></tr>
    <tr><td><b>SVC syndrome</b></td><td>Face/arm/neck swelling, distended neck veins (lung ca, lymphoma)</td></tr>
    <tr><td><b>Hypercalcemia</b></td><td>Bone mets → weakness, confusion, arrhythmia → hydrate</td></tr>
    <tr><td><b>SIADH</b></td><td>Small-cell lung cancer → water retention → <b>low sodium</b>, seizures</td></tr>
  </table></div>
<div class="card"><h3>🕊️ Palliative vs hospice</h3>
  <p style="margin:0"><b>Palliative:</b> comfort at any stage, can run alongside curative treatment. <b>Hospice:</b> comfort when cure is no longer the goal, limited life expectancy. Focus = comfort + patient's goals + cultural respect.</p></div>
<div id="quiz-cancer"></div>`;
renderQuiz('quiz-cancer',[
  {q:'A client receiving chemotherapy is at nadir with an absolute neutrophil count of 400 and now has a temperature of 38.5°C (101.3°F). What is the nurse\'s priority interpretation?',type:'single',opts:['This is an expected chemo side effect requiring no action','This is a medical emergency requiring immediate evaluation and cultures','The fever means the cancer is responding','An antipyretic alone is sufficient'],correct:1,rat:'The trap: minimizing a fever as "expected" or treating it with only an antipyretic can be fatal. In severe neutropenia (ANC <500) the usual signs of infection are blunted, so a fever may be the only clue to sepsis — it is an emergency needing prompt cultures and antibiotics.'},
  {q:'Which precautions are appropriate for a neutropenic client? (Select all that apply)',type:'multi',opts:['Strict hand hygiene for all who enter','Placing fresh flowers to brighten the room','Avoiding raw fruits and vegetables','Assigning a private room','Restricting visitors who are ill'],correct:[0,2,3,4],rat:'The trap: fresh flowers (and standing water) harbor organisms and are avoided for neutropenic clients. Hand hygiene, a low-microbial diet, a private room, and screening out sick visitors all protect the immunocompromised client.'},
  {q:'A nurse explains the difference between benign and malignant tumors. Which statement is accurate?',type:'single',opts:['Benign tumors invade and metastasize','Malignant tumors invade surrounding tissue and metastasize','Benign tumors are always fatal','Malignant tumors are encapsulated and stay local'],correct:1,rat:'The trap: the descriptors are swapped in the distractors. Malignant = invades and metastasizes (dangerous); benign = well-defined, local, and usually not life-threatening.'},
  {q:'A cancer arising from connective tissue such as bone or muscle is classified as a:',type:'single',opts:['Carcinoma','Leukemia','Sarcoma','Lymphoma'],correct:2,rat:'The trap: carcinoma is the most common type so it\'s the reflex answer, but it arises from epithelial tissue. Connective tissue (bone, muscle, cartilage, fat) gives rise to sarcomas.'},
  {q:'A client on chemotherapy has a platelet count of 18,000/mm³. Which nursing action is appropriate?',type:'single',opts:['Encourage vigorous tooth brushing to prevent gum disease','Institute bleeding precautions: soft toothbrush, electric razor, avoid invasive procedures','Administer an intramuscular injection as ordered','Encourage contact sports for exercise'],correct:1,rat:'The trap: vigorous brushing, IM injections, and contact sports all risk bleeding at a dangerously low platelet count. Thrombocytopenia calls for bleeding precautions — soft toothbrush, electric razor, and avoiding punctures and trauma.'},
  {q:'A client asks about the difference between palliative care and hospice. Which nurse response is accurate?',type:'single',opts:['"They are the same thing."','"Palliative care manages symptoms and can be given with curative treatment; hospice is comfort care when cure is no longer the goal."','"Hospice includes aggressive curative treatment."','"Palliative care is only for the final days of life."'],correct:1,rat:'The trap: the distractors either equate the two or reverse them. Palliative care provides comfort at any stage alongside curative treatment; hospice focuses on comfort when curative treatment has stopped and life expectancy is limited.'},
  {q:'Which of the following are warning signs of cancer (CAUTION) the nurse should teach clients to report? (Select all that apply)',type:'multi',opts:['A change in bowel or bladder habits','A sore that does not heal','Unusual bleeding or discharge','A bruise that fades in a week','A nagging cough or hoarseness'],correct:[0,1,2,4],rat:'The trap: a normal bruise that resolves is expected, not a warning sign. The CAUTION signs include bowel/bladder changes, a non-healing sore, unusual bleeding, and a persistent cough/hoarseness.'},
  {q:'A hospice client near the end of life is grimacing and restless. The nurse\'s priority goal is to:',type:'single',opts:['Restore the client to full function','Provide comfort and manage symptoms according to the client\'s wishes','Begin aggressive curative treatment','Restrict pain medication to avoid dependence'],correct:1,rat:'The trap: curative goals and withholding pain medication over "dependence" fears contradict hospice philosophy. At end of life the focus is comfort and dignity, guided by the client\'s wishes — pain and distress are treated, not rationed.'},
  {q:'A client receiving chemotherapy develops mouth sores (stomatitis). Which teaching is appropriate?',type:'single',opts:['Use a firm toothbrush and alcohol-based mouthwash','Rinse with a bland saline or prescribed solution and use a soft toothbrush','Eat hot, spicy foods to stimulate healing','Avoid all oral care until the sores heal'],correct:1,rat:'The trap: firm brushes, alcohol rinses, spicy foods, and skipping oral care all worsen or invite infection in fragile mucosa. Gentle saline rinses and a soft toothbrush soothe and protect the inflamed tissue.'},
  {q:'Which client should the oncology nurse assess FIRST?',type:'single',opts:['A client with alopecia asking about wigs','A neutropenic client with a new fever of 38.6°C','A client with mild nausea after chemo','A client with fatigue requesting a nap'],correct:1,rat:'The trap: three concerns are real but not urgent. A new fever in a neutropenic client is a potential sepsis emergency and takes clear priority over hair loss, mild nausea, and fatigue.'},
  {q:'A client\'s chemotherapy is expected to cause bone marrow suppression. Which lab results reflect the expected effects? (Select all that apply)',type:'multi',opts:['Decreased white blood cells','Decreased platelets','Decreased red blood cells','Increased white blood cells','Increased platelets'],correct:[0,1,2],rat:'The trap: the "increased" options contradict marrow suppression. Chemo suppresses the marrow, lowering all three lines — WBCs (infection risk), platelets (bleeding risk), and RBCs (anemia/fatigue).'},
  {q:'A client with terminal cancer states, "I don\'t want any more chemo — I just want to be comfortable at home." The nurse\'s BEST response is to:',type:'single',opts:['Tell the client they should keep fighting','Respect the client\'s wishes and discuss palliative/hospice options and comfort care','Insist the family override the decision','Report the client as noncompliant'],correct:1,rat:'The trap: pressuring the client, overriding autonomy, or labeling them noncompliant all violate the client\'s right to choose. The nurse supports the client\'s informed decision and explores comfort-focused care that matches their goals.'},
  {q:'The nurse is teaching a client about reducing cancer risk. Which statement indicates a need for further teaching?',type:'single',opts:['"I\'ll get recommended cancer screenings on schedule."','"I\'ll limit sun exposure and avoid tanning beds."','"Smoking only causes lung cancer, so my occasional cigar is fine."','"I\'ll eat more fruits and vegetables and limit processed meats."'],correct:2,rat:'"Needs further teaching" = find the wrong statement. Tobacco use is linked to many cancers (oral, throat, esophageal, bladder, and more), not just lung — the belief that occasional cigars are safe needs correction.'},
  {q:'A neutropenic client\'s family brings in a fruit basket and fresh flowers. What is the nurse\'s BEST action?',type:'single',opts:['Allow both since they lift the client\'s spirits','Explain that fresh flowers and raw/unwashed produce can carry organisms and should be avoided','Only remove the flowers','Allow the flowers but not the fruit'],correct:1,rat:'The trap: partial answers miss that BOTH pose a risk. Fresh flowers/standing water and raw or unwashed produce can harbor pathogens dangerous to a neutropenic client — the nurse explains why both are restricted.'},
  {q:'A client with bone metastasis has a serum calcium of 12.5 mg/dL. The nurse recognizes this as:',type:'single',opts:['Expected and requiring no action','Hypercalcemia from bone breakdown, requiring intervention','Hypocalcemia needing calcium replacement','A normal calcium level'],correct:1,rat:'The trap: it\'s not normal or low. Cancer that destroys bone releases calcium into the blood → hypercalcemia (weakness, confusion, arrhythmias), which requires intervention such as hydration and monitoring.'},
  {q:'Which test provides the DEFINITIVE diagnosis of cancer?',type:'single',opts:['CT scan','Elevated tumor marker','Biopsy','PET scan'],correct:2,rat:'The trap: imaging and tumor markers suggest, locate, or monitor cancer but cannot confirm it. Only a biopsy — sampling the tissue for the pathologist — definitively diagnoses cancer and identifies the cell type.'},
  {q:'A provider wants to determine whether a client\'s cancer has spread throughout the body. Which imaging study is most useful for detecting metastatic activity body-wide?',type:'single',opts:['Plain X-ray','PET scan','Ultrasound','Pap smear'],correct:1,rat:'A PET scan highlights metabolically active tissue, making it especially useful for finding active or metastatic disease throughout the body. X-ray and ultrasound are limited/localized; a Pap smear screens for cervical cancer.'},
  {q:'A nurse reviews tumor markers. Which marker is associated with prostate cancer?',type:'single',opts:['CA-125','CEA','PSA','AFP'],correct:2,rat:'PSA (prostate-specific antigen) is linked to prostate cancer. CA-125 → ovarian, CEA → colorectal, AFP → liver/testicular. Markers are used to support diagnosis and monitor treatment/recurrence, not to diagnose alone.'},
  {q:'Match the screening test to the cancer it screens for. A Pap smear is used to screen for:',type:'single',opts:['Breast cancer','Cervical cancer','Colorectal cancer','Prostate cancer'],correct:1,rat:'The Pap smear (with HPV testing) screens for cervical cancer. Breast → mammogram, colorectal → colonoscopy/stool tests, prostate → PSA + DRE.'},
  {q:'A client asks why the radiation therapist drew markings on their skin. The nurse explains that the client should:',type:'single',opts:['Wash the markings off daily with soap and a washcloth','Leave the markings in place because they guide the radiation beam','Cover them with lotion and powder','Scrub them gently to prevent infection'],correct:1,rat:'The trap: washing or scrubbing removes the alignment markings that direct the beam to the exact treatment site. Leave them intact, wash gently, pat dry, and avoid lotions/powders in the field.'},
  {q:'Which skin-care instruction is correct for a client receiving external radiation therapy? (Select all that apply)',type:'multi',opts:['Wash gently with lukewarm water and mild soap','Do not remove the treatment field markings','Apply a heating pad to the site for comfort','Avoid lotions, powders, and deodorant in the field unless approved','Protect the area from direct sun'],correct:[0,1,3,4],rat:'The trap: heat sources (heating pads, hot water) damage the already-fragile irradiated skin. Gentle washing, keeping markings, avoiding products in the field, and sun protection are all correct.'},
  {q:'Several days after starting chemotherapy for a large tumor, a client develops high potassium, high phosphate, high uric acid, and low calcium. The nurse suspects:',type:'single',opts:['Tumor lysis syndrome','SVC syndrome','SIADH','Neutropenia'],correct:0,rat:'When large numbers of cancer cells break down after chemo, their contents flood the blood → tumor lysis syndrome (↑K⁺, ↑phosphate, ↑uric acid, ↓calcium). Hydration and monitoring of cardiac and renal status are priorities.'},
  {q:'A client with cancer reports new, worsening back pain with leg weakness and numbness. The nurse recognizes this as a possible:',type:'single',opts:['Expected effect of bed rest','Spinal cord compression — an oncologic emergency','Normal chemo side effect','Sign the tumor is shrinking'],correct:1,rat:'New or worsening back pain with neurologic changes (weakness, numbness, bowel/bladder changes) can signal spinal cord compression from metastasis — an emergency needing urgent imaging and treatment to prevent permanent paralysis.'},
  {q:'A client with small-cell lung cancer develops a low serum sodium, confusion, and water retention. This paraneoplastic syndrome is:',type:'single',opts:['Tumor lysis syndrome','SIADH','Hypercalcemia','SVC syndrome'],correct:1,rat:'Small-cell lung cancer classically causes SIADH — excess ADH causes water retention and dilutional hyponatremia, leading to confusion and, if severe, seizures.'},
  {q:'How does grading differ from staging of a tumor?',type:'single',opts:['Grading describes spread; staging describes cell appearance','Grading describes how abnormal the cells look; staging describes tumor size, nodes, and metastasis (TNM)','They are the same thing','Staging is only used for benign tumors'],correct:1,rat:'The trap: the two are swapped in the distractors. Grade = how differentiated/abnormal the cells appear (higher grade = more aggressive); stage (TNM) = how large and how far the cancer has spread.'},
  {q:'A client is scheduled for a colonoscopy. Besides screening for colorectal cancer, what added advantage does endoscopy offer over imaging like CT?',type:'single',opts:['It exposes the client to more radiation','It allows direct visualization AND tissue biopsy','It measures tumor markers','It replaces the need for any pathology'],correct:1,rat:'Endoscopic procedures (colonoscopy, bronchoscopy, cystoscopy) let the provider directly see the tissue and take a biopsy in the same procedure — combining visualization with the definitive diagnostic step.'},
