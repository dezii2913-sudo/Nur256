  {q:'Which statements about tumor markers are accurate? (Select all that apply)',type:'multi',opts:['They can support a diagnosis and monitor response to treatment','An elevated marker alone confirms cancer','They can signal recurrence when they rise after treatment','CA-125 is associated with ovarian cancer','Only a biopsy definitively confirms malignancy'],correct:[0,2,3,4],rat:'The trap: an elevated tumor marker alone does NOT confirm cancer — benign conditions can raise them. Markers support diagnosis, track treatment, and flag recurrence; biopsy remains the definitive confirmation.'}
],'Cancer & EOL Check');

<script>
document.getElementById('sec-sensory').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">👁️</span> Sensory — Eyes &amp; Ears (EENT)</h2>
<p class="intro-line">Casteel's favorite move here is the <b>contrast pair</b>: glaucoma vs. macular degeneration, conductive vs. sensorineural, open-angle vs. angle-closure. Learn each pair as an opposite and the distractors fall away.</p>

<div class="card"><h3>👁️ How the eye focuses (the setup for everything)</h3>
  <p style="margin:0 0 8px">The <b>lens</b> does three jobs: filters UV, <b>accommodates</b> (changes shape — rounder for near, flatter for far), and <b>refracts</b> (bends light to focus on the retina). With age the lens stiffens and can't accommodate → <b>presbyopia</b>.</p>
  <table class="lab">
    <tr><th>Refractive error</th><th>Where light focuses</th></tr>
    <tr><td><b>Emmetropia</b></td><td>Normal — ON the retina (20/20)</td></tr>
    <tr><td><b>Myopia</b> (nearsighted)</td><td>IN FRONT of retina — close clear, distance blurry</td></tr>
    <tr><td><b>Hyperopia</b> (farsighted)</td><td>BEHIND the retina — distance clear, close blurry</td></tr>
    <tr><td><b>Astigmatism</b></td><td>Irregular cornea/lens — blurry at ANY distance</td></tr>
    <tr><td><b>Presbyopia</b></td><td>Age-related loss of accommodation (near focus fails)</td></tr>
  </table>
  <p style="margin:8px 0 0"><b>Snellen fraction</b> = [you stand 20 ft] / [distance a normal eye reads that line]. The <b>bottom number</b> changes: 20/40 means you must be at 20 ft to see what a normal eye sees at 40 ft — <b>bigger bottom number = worse vision.</b></p>
  <p style="margin:8px 0 0"><b>Pupils:</b> <b>Direct</b> = light in one eye, THAT eye constricts. <b>Consensual</b> = light in one eye, the OTHER eye also constricts. <b>Miosis</b> = constriction (opioids, pilocarpine, bright light). <b>Mydriasis</b> = dilation (anticholinergics).</p>
</div>

<div class="card" style="border-color:var(--red)"><h3>👓 Glaucoma — pressure kills the optic nerve</h3>
  <p style="margin:0 0 8px">Aqueous humor can't drain → <b>intraocular pressure (IOP) rises</b> → optic-nerve damage → vision lost from the <b>periphery inward (tunnel vision)</b>. Normal IOP = <b>10–21 mmHg</b>.</p>
  <table class="lab">
    <tr><th></th><th>Open-angle (common)</th><th>Angle-closure (emergency)</th></tr>
    <tr><td><b>Onset</b></td><td>Gradual, painless</td><td><b>SUDDEN</b></td></tr>
    <tr><td><b>Signs</b></td><td>Peripheral/tunnel loss, halos; often silent early</td><td>Severe eye pain, headache, halos, N/V, blurred vision, <b>rock-hard eye</b>, fixed pupil</td></tr>
    <tr><td><b>Priority</b></td><td>Lifelong drops to lower IOP</td><td><b>MEDICAL EMERGENCY</b> — treat now to save sight</td></tr>
  </table>
  <p style="margin:8px 0 0">Drops lower IOP (β-blockers like <b>timolol</b>, prostaglandins, miotics). <b>Lost vision is permanent</b> — treatment prevents further loss, so drop <b>adherence is everything</b>.</p>
  <p class="hy" style="margin:8px 0 0">⭐ Glaucoma = <b>peripheral</b> loss first. Macular degeneration = <b>central</b> loss. That contrast is a guaranteed question.</p>
</div>

<div class="grid2">
  <div class="card"><h3>🌫️ Cataracts — cloudy lens</h3>
    <p style="margin:0 0 6px">Lens becomes <b>opaque</b> → light can't pass clearly.</p>
    <ul class="clean">
      <li><b>Causes:</b> aging (#1), trauma, <b>diabetes</b>, long-term steroid/beta-blocker use.</li>
      <li><b>Signs:</b> painless, gradual <b>blurry/hazy</b> vision, glare, <b>halos</b>, trouble at night, faded colors.</li>
      <li><b>Fix:</b> surgical lens removal + intraocular lens implant (the only real fix).</li>
      <li><b>Post-op:</b> avoid bending, lifting, straining, coughing (raises IOP); wear an <b>eye shield</b> (esp. at night); report sudden pain or vision change.</li>
    </ul>
  </div>
  <div class="card"><h3>🎯 Macular degeneration (AMD)</h3>
    <p style="margin:0 0 6px">Degeneration of the <b>macula</b> (central retina) → loss of <b>CENTRAL</b> vision; peripheral is preserved.</p>
    <ul class="clean">
      <li><b>Dry (~90%):</b> gradual thinning + drusen (yellow deposits).</li>
      <li><b>Wet (~10%):</b> fragile vessels leak — faster, more severe.</li>
      <li><b>Hallmark:</b> straight lines look <b>wavy/distorted</b> — monitored with an <b>Amsler grid</b> (report changes).</li>
      <li>Leading cause of vision loss in older adults; <b>opposite pattern</b> of glaucoma.</li>
    </ul>
  </div>
</div>

<div class="card" style="border-color:var(--red)"><h3>💥 Retinal detachment — flashes, floaters, and a curtain</h3>
  <p style="margin:0">The retina tears and peels away from its blood supply. It tugs nerve fibers → <b>sudden flashes of light and floaters</b>; as it lifts, a <b>curtain/shadow moves across the visual field</b>. Detached retina loses its blood supply and <b>dies if not surgically reattached quickly</b> — a true <b>ophthalmic emergency</b>, not "wait and see."</p>
</div>

<div class="card" style="border-color:var(--purple)"><h3>🌀 Ménière's disease — the spinning triad</h3>
  <p style="margin:0 0 6px">Too much <b>endolymph</b> builds up in the inner ear → pressure disrupts balance and hearing. Know the <b>TRIAD</b>:</p>
  <ul class="clean">
    <li><b>Episodic vertigo</b> — severe spinning (worst symptom), minutes to hours, often with N/V.</li>
    <li><b>Tinnitus</b> — ringing/roaring.</li>
    <li><b>Fluctuating sensorineural hearing loss</b> — comes and goes.</li>
    <li>Plus ear <b>fullness/pressure</b>.</li>
  </ul>
  <p style="margin:8px 0 0"><b>Management:</b> <b>low-sodium diet (&lt;2000 mg/day) + diuretics</b> (reduce fluid — the mechanism key); meclizine/antiemetics for attacks; <b>safety</b>: lie still in a quiet dark room, move slowly, fall precautions.</p>
  <p class="hy" style="margin:8px 0 0">⭐ "Ménière's = the spinning Triad (Vertigo + Tinnitus + Hearing loss) — fix it with LOW SALT."</p>
</div>

<div class="card"><h3>👂 Hearing loss — conductive vs. sensorineural</h3>
  <table class="lab">
    <tr><th></th><th>Conductive</th><th>Sensorineural</th></tr>
    <tr><td><b>Problem</b></td><td>Sound can't get IN (outer/middle ear)</td><td>Nerve/cochlea damage (inner ear)</td></tr>
    <tr><td><b>Causes</b></td><td>Earwax, fluid, otitis media, perforated drum</td><td>Aging (presbycusis), noise, ototoxic drugs, Ménière's</td></tr>
    <tr><td><b>Reversible?</b></td><td><b>Often</b> — remove the blockage</td><td><b>Usually permanent</b></td></tr>
  </table>
  <ul class="clean" style="margin-top:8px">
    <li><b>Presbycusis</b> — age-related sensorineural loss; <b>high-frequency sounds go first</b>.</li>
    <li><b>Ototoxic drugs</b> (monitor for tinnitus/hearing change): <b>aminoglycosides, loop diuretics (furosemide), high-dose aspirin, some chemo</b>.</li>
    <li><b>Otitis externa</b> ("swimmer's ear"): canal infection → pain <b>worse when the ear is tugged</b>, discharge, itching.</li>
    <li><b>Communicating:</b> face the person, speak clearly at a normal-to-slightly-slower pace, cut background noise, <b>don't shout</b> (distorts), use gestures/writing. Never insert objects/swabs into the canal.</li>
  </ul>
</div>

<div id="quiz-sensory"></div>`;

renderQuiz('quiz-sensory',[
  {q:'A client arrives with sudden severe eye pain, a headache, nausea, halos around lights, and an eye that feels rock-hard. Which is the priority understanding?',type:'single',opts:['This is chronic open-angle glaucoma; schedule routine drops','This is angle-closure glaucoma — a medical emergency to save sight','This is a cataract; reassure it progresses slowly','This is presbyopia; recommend reading glasses'],correct:1,rat:'The trap: open-angle is gradual and painless. SUDDEN pain, halos, N/V, and a rock-hard eye = acute angle-closure glaucoma, an emergency — rapid IOP lowering is needed to prevent permanent blindness.'},
  {q:'A client reports gradually losing vision "around the edges," like looking through a tunnel, with no pain. This pattern points to:',type:'single',opts:['Macular degeneration','Open-angle glaucoma','Retinal detachment','Cataracts'],correct:1,rat:'The trap: macular degeneration also causes vision loss — but CENTRAL, not peripheral. Painless peripheral/tunnel loss is open-angle glaucoma. Casteel loves this exact contrast.'},
  {q:'A client says straight lines on a grid look wavy and there is a blurry spot in the center of their vision, but side vision is fine. This is classic for:',type:'single',opts:['Glaucoma','Macular degeneration (AMD)','Conductive hearing loss','Angle-closure glaucoma'],correct:1,rat:'Wavy lines on an Amsler grid + central vision loss with preserved peripheral vision = macular degeneration — the exact opposite pattern from glaucoma.'},
  {q:'After cataract surgery, which client statement indicates a need for further teaching?',type:'single',opts:['"I\'ll wear the eye shield at night."','"I\'ll bend over to tie my shoes and lift my groceries as usual."','"I\'ll report sudden eye pain or vision changes."','"I\'ll avoid straining and hard coughing."'],correct:1,rat:'"Needs further teaching" = the WRONG statement. Bending, lifting, and straining raise intraocular pressure and threaten the surgical site — they must be avoided. The others are correct post-op teaching.'},
  {q:'A client suddenly sees flashes of light, then floaters, then describes "a curtain coming down" over part of their vision. The nurse recognizes this as:',type:'single',opts:['A migraine aura; provide a dark room','Retinal detachment; an ophthalmic emergency','Normal aging of the eye','Open-angle glaucoma'],correct:1,rat:'Flashes + floaters + a curtain/shadow across the field = retinal detachment. The retina is losing its blood supply and will die without prompt surgical reattachment — it is an emergency, not "wait and see."'},
  {q:'A client has recurrent attacks of severe spinning vertigo lasting up to an hour, ringing in the ear, and hearing that worsens during attacks, plus ear fullness. Which dietary change is most directly aimed at the mechanism?',type:'single',opts:['High-protein diet','Low-sodium diet (<2000 mg/day)','High-potassium diet','Increased caffeine'],correct:1,rat:'This is Ménière\'s (vertigo + tinnitus + fluctuating sensorineural loss). The problem is excess inner-ear endolymph/pressure, so a low-sodium diet with diuretics reduces the fluid — the mechanism-based key.'},
  {q:'During a Ménière\'s attack, the priority nursing action is to:',type:'single',opts:['Encourage the client to walk to reduce dizziness','Keep the client still in a quiet, dim room with fall precautions','Turn on bright lights to help orientation','Give a high-sodium sports drink'],correct:1,rat:'Vertigo attacks bring a high fall risk. Safety first: minimize movement and stimulation, dim the lights, and prevent falls. Walking or bright light worsens symptoms; sodium worsens the fluid problem.'},
  {q:'Which type of hearing loss is MOST likely to be reversible?',type:'single',opts:['Sensorineural loss from long-term noise exposure','Presbycusis','Conductive loss from impacted cerumen (earwax)','Sensorineural loss from an aminoglycoside'],correct:2,rat:'The trap: sensorineural causes (noise, aging, ototoxic drugs) are usually permanent. Conductive loss from a blockage like earwax can often be reversed by removing the obstruction.'},
  {q:'A client is started on an aminoglycoside antibiotic and also takes furosemide. The nurse monitors specifically for:',type:'single',opts:['New tinnitus or hearing changes','Improved night vision','Increased tear production','Pupil constriction'],correct:0,rat:'Both aminoglycosides and loop diuretics are ototoxic. New tinnitus or hearing changes can signal cochlear/nerve damage — a sensorineural, often permanent, loss.'},
  {q:'A nurse shines a penlight into the client\'s RIGHT eye and the LEFT pupil also constricts. This is called the:',type:'single',opts:['Direct response','Consensual response','Accommodation reflex','Mydriatic response'],correct:1,rat:'Light in one eye causing the OTHER pupil to constrict is the consensual response (the two sides are neurologically linked). The direct response is the same eye constricting.'},
  {q:'A client\'s vision is documented as 20/70. What does this mean?',type:'single',opts:['They see at 70 feet what a normal eye sees at 20 feet','They must be at 20 feet to see what a normal eye sees at 70 feet','Their vision is better than normal','They can only see at night'],correct:1,rat:'Snellen: the client stands 20 ft away; the bottom number is how far a normal eye could read that line. 20/70 means they must be closer (20 ft) to see what a normal eye sees from 70 ft — a larger bottom number means worse vision.'},
  {q:'Which client should the nurse assess FIRST?',type:'single',opts:['A client with gradual, painless peripheral vision loss','A client reporting sudden eye pain, halos, and vomiting','A client with age-related farsightedness','A client with mild ringing in one ear'],correct:1,rat:'Gradual peripheral loss (open-angle), presbyopia, and mild tinnitus are non-urgent. Sudden eye pain + halos + vomiting suggests acute angle-closure glaucoma — an emergency threatening sight.'},
  {q:'Which statements about refractive errors are correct? (Select all that apply)',type:'multi',opts:['Myopia means distant objects are blurry','Hyperopia means close objects are blurry','Presbyopia is age-related loss of accommodation','Astigmatism causes blurred vision at any distance','Emmetropia requires corrective lenses'],correct:[0,1,2,3],rat:'The trap: emmetropia is NORMAL vision (20/20) and needs no correction. The other four are accurate: myopia = distance blurry, hyperopia = near blurry, presbyopia = aging lens can\'t accommodate, astigmatism = blur at all distances.'},
  {q:'A client with glaucoma asks whether the eye drops will restore the vision already lost. The nurse\'s best response is that the drops:',type:'single',opts:['Will gradually bring back lost peripheral vision','Prevent further vision loss but cannot restore what is gone','Cure the glaucoma so drops can be stopped once vision improves','Only treat the pain, not the pressure'],correct:1,rat:'Glaucoma damage to the optic nerve is permanent. Lowering IOP prevents FURTHER loss but does not restore lost vision — which is exactly why lifelong adherence to the drops matters.'},
  {q:'A client has otitis externa. Which finding is most consistent with this diagnosis?',type:'single',opts:['Vertigo with hearing that fluctuates','Ear pain that worsens when the outer ear is pulled','Painless central vision loss','A rock-hard, painful eye'],correct:1,rat:'Otitis externa ("swimmer\'s ear") is a canal infection; pain classically worsens with manipulation/tugging of the ear. Fluctuating vertigo/hearing is Ménière\'s; the eye findings belong to other disorders.'}
],'Sensory (EENT) Check');

<script>

<h2 class="sec-title"><span class="sec-emoji">💊</span> Drug Guide — your Medication ALTs</h2>
<p class="intro-line">Pulled straight from your Week 1–4 ATI Medication templates, grouped by week. Kept simple — the <b>class</b>, what it's <b>for</b>, and the <b>one thing to watch</b> Casteel tests.</p>

<div class="card" style="border-color:var(--blue)"><h3>📕 Week 1 — Respiratory &amp; TB</h3>
  <table class="lab">
    <tr><th>Drug</th><th>Class / use</th><th>Watch for / key point</th></tr>
    <tr><td><b>Rifampin</b></td><td>Antitubercular (TB)</td><td>Hepatotoxicity; <b>red-orange body fluids</b> (harmless)</td></tr>
    <tr><td><b>Isoniazid (INH)</b></td><td>Antitubercular (TB/LTBI)</td><td><b>Peripheral neuropathy → give B6</b>; hepatotoxicity; avoid alcohol</td></tr>
    <tr><td><b>Pyrazinamide</b></td><td>Antitubercular (first 2 mo)</td><td>Hepatotoxicity; <b>hyperuricemia/gout</b>; photosensitivity</td></tr>
    <tr><td><b>Ipratropium</b></td><td>Anticholinergic bronchodilator (COPD)</td><td><b>Maintenance, NOT a rescue inhaler</b>; dry mouth, urinary retention</td></tr>
    <tr><td><b>Benzonatate</b></td><td>Non-opioid antitussive (nonproductive cough)</td><td><b>SWALLOW WHOLE</b> — chewing numbs the mouth → choking/cardiac arrest; fatal in kids &lt;10</td></tr>
    <tr><td><b>Propranolol</b></td><td>Nonselective beta-blocker (HTN, dysrhythmia, migraine, tremor, anxiety)</td><td>Bradycardia, hypotension, <b>bronchospasm</b>; <b>masks hypoglycemia</b>; don't stop abruptly</td></tr>
  </table>
</div>

<div class="card" style="border-color:var(--red)"><h3>📗 Week 2 — Cardiac</h3>
  <table class="lab">
    <tr><th>Drug</th><th>Class / use</th><th>Watch for / key point</th></tr>
    <tr><td><b>Adenosine</b></td><td>Antiarrhythmic — first-line SVT</td><td><b>6 mg RAPID IV push + fast saline flush</b>; brief asystole is expected; continuous monitoring</td></tr>
    <tr><td><b>Metoprolol</b></td><td>Cardioselective beta-1 blocker (HTN, angina, HF)</td><td><b>Hold for HR &lt;60 or SBP &lt;90</b>; check pulse before each dose</td></tr>
    <tr><td><b>Digoxin</b></td><td>Cardiac glycoside / positive inotrope (HF, afib rate)</td><td><b>Toxicity: N/V first, yellow-green halos, bradycardia</b>; <b>hypokalemia ↑ toxicity</b>; check <b>apical pulse 1 min, hold &lt;60</b>; antidote Digibind</td></tr>
    <tr><td><b>Atropine</b></td><td>Anticholinergic — <b>symptomatic bradycardia</b> (first-line)</td><td>Tachycardia, urinary retention; <b>low dose (&lt;0.5 mg) can paradoxically slow HR</b></td></tr>
    <tr><td><b>Diltiazem</b></td><td>Calcium channel blocker (angina, HTN, rate control)</td><td>Bradycardia, AV block, hypotension, edema; <b>don't combine IV with a beta-blocker</b></td></tr>
    <tr><td><b>Heparin</b> (infusion)</td><td>Anticoagulant</td><td><b>Bleeding, HIT</b>; monitor <b>aPTT</b>; antidote <b>protamine sulfate</b>; electric razor / soft toothbrush</td></tr>
  </table>
</div>

<div class="card" style="border-color:var(--purple)"><h3>📘 Week 3 — Diabetes</h3>
  <table class="lab">
    <tr><th>Insulin</th><th>Onset</th><th>Peak</th><th>Duration</th><th>Key point</th></tr>
    <tr><td><b>Aspart / Lispro</b><br><span style="font-size:.78rem;color:var(--muted)">rapid-acting</span></td><td><b>10–20 min</b></td><td>1–3 h</td><td>3–5 h</td><td>Inject <b>0–15 min before</b> meals — verify food is coming</td></tr>
    <tr><td><b>Regular</b> (Humulin/Novolin R)<br><span style="font-size:.78rem;color:var(--muted)">short-acting, CLEAR</span></td><td><b>30–60 min</b></td><td>2–4 h</td><td>5–8 h</td><td>Inject <b>30 min before</b> meals · <b>only insulin given IV</b> (DKA, hyperkalemia)</td></tr>

    <tr><td><b>Glyburide</b></td><td>Sulfonylurea (longer-acting)</td><td><b>Prolonged/severe hypoglycemia</b>, esp. elderly</td></tr>

  <p class="hy" style="margin:8px 0 0">⭐ Mixing insulins: <b>clear before cloudy</b> (Regular before NPH). Conscious low sugar → Rule of 15; unconscious → glucagon.</p>

<div class="card" style="border-color:var(--amber)"><h3>📙 Week 4 — GI &amp; pain <span style="font-weight:600;font-size:.8rem;color:var(--muted)">(likely Unit 4 — included in case)</span></h3>

    <tr><th>Drug</th><th>Class / use</th><th>Watch for / key point</th></tr>
    <tr><td><b>Ondansetron</b></td><td>5-HT3 antagonist antiemetic (N/V)</td><td>Headache, constipation, <b>QT prolongation</b>; no sedation/EPS</td></tr>
    <tr><td><b>Promethazine</b></td><td>Phenothiazine antiemetic/antihistamine</td><td><b>BLACK BOX: severe tissue injury/gangrene if IV extravasates</b> — prefer deep IM/PO; sedation, EPS; not &lt;2 yrs</td></tr>
    <tr><td><b>Pantoprazole</b></td><td>Proton pump inhibitor (GERD, PUD)</td><td>Take <b>30–60 min before breakfast</b>; long-term: low Mg, B12, fracture risk</td></tr>
    <tr><td><b>Famotidine</b></td><td>H2 blocker (GERD, PUD)</td><td>Fewer interactions than cimetidine; CNS effects in elderly/renal</td></tr>
    <tr><td><b>Cimetidine</b></td><td>H2 blocker (older)</td><td><b>Strong CYP450 inhibitor</b> — raises levels of warfarin, phenytoin, etc.; anti-androgenic</td></tr>
    <tr><td><b>Sucralfate</b></td><td>Mucosal protectant (ulcers)</td><td><b>Empty stomach, 1 h before meals</b>; <b>constipation</b>; separate from other drugs/antacids</td></tr>
    <tr><td><b>Fentanyl</b></td><td>Opioid analgesic (Schedule II)</td><td><b>Respiratory depression</b> (fatal); antidote <b>naloxone</b>; patch not for opioid-naive</td></tr>
  </table>
</div>

<div class="card"><h3>🚨 Highest-yield safety flags</h3>
  <ul class="clean">
    <li><b>Benzonatate</b> — swallow whole; never chew (oral anesthesia → choking/cardiac arrest).</li>
    <li><b>Promethazine IV</b> — black-box tissue necrosis; deep IM or PO preferred.</li>
    <li><b>Digoxin</b> — check apical pulse 1 full minute, hold if &lt;60; watch for N/V + yellow halos; hypokalemia worsens toxicity.</li>
    <li><b>Adenosine</b> — 6 mg <b>rapid</b> IV push with immediate saline flush; expect a brief pause.</li>
    <li><b>Heparin</b> — monitor aPTT; antidote is protamine sulfate; watch for HIT.</li>
    <li><b>Isoniazid</b> — always pair with B6 (pyridoxine) to prevent neuropathy.</li>
  </ul>
</div>

renderQuiz('quiz-drugs',[
  {q:'A client is prescribed benzonatate for a nonproductive cough. Which instruction is essential?',type:'single',opts:['Chew the capsule for faster relief','Swallow the capsule whole and never chew or crush it','Dissolve it under the tongue','Open the capsule and mix it in water'],correct:1,rat:'Chewing or crushing benzonatate releases the local anesthetic and numbs the mouth/throat — causing choking and even cardiac arrest. It must be swallowed whole (and kept away from children, in whom ingestion can be fatal).'},
  {q:'The nurse is preparing to give IV adenosine for SVT. Which technique is correct?',type:'single',opts:['Slow IV push over 5 minutes','Rapid IV push followed immediately by a saline flush','Continuous slow infusion over 1 hour','Deep IM injection'],correct:1,rat:'Adenosine has an extremely short half-life, so it is given as a rapid IV push followed by a fast saline flush. A brief period of asystole afterward is expected and therapeutic; keep the client on continuous monitoring.'},
  {q:'Before giving digoxin, the nurse counts an apical pulse of 54. The appropriate action is to:',type:'single',opts:['Give the dose as ordered','Hold the dose and notify the provider','Give half the dose','Recheck in 2 hours then give it'],correct:1,rat:'Hold digoxin for an apical pulse below 60 (counted for a full minute) and notify the provider. Giving it could worsen bradycardia; digoxin toxicity also presents with nausea/vomiting and yellow-green halos.'},
  {q:'A client on digoxin also takes a loop diuretic. Which lab value most increases the risk of digoxin toxicity if it drops?',type:'single',opts:['Sodium','Potassium','Calcium','Chloride'],correct:1,rat:'Hypokalemia greatly increases digoxin toxicity. Loop diuretics waste potassium, so the nurse monitors potassium closely and watches for early toxicity (N/V, visual halos).'},
  {q:'A client is on a heparin infusion. Which lab guides the dose, and what is the antidote?',type:'single',opts:['INR; vitamin K','aPTT; protamine sulfate','Platelets; naloxone','PT; flumazenil'],correct:1,rat:'Heparin is titrated to the aPTT, and its antidote is protamine sulfate. (INR/vitamin K go with warfarin.) Also monitor platelets for heparin-induced thrombocytopenia.'},
  {q:'Which insulin can be administered intravenously?',type:'single',opts:['NPH','Glargine','Regular','Aspart'],correct:2,rat:'Only Regular (short-acting) insulin is given IV. NPH is intermediate/cloudy, glargine is long-acting and never mixed, and aspart is rapid-acting.'},
  {q:'A nurse is giving lispro insulin. When should the client\'s meal tray arrive?',type:'single',opts:['Within 0–15 minutes of the injection','About 1 hour after the injection','2 hours after the injection','Whenever convenient — timing does not matter'],correct:0,rat:'Lispro/aspart have an onset of only 10–20 minutes, so food must be available almost immediately (give 0–15 min before the meal). Delaying the tray after a rapid-acting insulin is a classic cause of hypoglycemia.'},
  {q:'Regular insulin is ordered subcutaneously before breakfast. The nurse should administer it:',type:'single',opts:['Immediately as the tray arrives','30 minutes before the meal','1 hour after the meal','At bedtime'],correct:1,rat:'Regular insulin\'s onset is 30–60 minutes, so it is given about 30 minutes before eating to match its action with glucose absorption. Giving it at the tray or after the meal misses the window.'},
  {q:'A client receives NPH insulin at 0700. The nurse should watch most closely for hypoglycemia at which time?',type:'single',opts:['0715–0730','Between 1100 and 1900 (4–12 hours later)','Immediately at 0700','24 hours later only'],correct:1,rat:'NPH has an onset of 1–2 hours and peaks at 4–12 hours, so the highest hypoglycemia risk after a 0700 dose is roughly late morning through evening. The peak is always the danger window.'},
  {q:'Which insulin has NO pronounced peak and provides roughly 24-hour basal coverage?',type:'single',opts:['Regular','NPH','Glargine','Lispro'],correct:2,rat:'Glargine is peakless with about 24-hour duration (detemir 12–24 hours), which is why it carries a lower hypoglycemia risk than NPH — and why it is given SQ only and never mixed with another insulin.'},
  {q:'Match each insulin to its correct action profile. Which pairings are accurate? (Select all that apply)',type:'multi',opts:['Lispro/aspart — onset 10–20 min, peak 1–3 h, duration 3–5 h','Regular — onset 30–60 min, peak 2–4 h, duration 5–8 h','NPH — onset 1–2 h, peak 4–12 h, duration 14–24 h','Glargine — peakless, about 24 hours','NPH — peakless, given IV in DKA'],correct:[0,1,2,3],rat:'The trap: NPH definitely has a peak (4–12 h) and is never given IV — only Regular insulin goes IV. The other four profiles are correct.'},
  {q:'A client taking glyburide for type 2 diabetes is at greatest risk for which adverse effect?',type:'single',opts:['Hyperglycemia','Hypoglycemia','Lactic acidosis','Weight loss'],correct:1,rat:'Sulfonylureas (glyburide, glimepiride) stimulate insulin release and can cause hypoglycemia — glyburide especially, because of its long half-life and prolonged effect in the elderly.'},
  {q:'A client is scheduled for a CT with IV contrast and takes metformin. The nurse anticipates the metformin will be:',type:'single',opts:['Increased before the scan','Held around the time of the contrast','Given IV instead','Replaced with a sulfonylurea permanently'],correct:1,rat:'Metformin is held around iodinated contrast because the combination raises lactic acidosis risk, especially if kidney function declines.'},
  {q:'Promethazine is ordered for nausea. Which route carries a BLACK BOX warning for severe tissue injury?',type:'single',opts:['Oral','Deep intramuscular','Intravenous','Rectal'],correct:2,rat:'IV promethazine can cause severe tissue injury, including gangrene, if it extravasates — a black-box warning. Deep IM or oral routes are preferred; it is also contraindicated in children under 2.'},
  {q:'A client is prescribed sucralfate for a peptic ulcer. Correct administration is:',type:'single',opts:['With meals and antacids','On an empty stomach, 1 hour before meals, separated from other drugs','Only at bedtime with milk','Crushed into tube feeding with a PPI'],correct:1,rat:'Sucralfate needs an acidic, empty stomach to form its protective barrier — give it 1 hour before meals and separate it from antacids, PPIs, and other drugs (it reduces their absorption). Its most common effect is constipation.'},
  {q:'A client on IV fentanyl becomes difficult to arouse with a respiratory rate of 7. The priority action and antidote are:',type:'single',opts:['Give more fentanyl for comfort','Stimulate the client, support breathing, and give naloxone','Give flumazenil','Increase the IV fluids'],correct:1,rat:'Fentanyl\'s most dangerous effect is respiratory depression. Support ventilation and give naloxone, the opioid antidote. (Flumazenil reverses benzodiazepines, not opioids.)'},
  {q:'A client with diabetes is also prescribed propranolol. Why does this require extra teaching?',type:'single',opts:['It raises blood glucose to dangerous levels','It can mask the usual warning signs of hypoglycemia','It causes hyperkalemia','It must be taken only with contrast dye'],correct:1,rat:'Nonselective beta-blockers like propranolol blunt the adrenergic warning signs of hypoglycemia (tachycardia, tremor), so a diabetic client may not feel a low coming on — teach them to monitor glucose closely.'},
  {q:'Which client teaching about isoniazid (INH) is correct? (Select all that apply)',type:'multi',opts:['Take vitamin B6 (pyridoxine) daily to prevent nerve damage','Avoid alcohol during therapy','Report numbness/tingling in the hands or feet','Report yellow skin or dark urine','Stop the drug once you feel better'],correct:[0,1,2,3],rat:'The trap: never stop TB therapy early — the full course prevents resistance. The other four are correct: B6 prevents neuropathy, avoid alcohol (hepatotoxicity), and report neuropathy or signs of liver injury.'},
  {q:'Which statements about the two H2 blockers are accurate? (Select all that apply)',type:'multi',opts:['Cimetidine is a strong CYP450 inhibitor that raises levels of drugs like warfarin and phenytoin','Famotidine has fewer drug interactions than cimetidine','Both increase stomach acid production','Cimetidine can have anti-androgenic effects','H2 blockers reduce acid by blocking histamine at the parietal cells'],correct:[0,1,3,4],rat:'The trap: H2 blockers DECREASE acid (block histamine H2 receptors), not increase it. Cimetidine\'s strong CYP450 inhibition and anti-androgenic effects are why famotidine is usually preferred.'},
  {q:'A client\'s heart rate is 44 with dizziness and hypotension. Which medication is the first-line treatment for symptomatic bradycardia?',type:'single',opts:['Metoprolol','Adenosine','Atropine','Diltiazem'],correct:2,rat:'Atropine is first-line for symptomatic bradycardia — it blocks vagal tone to raise the heart rate. Metoprolol, adenosine, and diltiazem all LOWER heart rate and would worsen the situation.'}
],'Drug Guide (Medication ALTs) Check');

let flashIdx=0, flashFlipped=false, flashOrder=[], flashKnown=new Set();
function startFlash(){ flashOrder=shuffle(FLASH.map((_,i)=>i)); flashIdx=0; flashFlipped=false; flashKnown=new Set(); drawFlash(); }
function drawFlash(){
  const host=document.getElementById('sec-flash');
  if(flashIdx>=flashOrder.length){
    host.innerHTML=`<h2 class="sec-title"><span class="sec-emoji">🎮</span> Flash Study Game</h2>
      <div class="quiz-score">🎉 Deck complete!<br>You marked ${flashKnown.size} / ${flashOrder.length} as "Got it."<br>
      <button class="btn" style="background:var(--green);margin-top:10px" onclick="startFlash()">🔄 Shuffle & Restart</button></div>`; return;
  }
  const pair=FLASH[flashOrder[flashIdx]];
  host.innerHTML=`
    <h2 class="sec-title"><span class="sec-emoji">🎮</span> Flash Study Game</h2>
    <p class="intro-line">Tap the card to flip. Mark each one so you know what still needs work.</p>
    <div class="flash-progress">Card ${flashIdx+1} of ${flashOrder.length} • ✅ ${flashKnown.size} got it</div>
    <div class="flash-card${flashFlipped?' flipped':''}" onclick="flipFlash()"><div><span class="flash-label">${flashFlipped?'Answer':'Term / Cue'}</span>${flashFlipped?pair[1]:pair[0]}</div></div>
    <div class="flash-btns"><button class="flash-btn learning" onclick="flashNext(false)">🔁 Still learning</button><button class="flash-btn gotit" onclick="flashNext(true)">✅ Got it</button></div>
    <div class="center" style="margin-top:10px"><button class="btn ghost" onclick="startFlash()">🔀 Reshuffle deck</button></div>`;
}
function flipFlash(){ flashFlipped=!flashFlipped; drawFlash(); }
function flashNext(known){ if(known)flashKnown.add(flashOrder[flashIdx]); flashIdx++; flashFlipped=false; drawFlash(); }

   <div id="triOpts"></div>
   <div id="triFb"></div>`;
  const oh=document.getElementById('triOpts');
  order.forEach(origIdx=>{ const b=document.createElement('button'); b.className='tri-opt'; b.textContent=sc.opts[origIdx]; b.onclick=()=>answerTriage(origIdx===sc.ans, sc, b); oh.appendChild(b); });
  triTimeLeft=TRI_TIME; startTriTimer();
}
function startTriTimer(){
  const bar=document.getElementById('triBar'); const fill=bar?bar.firstElementChild:null;
  const start=Date.now();
  triTimer=setInterval(()=>{
    const elapsed=(Date.now()-start)/1000; triTimeLeft=Math.max(0,TRI_TIME-elapsed);
    const pct=(triTimeLeft/TRI_TIME)*100;
    if(fill) fill.style.width=pct+'%';
    if(bar) bar.classList.toggle('low', triTimeLeft<=5);
    if(triTimeLeft<=0){ clearInterval(triTimer); if(!triAnswered) timeoutTriage(); }
  },100);
}
function answerTriage(correct, sc, btn){
  if(triAnswered) return; triAnswered=true; clearInterval(triTimer);
  document.querySelectorAll('#triOpts .tri-opt').forEach(b=>{ b.disabled=true; if(b.textContent===sc.opts[sc.ans]) b.classList.add('tri-correct'); });
  if(correct){
    btn.classList.add('tri-correct'); triStreak++; triScore += 10 + Math.floor(triTimeLeft)*2;
    if(triStreak>triBest){ triBest=triStreak; try{ localStorage.setItem('nur256u13_tribest', String(triBest)); }catch(e){} }
    if(triStreak>0 && triStreak%5===0) showCombo('🔥 '+triStreak+' STREAK!');
    showTriFeedback(true, sc);
  } else {
    btn.classList.add('tri-wrong'); triStreak=0; triLives--;
    addToVault({id:'tri-'+sc.stem.slice(0,18),q:sc.stem,opts:relabel(sc.opts.slice()),type:'single',correct:sc.ans,rat:sc.rat,source:'Priority ER'});
    showTriFeedback(false, sc);
  }
}
function timeoutTriage(){
  triAnswered=true; triStreak=0; triLives--;
  const sc=TRIAGE[triQueue[triQi]];
  document.querySelectorAll('#triOpts .tri-opt').forEach(b=>{ b.disabled=true; if(b.textContent===sc.opts[sc.ans]) b.classList.add('tri-correct'); });
  addToVault({id:'tri-'+sc.stem.slice(0,18),q:sc.stem,opts:relabel(sc.opts.slice()),type:'single',correct:sc.ans,rat:sc.rat,source:'Priority ER'});
  const fb=document.getElementById('triFb');
  if(fb) fb.innerHTML=`<div class="tri-feedback">⏰ <b>Time's up!</b> — lost a life.<br>Correct: <b>${sc.opts[sc.ans]}</b><br>${sc.rat}</div>
    <button class="btn" style="background:var(--purple)" onclick="triNext()">${triLives<=0?'See results →':'Next case →'}</button>`;
}
function showTriFeedback(correct, sc){
  const fb=document.getElementById('triFb');
  fb.innerHTML=`<div class="tri-feedback">${correct?'✅ <b>Correct!</b> +'+(10+Math.floor(triTimeLeft)*2)+' pts':'❌ <b>Not the priority.</b> Correct: <b>'+sc.opts[sc.ans]+'</b>'}<br>${sc.rat}</div>
    <button class="btn" style="background:var(--purple)" onclick="triNext()">${triLives<=0?'See results →':'Next case →'}</button>`;
}
function triNext(){ triQi++; drawTriage(); }
function showCombo(txt){ const d=document.createElement('div'); d.className='tri-combo'; d.textContent=txt; document.body.appendChild(d); setTimeout(()=>d.remove(),800); }
function triageGameOver(){
  const host=document.getElementById('sec-triage');
  const msg = triScore>=250?'👑 Charge-nurse level!':triScore>=150?'🎯 Strong prioritizing!':triScore>=70?'✅ Solid start — keep drilling.':'📚 Review your vault and run it back.';
  host.innerHTML=`<h2 class="sec-title"><span class="sec-emoji">🚑</span> Shift Over</h2>
    <div class="quiz-score">Final score: ${triScore}<br>🏆 Best streak this run: ${triStreak > triBest ? triStreak : triBest}<br>${msg}</div>
    <p class="intro-line center">Any cases you missed are waiting in your 🗄️ Wrong Answer Vault.</p>
    <div class="center"><button class="btn" style="background:linear-gradient(90deg,var(--pink),var(--purple))" onclick="startTriage()">🔄 New shift</button></div>`;
}

/* ===== EXAM (100+ items in full mode) ===== */
const EXAM_SINGLE = POOL.map((p,i)=>poolToQuiz(p,i));
const EXAM_SATA = [
 {q:'Which are appropriate neutropenic precautions? (Select all that apply)',type:'multi',opts:['Strict hand hygiene','Fresh flowers in the room','Avoid raw fruits/vegetables','Private room','Monitor temperature closely'],correct:[0,2,3,4],rat:'No fresh flowers or raw produce; the rest reduce and catch infection.'},
 {q:'Which findings suggest hypovolemic shock in a post-op client? (Select all that apply)',type:'multi',opts:['Falling blood pressure','Compensatory tachycardia','Restlessness','Bradycardia','Dry mucous membranes'],correct:[0,1,2,4],rat:'Shock brings a compensatory tachycardia, not bradycardia.'},
 {q:'Which are correct diabetic sick-day instructions? (Select all that apply)',type:'multi',opts:['Keep taking insulin even if not eating well','Check glucose every 3–4 hours','Test for ketones when glucose stays high','Stop insulin if unable to eat solids','Maintain hydration'],correct:[0,1,2,4],rat:'Never stop insulin during illness — glucose rises and DKA can develop.'},
 {q:'Which tasks can be delegated to UAP? (Select all that apply)',type:'multi',opts:['Ambulating a stable client','Admission assessment','Vital signs on a stable client','Insulin teaching','Assisting with a bath'],correct:[0,2,4],rat:'UAP handle stable, routine tasks; assessment and teaching stay with the RN.'},
 {q:'Which point toward pneumonia over atelectasis? (Select all that apply)',type:'multi',opts:['Fever building over days','Productive cough','Sudden onset in seconds','Elevated WBC','Crackles'],correct:[0,1,3,4],rat:'Sudden onset points to PE; the rest fit pneumonia.'},
 {q:'Which are independent nursing interventions? (Select all that apply)',type:'multi',opts:['Repositioning every 2 hours','Administering IV antibiotics','Teaching pursed-lip breathing','Elevating an edematous limb','Titrating an insulin drip per protocol'],correct:[0,2,3],rat:'Independent = nurse-initiated, no order; IV drugs and protocol titration are dependent.'},
 {q:'Which increase a client\'s risk for pressure injury? (Select all that apply)',type:'multi',opts:['Incontinence','Immobility/bed rest','Independent repositioning','Impaired sensation','Poor nutrition'],correct:[0,1,3,4],rat:'The independent, mobile client is protected; the rest raise risk.'},
 {q:'Which findings indicate a wound infection? (Select all that apply)',type:'multi',opts:['Purulent drainage','Increasing erythema and warmth','Fever','Clean, approximated edges with less pain','Foul odor'],correct:[0,1,2,4],rat:'Clean edges with decreasing pain is normal healing, not infection.'},
 {q:'Which reflect chemotherapy-induced bone marrow suppression? (Select all that apply)',type:'multi',opts:['Decreased WBCs','Decreased platelets','Decreased RBCs','Increased WBCs','Increased platelets'],correct:[0,1,2],rat:'Marrow suppression lowers all three cell lines.'},
 {q:'Which are correct foot-care teachings for diabetic neuropathy? (Select all that apply)',type:'multi',opts:['Inspect feet daily','Go barefoot at home','Avoid heating pads','Wear well-fitting shoes','Trim nails straight across'],correct:[0,2,3,4],rat:'Going barefoot risks unnoticed injury in numb feet.'},
 {q:'Which clients are at risk for hyperkalemia? (Select all that apply)',type:'multi',opts:['Acute kidney injury with low output','Potassium-sparing diuretic use','Crush/tissue injury','Prolonged vomiting','Large-dose loop diuretic'],correct:[0,1,2],rat:'Vomiting and loop diuretics cause potassium LOSS.'},
 {q:'Which are hallmarks of DKA? (Select all that apply)',type:'multi',opts:['Fruity breath odor','Kussmaul respirations','Positive serum ketones','Glucose >250','Bradycardia as an early sign'],correct:[0,1,2,3],rat:'DKA shows ketosis, acidosis, Kussmaul breathing, fruity breath, and high glucose.'},
 {q:'Which findings occur with hypocalcemia? (Select all that apply)',type:'multi',opts:['Positive Chvostek\'s sign','Tetany','Peaked T waves','Perioral tingling','Laryngospasm'],correct:[0,1,3,4],rat:'Peaked T waves are a hyperkalemia sign, not hypocalcemia.'},
 {q:'Which are CAUTION warning signs of cancer? (Select all that apply)',type:'multi',opts:['Change in bowel/bladder habits','A sore that does not heal','Unusual bleeding or discharge','A bruise that fades in a week','Nagging cough or hoarseness'],correct:[0,1,2,4],rat:'A normal, resolving bruise is not a warning sign.'},
 {q:'Which statements about the surgical time-out and consent are correct? (Select all that apply)',type:'multi',opts:['The time-out verifies correct patient, procedure, and site','The surgeon is responsible for explaining the procedure for consent','A signature without understanding is valid consent','The nurse notifies the surgeon if the client doesn\'t understand','The time-out helps prevent wrong-site surgery'],correct:[0,1,3,4],rat:'A signature without understanding is NOT valid consent.'},
 {q:'Which are expected (normal) post-op findings? (Select all that apply)',type:'multi',opts:['Drowsy but arousable in PACU','Serosanguineous drainage early on','Continuous water-seal bubbling in a chest tube','Gentle tidaling in a chest tube','Pain requiring analgesia'],correct:[0,1,3,4],rat:'Continuous water-seal bubbling is an air leak — not expected.'},
 {q:'Which actions are correct when a client eviscerates? (Select all that apply)',type:'multi',opts:['Cover with sterile saline-moistened gauze','Push the organs back in','Low-Fowler\'s with knees flexed','Keep the client NPO','Notify the surgeon'],correct:[0,2,3,4],rat:'Never push protruding organs back in — that risks contamination and injury.'},
 {q:'Which are correct steps/principles of ABG interpretation with ROME? (Select all that apply)',type:'multi',opts:['CO₂ and pH move in opposite directions','HCO₃ and pH move in the same direction','A normal pH with both values abnormal is fully compensated','CO₂ is the metabolic component','HCO₃ is the metabolic component'],correct:[0,1,2,4],rat:'CO₂ is the respiratory component, not metabolic — that statement is false.'},
 {q:'Which findings would you expect in hypoglycemia? (Select all that apply)',type:'multi',opts:['Shakiness and diaphoresis','Cold, clammy skin','Confusion','Fruity breath odor','Tachycardia'],correct:[0,1,2,4],rat:'Fruity breath is a DKA/hyperglycemia sign, not hypoglycemia.'},
 {q:'Which precautions apply to a client with thrombocytopenia? (Select all that apply)',type:'multi',opts:['Use a soft toothbrush','Use an electric razor','Give IM injections freely','Avoid invasive procedures when possible','Monitor for bruising and bleeding'],correct:[0,1,3,4],rat:'IM injections risk bleeding at low platelet counts and are avoided.'},
 {q:'Which statements about palliative and hospice care are correct? (Select all that apply)',type:'multi',opts:['Palliative care can accompany curative treatment','Hospice focuses on comfort when cure is no longer the goal','Care is guided by the client\'s goals and wishes','Hospice always includes aggressive curative therapy','Cultural preferences should be respected'],correct:[0,1,2,4],rat:'Hospice is comfort-focused once curative treatment has stopped — not aggressive cure.'}
];
const EXAM_MATCH_1 = {q:'Match each item to its focus or meaning.',type:'match',rat:'Pre-op verifies, intra-op ensures safety, PACU protects the airway; MH shows rising CO₂; evisceration is covered with saline gauze.',
 items:[{term:'PACU nurse',def:'Airway & gag reflex'},{term:'Intra-op nurse',def:'Patient safety / positioning'},{term:'Pre-op nurse',def:'Verify consent & NPO status'},{term:'Malignant hyperthermia',def:'Rising end-tidal CO₂'},{term:'Evisceration',def:'Cover with sterile saline gauze'}]};
const EXAM_MATCH_2 = {q:'Match each lab/finding to its imbalance.',type:'match',rat:'ROME and electrolyte danger signs: peaked T waves = hyperkalemia, Trousseau\'s = hypocalcemia, cerebral edema = hyponatremia, vomiting = alkalosis, diarrhea = acidosis.',
 items:[{term:'Peaked T waves',def:'Hyperkalemia'},{term:'Trousseau\'s sign',def:'Hypocalcemia'},{term:'Cerebral edema/seizures',def:'Hyponatremia'},{term:'Prolonged vomiting',def:'Metabolic alkalosis'},{term:'Severe diarrhea',def:'Metabolic acidosis'}]};
const EXAM_ORDER_1 = {q:'Place the steps of DKA management in the correct order.',type:'order',rat:'Fluids first (dehydration), then IV regular insulin, then monitor/replace potassium as it shifts into cells, then add dextrose near glucose 200.',
 steps:['Start IV fluids (0.9% NS)','Begin IV regular insulin drip','Monitor and replace potassium','Add dextrose as glucose nears 200']};
const EXAM_ORDER_2 = {q:'Order the nursing process steps (ADPIE).',type:'order',rat:'Assess → Diagnose → Plan → Implement → Evaluate.',
 steps:['Assess (collect data)','Diagnose (analyze data)','Plan (set goals)','Implement (intervene)','Evaluate (was the goal met?)']};

let examMode='quick', examQs=[], examIdx=0, examState={}, examChecked={};
function buildExamSet(mode){
  let singles=shuffle(EXAM_SINGLE.slice());
  let sata=shuffle(EXAM_SATA.slice());
  if(mode==='quick'){
    return shuffle([...singles.slice(0,14), ...sata.slice(0,3), EXAM_MATCH_1, EXAM_ORDER_1]);
  }
  // full: everything → 100+
  return shuffle([...singles, ...sata, EXAM_MATCH_1, EXAM_MATCH_2, EXAM_ORDER_1, EXAM_ORDER_2]);
}
function initExam(){
  const host=document.getElementById('sec-exam');
  const fullCount = EXAM_SINGLE.length + EXAM_SATA.length + 4;
  host.innerHTML=`<h2 class="sec-title"><span class="sec-emoji">📝</span> Practice Exam</h2>
   <p class="intro-line">Mixed formats like the real thing — single answer, select-all, matching, and ordering. Full mode is <b>${fullCount} questions</b> so you can practice past the 100 you'll face. Scored review at the end; misses go to your vault.</p>
   <div class="exam-mode-toggle">
     <button class="mode-btn active" id="em-quick" onclick="setExamMode('quick')">⚡ Quick (19)</button>
     <button class="mode-btn" id="em-full" onclick="setExamMode('full')">📚 Full (${fullCount})</button>
   </div>
   <div class="card center"><button class="btn" style="background:linear-gradient(90deg,var(--purple),var(--pink))" onclick="beginExam()">▶️ Begin exam</button></div>`;
}
function setExamMode(m){ examMode=m; document.getElementById('em-quick').classList.toggle('active',m==='quick'); document.getElementById('em-full').classList.toggle('active',m==='full'); }
function beginExam(){ examQs=buildExamSet(examMode); examIdx=0; examState={}; examChecked={}; examQs.forEach(q=>{ delete q._prep; }); drawExamQ(); }
function drawExamQ(){
  const host=document.getElementById('sec-exam'); const q=examQs[examIdx];
  const typeLabel = q.type==='multi'?'Select all':q.type==='match'?'Matching':q.type==='order'?'Ordering':'Single';
  let dots='<div id="examDots">';
  examQs.forEach((_,i)=>{ let cls='dot'; if(i===examIdx)cls+=' current'; if(examChecked[i]!==undefined)cls+=examChecked[i]?' dot-correct':' dot-wrong'; else if(examState[i]!==undefined)cls+=' answered'; dots+=`<div class="${cls}" onclick="jumpExam(${i})"></div>`; });
  dots+='</div>';
  host.innerHTML=`<h2 class="sec-title"><span class="sec-emoji">📝</span> Practice Exam</h2>${dots}
    <div class="exam-q"><span class="qnum">Question ${examIdx+1} of ${examQs.length}</span><span class="qtype">${typeLabel}</span>
    <div class="qtext">${q.q}</div><div id="examBody"></div></div>
    <div class="exam-nav"><button class="btn ghost" onclick="prevExam()" ${examIdx===0?'disabled':''}>← Back</button>
    ${examIdx===examQs.length-1?`<button class="btn" style="background:var(--green)" onclick="finishExam()">✓ Finish & Score</button>`:`<button class="btn" style="background:var(--purple)" onclick="nextExam()">Next →</button>`}</div>`;
  const bh=document.getElementById('examBody');
  if(q.type==='single'||q.type==='multi') drawExamChoice(q,bh);
  else if(q.type==='match') drawExamMatch(q,bh);
  else if(q.type==='order') drawExamOrder(q,bh);
}
function drawExamChoice(q,bh){
  const prep = q._prep || (q._prep = prepareQuestion(q));
  const chosen = examState[examIdx];
  const opts=document.createElement('div'); opts.className='opts';
  prep.opts.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='opt'; b.innerHTML=o;
    if(q.type==='multi' && chosen instanceof Set && chosen.has(i)) b.classList.add('sel-multi');
    if(q.type==='single' && chosen===i) b.classList.add('sel-multi');
    b.onclick=()=>{ if(q.type==='multi'){ const s=examState[examIdx] instanceof Set?examState[examIdx]:new Set(); if(s.has(i))s.delete(i); else s.add(i); examState[examIdx]=s; } else examState[examIdx]=i; drawExamQ(); };
    opts.appendChild(b);
  });
  bh.appendChild(opts);
}
function drawExamMatch(q,bh){
  const prep = q._prep || (q._prep={order: shuffleAnswers?shuffle(q.items.map((_,i)=>i)):q.items.map((_,i)=>i)});
  const defs=prep.order.map(i=>q.items[i].def); const picks=examState[examIdx]||{};
  q.items.forEach((item,itemIdx)=>{
    const row=document.createElement('div'); row.className='dm-row'; row.innerHTML=`<div class="dm-term">${item.term}</div>`;
    const sel=document.createElement('select'); sel.className='dm-select';
    sel.innerHTML='<option value="">— choose —</option>'+defs.map((d,pos)=>`<option value="${pos}" ${picks[itemIdx]==pos?'selected':''}>${d}</option>`).join('');
    sel.onchange=()=>{ picks[itemIdx]=sel.value===''?undefined:parseInt(sel.value,10); examState[examIdx]=picks; };
    row.appendChild(sel); bh.appendChild(row);
  });
}
function drawExamOrder(q,bh){
  const prep = q._prep || (q._prep={order: shuffleAnswers?shuffle(q.steps.map((_,i)=>i)):q.steps.map((_,i)=>i)});
  let picks=examState[examIdx]||[];
  const answerList=document.createElement('div'); answerList.className='order-answer';
  picks.forEach((origIdx,pos)=>{ const it=document.createElement('div'); it.className='order-answer-item'; it.innerHTML=`<span class="num">${pos+1}</span><span>${q.steps[origIdx]}</span>`; answerList.appendChild(it); });
  bh.appendChild(answerList);
  const pool=document.createElement('div'); pool.className='order-pool';
  prep.order.forEach(origIdx=>{ const b=document.createElement('button'); b.className='order-chip'; b.textContent=q.steps[origIdx]; if(picks.includes(origIdx))b.disabled=true;
    b.onclick=()=>{ if(!picks.includes(origIdx)){ picks=[...picks,origIdx]; examState[examIdx]=picks; drawExamQ(); } }; pool.appendChild(b); });
  bh.appendChild(pool);
  if(picks.length){ const u=document.createElement('button'); u.className='btn ghost'; u.style.marginTop='8px'; u.textContent='↺ Undo last'; u.onclick=()=>{ picks=picks.slice(0,-1); examState[examIdx]=picks; drawExamQ(); }; bh.appendChild(u); }
}
function jumpExam(i){ examIdx=i; drawExamQ(); }
function nextExam(){ if(examIdx<examQs.length-1){examIdx++; drawExamQ();} }
function prevExam(){ if(examIdx>0){examIdx--; drawExamQ();} }
function finishExam(){
  let correct=0, total=examQs.length;
  examQs.forEach((q,i)=>{
    let right=false;
    if(q.type==='single'){ const prep=q._prep||prepareQuestion(q); right = examState[i]===prep.correct; if(!right && examState[i]!==undefined){ addToVault({id:'exam-s-'+i+'-'+q.q.slice(0,12),q:q.q,opts:prep.opts,type:'single',correct:prep.correct,rat:q.rat,source:'Practice Exam'}); } }
    else if(q.type==='multi'){ const prep=q._prep||prepareQuestion(q); const s=examState[i] instanceof Set?examState[i]:new Set(); const cset=new Set(prep.correct); right = s.size===cset.size && [...s].every(x=>cset.has(x)); if(!right){ addToVault({id:'exam-m-'+i+'-'+q.q.slice(0,12),q:q.q,opts:prep.opts,type:'multi',correct:prep.correct,rat:q.rat,source:'Practice Exam'}); } }
    else if(q.type==='match'){ const prep=q._prep; const picks=examState[i]||{}; right=q.items.every((_,idx)=>picks[idx]!==undefined && prep.order[picks[idx]]===idx); }
    else if(q.type==='order'){ const picks=examState[i]||[]; right = picks.length===q.steps.length && picks.every((v,idx)=>v===idx); }
    examChecked[i]=right; if(right)correct++;
  });
  const pct=Math.round(correct/total*100);
  const host=document.getElementById('sec-exam');
  const msg = pct>=90?'👑 Outstanding — Units 1–3 ready!':pct>=80?'🎯 Strong work!':pct>=70?'✅ Passing — review the misses.':'📚 Keep drilling — your vault has your misses.';
  host.innerHTML=`<h2 class="sec-title"><span class="sec-emoji">📝</span> Exam Results</h2>
    <div class="quiz-score">${correct} / ${total} correct — ${pct}%<br>${msg}</div>
    <p class="intro-line center">Missed single & select-all questions were added to your 🗄️ Wrong Answer Vault.</p>
    <div id="examReview"></div>
    <div class="center"><button class="btn" style="background:var(--purple)" onclick="initExam()">🔄 New exam</button></div>`;
  let rev='';
  examQs.forEach((q,i)=>{ rev+=`<div class="exam-q" style="border-color:${examChecked[i]?'var(--green)':'var(--red)'}"><span class="qnum">Q${i+1} • ${examChecked[i]?'✅ Correct':'❌ Review'}</span><div class="qtext">${q.q}</div><div class="rationale show"><b>Rationale:</b> ${q.rat}</div></div>`; });
  document.getElementById('examReview').innerHTML=rev;
}
</script>
