<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUR256 Med-Surg 1 — Exam Study Guide & Practice Exam</title>
<style>
:root{
  --bg:#fdf7ff; --bg2:#f3ecfe; --card:#ffffff; --card2:#f6f1ff;
  --ink:#241b38; --ink-dim:#6b6480; --line:#ece4fa;
  --accent:#6d3bf5; --accent2:#e0399b; --gold:#f59e0b;
  --good:#10b981; --bad:#f43f5e; --warn:#f97316;
  --pink:#ec4899; --teal:#06b6d4; --lime:#84cc16; --cyan:#22d3ee;
  --shadow:0 10px 30px rgba(109,59,245,.14);
  --r:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(800px 500px at 8% 0%, rgba(224,57,155,.10), transparent 60%),
    radial-gradient(900px 600px at 95% 8%, rgba(109,59,245,.12), transparent 55%),
    radial-gradient(700px 500px at 50% 110%, rgba(6,182,212,.10), transparent 60%),
    var(--bg);
  background-attachment:fixed;
  color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55; padding-bottom:90px;
}
a{color:var(--accent)}
.wrap{max-width:1000px;margin:0 auto;padding:0 16px}

/* HEADER */
header.top{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(110deg,#6d3bf5,#a23bf0,#e0399b,#6d3bf5);
  background-size:300% 100%;
  animation:slideGrad 14s ease infinite;
  backdrop-filter:blur(10px); border-bottom:none;
  box-shadow:0 6px 22px rgba(109,59,245,.30);
}
@keyframes slideGrad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.top-inner{display:flex;align-items:center;gap:12px;padding:13px 16px;max-width:1000px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;line-height:1.15}
.brand b{font-size:1.08rem;letter-spacing:.3px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.18)}
.brand span{font-size:.72rem;color:rgba(255,255,255,.9)}
.prog-mini{margin-left:auto;font-size:.72rem;color:rgba(255,255,255,.9);text-align:right}
.prog-mini b{color:#ffe27a}

/* TABS */
nav.tabs{display:flex;gap:7px;overflow-x:auto;padding:10px 16px;max-width:1000px;margin:0 auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);
  color:var(--ink-dim);padding:8px 15px;border-radius:999px;font-size:.82rem;
  cursor:pointer;white-space:nowrap;transition:transform .15s, box-shadow .15s, border-color .15s;font-weight:700;
}
.tab:hover{border-color:var(--accent);transform:translateY(-2px)}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(224,57,155,.38);transform:translateY(-1px)}

/* PANELS */
.panel{display:none;animation:fade .25s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
section{margin:22px 0}
h1.page-title{font-size:1.7rem;margin:20px 0 4px;font-weight:800;background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.5px}
.subtle{color:var(--ink-dim);font-size:.92rem;margin-top:2px}


/* CARDS */
.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin:16px 0;box-shadow:var(--shadow);overflow:hidden;transition:transform .18s, box-shadow .18s}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--cyan))}
.card:hover{transform:translateY(-3px);box-shadow:0 16px 38px rgba(109,59,245,.18)}
.card h2{margin:2px 0 6px;font-size:1.2rem;display:flex;align-items:center;gap:8px;font-weight:800}
.card h3{margin:16px 0 6px;font-size:1.02rem;color:var(--accent);font-weight:800}
.pill{display:inline-block;font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:999px;letter-spacing:.4px;text-transform:uppercase}
.pill.hot{background:linear-gradient(135deg,#fb7185,#f43f5e);color:#fff;border:none}
.pill.med{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;border:none}
.pill.versed{background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;border:none}
.pill.ngn{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#fff;border:none}

ul.clean{margin:8px 0;padding-left:20px}
ul.clean li{margin:6px 0}
ul.clean li::marker{color:var(--accent2)}
.kv{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;margin:8px 0;font-size:.92rem}
.kv b{color:var(--accent)}

/* HIGH-YIELD callout */
.hy{border-left:5px solid var(--gold);background:linear-gradient(90deg,rgba(245,158,11,.14),rgba(245,158,11,.03));padding:13px 15px;border-radius:0 14px 14px 0;margin:13px 0}
.hy .lbl{font-size:.7rem;font-weight:800;color:#d97706;letter-spacing:.6px;text-transform:uppercase}
.versedbox{border-left:5px solid var(--accent2);background:linear-gradient(90deg,rgba(224,57,155,.13),rgba(224,57,155,.03));padding:13px 15px;border-radius:0 14px 14px 0;margin:13px 0}
.versedbox .lbl{font-size:.7rem;font-weight:800;color:var(--accent2);letter-spacing:.6px;text-transform:uppercase}
.trap{border-left:5px solid var(--bad);background:linear-gradient(90deg,rgba(244,63,94,.12),rgba(244,63,94,.03));padding:13px 15px;border-radius:0 14px 14px 0;margin:13px 0}
.trap .lbl{font-size:.7rem;font-weight:800;color:var(--bad);letter-spacing:.6px;text-transform:uppercase}

/* TABLE */
table.t{width:100%;border-collapse:collapse;margin:10px 0;font-size:.86rem;border-radius:12px;overflow:hidden}
table.t th,table.t td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
table.t th{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:.76rem;text-transform:uppercase;letter-spacing:.5px;border-color:transparent}
table.t tr:nth-child(even) td{background:rgba(109,59,245,.05)}
table.t tbody tr:hover td{background:rgba(224,57,155,.07)}

/* VAULT (collapsible) */
.vault{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden;background:var(--card2)}
.vault summary{cursor:pointer;padding:12px 16px;font-weight:700;list-style:none;display:flex;align-items:center;gap:10px;user-select:none}
.vault summary::-webkit-details-marker{display:none}
.vault summary .chev{margin-left:auto;transition:.2s;color:var(--ink-dim)}
.vault[open] summary .chev{transform:rotate(90deg)}
.vault .body{padding:0 16px 16px}

/* BUTTONS */
.btn{border:none;border-radius:14px;padding:12px 20px;font-weight:800;font-size:.92rem;cursor:pointer;transition:transform .15s, box-shadow .15s, filter .15s}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 18px rgba(109,59,245,.34)}
.btn.ghost{background:var(--card2);color:var(--accent);border:1.5px solid var(--line)}
.btn.gold{background:linear-gradient(135deg,#fbbf24,#fb7185);color:#fff;box-shadow:0 6px 18px rgba(244,63,94,.30)}
.btn:hover{transform:translateY(-2px);filter:brightness(1.04)}
.btn.primary:hover{box-shadow:0 10px 24px rgba(109,59,245,.42)}
.btn.gold:hover{box-shadow:0 10px 24px rgba(244,63,94,.4)}
.btn.ghost:hover{border-color:var(--accent)}
.btn:active{transform:scale(.96)}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}

/* QUIZ */
.qmeta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;font-size:.82rem;color:var(--ink-dim)}
.qbar{height:10px;background:var(--card2);border-radius:999px;overflow:hidden;margin:8px 0 18px}
.qbar > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--cyan));width:0;transition:.4s}
.qstem{font-size:1.1rem;font-weight:700;margin:6px 0 16px;line-height:1.5}
.opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--card2);
  color:var(--ink);padding:14px 16px;border-radius:14px;margin:9px 0;cursor:pointer;transition:transform .12s, border-color .12s, background .12s;font-size:.94rem;position:relative}
.opt:hover{border-color:var(--accent);transform:translateX(3px)}
.opt.sel{border-color:var(--accent);background:rgba(109,59,245,.10)}
.opt.correct{border-color:var(--good);background:rgba(16,185,129,.14)}
.opt.wrong{border-color:var(--bad);background:rgba(244,63,94,.12)}
.opt .mark{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-weight:800;font-size:1.1rem}
.rationale{margin-top:12px;padding:14px 16px;border-radius:14px;background:var(--bg2);border:1px solid var(--line);font-size:.92rem;display:none}
.rationale.show{display:block;animation:fade .2s}
.rationale .rlbl{font-weight:800;font-size:.74rem;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.rationale.ok{background:rgba(16,185,129,.10);border-color:rgba(16,185,129,.35)}
.rationale.no{background:rgba(244,63,94,.09);border-color:rgba(244,63,94,.35)}
.rationale.ok .rlbl{color:var(--good)}
.rationale.no .rlbl{color:var(--bad)}
.sata-note{font-size:.78rem;color:#d97706;margin:6px 0 10px;font-weight:700}
.hintbox{border-left:5px solid var(--teal);background:linear-gradient(90deg,rgba(6,182,212,.13),rgba(6,182,212,.03));padding:12px 15px;border-radius:0 14px 14px 0;margin:12px 0;font-size:.92rem}
.hintbox .lbl{font-size:.7rem;font-weight:800;color:#0891b2;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}

/* SCORE */
.scorecard{text-align:center;padding:34px 18px}
.scorecard .big{font-size:3.4rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.donut{width:160px;height:160px;margin:12px auto}

/* FLASHCARD */
.fc-scene{perspective:1200px;margin:16px 0}
.fc{position:relative;width:100%;min-height:240px;cursor:pointer;transform-style:preserve-3d;transition:transform .55s}
.fc.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;padding:26px;display:flex;flex-direction:column;justify-content:center;border:none;box-shadow:0 12px 30px rgba(109,59,245,.18)}
.fc-front{background:linear-gradient(140deg,#7c4dff,#a23bf0,#e0399b);color:#fff}
.fc-back{background:linear-gradient(140deg,#06b6d4,#0ea5e9,#6d3bf5);color:#fff;transform:rotateY(180deg)}
.fc-face .tag{font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.85);margin-bottom:8px}
.fc-face .q{font-size:1.15rem;font-weight:800}
.fc-face .a{font-size:1.02rem}
.fc-face .a b{color:#fff;text-decoration:underline;text-decoration-color:rgba(255,255,255,.5)}
.fc-hint{text-align:center;color:var(--ink-dim);font-size:.78rem;margin-top:8px}

/* CHIP filter */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.chip{border:1.5px solid var(--line);background:var(--card2);color:var(--ink-dim);padding:7px 14px;border-radius:999px;font-size:.8rem;cursor:pointer;font-weight:700;transition:transform .14s, box-shadow .14s}
.chip:hover{transform:translateY(-2px)}
.chip.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 5px 14px rgba(224,57,155,.32)}

/* misc */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.kv{grid-template-columns:1fr}.top-inner{gap:8px}h1.page-title{font-size:1.45rem}
  /* Wide tables scroll sideways as one unit — keeps text readable */
  table.t{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:.88rem;border-radius:12px}
  table.t td,table.t th{min-width:140px}
  table.t td:first-child,table.t th:first-child{min-width:112px}
}
.mono{font-variant-numeric:tabular-nums}
.center{text-align:center}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
  padding:11px 20px;border-radius:999px;font-size:.86rem;font-weight:700;opacity:0;transition:.3s;z-index:200;box-shadow:0 8px 24px rgba(109,59,245,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{color:var(--ink-dim);font-size:.78rem;text-align:center;padding:26px 16px}
.legend{font-size:.78rem;color:var(--ink-dim);display:flex;gap:14px;flex-wrap:wrap;margin:6px 0}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
</style>
