let QZ=null;
function buildSession(list,title,opts){
  opts=opts||{};
  return {
    list:list.slice(), i:0,
    picks:list.map(()=>[]), locked:list.map(()=>false), hintOpen:list.map(()=>false),
    title,
    isExam: !!opts.isExam,
    isVault: !!opts.isVault,
    backTab: opts.backTab || (opts.isExam?'exam':'drill')
  };
}
function startQuiz(topicOrAll,title){
  let list = topicOrAll==='all' ? QBANK.slice() : QBANK.filter(q=>q.topic===topicOrAll);
  const isExam=title.includes('Exam');
  if(isExam) shuffle(list);
  QZ=buildSession(list,title,{isExam,backTab:isExam?'exam':'drill'});
  CURRENT='__quiz'; renderTabs(); renderQuiz(); window.scrollTo({top:0,behavior:'smooth'});
}
/* Exam with a chosen length (25 / 50 / all), optionally limited to a focus pool */
function startExam(count,pool,title){
  let list=(pool&&pool.length)?pool.slice():QBANK.slice();
  shuffle(list);
  if(count!=='all') list=list.slice(0, Math.min(count, list.length));
  QZ=buildSession(list,title||('Practice Exam ('+(count==='all'?list.length:count)+' Q)'),{isExam:true,backTab:'exam'});
  CURRENT='__quiz'; renderTabs(); renderQuiz(); window.scrollTo({top:0,behavior:'smooth'});
}
function startVaultSession(){
  let list=vaultList();
  if(!list.length){ toast('Vault is empty — nice work!'); return; }
  shuffle(list);
  QZ=buildSession(list,'Wrong-Answer Vault',{isVault:true,backTab:'vault'});
  CURRENT='__quiz'; renderTabs(); renderQuiz(); window.scrollTo({top:0,behavior:'smooth'});
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function renderQuiz(){
  const app=document.getElementById('app');
  const q=QZ.list[QZ.i];
  const isSATA=isMulti(q);
  const tc=TOPICS[q.topic];
  const pct=Math.round((QZ.i)/QZ.list.length*100);
  const picks=QZ.picks[QZ.i];
  const locked=QZ.locked[QZ.i];
  const hintShown=QZ.hintOpen[QZ.i];
  let optsHtml=q.opts.map((o,k)=>{
    let cls='opt';
    if(picks.includes(k)) cls+=' sel';
    if(locked){
      if(q.ans.includes(k)) cls+=' correct';
      else if(picks.includes(k)) cls+=' wrong';
    }
    let mark='';
    if(locked){ if(q.ans.includes(k))mark='<span class="mark" style="color:var(--good)">✓</span>'; else if(picks.includes(k))mark='<span class="mark" style="color:var(--bad)">✗</span>';}
    return `<button class="${cls}" onclick="pick(${k})" ${locked?'disabled':''}>${o}${mark}</button>`;
  }).join('');
  const typeLabel = q.type==='ngn'?'<span class="pill ngn">NGN</span>':(isSATA?'<span class="pill med">Select All</span>':'');
  const hotLabel = q.hot?'<span class="pill hot">High-Yield</span>':'';
  const vaultLabel = QZ.isVault?`<span class="pill" style="background:rgba(255,159,80,.16);color:var(--warn);border:1px solid var(--warn)">Mastery ${vaultStreak(q)}/${MASTERY_NEEDED}</span>`:'';

  let rationaleHtml='';
  if(locked){
    const ok=arrEq(picks.slice().sort(),q.ans.slice().sort());
    let masteryNote='';
    if(QZ.isVault){
      const st=vaultStreak(q);
      if(ok && !STATE.vault[qSig(q)]) masteryNote=`<div style="margin-top:8px;color:var(--good)"><b>✓ Mastered!</b> ${MASTERY_NEEDED} correct in a row — this question returns to the main bank.</div>`;
      else if(ok) masteryNote=`<div style="margin-top:8px;color:var(--warn)">Streak: <b>${st}/${MASTERY_NEEDED}</b> — keep going to clear it from the vault.</div>`;
      else masteryNote=`<div style="margin-top:8px;color:var(--bad)">Streak reset to <b>0/${MASTERY_NEEDED}</b> — you'll see this one again.</div>`;
    } else if(!ok){
      masteryNote=`<div style="margin-top:8px;color:var(--warn)">📌 Added to your <b>Wrong-Answer Vault</b> — answer it correctly ${MASTERY_NEEDED}× to clear it.</div>`;
    }
    rationaleHtml=`<div class="rationale show ${ok?'ok':'no'}">
      <div class="rlbl">${ok?'✓ Correct':'✗ Not quite'}</div>
      <div><b>Correct answer:</b> ${q.ans.map(a=>q.opts[a]).join(' · ')}</div>
      <div style="margin-top:8px"><b>Why:</b> ${q.rat}</div>
      ${masteryNote}
    </div>`;
  }

  let hintHtml='';
  if(hintShown && !locked){
    hintHtml=`<div class="hintbox"><div class="lbl">💡 Hint</div>${hintFor(q)}</div>`;
  }

  app.innerHTML=`
    <div class="qmeta">
      <span class="pill" style="background:rgba(124,197,255,.12);color:${tc.color};border:1px solid ${tc.color}">${tc.label}</span>
      ${typeLabel} ${hotLabel} ${vaultLabel}
      <span style="margin-left:auto" class="mono">Q ${QZ.i+1} / ${QZ.list.length}</span>
    </div>
    <div class="qbar"><div style="width:${pct}%"></div></div>
    ${isSATA?'<div class="sata-note">⚠ Select ALL that apply — no partial credit on NCLEX.</div>':''}
    <div class="qstem">${q.stem}</div>
    ${optsHtml}
    ${hintHtml}
    ${rationaleHtml}
    <div class="btnrow">
      ${!locked?`<button class="btn ghost" onclick="toggleHint()">${hintShown?'Hide hint':'💡 Hint'}</button>`:''}
      ${!locked?`<button class="btn primary" onclick="lockAnswer()" ${picks.length?'':'disabled'}>Submit answer</button>`:''}
      ${locked && QZ.i<QZ.list.length-1?`<button class="btn primary" onclick="nextQ()">Next →</button>`:''}
      ${locked && QZ.i===QZ.list.length-1?`<button class="btn gold" onclick="finishQuiz()">See results</button>`:''}
      ${QZ.i>0?`<button class="btn ghost" onclick="prevQ()">← Back</button>`:''}
      <button class="btn ghost" onclick="exitQuiz()">Exit</button>
    </div>`;
}
function toggleHint(){QZ.hintOpen[QZ.i]=!QZ.hintOpen[QZ.i];renderQuiz()}
function arrEq(a,b){if(a.length!==b.length)return false;const x=a.slice().sort((m,n)=>m-n),y=b.slice().sort((m,n)=>m-n);return x.every((v,i)=>v===y[i])}
function isMulti(q){return q.type==='sata'||q.type==='ngn'}
function pick(k){
  if(QZ.locked[QZ.i])return;
  const q=QZ.list[QZ.i], picks=QZ.picks[QZ.i];
  if(isMulti(q)){
    const idx=picks.indexOf(k); if(idx>-1)picks.splice(idx,1); else picks.push(k);
  } else { QZ.picks[QZ.i]=[k]; }
  renderQuiz();
}
function lockAnswer(){
  QZ.locked[QZ.i]=true;
  const q=QZ.list[QZ.i];
  const ok=arrEq(QZ.picks[QZ.i].slice().sort(),q.ans.slice().sort());
  recordAnswer(q,ok);
  renderTabs(); // refresh vault count badge
  renderQuiz();
}
function nextQ(){if(QZ.i<QZ.list.length-1){QZ.i++;renderQuiz();window.scrollTo({top:0,behavior:'smooth'})}}
function prevQ(){if(QZ.i>0){QZ.i--;renderQuiz();window.scrollTo({top:0,behavior:'smooth'})}}
function exitQuiz(){CURRENT=QZ.backTab;renderTabs();renderApp()}
function finishQuiz(){
  let correct=0;
  QZ.list.forEach((q,i)=>{ if(arrEq(QZ.picks[i].slice().sort(),q.ans.slice().sort()))correct++; });
  const score=Math.round(correct/QZ.list.length*100);
  if(QZ.isExam){ STATE.examsTaken++; if(score>STATE.bestExam)STATE.bestExam=score; save(); }
  const wrongs=QZ.list.map((q,i)=>({q,i})).filter(x=>!arrEq(QZ.picks[x.i].slice().sort(),x.q.ans.slice().sort()));
  const app=document.getElementById('app');
  const ring = score>=80?'var(--good)':score>=65?'var(--gold)':'var(--bad)';
  const vaultN=vaultList().length;
  app.innerHTML=`
    <div class="card scorecard">
      <div class="big">${score}%</div>
      <div style="color:var(--ink-dim)">${correct} of ${QZ.list.length} correct</div>
      <svg class="donut" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--card2)" stroke-width="3"/>
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="${ring}" stroke-width="3"
          stroke-dasharray="${score} ${100-score}" stroke-dashoffset="25" stroke-linecap="round"/>
      </svg>
      <div style="margin-top:6px">${score>=80?'Strong — you are exam-ready on this set.':score>=65?'Solid. Hit the misses below.':'Review the rationales below, then retake.'}</div>
      <div class="btnrow" style="justify-content:center">
        <button class="btn primary" onclick="retake()">Retake</button>
        ${vaultN?`<button class="btn gold" onclick="go('vault')">Study vault (${vaultN})</button>`:''}
        <button class="btn ghost" onclick="exitQuiz()">Done</button>
      </div>
    </div>
    ${wrongs.length?`<div class="card"><h2>📕 Review your misses (${wrongs.length})</h2>${
      wrongs.map(x=>`<div style="border-top:1px solid var(--line);padding:12px 0">
        <div style="font-weight:600;margin-bottom:6px">${x.q.stem}</div>
        <div style="color:var(--good);font-size:.9rem"><b>Correct:</b> ${x.q.ans.map(a=>x.q.opts[a]).join(' · ')}</div>
        <div style="color:var(--ink-dim);font-size:.88rem;margin-top:5px"><b>Why:</b> ${x.q.rat}</div>
      </div>`).join('')
    }</div>`:`<div class="card center"><h2>🎉 Perfect set — no misses!</h2></div>`}`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function retake(){
  if(QZ.isVault){ startVaultSession(); return; }
  if(QZ.isExam){ startExam(QZ.list.length>=QBANK.length?'all':QZ.list.length, null, QZ.title); return; }
  startQuiz(QZ.list[0].topic, QZ.title);
}

  <ul class="clean">
    <li><b>Less physiologic reserve</b> — the master principle.</li>
    <li>New/acute confusion = <b>delirium</b> (reversible emergency); often a UTI sign.</li>
    <li>Delirium = acute/reversible · dementia = chronic/irreversible.</li>
    <li>Meds: <b>start low, go slow</b>; watch polypharmacy.</li>
    <li>Geriatric triad: cognition, <b>falls</b>, incontinence.</li>
  </ul></div>

  <div class="hy"><div class="lbl">Chronic illness, Maslow & nursing process</div>
  <ul class="clean">
    <li><b>Chronic = incurable</b> → manage symptoms, prevent complications.</li>
    <li><b>Maslow</b>: physiologic (ABCs/oxygen) before psychosocial.</li>
    <li><b>ADPIE</b>: Assess → Diagnose → Plan → Implement → Evaluate (assess first, evaluate last).</li>
    <li>People-first language; modifiable risk factors (tobacco, diet, inactivity, alcohol).</li>
  </ul></div>

  <div class="hy"><div class="lbl">Cancer</div>
  <ul class="clean">
    <li>Cancer = uncontrolled growth that <b>invades + metastasizes</b> (blood/lymph) and drains nutrition.</li>
    <li>Carcinogenesis: <b>initiation → promotion → progression</b>.</li>
    <li>Chemo/radiation hit <b>marrow, GI lining, hair</b>; ANC <500 = severe neutropenia.</li>
    <li>Prevention: <b>primary</b> (vaccines, no tobacco) → <b>secondary</b> (screening) → <b>tertiary</b> (survivor monitoring).</li>
    <li>Surgery types: diagnostic, primary/curative, prophylactic, palliative, reconstructive.</li>
  </ul></div>

  <div class="hy"><div class="lbl">Perioperative</div>
  <ul class="clean">
    <li>Preop = <b>prepare the patient</b>; nurse witnesses consent (surgeon explains), signed before sedation.</li>
    <li>Intraop = <b>safety</b>: positioning, counts, time-out; OR fire = O2 + ignition + fuel.</li>
    <li><b>MH</b>: early = tachycardia + ↑EtCO2 + jaw rigidity; late = temp spike → <b>dantrolene</b>.</li>
    <li>Atelectasis = most common postop respiratory complication (incentive spirometry).</li>
    <li><b>High-Fowler's</b> = best position to enhance breathing.</li>
  </ul></div>

  <div class="hy"><div class="lbl">Postop / End-of-life / Meds</div>
  <ul class="clean">
    <li>Hemorrhage = ↓BP + ↑HR <b>trend</b> → escalate chain of command. PCA: patient only.</li>
    <li>Palliative = comfort at any stage (alongside curative); hospice = terminal (~6 mo).</li>
    <li>Reversals: opioids→<b>naloxone</b>, benzos/Versed→<b>flumazenil</b>, MH→<b>dantrolene</b>.</li>
    <li>Versed = sedation + amnesia (not analgesia); watch respiratory depression.</li>
  </ul></div>

  <div class="btnrow"><button class="btn gold" onclick="startHotExam()">Quiz the high-yield set (${hot.length} Q)</button></div>`;
}
