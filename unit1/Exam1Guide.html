<header class="top">
  <div class="top-inner">
    <div class="brand"><b>NUR256 · Med-Surg 1</b><span>Aging · Chronic Illness · Cancer · Perioperative · End-of-Life</span></div>
    <div class="prog-mini" id="progMini">Questions answered: <b id="pmCount">0</b></div>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<div class="wrap" id="app"></div>

<div class="toast" id="toast"></div>
<footer>Built for Des · NUR256 exam prep · Drugs are mapped to the diseases they treat.<br>Your progress saves automatically on this device.</footer>

<script>
/* ============================================================
   NUR256 Med-Surg 1 — Exam Study Guide
   Sourced from Ch 7,8,12,13,14,15,16 lecture slides
   topic: aging|chronic|cancer|pre|intra|post|eol|meds
   type:  mc | sata | ngn
   hot:true  => high-yield / instructor-emphasized
   ============================================================ */
const QBANK = [
/* ---------------- SYSTEMIC AGING (head-to-toe) ---------------- */
{topic:"aging",type:"mc",hot:true,
 stem:"The master principle that explains why older adults tolerate illness, surgery, and medications poorly is that aging reduces:",
 opts:["Intelligence and memory","Physiologic reserve in every body system","The number of chronic diseases","The need for medications"],
 ans:[1],
 rat:"Aging = <b>less physiologic reserve</b>. Each system still works at rest but has little extra capacity to handle stress (surgery, infection, blood loss, new drugs). This single idea drives nearly every geriatric exam answer."},

{topic:"aging",type:"sata",hot:true,
 stem:"Which are NORMAL age-related (head-to-toe) changes the nurse expects in a healthy older adult? Select all that apply.",
 opts:["Decreased aerobic capacity (~10% per decade)","Decreased skin elasticity and thinner dermis","Decreased kidney mass and filtration rate","Sudden confusion and severe memory loss","Decreased gastric motility and slower absorption"],
 ans:[0,1,2,4],
 rat:"Normal aging: lungs lose aerobic capacity, skin thins/loses elasticity, kidneys lose nephrons and GFR, GI motility slows. <b>Sudden confusion is NOT normal aging</b> — it signals delirium, infection, or another acute problem and must be reported."},

{topic:"aging",type:"mc",hot:true,
 stem:"An 80-year-old is admitted with a UTI. The family says 'she was fine yesterday, now she's confused and agitated.' The nurse recognizes this new confusion as:",
 opts:["Expected dementia of aging","A normal response to hospitalization","Possible delirium — a medical emergency to report","A sign she needs restraints"],
 ans:[2],
 rat:"New, acute confusion = <b>delirium</b>, which is reversible but a medical emergency. In older adults, infection often presents as confusion rather than fever. Delirium is acute/fluctuating; dementia is chronic/gradual. Report immediately and find the cause."},

{topic:"aging",type:"mc",
 stem:"When administering medications to an older adult, the safest guiding principle is:",
 opts:["Start high to ensure effect","Start low and go slow","Give all medications at the same time","Avoid assessing kidney/liver function"],
 ans:[1],
 rat:"Altered pharmacokinetics (less body water, more fat, lower liver/kidney function) means drugs last longer and accumulate. <b>Start low, go slow</b>, simplify the regimen, and watch for polypharmacy and Beers-criteria drugs."},

{topic:"aging",type:"mc",
 stem:"The 'geriatric triad' the nurse focuses on preventing during hospitalization includes changes in cognition, incontinence, and:",
 opts:["Falls","Pressure injuries","Polypharmacy","Malnutrition"],
 ans:[0],
 rat:"The classic <b>geriatric triad</b> is cognitive changes, <b>falls</b>, and incontinence. Pressure injuries, polypharmacy, and malnutrition are all real geriatric concerns and common distractors, but they are not the three that define the named triad — falls completes it."},

/* ---------------- CHRONIC ILLNESS / DISABILITY ---------------- */
{topic:"chronic",type:"mc",hot:true,
 stem:"A patient newly diagnosed with type 2 diabetes asks, 'When will this be cured?' The nurse's most accurate response reflects that a chronic illness is:",
 opts:["A condition that resolves once blood glucose normalizes","An ongoing, incurable condition managed long-term to prevent complications","A condition controlled by medication alone without lifestyle change","A temporary illness that becomes acute during flare-ups"],
 ans:[1],
 rat:"<b>Chronic = incurable</b> (CDC: lasts 1+ year, needs ongoing care). Normalizing glucose controls but does not cure it; medication alone is not enough — diet, activity, and self-management matter; and a chronic illness is not 'temporary' even though it can have acute flares. The goal is managing symptoms and preventing complications."},

{topic:"chronic",type:"mc",
 stem:"Which statement uses correct people-first language?",
 opts:["The diabetic patient in room 4","The patient with diabetes in room 4","The patient suffering from diabetes in room 4","The diabetes patient in room 4"],
 ans:[1],
 rat:"<b>People-first language</b> puts the person before the condition: 'patient WITH diabetes.' 'Diabetic patient' and 'diabetes patient' still lead with the disease as a label, and 'suffering from' adds a negative, pity-based framing. The differences are subtle on purpose — people-first phrasing is specifically 'person with [condition].' Always honor individual preference."},

{topic:"chronic",type:"sata",
 stem:"Which are modifiable risk factors for chronic disease the nurse targets in teaching? Select all that apply.",
 opts:["Tobacco use","Diet low in fruits/vegetables, high in sodium","Family genetics","Physical inactivity","Excessive alcohol use"],
 ans:[0,1,3,4],
 rat:"Modifiable: tobacco, poor diet/high sodium, inactivity, excess alcohol. <b>Genetics is non-modifiable.</b> Health promotion focuses on what the patient can change."},

{topic:"chronic",type:"mc",hot:true,
 stem:"U.S. veterans have a higher prevalence of multiple chronic conditions. Which combination is specifically noted as common in male veterans?",
 opts:["Hypertension, arthritis, and COPD","Asthma, eczema, and seasonal allergies","Type 1 diabetes, epilepsy, and migraines","Anxiety, IBS, and chronic sinusitis"],
 ans:[0],
 rat:"Male veterans most commonly carry <b>hypertension, arthritis, and COPD</b> (with CAD/cancer rising after 65). The other clusters are all real chronic conditions, but they are not the combination specifically noted as most prevalent in male veterans — the MCC pattern reflects age, service exposures, and cardiopulmonary risk."},

/* ---------------- CANCER: how it affects the body ---------------- */
{topic:"cancer",type:"mc",hot:true,
 stem:"Carcinogenesis (how a normal cell becomes cancer) occurs in three steps. The correct order is:",
 opts:["Promotion → initiation → progression","Initiation → promotion → progression","Progression → promotion → initiation","Metastasis → initiation → promotion"],
 ans:[1],
 rat:"<b>Initiation</b> (DNA mutation) → <b>promotion</b> (repeated exposure makes mutated cells proliferate; reversible if agent removed) → <b>progression</b> (cells become malignant, grow blood supply via angiogenesis, invade, and metastasize)."},

{topic:"cancer",type:"sata",hot:true,
 stem:"How does cancer harm the body? Select all that apply.",
 opts:["Uncontrolled cell growth with no physiologic demand","Invades and destroys surrounding normal tissue","Spreads (metastasizes) via blood and lymph","Remains encapsulated within a fibrous capsule","Competes for nutrients, causing cachexia/weight loss"],
 ans:[0,1,2,4],
 rat:"Malignant cells grow without control, invade and destroy tissue, metastasize via blood/lymph, and drain nutrition (cachexia). The trap is <b>'remains encapsulated within a fibrous capsule'</b> — that describes a BENIGN tumor; malignant tumors are non-encapsulated and infiltrate surrounding tissue. Read this one carefully, because the distractor uses correct-sounding pathology terms."},

{topic:"cancer",type:"mc",hot:true,
 stem:"Chemotherapy and radiation damage normal cells that divide rapidly. Which tissues are therefore most affected (and most sensitive on the exam)?",
 opts:["Muscle and brain","Bone marrow, GI epithelium, hair follicles","Bone and cartilage","Tendons and ligaments"],
 ans:[1],
 rat:"Rapidly dividing tissues take the hit: <b>bone marrow</b> (→ anemia, neutropenia, thrombocytopenia), <b>GI lining</b> (→ nausea, mucositis, diarrhea), and <b>hair follicles</b> (→ alopecia). Muscle/brain are slow-dividing and radioresistant."},

{topic:"cancer",type:"mc",
 stem:"The TNM staging system describes a solid tumor. What does each letter stand for?",
 opts:["Tumor grade, Number of nodes, Mitotic rate","Tumor size/extent, regional lymph Nodes, distant Metastasis","Tissue type, Necrosis level, Malignancy score","Tumor location, Nuclear features, Metastatic risk"],
 ans:[1],
 rat:"<b>T</b> = primary tumor size/extent · <b>N</b> = regional lymph Nodes · <b>M</b> = distant Metastasis. The distractors mix in real oncology words (grade, mitotic rate, necrosis, nuclear features) that belong to <b>grading</b>, not staging — staging (TNM) describes how far cancer has spread, while grading describes how abnormal the cells look. Don't confuse the two."},

{topic:"cancer",type:"ngn",hot:true,
 stem:"NGN — Cancer prevention levels. A nurse plans community cancer programs. Match the action to the correct prevention level by selecting the PRIMARY-prevention activities. Select all that apply.",
 opts:["Administering the HPV vaccine","Teaching tobacco cessation and healthy diet","Screening mammography to find early cancer","Monitoring a survivor for a second cancer","HBV vaccination to prevent liver cancer"],
 ans:[0,1,4],
 rat:"<b>Primary</b> = prevent cancer before it starts: HPV/HBV vaccines, tobacco cessation, diet/activity. <b>Secondary</b> = screening/early detection (mammography, colonoscopy, Pap). <b>Tertiary</b> = monitoring survivors for recurrence/second cancers."},

{topic:"cancer",type:"mc",
 stem:"Which is an example of SECONDARY cancer prevention?",
 opts:["HPV vaccination","A low-dose CT lung screening in a smoker","Removing a high-risk colon prophylactically","Survivorship surveillance for recurrence"],
 ans:[1],
 rat:"Secondary prevention = <b>screening and early detection</b> (mammography, colonoscopy, Pap/HPV testing, low-dose CT for smokers). Vaccination is primary; survivorship monitoring is tertiary."},

{topic:"cancer",type:"sata",hot:true,
 stem:"Surgery is used for cancer in several ways. Match the TYPE of cancer surgery to its purpose — select all that are correctly paired.",
 opts:["Diagnostic: biopsy to obtain tissue for analysis","Prophylactic: remove high-risk tissue before cancer develops","Palliative: relieve symptoms (obstruction, pain) without cure","Reconstructive: restore function or appearance","Curative surgery means the tumor can never recur"],
 ans:[0,1,2,3],
 rat:"<b>Diagnostic</b> = biopsy (excisional/incisional/needle, SLNB). <b>Prophylactic</b> = remove high-risk tissue (e.g., mastectomy/colectomy with BRCA or FAP). <b>Palliative</b> = comfort, e.g., debulking, colostomy for obstruction. <b>Reconstructive</b> = function/cosmetic. 'Curative' removes all visible tumor but does not guarantee no recurrence."},

{topic:"cancer",type:"mc",hot:true,
 stem:"The patient's absolute neutrophil count (ANC) is 450/mm³ after chemotherapy. The nurse's priority is to:",
 opts:["Place the patient in airborne isolation with an N95 for staff","Implement neutropenic (protective) precautions and monitor for any sign of infection","Administer a prophylactic broad-spectrum antibiotic now","Transfuse packed red blood cells to raise the count"],
 ans:[1],
 rat:"<b>ANC < 500 = severe neutropenia</b> (nadir ~7–14 days post-chemo). Priority is <b>protective/neutropenic precautions</b> + watching for infection (fever may be the only sign). Airborne isolation/N95 protects against airborne pathogens, not the patient's own low immunity. Antibiotics are given for actual infection/per protocol, not reflexively. RBC transfusion treats anemia (low H&H), not neutropenia — neutrophils are white cells. The tempting wrong answers all 'sound' like infection care."},

/* ---------------- PREOPERATIVE: prepare the patient ---------------- */
{topic:"pre",type:"mc",hot:true,
 stem:"The overall GOAL of preoperative nursing is to:",
 opts:["Obtain the surgical consent signature and complete the chart","Prepare the patient physically and psychologically and optimize their health before surgery","Begin discharge teaching and arrange home care","Establish IV access and administer preoperative antibiotics"],
 ans:[1],
 rat:"The overall GOAL of preop nursing is to <b>prepare the patient (body and mind) and make them as healthy/low-risk as possible</b> before surgery. The others are real preop NURSING TASKS that fall under that goal — witnessing consent, discharge planning, IV access/antibiotics — but they are specific actions, not the overarching goal. Watch for 'goal' vs. 'task' wording."},

{topic:"pre",type:"mc",hot:true,
 stem:"Regarding informed consent, the nurse's role is to:",
 opts:["Provide a detailed explanation of the procedure, risks, and alternatives","Witness the voluntary signature and verify understanding, notifying the surgeon if there are gaps","Have the patient sign before giving the preoperative sedative, then proceed regardless of questions","Obtain a family member's signature when the patient is anxious"],
 ans:[1],
 rat:"The <b>surgeon explains</b> procedure/risks/alternatives; the <b>nurse witnesses</b> the signature and verifies understanding, alerting the surgeon to any gaps. The 'sign before sedation' option is half-right (consent IS signed before psychoactive meds) but wrong because the nurse must NOT proceed if the patient still has questions. A family member signs only if the patient is legally unable to consent — not merely anxious. The plausible half-truths are the trap."},

{topic:"pre",type:"sata",
 stem:"Preoperative teaching to prevent postoperative complications includes which of the following? Select all that apply.",
 opts:["Deep breathing and incentive spirometer use","Coughing and splinting the incision","Early ambulation and leg exercises","Holding all breathing exercises until pain-free","Turning and repositioning"],
 ans:[0,1,2,4],
 rat:"Teach <b>deep breathing + incentive spirometry</b> (prevents atelectasis/pneumonia), <b>coughing with splinting</b>, <b>leg exercises + early ambulation</b> (prevents VTE/stasis), and turning. Waiting until pain-free would let complications develop."},

{topic:"pre",type:"mc",
 stem:"An adult is scheduled for elective surgery in the morning. NPO teaching based on ERAS/guidelines is:",
 opts:["NPO for a full 24 hours before surgery, including all liquids","Fast 8 hr after fatty food and 6 hr after a light meal/milk; clear liquids may be allowed up to 2 hr before","Stop solids at midnight but allow milk and juice up to the time of surgery","NPO after midnight for everything, with no exceptions for clear liquids"],
 ans:[1],
 rat:"Current ERAS guidance: ~8 hr after fatty/fried food, 6 hr after a light meal or milk, and <b>clear liquids up to 2 hr</b> before elective surgery — this prevents aspiration without unnecessary dehydration. '24 hours NPO' over-restricts; milk/juice are NOT clear liquids and need 6 hr; the rigid 'NPO after midnight, no exceptions' is the outdated practice ERAS replaced. The distractors are all old or near-miss rules."},

{topic:"pre",type:"mc",
 stem:"During medication reconciliation, the nurse notes the patient takes daily aspirin. The expected preoperative instruction is to:",
 opts:["Hold the aspirin only on the morning of surgery","Stop aspirin/antiplatelets about 7–10 days before surgery","Continue aspirin through surgery since it is over-the-counter","Switch the aspirin to an NSAID until the day of surgery"],
 ans:[1],
 rat:"Aspirin irreversibly inhibits platelets for their ~7–10 day lifespan, so it is <b>stopped about 7–10 days pre-op</b> — not just the morning of (too late to recover platelet function). 'OTC so continue' is a trap: being non-prescription doesn't make it safe before surgery. Switching to an NSAID also impairs platelets/raises bleeding risk. Always reconcile and report the full med/herbal list."},

/* ---------------- INTRAOPERATIVE: safety, positioning, MH, fire ---------------- */
{topic:"intra",type:"mc",hot:true,
 stem:"The circulating nurse's intraoperative priorities center on patient SAFETY. Which is a key responsibility?",
 opts:["Setting up the sterile field and passing instruments to the surgeon","Coordinating the room: positioning, counts, asepsis, and verifying patient/site at the time-out","Continuously monitoring vital signs and titrating the anesthetic","Documenting and labeling the tissue specimens at the field"],
 ans:[1],
 rat:"The <b>circulating nurse</b> manages the whole room from outside the sterile field — positioning, sponge/needle/instrument counts, asepsis, and time-out verification. Setting up the sterile field and passing instruments is the <b>scrub</b> role; monitoring/titrating anesthesia is the <b>CRNA/anesthesiologist</b>; specimen handling is shared but is a task, not the circulator's central safety role. Each distractor is a real OR job assigned to the wrong person."},

{topic:"intra",type:"sata",hot:true,
 stem:"To prevent perioperative POSITIONING injury, the nurse should: Select all that apply.",
 opts:["Pad bony prominences","Maintain correct anatomic alignment","Avoid hyperextending joints","Compress arteries to reduce bleeding","Protect nerves from pressure"],
 ans:[0,1,2,4],
 rat:"Proper positioning prevents <b>nerve, skin, and circulatory injury</b>: pad bony prominences, keep alignment, avoid hyperextension, and protect nerves/vessels. You would <b>never</b> compress arteries — that causes ischemia."},

{topic:"intra",type:"mc",hot:true,
 stem:"The OR is a high fire-risk environment. The fire triangle the team controls consists of an oxidizer (oxygen), an ignition source, and:",
 opts:["Static electricity from the OR table","Fuel — surgical drapes, alcohol-based prep, and gases","Heat generated by the patient's body","Friction from surgical instruments"],
 ans:[1],
 rat:"The fire triangle = oxidizer (oxygen/nitrous), ignition source (laser/electrocautery), and <b>fuel</b> (drapes, alcohol-based prep, GI/airway gases). Static, body heat, and friction sound fire-related but are not the controllable 'fuel' leg — the team manages fuel by letting alcohol prep dry and keeping drapes clear of ignition sources."},

{topic:"intra",type:"ngn",hot:true,
 stem:"NGN — Malignant hyperthermia. Minutes after induction with a volatile anesthetic and succinylcholine, a patient develops HR 168, rising end-tidal CO2, and jaw rigidity. Select ALL appropriate nursing actions/recognitions.",
 opts:["Recognize this as malignant hyperthermia","Anticipate giving dantrolene","Continue the triggering anesthetic","Initiate cooling measures and 100% oxygen","Expect a rapid rise in temperature as a LATE sign"],
 ans:[0,1,3,4],
 rat:"MH is a genetic hypermetabolic crisis triggered by <b>volatile anesthetics + succinylcholine</b>. EARLY signs: tachycardia, rising EtCO2 (hypercapnia), masseter/jaw rigidity. <b>Temperature spike is a LATE sign.</b> Treatment: STOP the trigger, give <b>dantrolene</b>, cool the patient, 100% O2, correct acidosis/electrolytes. Continuing the trigger would be fatal."},

{topic:"intra",type:"mc",
 stem:"Which early sign would alert the nurse to malignant hyperthermia FIRST?",
 opts:["A late, sudden temperature spike to 107°F","Unexplained tachycardia and rising end-tidal CO2","Bradycardia and hypothermia","Decreased blood pressure only"],
 ans:[1],
 rat:"The <b>earliest</b> signs are unexplained <b>tachycardia and hypercapnia (rising EtCO2)</b>, often with jaw rigidity. The dramatic temperature rise is a <b>late</b> sign — waiting for it costs critical time."},

{topic:"intra",type:"mc",hot:true,
 stem:"All nurses, especially perioperative nurses, must screen for and prevent reactions to which common OR allergen?",
 opts:["Chlorhexidine skin prep","Latex","Povidone-iodine prep","Adhesive tape"],
 ans:[1],
 rat:"<b>Latex</b> is the OR allergen every nurse must screen for and prevent (gloves, tubing, tourniquets) — reactions range from contact dermatitis to anaphylaxis. Chlorhexidine, iodine prep, and adhesives CAN cause reactions too, which makes them tempting, but latex is the classic, high-risk perioperative allergen with formal at-risk groups and latex-free protocols."},

/* ---------------- POSTOPERATIVE ---------------- */
{topic:"post",type:"mc",hot:true,
 stem:"On admission to the PACU, the nurse's FIRST priority assessment is:",
 opts:["Level of consciousness and orientation","Airway patency, breathing, and circulation","Pain level and last analgesic given","Surgical site, dressing, and drainage"],
 ans:[1],
 rat:"PACU priority is always <b>ABCs</b> — anesthesia depresses airway reflexes and respiration, so a patent airway/oxygenation comes first. LOC, pain, and the surgical site are all genuinely assessed in PACU (not throwaways), but they come AFTER you've confirmed the patient is breathing and perfusing. Use the airway-first rule when options are all real assessments."},

{topic:"post",type:"ngn",hot:true,
 stem:"NGN — A patient is 6 hours post-abdominal surgery. BP has trended 118/76 → 96/58, HR 88 → 122, urine output is dropping, and the dressing has increasing bright-red drainage. Select ALL appropriate nursing actions.",
 opts:["Recognize signs of hypovolemic/hemorrhagic shock","Notify the surgeon/escalate through the chain of command","Document and recheck in 4 hours only","Increase monitoring of vital signs and output","Assess the wound and apply pressure as indicated"],
 ans:[0,1,3,4],
 rat:"Falling BP + rising HR + falling urine output + bright-red drainage = <b>hemorrhage/hypovolemic shock</b>. Act now: recognize the trend, increase monitoring, assess/apply pressure to the wound, and <b>escalate up the chain of command</b>. Waiting 4 hours could be fatal — trends matter more than a single value."},

{topic:"post",type:"mc",hot:true,
 stem:"The most common respiratory complication after surgery, which incentive spirometry helps prevent, is:",
 opts:["Pneumonia","Atelectasis","Pulmonary embolism","Aspiration"],
 ans:[1],
 rat:"<b>Atelectasis</b> (alveolar collapse from shallow breathing/anesthesia) is the MOST COMMON postop respiratory complication and the one incentive spirometry directly targets. Pneumonia often FOLLOWS untreated atelectasis; PE and aspiration are serious but far less common. All four are real postop respiratory problems, so this tests 'most common,' not recognition."},

{topic:"post",type:"mc",
 stem:"A patient has a PCA (patient-controlled analgesia) pump. Which instruction is correct?",
 opts:["A family member may press the button if the patient is too sedated to do so","Only the patient should press the dose button","The nurse should press the button on a fixed schedule for steady relief","Encourage pressing the button before activity even without pain"],
 ans:[1],
 rat:"<b>Only the patient</b> presses the PCA button — that is the built-in overdose safeguard, since an over-sedated patient physically can't press it. 'PCA by proxy' (family or nurse pressing) defeats the safety and is prohibited. Pre-emptively dosing 'before activity without pain' risks oversedation. The distractors all sound caring/helpful, which is the trap."},

{topic:"post",type:"mc",
 stem:"A postoperative patient's abdominal wound edges separate and a loop of bowel protrudes. This is evisceration. The nurse's immediate action is to:",
 opts:["Gently reduce the protruding bowel back into the abdomen and reinforce the dressing","Cover with sterile saline-moistened gauze, position low-Fowler with knees flexed, keep NPO, and call the surgeon","Apply a dry pressure dressing and continue the patient's diet as ordered","Cover with a dry sterile dressing and reassess at the next scheduled round"],
 ans:[1],
 rat:"For evisceration: <b>cover with sterile SALINE-MOISTENED gauze</b> (keeps tissue viable), low-Fowler with knees bent (reduces tension), NPO (likely return to OR), monitor for shock, and notify the surgeon NOW. Never push organs back in (infection/damage). A DRY dressing lets tissue dry out and die, and 'continue diet/reassess later' dangerously delays. The wrong answers are near-misses (dry vs. moist, delay vs. act)."},

/* ---------------- BEST POSITION FOR BREATHING ---------------- */
{topic:"post",type:"mc",hot:true,
 stem:"A patient is short of breath. To maximize breathing capacity and lung expansion, the nurse positions the patient in:",
 opts:["Supine flat","High-Fowler (sitting upright ~90°)","Trendelenburg (head down)","Prone"],
 ans:[1],
 rat:"<b>High-Fowler's (upright sitting)</b> is the best position to enhance breathing — it drops the diaphragm, increases lung expansion and chest excursion, and eases the work of breathing. Flat/Trendelenburg positions push abdominal contents against the diaphragm and worsen dyspnea."},

/* ---------------- MASLOW + NURSING PROCESS ---------------- */
{topic:"chronic",type:"mc",hot:true,
 stem:"Using Maslow's hierarchy to prioritize, which patient need does the nurse address FIRST?",
 opts:["A patient crying because family hasn't visited","A patient with an oxygen saturation of 86% on room air","A patient anxious about losing independence after surgery","A patient asking for help completing advance-directive paperwork"],
 ans:[1],
 rat:"By <b>Maslow</b>, physiologic survival needs (airway/breathing/circulation) outrank safety and all psychosocial needs. The <b>O2 sat of 86%</b> is a physiologic emergency, so it comes first. The other three are genuine needs (belonging, esteem, self-actualization) a nurse addresses — just not before oxygenation. None are labeled with their level here, so you have to classify them yourself."},

{topic:"chronic",type:"mc",hot:true,
 stem:"The nurse is applying the nursing process. What is the correct order of its steps (ADPIE)?",
 opts:["Assessment → Diagnosis → Planning → Implementation → Evaluation","Diagnosis → Assessment → Implementation → Planning → Evaluation","Planning → Assessment → Diagnosis → Evaluation → Implementation","Implementation → Evaluation → Assessment → Diagnosis → Planning"],
 ans:[0],
 rat:"<b>ADPIE</b>: <b>A</b>ssessment (collect data) → <b>D</b>iagnosis (analyze) → <b>P</b>lanning (set goals/outcomes) → <b>I</b>mplementation (act) → <b>E</b>valuation (did it work?). Always assess first; evaluate last. If a step is missing or out of order, it's wrong."},

{topic:"chronic",type:"ngn",
 stem:"NGN — The nurse begins caring for a newly admitted patient with heart failure. Which action represents the ASSESSMENT step of the nursing process? Select all that apply.",
 opts:["Auscultating lung sounds and weighing the patient","Reviewing the patient's reported shortness of breath","Setting a goal of 'clear lung sounds by discharge'","Administering the prescribed diuretic","Measuring oxygen saturation and edema"],
 ans:[0,1,4],
 rat:"<b>Assessment</b> = collecting subjective and objective data: lung sounds, weight, reported symptoms, O2 sat, edema. Setting a goal is <b>planning</b>; giving the diuretic is <b>implementation</b>. Knowing which step an action belongs to is a classic NGN format."},

/* ---------------- END-OF-LIFE / PALLIATIVE ---------------- */
{topic:"eol",type:"mc",hot:true,
 stem:"A patient asks the difference between palliative care and hospice. The nurse correctly explains that palliative care:",
 opts:["Is only for the last days of life","Focuses on comfort/quality of life and can be given ALONGSIDE curative treatment at any stage","Means stopping all treatment","Is the same as a DNR order"],
 ans:[1],
 rat:"<b>Palliative care</b> = comfort and quality of life, appropriate at <b>any age or stage</b> and given alongside curative treatment. <b>Hospice</b> is a subset of palliative care for terminal illness (prognosis ~6 months) when the focus shifts fully to comfort."},

{topic:"eol",type:"mc",
 stem:"Which document translates a seriously ill patient's wishes into portable medical orders signed by a provider?",
 opts:["A living will only","POLST (Physician Orders for Life-Sustaining Treatment)","A hospital admission form","An insurance card"],
 ans:[1],
 rat:"<b>POLST</b> converts patient preferences into actionable medical orders that transfer across care settings, signed by patient/surrogate and provider. Advance directives also include the living will and durable power of attorney for health care."},

{topic:"eol",type:"sata",
 stem:"According to Kübler-Ross, which are recognized stages of grief? Select all that apply.",
 opts:["Denial","Anger","Bargaining","Depression","Acceptance"],
 ans:[0,1,2,3,4],
 rat:"Kübler-Ross stages: <b>denial, anger, bargaining, depression, acceptance</b>. Newer models recognize grief is nonlinear and people oscillate between loss- and restoration-oriented coping (Dual Process Model)."},

{topic:"eol",type:"mc",
 stem:"When using the FICA spiritual assessment, the 'F' stands for:",
 opts:["Family support system","Faith and belief","Feelings about death","Final wishes"],
 ans:[1],
 rat:"In <b>FICA</b>, F = <b>Faith and belief</b> ('Do you consider yourself spiritual/religious? What gives your life meaning?'). The distractors are all genuinely part of a holistic end-of-life assessment — family, feelings about dying, final wishes — which makes them tempting, but the FICA acronym specifically begins with Faith (then Importance, Community, Address in care)."},

{topic:"eol",type:"mc",hot:true,
 stem:"Which nursing action best supports HOPE for a terminally ill patient?",
 opts:["Reassuring the patient that a new treatment may still cure them","Controlling pain and helping the patient set meaningful, achievable short-term goals","Focusing conversations on positive topics and steering away from death","Encouraging the family to stay upbeat and hide their own grief"],
 ans:[1],
 rat:"Realistic hope at end of life comes from <b>symptom control, dignity, connection, and achievable goals</b> (e.g., a comfortable day, a visit) — not cure. False reassurance about a 'cure' sets up distrust; steering away from death and masking grief block the honest, therapeutic communication dying patients and families need. The wrong answers look kind but are subtly harmful — that's the test."},

/* ---------------- MEDS ↔ DISEASE (connect drug to condition) ---------------- */
{topic:"meds",type:"mc",hot:true,
 stem:"Versed (midazolam) is given for moderate sedation before a procedure. The nurse understands its PURPOSE and disease connection is:",
 opts:["It provides deep general anesthesia and muscle paralysis for surgery","It provides sedation and amnesia (not analgesia) for procedures/anxiety; reversed by flumazenil","It is a potent opioid analgesic for procedural pain control","It is given to blunt the gag reflex and dry oral secretions"],
 ans:[1],
 rat:"<b>Versed (midazolam)</b> is a benzodiazepine for <b>moderate sedation + amnesia</b> — NOT general anesthesia, NOT analgesia. Reversal = <b>flumazenil</b>; #1 risk = respiratory depression. It does not paralyze (that's neuromuscular blockers), it's not an opioid (opioids handle pain), and drying secretions is anticholinergics like atropine. Every distractor is a real periop drug effect — assigned to the wrong drug."},

{topic:"meds",type:"mc",hot:true,
 stem:"A patient with malignant hyperthermia needs emergency drug therapy. Which medication treats the condition?",
 opts:["Naloxone","Dantrolene","Flumazenil","Epinephrine"],
 ans:[1],
 rat:"<b>Dantrolene</b> is the antidote for <b>malignant hyperthermia</b> — it's a skeletal muscle relaxant that stops the hypermetabolic calcium release. (Naloxone→opioids, flumazenil→benzodiazepines.)"},

{topic:"meds",type:"mc",hot:true,
 stem:"A postoperative patient on opioid analgesia has a respiratory rate of 8 and pinpoint pupils. Which drug does the nurse anticipate?",
 opts:["Dantrolene","Flumazenil","Naloxone","Ondansetron"],
 ans:[2],
 rat:"<b>Naloxone</b> reverses <b>opioid</b> overdose/respiratory depression (RR < 12, pinpoint pupils, sedation). Match the reversal agent to the drug class: opioids→naloxone, benzodiazepines→flumazenil, MH→dantrolene."},

{topic:"meds",type:"mc",
 stem:"Ondansetron (Zofran) is frequently given to oncology and postoperative patients. Its purpose connects to which problem?",
 opts:["Diarrhea from chemotherapy","Nausea and vomiting (PONV and chemo-induced)","Anxiety before a procedure","Mucositis and mouth sores"],
 ans:[1],
 rat:"<b>Ondansetron</b> (5-HT3 antagonist) targets <b>nausea and vomiting</b> — postop and chemo-induced. The distractors are all real chemo/postop GI problems (diarrhea, mucositis) or periop symptoms (anxiety), which is what makes them tempting, but ondansetron specifically blocks the vomiting reflex; it doesn't treat diarrhea, anxiety, or mucositis."},

{topic:"meds",type:"mc",
 stem:"A chemotherapy patient develops tumor lysis syndrome. Which drug is used to lower uric acid?",
 opts:["Allopurinol","Sodium polystyrene sulfonate","Calcium gluconate","Sodium bicarbonate"],
 ans:[0],
 rat:"<b>Allopurinol</b> (with IV hydration) lowers <b>uric acid</b> in tumor lysis syndrome by blocking its production. The distractors are all genuinely used in TLS but for OTHER derangements: sodium polystyrene and calcium gluconate manage the HYPERKALEMIA, and bicarbonate was historically used to alkalinize urine. The question asks specifically about uric acid — that's allopurinol (or rasburicase)."},

{topic:"meds",type:"sata",
 stem:"Match each reversal/antidote to the right emergency. Select the correctly paired statements.",
 opts:["Flumazenil reverses benzodiazepines (e.g., Versed)","Naloxone reverses opioids","Dantrolene treats malignant hyperthermia","Naloxone reverses Versed","Allopurinol lowers uric acid in tumor lysis syndrome"],
 ans:[0,1,2,4],
 rat:"Correct pairs: flumazenil→benzodiazepines, naloxone→opioids, dantrolene→MH, allopurinol→tumor lysis. <b>Naloxone does NOT reverse Versed</b> — that's a classic distractor; benzodiazepines need flumazenil."},

{topic:"meds",type:"mc",
 stem:"A patient at risk for postoperative venous thromboembolism (VTE) is prescribed an anticoagulant. Which drug class connects to this prevention goal?",
 opts:["Antiplatelets such as clopidogrel","Anticoagulants such as enoxaparin (low-molecular-weight heparin)","Thrombolytics such as alteplase","Vasodilators such as nitroglycerin"],
 ans:[1],
 rat:"Postop VTE PROPHYLAXIS uses <b>anticoagulants</b> — most often <b>enoxaparin (LMWH)</b> or low-dose heparin — plus ambulation and SCDs. Antiplatelets work on arterial clots (not the venous stasis behind DVT); thrombolytics DISSOLVE an existing clot (treatment of a large PE, not routine prevention, and they raise bleeding risk); vasodilators don't prevent clots. The distractors are all real cardiovascular drug classes used in the wrong situation."},

/* ================= ADDED FROM CLASS REVIEW PHOTOS ================= */
/* ---- Cancer / psychosocial (alopecia) ---- */
{topic:"cancer",type:"mc",hot:true,
 stem:"A nurse working with patients who experience alopecia knows that which is the BEST method of helping patients manage the psychosocial impact of this problem?",
 opts:["Teaching the patient ways to protect the scalp","Assisting the patient to pre-plan for this event","Reassuring the patient that alopecia is temporary","Telling the patient that there are worse side effects"],
 ans:[1],
 rat:"<b>Pre-planning</b> (wigs, scarves, hats, support resources before hair loss starts) gives the patient control and best addresses the <b>psychosocial</b> impact. Scalp protection is physical care; 'it's temporary' and 'there are worse effects' dismiss the patient's feelings."},

/* ---- Oncology hand-off prioritization ---- */
{topic:"cancer",type:"mc",hot:true,
 stem:"After receiving the hand-off report, which patient would the oncology nurse see FIRST?",
 opts:["Patient who is neutropenic and in protective isolation","Older patient on chemotherapy with mental status changes","Patient scheduled for radiation therapy today","Patient who is afebrile with a heart rate of 108 beats/min"],
 ans:[1],
 rat:"<b>New mental status changes</b> in an older chemo patient signal something acute (infection/sepsis, metabolic, oncologic emergency) and take priority. The neutropenic isolation patient and the scheduled radiation patient are stable; HR 108 while afebrile is the least urgent. Acute change in condition beats a chronic/stable finding."},

/* ---- Pain re-evaluation / chain of command (SBAR) ---- */
{topic:"post",type:"mc",hot:true,
 stem:"The nurse is caring for a patient reporting pain of 8/10. The nurse gives the prescribed pain medication. One hour later the patient still reports 8/10. Which action is appropriate now?",
 opts:["Include in the nursing report that the medication is ineffective","Wait for the provider to make rounds to report the problem","Increase the dosage of the medication","Report to the health-care provider by telephone"],
 ans:[3],
 rat:"The medication didn't work, so the nurse <b>evaluates and escalates now</b> — notify the provider by phone (use SBAR). Waiting for rounds delays relief; the nurse cannot independently increase a dose; just charting it isn't enough. This is the evaluation step driving action."},

/* ---- Hypovolemic shock signs ---- */
{topic:"post",type:"mc",hot:true,
 stem:"A post-op patient has signs of hypovolemic shock. Which finding would indicate this complication?",
 opts:["Warm, flushed, dry skin with a bounding pulse","Blood pressure 90/60 mmHg with a heart rate of 120 bpm","Bradycardia with widening pulse pressure","Blood pressure 150/92 mmHg with a heart rate of 58 bpm"],
 ans:[1],
 rat:"Hypovolemic shock = <b>falling BP + rising HR</b> (here 90/60, HR 120) with cool, pale, clammy skin and low urine output as the body compensates for lost volume. Warm/flushed/bounding describes early DISTRIBUTIVE (septic/neurogenic) shock; bradycardia with widening pulse pressure suggests neurogenic shock or rising ICP; high BP with bradycardia is essentially the opposite. All four are real hemodynamic patterns — match the pattern to the shock type."},

/* ---- Atelectasis presentation ---- */
{topic:"post",type:"mc",hot:true,
 stem:"A new post-op patient presents with SpO2 90%, shallow respirations, and diminished breath sounds in the bases. What do you suspect this is?",
 opts:["Pneumonia","Atelectasis","CHF","Pulmonary embolism"],
 ans:[1],
 rat:"<b>Atelectasis</b> (alveolar collapse) is the most common early postop respiratory complication: low SpO2, shallow breathing, and <b>diminished sounds at the bases</b>. Treat with incentive spirometry, deep breathing, coughing, and early ambulation. Pneumonia usually brings fever/productive cough; CHF brings crackles + fluid overload."},

/* ---- Preop renal labs ---- */
{topic:"pre",type:"mc",hot:true,
 stem:"During the preoperative systems review, a patient reveals a history of renal disease. Which labs would need to be evaluated?",
 opts:["BUN, serum creatinine, electrolytes","H&H, creatinine, LFTs","WBC, PT/INR","Lipid panel, HbA1c"],
 ans:[0],
 rat:"Renal function is assessed with <b>BUN, serum creatinine, and electrolytes</b>. Kidneys clear anesthetics and drugs and balance fluids/electrolytes — impaired function raises surgical risk. (LFTs assess liver; PT/INR assess clotting.)"},

/* ---- Older adult drug dosing (system function) ---- */
{topic:"aging",type:"mc",hot:true,
 stem:"Older adults typically require smaller drug dosages than younger individuals because of the decreased function of the:",
 opts:["Lungs and heart","Pancreas and thyroid","Liver and kidneys","Stomach and intestines"],
 ans:[2],
 rat:"The <b>liver</b> (metabolism) and <b>kidneys</b> (excretion) decline with age, so drugs are processed and cleared more slowly and can accumulate to toxic levels — hence lower doses. This is the pharmacokinetic basis for 'start low, go slow.'"},

/* ---- Elder abuse situation ---- */
{topic:"aging",type:"mc",
 stem:"The nurse assesses an older adult's living arrangements and care needs knowing that elder abuse often occurs in situations in which:",
 opts:["Stress in the caregiver is overwhelming","Programs for the elderly are not being utilized","There are several generations providing care","The elderly person is not appreciative of those who provide care"],
 ans:[0],
 rat:"Elder abuse risk rises when <b>caregiver stress is overwhelming</b> — burnout, exhaustion, and lack of support. Nurses have a legal duty to report suspected abuse and should assess caregiver strain and connect families with respite and support resources."},

/* ---- NGN older-adult prioritization (assess first) ---- */
{topic:"aging",type:"ngn",hot:true,
 stem:"NGN — You receive shift report on four older adult clients. Based on the assessment findings, which client should you assess FIRST?",
 opts:["80-year-old with increased AP chest diameter, SpO2 92%, and a non-productive cough","74-year-old with heart failure: +2 pitting edema, crackles in lower bases, 3-lb weight gain this week","82-year-old with type 2 diabetes, fasting glucose 160, frustrated about the meal schedule","78-year-old admitted for pneumonia who is confused, trying to get out of bed, RR 28 with audible secretions"],
 ans:[3],
 rat:"Use ABCs + acute change. The <b>confused pneumonia patient with RR 28 and audible secretions</b> has an airway/breathing problem PLUS new confusion and a safety (fall) risk — assess first. The barrel chest with SpO2 92% is chronic/stable, the HF findings are concerning but expected and not immediately life-threatening, and the glucose of 160 with frustration is lowest priority."},

/* ---- DVT prevention interventions ---- */
{topic:"post",type:"sata",hot:true,
 stem:"Which interventions help PREVENT deep vein thrombosis (DVT) in the postoperative patient? Select all that apply.",
 opts:["Out of bed to chair early and often","Leg exercises on the non-operative side (dorsiflex, rotate ankle)","TED hose and intermittent compression boots","Strict bed rest with legs still","Prophylactic subcutaneous heparin BID"],
 ans:[0,1,2,4],
 rat:"DVT prevention = <b>movement + compression + anticoagulation</b>: early OOB, ankle pumps/dorsiflexion, TED hose and sequential compression devices, and prophylactic SC heparin. <b>Strict bed rest with still legs causes venous stasis</b> — the opposite of prevention."},

/* ---- Respiratory complication prevention ---- */
{topic:"post",type:"sata",
 stem:"Which nursing interventions help prevent postoperative RESPIRATORY complications? Select all that apply.",
 opts:["Deep breathing and incentive spirometry","Coughing and early ambulation","Turning in bed and OOB to chair","Keeping the patient flat and still to rest the lungs","Monitoring responses to narcotic (opioid) analgesics"],
 ans:[0,1,2,4],
 rat:"Prevent atelectasis/pneumonia with <b>deep breathing, incentive spirometry, coughing, ambulation, turning, and hydration</b>, and <b>monitor opioids</b> (they depress respirations). Lying flat and still promotes secretion pooling and atelectasis — avoid it; favor upright positioning."},

/* ---- AORN safe hand-off communication ---- */
{topic:"intra",type:"mc",
 stem:"Following AORN safe hand-off guidelines, which communication strategy should the nurse use during patient hand-off?",
 opts:["Give a quick verbal summary from memory to keep the handoff brief","Use SBAR with read-back, one speaker at a time, and minimal distractions","Hand off in the hallway so the next nurse can keep moving","Provide only the abnormal findings to save time"],
 ans:[1],
 rat:"AORN safe hand-off = <b>SBAR + read-back</b>, one speaker at a time, one patient, minimal distractions, supporting documentation, and time for questions. The distractors all sound efficient — from memory, on the move, abnormals-only — but each drops a safeguard (documentation, focus, completeness) that prevents the communication errors hand-offs are designed to catch."},

/* ---- Latex allergy at-risk groups ---- */
{topic:"intra",type:"sata",hot:true,
 stem:"Which patients are at increased risk for a latex allergy/sensitivity? Select all that apply.",
 opts:["Children with spina bifida","Patients with a history of multiple surgeries","Patients with urogenital abnormalities or spinal cord injuries","Health care workers and people with allergies or asthma","Patients allergic to shellfish or iodine contrast"],
 ans:[0,1,2,3],
 rat:"Latex risk groups: <b>spina bifida, multiple surgeries, urogenital/spinal cord conditions, allergies/asthma, and health care workers</b> (repeated glove exposure). The trap is <b>shellfish/iodine allergy</b> — that's the old myth tied to iodinated CONTRAST, not latex. A true cross-reaction exists with certain foods (banana, avocado, kiwi — 'latex-fruit syndrome'), not shellfish."},

/* ---- Priority care to maintain patient safety (preop) ---- */
{topic:"pre",type:"sata",
 stem:"Which actions are priority preoperative care to maintain PATIENT SAFETY? Select all that apply.",
 opts:["Complete preoperative testing and preparation","Maintain normal glucose levels and confirm informed consent","Verify and mark the correct surgical site","Complete preoperative teaching to prevent complications","Withhold anxiety information so the patient stays calm"],
 ans:[0,1,2,3],
 rat:"Priority preop safety: testing/prep, glucose control, informed consent, correct-site marking, infection prevention, and teaching — and addressing psychological comfort. The trap is <b>'withhold anxiety information to keep the patient calm'</b>: it sounds caring, but informed patients actually have LESS anxiety and fewer complications. Tailored teaching (not silence) reduces preop fear, postop pain, and anesthesia needs."},

/* ---- Opioid-connected 'A' drug ---- */
{topic:"meds",type:"mc",hot:true,
 stem:"Which medication that starts with 'A' is given to reverse opioid-induced slowing of the bowel (postoperative ileus) by blocking opioid effects in the gut?",
 opts:["Alvimopan","Allopurinol","Acetaminophen","Atropine"],
 ans:[0],
 rat:"<b>Alvimopan</b> is a peripherally-acting opioid antagonist used for <b>opioid-induced postoperative ileus</b> — it blocks opioids in the gut to restore bowel function without reversing pain control. (Allopurinol → uric acid/tumor lysis; acetaminophen → opioid-sparing pain control; atropine → bradycardia.)"},

{topic:"meds",type:"mc",
 stem:"A multimodal (ERAS) pain plan pairs opioids with a non-opioid that starts with 'A' to lower the opioid dose needed. Which drug is this?",
 opts:["Acetaminophen","Amiodarone","Albuterol","Amlodipine"],
 ans:[0],
 rat:"<b>Acetaminophen</b> is a core opioid-sparing analgesic in multimodal/ERAS pathways — combined with NSAIDs it reduces opioid requirements and opioid-related risks (respiratory depression, ileus). Its own overdose antidote is acetylcysteine."},

/* ================= ADDITIONAL QUESTIONS (to 80+) ================= */
/* ---- Aging ---- */
{topic:"aging",type:"mc",hot:true,
 stem:"An older adult is admitted with pneumonia. Which assessment finding should the nurse expect that differs from a younger adult's typical presentation?",
 opts:["High fever of 103°F","Confusion and functional decline rather than fever","Severe productive cough","Sharp pleuritic chest pain"],
 ans:[1],
 rat:"Older adults have blunted immune/temperature responses, so infection often shows as <b>new confusion, weakness, or falls instead of fever</b>. A 103°F fever, severe productive cough, and classic pleuritic pain are the typical younger-adult presentation the older adult may NOT mount — which is exactly why atypical signs are the answer."},

{topic:"aging",type:"sata",
 stem:"Which nursing interventions reduce fall risk in the hospitalized older adult? Select all that apply.",
 opts:["Keep the bed in low position with brakes locked","Ensure call light and personal items are within reach","Provide adequate lighting and non-slip footwear","Use physical restraints routinely to prevent wandering","Implement scheduled toileting"],
 ans:[0,1,2,4],
 rat:"Fall prevention = low bed, items/call light reachable, good lighting, non-slip footwear, and scheduled toileting (urgency causes falls). <b>Routine restraints are wrong</b> — they increase injury, agitation, and deconditioning, and are a last resort, not a prevention strategy. Use least-restrictive measures first."},

{topic:"aging",type:"mc",
 stem:"The nurse reviews the medication list of an older adult taking 9 medications. This is an example of polypharmacy, which increases the risk of:",
 opts:["Better symptom control with fewer side effects","Increased risk of adverse drug reactions, interactions, and falls","More predictable drug levels because doses balance each other","Reduced pill burden once a routine is established"],
 ans:[1],
 rat:"<b>Polypharmacy</b> (multiple meds) increases <b>adverse reactions, drug–drug interactions, and falls</b> — the AGS Beers Criteria flags high-risk drugs in older adults. The distractors sound reasonable (better control, balanced levels, easier routine) but polypharmacy actually makes levels LESS predictable, raises (not lowers) pill burden, and the interaction risk outweighs added 'control.' Watch for optimistic-sounding wrong answers."},

/* ---- Chronic ---- */
{topic:"chronic",type:"mc",
 stem:"A patient with a new spinal cord injury qualifies for federal assistance. Which program is available specifically to people 65+, those with permanent kidney failure, or qualifying disability?",
 opts:["Medicaid","Medicare","Supplemental Security Income (SSI)","COBRA continuation coverage"],
 ans:[1],
 rat:"<b>Medicare</b> eligibility = age 65+, permanent kidney failure (ESRD), or qualifying long-term disability — exactly the criteria described. Medicaid is <b>need-based</b> (low income/resources); SSI provides cash assistance, not the health coverage tied to these criteria; COBRA temporarily continues an employer plan after job loss. The distractors are all real assistance programs — match the eligibility wording to Medicare."},

{topic:"chronic",type:"mc",hot:true,
 stem:"A patient with multiple chronic conditions sees several specialists. What is the nurse's most important role in coordinating this care?",
 opts:["Direct each specialist to manage their condition independently","Coordinate care across specialists, reconcile medications, and watch for conflicting/duplicate treatment","Have the patient prioritize one condition so the plan stays simple","Schedule the appointments and let the providers handle the rest"],
 ans:[1],
 rat:"With multiple chronic conditions the nurse's key role is <b>coordination</b> — reconciling meds, spotting conflicting or duplicate therapy, and connecting the specialists' plans. Letting specialists work in silos, making the patient drop a condition, or just booking visits all leave the patient to navigate fragmented care alone, which drives errors and avoidable hospitalizations. The distractors are realistic but passive."},

/* ---- Cancer ---- */
{topic:"cancer",type:"mc",hot:true,
 stem:"A chemotherapy patient develops a vesicant extravasation at the IV site. What is the nurse's FIRST action?",
 opts:["Flush the line with saline","Stop the infusion immediately","Apply heat and continue the infusion","Increase the infusion rate"],
 ans:[1],
 rat:"<b>Stop the infusion immediately</b> — a vesicant leaking into tissue causes severe necrosis, so halting exposure comes first, then follow the antidote/protocol. Flushing pushes more vesicant into tissue, continuing (with heat or faster rate) worsens the injury. This is an oncologic emergency."},

{topic:"cancer",type:"sata",
 stem:"A neutropenic patient is on protective (neutropenic) precautions. Which actions are appropriate? Select all that apply.",
 opts:["Strict hand hygiene by all staff and visitors","No fresh flowers or raw fruits/vegetables","Monitor temperature for the earliest sign of infection","Place the patient with a roommate who has a cold","Avoid invasive procedures when possible"],
 ans:[0,1,2,4],
 rat:"Neutropenic care: meticulous hand hygiene, no fresh flowers/raw produce (bacteria/fungi), monitor temp closely (fever may be the ONLY infection sign), and minimize invasive procedures. <b>A sick roommate is dangerous</b> — neutropenic patients need a private room and protection from anyone with an infection."},

{topic:"cancer",type:"mc",
 stem:"A patient asks why chemotherapy is given in repeated cycles instead of one large dose. The nurse explains that each cycle:",
 opts:["Repeated doses guarantee every cancer cell is killed at once","Each dose kills a fraction of dividing cells, so cycles catch more cells as they enter the dividing phase","Repeating low doses prevents any harm to healthy cells","Cycling avoids the need for the body's immune system to clear remaining cells"],
 ans:[1],
 rat:"Chemo works by <b>cell-kill (fractional) kinetics</b> — each dose kills a percentage of actively dividing cells, so spaced cycles hit more cells across the cell cycle while letting normal tissue recover between doses. No regimen kills 'every cell at once,' chemo still harms rapidly dividing healthy cells (marrow, GI, hair), and the goal is to reduce the burden enough for the immune system to finish — not bypass it. The distractors are all subtly wrong mechanisms."},

/* ---- Preoperative ---- */
{topic:"pre",type:"mc",hot:true,
 stem:"The preoperative nurse is verifying the consent form. The patient says, 'I'm not really sure what they're going to do.' What is the nurse's best action?",
 opts:["Explain the surgical procedure in detail","Have the patient sign anyway to avoid delay","Notify the surgeon to clarify before the patient signs","Witness the signature and proceed"],
 ans:[2],
 rat:"If the patient doesn't understand, consent is not informed — <b>notify the surgeon to clarify</b>, since the surgeon (not the nurse) explains the procedure/risks. The nurse cannot supply that explanation, must never have an uninformed patient sign, and cannot witness a signature for someone who doesn't understand."},

{topic:"pre",type:"mc",
 stem:"A diabetic patient is scheduled for surgery. Which preoperative goal is a priority to reduce complications?",
 opts:["Allow glucose to run slightly high to prevent intraoperative hypoglycemia","Maintain controlled (near-normal) glucose to reduce infection and improve healing","Hold all insulin and oral agents for 24 hours before surgery","Give the patient's full usual insulin dose despite being NPO"],
 ans:[1],
 rat:"The preop goal is <b>controlled, near-normal glucose</b> — hyperglycemia impairs wound healing and raises SSI risk. 'Run it high to avoid lows' overshoots and harms healing; holding everything for 24 h risks DKA in type 1; giving the FULL usual insulin dose while NPO risks dangerous hypoglycemia. Real practice adjusts the dose (often a reduced basal) — both extremes are wrong, which is the trap."},

{topic:"pre",type:"sata",
 stem:"Immediate preoperative interventions the nurse completes before transport to the OR include: Select all that apply.",
 opts:["Confirm patient identity and allergies","Ensure consent is signed","Have the patient void and remove dentures/jewelry/nail polish","Give a large breakfast","Verify the surgical site is marked"],
 ans:[0,1,2,4],
 rat:"Immediate preop: verify ID/allergies, signed consent, void, remove dentures/jewelry/polish (airway and assessment safety), and confirm site marking. <b>A large breakfast violates NPO</b> and risks aspiration — patients are NPO before surgery."},

/* ---- Intraoperative ---- */
{topic:"intra",type:"mc",hot:true,
 stem:"The OR team performs a 'time-out' before incision. The primary purpose is to:",
 opts:["Confirm the instrument and sponge counts are correct","Verify correct patient, correct procedure, and correct surgical site","Review the anesthesia plan and confirm airway equipment","Introduce the surgical team members to one another"],
 ans:[1],
 rat:"The <b>time-out</b> (just before incision) verifies <b>correct patient, procedure, and site</b> — the National Patient Safety Goal against wrong-site/wrong-patient surgery. Counts, anesthesia readiness, and team introductions are all genuine parts of the broader surgical safety checklist (often the 'sign-in'/'briefing'), but the TIME-OUT specifically is the final patient/procedure/site verification."},

{topic:"intra",type:"mc",
 stem:"During surgery the patient develops sudden hypotension, bronchospasm, and urticaria after a medication is given. The nurse suspects:",
 opts:["Malignant hyperthermia","Anaphylaxis","Hypothermia","Anesthesia awareness"],
 ans:[1],
 rat:"<b>Anaphylaxis</b>: rapid hypotension, bronchospasm, and urticaria after an allergen (drug, latex). Remove the cause and treat emergently. MH shows tachycardia/rising EtCO2/rigidity/late temp spike; hypothermia is low temperature; anesthesia awareness is intraoperative consciousness — none match the allergic triad."},

{topic:"intra",type:"sata",
 stem:"Which actions help prevent an operating room fire? Select all that apply.",
 opts:["Complete a fire-risk assessment during the time-out","Allow alcohol-based prep to dry fully before draping","Manage oxygen concentration near electrocautery/lasers","Store anesthetic gases near ignition sources","Conduct annual fire drills"],
 ans:[0,1,2,4],
 rat:"Fire prevention controls the triangle (oxygen + ignition + fuel): risk assessment at time-out, let alcohol prep dry (fuel/vapor), limit O2 buildup near cautery/lasers (ignition), and drill annually. <b>Storing gases near ignition sources</b> is the opposite — it creates fire risk."},

/* ---- Postoperative ---- */
{topic:"post",type:"mc",hot:true,
 stem:"A patient is 2 days postoperative and suddenly reports sharp chest pain, dyspnea, and anxiety with a drop in SpO2. The nurse suspects which complication?",
 opts:["Atelectasis","Pulmonary embolism","Myocardial infarction","Pneumonia"],
 ans:[1],
 rat:"<b>Pulmonary embolism</b>: SUDDEN sharp chest pain, dyspnea, anxiety, tachycardia, and a dropping SpO2 a few days postop — classic for a DVT that traveled to the lung. Atelectasis is gradual with diminished bases; an MI gives chest pain but usually with ECG/troponin changes and not a sudden SpO2 drop; pneumonia builds over days with fever and productive cough. All four are real postop chest complaints — the SUDDEN onset + hypoxia points to PE."},

{topic:"post",type:"mc",
 stem:"Which finding in a postoperative patient most indicates a surgical site infection (SSI)?",
 opts:["Pink, approximated wound edges","Purulent drainage, increased redness, warmth, and fever","Mild incisional pain on day 1","Serosanguineous drainage in the first 24 hours","A dry intact dressing"],
 ans:[1],
 rat:"SSI signs: <b>purulent drainage, spreading redness/warmth, increasing pain, and fever</b>, usually after postop day 3–5. Pink approximated edges and a dry dressing are normal healing; mild day-1 pain is expected; light serosanguineous drainage early on is normal, not infection."},

{topic:"post",type:"ngn",hot:true,
 stem:"NGN — A patient is 4 hours post-op. Which assessment findings require IMMEDIATE nursing action? Select all that apply.",
 opts:["BP trending down 120/80 → 94/56 with HR rising to 118","Saturated dressing with bright-red blood","Urine output 15 mL over the last 2 hours","Pain rated 3/10, relieved by repositioning","Restlessness and cool, clammy skin"],
 ans:[0,1,2,4],
 rat:"Falling BP with rising HR, frank bleeding, oliguria (<30 mL/hr), and cool/clammy restlessness all point to <b>hemorrhage/hypovolemic shock</b> — act and escalate now. <b>Pain 3/10 relieved by repositioning is expected and stable</b>, so it does not require immediate action."},

/* ---- Postop additions (June 21 session) ---- */
{topic:"post",type:"mc",hot:true,
 stem:"A nurse is teaching a client about antiembolism stockings. The nurse explains that the stockings help prevent deep vein thrombosis (DVT) by:",
 opts:["Elevating the extremity to prevent pooling of blood","Forcing blood from the superficial veins into the deep venous system","Encouraging ambulation to prevent pooling of blood","Providing warmth to the extremity"],
 ans:[1],
 rat:"Antiembolism stockings use <b>graduated compression</b> (tightest at the ankle) to push blood out of the superficial veins and <b>into the deep venous system</b>, improving venous return and reducing stasis. They don't elevate the limb, they aren't a form of ambulation, and warmth isn't the mechanism — the compression gradient is what prevents DVT."},

{topic:"post",type:"mc",hot:true,
 stem:"A nurse is prioritizing postoperative nursing problems. Which sequence correctly orders them from HIGHEST to LOWEST priority?",
 opts:["Fluid Volume Deficit → Impaired Gas Exchange → Altered Comfort → Anxiety → Risk for Infection","Impaired Gas Exchange → Fluid Volume Deficit → Altered Comfort → Anxiety → Risk for Infection","Risk for Infection → Impaired Gas Exchange → Fluid Volume Deficit → Anxiety → Altered Comfort","Impaired Gas Exchange → Altered Comfort → Fluid Volume Deficit → Risk for Infection → Anxiety"],
 ans:[1],
 rat:"Use <b>ABCs + Maslow</b>: <b>Impaired Gas Exchange</b> (airway/breathing) is always first, then <b>Fluid Volume Deficit</b> (circulation), then <b>Altered Comfort</b> (pain — physiologic but not immediately life-threatening), then <b>Anxiety</b> (psychosocial), and finally <b>Risk for Infection</b> (a 'risk'/potential problem ranks below actual problems). Oxygenation beats circulation, and an actual problem beats a potential one."},

{topic:"post",type:"mc",
 stem:"When a surgeon performs a routine, non-ruptured appendectomy, the nurse recognizes that the surgical wound classification is:",
 opts:["Clean","Clean-contaminated","Contaminated","Dirty"],
 ans:[1],
 rat:"A routine appendectomy is <b>clean-contaminated</b>: it's a controlled entry into the GI tract (which normally harbors bacteria) without unusual spillage. <b>Clean</b> = no entry into GI/respiratory/GU tracts; <b>contaminated</b> = major break in technique or gross GI spillage; <b>dirty</b> = a ruptured/perforated appendix with established infection/peritonitis. The intact GI entry is the key detail."},

{topic:"post",type:"mc",hot:true,
 stem:"A client is at risk for acute respiratory distress syndrome (ARDS) after an extensive surgical procedure. The nurse assesses for which MOST COMMON early sign of ARDS?",
 opts:["Cyanosis","Bilateral wheezing","Inspiratory crackles","Rapid onset of severe dyspnea"],
 ans:[3],
 rat:"<b>Rapid onset of severe dyspnea</b> is the earliest and most common presenting sign of ARDS, usually within 24–48 hours of the precipitating event. <b>Cyanosis</b> and <b>crackles</b> are later findings that reflect more advanced hypoxemia, and <b>wheezing</b> points more toward bronchospasm/asthma than ARDS. Early dyspnea + refractory hypoxemia is the classic clue."},

{topic:"post",type:"mc",
 stem:"Which clinical manifestation MOST increases a postoperative client's risk for wound evisceration?",
 opts:["Edema","Hypoxia","Hypovolemia","Performing the Valsalva maneuver"],
 ans:[3],
 rat:"The <b>Valsalva maneuver</b> (straining, coughing, bearing down) sharply raises <b>intra-abdominal pressure</b>, placing direct mechanical stress on the incision and risking dehiscence/evisceration — which is why patients are taught to <b>splint the incision</b> when coughing or moving. Edema, hypoxia, and hypovolemia impair healing over time but don't apply the sudden mechanical force that pops a wound open."},

{topic:"post",type:"mc",hot:true,
 stem:"Which factor STIMULATES (promotes) the wound healing process in a postoperative client?",
 opts:["Hemorrhage","Immobility","Sufficient oxygenation","Nutritional deficiencies"],
 ans:[2],
 rat:"<b>Sufficient oxygenation</b> drives wound healing — oxygen is required for collagen synthesis, cellular energy production, immune cell function, and angiogenesis. <b>Hemorrhage</b> (blood/volume loss), <b>immobility</b> (poor perfusion), and <b>nutritional deficiencies</b> (no protein/vitamin C/zinc building blocks) all IMPAIR healing. The question asks what helps, not what harms — read the stem carefully."},

{topic:"post",type:"mc",hot:true,
 stem:"To prevent pneumonia and protect the pulmonary system, which postoperative nursing intervention is MOST essential?",
 opts:["Ambulate the client as soon as possible","Assist with incentive spirometry every 6 hours","Assess breath sounds at least every 2 hours","Position the client supine"],
 ans:[0],
 rat:"<b>Early ambulation</b> is the single most effective postop pulmonary intervention — it promotes full lung expansion, mobilizes secretions, and improves circulation. Incentive spirometry is important but should be done every <b>1–2 hours</b> (not every 6); assessing breath sounds <b>monitors</b> but doesn't prevent complications; and a <b>supine</b> position restricts lung expansion (semi-Fowler's is better). Each distractor is a real intervention that's either mistimed, passive, or counterproductive."},

/* ---- End-of-life ---- */
{topic:"eol",type:"mc",
 stem:"A dying patient's family asks why the nurse keeps repositioning and giving mouth care if the patient is 'not going to make it.' The nurse explains that these comfort measures:",
 opts:["Help reverse the patient's decline if continued consistently","Maintain the patient's comfort and dignity even when cure is no longer possible","Are required by policy regardless of the patient's wishes","Prevent the family from feeling guilty about the death"],
 ans:[1],
 rat:"At end of life, comfort measures (repositioning, mouth care, symptom relief) exist to preserve <b>comfort and dignity</b> — not to reverse decline or prolong life. They are guided by the patient's goals/wishes, not blanket policy, and although they do comfort the family, their purpose is the PATIENT's wellbeing. The distractors each contain a kernel of truth, which is what makes them tempting."},

{topic:"eol",type:"mc",hot:true,
 stem:"A patient with terminal cancer says, 'I just hope I can make it to my daughter's wedding next month.' What is the nurse's most therapeutic response?",
 opts:["'You probably won't be here that long.'","'Tell me more about what that day means to you.'","'Let's not talk about sad things.'","'You should focus on getting better.'"],
 ans:[1],
 rat:"<b>Exploring meaning</b> ('tell me more...') supports realistic hope and honors the patient's goals — the heart of palliative communication. Crushing the hope, shutting down the conversation, and giving false reassurance about 'getting better' all block therapeutic communication and ignore the patient's needs."},

/* ================= CANCER WARNING SIGNS / COMPLICATIONS (from infographics) ================= */
{topic:"cancer",type:"mc",hot:true,
 stem:"The mnemonic CAUTION helps identify the seven warning signs of cancer. Which finding fits the 'U' in CAUTION?",
 opts:["Unexplained fatigue lasting several weeks","Unusual bleeding or discharge","Unilateral weakness or numbness","Uncontrolled high blood pressure"],
 ans:[1],
 rat:"In <b>CAUTION</b>, U = <b>Unusual bleeding or discharge</b>. The full mnemonic: Change in bowel/bladder habits, A sore that won't heal, Unusual bleeding/discharge, Thickening or lump, Indigestion/difficulty swallowing, Obvious change in a wart/mole, Nagging cough/hoarseness. Fatigue, focal weakness, and hypertension are real concerns but aren't the classic CAUTION warning signs."},

{topic:"cancer",type:"sata",hot:true,
 stem:"Using the CAUTION (UP) warning signs of cancer, which findings should prompt the nurse to recommend further evaluation? Select all that apply.",
 opts:["A sore that does not heal","A change in bowel or bladder habits","Obvious change in a wart or mole","A nagging cough or persistent hoarseness","Mild seasonal nasal congestion that resolves with antihistamines"],
 ans:[0,1,2,3],
 rat:"CAUTION + UP warning signs: <b>C</b>hange in bowel/bladder, <b>A</b> sore that won't heal, <b>U</b>nusual bleeding/discharge, <b>T</b>hickening/lump, <b>I</b>ndigestion/dysphagia, <b>O</b>bvious wart/mole change, <b>N</b>agging cough/hoarseness — plus <b>U</b>nexplained weight loss and <b>P</b>ernicious anemia. Seasonal congestion that resolves with antihistamines is a benign, self-limiting symptom — not a red flag."},

{topic:"cancer",type:"mc",
 stem:"A patient reports an 18-lb weight loss over two months without trying, plus fatigue and new anemia. Applying cancer warning-sign knowledge, the nurse recognizes this as:",
 opts:["An expected change with aging","Possible warning signs of cancer (unexplained weight loss, pernicious anemia) needing evaluation","A normal response to seasonal appetite changes","A sign the patient simply needs iron supplements"],
 ans:[1],
 rat:"<b>Unexplained weight loss and pernicious anemia</b> extend the CAUTION mnemonic ('UP') and are red flags warranting workup. Significant unintentional weight loss is never just 'aging' or seasonal appetite, and reflexively giving iron without evaluating the cause could delay a cancer diagnosis. Investigate the underlying cause first."},

{topic:"cancer",type:"mc",hot:true,
 stem:"A patient with cancer is at risk for several complications from BOTH the disease and its treatment. Which set correctly groups the major complications the nurse monitors for?",
 opts:["Pain, infection, and altered nutrition","Hypertension, hyperlipidemia, and gout","Constipation, insomnia, and dry skin","Allergies, heartburn, and muscle cramps"],
 ans:[0],
 rat:"Cancer and its treatment threaten the patient with <b>pain, infection, and altered nutrition (anorexia–cachexia)</b> — the big three to monitor. The other clusters list real but minor or unrelated issues; they aren't the priority cancer complications driven by tumor growth, marrow suppression, and GI/metabolic effects."},

{topic:"cancer",type:"mc",hot:true,
 stem:"Why is a neutropenic cancer patient at risk of having a serious infection go unnoticed?",
 opts:["They always run a very high fever that masks other signs","With too few neutrophils they may have infection while appearing nearly asymptomatic","Neutropenia makes them immune to most infections","Antibiotics prevent any signs from appearing"],
 ans:[1],
 rat:"With treatment-induced neutropenia the patient lacks the white cells that create the usual inflammatory signs, so <b>infection can be present while the patient appears almost asymptomatic</b> — a low-grade fever may be the ONLY clue. They are MORE vulnerable, not immune, and antibiotics treat infection rather than hide it. This is why any temperature elevation is treated as an emergency."},

{topic:"cancer",type:"sata",
 stem:"A nurse teaches a neutropenic patient how to prevent infection at home. Which instructions are appropriate? Select all that apply.",
 opts:["Strict hand washing and meticulous hygiene/skin care","Avoid crowds and people with infections","Practice safe food handling and avoid raw/undercooked foods","Monitor temperature daily and report any fever immediately","Garden daily to stay active and boost mood"],
 ans:[0,1,2,3],
 rat:"Neutropenic precautions: rigorous hand washing/skin care, avoid crowds and sick contacts, safe food practices (no raw/undercooked or unwashed foods), and check temperature daily — report any fever at once. <b>Gardening exposes the patient to soil-borne fungi and bacteria</b>, a real infection risk for the immunocompromised, so it's discouraged during neutropenia."},

{topic:"cancer",type:"mc",
 stem:"A cancer patient develops anorexia–cachexia. Which lab values does the nurse monitor to evaluate nutritional status, and which foods are recommended?",
 opts:["BUN/creatinine; low-protein, low-calorie foods","Albumin and prealbumin; soft, nonirritating, high-calorie, high-protein foods","Potassium and sodium; clear liquids only","Hemoglobin A1c; low-fat, high-fiber foods"],
 ans:[1],
 rat:"Nutritional status is tracked with <b>albumin and prealbumin</b> (protein stores), and patients are encouraged to eat <b>soft, nonirritating, high-calorie, high-protein</b> foods, with antiemetics/appetite stimulants and enteral or parenteral nutrition as needed. BUN/creatinine assess kidneys; A1c tracks glucose — neither measures nutritional protein status, and low-calorie/clear-liquid diets worsen cachexia."},

{topic:"cancer",type:"sata",
 stem:"Which nursing actions are appropriate for managing cancer-related PAIN? Select all that apply.",
 opts:["Perform a comprehensive pain assessment and set management goals with the patient","Use pharmacologic options: NSAIDs, opioids, and adjuvants such as corticosteroids","Add non-pharmacologic measures: guided imagery, relaxation breathing, distraction, massage","Refer to a pain management or palliative care specialist when needed","Withhold opioids to avoid addiction even when pain is severe"],
 ans:[0,1,2,3],
 rat:"Cancer pain care: assess thoroughly and set goals, combine pharmacologic (NSAIDs, opioids, adjuvant corticosteroids) with non-pharmacologic methods (imagery, relaxation, distraction, massage, acupuncture), and refer to pain/palliative specialists. <b>Withholding needed opioids over addiction fears is undertreatment</b> — fear of addiction should not deny a cancer patient effective pain relief."},

{topic:"cancer",type:"mc",hot:true,
 stem:"Which statement correctly distinguishes a MALIGNANT tumor from a benign one?",
 opts:["Malignant cells are well-differentiated and encapsulated","Malignant cells are undifferentiated, invade surrounding tissue, and metastasize","Malignant tumors grow slowly and never cause systemic effects","Malignant tumors stay localized and rarely cause death"],
 ans:[1],
 rat:"<b>Malignant</b> cells are <b>undifferentiated</b> (little resemblance to origin tissue), overcome contact inhibition to <b>invade/infiltrate</b>, and <b>metastasize</b> via blood/lymph, often causing systemic effects (anemia, weight loss, CACS) and, untreated, death. Well-differentiated, encapsulated, slow-growing, localized, and non-systemic all describe BENIGN tumors."},

{topic:"cancer",type:"mc",
 stem:"A nurse provides psychosocial nursing care to a newly diagnosed cancer patient. Which approach best reflects appropriate care?",
 opts:["Limit discussion of the diagnosis to avoid upsetting the patient","Build an open, honest relationship; offer active listening, reassurance, and accurate information","Tell the patient to stay positive and avoid asking questions","Focus only on the physical treatment and leave emotions to the family"],
 ans:[1],

const KEY="nur256_v3";
const MASTERY_NEEDED=3;          // must get a vaulted Q right 3x to clear it
let STATE = loadState();
function loadState(){try{const s=JSON.parse(localStorage.getItem(KEY));return s?migrate(s):defaults()}catch(e){return defaults()}}
function defaults(){return{answered:{},correct:{},bestExam:0,examsTaken:0,vault:{}}}
/* vault is keyed by question signature -> {streak:0}; presence means "still needs work" */
function migrate(s){ if(!s.vault)s.vault={}; if(!s.answered)s.answered={}; if(!s.correct)s.correct={}; return s; }
function save(){try{localStorage.setItem(KEY,JSON.stringify(STATE))}catch(e){}}

/* stable signature so vault survives shuffles/index changes */
function qSig(q){return (q.topic||'')+'::'+(q.stem||'').slice(0,60)}

function recordAnswer(q,ok){
  const sig=qSig(q);
  STATE.answered[sig]=true;
  STATE.correct[sig]=ok;
  if(ok){
    if(STATE.vault[sig]){
      STATE.vault[sig].streak=(STATE.vault[sig].streak||0)+1;
      if(STATE.vault[sig].streak>=MASTERY_NEEDED){ delete STATE.vault[sig]; }  // mastered -> back to bank
    }
  } else {
    // wrong: (re)add to vault and reset streak
    STATE.vault[sig]={streak:0};
  }
  save();updateMini();
}
function vaultList(){ return QBANK.filter(q=>STATE.vault[qSig(q)]); }
function vaultStreak(q){ const v=STATE.vault[qSig(q)]; return v?(v.streak||0):0; }
function updateMini(){const el=document.getElementById('pmCount'); if(el) el.textContent=Object.keys(STATE.answered).length}

/* ============================================================
   HINT GENERATOR
   Uses an explicit q.hint if present, else builds a useful
   topic/type-based nudge that points toward the reasoning.
   ============================================================ */
const TOPIC_HINTS={
  aging:"Think 'less physiologic reserve' and whether a finding is NORMAL aging vs. an acute change to report.",
  chronic:"Chronic = incurable; think management, coordination, Maslow, and the nursing process (ADPIE).",
  cancer:"Think how cancer/treatment affects rapidly dividing cells, prevention levels, or which patient is least stable.",
  pre:"Preop = prepare & keep safe: consent (surgeon explains/nurse witnesses), NPO, labs, glucose, correct site.",
  intra:"Intraop = SAFETY: positioning, counts, time-out, fire triangle (O2+ignition+fuel), MH, latex.",
  post:"Postop: use ABCs and TRENDS. Falling BP + rising HR = shock; act and escalate over a single stable value.",
  eol:"Palliative = comfort at any stage; focus on dignity, realistic hope, and therapeutic communication.",
  meds:"Tie the drug to its DISEASE and match reversal agents (opioid→naloxone, benzo→flumazenil, MH→dantrolene)."
};
function hintFor(q){
  if(q.hint) return q.hint;
  let h=TOPIC_HINTS[q.topic]||"Re-read the stem for the key word (FIRST, BEST, PRIORITY, EXCEPT).";
  if(q.type==='sata') h+=" Select ALL correct options — evaluate each one independently (true or false).";
  if(q.type==='ngn') h+=" NGN: decide which findings/actions are urgent vs. stable/expected.";
  // surface a priority cue if the stem uses a classic keyword
  const m=(q.stem||'').match(/\b(first|best|priority|most|immediate|initial|EXCEPT|not)\b/i);
  if(m && !q.hint) h="Key word in the stem: \u201c"+m[0].toUpperCase()+"\u201d. "+h;
  return h;
}
