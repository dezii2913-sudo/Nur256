<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>NUR 256 — Unit 4 Study Lab</title>
<style>
:root{
  color-scheme: light;
  --bg:#fff2f0; --bg2:#fff;
  --ink:#3a0f10; --muted:#8a5a58;
  --card:#ffffff; --card-border:#ffd4cf;
  --pink:#e11d48; --pink-soft:#ffe1e6;
  --purple:#be123c; --purple-soft:#ffe4e9;
  --select:#c98a9a; --select-soft:#faf0f2;
  --teal:#ea580c; --teal-soft:#ffedd5;
  --green:#22c55e; --green-soft:#dcfce7;
  --red:#dc2626; --red-soft:#fee2e2;
  --amber:#f59e0b; --amber-soft:#fef3c7;
  --blue:#9f1239; --blue-soft:#ffe4e9;
}
[data-theme="night"]{
  color-scheme: dark;
  --bg:#170a0b; --bg2:#1f1113;
  --ink:#ffe9e7; --muted:#d99a97;
  --card:#241417; --card-border:#4a2226;
  --pink:#fb7185; --pink-soft:#3a1720;
  --purple:#f472b6; --purple-soft:#3a1526;
  --select:#d9a3b3; --select-soft:#3d2530;
  --teal:#fb923c; --teal-soft:#3a2211;
  --green-soft:#123321; --red-soft:#3a1f1f; --amber-soft:#3a2f12;
  --blue:#fb7185; --blue-soft:#3a1720;
}
html{background:var(--bg)}
*{box-sizing:border-box}
body{
  margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;
  transition:background .3s,color .3s;padding-bottom:80px;
}
body.mobile-mode{font-size:1.18rem;line-height:1.7}
body.mobile-mode .grid2,body.mobile-mode .grid3{grid-template-columns:1fr!important;gap:18px}
body.mobile-mode .card h3{font-size:1.3rem;line-height:1.4}
body.mobile-mode .sec-title{font-size:1.55rem;line-height:1.35}
.topbar{background:linear-gradient(120deg,var(--pink),var(--purple));color:#fff;padding:18px 16px 60px}
.topbar h1{margin:0 0 4px;font-size:1.5rem;display:flex;align-items:center;gap:10px}
.topbar .sub{opacity:.92;font-size:.9rem}
.toggles{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tbtn{border:none;background:rgba(255,255,255,.25);color:#fff;padding:9px 14px;border-radius:30px;font-weight:700;font-size:.85rem;cursor:pointer;backdrop-filter:blur(4px)}
.progwrap{max-width:920px;margin:-40px auto 0;padding:0 16px}
.progbar-bg{background:var(--card);border-radius:20px;padding:14px 18px;box-shadow:0 4px 18px rgba(0,0,0,.12)}
.progbar{height:8px;background:var(--card-border);border-radius:10px;overflow:hidden;margin-bottom:8px}
.progbar>div{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:.3s}
.progtext{font-size:.82rem;font-weight:700;text-align:center;color:var(--muted)}
.nav{display:flex;gap:8px;overflow-x:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.nav button{border:2px solid var(--card-border);background:var(--card);color:var(--ink);padding:10px 16px;border-radius:30px;font-weight:700;font-size:.85rem;white-space:nowrap;cursor:pointer}
.nav button.active{background:var(--purple);color:#fff;border-color:var(--purple);transform:scale(1.04)}
.content{max-width:920px;margin:0 auto;padding:18px;background:var(--bg)}
.section{display:none}
.section.active{display:block}
.sec-title{font-size:1.5rem;font-weight:800;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.sec-emoji{font-size:1.3em}
.intro-line{color:var(--muted);margin:0 0 16px;font-size:.95rem}
.card{background:var(--card);border:2px solid var(--card-border);border-radius:18px;padding:16px 18px;margin:12px 0;box-shadow:0 4px 18px rgba(190,18,60,.08)}
.card h3{margin:0 0 10px;font-size:1.15rem}
.card ul.clean{margin:6px 0;padding-left:20px}
.card ul.clean li{margin-bottom:6px}
.hy{background:var(--amber-soft);border-left:5px solid var(--amber);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.9rem}
.mnem{background:var(--purple-soft);border-radius:12px;padding:12px 14px;margin:10px 0}
.mnem .tag{font-size:.72rem;font-weight:800;text-transform:uppercase;color:var(--purple);letter-spacing:.5px}
.mnem .big{font-size:1.05rem;font-weight:700;margin-top:4px}
.why-chain{background:var(--teal-soft);border-radius:10px;padding:10px 14px;margin:8px 0;font-size:.92rem}
table.lab{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85rem}
table.lab th{background:var(--purple);color:#fff;padding:8px;text-align:left;font-size:.8rem}
table.lab td{padding:8px;border-bottom:1px solid var(--card-border)}
table.lab tr:nth-child(even){background:var(--bg2)}
.tipbar{background:var(--teal-soft);border-radius:12px;padding:12px 14px;font-size:.88rem;margin:10px 0}
.center{text-align:center}
.btn{border:none;color:#fff;padding:11px 20px;border-radius:12px;font-weight:800;cursor:pointer;font-size:.95rem}
/* quiz */
.quiz-card{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:16px;margin:12px 0}
.q-text{font-weight:700;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;background:var(--bg2);border:2px solid var(--card-border);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:.9rem}
.opt.sel-multi{border-color:var(--select);background:var(--select-soft)}
.opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.opt.disabled{pointer-events:none;opacity:.85}
.submit-multi{margin-top:8px;background:linear-gradient(90deg,var(--teal),var(--green));color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:800;cursor:pointer}
.rationale{margin-top:10px;background:var(--bg2);border-left:4px solid var(--purple);border-radius:8px;padding:10px 12px;font-size:.85rem;display:none}
.rationale.show{display:block}
.quiz-score{font-size:1.15rem;font-weight:800;text-align:center;padding:16px;background:var(--purple-soft);border-radius:14px;margin:12px 0}

/* flash game */
.flash-progress{text-align:center;font-size:.85rem;color:var(--muted);margin-bottom:10px;font-weight:700}
.flash-card{background:var(--card);border:3px solid var(--purple);border-radius:20px;padding:34px 22px;min-height:160px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.12rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.12);transition:transform .15s,background .2s,border-color .2s}
.flash-card:active{transform:scale(.97)}
.flash-card.flipped{border-color:var(--teal);background:var(--teal-soft)}
.flash-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;display:block}
.flash-btns{display:flex;gap:10px;margin-top:14px}
.flash-btn{flex:1;padding:14px;border-radius:14px;border:none;font-weight:800;cursor:pointer;font-size:.92rem}
.flash-btn.learning{background:var(--amber-soft);color:var(--amber);border:2px solid var(--amber)}
.flash-btn.gotit{background:var(--green-soft);color:var(--green);border:2px solid var(--green)}

/* wrong answer vault */
.vault-empty{text-align:center;padding:30px 16px;font-size:1rem}
.vault-tag{display:inline-block;background:var(--purple-soft);color:var(--purple);font-size:.72rem;font-weight:800;border-radius:20px;padding:2px 10px;margin-bottom:8px}
.vault-solved{background:var(--green-soft);border:2px solid var(--green);color:var(--green);border-radius:10px;padding:8px 12px;margin-top:8px;font-size:.85rem;font-weight:700;text-align:center}

/* match game */
.match-stats{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;font-weight:800;font-size:.88rem;margin:10px 0;color:var(--ink)}
.match-wrap{position:relative}
.match-svg{display:block;position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.match-columns{display:flex;gap:10px;position:relative;z-index:2}
.match-col{flex:1 1 0;display:flex;flex-direction:column;gap:9px;min-width:0}
.match-item{width:100%;box-sizing:border-box;background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:11px 8px;font-size:.74rem;font-weight:700;cursor:pointer;text-align:left;transition:border-color .15s,background .15s,transform .1s;line-height:1.3;word-break:break-word;overflow-wrap:anywhere;white-space:normal}
.match-item:active{transform:scale(.98)}
.match-item.selected{border-color:var(--purple);background:var(--purple-soft)}
.match-item.matched{border-color:var(--green);background:var(--green-soft);color:var(--green);cursor:default;opacity:.75}
.match-item.shake{border-color:var(--red);background:var(--red-soft);animation:matchshake .35s}
@keyframes matchshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
body.mobile-mode .match-item{font-size:.95rem}
body.mobile-mode .match-stats{font-size:1rem}

/* exam: dropdown-match type */
.dm-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:2px solid var(--card-border);border-radius:12px;margin-bottom:8px;flex-wrap:wrap}
.dm-term{font-weight:800;flex:1 1 140px;min-width:120px}
.dm-select{flex:1 1 200px;padding:9px;border-radius:10px;border:2px solid var(--card-border);background:var(--bg2);color:var(--ink);font-size:.85rem}
.dm-row.dm-correct{border-color:var(--green);background:var(--green-soft)}
.dm-row.dm-wrong{border-color:var(--red);background:var(--red-soft)}

/* exam: order/sequence type */
.order-pool{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.order-chip{background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:11px 12px;font-size:.85rem;font-weight:700;cursor:pointer;text-align:left}
.order-chip:disabled{opacity:.35;cursor:default}
.order-answer{display:flex;flex-direction:column;gap:6px;margin:10px 0;min-height:40px;padding:8px;border:2px dashed var(--card-border);border-radius:12px}
.order-answer-item{display:flex;align-items:center;gap:8px;background:var(--purple-soft);border:2px solid var(--purple);border-radius:10px;padding:8px 10px;font-size:.82rem;font-weight:700}
.order-answer-item .num{background:var(--purple);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.order-answer-item.order-correct{background:var(--green-soft);border-color:var(--green)}
.order-answer-item.order-wrong{background:var(--red-soft);border-color:var(--red)}

/* drill */
.drill-top{display:flex;justify-content:space-between;font-size:.8rem;font-weight:700;margin-bottom:6px}
.drill-bar{height:8px;background:var(--card-border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.drill-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:.3s}
.drill-final{font-size:1.6rem;font-weight:800;color:var(--purple);margin:10px 0}

/* exam layout */
.mode-btn{flex:1;border:2px solid var(--card-border);background:var(--card);color:var(--ink);padding:12px;border-radius:12px;font-weight:800;cursor:pointer}
.mode-btn.active{background:linear-gradient(90deg,var(--purple),var(--pink));color:#fff;border-color:transparent}
.exam-mode-toggle{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.exam-mode-toggle .mode-btn{flex:1 1 90px;font-size:.85rem;padding:10px 6px}
.exam-q{background:var(--card);border:2px solid var(--card-border);border-radius:16px;padding:16px;margin:12px 0}
.qnum{font-size:.78rem;font-weight:800;color:var(--muted)}
.qtype{float:right;background:var(--teal-soft);color:var(--teal);padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:800}
.qtext{font-weight:700;margin:8px 0 14px;clear:both}
#examDots{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;justify-content:center}
.dot{width:12px;height:12px;border-radius:50%;background:var(--card-border);cursor:pointer}
.dot.answered{background:var(--purple)}
.dot.current{outline:2px solid var(--pink);outline-offset:2px}
.dot.dot-correct{background:var(--green)}
.dot.dot-wrong{background:var(--red)}
.exam-nav{display:flex;justify-content:space-between;gap:10px;margin:14px 0}

/* back to top */
#backToTopBtn{position:fixed;bottom:22px;right:18px;z-index:999;width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-size:1.3rem;box-shadow:0 4px 14px rgba(0,0,0,.25);cursor:pointer;display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .25s,transform .15s}
#backToTopBtn.show{display:flex;opacity:1}
#backToTopBtn:active{transform:scale(.9)}

/* jeopardy */
.jep-board{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:14px 0}
.jep-cat{background:var(--purple);color:#fff;font-weight:800;font-size:.7rem;text-align:center;padding:8px 4px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:50px;line-height:1.2}
.jep-tile{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-weight:900;font-size:1.1rem;text-align:center;padding:16px 4px;border-radius:8px;cursor:pointer;border:none;min-height:50px}
.jep-tile:disabled{background:var(--card-border);color:var(--muted);cursor:default;opacity:.5}
.jep-modal{background:var(--card);border:3px solid var(--purple);border-radius:18px;padding:24px 18px;margin:16px 0;text-align:center}
.jep-clue{font-size:1.05rem;font-weight:700;margin-bottom:16px;min-height:60px;display:flex;align-items:center;justify-content:center}
.jep-score{text-align:center;font-size:1.3rem;font-weight:800;color:var(--purple);margin:10px 0}

/* millionaire */
.mill-ladder{display:flex;flex-direction:column-reverse;gap:3px;margin:14px 0;max-height:340px;overflow-y:auto}
.mill-rung{padding:7px 12px;border-radius:8px;font-size:.8rem;font-weight:700;text-align:center;background:var(--card);border:2px solid var(--card-border)}
.mill-rung.mill-current{background:linear-gradient(90deg,var(--amber),var(--pink));color:#fff;border-color:transparent;transform:scale(1.03)}
.mill-rung.mill-passed{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.mill-rung.mill-milestone{border-style:dashed;border-width:3px}
.mill-lifelines{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.mill-lifeline-btn{background:var(--teal-soft);color:var(--teal);border:2px solid var(--teal);border-radius:20px;padding:8px 14px;font-weight:800;font-size:.8rem;cursor:pointer}
.mill-lifeline-btn:disabled{opacity:.3;cursor:default;text-decoration:line-through}
.mill-opt{width:100%;text-align:left;background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;font-weight:700;font-size:.9rem}
.mill-opt.mill-selected{border-color:var(--amber);background:var(--amber-soft)}
.mill-opt.mill-correct{background:var(--green-soft);border-color:var(--green)}
.mill-opt.mill-wrong{background:var(--red-soft);border-color:var(--red)}
.mill-opt:disabled{opacity:.4;cursor:default}
</style>
</head>
<body data-theme="day">

<div class="topbar">
  <h1>🫀 NUR 256 — Unit 4 Study Lab</h1>
  <div class="sub">Cardiac • Vascular/PAD • Hypertension • Cardiac Meds • Reproductive Health & STIs</div>
  <div class="toggles">
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">🌙 Night</button>
    <button class="tbtn" id="mobileBtn" onclick="toggleMobile()">🔍 Big Text</button>
    <button class="tbtn" id="shuffleBtn" onclick="toggleShuffle()">🔀 Shuffle: ON</button>
  </div>
</div>

<div class="progwrap">
  <div class="progbar-bg">
    <div class="progbar"><div id="progbar"></div></div>
    <div class="progtext" id="progtext">0 quiz questions answered • Let's build this out! 💪</div>
    <div style="text-align:center;margin-top:6px"><button onclick="resetAllProgress()" style="background:none;border:none;color:var(--muted);font-size:.68rem;text-decoration:underline;cursor:pointer">↺ reset my saved progress</button></div>
  </div>
</div>

<div class="nav" id="nav"></div>
<div class="content" id="content"></div>
<button id="backToTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top" aria-label="Back to top">⬆️</button>

<script>
let shuffleAnswers=true;
function toggleShuffle(){
  shuffleAnswers=!shuffleAnswers;
  const b=document.getElementById('shuffleBtn'); if(b)b.textContent='🔀 Shuffle: '+(shuffleAnswers?'ON':'OFF');
  try{ localStorage.setItem('nur256u4_shuffle', shuffleAnswers?'1':'0'); }catch(e){}
}
function toggleTheme(){
  const b=document.body;
  const night = b.getAttribute('data-theme')!=='night';
  b.setAttribute('data-theme', night?'night':'day');
  const t1=document.getElementById('themeBtn'); if(t1)t1.textContent=night?'☀️ Day':'🌙 Night';
  try{ localStorage.setItem('nur256u4_theme', night?'night':'day'); }catch(e){}
}
function toggleMobile(){
  const b=document.body;
  b.classList.toggle('mobile-mode');
  const on=b.classList.contains('mobile-mode');
  const m1=document.getElementById('mobileBtn'); if(m1)m1.textContent=on?'🔍 Normal Text':'🔍 Big Text';
  try{ localStorage.setItem('nur256u4_bigtext', on?'1':'0'); }catch(e){}
}
(function restorePrefs(){
  try{
    if(localStorage.getItem('nur256u4_theme')==='night'){ document.body.setAttribute('data-theme','night');
      var t1=document.getElementById('themeBtn'); if(t1)t1.textContent='☀️ Day'; }
    if(localStorage.getItem('nur256u4_bigtext')==='1'){ document.body.classList.add('mobile-mode');
      var m1=document.getElementById('mobileBtn'); if(m1)m1.textContent='🔍 Normal Text'; }
    const sh=localStorage.getItem('nur256u4_shuffle');
    if(sh==='0'){ shuffleAnswers=false; var s1=document.getElementById('shuffleBtn'); if(s1)s1.textContent='🔀 Shuffle: OFF'; }
  }catch(e){}
})();

/* ===== PROGRESS ===== */
let answeredQs=new Set(), totalTrackable=0;
(function restoreProgress(){ try{ const r=localStorage.getItem('nur256u4_progress'); if(r) answeredQs=new Set(JSON.parse(r)); }catch(e){} })();
function bumpProgress(qid){ answeredQs.add(qid); try{ localStorage.setItem('nur256u4_progress', JSON.stringify([...answeredQs])); }catch(e){} updateProg(); }
function updateProg(){
  const pct = totalTrackable ? Math.min(100, Math.round(answeredQs.size/totalTrackable*100)) : 0;
  const pb=document.getElementById('progbar'); if(pb) pb.innerHTML=`<div style="width:${pct}%"></div>`;
  const msgs=["Let's build this out! 💪","Warming up! 🔥","Nice momentum! ⭐","Crushing it! 🚀","Almost there! 🎯","Unit 4 ready! 👑"];
  const m=msgs[Math.min(msgs.length-1,Math.floor(pct/20))];
  const pt=document.getElementById('progtext'); if(pt)pt.textContent=`${answeredQs.size} quiz questions answered • ${m}`;
}
function resetAllProgress(){ if(!confirm('Reset all saved progress? This cannot be undone.'))return; answeredQs=new Set(); try{ localStorage.removeItem('nur256u4_progress'); }catch(e){} updateProg(); alert('Progress reset. Fresh start! 💜'); }

/* ===== NAV / SECTIONS ===== */
const SECTIONS=[
  {id:'home',label:'🏠 Start'},
  {id:'why',label:'🧠 Why Engine'},
  {id:'htn',label:'📈 Hypertension'},
  {id:'acs',label:'💔 ACS & Cardiac'},
  {id:'vascular',label:'🦵 PAD / PVD / DVT'},
  {id:'meds',label:'💊 Cardiac Meds'},
  {id:'cardiomatch',label:'🔗 Cardiac Match Game'},
  {id:'repro',label:'🩺 Reproductive & STIs'},
  {id:'repromatch',label:'🔗 Repro/STI Match Game'},
  {id:'decoder',label:'🗂️ Disorder Decoder'},
  {id:'studymode',label:'🧩 Study Mode'},
  {id:'tricks',label:'🎯 Trick Questions'},
  {id:'challenge',label:'🎓 Med-Surg Challenge'},
  {id:'vault',label:'🗄️ Wrong Answer Vault'},
  {id:'flash',label:'🎮 Flash Study Game'},
  {id:'jeopardy',label:'🏆 Jeopardy'},
  {id:'millionaire',label:'💰 Millionaire'},
  {id:'drill',label:'⚡ Rapid Drill'},
  {id:'exam',label:'📝 Exam'},
];
const nav=document.getElementById('nav'), content=document.getElementById('content');
SECTIONS.forEach((s,i)=>{
  const btn=document.createElement('button'); btn.id='nav-'+s.id;
  if(s.id==='vault'){ btn.innerHTML=s.label+' <span id="vaultCount" style="background:var(--red);color:#fff;border-radius:20px;padding:1px 8px;font-size:.72rem;margin-left:2px">0</span>'; }
  else{ btn.textContent=s.label; }
  if(i===0)btn.classList.add('active');
  btn.onclick=()=>showSection(s.id);
  nav.appendChild(btn);
  const sec=document.createElement('div'); sec.className='section'+(i===0?' active':''); sec.id='sec-'+s.id; content.appendChild(sec);
});
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='vault' && typeof renderVaultSection==='function') renderVaultSection();
  const isMatchGame=(id==='cardiomatch'||id==='repromatch');
  if(typeof matchTimerInt!=='undefined' && matchTimerInt && !isMatchGame){ clearInterval(matchTimerInt); matchTimerInt=null; }
  if(isMatchGame && typeof startMatchGame==='function') startMatchGame(id);

function stripLabel(text){ return text.replace(/^[A-Za-z]\.\s*/,''); }
function relabel(optsArr){
  const L=['A','B','C','D','E','F'];
  return optsArr.map((o,i)=>L[i]+'. '+stripLabel(o));
}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);}
function prepareQuestion(qOrig){
  let opts=qOrig.opts.slice();
  let correct=qOrig.type==='multi'?qOrig.correct.slice():qOrig.correct;
  if(shuffleAnswers){
    const order=shuffle(opts.map((_,i)=>i));
    const newOpts=order.map(i=>opts[i]);
    if(qOrig.type==='multi'){
      const correctSet=new Set(correct);
      correct=order.map((origIdx,newIdx)=>correctSet.has(origIdx)?newIdx:null).filter(x=>x!==null);
    } else {
      correct=order.indexOf(correct);
    }
    opts=newOpts;
  }
  return {...qOrig, opts:relabel(opts), correct};
}
let quizTotalCounted=new Set();
function renderQuiz(containerId, questions, title, source, indexMap){
  const host=document.getElementById(containerId);
  if(!host)return;
  host.innerHTML='';

  if(title){ const h=document.createElement('h3'); h.textContent='📝 '+title; h.style.color='var(--pink)'; wrap.appendChild(h); }

    const qi = indexMap ? indexMap[localIdx] : localIdx;
    const q=prepareQuestion(qOrig);
    const qid=containerId+'-'+qi;
    if(!quizTotalCounted.has(qid)){ quizTotalCounted.add(qid); totalTrackable++; }
    const card=document.createElement('div'); card.className='quiz-card';
    const qt=document.createElement('div'); qt.className='q-text'; qt.textContent=(localIdx+1)+'. '+q.q; card.appendChild(qt);
    const opts=document.createElement('div'); opts.className='opts'; card.appendChild(opts);
    const rat=document.createElement('div'); rat.className='rationale'; rat.innerHTML='<b>Rationale:</b> '+q.rat;
    if(q.type==='multi'){
      const chosen=new Set();
      q.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{ if(chosen.has(i)){chosen.delete(i);btn.classList.remove('sel-multi');}else{chosen.add(i);btn.classList.add('sel-multi');} };
        opts.appendChild(btn);
      });
      const sub=document.createElement('button'); sub.className='submit-multi'; sub.textContent='Check Answer';
      sub.onclick=()=>{
        const correct=new Set(q.correct);
        let allRight=chosen.size===correct.size;
        opts.querySelectorAll('.opt').forEach((b,i)=>{
          b.classList.add('disabled');
          if(correct.has(i))b.classList.add('correct');
          else if(chosen.has(i)){b.classList.add('wrong');allRight=false;}

        if(!allRight){ addToVault({id:qid,q:q.q,opts:q.opts,type:'multi',correct:q.correct,rat:q.rat,source:source||title||''}); }
        rat.classList.add('show'); sub.style.display='none'; bumpProgress(qid);
      };

    } else {
      q.opts.forEach((o,i)=>{

        btn.onclick=()=>{

function renderVaultOrder(rawEntry, safeId, bodyHost, ratHost){

        }
      };
      btnRow.appendChild(checkBtn);
    }
    bodyHost.appendChild(btnRow);
  }
  redraw();
}

  const tiers=[...new Set(pairs.map(p=>p.tier))].sort((a,b)=>a-b);
  let order=[];
  tiers.forEach(t=>{
    const idxs=pairs.map((p,i)=>({p,i})).filter(x=>x.p.tier===t).map(x=>x.i);
    order=order.concat(shuffle(idxs));
  });
  return order;
}
function difficultyLabel(gameId, roundIdx){
  const pairs=MATCH_GAMES[gameId].pairs;
  if(!pairs.some(p=>typeof p.tier==='number')) return '';
  const roundsPerTier = Math.ceil(pairs.length/ROUND_SIZE/3) || 1;
  const tierIdx = Math.min(2, Math.floor(roundIdx/roundsPerTier));
  return ['🟢 Easier','🟡 Medium','🔴 Hardest'][tierIdx];
}
function startMatchGame(gameId){
  currentMatchGame = MATCH_GAMES[gameId];
  currentMatchGame.sectionId = gameId;
  try{ const r=localStorage.getItem(currentMatchGame.bestKey); matchBestTime = r?parseFloat(r):null; }catch(e){ matchBestTime=null; }
  const totalPairs=currentMatchGame.pairs.length;
  const totalRounds=Math.ceil(totalPairs/ROUND_SIZE);
  let prog=matchProgress[gameId];
  if(!prog || !prog.cycleOrder || prog.roundIdx>=totalRounds || prog.cycleOrder.length!==totalPairs){
    prog={ cycleOrder: buildCycleOrder(currentMatchGame.pairs), roundIdx:0 };
  }
  matchProgress[gameId]=prog; saveMatchProgress();
  const startIdx=prog.roundIdx*ROUND_SIZE;
  const idxSlice=prog.cycleOrder.slice(startIdx, startIdx+ROUND_SIZE);
  matchRoundPairs = idxSlice.map(i=>currentMatchGame.pairs[i]);
  matchLeftOrder = shuffle(matchRoundPairs.map((p,i)=>i));
  matchRightOrder = shuffle(matchRoundPairs.map((p,i)=>i));
  matchSelectedLeft=null; matchMatchedCount=0; matchStartTime=Date.now();
  drawMatchGame(totalRounds);
  if(matchTimerInt) clearInterval(matchTimerInt);
  matchTimerInt=setInterval(updateMatchTimer,200);
}
function updateMatchTimer(){
  const el=document.getElementById('matchTimer');
  if(!el){ clearInterval(matchTimerInt); return; }
  el.textContent='⏱️ '+((Date.now()-matchStartTime)/1000).toFixed(1)+'s';
}
function drawMatchGame(totalRounds){
  const host=document.getElementById('sec-'+currentMatchGame.sectionId);
  const bestTxt = matchBestTime ? matchBestTime.toFixed(1)+'s' : '—';
  const prog=matchProgress[currentMatchGame.sectionId];
  const diff=difficultyLabel(currentMatchGame.sectionId, prog.roundIdx);
  host.innerHTML=`
  <h2 class="sec-title"><span class="sec-emoji">${currentMatchGame.emoji}</span> ${currentMatchGame.title}</h2>
  <p class="intro-line">${currentMatchGame.intro}</p>
  <div class="match-stats">
    <span>📍 Round ${prog.roundIdx+1} of ${totalRounds}</span>
    ${diff?`<span>${diff}</span>`:''}
    <span id="matchTimer">⏱️ 0.0s</span>
    <span>✅ <span id="matchCount">0</span> / ${matchRoundPairs.length}</span>
    <span>🏆 Best round: ${bestTxt}</span>
  </div>
  <p class="intro-line" style="text-align:center;margin-top:0">Tap a term on the left, then tap its match on the right — a line connects them.</p>
  <div class="match-wrap" id="matchWrap">
    <svg class="match-svg" id="matchSvg"></svg>
    <div class="match-columns">
      <div class="match-col" id="matchColLeft"></div>
      <div class="match-col" id="matchColRight"></div>
    </div>
  </div>
  <div class="center" style="margin-top:12px"><button class="btn" style="background:var(--purple)" onclick="startMatchGame('${currentMatchGame.sectionId}')">🔀 Replay This Round</button></div>
  <div id="matchWin"></div>
  `;
  const colL=document.getElementById('matchColLeft'), colR=document.getElementById('matchColRight');
  matchLeftOrder.forEach(pairIdx=>{
    const btn=document.createElement('button'); btn.className='match-item'; btn.textContent=matchRoundPairs[pairIdx].a;
    btn.dataset.pair=pairIdx; btn.dataset.side='left';
    btn.onclick=()=>matchPickLeft(pairIdx, btn);
    colL.appendChild(btn);
  });
  matchRightOrder.forEach(pairIdx=>{
    const btn=document.createElement('button'); btn.className='match-item'; btn.textContent=matchRoundPairs[pairIdx].b;
    btn.dataset.pair=pairIdx; btn.dataset.side='right';
    btn.onclick=()=>matchPickRight(pairIdx, btn);
    colR.appendChild(btn);
  });
}
function matchPickLeft(pairIdx, el){
  if(el.classList.contains('matched'))return;
  document.querySelectorAll('#matchColLeft .match-item').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  matchSelectedLeft={pairIdx, el};
}
function matchPickRight(pairIdx, el){
  if(el.classList.contains('matched')||!matchSelectedLeft)return;
  const leftEl=matchSelectedLeft.el;
  if(matchSelectedLeft.pairIdx===pairIdx){
    leftEl.classList.remove('selected'); leftEl.classList.add('matched');
    el.classList.add('matched');
    drawMatchLine(leftEl, el);
    matchMatchedCount++;
    document.getElementById('matchCount').textContent=matchMatchedCount;
    matchSelectedLeft=null;
    if(matchMatchedCount===matchRoundPairs.length){ matchFinish(); }
  } else {
    leftEl.classList.add('shake'); el.classList.add('shake');
    setTimeout(()=>{
      leftEl.classList.remove('selected','shake'); el.classList.remove('shake');
    },500);
    matchSelectedLeft=null;
  }
}
function drawMatchLine(leftEl, rightEl){
  const svg=document.getElementById('matchSvg'), wrap=document.getElementById('matchWrap');
  if(!svg||!wrap)return;
  const wrapRect=wrap.getBoundingClientRect();
  const lr=leftEl.getBoundingClientRect(), rr=rightEl.getBoundingClientRect();
  const x1=lr.right-wrapRect.left, y1=lr.top-wrapRect.top+lr.height/2;
  const x2=rr.left-wrapRect.left, y2=rr.top-wrapRect.top+rr.height/2;
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1); line.setAttribute('y1',y1); line.setAttribute('x2',x2); line.setAttribute('y2',y2);
  line.style.stroke='var(--green)'; line.style.strokeWidth='3'; line.style.strokeLinecap='round';
  svg.appendChild(line);
}
function matchFinish(){
  clearInterval(matchTimerInt);
  const elapsed=(Date.now()-matchStartTime)/1000;
  let isNewBest=false;
  if(!matchBestTime || elapsed<matchBestTime){ matchBestTime=elapsed; isNewBest=true; try{ localStorage.setItem(currentMatchGame.bestKey, elapsed.toFixed(2)); }catch(e){} }
  const prog=matchProgress[currentMatchGame.sectionId];
  const totalRounds=Math.ceil(currentMatchGame.pairs.length/ROUND_SIZE);
  prog.roundIdx++;
  saveMatchProgress();
  const cycleDone = prog.roundIdx>=totalRounds;
  document.getElementById('matchWin').innerHTML=`<div class="quiz-score">🎉 Matched all ${matchRoundPairs.length} pairs in ${elapsed.toFixed(1)}s!${isNewBest?' <br>🏆 New best round time!':''}
    <br><br>${cycleDone
      ? "✅ That's every pair in this deck! Nice — full cycle complete."
      : `Round ${prog.roundIdx} of ${totalRounds} done.`}
    <br><button class="btn" style="background:var(--green);margin-top:10px" onclick="startMatchGame('${currentMatchGame.sectionId}')">${cycleDone? '🔄 Start a New Cycle (reshuffled)' : '➡️ Next Round'}</button>
  </div>`;
}
document.getElementById('sec-cardiomatch').innerHTML=`<p class="intro-line">Loading match game...</p>`;
document.getElementById('sec-repromatch').innerHTML=`<p class="intro-line">Loading match game...</p>`;
</script>

<script>
document.getElementById('sec-why').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🧠</span> Why Engine</h2>
<p class="intro-line">Mechanism first — the same approach that got you through Unit 3. Know WHY, and the trick wording stops working on you.</p>

<div class="card" style="border-color:var(--red)">
  <h3>📈 Hypertension — why it's the "silent killer"</h3>
  <p><b>Root cause:</b> BP = Cardiac Output × Peripheral Vascular Resistance. Anything that raises CO (fluid volume, heart rate) or raises PVR (vasoconstriction, stiff/narrowed vessels) raises BP.</p>
  <p class="why-chain"><b>Reason it forward:</b> chronically elevated pressure damages vessel walls slowly and painlessly for YEARS before symptoms appear — <b>because</b> there's no pain fiber warning system for gradually rising pressure the way there is for, say, a broken bone. By the time symptoms show up (retinal changes, kidney damage, LVH), organ damage has often already occurred. <b>That's why routine screening matters more than waiting for symptoms.</b></p>
  <div class="hy">⭐ HTN doesn't hurt until it's already hurt something — the entire rationale for lifelong monitoring and treatment even when the patient "feels fine."</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🦵 Atherosclerosis & PAD — why legs hurt with exercise, not at rest</h3>
  <p><b>Root cause:</b> endothelial injury (from smoking, hyperlipidemia, HTN, diabetes) triggers fatty streaks → fibrous plaques → progressively narrowed arteries.</p>
  <p class="why-chain"><b>Reason it forward:</b> at rest, a narrowed artery can still often deliver JUST enough oxygen to resting muscle. <b>Because</b> exercise dramatically increases the muscle's oxygen demand, and the narrowed artery can't increase supply to match, the mismatch produces pain — <b>intermittent claudication</b>. <b>Because</b> the pain resolves with rest (demand drops back down to what the narrowed vessel can supply), this is fundamentally a supply-vs-demand problem, not a constant-damage problem — which is exactly why controlled exercise (walk to pain, rest, resume) is actually part of treatment, not something to avoid entirely.</p>
  <div class="hy">⭐ ABI (ankle-brachial index) 1.0-1.4 = normal. Below that = arterial narrowing (lower is worse). <b>Above 1.4</b> doesn't mean "great circulation" — it means the vessel is too calcified/stiff to compress normally, which itself correlates with heart disease risk.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🩸 DVT — Virchow's Triad (the 3 things that have to line up)</h3>
  <p><b>Root cause:</b> a clot needs THREE conditions, at least one of which is usually present: <b>(1) endothelial damage</b> (injury, surgery, IV catheters), <b>(2) venous stasis</b> (immobility, long flights, post-op bedrest), <b>(3) hypercoagulability</b> (oral contraceptives, pregnancy, cancer, genetic clotting disorders).</p>
  <p class="why-chain"><b>Reason it forward:</b> blood that isn't moving (stasis) allows clotting factors to accumulate locally instead of being diluted/washed away; damaged endothelium exposes collagen and tissue factor that activate clotting; and a hypercoagulable state means clotting activates more easily than it should. <b>Because</b> all three mechanisms converge on the same outcome (a stable clot), treatment (anticoagulation) targets the clotting cascade regardless of which of the three factors triggered it.</p>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">Virchow's Triad: "Damage, Stasis, Stickiness"</div></div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💔 ACS — why it's a supply problem, not a heart-failure problem</h3>
  <p><b>Root cause:</b> a coronary artery (already narrowed by atherosclerosis) suddenly becomes further obstructed — usually a plaque ruptures and a thrombus forms on top of it — cutting off or drastically reducing blood flow to a section of heart muscle.</p>
  <p class="why-chain"><b>Reason it forward:</b> heart muscle downstream of the blockage is suddenly starved of oxygen (ischemia) → this causes pain (angina) as the tissue protests the mismatch. <b>Because</b> the coronary arteries are perfused during DIASTOLE (when the heart itself isn't squeezing), anything that shortens diastole — like tachycardia — reduces how much blood the heart muscle itself actually receives, which is exactly why a fast heart rate is dangerous in someone with coronary disease, not just uncomfortable.</p>
  <div class="hy">⭐ Stable angina = predictable, resolves with rest/nitro. Unstable angina = new, worsening, or occurring at rest — a warning that the plaque may be actively unstable and could progress to full MI (necrosis) at any time.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🧍 Orthostatic hypotension — why standing up can drop your pressure</h3>
  <p><b>Root cause:</b> standing up shifts a large volume of blood downward into the legs/abdomen due to gravity, temporarily reducing the volume of blood returning to the heart (preload).</p>
  <p class="why-chain"><b>Reason it forward:</b> normally, baroreceptors detect the drop and trigger a quick reflex (vasoconstriction + increased heart rate) to compensate within seconds. <b>Because</b> dehydration, blood loss, or vasodilating medications blunt this compensatory reflex or reduce the blood volume available to redistribute, the BP drop becomes exaggerated and sustained — defined as a drop of <b>≥20 mmHg systolic or ≥10 mmHg diastolic within 3 minutes of standing.</b></p>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>💊 Cardiac meds — the mechanism behind each class</h3>
  <ul class="clean">
    <li><b>ACE inhibitors / ARBs</b> — block the RAAS pathway (angiotensin II formation or its receptor), preventing vasoconstriction and aldosterone-driven sodium/water retention → lowers BP and reduces cardiac workload.</li>
    <li><b>Beta-blockers</b> — block sympathetic (catecholamine) stimulation of the heart → slower rate, less forceful contraction, lower BP, and less oxygen demand (useful in both HTN and ACS).</li>
    <li><b>Calcium channel blockers</b> — block calcium entry into cardiac/smooth muscle cells → less forceful contraction and vasodilation → lower HR and BP ("calms the heart").</li>
    <li><b>Digoxin</b> — positive inotrope (increases contractile force) but negative chronotrope (slows heart rate) — <b>because</b> it affects the sodium-potassium pump and vagal tone differently than it affects contractile proteins, it can do both at once. Renally cleared, so renal failure lets it accumulate; hypokalemia increases the risk of toxicity because digoxin and potassium compete for the same binding site on that pump.</li>
    <li><b>Diuretics</b> — remove excess fluid volume → less preload, less workload on the heart; the #1 medication class for heart failure specifically because it directly addresses fluid overload.</li>
  </ul>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🩸 Preload & Afterload — the two things every heart has to manage</h3>
  <ul class="clean">
    <li><b>Preload</b> = the volume of blood filling/stretching the atria (and ventricles) before contraction — essentially "how much comes back to the heart." More blood returning → more stretch → (up to a point) a stronger contraction.</li>
    <li><b>Afterload</b> = the resistance the ventricles must push AGAINST to eject blood out into the vasculature — essentially "how hard the heart has to work to open the door."</li>
  </ul>
  <p class="why-chain"><b>Why this matters clinically:</b> a potent vasodilator drops afterload (less resistance to push against) — <b>but</b> if it dilates veins too, it can also drop preload (less blood returning), which can drop cardiac output and blood pressure more than intended. <b>This is exactly why the nurse monitors BP closely during vasodilator administration</b> — you're adjusting both sides of the same equation at once, and can overshoot into hypotension.</p>
  <div class="hy">⭐ Nitroglycerin's mechanism is specifically about REDUCING PRELOAD (venodilation, less blood returning to an already-oxygen-starved heart) — that's why it helps angina: less volume for the struggling heart to deal with, not primarily an afterload effect.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>💧 CVP (Central Venous Pressure) — reading fluid status directly</h3>
  <p>CVP measures pressure in the vena cava/right atrium — a direct readout of fluid status in the vascular space and right ventricular preload. <b>Normal range: 2-6 mmHg.</b></p>
  <table class="lab">
    <tr><th>CVP</th><th>Interpretation</th></tr>
    <tr><td><b>&lt; 2 mmHg</b></td><td>Dehydration / fluid volume deficit</td></tr>
    <tr><td><b>2-6 mmHg</b></td><td>Normal</td></tr>
    <tr><td><b>&gt; 6 mmHg</b></td><td>Fluid overload / right-sided heart failure</td></tr>
  </table>
  <p><b>Why CVP requires a CENTRAL line specifically:</b> a central line's catheter tip terminates in the vena cava, just above the right atrium — that's what makes it "central." A peripheral IV or midline stops well short of that point in the peripheral circulation, so it physically cannot measure this pressure. This is the actual anatomical distinction between "central" and "peripheral" access, not just a naming convention.</p>
  <p class="why-chain"><b>Why this connects to BNP:</b> a high CVP means excess volume is backing up on the right side — the same fluid overload that stretches the cardiac chambers and triggers BNP release. <b>A high CVP with dyspnea and an elevated BNP all point to the same underlying story</b> — right-sided volume overload significant enough to also strain pulmonary/left-sided function, not three unrelated findings.</p>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🩸 Atherosclerosis vs. Arteriosclerosis — not interchangeable</h3>
  <ul class="clean">
    <li><b>Arteriosclerosis</b> is the broader, general term — thickening, hardening, and loss of elasticity of arterial walls from ANY cause.</li>
    <li><b>Atherosclerosis</b> is the SPECIFIC, most common form of arteriosclerosis — caused by fatty/lipid plaque (atheroma) buildup narrowing the artery. This is the process behind PAD, CAD, and most of the vascular disease covered in this unit.</li>
  </ul>
  <div class="hy">⭐ Every atherosclerosis is a type of arteriosclerosis, but not every arteriosclerosis is atherosclerosis — arteriosclerosis is the umbrella term, atherosclerosis is the specific plaque-driven mechanism most relevant to everything else in this unit.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🚨 The 6 Ps of Acute Arterial Obstruction</h3>
  <p><b>Mechanism:</b> a sudden, complete blockage of arterial flow (embolism, thrombosis, trauma) cuts off oxygen delivery to everything downstream — nerves, muscle, and skin all react to that oxygen debt, just at different speeds and in different ways.</p>
  <div class="mnem"><div class="tag">The 6 Ps</div><div class="big">Pain, Pallor, Paresthesia, Pulselessness, Poikilothermia, Paralysis</div></div>
  <ul class="clean">
    <li><b>Pain</b> — the first symptom, from tissue ischemia.</li>
    <li><b>Pallor</b> — pale skin from lost arterial blood flow.</li>
    <li><b>Paresthesia</b> — "pins and needles"/numbness as nerves (highly oxygen-sensitive) start to fail.</li>
    <li><b>Pulselessness</b> — the artery is blocked, so there's nothing to feel distal to it.</li>
    <li><b>Poikilothermia</b> — the limb becomes cold and starts to take on the temperature of its surroundings, since warm arterial blood isn't reaching it.</li>
    <li><b>Paralysis</b> — a LATE, ominous sign — muscle and nerve tissue have been oxygen-deprived long enough to stop functioning. This signals a true limb-threatening emergency.</li>
  </ul>
  <div class="hy">⭐ <b>Paresthesia and paralysis are not interchangeable</b> — paresthesia is early/reversible-if-treated-fast; paralysis means significant tissue damage has likely already occurred. Recognizing WHERE in that sequence a patient is tells you how urgent the situation has become.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>❤️ Right-sided vs. Left-sided Heart Failure — why the symptoms are backward from each other</h3>
  <p><b>Mechanism:</b> each side of the heart backs up fluid into whatever is UPSTREAM of it when it fails to pump forward effectively.</p>
  <ul class="clean">
    <li><b>Right-sided HF</b> — the right side normally receives blood from the systemic (body-wide) venous system. When it fails, blood backs up into the systemic venous system: <b>peripheral edema, jugular venous distention (JVD), weight gain, ascites.</b></li>
    <li><b>Left-sided HF</b> — the left side normally receives blood from the lungs (pulmonary circulation). When it fails, blood backs up into the lungs: <b>pulmonary congestion, crackles, dyspnea.</b></li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"RIGHT side fails → body swells. LEFT side fails → LUNGS fill."</div></div>
  <div class="hy">⭐ Left-sided failure is usually what CAUSES right-sided failure over time (backed-up pulmonary pressure eventually strains the right side too) — so many patients eventually show both sets of symptoms, but knowing which came from which side is exactly what these questions test.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🔗 Erectile dysfunction as an early vascular warning sign</h3>
  <p class="why-chain">The vessels supplying the penis are smaller in diameter than coronary arteries — <b>because</b> of this, the SAME atherosclerotic process that will eventually narrow the coronary arteries often narrows these smaller vessels FIRST, simply because a small amount of plaque has a proportionally bigger effect on a smaller-diameter vessel. This is why new-onset ED in a middle-aged or older male is treated as a potential early sign of systemic vascular disease, not just a standalone concern — it may show up years before a cardiac event does.</p>
</div>
`;
</script>

<div class="card">

    <li><b>Heart:</b> CAD, angina, MI, left ventricular hypertrophy, heart failure.</li>
    <li><b>Kidneys:</b> increased BUN/creatinine, progressive kidney damage.</li>
    <li><b>Brain:</b> TIA, stroke.</li>
  </ul>
</div>

<div class="card">
  <h3>💊 Treatment — stepwise approach</h3>
  <ul class="clean">
    <li><b>Everyone starts with lifestyle changes:</b> diet (DASH, sodium reduction), exercise, weight loss, limiting alcohol (general guidance: no more than 1 drink/day for women, 2 drinks/day for men).</li>
    <li><b>First-line medications per your instructor: thiazide diuretics, ACE inhibitors, ARBs</b>, and calcium channel blockers. <b>Alpha- and beta-blockers are NOT typically first-line for routine HTN</b> — their use is more limited/specific (e.g., beta-blockers especially in gestational hypertension).</li>
    <li>Medication typically starts with a <b>two-drug combination</b> (e.g., ACE/ARB + CCB or diuretic), often as a single combined pill, especially for Stage 2.</li>
    <li><b>Stage 2 goal: &lt;130/80 mmHg.</b> Avoid combining an ACE inhibitor WITH an ARB (redundant RAAS blockade, higher risk of hyperkalemia/renal injury without added benefit).</li>
    <li><b>ACE inhibitors/ARBs are specifically favored for kidney protection</b> (in addition to BP control) — this is why they're often chosen for patients with diabetes or early kidney disease, not just for blood pressure control alone.</li>
    <li>Compelling indications (heart failure, CKD) steer drug choice toward specific classes per ACC/AHA guidelines.</li>
  </ul>
</div>

<script>
document.getElementById('sec-acs').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">💔</span> ACS & Cardiac Assessment</h2>
<p class="intro-line">Acute coronary syndrome, diagnostics, and the physical assessment findings that tell the story.</p>

<div class="card" style="border-color:var(--red)">
  <h3>💔 ACS — angina vs. MI</h3>
  <ul class="clean">
    <li><b>ACS (acute coronary syndrome)</b> = blood flow to heart muscle is suddenly reduced or stopped (ischemia), producing chest pain (angina) or a full heart attack (MI).</li>
    <li><b>Stable angina</b> — predictable, triggered by exertion, resolves with rest/nitroglycerin.</li>
    <li><b>Unstable angina</b> — new, worsening, or occurring at rest. A warning sign the plaque may be unstable — treat as a medical emergency, not "just angina."</li>
    <li><b>MI</b> — sustained ischemia causes actual tissue necrosis (cell death), not just reversible oxygen debt.</li>
  </ul>
</div>

<div class="card">
  <h3>🧪 Diagnosing ACS/MI</h3>
  <ul class="clean">
    <li><b>Troponin I</b> — most sensitive/specific cardiac biomarker; released from necrotic myocardial cells.</li>
    <li><b>CK-MB</b> — another cardiac enzyme marker, less specific than troponin but still used.</li>
    <li><b>Lipid panel</b> — assesses CAD risk factors (cholesterol, triglycerides, LDL/HDL); requires fasting.</li>
    <li><b>12-lead ECG</b> — should be obtained within 10 minutes of ED arrival for suspected ACS; identifies ischemia, injury, infarction location through changes in EKG morphology.</li>
    <li><b>High-sensitivity CRP</b> — inflammatory biomarker, additional CV risk indicator.</li>
    <li><b>BNP (B-type natriuretic peptide)</b> — elevates specifically with fluid retention/ventricular strain; primary indicator used for heart failure, not ACS itself, but often drawn in the same cardiac workup.</li>
  </ul>
  <div class="hy">⭐ Goals of treatment: prevent a FUTURE MI and improve overall heart health through both medications and lifestyle change — not just treat the current event in isolation.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💊 Acute MI medication management</h3>
  <ul class="clean">
    <li><b>Thrombolytics</b> — dissolve the clot causing the arterial blockage; time-critical, used in acute cases to salvage as much myocardium as possible.</li>
    <li><b>Antiplatelets</b> — inhibit the clotting cascade to prevent further clot formation/extension.</li>
    <li><b>Antihypertensives, nitroglycerin</b> — reduce cardiac workload and oxygen demand (nitro specifically via preload reduction, see the Why Engine).</li>
    <li><b>Nitroglycerin dosing for ischemic chest pain:</b> if pain persists despite nitroglycerin per protocol, this is an emergency requiring immediate escalation — persistent ischemic pain at rest is a red flag distinguishing it from stable, exertional angina.</li>
  </ul>
</div>

<div class="card">
  <h3>🧍 Orthostatic BP measurement</h3>
  <p>Measured lying → sitting → standing. <b>Orthostatic hypotension</b> = a drop of <b>≥20 mmHg systolic OR ≥10 mmHg diastolic within 3 minutes of standing</b>, often with dizziness/lightheadedness/syncope.</p>
</div>

<div class="card">
  <h3>📏 Pulse pressure — what it tells you</h3>
  <p>Pulse pressure = systolic − diastolic. <b>Normal ≈ 40 mmHg.</b></p>
  <ul class="clean">
    <li><b>Narrow pulse pressure</b> — vasoconstriction compensating for low stroke volume (shock, HF, hypovolemia) or obstruction to flow (mitral/aortic stenosis).</li>
    <li><b>Wide pulse pressure</b> — conditions raising stroke volume (anxiety, exercise, bradycardia) or vasodilation (fever, septic shock).</li>
  </ul>
</div>

<div id="quiz-acs"></div>

renderQuiz('quiz-acs',[
  {q:'A client reports chest pain that occurs at rest and has been progressively worsening over the past week, unlike their usual exertional chest pain. How should the nurse classify this presentation?',type:'single',
   opts:['A. Stable angina','B. Unstable angina','C. A normal variant requiring no further evaluation','D. Costochondritis'],correct:1,
   rat:'Stable angina is predictable and exertion-related. Pain occurring at rest and progressively worsening signals the plaque may be actively unstable — this is unstable angina, and it requires urgent evaluation rather than reassurance.'},

  {q:'Which cardiac biomarker is considered the most sensitive and specific for diagnosing myocardial injury?',type:'single',
   opts:['A. CK-MB','B. Troponin I','C. Total cholesterol','D. C-reactive protein'],correct:1,
   rat:'CK-MB is a real cardiac marker but less specific, cholesterol reflects risk rather than acute injury, and CRP reflects inflammation broadly. High-sensitivity troponin is specifically preferred for determining myocardial injury.'},

  {q:'A client\'s blood pressure is 128/82 mmHg lying, 124/84 mmHg sitting, and 104/76 mmHg standing, with reported lightheadedness. How should the nurse interpret this finding?',type:'single',
   opts:['A. A normal postural response requiring no action','B. Orthostatic hypotension, given the systolic drop of 24 mmHg with symptoms','C. Hypertensive urgency','D. A falsely low reading that should be disregarded'],correct:1,
   rat:'A dismisses a genuine finding that meets diagnostic criteria. The systolic pressure dropped by 24 mmHg (from 128 to 104) upon standing, exceeding the ≥20 mmHg threshold, and the client is symptomatic — this meets the definition of orthostatic hypotension.'},

  {q:'A client has a blood pressure of 150/110 mmHg, giving a pulse pressure of 40 mmHg. Which statement about this finding is correct?',type:'single',
   opts:['A. This pulse pressure is abnormally narrow and suggests cardiogenic shock','B. This pulse pressure is within the normal range','C. This pulse pressure is abnormally wide and suggests septic shock','D. Pulse pressure cannot be calculated from these values'],correct:1,
   rat:'150 − 110 = 40, which is the textbook normal pulse pressure. Despite the elevated overall blood pressure, the pulse pressure itself is not abnormal — a good reminder that pulse pressure and absolute BP are two different things to evaluate separately.'},

  {q:'A client with suspected heart failure has an elevated BNP level. What does this finding MOST directly indicate?',type:'single',
   opts:['A. Active myocardial cell death','B. Fluid retention and ventricular strain','C. A current infection','D. Elevated cholesterol levels'],correct:1,
   rat:'Troponin/CK-MB reflect cell death, and cholesterol is measured separately via the lipid panel. BNP rises specifically with fluid retention and ventricular wall stretch/strain, making it a key marker for heart failure rather than acute cell injury.'},

  {q:'A client presenting with acute MI symptoms is a candidate for thrombolytic therapy. What is the PRIMARY reason timing is so critical for this treatment?',type:'single',
   opts:['A. Thrombolytics become less expensive if given quickly','B. The medication dissolves the clot, and the longer myocardium goes without blood flow, the more tissue is permanently lost','C. Timing has no real effect on thrombolytic effectiveness','D. Thrombolytics only work if given more than 24 hours after symptom onset'],correct:1,
   rat:'A is irrelevant to the clinical decision, C dismisses a genuinely time-critical intervention, and D reverses the actual urgency (thrombolytics are most effective given EARLY, not after a long delay). Every additional minute of blocked flow means more myocardial tissue undergoes irreversible necrosis — thrombolytics work by dissolving the clot, but only tissue that hasn\'t already died can be saved.'},

  {q:'A client reports chest pain that resolves completely with rest and a dose of nitroglycerin, occurring predictably with the same level of exertion each time. How should the nurse classify this presentation?',type:'single',
   opts:['A. Unstable angina','B. Stable angina','C. An acute myocardial infarction in progress','D. A non-cardiac cause requiring no further evaluation'],correct:1,
   rat:'Unstable angina would be new, worsening, or occurring at rest — the opposite of this predictable pattern. An MI would not simply resolve with rest/nitro. Predictable, exertion-triggered pain relieved by rest and nitroglycerin is the definition of stable angina.'},

  {q:'Which of the following are appropriate components of the initial diagnostic workup for suspected ACS in the emergency department? (Select all that apply)',type:'multi',
   opts:['A. 12-lead ECG within 10 minutes of arrival','B. Troponin level','C. Lipid panel','D. A wound culture','E. CK-MB'],correct:[0,1,2,4],
   rat:'A wound culture has no role in an ACS workup. A rapid 12-lead ECG, troponin, lipid panel, and CK-MB are all standard components of the initial ACS diagnostic evaluation.'},

  {q:'A client\'s troponin level is significantly elevated 6 hours after chest pain onset. What does this finding MOST directly indicate?',type:'single',
   opts:['A. An inflammatory process unrelated to the heart','B. Myocardial cell injury/necrosis','C. A normal, expected post-exercise finding','D. Elevated cholesterol levels'],correct:1,
   rat:'CRP reflects inflammation and the lipid panel reflects cholesterol — different tests entirely. An elevated troponin specifically indicates myocardial cell injury, since troponin is released from necrotic heart muscle cells.'},

  {q:'A client asks why a lipid panel requires fasting beforehand. What is the correct explanation?',type:'single',
   opts:['A. Fasting has no effect on lipid panel accuracy','B. Recent food intake, especially fat, can transiently raise triglyceride levels and affect the accuracy of the results','C. Fasting is only required for a glucose test, not a lipid panel','D. Fasting is required to prevent an allergic reaction to the test'],correct:1,
   rat:'A dismisses a real requirement, and C and D both misattribute the reasoning. Recent food intake — especially fat — can transiently raise triglycerides and affect result accuracy, which is why a 12-hour fast is standard before this test.'},

  {q:'A client with ACS is prescribed an antiplatelet medication. What is the PRIMARY purpose of this medication class in this context?',type:'single',
   opts:['A. To dissolve an existing clot','B. To inhibit the clotting cascade and prevent further clot formation or extension','C. To lower blood pressure directly','D. To increase heart rate'],correct:1,
   rat:'Dissolving an existing clot is the role of thrombolytics, not antiplatelets. Antiplatelets work by inhibiting the clotting cascade, preventing new or extending clot formation — a preventive rather than a dissolving action.'},

  {q:'A client\'s BP readings are 132/84 lying, 128/86 sitting, and 106/78 standing, with the client reporting lightheadedness upon standing. How should the nurse interpret this finding?',type:'single',

  {q:'A client with a pulse pressure of 70 mmHg (BP 160/90) asks what this might indicate. Which explanation is MOST accurate?',type:'single',
   opts:['A. This is a normal pulse pressure requiring no further evaluation','B. This is a wide pulse pressure, which can be seen with conditions that raise stroke volume or cause vasodilation','C. This indicates a narrow pulse pressure suggestive of shock','D. Pulse pressure cannot be calculated from these numbers'],correct:1,

<script>
document.getElementById('sec-vascular').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🦵</span> PAD / PVD / DVT</h2>
<p class="intro-line">Arterial vs. venous disease — different mechanisms, different symptoms, different treatments. Confusing the two is the classic trap.</p>

<div class="card" style="border-color:var(--teal)">
  <h3>🦵 Peripheral Arterial Disease (PAD)</h3>
  <ul class="clean">
    <li><b>Cause:</b> atherosclerosis narrowing arteries. Nonmodifiable: age, genetics. Modifiable: smoking (major risk factor), diabetes, HTN, hyperlipidemia, stress, sedentary lifestyle, inflammation.</li>
    <li><b>Symptoms:</b> <b>intermittent claudication</b> (pain/cramping with exercise, relieved by rest), numbness/weakness, coldness of the limb, non-healing sores on toes/feet/legs, pale or bluish skin color.</li>
    <li><b>Critical Limb Ischemia (CLI)</b> — the escalation beyond claudication: pain occurs AT REST, not just with activity. This represents severely inadequate blood flow even at baseline demand and is considered a medical emergency, since it threatens limb viability.</li>
    <li><b>Diagnosis:</b> <b>ABI (ankle-brachial index)</b> — normal range 1.0-1.4; below that indicates arterial narrowing (lower = worse); <b>above 1.4 indicates arterial calcification</b>, which itself correlates with heart disease risk. Also: ultrasound, angiography, blood tests (diabetes, cholesterol).</li>
    <li><b>Treatment:</b> lifestyle changes (smoking cessation, exercise, diet), medications (cholesterol/BP control, pain management, <b>cilostazol</b> specifically for claudication), angioplasty, bypass surgery.</li>
    <li><b>Nursing goals:</b> improve mobilization and circulation. Interventions: patient education, monitoring, wound care, pain management, supervised exercise programs.</li>
    <li><b>Complications:</b> critical limb ischemia, stroke, heart attack (same atherosclerotic process affects other vessels too).</li>
  </ul>
  <div class="hy">⭐ <b>Nursing diagnoses for PAD:</b> ineffective peripheral tissue perfusion, chronic pain, impaired skin integrity, activity intolerance, risk for infection.</div>
  <p class="why-chain"><b>Why claudication progresses to critical limb ischemia:</b> as atherosclerotic narrowing worsens over time, the artery eventually can't supply enough oxygen even for the tissue's RESTING demand, not just its exercise demand. <b>Because</b> there's no longer a "lower demand" state where the narrowed vessel can keep up, the pain becomes constant rather than activity-triggered — and without urgent revascularization, the tissue is at real risk of necrosis and limb loss, which is exactly why CLI is treated as a medical emergency rather than a more severe version of routine claudication management.</p>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🩸 Peripheral Venous Disease (PVD / venous insufficiency)</h3>
  <p><b>Mechanism:</b> veins rely on one-way valves to keep blood moving toward the heart against gravity. When those valves become structurally damaged/incompetent, blood flows backward and pools in the lower extremities (venous stasis) instead of returning efficiently — this chronic pooling and pressure is what damages the surrounding tissue over time.</p>
  <ul class="clean">
    <li><b>Risk factors:</b> everything that causes PAD, PLUS history of DVT and prolonged immobility.</li>
    <li><b>Signs/symptoms:</b> rubor (redness) or pallor, pain with elevation or dependent positioning of the feet, poor capillary refill, weak peripheral pulses, edema, <b>itchy skin (pruritus)</b>, skin discoloration, pain/tingling/numbness.</li>
    <li><b>Tests:</b> H&P, ABI, Doppler ultrasound, angiography, duplex Doppler.</li>
    <li><b>Treatment:</b> compression stockings, leg elevation, anticoagulation if an active DVT is present.</li>
  </ul>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🦶 Arterial vs. Venous Ulcers — how to tell them apart on sight</h3>
  <table class="lab">
    <tr><th>Feature</th><th>Arterial ulcer</th><th>Venous ulcer</th></tr>
    <tr><td>Border</td><td>Well-defined, "punched out" edges</td><td>Irregular borders</td></tr>
    <tr><td>Typical location</td><td>Toes, feet, pressure points</td><td>Medial ankle ("gaiter area")</td></tr>
    <tr><td>Wound bed</td><td>Pale, dry</td><td>Ruddy/red, more exudate/drainage</td></tr>
    <tr><td>Surrounding skin</td><td>Cool, pale, hairless, shiny</td><td>Warm, discolored (brownish), edematous</td></tr>
    <tr><td>Pain pattern</td><td>Worse with elevation</td><td>Worse with dependent position</td></tr>
  </table>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🩸 Deep Vein Thrombosis (DVT) & Anticoagulation</h3>
  <p><b>Cause: Virchow's Triad</b> — endothelial damage, abnormal/stagnant blood flow (venous stasis), and hypercoagulability. Only one usually needs to be significantly present.</p>
  <ul class="clean">
    <li><b>Diagnostics:</b> duplex Doppler/ultrasound imaging, <b>D-dimer</b> (elevated with clot breakdown products), <b>PT/INR</b> for baseline coagulation status.</li>
    <li><b>Treatment choice depends on:</b> severity of the clot, patient's overall health, bleeding risk, and resource availability.</li>
    <li><b>Heparin</b> — IV/subcutaneous, fast-acting, used acutely; monitor <b>PTT</b>, platelets. <b>Antidote: Protamine Sulfate.</b> <b>Heparin-induced thrombocytopenia (HIT)</b> is a serious potential complication — watch platelet counts.</li>
    <li><b>Warfarin (Coumadin)</b> — oral, used for longer-term/maintenance therapy (historically common after orthopedic surgery); monitor <b>PT/INR</b> (therapeutic range 2-3), consistent dietary vitamin K intake, watch for bleeding, missed dose taken ASAP but <b>never double up</b>. <b>Antidote: Vitamin K</b> (given to reverse excessive anticoagulation/bleeding — distinct from the DIETARY vitamin K consistency teaching above). Typical hospital pattern: start a heparin drip acutely, then transition/bridge to oral warfarin for maintenance.</li>
    <li><b>DOACs (direct oral anticoagulants, e.g., Apixaban)</b> — increasingly preferred over warfarin due to a better safety profile and no routine INR monitoring requirement, though heparin and warfarin remain in common hospital use for acute care.</li>
    <li>If anticoagulation is contraindicated or ineffective, interventional procedures may be considered (e.g., IVC filter).</li>
    <li><b>Supportive care:</b> leg elevation, pain relievers, and <b>compression stockings — but NOT immediately during acute hospitalization.</b> Compression is typically held until the client is therapeutically anticoagulated (roughly a 3-7 day acute treatment window), and is usually introduced once they've transitioned to oral anticoagulation for the maintenance phase at home — not started the moment an active DVT is diagnosed.</li>
  </ul>
  <div class="mnem"><div class="tag">Monitoring + Antidote pairs — high yield</div><div class="big">Heparin → PTT → Protamine Sulfate. Coumadin/Warfarin → PT/INR → Vitamin K.</div></div>
</div>

<div class="mnem"><div class="tag">Quick contrast</div><div class="big">PAD/arterial = pale, cold, hair loss, brittle nails, pain WORSE with elevation. PVD/venous = rubor, itchy, edema, pain WORSE with dependent position (hanging down).</div></div>

<div id="quiz-vascular"></div>

  {q:'A nurse assesses a lower extremity wound with well-defined, "punched out" borders, a pale wound bed, and surrounding skin that is cool, shiny, and hairless. Which type of ulcer does this MOST likely represent?',type:'single',

<script>
document.getElementById('sec-meds').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">💊</span> Cardiac Medications</h2>
<p class="intro-line">Know the mechanism behind each class — that's what makes the side effects and nursing considerations make sense instead of needing separate memorization.</p>

<div class="card">
  <h3>💊 ACE Inhibitors & ARBs</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> block the RAAS (renin-angiotensin-aldosterone system) → less vasoconstriction, less sodium/water retention → lower BP, reduced cardiac workload.</li>
    <li><b>ACE inhibitors ("-prils")</b> — first choice; classic side effect is a dry cough and angioedema ("prils puff the tongue").</li>
    <li><b>ARBs ("-sartans")</b> — second choice, generally used when ACE inhibitors cause cough; potassium-sparing effect similar to ACE inhibitors.</li>
    <li>Never combine an ACE inhibitor with an ARB (redundant RAAS block, higher hyperkalemia/renal risk).</li>
  </ul>
</div>

<div class="card">
  <h3>💊 Beta-Blockers — Propranolol (nonselective) vs. Metoprolol (cardioselective)</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> block catecholamine (sympathetic) stimulation of the heart → decreased HR, decreased contractility, lower BP, lower myocardial oxygen demand. Also decreases renin secretion.</li>
    <li><b>Propranolol</b> — <b>nonselective</b> (blocks both beta-1 AND beta-2). Blocking beta-2 in the lungs is exactly why it carries a real bronchospasm risk in asthma/COPD.</li>
    <li><b>Metoprolol</b> — <b>cardioselective</b> (beta-1 preferring) at therapeutic doses — safer in reactive airway disease, but "cardioselective" is not "cardiospecific": at higher doses it can lose selectivity and still cause bronchospasm.</li>
    <li><b>Therapeutic uses (both):</b> hypertension, angina, dysrhythmias (SVT, afib/flutter), post-MI cardioprotection, migraine prophylaxis. Metoprolol succinate (Toprol XL) is also used in stable HF.</li>
    <li><b>Contraindications/precautions:</b> cardiogenic shock, decompensated HF, sinus bradycardia, 2nd/3rd degree heart block, asthma/COPD (relative), Raynaud's.</li>
    <li><b>Adverse effects:</b> bradycardia, hypotension, heart block, HF exacerbation, bronchospasm, fatigue, depression, sexual dysfunction, <b>masks hypoglycemia symptoms in diabetics</b>, cold extremities.</li>
    <li><b>Nursing:</b> hold if HR &lt;60 (metoprolol: hold if HR&lt;60 OR SBP&lt;90). <b>Never stop abruptly</b> — taper to prevent rebound hypertension/angina/MI. Monitor glucose in diabetics. Assess lung sounds.</li>
  </ul>
  <div class="hy">⭐ <b>Which order should you question?</b> IV beta-blocker ordered together with IV diltiazem/verapamil — this combination risks fatal bradycardia/heart block and is a genuine contraindication, not just a caution.</div>
</div>

<div class="card">
  <h3>💊 Calcium Channel Blockers — Diltiazem</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> blocks L-type calcium channels in cardiac and vascular smooth muscle. In the heart: decreases SA node automaticity and AV nodal conduction. In vessels: vasodilation, reducing afterload.</li>
    <li><b>Therapeutic uses:</b> angina (vasospastic and chronic stable), hypertension, rate control in afib/flutter, SVT (IV form).</li>
    <li><b>Contraindications/precautions:</b> sick sinus syndrome (without pacemaker), 2nd/3rd degree AV block, severe hypotension, acute MI with pulmonary congestion, WPW with accessory pathway, <b>concurrent IV beta-blocker</b> (fatal bradycardia/AV block risk).</li>
    <li><b>Adverse effects:</b> bradycardia, AV block, hypotension, peripheral edema, constipation, dizziness, worsening HF.</li>
    <li><b>Interactions:</b> increases digoxin levels; simvastatin/lovastatin myopathy risk (CYP3A4 inhibition); grapefruit juice increases drug levels.</li>
    <li><b>Nursing:</b> monitor HR/BP before and after dosing; ER tablets swallowed whole, never crushed; never stop suddenly.</li>
  </ul>
  <div class="hy">⭐ <b>Which order should you question?</b> IV diltiazem ordered for a client already on an IV beta-blocker — same fatal bradycardia/AV block risk as above, from the opposite direction. Also question diltiazem in a client with acute MI and pulmonary congestion (worsens HF).</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💊 Digoxin</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> inhibits the Na+/K+ ATPase pump → increased intracellular Na+ → increased intracellular Ca2+ → increased myocardial contractility (<b>positive inotrope</b>). Also increases vagal tone → decreased HR and AV conduction (<b>negative chronotrope/dromotrope</b>).</li>
    <li><b>Therapeutic uses:</b> heart failure with reduced ejection fraction (HFrEF), rate control in afib/flutter. <b>Narrow therapeutic index</b> — therapeutic serum level 0.5-2 ng/mL.</li>
    <li><b>Contraindications/precautions:</b> ventricular fibrillation, <b>WPW syndrome</b> (can accelerate accessory pathway conduction), 2nd/3rd degree heart block (without pacemaker), hypertrophic obstructive cardiomyopathy.</li>
    <li><b>Toxicity signs:</b> <b>nausea/vomiting is classically the FIRST sign</b>, anorexia, bradycardia, visual disturbances (yellow-green halos, blurred vision), any new dysrhythmia, confusion. <b>Hypokalemia GREATLY increases toxicity risk</b> (shared Na-K pump binding site).</li>
    <li><b>Antidote for severe toxicity: Digibind/DigiFab.</b></li>
    <li><b>Nursing:</b> <b>check apical pulse for 1 full minute before every dose — hold if &lt;60 bpm.</b> Monitor digoxin level, potassium, magnesium. Never double a missed dose.</li>
  </ul>
  <div class="hy">⭐ <b>Which order should you question?</b> Digoxin ordered for a client with WPW syndrome or ventricular fibrillation — both are genuine contraindications. Also question if the apical pulse is &lt;60 or if serum potassium is low (raises toxicity risk before the dose is even given).</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>💊 Atropine</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> anticholinergic — competitively blocks muscarinic receptors. In the heart, blocks vagal tone on the SA/AV nodes → increased HR and AV conduction. Also reduces secretions, causes bronchodilation and mydriasis (pupil dilation).</li>
    <li><b>Therapeutic uses:</b> <b>first-line for symptomatic bradycardia</b>, AV block (nodal level), organophosphate/nerve agent antidote, preop secretion reduction.</li>
    <li><b>Dosing rule:</b> 0.5-1 mg IV q3-5 min, max 3 mg. <b>NEVER give less than 0.5 mg</b> — a dose that low can cause <i>paradoxical bradycardia</i> instead of the intended effect.</li>
    <li><b>Contraindications/precautions:</b> <b>narrow-angle glaucoma</b>, tachycardia, myasthenia gravis, GI/GU obstruction. Extreme caution in BPH and the elderly (confusion/delirium risk).</li>
    <li><b>Adverse effects:</b> tachycardia, urinary retention, constipation, dry mouth, blurred vision, confusion/delirium (especially elderly), <b>paradoxical bradycardia with doses &lt;0.5 mg.</b></li>
    <li><b>Antidote for anticholinergic toxicity: Physostigmine.</b></li>
  </ul>
  <div class="hy">⭐ <b>Which order should you question?</b> An atropine dose ordered below 0.5 mg IV — this specific under-dosing risk (paradoxical bradycardia) is exactly opposite of the intended effect. Also question atropine in a client with narrow-angle glaucoma — same dilating-pupil mechanism concern from the Eye unit, now showing up in a cardiac drug.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>💊 Adenosine</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> activates adenosine A1 receptors, slowing conduction through the AV node, causing a brief, transient AV block that terminates AV-node-dependent reentry circuits. Extremely short half-life (~10 seconds).</li>
    <li><b>Therapeutic use:</b> <b>first-line treatment for PSVT/SVT.</b></li>
    <li><b>Administration:</b> IV ONLY — 6 mg rapid IV push over 1-2 seconds into a large vein, immediately followed by a 20 mL NS flush. If no response in 1-2 min, may repeat at 12 mg (max single dose 12 mg).</li>
    <li><b>Contraindications/precautions:</b> 2nd/3rd degree heart block, sick sinus syndrome (without pacemaker), <b>WPW with atrial flutter/fib</b> (may accelerate conduction), asthma/severe COPD.</li>
    <li><b>Interactions:</b> caffeine/theophylline (methylxanthines) BLOCK its effect — larger doses may be needed; dipyridamole POTENTIATES it — reduce dose.</li>
    <li><b>Expected/therapeutic effect:</b> a brief period of <b>transient asystole</b> is expected and therapeutic, not a complication to panic over — along with brief flushing, chest pressure, and a feeling of impending doom.</li>
    <li><b>Nursing:</b> continuous cardiac monitoring required, crash cart at bedside, document rhythm strip before/during/after, warn the patient about the brief sensation beforehand.</li>
  </ul>
  <div class="hy">⭐ <b>Which order should you question?</b> Adenosine ordered for a client with WPW who is currently in atrial fibrillation/flutter (not simple SVT) — this specific combination can accelerate conduction through the accessory pathway rather than terminate the arrhythmia.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💊 Heparin (Unfractionated) — expanded</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> binds antithrombin III, potentiating its inhibition of thrombin and factor Xa. Prevents fibrinogen→fibrin and prothrombin→thrombin conversion. <b>Does NOT dissolve existing clots</b> — prevents new clot formation/extension only.</li>
    <li><b>Administration:</b> weight-based IV protocol; bolus ~60-80 units/kg, infusion 12-18 units/kg/hr, adjusted to aPTT (therapeutic goal typically 60-100 sec, or 1.5-2.5× normal). <b>Never give IM</b> (hematoma risk).</li>
    <li><b>Contraindications/precautions:</b> active uncontrolled bleeding, HIT (Type II), severe thrombocytopenia, intracranial hemorrhage.</li>
    <li><b>Adverse effects:</b> bleeding (major risk, any site), <b>HIT</b> — platelet count drop &gt;50% from baseline typically on days 4-10 (paradoxically causes CLOTTING, not just bleeding risk), osteoporosis with long-term use.</li>
    <li><b>Antidote: Protamine Sulfate.</b></li>
    <li><b>Nursing:</b> monitor aPTT q6h, check platelets every 2-3 days, two-nurse verification of dose, infusion pump only.</li>
  </ul>
  <div class="hy">⭐ <b>Which order should you question?</b> Heparin ordered for a client with active uncontrolled bleeding or a history of HIT — both genuine contraindications. Also question an IM heparin order specifically (should never be given IM regardless of the reason stated).</div>
</div>

<div class="card">
  <h3>💊 Diuretics</h3>
  <ul class="clean">
    <li><b>First-line treatment for hypertension</b>, and usually the #1 medication for heart failure — directly reduces fluid volume/preload, lowering cardiac workload.</li>
    <li><b>Potency ranking (strongest to weakest): Loop &gt; Thiazide &gt; Potassium-sparing.</b> Loop diuretics (e.g., Lasix/furosemide) are the STRONGEST; potassium-sparing diuretics (e.g., spironolactone) are the WEAKEST of the three.</li>
    <li><b>Loop diuretic-specific concerns (explicitly flagged as testable):</b> significant potassium WASTING (hypokalemia — monitor levels, watch for arrhythmia/digoxin interaction risk) and <b>ototoxicity</b>, especially with high doses or rapid IV push — watch for tinnitus/hearing changes.</li>
    <li><b>Teach slow position changes</b> — diuretics increase orthostatic hypotension risk.</li>
  </ul>
  <div class="hy">⭐ Potency ranking matters clinically: a client needing aggressive fluid removal (like acute pulmonary edema) needs a LOOP diuretic, not a potassium-sparing one — the weakest option wouldn't be enough for that level of overload. But that same potency is exactly why loop diuretics carry the bigger potassium-wasting and ototoxicity risk of the three.</div>
</div>

<div class="card">
  <h3>💊 Vasodilators</h3>
  <p>Common side effects: headache, hypotension, hot flushing/flushed skin — all direct consequences of the vasodilation mechanism itself (more blood flow to vessels near the skin/head surface, and a drop in resistance lowering BP).</p>
</div>
