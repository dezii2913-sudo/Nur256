{topic:'cardio',q:'What is the correct treatment approach once a DVT has been confirmed and anticoagulation is appropriate?',o:['Heparin or warfarin/DOAC therapy, plus compression stockings and elevation','Antibiotics as the primary treatment','Surgical removal of the affected vein in all cases','No treatment is needed if the clot is small'],c:0,t:'single',r:'Standard DVT management combines anticoagulation (heparin acutely, warfarin/DOAC for maintenance) with supportive measures like compression stockings and elevation.'},
{topic:'repro',q:'A client asks why her provider mentioned that both her hormone replacement therapy and oral contraceptive options carry similar warnings. What is the shared reason?',o:['They are actually the same medication','Both involve exogenous estrogen, which raises clotting risk and interacts with the same cardiovascular risk factors','Neither has any real safety concerns','They only share risks in patients over 65'],c:1,t:'single',r:'Both HRT and oral contraceptives introduce exogenous estrogen, which is why they share overlapping contraindications like HTN, clotting history, and smoking.'},
{topic:'cardio',q:'What is the normal resting adult cardiac output range?',o:['1-2 L/min','4-6 L/min','10-12 L/min','15-20 L/min'],t:'single',c:1,r:'Normal resting adult cardiac output is approximately 4-6 L/min.'},
{topic:'cardio',q:'Which heart valve separates the left atrium from the left ventricle?',o:['Tricuspid valve','Mitral valve','Pulmonic valve','Aortic valve'],t:'single',c:1,r:'The mitral valve is the AV valve on the left side; tricuspid is on the right; pulmonic and aortic are semilunar valves.'},
{topic:'cardio',q:'Which cells serve as the heart\'s primary pacemaker?',o:['AV node','Purkinje fibers','SA node','Bundle of His'],t:'single',c:2,r:'The SA node is the primary pacemaker, with an inherent rate of 60-100 bpm; the AV node is the secondary pacemaker.'},
{topic:'cardio',q:'What is the inherent firing rate of the AV node if the SA node fails?',o:['20-40 bpm','40-60 bpm','60-100 bpm','100-120 bpm'],t:'single',c:1,r:'The AV node\'s inherent rate is 40-60 bpm, serving as a backup pacemaker if the SA node fails.'},
{topic:'cardio',q:'Which layer of the heart is responsible for its pumping action?',o:['Endocardium','Myocardium','Epicardium','Pericardium'],t:'single',c:1,r:'The myocardium is the muscular middle layer responsible for contraction; the pericardium is a protective sac, not a true heart wall layer.'},
{topic:'cardio',q:'Which of the following are direct determinants of stroke volume? (Select all that apply)',o:['Preload','Afterload','Contractility','Respiratory rate','Serum glucose'],c:[0,1,2],t:'multi',r:'Respiratory rate and serum glucose are not direct determinants of stroke volume. Preload, afterload, and contractility are the three recognized determinants.'},
{topic:'cardio',q:'A client\'s ECG shows a widened QRS complex and peaked T waves. Which electrolyte imbalance should the nurse suspect?',o:['Hypokalemia','Hyperkalemia','Hyponatremia','Hypercalcemia'],t:'single',c:1,r:'Peaked T waves and a widened QRS are classic ECG changes associated with hyperkalemia.'},
{topic:'cardio',q:'Which of the following electrolytes are most critical to monitor for arrhythmia risk? (Select all that apply)',o:['Potassium','Calcium','Magnesium','Chloride only','Glucose only'],c:[0,1,2],t:'multi',r:'Chloride and glucose alone are not the primary electrolytes tied to arrhythmia risk in this context. Potassium, calcium, and magnesium are the critical ones.'},
{topic:'cardio',q:'A client asks why their provider ordered a 12-lead ECG so quickly after arriving with chest pain. What is the correct timeframe goal?',o:['Within 10 minutes of arrival','Within 2 hours of arrival','Within 24 hours of arrival','There is no specific timeframe'],c:0,t:'single',r:'A 12-lead ECG should be obtained within 10 minutes of ED arrival for suspected ACS.'},
{topic:'cardio',q:'Which of the following are classic symptoms of cardiovascular disease? (Select all that apply)',o:['Chest pain or discomfort','Unusual fatigue','Peripheral edema','Improved exercise tolerance','Palpitations'],c:[0,1,2,4],t:'multi',r:'Improved exercise tolerance would be a positive/reassuring finding, not a symptom of disease. Chest pain, fatigue, edema, and palpitations are all classic CVD symptoms.'},
{topic:'cardio',q:'A client asks what the "6 Ps" refer to in vascular assessment. Which list is correct?',o:['Pain, Pallor, Paresthesia, Pulselessness, Poikilothermia, Paralysis','Pressure, Pulse, Perfusion, Pain, Position, Prognosis','Palpitations, Pallor, Pulse, Pressure, Perfusion, Paralysis','Pain, Pressure, Pallor, Pulse, Position, Prognosis'],c:0,t:'single',r:'The 6 Ps of acute arterial obstruction are Pain, Pallor, Paresthesia, Pulselessness, Poikilothermia, and Paralysis.'},
{topic:'cardio',q:'Which finding represents capillary refill time consistent with adequate perfusion?',o:['Less than 3 seconds','5-7 seconds','Greater than 10 seconds','Capillary refill has no clinical significance'],c:0,t:'single',r:'A capillary refill under about 3 seconds is generally considered normal; prolonged refill suggests inadequate perfusion.'},
{topic:'cardio',q:'A client with suspected DVT has an elevated D-dimer. What does this finding indicate?',o:['Definitive confirmation of a clot','A nonspecific marker suggesting clot breakdown products, requiring further imaging to confirm','No clinical significance','Active bleeding'],c:1,t:'single',r:'D-dimer is nonspecific — elevated levels raise suspicion but require imaging (like duplex ultrasound) to confirm an actual clot.'},
{topic:'cardio',q:'Which client is at HIGHEST risk for DVT based on Virchow\'s Triad?',o:['A client who is highly active and well-hydrated','A client on prolonged bed rest after major surgery','A client with normal coagulation studies and no risk factors','A client with excellent venous return'],c:1,t:'single',r:'Prolonged immobility after surgery creates venous stasis, one of the three Virchow\'s Triad components, making this client highest risk among the options.'},
{topic:'cardio',q:'A client asks why beta-blockers are used cautiously in clients with asthma. What is the correct explanation?',o:['Beta-blockers have no pulmonary effects','Non-selective beta-blockers can cause bronchospasm by blocking beta-2 receptors in the lungs','Beta-blockers cure asthma symptoms','This caution only applies to pediatric patients'],c:1,t:'single',r:'Non-selective beta-blockers can block beta-2 receptors in the lungs, potentially triggering bronchospasm in asthmatic clients.'},
{topic:'cardio',q:'Which of the following are appropriate nursing actions for a client with symptomatic bradycardia? (Select all that apply)',o:['Assess for hemodynamic instability','Prepare for possible atropine administration','Encourage immediate ambulation regardless of symptoms','Continuous cardiac monitoring','Notify the provider'],c:[0,1,3,4],t:'multi',r:'Encouraging ambulation regardless of symptoms could worsen a hemodynamically unstable client. Assessment, atropine preparation, monitoring, and provider notification are all appropriate.'},
{topic:'cardio',q:'A client asks why their provider is checking orthostatic blood pressures before starting a new antihypertensive. What is the BEST explanation?',o:['To establish a baseline and detect any pre-existing orthostatic hypotension risk before adding a medication that could worsen it','Orthostatic checks have no relevance to starting a new BP medication','This is done only for insurance documentation purposes','Orthostatic checks are only relevant after medication has been started'],c:0,t:'single',r:'Establishing a baseline before starting a medication that could contribute to orthostatic hypotension is a reasonable, proactive safety check.'},
{topic:'cardio',q:'Which of the following is the correct explanation for why elevated homocysteine levels are associated with cardiovascular risk?',o:['Homocysteine has no vascular effects','Homocysteine can damage the endothelial lining and promote thrombus formation','Homocysteine directly lowers blood pressure','Homocysteine is only relevant to kidney function'],c:1,t:'single',r:'Elevated homocysteine is associated with endothelial damage and thrombus formation, contributing to cardiovascular risk.'},
{topic:'cardio',q:'A client asks why their provider ordered a fasting lipid panel rather than checking it right after a meal. What is the correct explanation?',o:['Fasting has no effect on lipid results','Recent food intake, especially fat, can transiently raise triglycerides and skew results','Lipid panels can only be drawn in the evening','Fasting is required only for glucose testing'],c:1,t:'single',r:'Recent fat intake can transiently elevate triglycerides, which is why a 12-hour fast is standard before this test.'},
{topic:'cardio',q:'Which of the following are recognized functions of the vascular endothelium? (Select all that apply)',o:['Regulating vascular tone','Preventing abnormal clotting under normal conditions','Producing insulin','Responding to injury with an inflammatory cascade','Regulating blood glucose directly'],c:[0,1,3],t:'multi',r:'The endothelium does not produce insulin or directly regulate blood glucose — those are pancreatic functions. It does regulate vascular tone, help prevent abnormal clotting, and respond to injury.'},
{topic:'cardio',q:'A client with known CAD reports new chest pain that is more severe and occurs with less exertion than usual. How should the nurse classify this?',o:['Stable angina, unchanged from baseline','Unstable angina, given the change in pattern and severity','A non-cardiac musculoskeletal strain','No action needed since chest pain is expected in CAD'],c:1,t:'single',r:'A change in pattern — more severe, less exertion needed — signals unstable angina, a warning sign requiring prompt evaluation.'},
{topic:'cardio',q:'Which combination best describes the classic presentation of aortic stenosis-related pulse changes?',o:['A pulse contour reflecting obstruction to systolic ejection','A bounding, rapid pulse with no other findings','Pulse findings are unrelated to valve function','Complete absence of any palpable pulse'],c:0,t:'single',r:'Pulse contour can reflect valve pathology; aortic stenosis classically affects the contour due to obstructed systolic ejection.'},
{topic:'cardio',q:'A client asks why regular aerobic exercise is protective against PAD. What is the correct explanation?',o:['Exercise has no effect on peripheral circulation','Regular exercise can improve collateral circulation and functional capacity in affected limbs','Exercise only affects the heart, not peripheral vessels','Exercise should be avoided entirely in any vascular disease'],c:1,t:'single',r:'Regular, supervised exercise can improve collateral circulation and functional walking capacity in PAD, which is why it\'s part of management rather than something to avoid.'},
{topic:'cardio',q:'Which of the following are appropriate components of teaching for a client newly diagnosed with hypertension? (Select all that apply)',o:['DASH diet education','Regular home BP monitoring','Medication adherence importance','Discontinuing medication once BP normalizes without provider input','Recognizing signs of hypertensive crisis'],c:[0,1,2,4],t:'multi',r:'Discontinuing medication independently, even after BP normalizes, is dangerous — HTN control from medication doesn\'t mean the underlying condition is cured. The other four are appropriate teaching points.'},
{topic:'cardio',q:'A client asks why ACE inhibitors sometimes cause a persistent dry cough. What is the correct mechanism?',o:['Bradykinin accumulation from the same enzyme blockade that lowers blood pressure','An unrelated allergic reaction in all cases','ACE inhibitors directly irritate the lungs chemically','This side effect only occurs with ARBs, not ACE inhibitors'],c:0,t:'single',r:'ACE inhibitors block the enzyme that also breaks down bradykinin, and bradykinin accumulation is linked to the classic cough side effect — a mechanism ARBs largely avoid.'},
{topic:'cardio',q:'Which of the following statements about statin therapy is accurate?',o:['Statins have no role in cardiovascular risk reduction','Statins are considered first-line therapy for lowering LDL cholesterol and reducing cardiovascular risk','Statins are used exclusively to treat hypertension','Statins directly dissolve existing arterial plaques'],c:1,t:'single',r:'Statins are first-line for LDL reduction and cardiovascular risk reduction; they don\'t treat hypertension directly or dissolve existing plaque.'},
{topic:'cardio',q:'A client asks why smoking cessation is emphasized so heavily in PAD management. What is the BEST explanation?',o:['Smoking has no effect on PAD progression','Nicotine causes vasoconstriction, decreases HDL, and increases clotting risk, all of which worsen PAD','Smoking only affects the lungs, not blood vessels','Smoking cessation reverses all existing arterial damage immediately'],c:1,t:'single',r:'Smoking worsens PAD through vasoconstriction, altered lipid levels, and increased clotting risk — all directly relevant to disease progression, even though cessation doesn\'t instantly reverse existing damage.'},
{topic:'cardio',q:'Which finding would the nurse expect with aortic valve stenosis?',o:['A murmur reflecting obstructed blood flow across the valve','Complete absence of any heart sounds','A normal, unremarkable cardiac exam in all cases','Pulse findings unrelated to the valve at all'],c:0,t:'single',r:'Aortic stenosis classically produces a murmur from turbulent flow across the narrowed valve.'},
{topic:'cardio',q:'A client asks why continuous ECG monitoring is standard for high-risk arrhythmia patients. What is the correct explanation?',o:['It has no real diagnostic value','It allows real-time detection of rhythm and ST-segment changes indicating ischemia or arrhythmia','It is done purely for hospital billing purposes','It replaces the need for any other cardiac assessment'],c:1,t:'single',r:'Continuous monitoring allows real-time detection of arrhythmias and ischemic changes, which is why it\'s standard for high-risk patients.'},
{topic:'cardio',q:'Which of the following are appropriate nursing actions when caring for a client with a telemetry monitor? (Select all that apply)',o:['Ensure correct electrode placement and skin prep','Individualize alarm parameters to the client','Ignore alarms that occur frequently without assessment','Change batteries/electrodes per protocol','Respond promptly to all alarms'],c:[0,1,3,4],t:'multi',r:'Ignoring frequent alarms without assessment risks missing a genuine change — alarm fatigue should be managed by adjusting parameters appropriately, not ignoring alerts. The other four are correct practices.'},
{topic:'cardio',q:'A client asks why an exercise stress test might be stopped early. Which of the following is an appropriate reason to stop?',o:['The client achieves the target heart rate or shows signs of ischemia','The test has run for exactly 10 minutes regardless of findings','The client requests music during the test','The provider is unavailable to observe'],c:0,t:'single',r:'Reaching target heart rate or showing signs of ischemia (chest pain, ECG changes) are appropriate reasons to stop the test safely.'},
{topic:'cardio',q:'Which medication should be held before an exercise stress test, per standard preparation?',o:['Beta-blockers, since they can blunt the heart rate response needed for the test','Vitamins','Topical creams','Antacids'],c:0,t:'single',r:'Beta-blockers (along with calcium channel blockers and digitalis in some cases) are typically held before a stress test since they can blunt the expected heart rate response.'},
{topic:'cardio',q:'A client asks why a transesophageal echocardiogram (TEE) provides clearer images than a standard transthoracic echo. What is the correct explanation?',o:['The transducer is placed in the esophagus, closer to the heart, avoiding chest wall and lung interference','TEE uses a completely different imaging technology unrelated to ultrasound','TEE requires no sedation, making it more comfortable','TEE is only used for pediatric patients'],c:0,t:'single',r:'Because the esophageal transducer sits closer to the heart without chest wall/lung interference, TEE typically provides clearer images than transthoracic echo.'},
{topic:'cardio',q:'Which of the following are appropriate post-procedure nursing actions after a TEE? (Select all that apply)',o:['Keep the client NPO until the gag reflex returns','Monitor vital signs','Assess for persistent sore throat or difficulty swallowing','Encourage immediate oral intake regardless of sedation level','Monitor for signs of esophageal injury'],c:[0,1,2,4],t:'multi',r:'Encouraging oral intake regardless of sedation/gag reflex status risks aspiration. Keeping the client NPO until the gag reflex returns, monitoring vitals, assessing for throat symptoms, and watching for esophageal injury are all correct.'},
{topic:'cardio',q:'A client asks why cardiac catheterization requires monitoring for contrast-induced nephropathy (CIN). What is the correct explanation?',o:['Contrast dye can be nephrotoxic, especially with reduced renal function or dehydration','Contrast dye has no effect on kidney function','CIN only occurs in the coronary arteries','This risk applies only to pediatric patients'],c:0,t:'single',r:'Contrast dye used during catheterization can be nephrotoxic, particularly in clients with reduced renal function, dehydration, or diabetes.'},
{topic:'cardio',q:'Which of the following are appropriate post-cardiac catheterization nursing assessments? (Select all that apply)',o:['Assess the access site for bleeding/hematoma','Assess distal pulses','Monitor for vasovagal reactions','Encourage immediate strenuous activity','Monitor vital signs regularly'],c:[0,1,2,4],t:'multi',r:'Encouraging strenuous activity immediately after catheterization contradicts standard activity restrictions. Access site checks, pulse checks, vasovagal monitoring, and vital sign monitoring are all correct.'},
{topic:'cardio',q:'A client asks why potassium levels are closely monitored during diuretic therapy. What is the correct explanation?',o:['Certain diuretics can cause significant potassium loss, increasing arrhythmia risk','Diuretics have no effect on electrolytes','Potassium monitoring is unrelated to diuretic use','Diuretics always cause potassium retention'],c:0,t:'single',r:'Loop and thiazide diuretics in particular can cause potassium loss, which raises arrhythmia risk if unmonitored.'},
{topic:'cardio',q:'Which class of diuretics is MOST associated with potassium-sparing effects?',o:['Loop diuretics','Thiazide diuretics','Potassium-sparing diuretics (e.g., spironolactone)','Osmotic diuretics'],c:2,t:'single',r:'Potassium-sparing diuretics, as the name suggests, are specifically designed to avoid the potassium loss seen with loop and thiazide diuretics.'},
{topic:'cardio',q:'A client asks why nitroglycerin is often given sublingually rather than orally for acute angina. What is the correct explanation?',o:['Sublingual administration allows faster absorption directly into systemic circulation, bypassing first-pass liver metabolism','Oral nitroglycerin works faster than sublingual','Sublingual administration has no absorption advantage','Nitroglycerin cannot be absorbed sublingually'],c:0,t:'single',r:'Sublingual administration avoids first-pass hepatic metabolism, allowing faster therapeutic effect — important for acute anginal pain relief.'},
{topic:'cardio',q:'Which of the following are appropriate teaching points for a client prescribed sublingual nitroglycerin? (Select all that apply)',o:['Take up to 3 doses 5 minutes apart if pain persists, then seek emergency care','Store in a cool, dark place away from light','Expect a possible headache as a common side effect','Swallow the tablet whole with water','Sit or lie down when taking it to reduce dizziness risk'],c:[0,1,2,4],t:'multi',r:'Nitroglycerin is dissolved under the tongue, not swallowed. The other four are correct teaching points.'},
{topic:'cardio',q:'A client asks why a chest x-ray is part of the cardiac diagnostic workup. What is the correct explanation?',o:['It can reveal heart size, contour, and pulmonary circulation changes','It directly measures blood pressure','It replaces the need for an ECG','It is only useful for lung conditions, not cardiac ones'],c:0,t:'single',r:'Chest x-ray provides information on heart size/contour and pulmonary vascular changes, complementing (not replacing) other cardiac tests like ECG.'},
{topic:'cardio',q:'Which of the following are appropriate uses of fluoroscopy in cardiac care? (Select all that apply)',o:['Guiding catheter insertion','Assisting with electrode/lead placement','Directly measuring cholesterol levels','Visualizing cardiac pulsations and contours in real time','Diagnosing STIs'],c:[0,1,3],t:'multi',r:'Fluoroscopy has no role in measuring cholesterol or diagnosing STIs. It is used for catheter guidance, electrode placement, and real-time visualization of cardiac motion.'},
{topic:'cardio',q:'A client asks why radionuclide imaging (like SPECT) is used to evaluate coronary artery disease. What is the correct explanation?',o:['It evaluates myocardial perfusion by detecting radioactive tracer uptake, identifying areas of reduced blood flow','It directly visualizes coronary artery anatomy like an angiogram','It measures blood pressure continuously','It is used only for reproductive health assessment'],c:0,t:'single',r:'SPECT and similar radionuclide techniques assess myocardial perfusion via tracer uptake, identifying ischemic or infarcted areas, distinct from direct anatomic visualization.'},
{topic:'cardio',q:'Which client preparation is appropriate before a PET scan for cardiac evaluation?',o:['Avoiding alcohol and caffeine beforehand, and discussing insulin/food timing if diabetic','No preparation is needed at all','Fasting is contraindicated before this test','The client should increase caffeine intake beforehand'],c:0,t:'single',r:'Standard PET prep includes avoiding alcohol/caffeine and coordinating with diabetic management given glucose metabolism assessment involved in some PET protocols.'},
{topic:'cardio',q:'A client asks why MRA (magnetic resonance angiography) requires screening for metal implants beforehand. What is the correct explanation?',o:['The strong magnetic field can interact dangerously with certain metal implants or devices','MRA does not use magnetic fields','Metal implants have no relevance to this test','This screening is only relevant for pediatric patients'],c:0,t:'single',r:'MRA relies on a powerful magnetic field, which can be dangerous with certain metal implants or cardiac devices — screening is a critical safety step.'},
{topic:'cardio',q:'Which of the following are appropriate considerations before a client undergoes cardiac MRI/MRA? (Select all that apply)',o:['Screen for pacemakers or other metal implants','Remove jewelry and metal objects','Assess for claustrophobia','Encourage the client to bring metal objects for comfort','Offer a headset for noise if needed'],c:[0,1,2,4],t:'multi',r:'Encouraging metal objects directly contradicts the critical safety screening needed for this test. The other four are appropriate preparations.'},
{topic:'cardio',q:'A client asks why hemodynamic monitoring (like CVP) might be used in a critically ill cardiac client. What is the correct explanation?',o:['It provides direct, continuous pressure measurements reflecting fluid status and cardiac function','It has no clinical value in critical care','It replaces the need for any other vital sign monitoring','It is only used for research purposes'],c:0,t:'single',r:'Direct hemodynamic monitoring provides continuous, real-time data on pressures reflecting fluid status and cardiac function in critically ill patients.'},
{topic:'cardio',q:'What does central venous pressure (CVP) primarily reflect?',o:['Right ventricular preload','Left ventricular afterload','Arterial oxygen saturation','Peripheral arterial resistance'],c:0,t:'single',r:'CVP reflects pressure in the vena cava/right atrium, corresponding to right ventricular preload.'},
{topic:'cardio',q:'A client asks why a client with suspected pulmonary hypertension might undergo right heart catheterization. What is the correct explanation?',o:['It directly measures pressures in the right heart and pulmonary artery, helping diagnose pulmonary hypertension','It only evaluates the left ventricle','It is used exclusively for coronary artery visualization','It has no diagnostic value for pulmonary conditions'],c:0,t:'single',r:'Right heart catheterization directly measures right-sided and pulmonary artery pressures, which is diagnostic for pulmonary hypertension.'},
{topic:'cardio',q:'Which of the following are potential complications of cardiac catheterization? (Select all that apply)',o:['Arrhythmias','Vessel perforation','Infection','Improved renal function in all cases','Bleeding at the access site'],c:[0,1,2,4],t:'multi',r:'Improved renal function is not an expected complication — if anything, contrast exposure carries some renal risk. Arrhythmias, perforation, infection, and bleeding are all recognized potential complications.'},
{topic:'cardio',q:'A client asks about the difference between a hardwire cardiac monitor and telemetry. What is the correct explanation?',o:['Hardwire monitoring is a fixed bedside connection; telemetry is wireless, allowing the client to ambulate','They are identical systems with different names','Telemetry cannot detect arrhythmias','Hardwire monitoring only works while the client is standing'],c:0,t:'single',r:'Hardwire monitoring uses a fixed bedside connection, while telemetry is wireless, allowing ambulation while still transmitting ECG data.'},
{topic:'cardio',q:'How often are telemetry transmitter batteries typically changed?',o:['Every 24 to 48 hours','Every 6 months','Only when the device stops working entirely','Batteries never need to be changed'],c:0,t:'single',r:'Telemetry transmitter batteries are typically changed every 24-48 hours to ensure reliable signal transmission.'},
{topic:'cardio',q:'A client asks why Holter monitoring requires keeping a diary of symptoms and activities. What is the correct explanation?',o:['It allows the provider to correlate specific symptoms with corresponding ECG findings during analysis','The diary has no clinical use','Holter monitors cannot record continuously','The diary replaces the need for the ECG recording itself'],c:0,t:'single',r:'Correlating a symptom diary with the continuous ECG recording helps the provider link specific symptoms to underlying rhythm changes.'},
{topic:'repro',q:'Which of the following are appropriate components of a sexual health history? (Select all that apply)',o:['Number and gender of partners','Contraceptive use','History of STIs','Unrelated dietary preferences','Comfort discussing sexual health concerns'],c:[0,1,2,4],t:'multi',r:'Dietary preferences, while relevant to overall health, are not a core component of a sexual health history specifically. Partner history, contraceptive use, STI history, and comfort level are all appropriate components.'},
{topic:'repro',q:'A client asks why her provider recommends discussing intimate partner violence screening during her visit. What is the BEST nursing response?',o:['"This screening is a routine part of comprehensive health assessment, done to identify and support patients who may need help."','"This is only relevant if you appear visibly injured."','"This topic is not appropriate to discuss during a routine visit."','"This screening is optional and rarely provides useful information."'],c:0,t:'single',r:'IPV screening is a recognized component of comprehensive health assessment, not limited to visible injury, and provides an important opportunity for support.'},
{topic:'repro',q:'Which structures are part of the internal female reproductive system? (Select all that apply)',o:['Uterus','Ovaries','Fallopian tubes','Labia majora','Vagina'],c:[0,1,2,4],t:'multi',r:'Labia majora are external genitalia, not internal structures. Uterus, ovaries, fallopian tubes, and vagina are all internal reproductive structures.'},
{topic:'repro',q:'A client asks what a Pap smear specifically screens for. What is the correct explanation?',o:['Cervical cellular changes, including those that could indicate cervical cancer','Ovarian function directly','Blood glucose levels','Sexually transmitted infection status exclusively'],c:0,t:'single',r:'A Pap smear screens for cervical cellular changes, including precancerous or cancerous changes, not ovarian function or glucose.'},
{topic:'repro',q:'Which of the following describes the correct purpose of colposcopy?',o:['Direct visualization of the cervix, often following an abnormal Pap result, to identify areas for biopsy','A blood test for hormone levels','A treatment for active STIs','An imaging test for the ovaries only'],c:0,t:'single',r:'Colposcopy allows direct visualization of the cervix, typically after an abnormal Pap result, to guide biopsy of concerning areas.'},
{topic:'repro',q:'A client asks about the difference between cryotherapy and LEEP for cervical treatment. What is the correct explanation?',o:['Cryotherapy freezes abnormal tissue; LEEP uses an electrosurgical loop to remove tissue for both treatment and pathology evaluation','Both procedures are identical in method and purpose','Neither procedure has any role in cervical disease management','LEEP is used only for diagnosing infections, not abnormal cells'],c:0,t:'single',r:'Cryotherapy destroys abnormal tissue via freezing, while LEEP removes tissue electrosurgically, allowing pathologic examination of the removed sample.'},
{topic:'repro',q:'Which of the following are appropriate considerations when caring for an LGBTQ+ client? (Select all that apply)',o:['Using the client\'s stated name and pronouns','Creating a welcoming, nonjudgmental environment','Making assumptions about anatomy based on gender identity alone','Being sensitive when discussing family structure','Individualizing health screening recommendations as appropriate'],c:[0,1,3,4],t:'multi',r:'Making assumptions about anatomy based on gender identity alone can lead to inappropriate or incomplete care — assessment should be based on actual anatomy and history, not assumption. The other four are appropriate practices.'},
{topic:'repro',q:'A client seeking gender-affirming hormone therapy asks about potential risks. Which of the following is an appropriate nursing response?',o:['"There are no risks associated with hormone therapy."','"Hormone therapy carries individualized risks and benefits that should be discussed thoroughly with your provider."','"This therapy is not something nurses can discuss with you."','"You should discontinue therapy immediately once started, regardless of symptoms."'],c:1,t:'single',r:'A, C, and D all provide inaccurate or unhelpful responses. An individualized risk-benefit discussion with the provider is the appropriate approach, and nurses can appropriately provide general education and support.'},
{topic:'repro',q:'Which of the following are recognized effects of estrogen on vaginal health?',o:['Maintaining vaginal moisture and elasticity','Supporting a protective vaginal pH','Estrogen has no relationship to vaginal tissue health','Estrogen decline (e.g., in menopause) can contribute to vaginal dryness'],c:[0,1,3],t:'multi',r:'Estrogen genuinely does affect vaginal tissue health — the option denying any relationship is incorrect. Estrogen supports moisture, elasticity, and protective pH, and its decline contributes to dryness.'},
{topic:'repro',q:'A client asks why her provider recommended more frequent tampon changes. What is the correct explanation?',o:['Frequent changes reduce the risk of toxic shock syndrome (TSS), a rare but serious complication','Frequent changes have no health benefit','Tampon use is never associated with any health risk','This recommendation is unrelated to any known condition'],c:0,t:'single',r:'Frequent tampon changes reduce TSS risk, a rare but serious complication historically linked to prolonged tampon use.'},
{topic:'repro',q:'Which of the following is the correct definition of amenorrhea?',o:['Absence of menstruation','Painful intercourse','Excessive menstrual bleeding','Irregular but present menstrual cycles'],c:0,t:'single',r:'Amenorrhea specifically means absence of menstruation — dyspareunia is painful intercourse and menorrhagia is excessive bleeding.'},
{topic:'repro',q:'A client asks why her provider is concerned about her reported irregular, heavy periods (menorrhagia) alongside fatigue. What is a reasonable clinical concern?',o:['Heavy menstrual bleeding can contribute to iron-deficiency anemia, which could explain the fatigue','These two findings are completely unrelated','Menorrhagia never has any associated symptoms','Fatigue is always unrelated to menstrual blood loss'],c:0,t:'single',r:'Significant menstrual blood loss can contribute to iron-deficiency anemia, which is a reasonable explanation connecting menorrhagia and fatigue.'},
{topic:'repro',q:'Which of the following are appropriate nursing considerations for a client with female genital mutilation/cutting (FGM/C) history? (Select all that apply)',o:['Approaching the topic with cultural sensitivity','Assessing for any related physical or psychological complications','Assuming all clients with this history want the same type of care','Providing appropriate referrals as needed','Using respectful, nonjudgmental communication'],c:[0,1,3,4],t:'multi',r:'Assuming uniform preferences ignores individual variation in experience and needs. Cultural sensitivity, complication assessment, appropriate referrals, and respectful communication are all appropriate.'},
{topic:'repro',q:'A client with a disability asks about accommodations for her gynecological exam. What is the MOST appropriate nursing approach?',o:['Individualizing positioning and accommodations based on her specific needs and preferences','Assuming a standard exam position will always work regardless of her needs','Declining to perform the exam due to her disability','Skipping her sexual health assessment since she has a disability'],c:0,t:'single',r:'C and D both inappropriately deny needed care, and B fails to individualize based on the client\'s actual needs. Individualized accommodation based on the specific client\'s needs and preferences is the appropriate approach.'},
{topic:'repro',q:'Which of the following are appropriate components of assessing an older adult\'s sexual health? (Select all that apply)',o:['Assuming older adults are not sexually active without asking','Asking about any changes in sexual function','Assessing for STI risk factors regardless of age','Discussing any related concerns or questions','Providing appropriate education based on individual needs'],c:[1,2,3,4],t:'multi',r:'Assuming older adults are not sexually active without asking risks missing relevant assessment and education needs. The other four reflect appropriate, individualized assessment.'},
{topic:'repro',q:'A client asks why fibrocystic breast changes are considered benign despite causing lumps. What is the correct explanation?',o:['These changes involve benign, often hormone-related tissue changes rather than malignant cell growth','All breast lumps are automatically cancerous','Fibrocystic changes always require surgical removal','This condition only occurs in postmenopausal women'],c:0,t:'single',r:'Fibrocystic changes are benign, hormonally influenced tissue changes, distinct from malignant processes — not all breast lumps are cancerous.'},
{topic:'repro',q:'Which of the following are recognized risk factors for breast cancer? (Select all that apply)',o:['Family history of breast cancer','Increasing age','Regular physical activity','Certain genetic mutations (e.g., BRCA)','Early menarche/late menopause (longer estrogen exposure)'],c:[0,1,3,4],t:'multi',r:'Regular physical activity is actually protective, not a risk factor — the opposite of the others listed. Family history, age, genetic mutations, and longer estrogen exposure are all recognized risk factors.'},
{topic:'repro',q:'A client asks about the difference between a fine-needle aspiration (FNA) and a core needle biopsy for a breast finding. What is the correct explanation?',o:['FNA uses a thin needle to aspirate cells for cytology; core biopsy removes a small tissue sample for histologic examination','Both procedures are identical in technique and purpose','Neither procedure provides any diagnostic information','FNA is a surgical procedure requiring general anesthesia'],c:0,t:'single',r:'FNA aspirates cells for cytology (thinner needle, less tissue), while core biopsy obtains an actual tissue sample for more detailed histologic evaluation.'},
{topic:'repro',q:'Which of the following are appropriate nursing considerations after a breast biopsy? (Select all that apply)',o:['Monitor the biopsy site for bleeding or hematoma','Provide emotional support while awaiting results','Assure the client the results will always be benign','Discuss any activity restrictions as appropriate','Address pain management needs'],c:[0,1,3,4],t:'multi',r:'Promising results will always be benign is inappropriate and potentially false reassurance — results cannot be predicted. The other four are appropriate post-biopsy nursing considerations.'},
{topic:'repro',q:'A client asks why lobular carcinoma in situ (LCIS) is managed differently from invasive breast cancer. What is the correct explanation?',o:['LCIS is considered a risk marker for future cancer development rather than invasive cancer itself, influencing surveillance rather than aggressive treatment in the same way','LCIS is treated identically to invasive cancer in every case','LCIS has no clinical significance and requires no follow-up','LCIS always progresses to invasive cancer within one year'],c:0,t:'single',r:'LCIS is generally considered a risk marker rather than invasive cancer, which is why management often emphasizes surveillance rather than the aggressive treatment used for invasive disease.'},
{topic:'repro',q:'Which of the following are protective factors against breast cancer? (Select all that apply)',o:['Regular physical activity','Breastfeeding history','Smoking','Maintaining a healthy body weight','Early menarche'],c:[0,1,3],t:'multi',r:'Smoking and early menarche are both associated with increased risk, not protection. Regular physical activity, breastfeeding history, and healthy body weight are recognized protective factors.'},
{topic:'repro',q:'A client asks why her provider recommends breast self-awareness rather than a strict monthly self-exam schedule. What is the current perspective reflected in this recommendation?',o:['Being generally familiar with one\'s own breast tissue and reporting changes is emphasized over a rigid exam ritual','Self-exams have been proven completely useless and should never be discussed','Only mammography matters; self-awareness has no role at all','Self-exams should be performed multiple times daily for accuracy'],c:0,t:'single',r:'Current guidance often emphasizes general breast self-awareness and prompt reporting of changes over a rigid, scheduled self-exam ritual, without dismissing the value of familiarity with one\'s own body.'},
{topic:'repro',q:'Which of the following are common clinical manifestations of candidiasis?',o:['White, cottage-cheese-like discharge','Frothy yellow-green discharge','Painless chancre','Vulvar itching and irritation'],t:'multi',c:[0,3],r:'Frothy yellow-green discharge describes trichomoniasis, and a painless chancre describes syphilis. Candidiasis presents with white, cottage-cheese-like discharge and vulvar itching/irritation.'},
{topic:'repro',q:'A client asks why bacterial vaginosis is treated even though it is not classified the same way as some STIs. What is the correct explanation?',o:['Untreated bacterial vaginosis can increase risk for other infections and pregnancy-related complications','Bacterial vaginosis never requires treatment of any kind','It is identical to a yeast infection in cause and treatment','It only affects postmenopausal women'],c:0,t:'single',r:'Even though BV isn\'t always classified as a traditional STI, untreated BV is associated with increased risk of other infections and pregnancy complications, which is why treatment is still recommended.'},
{topic:'repro',q:'Which of the following are recognized clinical manifestations of HPV infection?',o:['Genital warts in some cases','Often asymptomatic','Cervical cellular changes detectable on Pap testing','A definitive, permanent cure is always achieved with one treatment course'],t:'multi',c:[0,1,2],r:'HPV has no guaranteed one-time definitive cure — the body\'s immune system often clears it, but this isn\'t a described "treatment course" outcome. Genital warts, asymptomatic presentation, and cervical changes are all recognized HPV manifestations.'},
{topic:'repro',q:'A client asks why the HPV vaccine is recommended before the onset of sexual activity. What is the correct explanation?',o:['The vaccine is most effective when given before potential HPV exposure occurs','The vaccine only works after exposure has already occurred','Timing has no effect on vaccine effectiveness','The vaccine is contraindicated before sexual activity begins'],c:0,t:'single',r:'The HPV vaccine works best when given before potential exposure, which is why early vaccination (before sexual activity typically begins) is recommended.'},
{topic:'repro',q:'Which of the following are appropriate nursing interventions for a client with genital herpes (HSV-2)? (Select all that apply)',o:['Provide pain relief measures during outbreaks','Educate about transmission risk even without visible lesions','Address anxiety related to the diagnosis','Assure the client the infection will be fully cured with treatment','Discuss safe sex practices to reduce transmission risk'],c:[0,1,2,4],t:'multi',r:'Herpes has no cure — assuring a client of a full cure is inaccurate and inappropriate. Pain relief, transmission education, emotional support, and safe-sex discussion are all appropriate.'},
{topic:'repro',q:'A client asks how herpes can be transmitted even when no visible sores are present. What is the correct explanation?',o:['Asymptomatic viral shedding can still occur and transmit the virus even without visible lesions','Herpes can only be transmitted when active lesions are visible','Herpes is not contagious at any point','Transmission only occurs through blood transfusion'],c:0,t:'single',r:'Asymptomatic shedding is a recognized phenomenon in herpes, meaning transmission risk exists even without visible active lesions.'},
{topic:'repro',q:'Which of the following are appropriate components of nursing care for a client recently diagnosed with PID?',o:['Assess pain level and provide appropriate management','Educate about completing the full antibiotic course','Discuss partner treatment needs','Assure the client that PID never causes long-term complications','Address emotional/psychological concerns'],t:'multi',c:[0,1,2,4],r:'PID CAN cause long-term complications like infertility or ectopic pregnancy risk if inadequately treated — falsely reassuring otherwise is inappropriate. The other four are appropriate care components.'},
{topic:'repro',q:'A client asks why prompt treatment of PID is so important. What is the correct explanation?',o:['Delayed or inadequate treatment increases risk of long-term complications like infertility or ectopic pregnancy','PID resolves on its own without any treatment needed','PID has no long-term consequences regardless of treatment timing','Treatment timing has no bearing on outcomes'],c:0,t:'single',r:'Prompt, adequate treatment reduces the risk of long-term reproductive complications associated with untreated or delayed PID management.'},
{topic:'repro',q:'Which of the following are appropriate considerations for a client on combined oral contraceptives who also smokes?',o:['Increased cardiovascular and clotting risk with this combination','No additional risk beyond either factor alone','This combination is specifically recommended by most providers','Smoking cessation counseling is not relevant to this discussion'],c:0,t:'single',r:'Smoking combined with estrogen-containing contraceptives meaningfully increases cardiovascular/clotting risk beyond either factor alone, making smoking cessation counseling directly relevant.'},
{topic:'repro',q:'A client asks about non-hormonal contraceptive options given her contraindications to estrogen-containing methods. Which nursing response is appropriate?',o:['"There are non-hormonal options available, and this is worth discussing with your provider to find the right fit."','"You have no contraceptive options available to you."','"All contraceptives contain estrogen, so none would be safe."','"This decision does not require any provider input."'],c:0,t:'single',r:'B and C both inaccurately describe the range of contraceptive options (many non-hormonal and non-estrogen options exist), and D dismisses appropriate provider involvement. A reflects accurate, supportive guidance.'},
{topic:'repro',q:'Which of the following are recognized symptoms of perimenopause?',o:['Irregular menstrual cycles','Hot flashes','Sleep disturbances','Complete absence of any symptoms in all cases'],t:'multi',c:[0,1,2],r:'Perimenopause is specifically characterized by a range of symptoms, not a universal absence of symptoms. Irregular cycles, hot flashes, and sleep disturbances are all recognized perimenopausal symptoms.'},
{topic:'repro',q:'A client asks why weight-bearing exercise is recommended during perimenopause and menopause. What is the correct explanation?',o:['It helps maintain bone density, reducing osteoporosis risk that increases after estrogen decline','Weight-bearing exercise has no bone-related benefit','It is only relevant for cardiovascular health, not bone health','It should be avoided during this life stage'],c:0,t:'single',r:'Weight-bearing exercise supports bone density, which is particularly important given the increased osteoporosis risk following estrogen decline in menopause.'},
{topic:'repro',q:'Which of the following are appropriate topics to address when counseling a client about combination hormone therapy risks? (Select all that apply)',o:['Personal and family history of breast cancer','Clotting disorder history','Smoking status','Assuming risk is identical for every client regardless of history'],t:'multi',c:[0,1,2],r:'Assuming identical risk for every client ignores the individualized nature of HRT risk-benefit counseling. Personal/family breast cancer history, clotting history, and smoking status are all appropriate topics to address.'},
{topic:'repro',q:'A client asks why single-estrogen therapy differs from combination estrogen-progesterone therapy in risk profile. What is the correct explanation?',o:['The specific risk profile can differ based on whether progesterone is included, which is why individualized counseling matters','Both formulations carry identical risk profiles in every case','Progesterone has no relevance to hormone therapy risk','Single-estrogen therapy is never used clinically'],c:0,t:'single',r:'The specific hormone combination used can affect the risk profile, which is why individualized discussion of formulation matters in HRT counseling.'},
{topic:'repro',q:'Which of the following are appropriate nursing actions when caring for a client considering gender-affirming surgery? (Select all that apply)',o:['Provide accurate information about the surgical process as appropriate to the nurse\'s scope','Support the client\'s decision-making process respectfully','Ensure human dignity throughout care','Assume the client\'s decision reflects a lack of thought','Address anxiety and pain management needs as applicable'],c:[0,1,2,4],t:'multi',r:'Assuming a lack of thought behind the client\'s decision is disrespectful and inappropriate. Providing accurate information, supporting decision-making, ensuring dignity, and addressing anxiety/pain are all appropriate nursing actions.'},
{topic:'repro',q:'A client asks why open-ended questions are recommended when discussing family structure with LGBTQ+ clients. What is the correct explanation?',o:['Open-ended questions avoid assumptions and allow the client to describe their own situation accurately','Open-ended questions are never useful in clinical assessment','Assuming a traditional family structure is always more efficient and appropriate','This approach is only relevant for pediatric clients'],c:0,t:'single',r:'Open-ended questions avoid imposing assumptions about family structure, allowing clients to accurately describe their own situation — a more respectful and clinically useful approach.'},
{topic:'repro',q:'Which of the following are appropriate considerations for an older LGBTQ+ client\'s care?',o:['Recognizing potential unique social support considerations','Avoiding assumptions about relationship or family structure','Assuming all older LGBTQ+ clients have identical needs','Providing individualized, respectful care'],t:'multi',c:[0,1,3],r:'Assuming identical needs across any group ignores individual variation, which good nursing care should avoid. Recognizing unique considerations, avoiding assumptions, and individualizing care are all appropriate.'},
{topic:'repro',q:'A client asks why testicular self-awareness is encouraged for young males. What is the correct explanation?',o:['Testicular cancer is most common in males 15-35, so awareness can support early detection','Testicular cancer only occurs in older males','Self-awareness has no value for this condition','Testicular cancer is always immediately fatal regardless of detection timing'],c:0,t:'single',r:'Since testicular cancer is most common in the 15-35 age range and is highly treatable, especially with early detection, self-awareness in this population is genuinely valuable.'},
{topic:'repro',q:'Which of the following are appropriate topics to address when counseling a male client about sperm harvesting before cancer treatment?',o:['Explaining the purpose is to preserve fertility options before treatment','Addressing any questions or concerns about the process','Assuming the client has no interest without asking','Discussing timing relative to planned treatment'],t:'multi',c:[0,1,3],r:'Assuming lack of interest without asking skips an important individualized conversation. Explaining the purpose, addressing questions, and discussing timing are all appropriate counseling points.'},
{topic:'repro',q:'A client asks why a digital rectal exam (DRE) might be part of a male reproductive health assessment. What is the correct explanation?',o:['It allows assessment of the prostate gland for size, shape, and abnormalities','It has no relevance to reproductive health','It replaces the need for a PSA test entirely','It is only performed on clients under 40'],c:0,t:'single',r:'DRE allows direct assessment of prostate size, shape, and any palpable abnormalities — a complementary, not replacement, test alongside PSA.'},
{topic:'repro',q:'Which of the following are recognized causes of erectile dysfunction?',o:['Vascular disease','Psychological factors','Hormonal imbalance','ED has a single universal cause in all cases'],t:'multi',c:[0,1,2],r:'ED is specifically recognized as multifactorial, not attributable to one universal cause. Vascular, psychological, and hormonal factors are all recognized contributors.'},
{topic:'repro',q:'A client asks why his provider recommended addressing both psychological and physiological factors for his erectile dysfunction. What is the correct explanation?',o:['ED is multifactorial, so addressing both types of contributing factors together often provides the most effective management','ED is purely physiological and psychological factors are irrelevant','ED is purely psychological and physiological factors are irrelevant','Only one factor type ever needs to be addressed regardless of presentation'],c:0,t:'single',r:'Because ED often has both psychological and physiological contributors, addressing both together tends to be the most effective approach, rather than assuming a single exclusive cause.'},
{topic:'repro',q:'Which of the following are appropriate nursing considerations for a client with premature ejaculation?',o:['Approaching the topic with sensitivity','Providing appropriate education and treatment options as applicable','Assuming the client does not want to discuss the topic','Addressing any related relationship or emotional concerns'],t:'multi',c:[0,1,3],r:'Assuming a client doesn\'t want to discuss a health concern without asking risks missing an opportunity for appropriate care. Sensitivity, education, and addressing emotional concerns are all appropriate.'},
{topic:'repro',q:'A client asks why proper foreskin hygiene is emphasized for uncircumcised males. What is the correct explanation?',o:['Inadequate cleaning can allow bacteria and debris accumulation, increasing infection risk','Foreskin hygiene has no relationship to infection risk','Circumcision status has no bearing on hygiene recommendations','This teaching is only relevant for infants, never adults'],c:0,t:'single',r:'Inadequate foreskin hygiene can allow bacterial/debris accumulation, which is why proper technique is emphasized across age groups, not just infancy.'},
{topic:'repro',q:'Which of the following are appropriate teaching points regarding urinary tract infection prevention in females?',o:['Wiping front to back after using the bathroom','Avoiding practices that introduce bacteria near the urethral opening','Wiping back to front is equally effective for prevention','Adequate hydration'],t:'multi',c:[0,1,3],r:'Wiping back to front actually increases risk of introducing bacteria toward the urethra — the opposite of protective technique. Front-to-back wiping, avoiding bacterial introduction, and hydration are all appropriate prevention points.'},
{topic:'repro',q:'A client asks why some newer STI strains are of particular concern to public health. What is the correct explanation?',o:['Some emerging strains show increased virulence and antibiotic resistance','All STI strains have remained completely unchanged over time','Antibiotic resistance has no relevance to STI management','This is not a genuine public health concern'],c:0,t:'single',r:'Emerging antibiotic-resistant and more virulent STI strains are a genuine, recognized public health concern affecting treatment approaches.'},
{topic:'repro',q:'Which of the following are appropriate reasons for partner notification and treatment in STI management?',o:['Preventing reinfection of the original client','Reducing further transmission within the community','Partner notification is never medically relevant','Supporting overall public health STI control efforts'],t:'multi',c:[0,1,3],r:'Partner notification is, in fact, medically and public-health relevant — denying this ignores its actual role. Preventing reinfection, reducing transmission, and supporting public health control are all legitimate reasons.'},
{topic:'repro',q:'A client asks why syphilis is curable if caught early but can cause serious complications if untreated. What is the correct explanation?',o:['Early stages respond well to antibiotic treatment, but untreated progression can cause irreversible organ damage over time','Syphilis is never curable at any stage','Untreated syphilis always resolves on its own without consequence','Syphilis has no distinct disease stages'],c:0,t:'single',r:'Early syphilis responds well to antibiotics (like penicillin), but untreated progression through its stages can cause serious, sometimes irreversible complications — timing of treatment matters significantly.'},
{topic:'repro',q:'Which of the following are appropriate nursing actions for a client recently diagnosed with a reportable STI?',o:['Providing accurate information about reporting requirements','Supporting the client through the emotional aspects of diagnosis','Assuring the client that reporting will have no privacy protections whatsoever','Encouraging partner notification and treatment'],t:'multi',c:[0,1,3],r:'Making sweeping claims about zero privacy protections is inaccurate and inappropriate — actual confidentiality protections vary by circumstance and shouldn\'t be overstated in either direction. Providing accurate reporting information, emotional support, and encouraging partner treatment are all appropriate.'},
{topic:'repro',q:'A client asks why chlamydia often goes undetected without routine screening. What is the correct explanation?',o:['Chlamydia is frequently asymptomatic, making routine screening important for detection','Chlamydia always causes severe, obvious symptoms','Screening has no value since symptoms always appear eventually','Chlamydia cannot be detected through any testing method'],c:0,t:'single',r:'Chlamydia\'s frequently asymptomatic nature is exactly why routine screening (rather than waiting for symptoms) is clinically important.'},
{topic:'repro',q:'Which of the following are appropriate considerations when discussing safe sex practices with clients?',o:['Consistent condom use','Regular STI screening based on risk factors','Discussing safe sex practices is never appropriate in a clinical setting','Open communication with partners about sexual health'],t:'multi',c:[0,1,3],r:'Discussing safe sex practices is, in fact, a core and appropriate part of clinical sexual health counseling — denying this ignores standard practice. Condom use, risk-based screening, and partner communication are all appropriate discussion points.'},
{topic:'cardio',q:'Which of the following are appropriate nursing considerations for a client with newly diagnosed atherosclerosis? (Select all that apply)',o:['Lifestyle modification counseling (diet, exercise, smoking cessation)','Statin therapy as appropriate','Antiplatelet therapy as indicated','Reassurance that no further monitoring is needed','Blood pressure management'],c:[0,1,2,4],t:'multi',r:'Atherosclerosis is a chronic, progressive condition requiring ongoing monitoring, not a one-time issue needing no further follow-up. Lifestyle counseling, statins, antiplatelets, and BP management are all appropriate.'},
{topic:'repro',q:'A client asks why a Pap smear and an HPV test might be done together. What is the correct explanation?',o:['Co-testing can improve detection of cervical abnormalities by assessing both cellular changes and HPV status','These two tests provide identical information and testing both is unnecessary','HPV testing replaces the need for a Pap smear in all cases','Pap smears test for HPV directly with no separate test needed'],c:0,t:'single',r:'Co-testing (Pap plus HPV) can improve overall detection sensitivity, since they assess related but distinct aspects of cervical health.'},
{topic:'cardio',q:'What is the normal adult resting heart rate range?',o:['30-50 bpm','60-100 bpm','110-130 bpm','140-160 bpm'],t:'single',c:1,r:'Normal adult resting heart rate is generally 60-100 bpm.'},
{topic:'cardio',q:'Systole refers to which phase of the cardiac cycle?',o:['Relaxation/filling','Contraction/ejection','Electrical repolarization only','The refractory period only'],t:'single',c:1,r:'Systole is the contraction/ejection phase; diastole is relaxation/filling.'},
{topic:'cardio',q:'Which valve is located between the right atrium and right ventricle?',o:['Mitral valve','Tricuspid valve','Aortic valve','Pulmonic valve'],t:'single',c:1,r:'The tricuspid valve is the right-sided AV valve; the mitral valve is on the left.'},
{topic:'cardio',q:'What is the normal range for systolic blood pressure in adults?',o:['Less than 90 mmHg','Less than 120 mmHg','Greater than 140 mmHg','Greater than 160 mmHg'],t:'single',c:1,r:'Normal systolic BP is generally under 120 mmHg.'},
{topic:'cardio',q:'Which of the following is a classic symptom of heart failure?',o:['Shortness of breath','Improved exercise tolerance','Decreased appetite only','Increased urine output only'],t:'single',c:0,r:'Shortness of breath (dyspnea) is a classic heart failure symptom.'},
{topic:'cardio',q:'What does the abbreviation "PAD" stand for in this unit\'s content?',o:['Pulmonary Artery Disease','Peripheral Arterial Disease','Post-Anesthesia Discomfort','Prolonged Arterial Dilation'],t:'single',c:1,r:'PAD stands for Peripheral Arterial Disease.'},
{topic:'cardio',q:'Which of the following is a recognized risk factor for atherosclerosis?',o:['Regular exercise','Smoking','A diet low in saturated fat','Adequate hydration'],t:'single',c:1,r:'Smoking is a major, well-established atherosclerosis risk factor; the other options are generally protective or neutral.'},
{topic:'cardio',q:'What does DVT stand for?',o:['Direct Venous Thrombosis','Deep Vein Thrombosis','Dual Vascular Trauma','Delayed Ventricular Tachycardia'],t:'single',c:1,r:'DVT stands for Deep Vein Thrombosis.'},
{topic:'cardio',q:'Which of the following medications is classified as a loop diuretic?',o:['Furosemide','Metoprolol','Lisinopril','Amlodipine'],t:'single',c:0,r:'Furosemide (Lasix) is a classic loop diuretic.'},
{topic:'cardio',q:'What is the general purpose of an ECG (electrocardiogram)?',o:['To measure blood glucose','To record the heart\'s electrical activity','To measure lung capacity','To measure kidney function'],t:'single',c:1,r:'An ECG records the heart\'s electrical activity, helping identify arrhythmias and ischemia.'},
{topic:'cardio',q:'Which of the following best describes hypertension?',o:['Blood pressure that is too low','Persistently elevated blood pressure','A type of arrhythmia','A clotting disorder'],t:'single',c:1,r:'Hypertension is persistently elevated blood pressure.'},
{topic:'repro',q:'What does BPH stand for?',o:['Benign Prostatic Hyperplasia','Bilateral Pelvic Hernia','Basic Prostate Hormone','Breast Pathology History'],t:'single',c:0,r:'BPH stands for Benign Prostatic Hyperplasia — enlargement of the prostate gland.'},
{topic:'repro',q:'What is the medical term for absence of menstruation?',o:['Dyspareunia','Menorrhagia','Amenorrhea','Dysmenorrhea'],t:'single',c:2,r:'Amenorrhea means absence of menstruation.'},
{topic:'repro',q:'Which organ is removed during a hysterectomy?',o:['The ovaries only','The uterus','The bladder','The fallopian tubes only'],t:'single',c:1,r:'A hysterectomy specifically involves removal of the uterus; the ovaries may or may not also be removed (oophorectomy) depending on the procedure.'},
{topic:'repro',q:'What does PID stand for?',o:['Pelvic Inflammatory Disease','Prostate Infection Disorder','Painful Intercourse Diagnosis','Primary Immune Deficiency'],t:'single',c:0,r:'PID stands for Pelvic Inflammatory Disease.'},
{topic:'repro',q:'Which medication is commonly used to treat trichomoniasis?',o:['Penicillin','Metronidazole','An antifungal cream','No medication is used'],t:'single',c:1,r:'Metronidazole is the standard treatment for trichomoniasis.'},
{topic:'repro',q:'Which of the following STIs is curable with antibiotics if caught early?',o:['Herpes','HIV','Syphilis','HPV'],t:'single',c:2,r:'Syphilis is curable with antibiotics (like penicillin), especially when caught in early stages.'},
{topic:'repro',q:'What is the general definition of menopause?',o:['Any single missed period','12 consecutive months without a period','The first hot flash a woman experiences','A specific age milestone regardless of menstrual history'],t:'single',c:1,r:'Menopause is defined by 12 consecutive months without a menstrual period.'},
{topic:'repro',q:'Which of the following is a classic symptom of BPH?',o:['Painless testicular lump','Post-void dribbling','Hot flashes','Painful chancre'],t:'single',c:1,r:'Post-void dribbling is a classic BPH symptom from urethral compression.'},
{topic:'cardio',q:'A client on IV diltiazem has a new order added for IV metoprolol. What should the nurse do?',o:['Administer both as ordered','Question the order — concurrent IV CCB and IV beta-blocker risks fatal bradycardia/AV block','Give only the metoprolol','Give both but at half the ordered doses'],t:'single',c:1,r:'This specific combination carries a real, serious bradycardia/heart block risk and should be questioned before administration, not adjusted informally.'},
{topic:'cardio',q:'What is the antidote for heparin?',o:['Vitamin K','Protamine Sulfate','Physostigmine','Digibind/DigiFab'],t:'single',c:1,r:'Protamine Sulfate is the antidote for heparin; Vitamin K reverses warfarin, Digibind/DigiFab reverses digoxin toxicity, and physostigmine reverses anticholinergic toxicity.'},
{topic:'cardio',q:'What is the antidote for digoxin toxicity?',o:['Protamine Sulfate','Vitamin K','Digibind/DigiFab','Physostigmine'],t:'single',c:2,r:'Digibind/DigiFab is the specific antidote for severe digoxin toxicity.'},
{topic:'cardio',q:'What is the antidote for atropine/anticholinergic toxicity?',o:['Protamine Sulfate','Vitamin K','Digibind/DigiFab','Physostigmine'],t:'single',c:3,r:'Physostigmine reverses anticholinergic toxicity, including from atropine.'},
{topic:'cardio',q:'A nurse prepares to give atropine 0.3 mg IV for symptomatic bradycardia. What is the concern with this dose?',o:['The dose is too high and risks tachycardia','Doses below 0.5 mg IV can cause paradoxical bradycardia','This dose is appropriate and should be given without question','Atropine cannot be given IV at any dose'],t:'single',c:1,r:'Atropine doses under 0.5 mg IV carry a specific, counterintuitive risk of paradoxical bradycardia rather than the intended heart-rate increase.'},
{topic:'cardio',q:'Which finding would make the nurse question an order for adenosine?',o:['The client is in simple PSVT/SVT','The client has WPW syndrome and is currently in atrial fibrillation','The client has continuous cardiac monitoring in place','The client has IV access established'],t:'single',c:1,r:'Adenosine in WPW with atrial fib/flutter can accelerate conduction through the accessory pathway — a genuine reason to question this specific combination, unlike the other listed (expected/appropriate) findings.'},
{topic:'cardio',q:'Which lab value should be checked before administering a digoxin dose, beyond the apical pulse?',o:['Serum potassium, since hypokalemia increases toxicity risk','Serum glucose only','White blood cell count only','Liver enzymes exclusively'],t:'single',c:0,r:'Potassium level is directly relevant to digoxin safety — hypokalemia significantly raises toxicity risk via the shared Na-K pump binding site.'},
{topic:'cardio',q:'A client taking propranolol reports new wheezing and shortness of breath. What is the MOST likely explanation?',o:['This is unrelated to the medication','Propranolol\'s nonselective beta-2 blockade can cause bronchospasm, especially in reactive airway disease','This is an expected, harmless finding requiring no action','Propranolol only affects the eyes, not the lungs'],t:'single',c:1,r:'Propranolol blocks beta-2 receptors in the lungs (unlike cardioselective metoprolol), which is exactly why bronchospasm is a recognized risk, particularly in asthma/COPD.'},
{topic:'cardio',q:'Which of the following are appropriate reasons to hold a scheduled dose of metoprolol? (Select all that apply)',o:['Heart rate below 60 bpm','Systolic blood pressure below 90 mmHg','Heart rate of 78 bpm','Blood pressure of 128/76 mmHg','Client reports mild fatigue only'],c:[0,1],t:'multi',r:'A heart rate of 78 and BP of 128/76 are both within acceptable ranges, and mild fatigue alone isn\'t an automatic hold criterion. HR <60 or SBP <90 are the specific hold parameters for metoprolol.'},
{topic:'cardio',q:'A client with a history of heparin-induced thrombocytopenia (HIT) needs anticoagulation for a new DVT. What should the nurse anticipate?',o:['Heparin will be used again since it worked previously','An alternative anticoagulant will likely be used, since HIT history contraindicates further heparin','No anticoagulation will be given under any circumstance','Heparin will be given at a lower dose to avoid recurrence'],t:'single',c:1,r:'A history of HIT is a genuine contraindication to further heparin use — an alternative anticoagulant (not simply a lower heparin dose) is the appropriate approach.'},
{topic:'cardio',q:'Why is adenosine administered as a rapid IV push followed immediately by a saline flush, rather than a slow infusion?',o:['To reduce cost','Adenosine has an extremely short half-life (~10 seconds), so a slow infusion would allow it to be metabolized before reaching the heart effectively','Slow infusion would cause more side effects','There is no specific reason for this administration technique'],t:'single',c:1,r:'Because adenosine is broken down almost immediately, a rapid push plus flush is needed to get an effective concentration to the AV node before it\'s cleared — a slow infusion would undermine the mechanism entirely.'}
];
