<script>
document.getElementById('sec-repro').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🩺</span> Reproductive Health & STIs</h2>
<p class="intro-line">The specific reproductive-health slice confirmed testable: testicular cancer, PID, hysterectomy, menopause/HRT, BPH, ED, oral contraceptive contraindications, and every STI on your review sheet.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>🌸 Female Reproductive Basics</h3>
  <ul class="clean">
    <li><b>Vaginal pH</b> acts as a protective mechanism against infection. It can be disrupted by hormones, hygiene products, soaps, douching, semen, antibiotics, aging, and poor hygiene practices.</li>
    <li><b>Menarche (first period):</b> average onset around age 11-12. <b>Menopause:</b> average onset around age 50.</li>
    <li><b>Menstrual cycle:</b> average 28 days; ovulation occurs approximately 2 weeks BEFORE the next expected period (not 2 weeks after the last one — a common point of confusion).</li>
    <li><b>Key terminology:</b>
      <ul class="clean">
        <li><b>Dyspareunia</b> — painful intercourse.</li>
        <li><b>Amenorrhea</b> — absence of menstruation.</li>
        <li><b>Menorrhagia</b> — excessive menstrual bleeding <i>during</i> a period.</li>
        <li><b>Metrorrhagia</b> — bleeding that occurs <i>between</i> periods (irregular, not tied to the expected menstrual cycle) — easy to confuse with menorrhagia, but a distinct pattern.</li>
      </ul>
    </li>
    <li><b>Menstrual hygiene:</b> frequent tampon changes reduce infection risk, including <b>toxic shock syndrome (TSS)</b> — a rare but serious complication historically linked to prolonged tampon use.</li>
    <li><b>PMS (premenstrual syndrome)</b> — the same hormonal shifting that drives perimenopausal symptoms (mood changes, occasional hot flashes) can also cause similar symptoms tied to the normal menstrual cycle itself, not just the menopausal transition. Don't confuse a PMS symptom pattern with perimenopause just because the symptoms look similar.</li>
  </ul>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🧬 Testicular Cancer</h3>
  <ul class="clean">
    <li><b>Highly treatable</b> — most common cancer in males age 15-35.</li>
    <li><b>Presentation:</b> painless lump, swelling, heaviness, dull ache, pain or discomfort in the testicle.</li>
    <li><b>Diagnosis:</b> tumor markers — <b>alpha-fetoprotein (AFP), hCG, LDH</b> — plus ultrasound.</li>
    <li><b>Treatment:</b> standard is surgery (<b>orchiectomy</b>), sometimes followed by radiation. <b>Sperm harvesting</b> offered before treatment to preserve fertility.</li>
  </ul>
</div>

<div class="card">
  <h3>🩺 Pelvic Inflammatory Disease (PID)</h3>
  <p>An infection of the female reproductive organs — uterus, fallopian tubes, and ovaries. Often a complication of an untreated STI (like chlamydia or gonorrhea) ascending into the upper reproductive tract.</p>
</div>

<div class="card">
  <h3>🏥 Hysterectomy</h3>
  <ul class="clean">
    <li><b>Hysterectomy</b> = removal of the uterus. If the <b>ovaries are also removed (oophorectomy)</b>, this induces <b>immediate surgical menopause</b> — hormone production stops right away rather than declining gradually, so the patient experiences the full symptom profile (hot flashes, vaginal dryness, etc.) immediately post-op, not over years.</li>
    <li><b>Post-op monitoring:</b> watch for active bleeding — <b>changing pads more than 2-3 times per hour is a concerning finding</b> requiring prompt notification.</li>
    <li><b>Recovery:</b> typically <b>6-8 weeks</b> with restricted activity and travel; overall psychological recovery and adjustment can take longer (months), with possible grief, depression, and body image effects — particularly given the loss of reproductive organs and its impact on identity and sexuality.</li>
    <li><b>Nursing approach:</b> sensitive, open-ended questioning about how the patient is coping; involve the partner in recovery support when appropriate; explore alternative ways to maintain emotional/physical intimacy during the recovery window; offer support groups.</li>
  </ul>
  <div class="hy">⭐ <b>Cervical cancer risk reduction:</b> smoking cessation, safe sex practices, and the HPV vaccine (now approved for an expanded age range in BOTH genders — roughly age 9 through the mid-40s, not just adolescents). Additional cervical cancer risk factors: early onset of sexual activity and multiple sexual partners/STI history.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🌡️ Menopause & Perimenopause</h3>
  <ul class="clean">
    <li><b>Menopause</b> — defined by 12 consecutive months WITHOUT a menstrual period.</li>
    <li><b>Perimenopause</b> — the transition time leading up to menopause; periods become irregular and further apart before stopping permanently. Same symptom profile as menopause, just before periods have fully stopped.</li>
    <li><b>Symptoms:</b> hot flashes, night sweats, irregular periods, vaginal dryness, joint/muscle aches, weight gain.</li>
    <li><b>Non-hormonal management:</b> keep the bedroom cool (fan), reduce stress, avoid caffeine/alcohol, exercise regularly, wear light clothing, maintain a healthy weight. Also: smoking cessation, exercise, calcium & vitamin D (reduces coronary and osteoporosis risk, both of which rise after estrogen loss).</li>
  </ul>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💊 Hormone Replacement Therapy (HRT) & Oral Contraceptive Contraindications</h3>
  <ul class="clean">
    <li><b>HRT benefits:</b> relieves menopausal symptoms, protects bone health, reduces some cardiovascular risks.</li>
    <li><b>HRT cautions/contraindications:</b> history of breast cancer, blood clotting issues, HTN, smoking. Alternatives: vitamin/herbal supplements.</li>
    <li><b>Combination therapy vs. estrogen-only — a key nuance:</b> the increased cancer risk historically associated with HRT is specifically tied to <b>combination estrogen-progesterone therapy</b>. Research has shown that <b>estrogen-only therapy carries a notably lower risk</b> — this distinction matters for counseling and is easy to over-generalize if you only remember "HRT raises cancer risk" without the nuance of which formulation.</li>
    <li><b>Oral contraceptive contraindications:</b> HTN, history of DVT/stroke/PE, smoking, breast cancer, liver disease.</li>
  </ul>
  <div class="hy">⭐ Notice the overlap: HTN, clotting history, and smoking disqualify BOTH HRT and oral contraceptives — because both involve exogenous estrogen, which raises clotting risk and interacts with the same cardiovascular risk factors.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👨 Benign Prostatic Hyperplasia (BPH)</h3>
  <p><b>Anatomy:</b> the prostate gland sits at the base of the bladder, wrapping around the urethra. It (along with Cowper's/bulbourethral glands) contributes secretions to the ejaculate. As the prostate enlarges with age (very common in older males), it constricts/compresses the urethra and impairs urinary flow.</p>
  <ul class="clean">
    <li><b>Prevalence:</b> some degree of prostate enlargement is extremely common with age — a large majority of men over 70 have it.</li>
    <li><b>Clinical signs from urethral constriction:</b> post-void dribbling, incomplete bladder emptying, urinary frequency, frequent NOCTURNAL urination (nocturia) from chronic retention — the bladder never fully empties, so it refills faster.</li>
  </ul>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💊 Erectile Dysfunction (ED) & the Nitrate Danger</h3>
  <ul class="clean">
    <li><b>Multifactorial causes:</b> psychosomatic/psychological stress, vascular disease, hormonal factors (natural age-related testosterone decline). (See the Why Engine card connecting ED to early vascular disease detection.)</li>
    <li><b>Vascular contributors:</b> atherosclerosis, hypertension, and diabetes can all impair the (highly vascular) blood flow needed for erectile function — the same disease processes covered throughout this unit.</li>
    <li><b>Treatment options:</b> addressing the specific broken component matters — psychological support for psychosomatic causes, hormone therapy for a hormonal component (same increased-cancer-risk caveat as other hormone therapy), <b>vacuum erection devices (pumps)</b>, and medication.</li>
    <li><b>ED medications (PDE5 inhibitors, e.g., sildenafil/Viagra)</b> — work via a nitric oxide-based mechanism causing vasodilation.</li>
    <li><b style="color:var(--red)">CONTRAINDICATED with nitrates</b> (like nitroglycerin) — combining the two causes profound, dangerous vasodilation and hypotension, risking severe blood pressure drops, fainting, and cardiac events. This is a critical medication safety teaching point.</li>
  </ul>
</div>

<div class="card">
  <h3>👨 Phimosis & Male Hygiene</h3>
  <ul class="clean">
    <li><b>Definition:</b> inflammation/tightening of the foreskin that prevents normal retraction.</li>
    <li><b>Cause:</b> often related to inadequate hygiene, allowing bacteria/debris accumulation, or improper retraction technique causing swelling/constriction.</li>
    <li><b>Critical teaching point:</b> after retracting the foreskin for cleaning, it must always be <b>returned to its original (unretracted) position</b> — leaving it retracted can cause painful constriction and swelling (paraphimosis), a genuine complication.</li>
    <li><b>Male hygiene technique:</b> clean the shaft moving AWAY from the meatus (urinary opening), not toward it — the parallel teaching point to "wipe front to back" for females. Introducing bacteria toward the meatus raises UTI risk.</li>
  </ul>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🦠 STIs — every one on your review sheet is confirmed testable</h3>
  <div class="hy">⭐ <b>STI reporting status — high-yield fact:</b> gonorrhea, chlamydia, and syphilis are <b>mandatory state-reportable</b> diseases. <b>Herpes is NOT reportable.</b> Partner notification and treatment are essential regardless of reporting status, to actually cure the infection and stop transmission.</div>
  <ul class="clean">
    <li><b>Herpes:</b> HSV-1 typically causes oral herpes (cold sores around the mouth); HSV-2 typically causes genital herpes (blisters/ulcers on the genitals, buttocks, or thighs) — but either type can infect either location, making the classic split less absolute in practice. Spread by direct contact with lesions, semen, vaginal secretions, saliva. <b>Diagnosis:</b> swab of the vesicle; if no active lesion, blood test.</li>
    <li><b>Syphilis</b> (curable if caught early) — 4 stages:
      <ul class="clean">
        <li><b>Primary:</b> a painless, round sore (chancre) at the infection site, 10-90 days after exposure.</li>
        <li><b>Secondary:</b> body rash, fever, swollen lymph nodes, flu-like symptoms, 3-6 months after infection.</li>
        <li><b>Latent:</b> no symptoms, can last years.</li>
        <li><b>Tertiary:</b> serious complications if untreated for years — heart disease, brain damage, blindness.</li>
      </ul>
    </li>
    <li><b>Chlamydia:</b> ranges from no symptoms to dysuria, thick white/yellow discharge, abdominal pain, pain during intercourse.</li>
    <li><b>Gonorrhea:</b> increased vaginal discharge — can be white, yellow, or green. <b>Newer, more virulent/antibiotic-resistant strains</b> are an emerging concern — in severe or disseminated cases, gonorrhea can spread beyond the genital tract to distant sites (eyes, joints, kidneys, even the meninges/CNS), a significantly more dangerous presentation than the classic localized infection.</li>
    <li><b>Trichomoniasis:</b> frothy yellow-white or yellow-green discharge; treated with <b>metronidazole</b>.</li>
    <li><b>Candidiasis:</b> white, cottage cheese-like discharge.</li>
  </ul>
  <div class="hy">⭐ Newer STI strains are becoming more virulent and antibiotic-resistant in some cases — reinforcing why prompt treatment, partner notification, and prevention (HPV vaccination, safe sex) matter as much as ever.</div>
  <div class="mnem"><div class="tag">Discharge color/texture memory hook</div><div class="big">Chlamydia = thick white/yellow • Gonorrhea = white/yellow/GREEN • Trichomoniasis = FROTHY yellow-green • Candidiasis = COTTAGE CHEESE white</div></div>
</div>

document.getElementById('sec-decoder').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🗂️</span> Disorder Decoder</h2>
<p class="intro-line">Quick Cause → Manifests → Treatment reference for every disorder in this unit's confirmed blueprint.</p>
<div class="card" style="border-color:var(--purple);text-align:center">
  <button class="btn topic-filter-btn" onclick="cycleTopicFilter()" style="background:var(--purple)">🎯 All Topics</button>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>📈 Hypertension</h3>
  <p><b>Cause:</b> BP = CO × PVR; multifactorial elevation of either or both, usually primary/idiopathic (~90-95%).</p>
  <p><b>Manifests:</b> usually asymptomatic ("silent killer") until target organ damage occurs — retinal changes, LVH, kidney damage, TIA/stroke.</p>
  <p><b>Treatment:</b> lifestyle changes first, then stepwise medication (often 2-drug combos), Stage 2 goal &lt;130/80.</p>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🚨 Hypertensive Emergency vs. Urgency</h3>
  <p><b>Cause:</b> severe BP elevation (&gt;180/&gt;120) — emergency has target organ damage, urgency does not.</p>
  <p><b>Manifests:</b> emergency may show neuro changes, chest pain, vision changes (organ damage in progress); urgency is severe numbers without those findings.</p>
  <p><b>Treatment:</b> emergency = controlled reduction (≤25% first hour) via IV meds; urgency = oral meds, controlled over 24-48 hrs.</p>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💔 ACS (Angina / MI)</h3>
  <p><b>Cause:</b> plaque rupture + thrombus suddenly reduces/stops coronary blood flow.</p>
  <p><b>Manifests:</b> chest pain/pressure, possible radiation to arm/jaw/back, dyspnea, diaphoresis; unstable angina = new/worsening/at-rest pain.</p>
  <p><b>Treatment:</b> troponin/ECG for diagnosis, meds (antiplatelets, thrombolytics, beta-blockers, statins), possible cath/PCI; goal = prevent future MI.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>❤️ Heart Failure — Right vs. Left</h3>
  <p><b>Cause:</b> the heart fails to pump forward effectively, so blood backs up into whatever is upstream of the failing side.</p>
  <p><b>Manifests — Right:</b> peripheral edema, JVD, weight gain, ascites (backs up into the systemic venous system). <b>Manifests — Left:</b> pulmonary congestion, crackles, dyspnea (backs up into the lungs).</p>
  <p><b>Treatment:</b> diuretics (#1 for fluid overload), ACE/ARB, beta-blockers, digoxin as indicated; BNP used to help confirm/monitor.</p>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🚨 Acute Arterial Obstruction (6 Ps)</h3>
  <p><b>Cause:</b> sudden complete arterial blockage (embolism/thrombosis/trauma) cutting off oxygen downstream.</p>
  <p><b>Manifests:</b> Pain → Pallor → Paresthesia → Pulselessness → Poikilothermia → Paralysis (paralysis = late, limb-threatening).</p>
  <p><b>Treatment:</b> emergency revascularization (surgical/catheter-based); time-critical to prevent limb loss.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🦵 PAD</h3>
  <p><b>Cause:</b> atherosclerosis narrowing peripheral arteries.</p>
  <p><b>Manifests:</b> intermittent claudication, coldness, pallor, hair loss, brittle nails, weak/absent pulses, non-healing sores.</p>
  <p><b>Treatment:</b> lifestyle changes, cilostazol, supervised exercise, angioplasty/bypass; ABI 1.0-1.4 normal.</p>
</div>

<div class="card" style="border-color:var(--purple)">

  <h3>🩸 PVD</h3>
  <p><b>Cause:</b> long-term arterial + venous vessel damage impairing oxygen/nutrient/waste exchange.</p>
  <p><b>Manifests:</b> rubor, pain with elevation/dependent positioning, poor cap refill, weak pulses, numbness/tingling.</p>
  <p><b>Treatment:</b> anticoagulants (heparin/warfarin with specific monitoring), compression, wound care.</p>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🩸 DVT</h3>
  <p><b>Cause:</b> Virchow's Triad — endothelial damage, venous stasis, hypercoagulability.</p>
  <p><b>Manifests:</b> often nonspecific — unilateral leg swelling, tenderness, warmth; can be clinically silent.</p>
  <p><b>Treatment:</b> heparin/warfarin, compression stockings, elevation, pain relievers.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🧬 Testicular Cancer</h3>
  <p><b>Cause:</b> malignant transformation of testicular tissue; most common in males 15-35.</p>
  <p><b>Manifests:</b> painless testicular lump, swelling, heaviness, dull ache.</p>
  <p><b>Treatment:</b> orchiectomy ± radiation; sperm harvesting offered pre-treatment. Highly treatable.</p>
</div>

<div class="card">
  <h3>🩺 PID</h3>
  <p><b>Cause:</b> infection ascending into uterus/fallopian tubes/ovaries, often from an untreated STI.</p>
  <p><b>Manifests:</b> pelvic pain, abnormal discharge, fever; risk of infertility/ectopic pregnancy if untreated.</p>
  <p><b>Treatment:</b> antibiotics targeting likely organisms; partner treatment; safe-sex education.</p>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🌡️ Menopause / Perimenopause</h3>
  <p><b>Cause:</b> declining ovarian estrogen production with age (or IMMEDIATE if both ovaries are surgically removed).</p>
  <p><b>Manifests:</b> hot flashes, night sweats, irregular-then-absent periods, vaginal dryness, joint aches, weight gain.</p>
  <p><b>Treatment:</b> lifestyle measures, HRT if not contraindicated (breast CA hx, clotting hx, HTN, smoking).</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👨 Benign Prostatic Hyperplasia (BPH)</h3>
  <p><b>Cause:</b> age-related prostate enlargement compressing the urethra.</p>
  <p><b>Manifests:</b> post-void dribbling, incomplete emptying, urinary frequency, nocturia.</p>
  <p><b>Treatment:</b> medications to shrink/relax the prostate, surgical options for severe cases.</p>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💊 Erectile Dysfunction (ED)</h3>
  <p><b>Cause:</b> multifactorial — psychosomatic, vascular (often an early sign of systemic vascular disease), hormonal.</p>
  <p><b>Manifests:</b> inability to achieve/maintain an erection sufficient for intercourse.</p>
  <p><b>Treatment:</b> PDE5 inhibitors (vasodilation mechanism — <b>NEVER with nitrates</b>, severe hypotension risk), psychological support, addressing underlying vascular/hormonal causes.</p>
</div>

<div class="card">
  <h3>👨 Phimosis</h3>
  <p><b>Cause:</b> inflammation/tightening of the foreskin, often from hygiene issues or improper retraction.</p>
  <p><b>Manifests:</b> inability to retract the foreskin normally; risk of paraphimosis if left retracted.</p>
  <p><b>Treatment:</b> proper hygiene/retraction technique — always return the foreskin to its original position after cleaning.</p>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🦠 STIs — quick reference</h3>
  <p><b>Reportable (mandatory):</b> gonorrhea, chlamydia, syphilis. <b>NOT reportable:</b> herpes.</p>
  <p><b>Herpes:</b> vesicles/ulcers, diagnosed by swab or blood test, no cure (antivirals manage outbreaks).</p>
  <p><b>Syphilis:</b> painless chancre → rash/flu-like → latent → tertiary (organ damage); curable if caught early with penicillin.</p>
  <p><b>Chlamydia:</b> often asymptomatic; thick white/yellow discharge, dysuria, abdominal pain.</p>
  <p><b>Gonorrhea:</b> white/yellow/green discharge.</p>
  <p><b>Trichomoniasis:</b> frothy yellow-green discharge; treated with metronidazole.</p>
  <p><b>Candidiasis:</b> white, cottage-cheese-like discharge (not technically an STI, but grouped with vaginal infections).</p>
</div>

<h2 class="sec-title"><span class="sec-emoji">🧩</span> Study Mode: Breaking Down a Question</h2>
<p class="intro-line">Same 5-step process from Unit 3 — before you can pick the right answer, you have to know what's actually being asked.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>🪜 The 5 steps, every time</h3>
  <ol style="padding-left:20px;line-height:1.9">
    <li><b>Read the STEM alone first</b> — cover the answer choices. What TYPE of question is this: assessment, priority, teaching, intervention, or evaluation?</li>
    <li><b>Circle the keyword.</b> FIRST, BEST, PRIORITY, MOST, INITIAL, EXCEPT, NOT, ONLY.</li>
    <li><b>Identify the framework.</b> ABC? Maslow's hierarchy? Nursing process (assessment before intervention)?</li>
    <li><b>Eliminate anything absolute or unsafe FIRST.</b></li>
    <li><b>Compare what's left against your OWN answer from step 1</b> — not against each other.</li>
  </ol>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🔍 Worked example — a vascular vignette that looks straightforward but isn't</h3>
  <p><b>Stem:</b> "A nurse assesses a lower extremity wound with well-defined, punched-out borders, a pale wound bed, and cool, hairless surrounding skin. What is the PRIORITY nursing consideration?"</p>
  <p><b>Step 1:</b> This is an assessment/pattern-recognition question — it wants you to correctly identify what TYPE of wound this is before anything else.</p>
  <p><b>Step 2 — keyword:</b> "PRIORITY" — signals there may be multiple reasonable-sounding actions, and you need the one that matters most given what this wound actually is.</p>
  <p><b>Step 3 — framework:</b> arterial vs. venous ulcer differentiation drives the entire care plan (arterial wounds should NOT be treated with compression/elevation the way venous wounds are — that would worsen arterial flow).</p>
  <p><b>Step 4 — eliminate the unsafe option:</b> any answer suggesting compression stockings or aggressive elevation is actually dangerous here, since this is an ARTERIAL ulcer pattern, not venous.</p>
  <p><b>Step 5 — match to your own answer:</b> recognizing this as arterial (not venous) changes everything downstream — that recognition IS the priority.</p>
  <div class="hy">⭐ Mixing up arterial and venous wound care isn't a minor error — treating an arterial ulcer like a venous one (compression, aggressive elevation) can worsen ischemia. This is exactly why the "why" behind the distinction matters more than memorizing two separate fact lists.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🔍 Worked example #2 — a keyword that flips the entire answer</h3>
  <p><b>Stem:</b> "All of the following are appropriate teaching points for a client on warfarin EXCEPT:" followed by four statements about diet, missed doses, INR monitoring, and bleeding precautions.</p>
  <p><b>Step 1:</b> This is a teaching/evaluation-of-understanding question — but phrased backwards from how these usually read.</p>
  <p><b>Step 2 — keyword:</b> "EXCEPT." This is the single most important word in the stem. Skip it, and you'll instinctively hunt for the BEST teaching point instead of the ONE THAT DOESN'T BELONG — the exact opposite of what's being asked.</p>
  <p><b>Step 3 — framework:</b> safe vs. unsafe medication teaching — three statements will be genuinely correct, and one will be the unsafe outlier you're actually looking for.</p>
  <p><b>Step 4 — eliminate the unsafe option (which here is actually the ANSWER):</b> a statement like "eliminate all vitamin K-containing foods" sounds cautious but is actually wrong — the real teaching is CONSISTENT intake, not elimination.</p>
  <p><b>Step 5 — match to your own answer:</b> because the keyword is EXCEPT, the "wrong-sounding" statement is the one to select. This is exactly where points get lost — not from lack of knowledge, but from answering as if the keyword wasn't there.</p>
  <div class="hy">⭐ Whenever you see NOT or EXCEPT, physically say "which one is the ODD ONE OUT" in your head before reading the options — it resets your brain to hunt for the wrong-fitting choice instead of the best-sounding one.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>⚠️ The most common ways students misread a question with this instructor</h3>
  <ul class="clean">
    <li><b>Missing the keyword</b> (NOT/EXCEPT/FIRST) and answering the opposite question.</li>
    <li><b>Reacting to a general impression instead of the specific data in the stem</b> — "this sounds serious, must be X" instead of actually matching the described findings to the correct condition.</li>
    <li><b>Confusing "what's abnormal" with "what's most urgent."</b> A stem can list several abnormal findings and one truly urgent one — the urgent one wins.</li>
    <li><b>Treating a drug fact in isolation</b> instead of connecting it back to the disease process it's being used for — this instructor consistently ties medications to WHY they matter for a specific condition, not just what they do.</li>
    <li><b>Forgetting what TYPE of question it is</b> — mixing up an assessment question (gather data) with an intervention question (take action).</li>
  </ul>
</div>

<div id="quiz-studymode"></div>
`;

   opts:['A. Take a double dose today to make up for the missed one','B. Take the missed dose as soon as remembered, but never double up','C. Skip the missed dose entirely and resume the regular schedule in 3 days','D. Discontinue the medication and contact the provider only if bleeding occurs'],correct:1,
   rat:'A risks dangerous over-anticoagulation, C leaves a gap in therapeutic coverage without reason, and D abandons a needed medication unnecessarily. The standard, safe guidance is to take the missed dose as soon as remembered without doubling up.'},

  {topic:'cardio',q:'A client with diabetes, hypertension, and early kidney disease is being evaluated for a new BP medication. Which class offers the MOST clinically synergistic benefit?',type:'single',
   opts:['A. Beta-blockers, for their unique renal-protective properties','B. ACE inhibitors or ARBs, offering both BP control and kidney protection','C. Thiazide diuretics exclusively, since they reverse kidney damage','D. Calcium channel blockers, which are contraindicated in this population'],correct:1,
   rat:'A invents a renal-protective property beta-blockers don\'t have, and C and D both misstate other classes\' effects. ACE inhibitors/ARBs offer the specific dual benefit of BP control plus kidney protection relevant to this exact combination of conditions.'},

  {topic:'cardio',q:'A client on a heparin infusion for DVT develops a sudden drop in platelet count from 220,000 to 90,000. Which nursing action is the PRIORITY?',type:'single',
   opts:['A. Continue the infusion at the same rate and recheck in 24 hours','B. Notify the provider promptly given the possibility of heparin-induced thrombocytopenia (HIT)','C. Increase the heparin rate to compensate','D. Administer a platelet transfusion immediately without further assessment'],correct:1,
   rat:'A delays action on a significant, sudden platelet drop, C is dangerous and backwards, and D jumps to an intervention before proper assessment/notification. A significant platelet drop during heparin therapy is the hallmark of HIT and requires prompt provider notification.'},

  {topic:'cardio',q:'A nurse assesses a lower extremity wound with irregular borders, a ruddy wound bed, and warm, discolored surrounding skin at the medial ankle. Which nursing action is MOST appropriate?',type:'single',
   opts:['A. Apply firm compression as tolerated and elevate the extremity, consistent with venous ulcer management','B. Avoid all compression and encourage the limb to remain in a dependent position','C. Apply a heating pad directly to the wound to promote healing','D. Restrict all fluid intake to reduce swelling'],correct:0,
   rat:'B, C, and D all either contradict appropriate venous ulcer care or introduce unrelated/harmful interventions. This wound pattern (irregular borders, ruddy bed, medial ankle) is classic venous, appropriately managed with compression and elevation.'},

  {topic:'cardio',q:'A client asks why her cardiologist ordered a BNP level when her chief complaint is shortness of breath and leg swelling, not chest pain. What is the BEST explanation?',type:'single',
   opts:['A. BNP is unrelated to these symptoms and was ordered in error','B. BNP rises with fluid retention and ventricular strain, making it useful for evaluating possible heart failure presenting this way','C. BNP is only used to diagnose acute MI','D. BNP measures cholesterol levels'],correct:1,
   rat:'A dismisses a clinically appropriate test, and C and D both misattribute BNP\'s actual purpose. Shortness of breath and leg swelling are classic heart failure symptoms, and BNP is specifically useful for that evaluation, not just MI or cholesterol assessment.'},

  {topic:'cardio',q:'A client with a history of tachyarrhythmias and known coronary artery disease asks why their provider is concerned about episodes of rapid heart rate specifically. What is the BEST explanation?',type:'single',
   opts:['A. Rapid heart rate has no relationship to coronary blood flow','B. Coronary arteries are perfused during diastole, and a faster rate shortens diastole, reducing the heart\'s own blood supply','C. Rapid heart rate only affects blood pressure, not coronary perfusion','D. This concern only applies to patients without coronary artery disease'],correct:1,
   rat:'A and C both deny the genuine physiological connection, and D reverses which patients are actually MORE at risk (those WITH CAD, not without). Coronary perfusion during diastole means tachycardia directly threatens the heart\'s own blood supply, especially with existing CAD.'},

  {topic:'repro',q:'A client asks why her provider recommends against combining her erectile dysfunction medication history (from her partner\'s perspective) with her own nitroglycerin prescription for angina. Which teaching point addresses this couple\'s situation?',type:'single',

   rat:'A dangerously assumes sharing medications isn\'t a real risk, and D denies the shared vasodilation mechanism entirely. The critical teaching point is that ANYONE combining these two drug classes — regardless of the relationship dynamic — faces the same severe hypotension risk.'},

  {topic:'repro',q:'A client is 3 hours post-hysterectomy with oophorectomy and reports needing to change her perineal pad every 20 minutes. Which nursing action is the PRIORITY?',type:'single',

   rat:'A, C, and D all treat a genuinely concerning finding as routine. Changing pads every 20 minutes (more than 2-3 times per hour) exceeds the specific threshold for concerning post-op bleeding, unrelated to which organs were removed.'},

  {topic:'repro',q:'A client with a family history of breast cancer asks about starting HRT for severe menopausal symptoms. Which nursing response reflects the MOST appropriate, individualized approach?',type:'single',

   rat:'A and D both dismiss a genuinely relevant risk factor, and C forecloses a decision that should be individualized with provider input. A history of breast cancer (including family history) is a factor that warrants a personalized risk-benefit discussion, not an automatic yes or no.'},

  {topic:'repro',q:'A client with untreated chlamydia later develops pelvic pain, abnormal discharge, and fever. Which condition should the nurse suspect as a possible complication?',type:'single',

  {topic:'repro',q:'A client asks why her provider mentioned both her oral contraceptive history and her smoking status together when discussing her risk profile. What is the connection?',type:'single',

  {topic:'cardio',q:'A client with hypertension, hyperlipidemia, and a 30-pack-year smoking history reports new intermittent claudication. Which single lifestyle change would the nurse identify as MOST impactful across ALL three underlying conditions?',type:'single',

   rat:'A dismisses a validated biomarker, and D fabricates a timeline that doesn\'t reflect troponin\'s actual kinetics. Serial troponin trending helps confirm the presence, timing, and severity of myocardial injury — a standard part of the diagnostic workup.'},

  {topic:'cardio',q:'A client with chronic kidney disease and hypertension is started on an ACE inhibitor. Two weeks later, potassium is 5.6 mEq/L. Which nursing action is MOST appropriate?',type:'single',

  {topic:'cardio',q:'A client with a diagnosed venous ulcer at the medial ankle asks why her wound care plan differs so much from her neighbor\'s arterial ulcer treatment. What is the key underlying reason?',type:'single',
   opts:['A. There is no real difference in treatment between the two wound types','B. The underlying mechanism differs (impaired venous return vs. impaired arterial supply), so interventions like compression are appropriate for one but potentially harmful for the other','C. Wound location determines treatment, not the underlying vascular mechanism','D. Both wound types require identical compression therapy'],correct:1,
   rat:'A and D both flatten a real and clinically important distinction, and C misattributes the deciding factor to location rather than mechanism. Venous disease benefits from compression (aiding return against pooling), while significant arterial insufficiency can be worsened by compression (further restricting already-limited flow) — the mechanism, not the location alone, drives the treatment difference.'},

  {topic:'cardio',q:'A client recovering from an MI is being discharged on a beta-blocker, a statin, and an antiplatelet. The client asks why so many different medications are needed. What is the BEST nursing response?',type:'single',
   opts:['A. "Only one of these medications is actually necessary."','B. "Each medication targets a different part of preventing another cardiac event — rate/oxygen demand, cholesterol, and clot prevention, working together."','C. "These medications all do the same thing as a backup in case one fails."','D. "This combination is only used to manage side effects of a single primary medication."'],correct:1,
   rat:'A dismisses genuinely necessary therapy, and C and D both misrepresent the medications as redundant rather than complementary. Each class targets a distinct mechanism relevant to preventing another cardiac event — together, not redundantly.'},

  {topic:'repro',q:'A client using combined oral contraceptives reports new-onset severe leg swelling and pain. Which underlying risk factor should the nurse recognize as MOST relevant to this presentation?',type:'single',

   rat:'B dangerously dismisses a potential DVT, and C and D both offer plausible-sounding but incorrect alternative explanations. New severe leg swelling and pain in someone on estrogen-containing contraceptives should raise concern for a clotting event given the known increased clotting risk.'},

  {topic:'repro',q:'A client with a history of both hypertension and prior DVT asks her provider about starting oral contraceptives. Which of the following BEST reflects the appropriate clinical reasoning?',type:'single',
   opts:['A. Both conditions are complete non-issues for contraceptive selection','B. Both hypertension and prior DVT are recognized contraindications, warranting consideration of alternative contraceptive methods','C. Only the DVT history matters; hypertension is irrelevant','D. Oral contraceptives are recommended specifically because of these two conditions'],correct:1,
   rat:'A and D both dangerously dismiss or reverse genuine contraindications, and C arbitrarily excludes one of the two relevant risk factors. Both hypertension and prior DVT are individually recognized contraindications to oral contraceptives, making alternative methods worth discussing.'},

  {topic:'repro',q:'A client with BPH also has hypertension controlled with an alpha-blocker (used off-label in some regimens) and reports dizziness upon standing. What is the MOST likely explanation?',type:'single',
   opts:['A. Alpha-blockers have no effect on blood pressure or orthostatic symptoms','B. Alpha-blockers can cause vasodilation and contribute to orthostatic hypotension, especially when combined with other BP-lowering effects','C. This symptom is entirely unrelated to any medication','D. Dizziness upon standing is always a sign of a stroke'],correct:1,
   rat:'A denies a genuine medication effect, and C and D both misdirect the explanation away from the medication or toward an unsupported severe conclusion. Alpha-blockers can cause vasodilation contributing to orthostatic symptoms, which is a recognized and relevant side effect to assess for.'},

  {topic:'repro',q:'A client is diagnosed with primary syphilis. The nurse understands that if untreated, the infection could progress through which sequence?',type:'single',
   opts:['A. Secondary → Latent → Tertiary, with worsening potential complications over time','B. Tertiary → Secondary → Latent, in reverse order','C. The infection always resolves spontaneously after the primary stage','D. Primary syphilis has no further stages if untreated'],correct:0,
   rat:'B reverses the actual progression, and C and D both incorrectly suggest the infection resolves or stops without treatment. Untreated syphilis can progress from primary through secondary, latent, and ultimately tertiary stages, with increasingly serious potential complications.'},

  {topic:'repro',q:'A client asks why her provider ordered both a chlamydia test and a gonorrhea test together, even though she has no symptoms. What is the BEST explanation?',type:'single',
   opts:['A. Both infections can be asymptomatic, and co-testing helps catch infections that might otherwise go undetected and progress to complications like PID','B. Testing for both simultaneously is done only to increase cost','C. These two infections are never found together, so testing both is unnecessary','D. Symptoms are always required before any STI testing is appropriate'],correct:0,
   rat:'C incorrectly assumes mutual exclusivity, and D denies the value of routine or risk-based screening without symptoms. Both infections can be asymptomatic, and co-testing helps catch infections before they progress to complications like PID.'},

  {topic:'cardio',q:'A client presents with a CVP of 8 mmHg and reports dyspnea. Labs show an elevated BNP. How should the nurse synthesize these three findings?',type:'single',
   opts:['A. These are three unrelated findings that happen to occur together by coincidence','B. All three findings point to the same underlying process — right-sided volume overload significant enough to also cause pulmonary symptoms and ventricular strain, consistent with heart failure','C. The CVP and BNP are contradictory findings that cannot both be accurate','D. Dyspnea in this context is unrelated to cardiac status and reflects a primary respiratory problem only'],correct:1,
   rat:'A treats connected findings as coincidental, C claims a contradiction where none exists, and D ignores the well-established cardiac connection to this symptom pattern. A CVP above the 2-6 mmHg normal range (8 mmHg) reflects right-sided volume overload; that same overload stretches cardiac chambers (driving BNP up) and can back up enough to cause dyspnea — three findings from one process, not three separate problems.'},

   rat:'A dangerously understates the significance of this change, and C and D both misread the clinical meaning of rest pain entirely. Once even resting oxygen demand can\'t be met, tissue is at direct risk of necrosis — this is why critical limb ischemia is treated as a limb-threatening emergency, not just "worse claudication."'}

let flashMastered=new Set();
(function restoreFlash(){ try{ const r=localStorage.getItem('nur256u4_flashmastered'); if(r) JSON.parse(r).forEach(i=>flashMastered.add(i)); }catch(e){} })();

function renderDrillQ(){

  const qRaw=drillList[drillIdx];

  }

  `;
}
function answerDrill(i){
  if(drillAnswered)return; drillAnswered=true;
  const q=drillList[drillIdx];
  const btns=document.querySelectorAll('#drillBody .opt');
  btns.forEach(b=>b.classList.add('disabled'));

  else{ btns[i].classList.add('wrong'); btns[q.c].classList.add('correct'); drillStreak=0; }

  bumpProgress('drill-'+drillIdx);

}
