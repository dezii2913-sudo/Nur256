      const order=shuffleAnswers?shuffle(base.steps.map((_,i)=>i)):base.steps.map((_,i)=>i);
      examShuffleMap[qi]=order;
    }
    const order=examShuffleMap[qi];
    const steps=order.map(i=>base.steps[i]);
    return {q:base.q, r:base.r, t:'order', steps, displayOrder:order};
  }
  if(!examShuffleMap[qi]){
    const order=shuffleAnswers?shuffle(base.o.map((_,i)=>i)):base.o.map((_,i)=>i);
    examShuffleMap[qi]=order;
  }
  const order=examShuffleMap[qi];
  const opts=relabel(order.map(i=>base.o[i]));
  let correct;
  if(base.t==='multi'){
    const cset=new Set(base.c);
    correct=order.map((origIdx,newIdx)=>cset.has(origIdx)?newIdx:null).filter(x=>x!==null);
  } else {
    correct=order.indexOf(base.c);
  }
  return {q:base.q, r:base.r, t:base.t, o:opts, c:correct};
}
function saveExam(){ try{ localStorage.setItem('nur256u4_exam', JSON.stringify({mode:examMode,set:quizSet,state:examState,checked:examChecked,idx:examIdx,submitted:examSubmitted,shuffle:examShuffleMap})); }catch(e){} }
function loadExam(){ try{ const r=localStorage.getItem('nur256u4_exam'); return r?JSON.parse(r):null; }catch(e){ return null; } }
function shuffleArr(a){return shuffle(a);}
let examQuestionCount='50'; // '25' | '50' | 'all'
(function restoreExamCount(){ try{ const r=localStorage.getItem('nur256u4_examcount'); if(r) examQuestionCount=r; }catch(e){} })();
function setExamQuestionCount(n){
  examQuestionCount=n;
  try{ localStorage.setItem('nur256u4_examcount', n); }catch(e){}
  examIdx=0; examChecked={}; examState={}; examShuffleMap={};
  document.getElementById('examResult').innerHTML='';
  buildQuizSet(examMode); updateExamCountButtons(); saveExam(); drawExamQ();
}
function updateExamCountButtons(){
  document.querySelectorAll('.exam-count-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.count===examQuestionCount);
  });
}
function buildQuizSet(m){
  let all=EXAM.map((_,i)=>i);
  if(topicFilterMode!=='all') all=all.filter(i=>EXAM[i].topic===topicFilterMode);
  const shuffled = (m==='test') ? shuffleArr(all) : all;
  if(examQuestionCount==='all'){
    quizSet = shuffled;
  } else {
    const n=parseInt(examQuestionCount,10);
    quizSet = shuffled.slice(0, Math.min(n, shuffled.length));
  }
}
function applyModeUI(m){
  const sb=document.getElementById('modeStudyBtn'), tb=document.getElementById('modeTestBtn');
  sb.classList.toggle('active',m==='study'); tb.classList.toggle('active',m==='test');
  const tip=document.getElementById('examModeTip'); const submitWrap=document.getElementById('submitWrap');
  const countLabel = examQuestionCount==='all' ? 'all matching' : examQuestionCount;
  if(m==='study'){
    tip.innerHTML='📖 <b>Study Mode:</b> '+countLabel+' question(s) in order. Tap an answer to instantly see right/wrong + rationale. SATA/Match/Order use Check. Progress saves automatically.';
    submitWrap.style.display='none';
  } else {
    tip.innerHTML='📝 <b>Test Mode:</b> <b>'+countLabel+' random question(s), scrambled</b> — like the real exam. No feedback until you submit.';
    submitWrap.style.display='block';
  }
}
function setExamMode(m){
  examMode=m; examChecked={}; examState={}; examIdx=0; examSubmitted=false; examShuffleMap={};
  document.getElementById('examResult').innerHTML='';
  buildQuizSet(m); applyModeUI(m); saveExam(); drawExamQ();
}
function isExamCorrect(q, ans){
  if(q.t==='multi') return arrEq(ans,q.c);
  if(q.t==='match') return q.items.every((_,i)=>ans && ans[i]!==undefined && q.defOrder[ans[i]]===i);
  if(q.t==='order') return ans && ans.length===q.steps.length && ans.every((v,i)=>v===i);
  return ans===q.c;
}
function isExamAnswered(qi){
  const ans=examState[qi];
  if(ans===undefined)return false;
  if(Array.isArray(ans))return ans.length>0 && !ans.includes(undefined);
  return true;
}
function drawExamQ(){
  if(!quizSet.length)buildQuizSet(examMode);
  const qi=quizSet[examIdx]; const q=getExamQ(qi);
  const body=document.getElementById('examBody');
  if(q.t==='match'){ drawExamMatchQ(qi,q,body); drawDots(); return; }
  if(q.t==='order'){ drawExamOrderQ(qi,q,body); drawDots(); return; }
  const typeLabel=q.t==='multi'?'Select All That Apply':'Multiple Choice';
  const checked = examMode==='study' && examChecked[qi];
  let html=`<div class="exam-q"><div><span class="qnum">QUESTION ${examIdx+1} of ${quizSet.length}</span><span class="qtype">${typeLabel}</span></div><div class="qtext">${q.q}</div>`;
  q.o.forEach((opt,i)=>{
    let cls='opt'; const cur=examState[qi];
    const isSel = q.t==='multi' ? (cur&&cur.includes(i)) : (cur===i);
    if(isSel)cls+=' sel-multi';
    if(checked){ const isCorrectOpt = q.t==='multi'?q.c.includes(i):q.c===i; if(isCorrectOpt)cls+=' correct'; else if(isSel)cls+=' wrong'; }
    html+=`<button class="${cls}" ${checked?'disabled':''} onclick="examPick(${i})">${opt}</button>`;
  });
  html+=`</div>`;
  if(examMode==='study'){
    if(q.t==='multi' && !checked){ html+=`<div class="center"><button class="btn" onclick="checkExamQ()" style="background:linear-gradient(90deg,var(--teal),var(--green))">✓ Check Answer</button></div>`; }
    if(checked){
      const ans=examState[qi]; const isCorrect = q.t==='multi'?arrEq(ans,q.c):ans===q.c;
      const correctTxt = q.t==='multi'?q.c.map(x=>String.fromCharCode(65+x)).sort().join(', '):String.fromCharCode(65+q.c);
      html+=`<div class="rationale show" style="border-color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'✅ <b>Correct!</b>':'❌ <b>Not quite.</b> Correct: <b>'+correctTxt+'</b>'}<br><b>Rationale:</b> ${q.r}</div>`;
    }
  }
  body.innerHTML=html; drawDots();
}
function drawExamMatchQ(qi,q,body){
  const checked = examMode==='study' && examChecked[qi];
  const cur = examState[qi] || [];
  let html=`<div class="exam-q"><div><span class="qnum">QUESTION ${examIdx+1} of ${quizSet.length}</span><span class="qtype">Dropdown Match</span></div><div class="qtext">${q.q}</div>`;
  q.items.forEach((item,itemIdx)=>{
    const selectedPos = cur[itemIdx];
    let rowCls='dm-row';
    if(checked){
      const isCorrect = selectedPos!==undefined && q.defOrder[selectedPos]===itemIdx;
      rowCls += isCorrect ? ' dm-correct' : ' dm-wrong';
    }
    html+=`<div class="${rowCls}"><div class="dm-term">${item.term}</div><select class="dm-select" ${checked?'disabled':''} onchange="examMatchPick(${itemIdx}, this.value)">`;
    html+=`<option value="" ${selectedPos===undefined?'selected':''}>— choose a definition —</option>`;
    q.defs.forEach((d,pos)=>{ html+=`<option value="${pos}" ${selectedPos===pos?'selected':''}>${d}</option>`; });
    html+=`</select></div>`;
  });
  html+=`</div>`;
  if(examMode==='study'){
    const allAnswered = q.items.every((_,i)=>cur[i]!==undefined);
    if(!checked){ html+=`<div class="center"><button class="btn" onclick="checkExamMatch()" style="background:linear-gradient(90deg,var(--teal),var(--green))" ${allAnswered?'':'disabled'}>✓ Check Answers</button></div>`; }
    if(checked){
      const isCorrect = q.items.every((_,i)=>cur[i]!==undefined && q.defOrder[cur[i]]===i);
      html+=`<div class="rationale show" style="border-color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'✅ <b>All correct!</b>':'❌ <b>Some matches were off</b> — check the highlighted rows above.'}<br><b>Rationale:</b> ${q.r}</div>`;
    }
  }
  body.innerHTML=html;
}
function examMatchPick(itemIdx, val){
  const qi=quizSet[examIdx];
  if(examMode==='study' && examChecked[qi])return;
  if(!examState[qi])examState[qi]=[];
  examState[qi][itemIdx] = val===''? undefined : parseInt(val,10);
  saveExam(); drawExamQ();
}
function addExamWrongToVault(qi, q){
  const id='examvault-'+qi, source='Exam';
  if(q.t==='single'){ addToVault({id, source, type:'single', q:q.q, opts:q.o, correct:q.c, rat:q.r}); }
  else if(q.t==='multi'){ addToVault({id, source, type:'multi', q:q.q, opts:q.o, correct:q.c, rat:q.r}); }
  else if(q.t==='match'){ addToVault({id, source, type:'match', q:q.q, items:q.items, defs:q.defs, defOrder:q.defOrder, rat:q.r}); }
  else if(q.t==='order'){ addToVault({id, source, type:'order', q:q.q, steps:q.steps, displayOrder:q.displayOrder, rat:q.r}); }
}
function checkExamMatch(){
  const qi=quizSet[examIdx];
  examChecked[qi]=true; bumpProgress('exam-'+qi);
  const q=getExamQ(qi); const ans=examState[qi];
  if(!isExamCorrect(q, ans)) addExamWrongToVault(qi, q);
  drawExamQ(); saveExam();
}
function drawExamOrderQ(qi,q,body){
  const checked = examMode==='study' && examChecked[qi];
  const cur = examState[qi] || [];
  let html=`<div class="exam-q"><div><span class="qnum">QUESTION ${examIdx+1} of ${quizSet.length}</span><span class="qtype">Ordered Response (Drag &amp; Drop style)</span></div><div class="qtext">${q.q}</div>`;
  html+=`<p style="font-size:.82rem;color:var(--muted);margin:4px 0 10px">Tap each step below in the correct order — it will move into your answer list.</p>`;
  html+=`<div class="order-answer" id="orderAnswerList">`;
  cur.forEach((origIdx,pos)=>{
    let itemCls='order-answer-item';
    if(checked){ itemCls += origIdx===pos ? ' order-correct' : ' order-wrong'; }
    html+=`<div class="${itemCls}"><span class="num">${pos+1}</span><span>${q.steps[q.displayOrder.indexOf(origIdx)]}</span></div>`;
  });
  html+=`</div>`;
  if(!checked){
    html+=`<div class="order-pool">`;
    q.steps.forEach((step,displayPos)=>{
      const origIdx=q.displayOrder[displayPos];
      const used = cur.includes(origIdx);
      html+=`<button class="order-chip" ${used?'disabled':''} onclick="examOrderPick(${origIdx})">${step}</button>`;
    });
    html+=`</div>`;
    html+=`<div class="center" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">`;
    html+=`<button class="btn ghost" onclick="examOrderUndo()">↺ Undo Last</button>`;
    if(examMode==='study' && cur.length===q.steps.length){ html+=`<button class="btn" onclick="checkExamOrder()" style="background:linear-gradient(90deg,var(--teal),var(--green))">✓ Check Order</button>`; }
    html+=`</div>`;
  }
  html+=`</div>`;
  if(examMode==='study' && checked){
    const isCorrect = cur.length===q.steps.length && cur.every((v,i)=>v===i);
    html+=`<div class="rationale show" style="border-color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'✅ <b>Correct order!</b>':'❌ <b>Not quite the right order</b> — see highlighted steps above.'}<br><b>Rationale:</b> ${q.r}</div>`;
  }
  body.innerHTML=html;
}
function examOrderPick(origIdx){
  const qi=quizSet[examIdx];
  if(examMode==='study' && examChecked[qi])return;
  if(!examState[qi])examState[qi]=[];
  if(!examState[qi].includes(origIdx)) examState[qi].push(origIdx);
  saveExam(); drawExamQ();
}
function examOrderUndo(){
  const qi=quizSet[examIdx];
  if(examMode==='study' && examChecked[qi])return;
  if(examState[qi] && examState[qi].length){ examState[qi].pop(); saveExam(); drawExamQ(); }
}
function checkExamOrder(){
  const qi=quizSet[examIdx];
  examChecked[qi]=true; bumpProgress('exam-'+qi);
  const q=getExamQ(qi); const ans=examState[qi];
  if(!isExamCorrect(q, ans)) addExamWrongToVault(qi, q);
  drawExamQ(); saveExam();
}
function drawDots(){
  const d=document.getElementById('examDots'); d.innerHTML='';
  quizSet.forEach((qi,pos)=>{
    const dot=document.createElement('div'); dot.className='dot';
    const answered = isExamAnswered(qi);
    if(examMode==='study'){ if(examChecked[qi]){ const eq=getExamQ(qi); dot.classList.add(isExamCorrect(eq,examState[qi])?'dot-correct':'dot-wrong'); } }
    else { if(answered)dot.classList.add('answered'); }
    if(pos===examIdx)dot.classList.add('current');
    dot.onclick=()=>{examIdx=pos;drawExamQ();saveExam();};
    d.appendChild(dot);
  });
}
function examPick(i){
  const qi=quizSet[examIdx]; const q=getExamQ(qi);
  if(examMode==='study' && examChecked[qi]) return;
  if(q.t==='multi'){
    if(!examState[qi])examState[qi]=[]; const arr=examState[qi]; const idx=arr.indexOf(i);
    if(idx>-1)arr.splice(idx,1); else arr.push(i); drawExamQ();
  } else {
    examState[qi]=i;
    if(examMode==='study'){
      examChecked[qi]=true; bumpProgress('exam-'+qi);
      if(i!==q.c) addExamWrongToVault(qi, q);
    }
    drawExamQ();
  }
  saveExam();
}
function checkExamQ(){
  const qi=quizSet[examIdx]; const ans=examState[qi];
  if(ans===undefined||(Array.isArray(ans)&&ans.length===0))return;
  examChecked[qi]=true; bumpProgress('exam-'+qi);
  const q=getExamQ(qi);
  if(!isExamCorrect(q, ans)) addExamWrongToVault(qi, q);
  drawExamQ(); saveExam();
}
function examNext(){ if(examIdx<quizSet.length-1){examIdx++;drawExamQ();saveExam();window.scrollTo({top:0,behavior:'smooth'});} }
function examPrev(){ if(examIdx>0){examIdx--;drawExamQ();saveExam();window.scrollTo({top:0,behavior:'smooth'});} }
function arrEq(a,b){if(!a||!b)return false;a=[...a].sort();b=[...b].sort();return a.length===b.length&&a.every((v,i)=>v===b[i]);}
function examAnswerSummary(q, ans){
  if(ans===undefined||(Array.isArray(ans)&&ans.length===0))return {your:'(no answer)', correct:'—'};
  if(q.t==='multi') return {your:ans.map(x=>String.fromCharCode(65+x)).sort().join(', '), correct:q.c.map(x=>String.fromCharCode(65+x)).sort().join(', ')};
  if(q.t==='match') return {your:q.items.map((it,i)=>it.term+'→'+(ans[i]!==undefined?q.defs[ans[i]]:'(blank)')).join('; '), correct:q.items.map(it=>it.term+'→'+it.def).join('; ')};
  if(q.t==='order'){
    const yourTxt = ans.map(origIdx=>q.steps[q.displayOrder.indexOf(origIdx)]).join(' → ');
    const correctTxt = q.steps.map((_,i)=>q.steps[q.displayOrder.indexOf(i)]).join(' → ');
    return {your:yourTxt, correct:correctTxt};
  }
  return {your:String.fromCharCode(65+ans), correct:String.fromCharCode(65+q.c)};
}
function submitExam(){
  let correct=0;
  quizSet.forEach(qi=>{ const q=getExamQ(qi); if(isExamCorrect(q, examState[qi])){correct++;} else { addExamWrongToVault(qi, q); } });
  const total=quizSet.length; const pct=Math.round(correct/total*100);
  examSubmitted=true; saveExam();
  let msg = pct>=85?'🌟 Outstanding — exam-ready!':pct>=75?'✅ Passing! Polish the misses.':pct>=60?'💪 Getting there — review and retake.':'📚 Keep grinding — revisit the sections.';
  let html=`<div class="quiz-score">You scored ${correct} / ${total} (${pct}%)<br>${msg}</div><h3 style="color:var(--pink)">📖 Full Review</h3>`;
  quizSet.forEach((qi,pos)=>{
    const q=getExamQ(qi); const ans=examState[qi]; const isCorrect=isExamCorrect(q,ans);
    const sum=examAnswerSummary(q,ans);
    html+=`<div class="exam-q" style="border-color:${isCorrect?'var(--green)':'var(--red)'}"><div class="qnum">Q${pos+1} ${isCorrect?'✅':'❌'}</div><div class="qtext" style="font-size:.92rem">${q.q}</div><div style="font-size:.85rem"><b>Your answer:</b> ${sum.your} &nbsp;|&nbsp; <b>Correct:</b> ${sum.correct}</div><div class="rationale show" style="margin-top:8px"><b>Rationale:</b> ${q.r}</div></div>`;
  });
  html+=`<div class="center"><button class="btn" onclick="resetExam()">🔄 New Test (fresh set)</button></div>`;
  document.getElementById('examResult').innerHTML=html;
  const _er=document.getElementById('examResult'); if(_er.scrollIntoView)_er.scrollIntoView({behavior:'smooth'});
}
function resetExam(){ examState={}; examIdx=0; examSubmitted=false; examChecked={}; examShuffleMap={}; document.getElementById('examResult').innerHTML=''; buildQuizSet(examMode); saveExam(); drawExamQ(); window.scrollTo({top:0,behavior:'smooth'}); }
function renderExam(){
  document.getElementById('sec-exam').innerHTML=`
  <h2 class="sec-title"><span class="sec-emoji">📝</span> Practice Exam</h2>
  <p class="intro-line">Study Mode = instant feedback as you go. Test Mode = scrambled, no feedback until submit — like the real thing. Pick how many questions and which topics.</p>
  <div class="exam-mode-toggle">
    <button class="mode-btn" id="modeStudyBtn" onclick="setExamMode('study')">📖 Study Mode</button>
    <button class="mode-btn" id="modeTestBtn" onclick="setExamMode('test')">📝 Test Mode</button>
  </div>
  <div class="exam-mode-toggle">
    <button class="mode-btn exam-count-btn" data-count="25" onclick="setExamQuestionCount('25')">25 Questions</button>
    <button class="mode-btn exam-count-btn" data-count="50" onclick="setExamQuestionCount('50')">50 Questions</button>
    <button class="mode-btn exam-count-btn" data-count="all" onclick="setExamQuestionCount('all')">All Questions</button>
  </div>
  <div class="center" style="margin:8px 0"><button class="btn topic-filter-btn" onclick="cycleExamTopicFilter()" style="background:var(--purple)">🎯 All Topics</button></div>
  <div class="tipbar" id="examModeTip"></div>
  <div id="examDots"></div>
  <div id="examBody"></div>
  <div class="exam-nav">
    <button class="btn" style="background:var(--card-border);color:var(--ink)" onclick="examPrev()">⬅ Prev</button>
    <button class="btn" style="background:var(--teal)" onclick="examNext()">Next ➡</button>
  </div>
  <div id="submitWrap" style="display:none" class="center"><button class="btn" style="background:linear-gradient(90deg,var(--pink),var(--purple))" onclick="submitExam()">🏁 Submit Test</button></div>
  <div id="examResult"></div>
  `;
  const saved=loadExam();
  if(saved && saved.set && saved.set.length){
    examMode=saved.mode||'study'; quizSet=saved.set; examState=saved.state||{}; examChecked=saved.checked||{}; examIdx=saved.idx||0; examSubmitted=saved.submitted||false; examShuffleMap=saved.shuffle||{};
    applyModeUI(examMode); drawExamQ();
  } else { setExamMode(examMode); }
  updateExamCountButtons();
  updateTopicFilterButtons();
}
renderExam();
</script>
