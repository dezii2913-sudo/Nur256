<script>
document.getElementById('sec-dka').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🚨</span> DKA vs HHS</h2>
<p class="intro-line">Casteel loves comparing these two. Both = hyperglycemia + dehydration. The difference is the ACID. Know it cold.</p>

<div class="card" style="border-color:var(--red)">
  <h3>⚖️ Side by side</h3>
  <table class="lab">
    <tr><th></th><th>DKA</th><th>HHS</th></tr>
    <tr><td><b>Who</b></td><td>Type 1 (no insulin)</td><td>Type 2 (some insulin)</td></tr>
    <tr><td><b>Glucose</b></td><td>>250 mg/dL</td><td>Very high, often >600</td></tr>
    <tr><td><b>Ketones/acid</b></td><td><b>YES</b> — ketoacidosis, low pH</td><td><b>NO</b> (or minimal) — no acidosis</td></tr>
    <tr><td><b>Breathing</b></td><td><b>Kussmaul</b> (deep, rapid) + fruity breath</td><td>Normal breathing</td></tr>
    <tr><td><b>Onset</b></td><td>Rapid (hours–day)</td><td>Slow (days)</td></tr>
    <tr><td><b>Mental status</b></td><td>Alert → lethargic</td><td>More altered (profound dehydration) — seizures, coma</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"DKA has the Acid & Ketones. HHS is Hyperosmolar (super dehydrated) without the acid."</div></div>
</div>

<div class="card">
  <h3>🔧 Treatment — same 3 goals, same order</h3>
  <p>Both DKA and HHS are treated by fixing three things, roughly in this order:</p>
  <ul class="clean">
    <li><b>1. Fluids FIRST</b> — 0.9% NS (isotonic) to rehydrate; switch to 0.45% NS later. They are profoundly dehydrated.</li>
    <li><b>2. Insulin</b> — IV regular insulin drip to bring glucose down (and in DKA, to stop ketone production).</li>
    <li><b>3. Potassium</b> — watch and replace K⁺ closely (see below).</li>
    <li>When glucose reaches ~250–300, <b>add dextrose (D5W)</b> to the fluids so glucose doesn't crash while insulin keeps running to clear ketones.</li>
  </ul>
  <div class="hy">⭐ <b>Fluids come before insulin.</b> If you give insulin to a severely dehydrated patient first, you can drop their blood pressure and shift fluid dangerously. Rehydrate, then bring the sugar down.</div>
  <div class="hy">⭐ <b>Why we DON'T drop glucose too fast:</b> the brain adapts to a hyperosmolar (very concentrated) blood environment during prolonged hyperglycemia. If glucose/osmolality is corrected too quickly, water shifts rapidly into brain cells and can cause <b>cerebral edema</b> — a real, feared complication. This is exactly why dextrose is added once glucose nears ~250–300 (so insulin can keep clearing ketones/lowering glucose slowly and safely) rather than letting the glucose crash all at once.</div>
</div>

<div class="card" style="border-color:var(--amber)">

  <h3>⚡ The potassium trap (classic exam question)</h3>
  <p class="why-chain">In DKA, acidosis pushes K⁺ OUT of cells → <b>serum K⁺ looks HIGH or normal at first</b>, but total body potassium is actually LOW. When you give insulin, K⁺ moves back INTO cells → serum K⁺ <b>drops fast</b> and can become dangerously low.</p>
  <ul class="clean">
    <li>Monitor K⁺ frequently and get ECGs.</li>
    <li>Replace potassium as it falls — <b>but hold K⁺ if the patient isn't urinating</b> (no kidney output = K⁺ can build to dangerous levels) or if K⁺ is high.</li>
    <li><b>Avoid bicarbonate</b> in DKA — it can drop potassium suddenly.</li>
  </ul>
</div>

<div class="card">
  <h3>🛡️ Preventing DKA — sick day rules</h3>
  <p class="why-chain"><b>Why illness raises glucose even without eating:</b> stress/illness triggers cortisol and adrenaline (fight-or-flight) — and cortisol is a steroid that stimulates insulin release AND raises blood glucose on its own. Fasting and high-fat intake do the opposite (they inhibit insulin release). This is why a sick patient's sugar climbs even when they haven't eaten a thing.</p>
  <ul class="clean">
    <li><b>NEVER stop insulin during illness</b> — even if not eating (illness raises glucose). This is the #1 cause of DKA.</li>
    <li>Check glucose and ketones every 3–4 hours.</li>
    <li>Sip fluids hourly to prevent dehydration; take small carb portions.</li>
    <li>Call the provider if unable to keep fluids down or glucose/ketones stay high.</li>
  </ul>
  <div class="hy">⭐ Same logic applies in the hospital: surgery and acute illness are physical stressors → cortisol rises → glucose rises. This is why hospitalized diabetics often need MORE frequent monitoring, not less, even when NPO.</div>
</div>

<div id="quiz-dka"></div>
`;

renderQuiz('quiz-dka',[
  {q:'A patient arrives in the ED with glucose 640 mg/dL, serum osmolality 335 mOsm/kg, arterial pH 7.34, negative serum ketones, and profound lethargy. The family reports 3 days of poor oral intake due to a GI illness. Which condition does this presentation represent?',type:'single',
   opts:['A. DKA, based on the severity of the hyperglycemia alone','B. HHS — the near-normal pH and absent ketones despite extreme hyperglycemia are the defining features, not the glucose number itself','C. Mild hypoglycemia with a false elevated glucose reading','D. A normal stress response to dehydration requiring no specific intervention'],correct:1,
   rat:'The trap: A assumes glucose severity alone determines the diagnosis, but the deciding factors are pH and ketones — both are normal/absent here, ruling out DKA regardless of how high the glucose is. This is the hallmark HHS pattern: enough residual insulin to prevent ketosis, but not enough to control glucose.'},

  {q:'A patient with DKA has the following orders: IV 0.9% NS, an IV regular insulin drip, and potassium replacement once levels are confirmed. The initial serum potassium result is 5.5 mEq/L. What should the nurse do FIRST?',type:'single',
   opts:['A. Withhold all treatment and request a repeat potassium level before proceeding, since 5.5 is elevated','B. Begin the IV insulin drip immediately, since lowering the glucose takes priority over fluid status','C. Begin the IV fluids first to address the profound dehydration, understanding that potassium will likely need to be added once insulin starts and the level begins to fall','D. Administer the ordered potassium replacement now, since the level of 5.5 confirms the patient needs supplementation'],correct:2,
   rat:'The trap: D is tempting because 5.5 looks elevated and "needing supplementation" seems logical, but that number reflects acidosis pushing K⁺ OUT of cells — total body K⁺ is actually depleted. Giving potassium now, before insulin even starts, risks dangerous hyperkalemia. Fluids come first; insulin follows; potassium is added once the level starts dropping as expected.'},

  {q:'A nurse is comparing two diabetic patients, both with glucose readings above 500 mg/dL. Which single finding BEST distinguishes a DKA presentation from an HHS presentation?',type:'single',
   opts:['A. The degree of hyperglycemia, since DKA always produces a higher glucose than HHS','B. The presence of severe dehydration, since this only occurs in DKA','C. Kussmaul respirations and a fruity breath odor from ketoacidosis, which are absent in HHS','D. The patient\'s reported thirst level, since HHS patients are typically not thirsty'],correct:2,
   rat:'The trap: A reverses the actual relationship (HHS often has the HIGHER glucose of the two), B assigns dehydration exclusively to DKA when both conditions cause it, and D invents a symptom difference that doesn\'t exist. The true distinguishing feature is the acid: only DKA produces ketoacidosis with Kussmaul breathing and fruity breath.'},

  {q:'A Type 1 diabetic calls the clinic and reports vomiting for the past 8 hours, unable to eat, and states "I stopped taking my insulin since I\'m not eating anything." Which response from the nurse is BEST?',type:'single',
   opts:['A. "That\'s the correct approach — insulin should be held whenever oral intake is reduced."','B. "You should resume your insulin, check your glucose and ketones frequently, and come in if you can\'t keep fluids down — illness raises glucose independent of eating."','C. "Take only half your usual dose until you\'re able to eat normally again."','D. "Stop checking your blood glucose until the vomiting resolves, to avoid unnecessary finger sticks."'],correct:1,
   rat:'The trap: A validates a dangerous but common misconception, and C offers an unsupported "compromise" dose with no clinical basis. The physiology doesn\'t care whether the patient is eating — illness triggers cortisol/stress hormones that raise glucose regardless, which is exactly why stopping insulin during illness is the #1 preventable cause of DKA.'},

  {q:'A patient being treated for DKA has a glucose that has fallen from 580 to 260 mg/dL after several hours on the insulin drip. Which change to the treatment plan should the nurse anticipate?',type:'single',
   opts:['A. Discontinuing the insulin drip immediately, since the glucose is approaching a safer range','B. Adding dextrose to the IV fluids so the insulin drip can continue clearing ketones without causing hypoglycemia','C. Switching from regular insulin to a long-acting insulin to finish lowering the glucose gradually','D. Holding all further fluids since rehydration is presumably complete at this glucose level'],correct:1,
   rat:'The trap: A sounds logical (glucose is improving, so stop the drip) but stopping insulin too early lets ketone production restart before the acidosis has resolved. The correct move is adding dextrose once glucose nears 200-250, allowing the insulin drip to keep running (clearing ketones) without dropping the glucose too low.'},

  {q:'A nurse questions why the care team is intentionally slowing the rate of glucose correction in a patient being treated for HHS, rather than correcting it as fast as possible. What is the BEST rationale?',type:'single',
   opts:['A. Slower correction simply reduces the total cost of insulin and IV fluids used during treatment','B. The brain has adapted to the prolonged hyperosmolar state, and correcting glucose/osmolality too quickly can cause a dangerous fluid shift into brain cells, resulting in cerebral edema','C. Slower correction is only a comfort measure with no effect on patient safety','D. Rapid correction is actually preferred whenever the patient is hemodynamically stable enough to tolerate it'],correct:1,
   rat:'The trap: A and C both dismiss this as a non-clinical or minor consideration, and D states the opposite of safe practice. The real mechanism: the brain adjusts to a hyperosmolar environment during prolonged severe hyperglycemia, so correcting the osmolality too fast causes water to shift rapidly into brain cells — this is exactly why dextrose is added and glucose is lowered gradually rather than as fast as possible.'},

  {q:'A client in DKA has an arterial blood gas showing pH 7.18, PaCO2 22 mmHg, and HCO3 11 mEq/L. Which interpretation is correct?',type:'single',
   opts:['A. Respiratory acidosis with metabolic compensation','B. Metabolic acidosis with respiratory compensation (Kussmaul breathing blowing off CO2)','C. Metabolic alkalosis with respiratory compensation','D. A normal acid-base balance for a patient in DKA'],correct:1,
   rat:'The trap: A reverses the primary problem and the compensating system. The low pH and low HCO3 together identify a METABOLIC acidosis (from ketoacids) as the primary problem; the low PaCO2 shows the lungs are compensating by blowing off CO2 through Kussmaul respirations — this is respiratory compensation FOR a metabolic acidosis, not a respiratory disorder itself.'},

  {q:'A client with DKA has been on an insulin drip for several hours. The provider orders a decrease in the infusion rate once the anion gap has closed and bicarbonate has normalized, even though the glucose reached goal range earlier. What is the rationale for continuing insulin until this later point?',type:'single',
   opts:['A. Insulin must be continued until the ketoacidosis itself has resolved, not just until the glucose number looks normal, since stopping too early can allow ketone production to restart','B. There is no clinical reason for this order; the drip should have been stopped once glucose reached goal range','C. The anion gap and bicarbonate are unrelated to insulin therapy and are being monitored for an unrelated reason','D. This order is only relevant if the client also has kidney disease'],correct:0,
   rat:'The trap: B assumes glucose normalization alone signals resolution, missing that DKA is fundamentally an ACIDOSIS problem, not just a glucose problem. C and D both dismiss a real and important physiologic connection. Insulin is what shuts off ketone production — the glucose number can look fine long before the acidosis has actually resolved, which is why dextrose is added to keep the drip running until the anion gap/bicarbonate confirm the acidosis itself is fixed.'}
],'DKA vs HHS Check');
</script>
<script>
document.getElementById('sec-hypo').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">📉</span> Hypoglycemia</h2>
<p class="intro-line">Blood sugar &lt;70 mg/dL. More immediately dangerous than high sugar — the brain runs on glucose and starves fast.</p>

<div class="card">
  <h3>Causes & the two symptom stages</h3>
  <p><b>Causes:</b> too much insulin/oral agent, too little food, skipped meal, too much exercise.</p>
  <ul class="clean">
    <li><b>Stage 1 — Adrenergic (mild, &lt;70):</b> the body dumps adrenaline → <b>shaky, sweaty, tachycardic, palpitations, anxious, hungry</b>. These are the early warning signs.</li>
    <li><b>Stage 2 — Neuroglycopenic (worse, &lt;54):</b> the brain starves → <b>confusion, headache, slurred speech, blurred/double vision, poor coordination, irritability</b>.</li>
    <li><b>Stage 3 — Severe:</b> seizures, loss of consciousness, can't self-treat.</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Cold & Clammy = need some CANDY (low sugar). Hot & Dry = sugar HIGH."</div><div class="exp">Sweaty/shaky = hypoglycemia. Dehydrated/flushed = hyperglycemia.</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🍬 The Rule of 15 (conscious patient)</h3>
  <ul class="clean">
    <li>Give <b>15 grams of fast-acting carbs</b>: 4 oz juice, 3–4 glucose tablets, 1 tbsp sugar/honey, or hard candy.</li>
    <li><b>Wait 15 minutes, recheck</b> blood glucose.</li>
    <li>Still &lt;70? <b>Repeat another 15 g.</b></li>
    <li>Once stable, give a <b>snack with protein/complex carb</b> to prevent it from dropping again.</li>
  </ul>
  <div class="hy">⭐ <b>Don't over-treat.</b> Give 15 g, wait, recheck — don't dump a huge amount of sugar in at once (causes a rebound high). Fast carbs, not a candy bar with fat that slows absorption.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🚑 Unconscious / can't swallow</h3>
  <ul class="clean">
    <li><b>NEVER put food or drink in the mouth</b> of someone who can't swallow — aspiration risk.</li>
    <li>Give <b>glucagon</b> 1 mg IM/SubQ (or intranasal) — it tells the liver to release stored glucose.</li>
    <li>In the hospital with IV access → <b>IV dextrose (D50)</b>.</li>
    <li>May take up to 20 min to wake; follow with carbs + snack. Monitor closely.</li>
  </ul>
</div>

<div class="card">
  <h3>⚠️ Hypoglycemia unawareness</h3>
  <p>Some long-term diabetics lose the early adrenergic warning signs (from autonomic neuropathy) — they go straight to confusion without feeling shaky first. These patients need <b>frequent glucose checks</b> and slightly higher glucose targets, and family should be taught to give glucagon.</p>
</div>

<div id="quiz-hypo"></div>
`;

renderQuiz('quiz-hypo',[
  {q:'A conscious, alert patient reports feeling shaky and sweaty; fingerstick glucose is 58 mg/dL. The patient is able to swallow safely. What is the nurse\'s FIRST action?',type:'single',
   opts:['A. Administer 15 g of fast-acting carbohydrate, such as 4 oz of juice or glucose tablets','B. Administer glucagon intramuscularly to raise the glucose more reliably','C. Provide a full meal with protein and fat to prevent another drop later','D. Recheck the glucose again in one hour before taking any action'],correct:0,
   rat:'The trap: B assumes glucagon is always the "stronger" choice, but it\'s reserved for patients who can\'t safely swallow — using it here is an unnecessary injection when oral treatment works. C delays absorption (fat/protein slow gastric emptying), and D leaves a symptomatic, dropping patient untreated for far too long.'},

  {q:'An unconscious diabetic patient is found with a fingerstick glucose of 40 mg/dL. No IV access is currently in place. Which intervention is correct?',type:'single',
   opts:['A. Place glucose gel between the cheek and gum, since this route does not require swallowing','B. Administer glucagon IM or subcutaneously, since the patient cannot safely protect their airway to receive anything by mouth','C. Give a small amount of juice slowly by mouth to avoid a large fluid bolus','D. Wait for the patient to regain consciousness before administering any treatment'],correct:1,
   rat:'The trap: A sounds like a clever workaround, but an unconscious patient cannot reliably protect their airway regardless of exactly where something is placed in the mouth — aspiration risk remains. Without IV access, glucagon is correct; D50 would only apply if IV access were already established.'},

  {q:'A patient reports feeling shaky, sweaty, and anxious. The nurse also notes the patient is confused and slurring words. Based on this combination of findings, what does the nurse recognize?',type:'single',
   opts:['A. Early hyperglycemia, since confusion is a classic sign of high blood sugar','B. Hypoglycemia that has progressed from the adrenergic stage into the neuroglycopenic stage, meaning the brain is now involved','C. A stroke unrelated to the patient\'s glucose level, requiring an immediate neuro consult only','D. DKA, since confusion and sweating together suggest ketoacidosis'],correct:1,
   rat:'The trap: C and D both pull the presentation toward an unrelated or different diagnosis. The pattern described — adrenergic signs (shaky, sweaty, anxious) PLUS neuro signs (confusion, slurred speech) — is hypoglycemia progressing in severity, not a separate problem; glucose should be checked immediately before assuming anything else.'},

  {q:'A patient was treated for hypoglycemia with 15 g of fast-acting carbohydrate. Fifteen minutes later, the glucose is 62 mg/dL and the patient still feels mildly shaky. What should the nurse do NEXT?',type:'single',
   opts:['A. Administer glucagon immediately, since the first treatment clearly failed','B. Repeat another 15 g of fast-acting carbohydrate and recheck glucose again in 15 minutes','C. Give nothing further and simply continue to reassess every hour','D. Administer a dose of insulin to prevent a rebound high from the earlier treatment'],correct:1,
   rat:'The trap: A escalates to an injectable treatment when the patient is still conscious and able to swallow — glucagon isn\'t needed here. D is dangerous and backwards (giving insulin to a still-hypoglycemic patient). Since 62 is still below the 70 mg/dL threshold, the correct action is simply repeating the Rule of 15, not escalating or abandoning treatment.'},

  {q:'A patient with long-standing diabetes and known autonomic neuropathy is found with a glucose of 48 mg/dL but reports feeling completely normal, with no shakiness or sweating. What does this presentation MOST likely indicate?',type:'single',
   opts:['A. A falsely low glucose reading that should be repeated before treating','B. Hypoglycemia unawareness — autonomic neuropathy has blunted the early adrenergic warning signs, so the patient can progress straight toward neuroglycopenic symptoms without warning','C. That this glucose level is not clinically significant for this particular patient','D. Early DKA, since the absence of typical hypoglycemia symptoms suggests a different mechanism entirely'],correct:1,
   rat:'The trap: C dismisses a genuinely low and dangerous glucose level just because symptoms are absent, and D redirects to an unrelated condition. In patients with autonomic neuropathy, the early adrenergic warning system can be blunted or lost entirely — this patient still needs immediate treatment and closer, more frequent monitoring going forward, precisely because they can\'t rely on feeling symptoms.'},

  {q:'A client receiving NPH insulin at 0700 develops diaphoresis, tremor, and confusion at 1500. What is the MOST likely explanation for the TIMING of this event?',type:'single',
   opts:['A. This is unrelated to the morning insulin dose since too much time has passed','B. NPH insulin typically peaks 4-12 hours after administration, placing this event within its expected peak action window','C. NPH insulin has no peak and provides flat, even coverage throughout the day','D. This can only be explained by a dietary indiscretion, not the insulin itself'],correct:1,
   rat:'The trap: A assumes enough time has passed for the insulin to be irrelevant, but NPH is intermediate-acting with a peak of roughly 4-12 hours — 1500 (8 hours after a 0700 dose) falls squarely within that window. C incorrectly describes NPH as peakless (that describes long-acting analogs like glargine), and D ignores the much more likely medication-timing explanation in favor of an unsupported assumption.'},

  {q:'A nurse is teaching a client about hypoglycemia risk related to exercise. Which statement by the client indicates a need for further teaching?',type:'single',
   opts:['A. "I should check my blood sugar before and after exercising, especially if it\'s a new or more intense activity."','B. "Exercise can lower my blood sugar for several hours afterward, not just during the activity itself."','C. "I\'ll carry a fast-acting carbohydrate source with me whenever I exercise."','D. "As long as I feel fine during exercise, I don\'t need to worry about my blood sugar dropping afterward."'],correct:3,
   rat:'The trap: this question asks which statement needs correction, and D is the one that reflects a dangerous misunderstanding — exercise can lower glucose for hours AFTER the activity ends (increased insulin sensitivity and glycogen replenishment), so feeling fine DURING exercise doesn\'t rule out a delayed drop. A, B, and C all reflect correct, safety-focused understanding.'}
],'Hypoglycemia Check');
</script>
<script>
document.getElementById('sec-complications').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🔗</span> Long-Term Complications</h2>
<p class="intro-line">One mechanism: chronic high glucose wrecks blood vessels (pipes) and nerves (wires). Every complication is "which pipes or wires got damaged."</p>

<div class="card">
  <h3>🩸 Macrovascular (big vessels)</h3>
  <p>Accelerated atherosclerosis in large vessels → the leading cause of death in diabetes.</p>
  <ul class="clean">
    <li><b>Coronary artery disease</b> → heart attack (may be "silent" — no chest pain — due to neuropathy).</li>
    <li><b>Cerebrovascular disease</b> → stroke.</li>
    <li><b>Peripheral vascular disease</b> → poor leg circulation → wounds won't heal.</li>
  </ul>
</div>

<div class="card">
  <h3>🔬 Microvascular (tiny vessels)</h3>
  <ul class="clean">
    <li><b>Retinopathy</b> — damaged retinal vessels → leading cause of blindness in working-age adults. <b>Painless</b>; symptoms (floaters, blurred/spotty vision) come late. Type 1: first eye exam within 5 yrs; Type 2: at diagnosis. Control glucose + BP to prevent.</li>
    <li><b>Nephropathy</b> — damaged kidney vessels → protein leaks into urine (albuminuria) → kidney failure. Diabetes is the #1 cause of ESRD. Screen with urine albumin + eGFR. <b>ACE inhibitors/ARBs</b> protect the kidneys; avoid nephrotoxic drugs and contrast dye.</li>
  </ul>
  <div class="hy">⭐ Micro = <b>eyes + kidneys</b> (tiny vessels). Macro = <b>heart, brain, legs</b> (big vessels). Both driven by the same chronic hyperglycemia.</div>
</div>

<div class="card">
  <h3>🦵 Neuropathy (damaged nerves)</h3>
  <ul class="clean">
    <li><b>Peripheral (sensorimotor):</b> "stocking-glove" — numbness/burning/tingling starting in toes and fingers. <b>Loss of protective sensation</b> → can't feel injuries → foot ulcers. Also loss of proprioception → unsteady gait, falls.</li>
    <li><b>Autonomic:</b> affects automatic functions — <b>fixed tachycardia, orthostatic hypotension, silent MI, delayed gastric emptying (gastroparesis), bladder retention, ED, hypoglycemia unawareness</b>.</li>
  </ul>
</div>

<div class="card" style="border-color:var(--amber)">
  <h3>🦶 Diabetic foot care (VERY high-yield)</h3>
  <p class="why-chain"><b>Why feet are so vulnerable:</b> neuropathy (can't feel injury) + peripheral vascular disease (won't heal) + high sugar (feeds infection) = small wound → ulcer → amputation. 20% of foot ulcers lead to amputation.</p>
  <ul class="clean">
    <li><b>Inspect feet daily</b> (use a mirror for soles) — because they can't feel injuries.</li>
    <li><b>Never go barefoot</b>; wear well-fitting shoes; check inside shoes for objects.</li>
    <li><b>No heating pads / hot water</b> — they can't feel a burn.</li>
    <li>Wash + dry feet daily (dry between toes); moisturize but NOT between toes.</li>
    <li>Cut nails straight across; see a podiatrist for calluses/corns — never cut them yourself.</li>
    <li><b>Control glucose</b> — the root cause of all of it.</li>
  </ul>
</div>

<div id="quiz-complications"></div>
`;

renderQuiz('quiz-complications',[
  {q:'A patient with a 12-year history of diabetes and peripheral neuropathy has intact skin and reports no foot pain. The nurse still emphasizes daily foot inspection with a mirror. What is the BEST rationale for this teaching?',type:'single',
   opts:['A. Daily inspection primarily helps the patient maintain proper foot hygiene','B. Because neuropathy has removed the ability to feel an injury, only a visual inspection will catch a wound before it silently progresses toward infection or ulceration','C. It allows the patient to monitor their shoe size as their feet change over time','D. It is required documentation for insurance purposes regardless of the patient\'s sensory status'],correct:1,
   rat:'The trap: A, C, and D all offer plausible-sounding but incorrect justifications that miss the actual physiologic reason. The mechanism is specific: loss of protective sensation means pain — the body\'s natural warning system — is gone, so vision has to substitute for the lost feeling to catch injuries early.'},

  {q:'A nurse is teaching foot care to a patient with diabetic peripheral neuropathy. Which statements by the patient indicate a need for further teaching? (Select all that apply)',type:'multi',
   opts:['A. "I\'ll check between my toes every day, using a mirror for the bottom of my feet."','B. "I\'ll warm my feet with a heating pad before bed since they often feel cold."','C. "I\'ll wear shoes both indoors and outdoors, checking inside them first for objects."','D. "I\'ll see a podiatrist if I develop a callus instead of trimming it myself."','E. "I\'ll walk barefoot around the house since my floors are always clean."'],correct:[1,4],
   rat:'The traps: B and E both sound like reasonable comfort/convenience habits, but both are contraindicated — a heating pad risks an unfelt burn, and barefoot walking risks an unfelt injury, regardless of how clean the floor is. A, C, and D reflect correct teaching and do NOT need correction.'},

  {q:'A patient asks why their eye doctor and their kidney specialist both blame the "same tiny blood vessels" for their diabetes complications. Which explanation is correct?',type:'single',
   opts:['A. This is a coincidence; retinopathy and nephropathy actually have unrelated underlying causes','B. Retinopathy and nephropathy are both microvascular complications — chronic hyperglycemia damages the small vessels of the retina and kidney glomeruli through the same underlying mechanism','C. Retinopathy is microvascular while nephropathy is macrovascular, so the two specialists are describing different processes','D. The kidney specialist is describing a complication of hypertension, unrelated to the patient\'s diabetes'],correct:1,
   rat:'The trap: C sounds plausible if you\'re not sure of the classification (it swaps microvascular/macrovascular), and D detaches nephropathy from diabetes entirely. Both retinopathy and nephropathy are classic MICROvascular complications — small-vessel damage from chronic hyperglycemia is the single shared mechanism, unlike macrovascular disease (heart, brain, legs).'},

  {q:'A diabetic patient with early nephropathy (microalbuminuria) is started on a new medication. Which class is MOST appropriate, and why?',type:'single',
   opts:['A. NSAIDs, because they reduce inflammation in the glomeruli and slow protein leakage','B. ACE inhibitors or ARBs, because they reduce intraglomerular pressure and slow the progression of nephropathy','C. Beta-blockers, because they are the first-line agents specifically for diabetic kidney protection','D. Loop diuretics, because removing excess fluid directly protects the glomeruli from further damage'],correct:1,
   rat:'The trap: A is dangerous — NSAIDs are actually NEPHROTOXIC and should be avoided in this population, not used for "anti-inflammatory" kidney protection. C and D assign kidney-protective properties to drug classes that don\'t have that specific mechanism. ACE inhibitors/ARBs specifically lower pressure inside the glomerulus, which is the targeted, evidence-based intervention.'},

  {q:'A long-standing diabetic patient is later found to have had a myocardial infarction with minimal chest pain reported at the time. Which underlying mechanism BEST explains this presentation?',type:'single',
   opts:['A. Diabetic patients have a naturally higher pain tolerance unrelated to any nerve damage','B. Autonomic neuropathy can blunt or eliminate the typical chest-pain warning signal of an MI, producing a "silent" presentation','C. This patient\'s heart was not significantly affected by the infarction, which is why pain was minimal','D. This presentation suggests the diagnosis of MI is incorrect and another cause should be investigated'],correct:1,
   rat:'The trap: A invents an unrelated psychological explanation, and C and D both dismiss a serious, real cardiac event based on symptom severity alone. Autonomic neuropathy specifically can blunt the pain-signaling pathway during an MI — this is exactly why diabetics need vigilant cardiac monitoring even when the classic chest-pain complaint is minimal or absent.'},

  {q:'A client with diabetic autonomic neuropathy reports lightheadedness and dizziness specifically when standing up from a seated position, with blood pressure dropping from 128/78 to 98/60 upon standing. What is the underlying mechanism?',type:'single',
   opts:['A. Autonomic neuropathy impairs the normal reflex vasoconstriction that maintains blood pressure with position changes, resulting in orthostatic hypotension','B. This is unrelated to diabetes and is more likely dehydration alone','C. This indicates the client is developing DKA','D. This is a normal, expected finding in all older adults regardless of diabetes status'],correct:0,
   rat:'The trap: B offers a plausible-sounding but incomplete alternative explanation, C redirects to an unrelated acute complication, and D dismisses a genuine autonomic complication as universal aging rather than a diabetes-specific mechanism. Autonomic neuropathy impairs the nervous system\'s ability to trigger compensatory vasoconstriction when standing, causing orthostatic hypotension — a distinct, diabetes-related complication requiring specific safety precautions (rising slowly, fall precautions).'},

  {q:'Which combination of findings in a client with long-standing diabetes is MOST consistent with early diabetic nephropathy?',type:'single',
   opts:['A. Elevated fasting glucose and mild peripheral edema only','B. Microalbuminuria on urine testing with a normal serum creatinine','C. Elevated serum creatinine with normal urine protein','D. Polyuria and polydipsia alone, without any lab abnormalities'],correct:1,
   rat:'The trap: A, C, and D all describe findings that could be seen in diabetes generally but miss the SPECIFIC early marker of kidney involvement. Microalbuminuria — small amounts of protein leaking into the urine before creatinine even rises — is the earliest detectable sign of diabetic nephropathy, which is why annual urine microalbumin screening is standard of care, often before serum creatinine changes at all.'}
],'Complications Check');
</script>
<script>
document.getElementById('sec-skin').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🧴</span> Skin, Wounds & Pressure Injuries</h2>
<p class="intro-line">Pressure injuries are the classic NCLEX topic here. Know the staging, prevention, and the mechanism (pressure → no blood → tissue death).</p>

<div class="card">
  <h3>🔍 Assessing skin color (esp. dark skin tones)</h3>
  <table class="lab">
    <tr><th>Finding</th><th>What it means</th><th>Where to check in dark skin</th></tr>
    <tr><td><b>Cyanosis</b></td><td>Low oxygen (bluish)</td><td>Appears grayish; check lips, nail beds, conjunctivae</td></tr>
    <tr><td><b>Jaundice</b></td><td>High bilirubin (yellow)</td><td>Check sclerae, hard palate, mucous membranes</td></tr>
    <tr><td><b>Pallor</b></td><td>Low blood flow/anemia</td><td>Check conjunctivae, oral mucosa</td></tr>
    <tr><td><b>Erythema</b></td><td>Redness/inflammation</td><td>May look purple-gray; palpate for warmth</td></tr>
  </table>
  <div class="hy">⭐ In darker skin tones, color changes are harder to see — <b>check mucous membranes, sclerae, nail beds, and conjunctivae</b>, and palpate for warmth/temperature changes.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🗣️ Skin assessment — the actual questions to ask (Casteel's own examples)</h3>
  <p><b>If you see a RASH,</b> ask open-ended questions: How long has it been there? Does it itch? Any new soaps, detergents, lotions, or products? Any known allergies?</p>
  <p><b>If you see ECCHYMOSIS (bruising)</b> on a hospitalized patient, ask: How did you get this? Was there an injury or bump? What medications are you taking (anticoagulants, aspirin, and steroids all increase bruising)?</p>
  <div class="hy">⭐ <b>Pattern recognition matters:</b> bruising in typical locations (shins, forearms, from a bump) is usually explainable. Bruising that is widespread, in unusual/protected locations, or inconsistent with the story given should raise concern and prompt further assessment — this applies to any patient, but is a especially important safety consideration in elderly or dependent patients.</div>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Duration, itch, and what touched it" for a rash. "How, when, and what meds" for a bruise.</div></div>
</div>

<div class="card">
  <h3>✋ Quick fact: thickest &amp; thinnest skin on the body</h3>
  <p><b>Thickest skin:</b> the palms of the hands and the soles of the feet.</p>
  <p><b>Thinnest skin:</b> the eyelids and the genital/perineal area.</p>
  <div class="hy">⭐ Flagged directly by the instructor as a testable detail — easy to overlook because it seems trivial, but it's exactly the kind of small fact that shows up as a distractor or a direct question.</div>
</div>

<div class="card" style="border-color:var(--amber)">
  <h3>🛏️ Pressure injury STAGING (know all four + the two special ones)</h3>
  <table class="lab">
    <tr><th>Stage</th><th>What you see</th></tr>
    <tr><td><b>Stage 1</b></td><td><b>Intact skin</b>, non-blanchable redness (doesn't turn white when pressed)</td></tr>
    <tr><td><b>Stage 2</b></td><td><b>Partial-thickness</b> — shallow open ulcer or blister; epidermis/dermis</td></tr>
    <tr><td><b>Stage 3</b></td><td><b>Full-thickness</b> — fat visible, may have slough; no bone/tendon</td></tr>
    <tr><td><b>Stage 4</b></td><td><b>Full-thickness</b> with visible <b>bone, tendon, or muscle</b></td></tr>
    <tr><td><b>Unstageable</b></td><td>Base covered by <b>slough/eschar</b> — can't see depth until removed</td></tr>
    <tr><td><b>Deep tissue injury</b></td><td>Intact skin, <b>purple/maroon</b> discoloration</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"1 = Red intact • 2 = Broken shallow • 3 = Fat • 4 = Bone. Covered = Unstageable."</div></div>
</div>

<div class="card">
  <h3>🛡️ Prevention (the mechanism drives every rule)</h3>
  <ul class="clean">
    <li><b>Reposition every 2 hours</b> — the #1 intervention (relieves the pressure that's the cause).</li>
    <li><b>Keep the head of the bed at or below 45°</b> when possible — a higher angle causes the body to slide down, creating shear force on the sacrum as skin drags against the sheets while bone moves underneath it.</li>
    <li><b>NEVER massage reddened/bony areas</b> — the tissue is already damaged; massage worsens it.</li>
    <li>Keep skin clean and dry; manage moisture/incontinence (moisture macerates skin).</li>
    <li>Use pressure-redistribution surfaces, pillows to bridge bony prominences, and lift (don't drag) to avoid shear/friction.</li>
    <li><b>Nutrition:</b> adequate protein — albumin <b>&lt;3 g/dL</b> raises risk and slows healing.</li>
    <li>Use the <b>Braden scale</b> to assess risk (see the domains below).</li>
    <li><b>Disease-related risk factors to know:</b> diabetes (poor perfusion), paralysis/stroke (immobility + impaired sensation), obesity (increased pressure + harder to reposition), and PVD/PAD (peripheral vascular/arterial disease — poor circulation prevents healing).</li>
    <li>Most common sites: <b>sacrum, heels</b>, ischial tuberosities, greater trochanter, elbows.</li>
    <li><b>Turning schedule by situation:</b> in bed → turn <b>every 2 hours</b>; in a chair/wheelchair → reposition <b>every 15 minutes</b>; if able, stand <b>every hour</b>.</li>
    <li><b>If a pressure injury already exists, the main goal is to OFFLOAD</b> the area — remove all pressure from it to restore circulation and let it heal.</li>
  </ul>
</div>

<div class="card">
  <h3>🧭 Pressure points BY POSITION (know these)</h3>
  <p>Different lying positions put weight on different bony prominences. Casteel-style questions love asking which area to check for a given position.</p>
  <table class="lab">
    <tr><th>Position</th><th>High-risk pressure points</th></tr>
    <tr><td><b>Supine</b> (on back)</td><td>Back of head, shoulders, spine, elbows, <b>sacrum</b>, <b>heels</b></td></tr>
    <tr><td><b>Prone</b> (on stomach)</td><td>Cheek/ear, collar bone, breasts (women), genitalia (men), hips, knees, toes</td></tr>
    <tr><td><b>Side-lying</b> (lateral)</td><td>Ear, collar bone, ribs, <b>hip</b>, <b>iliac crest</b>, knee, toes</td></tr>
  </table>
  <div class="hy">⭐ <b>Sacrum and heels</b> are the most common overall (supine is the most common hospital position). For side-lying, the <b>hip and iliac crest</b> take the weight. Match the position to the bony prominence.</div>
</div>

<div class="card">
  <h3>📋 Braden scale — the 6 domains it scores</h3>
  <p>The Braden scale predicts pressure injury risk (severe / high / moderate / mild). It scores six areas:</p>
  <ul class="clean">
    <li><b>Sensory</b> perception (can they feel/respond to discomfort?)</li>
    <li><b>Moisture</b> (skin exposure to wetness)</li>
    <li><b>Activity</b> (level of physical activity)</li>
    <li><b>Mobility</b> (ability to change position)</li>
    <li><b>Nutrition</b> (usual food intake)</li>
    <li><b>Friction &amp; shear</b> (rubbing/sliding against surfaces)</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Some Moist Areas Make Nurses Frown" — Sensory, Moisture, Activity, Mobility, Nutrition, Friction.</div></div>
</div>

<div class="card">
  <h3>🛠️ Pressure-reducing devices & measures</h3>
  <ul class="clean">
    <li><b>Reduce pressure points</b> — the best way to prevent injury.</li>
    <li>Devices: <b>air/pressure-redistribution mattress</b>, <b>float boots</b> (offload heels), <b>positioning wedges</b>, pillows, padding under oxygen tubing/lines.</li>
    <li><b>Remove lines/drains from under the patient's skin</b> (they create pressure points).</li>
    <li><b>Keep linens smooth and wrinkle-free</b>; limit layers of linens and briefs (bunched fabric = pressure + moisture).</li>
    <li>Deep tissue injury feels <b>boggy</b> and looks <b>purple/maroon</b> with intact skin — a warning that damage is happening underneath.</li>
  </ul>
</div>

<div class="card">
  <h3>🩹 Wound care & debridement</h3>
  <ul class="clean">
    <li><b>Debridement</b> = removing dead (necrotic) tissue so the wound can heal:</li>
    <li><b>Autolytic</b> — the body's own enzymes under a moist occlusive dressing (slowest, most selective).</li>
    <li><b>Enzymatic/chemical</b> — collagenase applied to break down dead tissue.</li>
    <li><b>Mechanical/surgical</b> — physically removing tissue (fastest).</li>
    <li>A wound heals best in a <b>moist</b> (not wet, not dry) environment. Match the dressing to the wound: absorptive for drainage, hydrating for dry wounds.</li>
  </ul>
</div>

  {q:'A nurse assesses a patient\'s sacral area and finds intact skin with redness that does NOT blanch when pressed, and no open areas. How should this be staged?',type:'single',

   rat:'The trap: A and B both assume a specific depth based on the presence of eschar alone, and D confuses eschar-covered wounds with deep tissue injury (which involves intact, not open, skin). The defining feature of "unstageable" is precisely that the depth CANNOT be assessed until the obscuring dead tissue is debrided.'},

   rat:'The trap: A and D both sound like reasonable skin-care habits but don\'t address the root cause (sustained pressure), and C actually increases shear force on the sacrum at that elevated angle. Since unrelieved pressure is the cause, scheduled repositioning that physically relieves it is the intervention with the strongest evidence.'},

  {q:'A nurse finds a reddened, intact area over a bedridden patient\'s sacrum during a routine skin check. Which action is appropriate?',type:'single',

   rat:'The trap: A and C both apply a "stimulate healing" logic that is actually harmful — the tissue is already compromised, and massage or heat can worsen fragile, damaged capillaries. D under-reacts to a genuine early warning sign. The correct response addresses the actual cause (unrelieved pressure) without further traumatizing the tissue.'},

  {q:'Which of the following patients are at INCREASED risk for pressure injury development? (Select all that apply)',type:'multi',

   rat:'The trap: C describes exactly the PROTECTIVE intervention (scheduled repositioning), not a risk factor — including it tests whether you can distinguish a prevention measure from a risk factor. Incontinence/moisture, poor nutrition (low albumin), impaired sensation, and being underweight (less padding over bony prominences) are all genuine risk factors.'},

  {q:'A patient spends most of the day in a wheelchair due to lower-extremity paralysis. What is the appropriate repositioning frequency to prevent pressure injury while seated?',type:'single',

   rat:'The trap: A applies the bed-patient interval to a seated patient, and C assumes a cushion alone is sufficient without active repositioning. Because sitting concentrates the entire body weight over the small area of the ischial tuberosities, the evidence-based interval is much more frequent than for a patient lying in bed.'},

  {q:'A patient positioned side-lying (lateral) for an extended period is at HIGHEST risk for pressure injury at which locations?',type:'single',

   rat:'The trap: A generalizes the supine pressure points to every position, and C and D describe pressure points from prone and supine positioning, respectively. Positioning determines WHICH bony prominences bear weight — side-lying specifically loads the hip and iliac crest (plus ear, ribs, and ankle), not the sacrum/heels of supine.'},

  {q:'A patient already has an established Stage 2 pressure ulcer on the sacrum. What is the PRIMARY goal of ongoing care for this existing wound?',type:'single',

   rat:'The trap: C sounds intuitively protective ("don\'t disturb it") but is backwards — an unmoved patient continues to apply the same pressure that caused the wound. Once an ulcer exists, the priority shifts to fully offloading that specific area so circulation can return and healing can occur; repositioning continues, just arranged to avoid direct pressure on the wound itself.'},

  {q:'A nurse assesses intact skin over a patient\'s heel and finds it is purple/maroon in color and feels boggy/mushy compared to surrounding tissue. Which is the correct interpretation?',type:'single',

   rat:'The trap: A misclassifies this as the mildest stage based on intact skin alone, without recognizing the specific purple/maroon, boggy quality that distinguishes deep tissue injury from ordinary Stage 1 erythema. DTI represents SIGNIFICANT underlying damage despite an intact-looking surface — it is not a minor or reassuring finding.'},

   rat:'The trap: A, C, and D are all reasonable-sounding comfort questions that avoid the actual clinical priority. Asking about mechanism of injury and medication use (anticoagulants, aspirin, steroids all increase bruising) is the assessment question that actually informs whether this bruising is expected or concerning.'},

   rat:'The trap: A accepts an explanation at face value without exercising clinical judgment, and C and D both sidestep the actual concern. Bruising that is widespread, in atypical/protected locations, or inconsistent with the given explanation is a recognized pattern that warrants further assessment and appropriate reporting — this is a patient-safety responsibility, not an assumption to dismiss.'},

  {q:'A nurse is caring for a bedbound patient and keeps the head of the bed elevated to 75 degrees for most of the day for comfort. What is the MOST likely consequence of this positioning?',type:'single',
   opts:['A. Improved pressure redistribution across the back and hips','B. Increased shear force on the sacrum as the body slides downward against the sheets while the underlying bone continues to move','C. No significant effect on skin integrity as long as the patient is repositioned every 2 hours','D. Decreased risk of aspiration, which outweighs any other positioning concern'],correct:1,
   rat:'The trap: C assumes repositioning alone cancels out the risk from a high bed angle, and D focuses on a real but separate benefit (aspiration precaution) while ignoring the skin consequence being asked about. Angles greater than the recommended 45° cause the body to slide, creating shear as skin drags against linens while the sacrum keeps moving — this is why head-of-bed angle is a specific, testable prevention point.'},

  {q:'Which areas of the body have the THICKEST skin, and which have the THINNEST?',type:'single',

  {q:'A client with a Braden Scale score of 14 is being cared for on a medical floor. Which combination of interventions is MOST appropriate based on this score?',type:'single',

   rat:'The trap: A dismisses a genuinely at-risk score, C jumps to an intervention appropriate for an existing wound rather than prevention, and D removes the single most effective preventive measure. A Braden score of 14 falls within the moderate-risk range (≤18 is considered at-risk overall) — this calls for active preventive interventions, not a "wait and see" approach.'}

<script>
document.getElementById('sec-eye').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">👁️</span> Eye & Vision</h2>
<p class="intro-line">Glaucoma and cataracts are the big two. Know the mechanism: glaucoma = pressure damages the nerve (peripheral loss); cataract = cloudy lens (blurry, glare). But first — the foundational eye basics he explicitly said to know cold.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>👁️ What the lens actually does (3 jobs)</h3>
  <ul class="clean">
    <li><b>UV filter</b> — blocks damaging ultraviolet light from reaching the retina.</li>
    <li><b>Accommodation</b> — the lens changes SHAPE (gets rounder for near objects, flatter for distance) to keep the image in focus.</li>
    <li><b>Refraction</b> — the lens bends incoming light so it focuses precisely on the retina.</li>
  </ul>
  <div class="hy">⭐ <b>Why this matters:</b> as we age, the lens gradually thickens and stiffens, which directly limits its ability to accommodate — that's the mechanism behind presbyopia (below). Everything downstream starts here.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🔍 Refractive errors — where does the light actually focus?</h3>
  <table class="lab">
    <tr><th>Term</th><th>What's happening</th></tr>
    <tr><td><b>Emmetropia</b></td><td>Normal — light focuses directly ON the retina without correction. This is 20/20.</td></tr>
    <tr><td><b>Myopia</b></td><td>Nearsighted — light focuses IN FRONT of the retina (eyeball too long / cornea too curved). Close objects clear, distance blurry.</td></tr>
    <tr><td><b>Hyperopia</b></td><td>Farsighted — light focuses BEHIND the retina (eyeball too short). Distance clear, close objects blurry.</td></tr>
    <tr><td><b>Astigmatism</b></td><td>Irregular curvature of the cornea/lens — causes blurred or distorted vision at ANY distance, near or far.</td></tr>
    <tr><td><b>Presbyopia</b></td><td>Age-related loss of accommodation (usually >40) — the lens has stiffened and can no longer focus up close. This is why reading glasses become necessary with age even in people who never needed correction before.</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Myopia = can't see the MOUNTAIN (far). Hyperopia = can't see what's HANDHELD (near)."</div></div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>👀 Pupil response &amp; pupil size — the terms he wants you to distinguish</h3>
  <ul class="clean">
    <li><b>Direct response:</b> shine light in ONE eye → THAT SAME eye's pupil constricts.</li>
    <li><b>Consensual response:</b> shine light in ONE eye → the OTHER eye's pupil ALSO constricts, even though no light was shone into it directly (the two sides are neurologically linked).</li>
    <li><b>Miosis</b> = pupil CONSTRICTION (gets smaller). Caused by opioids, pilocarpine, bright light, parasympathetic response.</li>
    <li><b>Mydriasis</b> = pupil DILATION (gets bigger). Caused by anticholinergics, dim light, sympathetic ("fight or flight") response, some abnormal neuro findings.</li>
  </ul>
  <div class="hy">⭐ <b>Don't mix these two pairs up</b> — direct/consensual describes HOW you're testing (which eye reacts), while miosis/mydriasis describes WHICH DIRECTION the pupil is changing. A question can test either pairing separately.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>📏 Visual acuity — how to actually read the fraction</h3>
  <p class="why-chain">The Snellen fraction is <b>[distance the patient stands from the chart] / [distance a person with NORMAL vision could read that same line from]</b>. The patient always stands 20 feet away — it's the BOTTOM number that changes and tells you how good or bad their vision is.</p>
  <div class="hy">⭐ <b>Worked example:</b> a person with <b>20/40</b> vision can see from 20 feet what a person with normal (20/20) vision could see from <b>40 feet</b> away. In other words, they have to be CLOSER to see what someone with normal vision can see from farther back — so a LARGER bottom number always means WORSE vision, not better.</div>
</div>

<div class="card">
  <h3>👓 Glaucoma — pressure kills the optic nerve</h3>
  <p class="why-chain"><b>Mechanism:</b> aqueous humor can't drain → intraocular pressure (IOP) rises → pressure damages the <b>optic nerve</b> → vision lost from the <b>periphery inward</b> (tunnel vision). Normal IOP = <b>10–21 mmHg</b>.</p>
  <table class="lab">
    <tr><th></th><th>Open-angle (common)</th><th>Angle-closure (emergency)</th></tr>
    <tr><td><b>Onset</b></td><td>Gradual, painless</td><td>SUDDEN</td></tr>
    <tr><td><b>Symptoms</b></td><td>Peripheral vision loss (tunnel vision), halos; often silent early</td><td>Severe eye pain, headache, halos, nausea/vomiting, blurred vision, rock-hard eye, fixed pupil</td></tr>
    <tr><td><b>Priority</b></td><td>Lifelong drops to lower IOP</td><td><b>MEDICAL EMERGENCY</b> — treat immediately to save sight</td></tr>
  </table>
  <ul class="clean">
    <li><b>Treatment:</b> eye drops that lower IOP (reduce fluid production or improve drainage) — e.g., beta-blockers (timolol), prostaglandins, miotics.</li>
    <li><b>Lost vision is permanent</b> — treatment prevents further loss, doesn't restore it. So adherence to drops is critical.</li>
  </ul>
  <div class="hy">⭐ <b>Glaucoma = peripheral loss first (tunnel vision).</b> Contrast with macular degeneration = <b>central</b> vision loss. Casteel loves this contrast.</div>
</div>

<div class="card">
  <h3>🌫️ Cataracts — cloudy lens</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> the lens becomes opaque/cloudy → light can't pass through clearly.</li>
    <li><b>Key causes to know:</b> <b>aging (#1 cause)</b>, <b>eye injury/trauma</b>, <b>diabetes</b> (glucose alters lens proteins), and <b>beta-blocker use</b>.</li>
    <li><b>Symptoms:</b> painless, gradual <b>blurred/hazy vision, glare, halos around lights, difficulty at night</b>, faded colors.</li>
    <li><b>Treatment:</b> surgical lens removal + intraocular lens implant (only real fix).</li>
    <li><b>Post-op teaching:</b> avoid bending, lifting, straining, coughing (raises IOP); wear eye shield especially at night; report sudden pain or vision changes (could signal complication).</li>
  </ul>
</div>

<div class="card">
  <h3>👁️ Two more to know</h3>
  <ul class="clean">
    <li><b>Macular degeneration (AMD):</b> loss of <b>CENTRAL</b> vision (opposite of glaucoma); peripheral stays. Uses the <b>Amsler grid</b> to monitor (report wavy/distorted lines). Leading cause of vision loss in older adults.</li>
    <li><b>Retinal detachment:</b> the retina peels away → <b>sudden floaters, flashes of light, "curtain" coming down over vision</b>. This is an <b>emergency</b> — needs prompt surgery to save vision.</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Glaucoma = Gone from the sides. Macular = Missing the middle."</div></div>
</div>

<div id="quiz-eye"></div>
`;

renderQuiz('quiz-eye',[
  {q:'A patient with open-angle glaucoma has 20/20 vision on a standard eye chart but reports bumping into objects on either side of them. What does this presentation MOST likely represent?',type:'single',
   opts:['A. Early macular degeneration, since visual disturbances are common in both conditions','B. Progressive peripheral (tunnel) vision loss from optic nerve damage, which can occur despite preserved central acuity','C. A normal age-related change requiring no further evaluation','D. Early cataract formation affecting the patient\'s depth perception'],correct:1,
   rat:'The trap: A misapplies a macular-degeneration pattern (central loss) to this scenario, and C dismisses a genuine warning sign. Open-angle glaucoma classically preserves central acuity (a normal eye chart result) while gradually destroying peripheral vision — bumping into objects on the sides while reading fine print normally is a hallmark presentation, not something to overlook.'},

  {q:'A patient suddenly develops severe unilateral eye pain, blurred vision, halos around lights, nausea, and vomiting. On exam, the eye is red and firm to palpation. What is the PRIORITY nursing action?',type:'single',
   opts:['A. Reassure the patient this is a typical cataract symptom and schedule outpatient follow-up','B. Recognize this as a possible acute angle-closure glaucoma emergency and notify the provider immediately for urgent IOP-lowering treatment','C. Administer an antiemetic for the nausea and reassess in several hours','D. Apply a warm compress and dim the lighting to reduce the halos'],correct:1,
   rat:'The trap: A minimizes an emergency as routine, and C and D both treat individual symptoms (nausea, light sensitivity) while missing the underlying crisis. This combination — sudden severe pain, halos, nausea, and a firm globe — is the classic presentation of acute angle-closure glaucoma, which threatens permanent vision loss within hours without emergency treatment.'},

  {q:'A patient describes gradually worsening night-driving difficulty, glare around headlights, and colors that seem "washed out," but denies any pain. Which findings support a diagnosis of cataracts rather than glaucoma? (Select all that apply)',type:'multi',
   opts:['A. Painless, gradual onset of symptoms over months to years','B. Glare and halos that are worse in low light/at night','C. Sudden onset of severe eye pain and nausea','D. Fading or yellowing of colors','E. Progressive loss of peripheral vision with preserved central acuity'],correct:[0,1,3],
   rat:'The traps: C describes acute angle-closure glaucoma, and E describes chronic open-angle glaucoma — both real conditions, but neither is a cataract feature. Cataracts are defined by painless, gradual lens clouding causing glare, night-vision difficulty, and color fading, without pain or the specific peripheral-vision pattern of glaucoma.'},

  {q:'A patient is being discharged one day after cataract surgery. Which statement by the patient indicates a need for further teaching?',type:'single',
   opts:['A. "I\'ll wear my protective shield at night for the next week."','B. "I\'ll avoid bending over or lifting anything heavy for a while."','C. "I plan to do some light gardening tomorrow since I feel fine."','D. "I\'ll call the office right away if I get sudden eye pain or vision changes."'],correct:2,
   rat:'The trap: this statement (C) sounds reasonable if the patient "feels fine," but bending over for gardening raises intraocular pressure and risks disrupting the healing surgical site — exactly the activity that should be avoided regardless of how the patient currently feels. The other three statements reflect correct post-op teaching.'},

  {q:'Two patients report chronic, painless vision changes. Patient A says straight lines on a page now look wavy, with a blurry spot in the center of their vision. Patient B says they\'ve been missing objects to the side while their central reading vision remains sharp. Which statement correctly matches each patient to their likely condition?',type:'single',
   opts:['A. Patient A has glaucoma (central loss); Patient B has macular degeneration (peripheral loss)','B. Patient A has macular degeneration (central vision loss, wavy lines from macular involvement); Patient B has glaucoma (peripheral vision loss from optic nerve damage)','C. Both patients have the same condition, since both describe chronic painless vision changes','D. Patient A has a cataract; Patient B has a retinal detachment'],correct:1,
   rat:'The trap: A reverses the correct pairing (a common memorization error), and C ignores the clearly opposite patterns described. Central distortion/blank spot = macular degeneration (damage to the retina\'s central structure); peripheral loss with preserved central vision = glaucoma (optic nerve compressed from the outside in) — matching each symptom pattern to its specific mechanism is the key skill.'},

  {q:'A patient can read the newspaper without any trouble but says road signs and faraway objects have looked blurry for years. Which refractive error does this describe, and what is the actual mechanism?',type:'single',
   opts:['A. Hyperopia — light focuses behind the retina because the eyeball is too short','B. Myopia — light focuses in front of the retina because the eyeball is too long or the cornea is too curved','C. Astigmatism — an irregular corneal curvature causing blur at every distance','D. Presbyopia — age-related stiffening of the lens limiting accommodation for near vision'],correct:1,
   rat:'The trap: A describes the opposite refractive pattern (hyperopia = clear distance, blurry near — the reverse of this patient), C describes blur at ALL distances rather than just far, and D describes a NEAR-vision problem, not a distance one. Clear near vision with blurry distance vision, from an eyeball that\'s too long or a cornea that\'s too curved, is myopia — light focuses short of the retina instead of on it.'},

  {q:'A 45-year-old with no prior vision problems says they suddenly need to hold their phone at arm\'s length to read text clearly, though distance vision is unaffected. What is the BEST explanation?',type:'single',
   opts:['A. This is early cataract formation and should be treated as an urgent referral','B. This is presbyopia — age-related stiffening of the lens that limits its ability to accommodate for near objects','C. This is myopia developing for the first time in adulthood','D. This indicates early open-angle glaucoma affecting central vision'],correct:1,
   rat:'The trap: A escalates a normal age-related change into an urgent diagnosis, C misapplies a distance-vision problem to a near-vision complaint, and D describes a peripheral, not near-vision, condition. Losing near-focus ability specifically around age 40+, with distance vision intact, is the classic presentation of presbyopia — the lens has stiffened and can no longer accommodate for close objects.'},

  {q:'A nurse shines a penlight into a patient\'s right eye only. Both the right AND left pupils constrict. What does the constriction of the LEFT pupil specifically demonstrate?',type:'single',
   opts:['A. A direct pupillary response in the left eye','B. A consensual pupillary response, since the left pupil reacted without being directly exposed to the light','C. Mydriasis of the left eye','D. An abnormal finding requiring immediate provider notification'],correct:1,
   rat:'The trap: A misapplies "direct" to the wrong eye (direct response describes the SAME eye the light was shone into — that would be the right pupil\'s reaction). C confuses mydriasis (dilation) with what is actually happening (constriction). D treats a completely normal, expected neurological finding as abnormal. The unlit eye constricting in response to light shone in the other eye is the definition of a consensual response — and it is NORMAL.'},

  {q:'Which of the following is the correct definition of mydriasis?',type:'single',
   opts:['A. Pupil constriction, often from opioids or bright light','B. Pupil dilation, often from anticholinergic medications, dim light, or a sympathetic response','C. The pupil reacting in the opposite eye from where light was shone','D. A fixed, non-reactive pupil unrelated to light exposure'],correct:1,
   rat:'The trap: A describes miosis, the opposite term. C describes the consensual response, a completely different concept (direction of change vs. which eye is tested). D describes a fixed pupil, which is its own distinct abnormal finding. Mydriasis specifically means pupil DILATION — from anticholinergics, dim light, or sympathetic ("fight or flight") activation.'},

  {q:'A patient\'s visual acuity is documented as 20/50 in the right eye. What does this finding actually mean?',type:'single',
   opts:['A. The patient can see at 50 feet what a person with normal vision sees at 20 feet — better than average vision','B. The patient can see at 20 feet what a person with normal vision can see at 50 feet — worse than normal vision','C. The patient has a 20% chance of having normal vision in that eye','D. The patient\'s vision will improve to 20/50 within 50 days without intervention'],correct:1,
   rat:'The trap: A reverses which number represents the patient vs. the normal-vision comparison, C invents a percentage interpretation that isn\'t how the fraction works at all, and D fabricates a timeline with no basis. The top number is always the fixed 20-foot testing distance; the bottom number is how far away someone with NORMAL vision could read that same line — a bigger bottom number always means WORSE acuity, since the patient has to be closer than a normal-sighted person would need to be.'},

  {q:'Which of the following are recognized causes of cataracts? (Select all that apply)',type:'multi',
   opts:['A. Aging','B. Eye injury/trauma','C. Diabetes mellitus','D. Beta-blocker use','E. Retinal detachment'],correct:[0,1,2,3],
   rat:'The trap: retinal detachment (E) is its own separate, unrelated eye emergency — it doesn\'t cause cataracts. Aging (the most common cause), eye trauma, diabetes (glucose alters lens proteins), and beta-blocker use are all recognized causes of cataract formation.'},

  {q:'A client is 1 day post-op following trabeculectomy surgery for open-angle glaucoma. Which finding should the nurse report to the surgeon IMMEDIATELY?',type:'single',
   opts:['A. Mild eye discomfort rated 2/10 that improves with prescribed acetaminophen','B. Sudden, severe eye pain accompanied by nausea and a noticeable decrease in vision','C. Slight redness at the surgical site with minimal serous drainage','D. Mild itching around the eye shield'],correct:1,
   rat:'The trap: A, C, and D all describe expected, minor post-operative findings that don\'t require urgent escalation. Sudden severe pain with nausea and a vision change after eye surgery can indicate a serious complication such as increased IOP, hemorrhage, or infection — this combination requires immediate provider notification, unlike the mild, expected findings in the other options.'},

],'Eye & Vision Check');

<h2 class="sec-title"><span class="sec-emoji">👂</span> Ear & Hearing</h2>
<p class="intro-line">Ménière's disease is the star here. Also know conductive vs sensorineural hearing loss and basic ear safety.</p>

<div class="card" style="border-color:var(--teal)">
  <h3>🌀 Ménière's Disease — the triad</h3>
  <p class="why-chain"><b>Mechanism:</b> too much fluid (endolymph) builds up in the inner ear → pressure disrupts the balance and hearing organs.</p>
  <p><b>The classic TRIAD (know these three):</b></p>
  <ul class="clean">
    <li><b>1. Episodic vertigo</b> — severe spinning (the worst symptom); lasts minutes to hours, often with nausea/vomiting.</li>
    <li><b>2. Tinnitus</b> — ringing/roaring in the ear.</li>
    <li><b>3. Fluctuating sensorineural hearing loss</b> — comes and goes.</li>
    <li>Plus a feeling of <b>fullness/pressure</b> in the ear.</li>
  </ul>
  <p><b>Management:</b></p>
  <ul class="clean">
    <li><b>Low-sodium diet (&lt;2000 mg/day) + diuretics</b> — reduce the fluid/pressure (this is the mechanism-based key).</li>
    <li>Meds for attacks: antihistamines (meclizine) and antiemetics for nausea/vertigo; diazepam for severe vertigo.</li>
    <li><b>Safety during an attack:</b> lie still in a quiet, dark room; help prevent falls; move slowly.</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Ménière's = the spinning Triad: Vertigo + Tinnitus + Hearing loss. Fix it with LOW SALT."</div></div>
</div>

<div class="card">
  <h3>🔊 Conductive vs Sensorineural hearing loss</h3>
  <table class="lab">
    <tr><th></th><th>Conductive</th><th>Sensorineural</th></tr>
    <tr><td><b>Problem</b></td><td>Sound can't get IN (outer/middle ear)</td><td>Nerve/cochlea damage (inner ear)</td></tr>
    <tr><td><b>Causes</b></td><td>Earwax, fluid, otitis media, perforated drum</td><td>Aging (presbycusis), noise, ototoxic drugs, Ménière's</td></tr>
    <tr><td><b>Reversible?</b></td><td>Often (remove the blockage)</td><td>Usually permanent</td></tr>
  </table>
  <ul class="clean">
    <li><b>Presbycusis</b> — age-related sensorineural loss; high-frequency sounds go first.</li>
    <li><b>Ototoxic drugs</b> (can damage hearing): aminoglycosides, loop diuretics (furosemide), high-dose aspirin, some chemo — monitor for tinnitus/hearing changes.</li>
  </ul>
</div>

<div class="card">
  <h3>👂 Otitis & ear safety basics</h3>
  <ul class="clean">
    <li><b>Otitis externa</b> ("swimmer's ear") — infection of the ear canal from trapped water/trauma → pain (worse with tug on the ear), discharge, itching.</li>
    <li><b>Communication with hearing loss:</b> face the person, speak clearly at normal-to-slightly-slower pace, reduce background noise, don't shout (distorts sound), use gestures/writing.</li>
    <li>Never insert objects (or cotton swabs) into the ear canal.</li>
  </ul>
</div>

<div id="quiz-ear"></div>
`;

  {q:'A patient describes recurrent episodes of severe spinning sensations lasting up to an hour, accompanied by ringing in the ear and hearing that seems to worsen during attacks then partially improve afterward. Which condition does this presentation MOST likely represent?',type:'single',
