<script>
document.getElementById('sec-decoder').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🩺</span> Disorder Decoder</h2>
<p class="intro-line">Casteel's framework — every Unit 3 disorder in Cause → Manifests → Treatment. Quick reference before the exam.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>🗝️ The 3-question key (use it on every disorder)</h3>
  <ul class="clean">
    <li><b>1. Cause / pathophysiology</b> — what's physically going wrong? (This explains everything else.)</li>
    <li><b>2. Manifestations</b> — what will you SEE, HEAR, and what will the patient FEEL/REPORT? (signs + symptoms)</li>
    <li><b>3. Treatment</b> — meds, nursing interventions, priorities, and patient teaching.</li>
  </ul>
  <div class="mnem"><div class="tag">🧠 Mnemonic</div><div class="big">"Cause → Clues → Cure"</div><div class="exp">Why it happens → how it shows up → what we do about it.</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🩸 Type 1 Diabetes</h3>
  <p><b>Cause:</b> <b>autoimmune T-cell attack destroys the pancreatic beta cells</b> that make insulin. Genetic predisposition + a triggering event (often viral) is suspected. By the time symptoms appear, <b>~80-90% of beta cells are already gone</b>. Absolute insulin deficiency — the pancreas makes essentially <b>ZERO insulin</b>.</p>
  <p><b>Manifests:</b> rapid onset, often in childhood/young adulthood. Classic <b>3 P's (polyuria, polydipsia, polyphagia)</b> PLUS <b>unexplained weight loss despite eating more</b> (cells can't use the glucose, so the body breaks down fat/muscle instead). Fatigue, blurred vision. Diagnostic: <b>fasting glucose ≥126 mg/dL, random ≥200 mg/dL with symptoms, A1C ≥6.5%</b>. May present in <b>DKA as the FIRST sign of diagnosis</b>.</p>
  <p><b>Treatment:</b> <b>lifelong exogenous insulin</b> — no oral agents work (there's no residual insulin production to stimulate). Typically <b>basal-bolus regimen</b>: long-acting (glargine) once daily + rapid-acting (lispro/aspart) with meals, or an insulin pump. Carb counting, frequent glucose monitoring (4+ times/day), rotate injection sites to prevent lipohypertrophy.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🩸 Type 2 Diabetes</h3>
  <p><b>Cause:</b> two-part mechanism — (1) <b>insulin resistance</b>: cells (especially muscle/fat/liver) stop responding normally to insulin, so glucose can't get in despite insulin being present; (2) the pancreas compensates by secreting MORE insulin, but <b>beta-cell function gradually declines over years</b> until it can no longer keep up. Strongly linked to <b>obesity, sedentary lifestyle, age >45, family history, and metabolic syndrome</b>.</p>
  <p><b>Manifests:</b> <b>gradual onset over years</b> — often asymptomatic or mild (fatigue, blurred vision, slow-healing cuts, recurrent yeast/UTI infections) until caught on routine labs or a complication appears. Same diagnostic numbers as Type 1 (FPG ≥126, A1C ≥6.5%, random ≥200 with symptoms). Because onset is silent, <b>many patients already have microvascular damage AT diagnosis</b>.</p>
  <p><b>Treatment:</b> stepwise — lifestyle changes (weight loss, diet, exercise) first; <b>metformin is first-line pharmacologic therapy</b> (decreases hepatic glucose production, improves insulin sensitivity, does NOT cause hypoglycemia alone). If A1C goal not met, add a second agent: SGLT-2 inhibitor, GLP-1 agonist, sulfonylurea, or DPP-4 inhibitor. Insulin may eventually be needed as beta-cell function declines further. <b>Hold metformin 24-48 hrs around IV contrast</b> (lactic acidosis risk with reduced renal clearance).</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>🚨 DKA (Diabetic Ketoacidosis)</h3>
  <p><b>Cause:</b> <b>near-total insulin deficiency (classically Type 1 diabetes)</b> — usually precipitated by missed insulin doses, new-onset undiagnosed Type 1, infection/illness, or physiologic stress (surgery, MI). Without insulin, cells can't use glucose, so the body shifts to breaking down fat for fuel → free fatty acids converted to <b>ketone bodies</b> (acetone, acetoacetate, beta-hydroxybutyrate) → these are ACIDS → <b>metabolic acidosis with an elevated anion gap</b>.</p>
  <p><b>Manifests:</b> glucose typically <b>>250 mg/dL</b> (can be higher), arterial <b>pH <7.3</b>, serum <b>bicarbonate <18 mEq/L</b>, positive serum/urine ketones. <b>Kussmaul respirations</b> (deep, rapid — blowing off CO₂ to compensate for the acidosis), <b>fruity/acetone breath odor</b>. Severe dehydration from osmotic diuresis: dry mucous membranes, poor skin turgor, tachycardia, hypotension. N/V, abdominal pain (can mimic an acute abdomen), altered mental status as it progresses. Onset over hours to ~1 day.</p>
  <p><b>Treatment:</b> (1) <b>IV isotonic fluids (0.9% NS) FIRST</b> to correct volume depletion; (2) <b>IV regular insulin drip (the ONLY insulin given IV)</b> to stop ketone production and lower glucose; (3) monitor potassium closely — acidosis pushes K⁺ out of cells so serum levels look falsely normal/high initially, but total body K⁺ is depleted, and insulin therapy will drive it back into cells, dropping serum levels fast — replace once urine output is confirmed and K⁺ is <5.0-5.2; (4) <b>add dextrose once glucose reaches ~200-250 mg/dL</b> so insulin can keep running (clearing ketones) without causing hypoglycemia. Continuous ECG and hourly glucose checks.</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>💧 HHS (Hyperosmolar Hyperglycemic Syndrome)</h3>
  <p><b>Cause:</b> <b>occurs almost exclusively in Type 2 diabetes</b> — these patients are still <b>producing insulin</b>, but their cells are <b>resistant to it</b>, so glucose can't be pulled into cells and instead stays/builds up in the blood. That same circulating insulin, however, usually only needs to be present in small amounts to keep the liver from breaking down fat — so it's <b>enough to suppress fat breakdown/ketone production, but not enough to overcome the resistance and control glucose</b>. Usually triggered by infection (especially pneumonia/UTI), inadequate fluid intake (common in older adults with impaired thirst response), or a new medication (steroids, diuretics). Develops <b>much more slowly than DKA — over days</b>.</p>
  <p><b>Manifests:</b> glucose extremely high, often <b>>600 mg/dL</b> and sometimes >1000. Serum <b>osmolality markedly elevated (>320 mOsm/kg)</b>. Blood <b>pH stays near-normal (>7.3)</b>, bicarbonate near-normal, <b>ketones absent or minimal — NO Kussmaul breathing, NO fruity breath</b> (this is the key differentiator from DKA). Profound dehydration is the dominant feature: severe hypotension, tachycardia, and neurologic changes ranging from confusion to seizures to coma (from the extreme hyperosmolality itself, not from acidosis).</p>
  <p><b>Treatment:</b> <b>aggressive IV fluid replacement is the TOP priority</b> (fluid deficits are often larger than in DKA) — typically starts with 0.9% NS, may switch to 0.45% NS once hemodynamically stable, then add dextrose once glucose approaches ~250-300. Lower-dose insulin drip than DKA (fluids alone often drop glucose significantly). Correct electrolytes. Watch closely for fluid overload in older patients with cardiac/renal history. <b>Mortality is HIGHER than DKA</b> due to the degree of dehydration and comorbidities in the typical (older, Type 2) patient.</p>
</div>
<div class="card" style="border-color:var(--amber)">
  <h3>📉 Hypoglycemia</h3>
  <p><b>Cause:</b> <b>glucose <70 mg/dL</b> — from too much insulin/sulfonylurea relative to intake, a skipped or delayed meal after rapid-acting insulin, increased/unplanned exercise, alcohol without food (blocks gluconeogenesis), or insulin peak-timing errors.</p>
  <p><b>Manifests in 2 stages:</b> <b>Adrenergic (mild, glucose ~54-70):</b> the sympathetic nervous system fires first — diaphoresis, tremor, tachycardia, palpitations, hunger, anxiety. <b>Neuroglycopenic (worse, <54):</b> the brain itself is starved of fuel — confusion, headache, slurred speech, visual disturbance, irritability, poor coordination, progressing to seizures and loss of consciousness if untreated. <b>Autonomic neuropathy can blunt/eliminate the adrenergic warning stage</b> ("hypoglycemia unawareness"), so the patient goes straight to neuro symptoms.</p>
  <p><b>Treatment:</b> conscious + able to swallow → <b>Rule of 15</b>: 15 g fast-acting carbohydrate (4 oz juice, glucose tablets), recheck glucose in 15 minutes, repeat if still <70, then follow with a protein/complex-carb snack. <b>Unconscious or unable to swallow → NEVER give anything by mouth</b> (aspiration risk) — give <b>glucagon 1 mg IM/SubQ/intranasal</b> (mobilizes stored liver glycogen) or, with IV access in a facility, IV dextrose (D50). May take up to 20 minutes to regain consciousness after glucagon.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🛏️ Pressure Injury</h3>
  <p><b>Cause:</b> unrelieved external pressure (usually over a bony prominence) compresses capillaries against the underlying bone → local blood flow stops → <b>tissue hypoxia and cell death</b>. Shear (tissue layers sliding, e.g., sliding down in bed) and friction accelerate damage; moisture (incontinence) and poor nutrition (low albumin) impair skin integrity and healing.</p>
  <p><b>Manifests (staged by depth):</b> <b>Stage 1</b> — intact skin, non-blanchable redness. <b>Stage 2</b> — partial-thickness loss, shallow open ulcer or intact/ruptured blister, no slough. <b>Stage 3</b> — full-thickness loss, subcutaneous fat visible, no bone/tendon/muscle exposed. <b>Stage 4</b> — full-thickness with bone, tendon, or muscle exposed. <b>Unstageable</b> — base obscured by slough/eschar (depth can't be determined until debrided). <b>Deep tissue injury</b> — intact or non-intact skin with a localized area of persistent, non-blanchable deep red/maroon/purple discoloration or blood-filled blister (damage is happening below the surface).</p>
  <p><b>Treatment:</b> <b>reposition at least every 2 hours in bed (every 15 minutes if in a wheelchair)</b>, use pressure-redistribution surfaces, keep skin clean/dry, optimize protein/caloric intake (<b>albumin <3 g/dL impairs healing</b>), <b>NEVER massage a reddened area</b> (ruptures already-fragile capillaries). Moist wound healing environment for open wounds; autolytic, mechanical, sharp, or surgical debridement to remove dead tissue as appropriate. Braden Scale used to assess and score ongoing risk.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>👓 Glaucoma</h3>
  <p><b>Cause:</b> aqueous humor is continuously produced inside the eye and must drain through the trabecular meshwork/canal of Schlemm. <b>Open-angle (most common, ~90%):</b> the drainage angle is anatomically open but drains too slowly — pressure builds gradually over years. <b>Angle-closure:</b> the iris physically blocks the drainage angle — pressure spikes suddenly and severely.</p>
  <p><b>Manifests:</b> normal <b>IOP = 10-21 mmHg</b>. <b>Open-angle</b> — gradual, <b>PAINLESS peripheral (tunnel) vision loss</b> as the optic nerve is compressed from the outside in; often not noticed until significant loss has occurred, sometimes found incidentally on routine eye exam. <b>Angle-closure</b> — <b>sudden severe eye pain, blurred vision, halos around lights, nausea/vomiting, a red eye, and a firm/hard globe</b> on palpation — a true ophthalmic EMERGENCY.</p>
  <p><b>Treatment:</b> open-angle — lifelong topical drops to lower IOP (prostaglandin analogs like latanoprost increase outflow; beta-blockers like timolol decrease production), sometimes laser trabeculoplasty or surgery; <b>lost vision is PERMANENT</b>, so the goal is preventing further loss. Angle-closure — <b>emergency IOP-lowering medications</b> (IV/oral) followed by laser iridotomy; treat as a same-day emergency, not a routine follow-up.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🌫️ Cataracts</h3>
  <p><b>Cause:</b> progressive clouding/opacification of the normally clear crystalline lens — from <b>aging (most common)</b>, UV exposure, <b>diabetes</b> (glucose alters lens proteins), steroid use, <b>beta-blocker use</b>, or <b>eye trauma/injury</b>. Light can no longer pass through and focus cleanly on the retina.</p>
  <p><b>Manifests:</b> <b>painless</b>, progressive blurry/hazy vision, increased glare and halos around lights (worse at night with a dilated pupil letting in more scattered light), difficulty with night driving, and colors appearing faded/yellowed. <b>No sudden pain, no redness</b> — a purely gradual, mechanical lens problem.</p>
  <p><b>Treatment:</b> the <b>ONLY definitive treatment is surgical removal of the cloudy lens with intraocular lens implant</b> (typically outpatient). Post-op teaching: <b>avoid bending, heavy lifting, and straining</b> (raises IOP and risks disrupting the healing incision), don't rub the eye, use prescribed antibiotic/steroid drops, wear the protective shield at night, and <b>report sudden pain, vision loss, or increased redness immediately</b> (signs of infection or hemorrhage).</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🌀 Ménière's Disease</h3>
  <p><b>Cause:</b> <b>excess endolymphatic fluid</b> builds up within the inner ear's membranous labyrinth (endolymphatic hydrops), distorting both the balance (vestibular) and hearing (cochlear) structures. Exact cause often unclear; linked to fluid/sodium retention.</p>
  <p><b>Manifests as a classic triad</b> occurring in unpredictable episodic attacks: <b>episodic vertigo</b> (severe spinning, can last 20 min-several hours — the most disabling symptom), <b>tinnitus</b> (ringing/roaring), and <b>fluctuating sensorineural hearing loss</b> (often low-frequency, may partially recover between attacks then worsen permanently over years); plus a sensation of aural fullness/pressure. Attacks can be triggered by high sodium intake, caffeine, alcohol, or stress.</p>
  <p><b>Treatment:</b> <b>low-sodium diet (major cornerstone) + diuretics</b> to reduce endolymph volume/pressure; antiemetics and antihistamines/anticholinergics (e.g., meclizine) for acute attack symptoms. During an attack — priority is <b>FALL SAFETY</b>: have the patient lie still in a quiet, dark room and avoid sudden head movement. Severe/refractory cases may need intratympanic injections or surgical intervention (labyrinthectomy = last resort, sacrifices hearing in that ear).</p>
</div>
<div class="card" style="border-color:var(--amber)">
  <h3>⚠️ Metabolic Syndrome</h3>
  <p><b>Cause:</b> chronic insulin resistance and hyperinsulinemia driven by visceral (central) obesity and sedentary lifestyle — a <b>cluster of risk factors, NOT a disease or diabetes complication itself</b>. Diagnosed when a patient has <b>3 or more</b> of the specific criteria below.</p>
  <p><b>Manifests (diagnostic criteria — need ≥3):</b> <b>central/abdominal obesity (waist circumference >40 in men, >35 in women)</b>; <b>blood pressure ≥130/85 mmHg</b>; <b>fasting triglycerides ≥150 mg/dL</b>; <b>HDL <40 mg/dL (men) or <50 mg/dL (women)</b>; <b>fasting glucose ≥100 mg/dL</b>. The combination dramatically raises risk for both Type 2 diabetes AND cardiovascular disease/stroke — more than any single factor alone.</p>
  <p><b>Treatment:</b> <b>lifestyle modification is first-line and can fully reverse it</b> — weight loss (even 5-10% of body weight helps significantly), regular exercise, reduced saturated fat/sodium/refined sugar intake. Pharmacologic treatment of individual components (antihypertensives, statins, metformin for prediabetes) if lifestyle changes alone aren't sufficient.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🧬 LADA & Gestational Diabetes</h3>
  <p><b>Cause — LADA ("Type 1.5"):</b> <b>autoimmune beta-cell destruction</b> identical in mechanism to Type 1, but progressing much more slowly, so it presents in adulthood and initially spares enough insulin production to respond to oral agents. <b>Cause — Gestational:</b> <b>placental hormones</b> (human placental lactogen, cortisol, progesterone) cause insulin resistance that the mother's pancreas can't fully overcome, usually appearing in the 2nd-3rd trimester.</p>
  <p><b>Manifests — LADA:</b> initially resembles Type 2 (adult onset, responds to metformin) but <b>confirmed by positive islet cell/GAD antibodies</b>; typically progresses to insulin dependence within a few years — faster than typical Type 2. <b>Manifests — Gestational:</b> usually asymptomatic, caught on routine <b>24-28 week glucose screening</b> (1-hr glucose tolerance test); risk factors include obesity, prior gestational diabetes, and a larger-than-average fetus (macrosomia) on ultrasound.</p>
  <p><b>Treatment — LADA:</b> <b>insulin is typically started earlier</b> than in classic Type 2, since oral agents lose effectiveness faster as beta-cell function keeps declining. <b>Treatment — Gestational:</b> diet/exercise first-line; <b>insulin if glucose targets aren't met</b> (oral agents like metformin/glyburide used more selectively — insulin is preferred in pregnancy); usually resolves after delivery but the mother needs <b>postpartum glucose testing</b> and carries a significantly elevated lifetime risk of developing Type 2 diabetes.</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>🦶 Diabetic Foot Ulcer</h3>
  <p><b>Cause:</b> a <b>three-hit combination</b> unique to diabetes — (1) <b>peripheral neuropathy</b> removes protective sensation so injury goes unfelt, (2) <b>peripheral vascular disease</b>/microvascular damage impairs blood flow so wounds can't heal normally, (3) <b>chronic hyperglycemia</b> impairs white blood cell function and feeds bacterial growth. A minor unnoticed injury (blister, cut, ingrown nail) becomes a chronic non-healing wound.</p>
  <p><b>Manifests:</b> typically <b>painless</b> (due to neuropathy) despite significant tissue damage — often first noticed as drainage, odor, or a family member spotting it. Poor granulation tissue, slow/absent healing, surrounding redness/warmth/swelling if infected, possible exposed deeper tissue in advanced cases. Often located over pressure points (plantar surface, under the great toe, heel).</p>
  <p><b>Treatment:</b> <b>daily self-inspection (mirror for soles)</b> to catch injuries before they progress; <b>strict glucose control</b> (the root cause enabler); offloading pressure from the wound (special footwear, total contact casting); wound debridement and moisture-balanced dressings; treat any infection promptly (may require IV antibiotics or surgical debridement); vascular referral if circulation is severely impaired. <b>Untreated, progresses to osteomyelitis and risks amputation</b>.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🎯 Macular Degeneration</h3>
  <p><b>Cause:</b> degeneration specifically of the <b>macula</b> — the small central portion of the retina responsible for sharp, detailed vision (reading, faces, fine detail). <b>Dry form (~90%):</b> gradual thinning/atrophy of macular tissue with drusen (yellow deposits) accumulation. <b>Wet form (~10%, more severe/rapid):</b> abnormal, fragile blood vessels grow under the retina and leak fluid/blood.</p>
  <p><b>Manifests:</b> <b>painless loss of CENTRAL vision specifically</b> — straight lines appear wavy or distorted (a hallmark early sign, tested with an Amsler grid), a blurry or blank spot develops in the center of the visual field, faces become hard to recognize. <b>Peripheral vision is preserved</b> — the EXACT OPPOSITE pattern from glaucoma, which is a frequent exam contrast point.</p>
  <p><b>Treatment:</b> dry form — no cure; AREDS2 vitamin formulations (vitamin C/E, zinc, copper, lutein/zeaxanthin) may slow progression; low-vision aids and adaptive devices. Wet form — <b>anti-VEGF intravitreal injections</b> (e.g., bevacizumab, ranibizumab) can slow or partially reverse vision loss by stopping the abnormal vessel growth; needs ongoing periodic injections. <b>Amsler grid used at home for self-monitoring</b> between visits.</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>💥 Retinal Detachment</h3>
  <p><b>Cause:</b> the retina (light-sensing layer) <b>tears and separates from the underlying choroid</b>, which supplies its blood and oxygen. Risk factors: severe myopia, previous eye surgery/trauma, aging (vitreous shrinkage pulls on the retina).</p>
  <p><b>Manifests:</b> <b>sudden onset of flashes of light (photopsia) and a shower of new floaters</b> as the vitreous tugs on the retina during the tear, followed by a <b>dark curtain or shadow progressively covering part of the visual field</b> as more retina detaches. Painless. This progression (<b>flashes → floaters → curtain</b>) is the classic symptom sequence tested on exams.</p>
  <p><b>Treatment:</b> true ophthalmic <b>surgical EMERGENCY</b> — options include pneumatic retinopexy, scleral buckle, or vitrectomy to reattach the retina, ideally within hours to a few days. Because detached retinal tissue without blood supply will die and vision loss becomes <b>PERMANENT</b>, patient teaching emphasizes <b>seeking care IMMEDIATELY</b> for these symptoms rather than waiting for a routine appointment.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>👂 Conductive vs. Sensorineural Hearing Loss</h3>
  <p><b>Cause — Conductive:</b> a <b>mechanical blockage</b> prevents sound from traveling through the outer or middle ear to reach the inner ear — cerumen impaction, otitis media with effusion, perforated tympanic membrane, otosclerosis. <b>Cause — Sensorineural:</b> <b>damage to the cochlea's hair cells or the auditory (CN VIII) nerve</b> itself — presbycusis (age-related, high frequencies first), prolonged noise exposure, ototoxic medications (aminoglycosides, loop diuretics like furosemide, high-dose aspirin/salicylates, some chemotherapy agents), or acoustic neuroma.</p>
  <p><b>Manifests:</b> conductive loss often affects all frequencies more uniformly and may include a sensation of ear fullness/blockage; <b>typically reversible once the obstruction is treated</b>. Sensorineural loss classically affects <b>HIGH frequencies first</b> (difficulty with consonants/speech clarity in noisy environments), often accompanied by tinnitus, and <b>does NOT reverse once the hair cells/nerve are damaged</b>.</p>
  <p><b>Treatment — Conductive:</b> treat the underlying cause — cerumen removal/irrigation, antibiotics or myringotomy tubes for otitis media, surgical repair for otosclerosis/perforation. <b>Treatment — Sensorineural:</b> hearing aids (amplify sound to the damaged system) or cochlear implants for severe loss (bypass the damaged cochlea entirely) — <b>neither restores normal hearing</b>, they compensate for it. Nursing priority: <b>discontinue/report any ototoxic drug immediately</b> if new tinnitus or hearing changes are noticed, since that damage is preventable if caught early but permanent if not.</p>
</div>

renderQuiz('quiz-decoder',[
  {q:'A 38-year-old is newly diagnosed with diabetes. Labs show positive islet cell antibodies, but the patient initially responded to metformin alone and does not yet require insulin. Which explanation BEST fits this presentation?',type:'single',
   opts:['A. This is classic Type 1 diabetes — antibody-positive results always mean rapid insulin dependence','B. This is most consistent with LADA — autoimmune beta-cell destruction with a slower course than Type 1, often mistaken for Type 2 at first','C. This is Type 2 diabetes, and the antibody result should be repeated as a likely lab error','D. This is gestational diabetes, since the antibody response is triggered by hormonal changes'],correct:1,
   rat:'The trap is assuming antibody-positive automatically means classic Type 1 (which wouldn\'t respond to oral agents at all) or dismissing the antibody as an error. LADA is exactly this pattern: autoimmune, but slow enough to initially look and respond like Type 2.'},

  {q:'A nurse reviews two diabetic patients. Patient A: glucose 580 mg/dL, pH 7.22, serum bicarbonate 12 mEq/L, Kussmaul respirations, BP 96/58. Patient B: glucose 810 mg/dL, pH 7.36, serum bicarbonate 22 mEq/L, BP 88/50, profound lethargy. Which statement is TRUE?',type:'single',
   opts:['A. Patient A is in HHS because the glucose is lower than Patient B\'s','B. Patient B is in DKA because the glucose is higher than Patient A\'s','C. Patient A is in DKA (acidotic, low bicarbonate, Kussmaul breathing); Patient B is in HHS (near-normal pH, no significant acidosis despite the higher glucose)','D. Both patients have the same acute complication since both are hyperglycemic and hypotensive'],correct:2,
   rat:'The trap: glucose number alone does NOT determine DKA vs HHS — Patient B\'s glucose is actually higher. The deciding factor is the ACID picture: Patient A\'s low pH/bicarbonate/Kussmaul = DKA; Patient B\'s normal pH/bicarbonate despite extreme hyperglycemia = HHS. Never diagnose by glucose number alone.'},

  {q:'All of the following are appropriate actions for a hypoglycemic patient who is unconscious with no IV access EXCEPT:',type:'single',
   opts:['A. Positioning the patient to protect the airway','B. Administering glucagon IM or subcutaneously','C. Placing glucose gel inside the cheek so it can absorb through the mucosa','D. Notifying the provider and rechecking glucose after treatment'],correct:2,
   rat:'EXCEPT = the wrong action. Placing anything in the mouth of a patient who cannot safely swallow risks aspiration, regardless of where it\'s placed — an unconscious patient cannot reliably protect their airway. Glucagon is the correct route without IV access.'},

  {q:'A nurse is assessing four hospitalized diabetic patients during morning rounds. Which requires the nurse\'s attention FIRST?',type:'single',
   opts:['A. Blood glucose 210 mg/dL two hours after breakfast, patient asymptomatic','B. Blood glucose 58 mg/dL, patient diaphoretic and trembling, last insulin dose 45 minutes ago','C. Blood glucose 178 mg/dL, patient reports mild thirst','D. An A1C result of 7.8% reviewed during morning labs'],correct:1,
   rat:'The trap: several options look like they need attention, but only one is an acute, evolving emergency. A glucose of 58 with adrenergic symptoms and a recent insulin dose is actively dropping — this patient needs treatment now, not just documentation.'},

  {q:'A patient with new-onset peripheral neuropathy from diabetes has intact skin, no current wounds, but reports "my feet feel like they\'re wearing socks all the time." Which nursing diagnosis is the PRIORITY?',type:'single',
   opts:['A. Deficient knowledge related to the new diagnosis','B. Risk for injury related to decreased sensory perception in the lower extremities','C. Ineffective coping related to chronic illness','D. Disturbed body image related to altered sensation'],correct:1,
   rat:'The trap: "newly diagnosed" pulls toward a knowledge-deficit answer, but the physiological safety risk (unfelt injury → unnoticed ulcer → amputation) outranks a knowledge or psychosocial diagnosis on a Maslow-based priority question — even before any wound exists.'},

  {q:'Which of the following is NOT an appropriate discharge goal for a patient recovering from a first DKA episode caused by missed insulin doses during a stomach virus?',type:'single',
   opts:['A. Patient will verbalize the sick-day rule of never stopping insulin during illness','B. Patient will identify signs of hyperglycemia and ketosis that require provider notification','C. Patient will demonstrate correct glucose and ketone testing technique','D. Patient will stop checking blood glucose once the current illness resolves'],correct:3,
   rat:'NOT = the unsafe/incorrect goal. Glucose monitoring is a permanent part of diabetes management, not something tied to a single illness episode. The other three goals directly target the root cause of this admission and are realistic, measurable, and safe.'},

  {q:'A patient in DKA has orders for IV 0.9% NS, an IV regular insulin drip, and potassium replacement once levels are known. Initial labs show serum potassium of 5.6 mEq/L. What is the correct sequence of nursing actions?',type:'single',
   opts:['A. Start potassium replacement immediately since the level is already elevated, then start fluids and insulin','B. Start the insulin drip first, since lowering the dangerously high glucose is always the top priority','C. Start IV fluids first to correct the profound dehydration and circulatory volume, then start insulin, monitoring potassium closely as it will likely fall once insulin begins working','D. Hold all treatment until the potassium level normalizes on its own'],correct:2,
   rat:'The trap: an elevated initial potassium (5.6) looks like it needs immediate replacement, but in DKA that number is misleading — acidosis has pushed K⁺ out of cells while total body K⁺ is actually depleted. Fluids come first (profound dehydration), then insulin, while WATCHING potassium fall rather than replacing it prematurely.'},

  {q:'A nurse provided sick-day teaching to a Type 1 diabetic before discharge. Which statement by the patient indicates the teaching was UNSUCCESSFUL?',type:'single',

   rat:'UNSUCCESSFUL = the statement that reveals a misunderstanding. Statement C describes exactly the behavior that causes DKA — illness raises glucose independent of food intake, so insulin should never be stopped. The other three statements reflect correct sick-day teaching.'},

  {q:'A patient with Type 2 diabetes for 15 years is admitted with glucose 780 mg/dL, serum osmolality 340 mOsm/kg, pH 7.38, negative urine ketones, and profound lethargy. Family reports the patient has been unable to keep fluids down for three days due to a GI illness. What is the PRIORITY nursing intervention?',type:'single',
   opts:['A. Administer sodium bicarbonate to correct the underlying acidosis','B. Begin aggressive IV fluid replacement to correct the profound dehydration driving the hyperosmolar state','C. Withhold all fluids until an insulin drip has brought the glucose down to a safe range','D. Administer an oral rehydration solution since the patient can likely tolerate small sips'],correct:1,
   rat:'The vignette describes HHS: extreme hyperglycemia, high osmolality, normal pH, NO ketones. There is no acidosis to correct with bicarbonate (trap A), the patient explicitly cannot tolerate PO intake (trap D), and withholding fluids (trap C) ignores that dehydration — not glucose alone — is driving the crisis. Aggressive IV rehydration is the priority.'},

  {q:'A nurse is caring for a patient with both diabetic retinopathy and peripheral neuropathy. Which nursing actions are appropriate? (Select all that apply)',type:'multi',
   opts:['A. Encourage the patient to inspect their feet daily, using a mirror to check the soles','B. Recommend a heating pad on the feet at bedtime to improve circulation and comfort','C. Reinforce the importance of annual dilated eye exams','D. Explain that vision changes from retinopathy are usually painless and may go unnoticed until advanced','E. Instruct the patient to walk barefoot indoors so the feet can "breathe" between checks'],correct:[0,2,3],
   rat:'The traps (B and E) sound like reasonable comfort/self-care advice but are both contraindicated: a heating pad risks an unfelt burn from neuropathy, and walking barefoot risks an unfelt injury. Daily foot inspection, annual eye exams, and knowing retinopathy is painless are all correct teaching points.'},

  {q:'A patient asks the nurse to explain why their vision loss from macular degeneration is different from a family member\'s vision loss from glaucoma. Which explanation is correct?',type:'single',
   opts:['A. Both diseases cause identical vision loss patterns because they both involve the retina','B. Macular degeneration destroys central vision first because the macula is the retina\'s central detail-vision structure, while glaucoma destroys peripheral vision first from optic nerve compression at the edges','C. Macular degeneration is caused by high eye pressure, the same mechanism as glaucoma, just affecting a different area','D. Glaucoma causes painless central vision loss, while macular degeneration causes sudden painful peripheral loss'],correct:1,
   rat:'The trap pairing: both are chronic, painless, and progressive, which tempts a "they\'re basically the same" answer (A) or swapped mechanisms (C, D). The actual distinguishing mechanism is WHERE the damage starts — center-out for macular degeneration (macula = central retina) versus edges-in for glaucoma (optic nerve compression).'},

  {q:'A client with Type 2 diabetes for 10 years presents with a resting heart rate of 110 bpm that does not vary with position change or the Valsalva maneuver, along with early satiety and bloating after meals. What underlying process explains BOTH findings together?',type:'single',
   opts:['A. Coincidental, unrelated cardiac and GI conditions requiring separate unrelated workups','B. Diabetic autonomic neuropathy, which can affect both cardiac rate variability (a persistently fixed heart rate) and GI motility (gastroparesis, causing early satiety/bloating)','C. Acute DKA, since tachycardia and GI symptoms are both classic DKA findings','D. A normal, expected finding with no diabetes-related significance'],correct:1,
   rat:'The trap: A treats two related findings as coincidental separate problems, C misapplies an acute-crisis label to a chronic presentation, and D dismisses genuinely significant findings. Autonomic neuropathy is a single underlying process that can affect MULTIPLE organ systems — a fixed heart rate that doesn\'t respond normally to position/vagal maneuvers, and gastroparesis causing early satiety/bloating, are both downstream effects of the same autonomic nerve damage.'},

  {q:'A client with diabetic peripheral neuropathy and a history of a prior healed foot ulcer asks why their provider recommends custom orthotic shoe inserts even though they currently have no open wounds. What is the BEST explanation?',type:'single',
   opts:['A. Orthotics are purely a comfort measure with no relationship to future wound risk','B. Redistributing pressure away from prior ulcer sites and bony prominences reduces the risk of a new, unfelt injury recurring in a high-risk area','C. Orthotics are only necessary if a new wound has already developed','D. This recommendation is unrelated to the client\'s diabetes and is a general foot-comfort suggestion'],correct:1,
   rat:'The trap: A, C, and D all dismiss the preventive, mechanism-based reasoning behind the recommendation. Since neuropathy means an early injury may go completely unfelt, and a previously ulcerated site is at especially high risk for recurrence, redistributing pressure proactively — BEFORE any new wound develops — is the actual goal, not comfort or a reaction to an existing problem.'}
],'Decode It — Cause, Manifests, Treatment & Clinical Reasoning');

<p class="intro-line">Casteel loves NOT / EXCEPT / BEST / FIRST / ONLY. Circle the key word before you read the answers. With mechanism knowledge, the trap answer looks wrong.</p>

    <li>For NOT/EXCEPT: label each option True/False, pick the odd one out.</li>
    <li>For BEST/FIRST: several are correct — run them through ABC → safety → mechanism.</li>
    <li>Answer in your head FIRST, then look — so the traps can't lead you.</li>
  </ul>
</div>

renderQuiz('quiz-tricks',[
  {q:'All of the following are expected findings in DKA EXCEPT:',type:'single',
   opts:['A. Kussmaul respirations from metabolic acidosis','B. Fruity/acetone breath odor from ketones','C. Positive serum and urine ketones','D. Blood pH within the normal range'],correct:3,
   rat:'EXCEPT = the odd one out. Kussmaul breathing, fruity breath, and positive ketones are all core DKA findings. A normal pH is the impostor — DKA is defined by metabolic ACIDosis, so pH must be LOW, not normal.'},

  {q:'Which of the following is NOT an appropriate nursing action for a reddened, intact area over a bony prominence?',type:'single',
   opts:['A. Reposition the patient to relieve pressure on the area','B. Massage the area firmly to stimulate local blood flow','C. Keep the surrounding skin clean and dry','D. Document and continue monitoring the area closely'],correct:1,
   rat:'NOT = the incorrect action. Repositioning, keeping skin clean/dry, and monitoring are all appropriate. Massaging is contraindicated — the tissue is already compromised by pressure, and massage can rupture fragile capillaries and worsen the damage.'},

  {q:'The ONLY insulin formulation approved for intravenous administration is:',type:'single',
   opts:['A. NPH (intermediate-acting)','B. Glargine (long-acting)','C. Regular (short-acting)','D. Lispro (rapid-acting)'],correct:2,
   rat:'This is a true absolute — don\'t second-guess it just because the stem says "only." Regular insulin is the sole formulation given IV (used in DKA drips); NPH, glargine, and lispro are never administered intravenously.'},

  {q:'A patient with Type 2 diabetes taking metformin is scheduled for a contrast CT scan tomorrow. Which nursing action is BEST?',type:'single',
   opts:['A. Administer an extra metformin dose tonight to preemptively protect the kidneys','B. Hold the metformin before and after the contrast per facility protocol','C. Replace the metformin with an equivalent insulin dose for the day of the scan','D. Cancel the scan until the patient is no longer taking metformin'],correct:1,
   rat:'BEST = the safest, evidence-based action. Metformin plus contrast dye raises lactic acidosis/kidney injury risk, so it\'s held around the procedure. Giving an extra dose (A) is dangerous, an insulin swap (C) is unnecessary, and cancelling the scan (D) is an overreaction.'},

  {q:'A nurse is assigned four patients at the start of the shift. Which patient should the nurse assess FIRST?',type:'single',
   opts:['A. A Type 2 diabetic with a fingerstick glucose of 180 mg/dL and no symptoms','B. A Type 1 diabetic who is confused, diaphoretic, and visibly shaking','C. A patient with a healing Stage 2 pressure injury scheduled for a dressing change','D. A glaucoma patient due for a routine dose of eye drops'],correct:1,
   rat:'FIRST = the acute, rapidly evolving threat. Confusion + diaphoresis + shaking in a diabetic is the classic hypoglycemia pattern — a brain emergency in progress. A glucose of 180 is mildly elevated but stable, and the other two patients have routine, non-urgent care needs.'},

  {q:'All of the following increase a patient\'s risk for pressure injury EXCEPT:',type:'single',
   opts:['A. Immobility','B. Urinary or fecal incontinence','C. Being repositioned on a strict every-2-hour schedule','D. Serum albumin of 2.5 g/dL'],correct:2,
   rat:'EXCEPT = the one that doesn\'t belong. Immobility, incontinence (moisture), and low albumin (poor nutrition) all raise risk. Scheduled repositioning is the PROTECTIVE intervention that lowers risk — it\'s the impostor precisely because it sounds like it belongs on a "risk factor" list.'},

  {q:'A conscious patient reports feeling shaky with a fingerstick glucose of 55 mg/dL. Which is the BEST first action?',type:'single',
   opts:['A. Administer glucagon intramuscularly','B. Give 15 g of fast-acting carbohydrate and recheck glucose in 15 minutes','C. Provide a large meal containing protein and fat','D. Administer the patient\'s scheduled insulin dose as ordered'],correct:1,
   rat:'BEST/FIRST for a conscious, swallowing-capable hypoglycemic patient is the Rule of 15. Glucagon (A) is reserved for patients who cannot safely swallow; a large fatty meal (C) slows carbohydrate absorption; and giving insulin (D) would dangerously worsen the hypoglycemia.'},

  {q:'A patient with glaucoma asks which type of vision loss occurs FIRST in their condition. Which is the ONLY correct answer?',type:'single',
   opts:['A. Central vision, affecting reading and face recognition first','B. Peripheral (side) vision, producing a gradual tunnel-vision effect','C. Color vision, causing colors to appear faded','D. Near vision, similar to normal age-related presbyopia'],correct:1,
   rat:'ONLY correct = peripheral vision loss, since glaucoma damages the optic nerve from the outer edge inward. Central vision loss (A) describes macular degeneration instead — a frequently tested trap pairing between these two conditions.'},

  {q:'Which statement about HHS is NOT true?',type:'single',
   opts:['A. It occurs almost exclusively in patients with Type 2 diabetes','B. It involves severe hyperglycemia and profound dehydration','C. It typically causes significant ketoacidosis with Kussmaul respirations','D. Blood glucose levels are often above 600 mg/dL'],correct:2,
   rat:'NOT true = the false statement to identify. HHS does NOT cause significant ketoacidosis or Kussmaul breathing — that combination belongs to DKA. HHS patients retain just enough insulin to prevent ketone production, which is the entire mechanism distinguishing the two conditions.'},

  {q:'Which of the following findings is the ONLY true medical emergency requiring immediate same-day treatment?',type:'single',
   opts:['A. Gradual peripheral vision loss occurring over several months','B. Sudden severe eye pain with halos, nausea, and a firm, hard globe','C. Painless, slowly progressive blurry vision from cataracts','D. Mild eye dryness and occasional irritation'],correct:1,
   rat:'ONLY emergency = acute angle-closure glaucoma. The sudden severe pain, halos, nausea, and firm globe together signal a rapid IOP spike threatening permanent vision loss within hours — the other three findings are all chronic and non-urgent by comparison.'}
],'Spot-the-Trap Practice');

renderQuiz('quiz-challenge',[
  {q:'The nurse reviews morning labs for four clinic patients. Which result meets the diagnostic criteria for diabetes and requires provider follow-up today?',type:'single',
   opts:['A. A 48-year-old with a hemoglobin A1C of 6.1%','B. A 58-year-old with a fasting blood glucose of 111 mg/dL','C. A 62-year-old with a hemoglobin A1C of 8.4%','D. A 40-year-old with a random glucose of 150 mg/dL and no symptoms'],correct:2,
   rat:'The trap: B (111) and A (6.1%) both fall in the PREDIABETES range, not diagnostic — easy to overreact to. D is an isolated random glucose without symptoms, which doesn\'t meet criteria alone. An A1C of 8.4% is well above the ≥6.5% diagnostic threshold and reflects sustained hyperglycemia — this is the one that needs same-day follow-up.'},

  {q:'A client asks how their insulin pump works. Which explanation is correct?',type:'single',
   opts:['A. It releases programmed doses of NPH insulin into the bloodstream at set intervals throughout the day','B. It delivers a small continuous dose of rapid- or short-acting insulin subcutaneously, with the client able to self-administer a bolus before meals','C. It is surgically attached to the pancreas and delivers regular insulin directly into pancreatic tissue','D. It continuously infuses NPH insulin while automatically adjusting the rate based on continuous glucose readings'],correct:1,
   rat:'The trap: A and D both insert NPH into the answer — NPH is never used in insulin pumps because pumps require a rapid- or short-acting insulin for the basal/bolus model to work safely. C invents a surgical attachment that doesn\'t exist. Pumps deliver continuous subcutaneous basal insulin with patient-triggered mealtime boluses.'},

  {q:'A client with DKA has an initial glucose of 950 mg/dL. After several hours on an IV insulin drip with 0.9% NS, the glucose is now 240 mg/dL. What should the nurse prepare to administer next?',type:'single',
   opts:['A. An ampule of 50% dextrose to prevent further glucose drop','B. NPH insulin subcutaneously to transition off the drip','C. IV fluids containing dextrose so the insulin drip can safely continue','D. Phenytoin to prevent seizures from the rapid glucose change'],correct:2,
   rat:'The trap: A treats the glucose drop as an emergency requiring a large dextrose bolus, when the correct move is a controlled addition of dextrose-containing fluids so the drip can keep running. B introduces the wrong insulin type at the wrong time (NPH is never used to "transition off" an active DKA drip). D is an unrelated and unsupported intervention. Once glucose approaches ~200-250, dextrose is added to the IV fluids so the insulin can keep clearing ketones without causing hypoglycemia.'},

  {q:'An older adult with type 2 diabetes is admitted with pneumonia, glucose 620 mg/dL, and serum osmolality 330 mOsm/kg. Which nursing action is the PRIORITY?',type:'single',
   opts:['A. Continuous cardiac monitoring, since fluid and insulin therapy will shift potassium significantly','B. Administering sodium bicarbonate to correct the expected acidosis','C. Encouraging light exercise to help lower the blood glucose','D. Preparing for likely endotracheal intubation given the severity of the hyperglycemia'],correct:0,
   rat:'The trap: B assumes DKA-style acidosis is present, but this vignette is HHS — no acidosis to correct. C is actively dangerous in a profoundly dehydrated, hyperosmolar patient. D isn\'t indicated by anything in the vignette. Cardiac monitoring is the priority because HHS treatment (fluids + insulin) causes major potassium shifts, and this patient is older with likely cardiac vulnerability.'},

  {q:'The nurse is caring for four patients on a medical-surgical floor. Which patient should the nurse assess FIRST?',type:'single',
   opts:['A. A patient with a Braden Scale score of 18 who was just repositioned','B. A patient with type 2 diabetes and a glucose of 180 mg/dL after breakfast','C. A patient with a healing Stage 2 pressure injury due for a scheduled dressing change','D. A patient with a Braden Scale score of 9 who has not been repositioned in 3 hours'],correct:3,
   rat:'The trap: A Braden score of 18 sounds low-risk-adjacent but is actually the cutoff for "at risk" — not the most urgent finding here. B is a mildly elevated, expected postprandial glucose. C is routine, scheduled care. A Braden score of 9 indicates SEVERE risk, and combined with 3 hours without repositioning, this patient has the highest immediate risk for a new pressure injury — assess and reposition first.'},

  {q:'A patient is positioned in the right lateral recumbent position for an extended period. Which sites are at HIGHEST risk for pressure injury in this position? (Select all that apply)',type:'multi',
   opts:['A. Right hip (greater trochanter)','B. Right ear','C. Sacrum','D. Right shoulder','E. Right ankle/malleolus'],correct:[0,1,3,4],
   rat:'The trap: sacrum (C) is a SUPINE pressure point, not a side-lying one — a common mix-up. In right lateral recumbent, weight bears on the right-side structures: ear, shoulder, hip/greater trochanter, and ankle/malleolus (plus ribs and knee) — not the sacrum, which only bears weight when lying on the back.'},

  {q:'A client is scheduled for cataract surgery in 5 days. Which instruction should the nurse reinforce for the pre-operative period?',type:'single',

<script>
/* ===== WRONG ANSWER VAULT SECTION ===== */
function renderVaultSection(){
  const host=document.getElementById('sec-vault');
  if(!host)return;
  if(wrongVault.length===0){
    host.innerHTML=`
    <h2 class="sec-title"><span class="sec-emoji">🗄️</span> Wrong Answer Vault</h2>
    <p class="intro-line">Every question you miss anywhere in this guide — Why Engine, Decoder, Diabetes, DKA/HHS, all of it — automatically lands here so you can drill your actual weak spots instead of re-reviewing everything.</p>
    <div class="card"><div class="vault-empty">🎉<br><b>Your vault is empty!</b><br>Either you haven't missed anything yet, or you've already cleared it out. Go answer some questions — anything you get wrong will show up here automatically.</div></div>`;
    return;
  }
  let html=`
    <h2 class="sec-title"><span class="sec-emoji">🗄️</span> Wrong Answer Vault</h2>
    <p class="intro-line">These are the exact questions you've missed, pulled from every section. Re-answer them here — get one right and it clears itself out of the vault.</p>
    <div class="card" style="border-color:var(--red)">
      <h3>📋 ${wrongVault.length} question${wrongVault.length===1?'':'s'} to review</h3>
      <button class="btn" style="background:var(--red)" onclick="if(confirm('Clear the entire vault? This cannot be undone.')){wrongVault=[];saveVault();document.getElementById('vaultCount').textContent='0';renderVaultSection();}">🗑️ Clear entire vault</button>
    </div>
  `;
  wrongVault.forEach(entry=>{
    html+=`<div class="card" id="vaultcard-${entry.id.replace(/[^a-zA-Z0-9-]/g,'')}">
      <span class="vault-tag">${entry.source||'Review'}</span>
      <div class="q-text">${entry.q}</div>
      <div class="opts" id="vopts-${entry.id.replace(/[^a-zA-Z0-9-]/g,'')}"></div>
      <div class="rationale" id="vrat-${entry.id.replace(/[^a-zA-Z0-9-]/g,'')}"><b>Rationale:</b> ${entry.rat}</div>
    </div>`;
  });
  host.innerHTML=html;
  wrongVault.forEach(entry=>{
    const safeId=entry.id.replace(/[^a-zA-Z0-9-]/g,'');
    const optsHost=document.getElementById('vopts-'+safeId);
    const ratHost=document.getElementById('vrat-'+safeId);
    if(entry.type==='multi'){
      const chosen=new Set();
      entry.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{ if(chosen.has(i)){chosen.delete(i);btn.classList.remove('sel-multi');}else{chosen.add(i);btn.classList.add('sel-multi');} };
        optsHost.appendChild(btn);
      });
      const sub=document.createElement('button'); sub.className='submit-multi'; sub.textContent='Check Answer';
      sub.onclick=()=>{
        const correct=new Set(entry.correct);
        let allRight=chosen.size===correct.size;
        optsHost.querySelectorAll('.opt').forEach((b,i)=>{
          b.classList.add('disabled');
          if(correct.has(i))b.classList.add('correct');
          else if(chosen.has(i)){b.classList.add('wrong');allRight=false;}
        });
        ratHost.classList.add('show'); sub.style.display='none';
        if(allRight){
          const solved=document.createElement('div'); solved.className='vault-solved'; solved.textContent='✅ Correct! Removing from vault...';
          optsHost.parentElement.appendChild(solved);
          setTimeout(()=>{ removeFromVault(entry.id); const el=document.getElementById('vaultcard-'+safeId); if(el)el.remove(); if(wrongVault.length===0)renderVaultSection(); },900);
        }
      };
      optsHost.appendChild(sub);
    } else {
      entry.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{
          optsHost.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));
          const gotItRight = i===entry.correct;
          if(gotItRight)btn.classList.add('correct');
          else{ btn.classList.add('wrong'); optsHost.querySelectorAll('.opt')[entry.correct].classList.add('correct'); }
          ratHost.classList.add('show');
          if(gotItRight){
            const solved=document.createElement('div'); solved.className='vault-solved'; solved.textContent='✅ Correct! Removing from vault...';
            optsHost.parentElement.appendChild(solved);
            setTimeout(()=>{ removeFromVault(entry.id); const el=document.getElementById('vaultcard-'+safeId); if(el)el.remove(); if(wrongVault.length===0)renderVaultSection(); },900);
          }
        };
        optsHost.appendChild(btn);
      });
    }
  });
}
</script>

let drillList=[], drillIdx=0, drillScore=0, drillStreak=0, drillBest=0, drillAnswered=false;
const DRILL_ROUND=20;
function startDrill(){
  drillList=shuffle(DRILL_POOL.slice()).slice(0,DRILL_ROUND);
  drillIdx=0; drillScore=0; drillStreak=0; drillAnswered=false;
  renderDrillQ();
}
function renderDrillQ(){
  const host=document.getElementById('drillBody');
  if(drillIdx>=drillList.length){ return drillFinish(); }
  const q=drillList[drillIdx];
  drillAnswered=false;
  let opts=q.o.map((o,i)=>`<button class="opt" onclick="answerDrill(${i})">${o}</button>`).join('');
  host.innerHTML=`
    <div class="drill-top"><span>Q ${drillIdx+1} / ${drillList.length}</span><span>✅ ${drillScore} 🔥 ${drillStreak}</span></div>
    <div class="drill-bar"><div class="drill-bar-fill" style="width:${(drillIdx/drillList.length)*100}%"></div></div>
    <div class="quiz-card"><div class="q-text">${q.q}</div><div class="opts" id="drillOpts">${opts}</div><div class="rationale" id="drillRat"></div></div>
    <div class="center"><button class="btn ghost" id="drillNextBtn" style="display:none" onclick="nextDrill()">Next ➡️</button></div>`;
}
function answerDrill(i){
  if(drillAnswered)return; drillAnswered=true;
  const q=drillList[drillIdx];
  document.querySelectorAll('#drillOpts .opt').forEach((b,idx)=>{
    b.classList.add('disabled');
    if(idx===q.c)b.classList.add('correct');
    if(idx===i&&i!==q.c)b.classList.add('wrong');
  });
  const rat=document.getElementById('drillRat');
  if(i===q.c){drillScore++;drillStreak++;if(drillStreak>drillBest)drillBest=drillStreak;rat.innerHTML='✅ <b>Correct!</b> '+q.r;}
  else{drillStreak=0;rat.innerHTML='❌ <b>Not quite.</b> '+q.r;}
  rat.classList.add('show'); bumpProgress('drill-'+drillIdx);
  document.getElementById('drillNextBtn').style.display='inline-block';
}
function nextDrill(){ drillIdx++; renderDrillQ(); }
function drillFinish(){
  const pct=Math.round(drillScore/drillList.length*100);
  let msg=pct>=90?'🌟 Outstanding!':pct>=75?'💪 Test-ready zone!':pct>=60?'📈 Getting there — run it again.':'🌱 Keep drilling.';
  document.getElementById('drillBody').innerHTML=`
    <div class="card center" style="border-color:var(--teal)">
      <h2 style="margin-top:0">Round Complete!</h2>
      <div class="drill-final">${drillScore} / ${drillList.length} (${pct}%)</div>
      <p>Best streak: 🔥 ${drillBest}</p><p>${msg}</p>
      <button class="btn" onclick="startDrill()" style="background:linear-gradient(90deg,var(--teal),var(--green))">🔀 New Shuffled Round</button>
    </div>`;
}
document.getElementById('sec-drill').innerHTML=`
  <h2 class="sec-title"><span class="sec-emoji">⚡</span> Rapid Drill</h2>
  <p class="intro-line">A fresh, reshuffled ${DRILL_ROUND}-question round every time — instant feedback, score, and streak. Quick reps between study blocks.</p>
  <div class="tipbar">⚡ Answer fast, read the rationale on every one, chase your streak. Hit "New Shuffled Round" as many times as you want.</div>
  <div id="drillBody"></div>`;
startDrill();

{q:'A key difference in HHS management vs DKA is:',o:['No fluids needed','Insulin is not needed to reverse acidosis (there is none)','No monitoring','Give bicarbonate'],c:1,t:'single',r:'HHS has no acidosis, so insulin is for glucose, not acid reversal; fluids are even more central.'},
{q:'Which statement about A1C is correct?',o:['It shows today\'s glucose','It reflects average glucose over ~3 months','It measures insulin','It changes hourly'],c:1,t:'single',r:'A1C = ~3-month average glucose.'},
{q:'A patient with peripheral neuropathy describes their symptoms as:',o:['Sharp central chest pain','Numbness and burning in a stocking-glove pattern','Sudden vision loss','Ear ringing'],c:1,t:'single',r:'Peripheral neuropathy = stocking-glove numbness/burning starting in toes/fingers.'},
{q:'Which is the priority teaching to prevent DKA?',o:['Exercise less','Never omit insulin, especially when ill','Eat less protein','Avoid all carbs'],c:1,t:'single',r:'Omitting insulin during illness is the top DKA cause — never stop it.'},
{q:'A patient with glaucoma must understand that eye drops:',o:['Cure the disease','Must be used lifelong to control IOP','Are optional','Restore lost vision'],c:1,t:'single',r:'Drops control IOP for life; they prevent further loss but don\'t restore vision.'},
{q:'Which are signs of hypoglycemia? (SATA)',o:['Sweating','Shakiness','Confusion','Fruity breath','Tachycardia'],c:[0,1,2,4],t:'multi',r:'Sweating, shakiness, tachycardia (adrenergic) and confusion (neuro) are hypoglycemia. Fruity breath is DKA.'},
{q:'A patient with a Stage 4 pressure injury needs which nutrition focus?',o:['Low protein','High protein and adequate calories for healing','Fluid restriction','Low calorie'],c:1,t:'single',r:'Wound healing needs protein and calories; correct albumin/protein deficits.'},
{q:'Which describes proper diabetic foot washing?',o:['Soak feet for an hour','Wash and dry daily, especially between toes','Never wash feet','Use very hot water'],c:1,t:'single',r:'Wash and dry daily (dry between toes); avoid hot water (burn risk) and long soaking.'},
{q:'A patient reports halos around lights and gradual peripheral vision loss. This suggests:',o:['Cataract only','Open-angle glaucoma','Retinal detachment','Conjunctivitis'],c:1,t:'single',r:'Gradual peripheral loss + halos = open-angle glaucoma.'},
{q:'Which is TRUE of sensorineural hearing loss?',o:['Always reversible','Usually permanent (nerve/cochlea damage)','Caused by earwax','Cured by irrigation'],c:1,t:'single',r:'Sensorineural = permanent inner-ear/nerve damage. Conductive is often reversible.'},
{q:'The nurse should question a potassium order in DKA if:',o:['The patient is urinating well','The patient has no urine output','Potassium is low','Insulin is running'],c:1,t:'single',r:'Hold K⁺ if the patient isn\'t urinating (K⁺ can build to dangerous levels) or if K⁺ is high.'},
{q:'Which is the earliest sign the body gives during a drop in blood sugar?',o:['Seizure','Adrenergic symptoms (shaky, sweaty, fast heart)','Coma','Fruity breath'],c:1,t:'single',r:'Adrenaline release causes early shaky/sweaty/tachycardic symptoms before neuro signs.'},
{q:'A patient with diabetic gastroparesis (autonomic neuropathy) should:',o:['Eat large fatty meals','Eat small, low-fat meals','Fast all day','Only drink liquids forever'],c:1,t:'single',r:'Gastroparesis (delayed emptying) → small, low-fat meals help.'},
{q:'Which is the priority during an acute vertigo attack in Ménière\'s?',o:['Ambulate the patient','Ensure safety and prevent falls','Turn on bright lights','Give a large meal'],c:1,t:'single',r:'Fall prevention is the priority; keep the patient still in a calm environment.'},
{q:'What is the mechanism behind diabetic retinopathy?',o:['Cloudy lens','Damage to tiny retinal blood vessels from chronic hyperglycemia','High eye pressure','Nerve compression'],c:1,t:'single',r:'Chronic high glucose damages the retina\'s microvessels → retinopathy.'},
{q:'A patient asks how to prevent Type 2 diabetes complications. Best answer:',o:['Nothing can be done','Tight glucose, BP, and lipid control plus healthy lifestyle','Only take vitamins','Avoid all doctors'],c:1,t:'single',r:'Controlling glucose, BP, and lipids plus lifestyle changes prevents/slows complications.'},
{q:'Which insulin is rapid-acting and given right with meals?',o:['Glargine','NPH','Lispro','Regular'],c:2,t:'single',r:'Lispro (rapid) is given with food (~15 min onset).'},
{q:'A patient with a new Stage 2 pressure injury needs a dressing that:',o:['Keeps the wound dry and open to air','Maintains a moist wound environment','Uses no dressing','Applies heat'],c:1,t:'single',r:'Wounds heal best in a moist (not wet/dry) environment.'},
{q:'The nurse notes a diabetic patient\'s breath smells fruity. This suggests:',o:['Good control','DKA (ketones)','Hypoglycemia','Cataracts'],c:1,t:'single',r:'Fruity/acetone breath = ketones = DKA.'},
{q:'Which action helps prevent diabetic retinopathy progression?',o:['Avoid eye exams','Regular dilated eye exams and glucose/BP control','Wear sunglasses only','Nothing'],c:1,t:'single',r:'Early detection (regular exams) plus glucose and BP control slows progression.'},
{q:'Which findings make up metabolic syndrome? (SATA)',o:['Central obesity (waist >40 in men, >35 in women)','Hypertension','Low HDL / high LDL or triglycerides','Hyperinsulinemia with insulin resistance','Polycythemia'],c:[0,1,2,3],t:'multi',r:'Metabolic syndrome = central obesity + HTN + dyslipidemia + hyperinsulinemia/insulin resistance. It\'s a risk cluster, not a complication.'},
{q:'A slow-onset autoimmune diabetes discovered in adulthood, initially mistaken for Type 2, is called:',o:['Gestational diabetes','LADA (\"Type 1.5\")','HHS','Prediabetes'],c:1,t:'single',r:'LADA = autoimmune beta-cell destruction like Type 1, but slower and in adults — often misdiagnosed as Type 2 at first.'},
{q:'Which is a function of insulin besides moving glucose into cells? (SATA)',o:['Stores excess glucose as fat','Blocks fat breakdown (lipolysis)','Helps move potassium into cells','Stimulates glucagon release','Produces ketones'],c:[0,1,2],t:'multi',r:'Insulin stores glucose as fat, blocks lipolysis, and pushes K⁺ into cells. It does NOT stimulate glucagon or produce ketones — ketones happen when insulin is missing/ineffective.'},
{q:'Why does an ill diabetic patient\'s glucose rise even without eating?',o:['It doesn\'t rise without food','Cortisol and stress hormones raise glucose and are released during illness','Insulin stops working permanently','Glucose only rises after meals'],c:1,t:'single',r:'Illness/stress triggers cortisol and adrenaline release, which raises blood glucose independent of food intake — why sick-day monitoring must continue even if the patient isn\'t eating.'},
{q:'Approximately how much sugar should be circulating in the entire blood volume at one time?',o:['1 cup','About 1 teaspoon (~7 sugar cubes, ~30g)','1 pound','5 tablespoons'],c:1,t:'single',r:'Roughly 1 tsp (~30g) across the whole blood volume — a small homeostatic target that insulin works constantly to maintain.'},
{q:'A pregnant patient develops diabetes only during pregnancy, with a larger-than-average baby. This is:',o:['Type 1 diabetes','Gestational diabetes','LADA','Prediabetes'],c:1,t:'single',r:'Gestational diabetes develops during pregnancy (more common with larger babies), usually resolves after delivery, but raises future Type 2 risk.'}
];
</script>
<script>
/* ===== EXAM ENGINE (Study Mode + Test Mode 50-scramble + persistence) ===== */
let examState={}, examIdx=0, examSubmitted=false, examMode='study', examChecked={};
let quizSet=[];
function saveExam(){ try{ localStorage.setItem('nur256u3_exam', JSON.stringify({mode:examMode,set:quizSet,state:examState,checked:examChecked,idx:examIdx,submitted:examSubmitted})); }catch(e){} }
function loadExam(){ try{ const r=localStorage.getItem('nur256u3_exam'); return r?JSON.parse(r):null; }catch(e){ return null; } }
function clearExamSave(){ try{ localStorage.removeItem('nur256u3_exam'); }catch(e){} }
function shuffleArr(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);}
function renderExam(){
  const c=document.getElementById('sec-exam');
  c.innerHTML=`
    <h2 class="sec-title"><span class="sec-emoji">📝</span> Practice Exam <span style="font-size:.6em;opacity:.7">(${EXAM.length}-question bank)</span></h2>
    <p class="intro-line">NextGen NCLEX style — multiple choice + Select All That Apply.</p>
    <div class="exam-mode-toggle">
      <button class="mode-btn" id="modeStudyBtn" onclick="setExamMode('study')">📖 Study Mode</button>
      <button class="mode-btn" id="modeTestBtn" onclick="setExamMode('test')">📝 Test Mode</button>
    </div>
    <div class="tipbar" id="examModeTip"></div>
    <div id="examBody"></div>
    <div class="exam-nav">
      <button class="btn ghost" onclick="examPrev()">⬅️ Prev</button>
      <div class="exam-dots" id="examDots"></div>
      <button class="btn" onclick="examNext()">Next ➡️</button>
    </div>
    <div class="center" id="submitWrap" style="margin-top:14px"><button class="btn" onclick="submitExam()" style="background:linear-gradient(90deg,var(--teal),var(--green))">✅ Submit Exam & See Score</button></div>
    <div id="examResult"></div>`;
  const saved=loadExam();
  if(saved && saved.set && saved.set.length){
    examMode=saved.mode||'study'; quizSet=saved.set; examState=saved.state||{}; examChecked=saved.checked||{}; examIdx=saved.idx||0; examSubmitted=saved.submitted||false;
    applyModeUI(examMode); drawExamQ();
  } else { setExamMode(examMode); }
}
function buildQuizSet(m){
  const all=EXAM.map((_,i)=>i);
  quizSet = m==='test' ? shuffleArr(all).slice(0,Math.min(50,all.length)) : all;
}
function applyModeUI(m){
  const sb=document.getElementById('modeStudyBtn'), tb=document.getElementById('modeTestBtn');
  sb.classList.toggle('active',m==='study'); tb.classList.toggle('active',m==='test');
  const tip=document.getElementById('examModeTip'); const submitWrap=document.getElementById('submitWrap');
  if(m==='study'){
    tip.innerHTML='📖 <b>Study Mode:</b> all '+EXAM.length+' questions in order. Tap an answer to instantly see right/wrong + rationale. SATA uses Check Answer. Progress saves automatically.';
    submitWrap.style.display='none';
  } else {
    tip.innerHTML='📝 <b>Test Mode:</b> <b>50 random questions, scrambled</b> — like the real exam. No feedback until you submit. Tap 📝 Test Mode again for a fresh 50.';
    submitWrap.style.display='block';
  }
}
function setExamMode(m){
  examMode=m; examChecked={}; examState={}; examIdx=0; examSubmitted=false;
  document.getElementById('examResult').innerHTML='';
  buildQuizSet(m); applyModeUI(m); saveExam(); drawExamQ();
}
function drawExamQ(){
  if(!quizSet.length)buildQuizSet(examMode);
  const qi=quizSet[examIdx]; const q=EXAM[qi];
  const body=document.getElementById('examBody');
  const typeLabel=q.t==='multi'?'Select All That Apply':'Multiple Choice';
  const checked = examMode==='study' && examChecked[qi];
  let html=`<div class="exam-q"><div><span class="qnum">QUESTION ${examIdx+1} of ${quizSet.length}</span><span class="qtype">${typeLabel}</span></div><div class="qtext">${q.q}</div>`;
  q.o.forEach((opt,i)=>{
    const letter=String.fromCharCode(65+i);
    let cls='opt'; const cur=examState[qi];
    const isSel = q.t==='multi' ? (cur&&cur.includes(i)) : (cur===i);
    if(isSel)cls+=' sel-multi';
    if(checked){ const isCorrectOpt = q.t==='multi'?q.c.includes(i):q.c===i; if(isCorrectOpt)cls+=' correct'; else if(isSel)cls+=' wrong'; }
    html+=`<button class="${cls}" ${checked?'disabled':''} onclick="examPick(${i})">${letter}. ${opt}</button>`;
  });
  html+=`</div>`;
  if(examMode==='study'){
    if(q.t==='multi' && !checked){ html+=`<div class="center"><button class="btn" onclick="checkExamQ()" style="background:linear-gradient(90deg,var(--teal),var(--green))">✓ Check Answer</button></div>`; }
    if(checked){
      const ans=examState[qi]; const isCorrect = q.t==='multi'?arrEq(ans,q.c):ans===q.c;
      const correctTxt = q.t==='multi'?q.c.map(x=>String.fromCharCode(65+x)).sort().join(', '):String.fromCharCode(65+q.c);
      html+=`<div class="rationale show" style="border-color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'✅ <b>Correct!</b>':'❌ <b>Not quite.</b> Correct: <b>'+correctTxt+'</b>'}<br><b>Rationale:</b> ${q.r}</div>`;
    }
  }
  body.innerHTML=html; drawDots();
}
function drawDots(){
  const d=document.getElementById('examDots'); d.innerHTML='';
  quizSet.forEach((qi,pos)=>{
    const dot=document.createElement('div'); dot.className='dot';
    const answered = examState[qi]!==undefined && !(Array.isArray(examState[qi])&&examState[qi].length===0);
    if(examMode==='study'){ if(examChecked[qi]){ const ok=EXAM[qi].t==='multi'?arrEq(examState[qi],EXAM[qi].c):examState[qi]===EXAM[qi].c; dot.classList.add(ok?'dot-correct':'dot-wrong'); } }
    else { if(answered)dot.classList.add('answered'); }
    if(pos===examIdx)dot.classList.add('current');
    dot.onclick=()=>{examIdx=pos;drawExamQ();saveExam();};
    d.appendChild(dot);
  });
}
function examPick(i){
  const qi=quizSet[examIdx]; const q=EXAM[qi];
  if(examMode==='study' && examChecked[qi]) return;
  if(q.t==='multi'){
    if(!examState[qi])examState[qi]=[]; const arr=examState[qi]; const idx=arr.indexOf(i);
    if(idx>-1)arr.splice(idx,1); else arr.push(i); drawExamQ();
  } else { examState[qi]=i; if(examMode==='study'){ examChecked[qi]=true; bumpProgress('exam-'+qi); } drawExamQ(); }
  saveExam();
}
function checkExamQ(){
  const qi=quizSet[examIdx]; const ans=examState[qi];
  if(ans===undefined||(Array.isArray(ans)&&ans.length===0))return;
  examChecked[qi]=true; bumpProgress('exam-'+qi); drawExamQ(); saveExam();
}
function examNext(){ if(examIdx<quizSet.length-1){examIdx++;drawExamQ();saveExam();window.scrollTo({top:0,behavior:'smooth'});} }
function examPrev(){ if(examIdx>0){examIdx--;drawExamQ();saveExam();window.scrollTo({top:0,behavior:'smooth'});} }
function arrEq(a,b){if(!a||!b)return false;a=[...a].sort();b=[...b].sort();return a.length===b.length&&a.every((v,i)=>v===b[i]);}
function submitExam(){
  let correct=0;
  quizSet.forEach(qi=>{ const q=EXAM[qi]; const ans=examState[qi]; if(q.t==='multi'){if(arrEq(ans,q.c))correct++;}else{if(ans===q.c)correct++;} });
  const total=quizSet.length; const pct=Math.round(correct/total*100);
  examSubmitted=true; saveExam();
  let msg = pct>=85?'🌟 Outstanding — exam-ready!':pct>=75?'✅ Passing! Polish the misses.':pct>=60?'💪 Getting there — review and retake.':'📚 Keep grinding — revisit the sections.';
  let html=`<div class="quiz-score">You scored ${correct} / ${total} (${pct}%)<br>${msg}</div><h3 style="color:var(--pink)">📖 Full Review</h3>`;
  quizSet.forEach((qi,pos)=>{
    const q=EXAM[qi]; const ans=examState[qi]; let isCorrect = q.t==='multi'?arrEq(ans,q.c):ans===q.c;
    const yourTxt = ans===undefined||(Array.isArray(ans)&&ans.length===0)?'(no answer)':(q.t==='multi'?ans.map(x=>String.fromCharCode(65+x)).sort().join(', '):String.fromCharCode(65+ans));
    const correctTxt = q.t==='multi'?q.c.map(x=>String.fromCharCode(65+x)).sort().join(', '):String.fromCharCode(65+q.c);
    html+=`<div class="exam-q" style="border-color:${isCorrect?'var(--green)':'var(--red)'}"><div class="qnum">Q${pos+1} ${isCorrect?'✅':'❌'}</div><div class="qtext" style="font-size:.92rem">${q.q}</div><div style="font-size:.85rem"><b>Your answer:</b> ${yourTxt} &nbsp;|&nbsp; <b>Correct:</b> ${correctTxt}</div><div class="rationale show" style="margin-top:8px"><b>Rationale:</b> ${q.r}</div></div>`;
  });
  html+=`<div class="center"><button class="btn" onclick="resetExam()">🔄 New Test (fresh 50)</button></div>`;
  document.getElementById('examResult').innerHTML=html;
  const _er=document.getElementById('examResult'); if(_er.scrollIntoView)_er.scrollIntoView({behavior:'smooth'});
}
function resetExam(){ examState={}; examIdx=0; examSubmitted=false; examChecked={}; document.getElementById('examResult').innerHTML=''; buildQuizSet(examMode); saveExam(); drawExamQ(); window.scrollTo({top:0,behavior:'smooth'}); }
renderExam();
</script>

<script>/* init progress total */ updateProg();</script>
