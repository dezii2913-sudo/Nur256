<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>NUR 256 — Unit 3 Study Lab</title>
<style>
:root{
  color-scheme: light;
  --bg:#e4edff; --bg2:#fff;
  --ink:#0f1f3d; --muted:#4a5f8a;
  --card:#ffffff; --card-border:#bcd3ff;
  --pink:#2563eb; --pink-soft:#dbe8ff;
  --purple:#0284c7; --purple-soft:#dcf3ff;
  --teal:#0891b2; --teal-soft:#cffafe;
  --green:#22c55e; --green-soft:#dcfce7;
  --red:#ef4444; --red-soft:#fee2e2;
  --amber:#f59e0b; --amber-soft:#fef3c7;
  --blue:#1d4ed8; --blue-soft:#dbeafe;
}
[data-theme="night"]{
  color-scheme: dark;
  --bg:#0a0f1e; --bg2:#0f1830;
  --ink:#eef3ff; --muted:#9ab0d9;
  --card:#141d38; --card-border:#2a3a63;
  --pink:#5b9bf5; --pink-soft:#16233f;
  --purple:#4dc8f0; --purple-soft:#122333;
  --teal:#2dd9e8; --teal-soft:#0d2a30;
  --green-soft:#123321; --red-soft:#3a1f1f; --amber-soft:#3a2f12;
  --blue:#7fb4ff; --blue-soft:#16233f;
}
html{background:var(--bg)}
*{box-sizing:border-box}
body{
  margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;
  transition:background .3s,color .3s;padding-bottom:80px;
}
/* BIG TEXT mode */
body.mobile-mode{font-size:1.18rem;line-height:1.7}
body.mobile-mode .grid2,body.mobile-mode .grid3{grid-template-columns:1fr!important;gap:18px}
body.mobile-mode .content{padding:16px}
body.mobile-mode .card{padding:20px 18px;margin-bottom:18px}
body.mobile-mode .card h3{font-size:1.3rem;line-height:1.4}
body.mobile-mode .sec-title{font-size:1.55rem;line-height:1.35}
body.mobile-mode p,body.mobile-mode li,body.mobile-mode td,body.mobile-mode th{font-size:1.12rem;line-height:1.7}
body.mobile-mode .clean li{margin-bottom:12px}
body.mobile-mode .opt{font-size:1.12rem;padding:16px;min-height:54px;line-height:1.5}
body.mobile-mode .q-text{font-size:1.18rem;line-height:1.55}
body.mobile-mode .btn,body.mobile-mode .tbtn{font-size:1.1rem;padding:14px 18px}
body.mobile-mode .nav button{font-size:1.05rem;padding:12px 14px}
body.mobile-mode .rationale{font-size:1.08rem;line-height:1.6}
body.mobile-mode .mnem .big{font-size:1.15rem}
body.mobile-mode .hy{font-size:1.1rem;line-height:1.6;padding:16px}
body.mobile-mode table.lab{font-size:.9rem}
body.mobile-mode .lab td,body.mobile-mode .lab th{padding:9px 7px;font-size:.92rem!important}

/* TOP BAR */
.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  color:#fff;padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;flex-wrap:wrap;
  box-shadow:0 2px 14px rgba(0,0,0,.18);
}
.topbar h1{font-size:1.2rem;margin:0;font-weight:800;letter-spacing:.3px}
.topbar .sub{font-size:.72rem;opacity:.9;font-weight:500;display:block}
.toggles{display:flex;gap:8px;flex-wrap:wrap}
.tbtn{border:none;background:rgba(255,255,255,.25);color:#fff;padding:9px 14px;border-radius:30px;font-weight:700;font-size:.85rem;cursor:pointer;backdrop-filter:blur(4px)}
.tbtn:active{transform:scale(.95)}

.progwrap{padding:10px 16px;background:var(--bg2)}
.progbar-bg{background:var(--card-border);border-radius:20px;height:14px;overflow:hidden}
.progbar{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:20px;transition:width .5s}
.progtext{font-size:.72rem;color:var(--muted);text-align:center;margin-top:4px;font-weight:600}

/* NAV TABS */
.nav{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.nav button{flex:0 0 auto;border:2px solid var(--card-border);background:var(--card);color:var(--ink);padding:9px 15px;border-radius:30px;font-weight:700;font-size:.82rem;cursor:pointer;transition:.2s;white-space:nowrap}
.nav button.active{background:var(--purple);color:#fff;border-color:var(--purple);transform:scale(1.04)}

.content{max-width:920px;margin:0 auto;padding:18px;background:var(--bg)}
.section{display:none;animation:fade .4s;scroll-margin-top:12px}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.sec-title{font-size:1.5rem;font-weight:800;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.sec-emoji{font-size:1.6rem}
.intro-line{color:var(--muted);margin:0 0 16px;font-size:.95rem}

.card{background:var(--card);border:2px solid var(--card-border);border-radius:16px;padding:16px 18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.card h3{margin:0 0 10px;font-size:1.15rem}
.clean{list-style:none;padding:0;margin:8px 0}
.clean li{padding:6px 0 6px 22px;position:relative}
.clean li:before{content:"▸";position:absolute;left:0;color:var(--purple);font-weight:800}
.pill{display:inline-block;background:var(--purple-soft);color:var(--purple);padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:800;margin-left:6px}

.hy{background:var(--amber-soft);border-left:5px solid var(--amber);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.9rem}
.why-chain{background:var(--teal-soft);border-left:4px solid var(--teal);border-radius:10px;padding:12px 14px;margin:10px 0;line-height:1.7}
.mnem{background:var(--purple-soft);border-radius:12px;padding:10px 14px;margin:10px 0}
.mnem .tag{font-size:.68rem;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.5px}
.mnem .big{font-size:1.05rem;font-weight:800;margin:3px 0}
.mnem .exp{font-size:.85rem;color:var(--muted)}
.profnote{background:var(--teal-soft);border-left:5px solid var(--teal);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.9rem}
.profnote .tag{font-size:.68rem;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.5px}

table.lab{width:100%;border-collapse:collapse;margin:10px 0;font-size:.88rem;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(min-width:640px){table.lab{display:table}}
table.lab th{background:var(--purple);color:#fff;padding:8px;text-align:left;font-size:.8rem}
table.lab td{padding:8px;border-bottom:1px solid var(--card-border);min-width:80px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}

/* QUIZ */
.quiz-card{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:16px;margin:12px 0}
.q-text{font-weight:700;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;border:2px solid var(--card-border);background:var(--bg2);color:var(--ink);padding:11px 14px;border-radius:10px;cursor:pointer;font-size:.92rem;transition:.15s}
.opt:hover{border-color:var(--purple)}
.opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.opt.sel-multi{border-color:var(--purple);background:var(--purple-soft)}
.opt.disabled{pointer-events:none;opacity:.85}
.rationale{margin-top:10px;padding:10px 12px;background:var(--blue-soft);border-radius:10px;font-size:.86rem;display:none}
.rationale.show{display:block}
.submit-multi{margin-top:8px;background:linear-gradient(90deg,var(--teal),var(--green));color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:800;cursor:pointer}
.center{text-align:center}
.btn{background:var(--purple);color:#fff;border:none;padding:11px 20px;border-radius:12px;font-weight:800;cursor:pointer;font-size:.95rem}
.btn.ghost{background:var(--card);color:var(--ink);border:2px solid var(--card-border)}
.tipbar{background:var(--teal-soft);border-radius:12px;padding:10px 14px;font-size:.85rem;margin:10px 0}
.kbd{background:var(--card);border:1px solid var(--card-border);border-radius:6px;padding:1px 7px;font-weight:700;font-size:.8rem}
.quiz-score{font-size:1.15rem;font-weight:800;text-align:center;padding:16px;background:var(--purple-soft);border-radius:14px;margin:12px 0}

/* flash game */
.flash-progress{text-align:center;font-size:.85rem;color:var(--muted);margin-bottom:10px;font-weight:700}
.flash-card{background:var(--card);border:3px solid var(--purple);border-radius:20px;padding:34px 22px;min-height:160px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.12rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow,0 4px 18px rgba(0,0,0,.12));transition:transform .15s,background .2s,border-color .2s}
.flash-card:active{transform:scale(.97)}
.flash-card.flipped{border-color:var(--teal);background:var(--teal-soft)}
.flash-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;display:block}
.flash-btns{display:flex;gap:10px;margin-top:14px}
.flash-btn{flex:1;padding:14px;border-radius:14px;border:none;font-weight:800;cursor:pointer;font-size:.92rem}
.flash-btn.learning{background:var(--amber-soft);color:var(--amber);border:2px solid var(--amber)}
.flash-btn.gotit{background:var(--green-soft);color:var(--green);border:2px solid var(--green)}

/* wrong answer vault */
.vault-empty{text-align:center;padding:30px 16px;font-size:1rem}
.vault-tag{display:inline-block;background:var(--purple-soft);color:var(--purple);font-size:.72rem;font-weight:800;border-radius:20px;padding:2px 10px;margin-bottom:8px}
.vault-solved{background:var(--green-soft);border:2px solid var(--green);color:var(--green);border-radius:10px;padding:8px 12px;margin-top:8px;font-size:.85rem;font-weight:700;text-align:center}

/* match game */
.match-stats{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;font-weight:800;font-size:.88rem;margin:10px 0;color:var(--ink)}
.match-wrap{position:relative}
.match-svg{display:block;position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.match-columns{display:flex;gap:10px;position:relative;z-index:2}
.match-col{flex:1 1 0;display:flex;flex-direction:column;gap:9px;min-width:0}
.match-item{width:100%;box-sizing:border-box;background:var(--card);border:2px solid var(--card-border);border-radius:12px;padding:11px 8px;font-size:.74rem;font-weight:700;cursor:pointer;text-align:left;transition:border-color .15s,background .15s,transform .1s;line-height:1.3;word-break:break-word;overflow-wrap:anywhere;white-space:normal}
.match-item:active{transform:scale(.98)}
.match-item.selected{border-color:var(--purple);background:var(--purple-soft)}
.match-item.matched{border-color:var(--green);background:var(--green-soft);color:var(--green);cursor:default;opacity:.75}
.match-item.shake{border-color:var(--red);background:var(--red-soft);animation:matchshake .35s}
@keyframes matchshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
body.mobile-mode .match-item{font-size:.95rem}
body.mobile-mode .match-stats{font-size:1rem}

/* drill */
.drill-top{display:flex;justify-content:space-between;font-size:.8rem;font-weight:700;margin-bottom:6px}
.drill-bar{height:8px;background:var(--card-border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.drill-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:.3s}
.drill-final{font-size:1.6rem;font-weight:800;color:var(--purple);margin:10px 0}

/* exam */
.exam-mode-toggle{display:flex;gap:10px;margin:12px 0;justify-content:center}
.mode-btn{flex:1;max-width:220px;padding:12px 16px;border-radius:14px;border:2px solid var(--card-border);background:var(--card);color:var(--ink);font-weight:800;font-size:.95rem;cursor:pointer}
.mode-btn.active{background:linear-gradient(90deg,var(--purple),var(--pink));color:#fff;border-color:transparent}
.exam-q{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:16px;margin:10px 0}
.qnum{font-size:.7rem;font-weight:800;color:var(--purple);text-transform:uppercase}
.qtype{font-size:.64rem;font-weight:800;padding:2px 8px;border-radius:20px;background:var(--blue-soft);color:var(--blue);margin-left:6px}
.qtext{font-weight:700;margin:8px 0 12px}
.exam-nav{position:sticky;bottom:0;background:var(--card);border-top:2px solid var(--card-border);padding:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:14px 14px 0 0;margin-top:10px}
.exam-dots{display:flex;flex-wrap:wrap;gap:4px;max-width:60%}
.dot{width:13px;height:13px;border-radius:50%;background:var(--card-border);cursor:pointer}
.dot.answered{background:var(--teal)}
.dot.current{background:var(--pink);transform:scale(1.3)}
.dot.dot-correct{background:var(--green)}
.dot.dot-wrong{background:var(--red)}
</style>
</head>
<body data-theme="day">

<div class="topbar">
  <div>
    <h1>🧪 NUR 256 — Unit 3 Study Lab</h1>
    <span class="sub">Diabetes • Skin/Wounds • Eye • Ear</span>
  </div>
  <div class="toggles">
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">🌙 Night</button>
    <button class="tbtn" id="mobileBtn" onclick="toggleMobile()">🔍 Big Text</button>
    <button class="tbtn" id="shuffleBtn" onclick="toggleShuffle()">🔀 Shuffle: ON</button>
  </div>
</div>

<div class="progwrap">
  <div class="progbar-bg"><div class="progbar" id="progbar"></div></div>
  <div class="progtext" id="progtext">0 quiz questions answered • Let's go! 💪</div>
  <div style="text-align:center;margin-top:6px"><button onclick="resetAllProgress()" style="background:none;border:none;color:var(--muted);font-size:.68rem;text-decoration:underline;cursor:pointer">↺ reset my saved progress</button></div>
</div>

<div class="nav" id="nav"></div>
<div class="content" id="content"></div>
<script>
/* ===== THEME + BIG TEXT + SHUFFLE (persisted) ===== */
let shuffleAnswers=true;
function toggleShuffle(){
  shuffleAnswers=!shuffleAnswers;
  const b=document.getElementById('shuffleBtn'); if(b)b.textContent='🔀 Shuffle: '+(shuffleAnswers?'ON':'OFF');
  try{ localStorage.setItem('nur256u3_shuffle', shuffleAnswers?'1':'0'); }catch(e){}
}
function toggleTheme(){
  const b=document.body;
  const night = b.getAttribute('data-theme')!=='night';
  b.setAttribute('data-theme', night?'night':'day');
  const t1=document.getElementById('themeBtn'); if(t1)t1.textContent=night?'☀️ Day':'🌙 Night';
  try{ localStorage.setItem('nur256u3_theme', night?'night':'day'); }catch(e){}
}
function toggleMobile(){
  const b=document.body;
  b.classList.toggle('mobile-mode');
  const on=b.classList.contains('mobile-mode');
  const m1=document.getElementById('mobileBtn'); if(m1)m1.textContent=on?'🔍 Normal Text':'🔍 Big Text';
  try{ localStorage.setItem('nur256u3_bigtext', on?'1':'0'); }catch(e){}
}
(function restorePrefs(){
  try{
    if(localStorage.getItem('nur256u3_theme')==='night'){ document.body.setAttribute('data-theme','night');
      var t1=document.getElementById('themeBtn'); if(t1)t1.textContent='☀️ Day'; }
    if(localStorage.getItem('nur256u3_bigtext')==='1'){ document.body.classList.add('mobile-mode');
      var m1=document.getElementById('mobileBtn'); if(m1)m1.textContent='🔍 Normal Text'; }
    const sh=localStorage.getItem('nur256u3_shuffle');
    if(sh==='0'){ shuffleAnswers=false; var s1=document.getElementById('shuffleBtn'); if(s1)s1.textContent='🔀 Shuffle: OFF'; }
  }catch(e){}
})();

/* ===== PROGRESS (persisted) ===== */
let answeredQs=new Set(); let totalTrackable=0;
(function restoreProgress(){ try{ const r=localStorage.getItem('nur256u3_progress'); if(r){ JSON.parse(r).forEach(id=>answeredQs.add(id)); } }catch(e){} })();
function saveProgress(){ try{ localStorage.setItem('nur256u3_progress', JSON.stringify([...answeredQs])); }catch(e){} }
function resetAllProgress(){ if(!confirm('Reset all saved progress (quiz progress + saved exam + vault + flash game + match games)? This cannot be undone.'))return; answeredQs=new Set(); try{ localStorage.removeItem('nur256u3_progress'); }catch(e){} updateProg(); try{ localStorage.removeItem('nur256u3_exam'); }catch(e){} examState={};examIdx=0;examChecked={};examSubmitted=false;examMode='study';quizSet=[]; if(typeof setExamMode==='function'){ try{ setExamMode('study'); localStorage.removeItem('nur256u3_exam'); }catch(e){} } try{ wrongVault=[]; localStorage.removeItem('nur256u3_vault'); const b=document.getElementById('vaultCount'); if(b)b.textContent='0'; if(typeof renderVaultSection==='function') renderVaultSection(); }catch(e){} try{ flashMastered=new Set(); localStorage.removeItem('nur256u3_flashmastered'); if(typeof buildFlashQueue==='function'){ buildFlashQueue(); drawFlashCard(); } }catch(e){} try{ matchProgress={}; localStorage.removeItem('nur256u3_matchprogress'); localStorage.removeItem('nur256u3_matchbest_insulin'); localStorage.removeItem('nur256u3_matchbest_eye'); }catch(e){} alert('Progress reset. Fresh start! 💜'); }
function bumpProgress(id){ if(!answeredQs.has(id)){answeredQs.add(id);saveProgress();updateProg();} }
function updateProg(){
  const pct=totalTrackable?Math.round(answeredQs.size/totalTrackable*100):0;
  const pb=document.getElementById('progbar'); if(pb)pb.style.width=Math.min(100,pct)+'%';
  const msgs=["Let's go! 💪","Warming up! 🔥","Nice momentum! ⭐","Crushing it! 🚀","Almost there! 🎯","NCLEX-ready! 👑"];
  const m=msgs[Math.min(msgs.length-1,Math.floor(pct/20))];
  const pt=document.getElementById('progtext'); if(pt)pt.textContent=`${answeredQs.size} quiz questions answered • ${m}`;
}

/* ===== NAV / SECTIONS ===== */
const SECTIONS=[
  {id:'home',label:'🏠 Start'},
  {id:'why',label:'🧠 Why Engine'},
  {id:'diabetes',label:'🩸 Diabetes (Mon 7/13)'},
  {id:'insulin',label:'💉 Insulin Lab (Mon 7/13)'},
  {id:'insulinmatch',label:'🔗 Insulin Match Game (Mon 7/13)'},
  {id:'dka',label:'🚨 DKA vs HHS (Mon 7/13)'},
  {id:'hypo',label:'📉 Hypoglycemia (Mon 7/13)'},
  {id:'complications',label:'🔗 DM Complications (Mon 7/13)'},
  {id:'skin',label:'🧴 Skin/Wounds (Mon 7/13)'},
  {id:'eye',label:'👁️ Eye (Wed 7/15)'},
  {id:'eyematch',label:'🔗 Eye Match Game (Wed 7/15)'},
  {id:'ear',label:'👂 Ear (not on exam yet)'},
  {id:'decoder',label:'🩺 Disorder Decoder'},
  {id:'studymode',label:'🧩 Study Mode'},
  {id:'tricks',label:'🎯 Trick Questions'},
  {id:'challenge',label:'🎓 Med-Surg Challenge'},
  {id:'vault',label:'🗄️ Wrong Answer Vault'},
  {id:'flash',label:'🎮 Flash Study Game'},
  {id:'drill',label:'⚡ Rapid Drill'},
  {id:'exam',label:'📝 Exam'},
];
const nav=document.getElementById('nav'), content=document.getElementById('content');
SECTIONS.forEach((s,i)=>{
  const btn=document.createElement('button'); btn.id='nav-'+s.id;
  if(s.id==='vault'){ btn.innerHTML=s.label+' <span id="vaultCount" style="background:var(--red);color:#fff;border-radius:20px;padding:1px 8px;font-size:.72rem;margin-left:2px">0</span>'; }
  else{ btn.textContent=s.label; }
  if(i===0)btn.classList.add('active');
  btn.onclick=()=>showSection(s.id);
  nav.appendChild(btn);
  const sec=document.createElement('div'); sec.className='section'+(i===0?' active':''); sec.id='sec-'+s.id; content.appendChild(sec);
});
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='vault' && typeof renderVaultSection==='function') renderVaultSection();
  const isMatchGame = (id==='insulinmatch'||id==='eyematch');
  if(typeof matchTimerInt!=='undefined' && matchTimerInt && !isMatchGame){ clearInterval(matchTimerInt); matchTimerInt=null; }
  if(isMatchGame && typeof startMatchGame==='function') startMatchGame(id);
}

/* ===== QUIZ ENGINE (single + SATA) ===== */
/* ===== WRONG ANSWER VAULT ===== */
let wrongVault=[];
(function restoreVault(){ try{ const r=localStorage.getItem('nur256u3_vault'); if(r) wrongVault=JSON.parse(r); }catch(e){} })();
(function initVaultBadge(){ const b=document.getElementById('vaultCount'); if(b) b.textContent=wrongVault.length; })();
function saveVault(){ try{ localStorage.setItem('nur256u3_vault', JSON.stringify(wrongVault)); }catch(e){} }
function addToVault(entry){
  const idx=wrongVault.findIndex(v=>v.id===entry.id);
  if(idx>=0) wrongVault[idx]=entry; else wrongVault.push(entry);
  saveVault();
  const badge=document.getElementById('vaultCount'); if(badge) badge.textContent=wrongVault.length;
}
function removeFromVault(id){
  wrongVault=wrongVault.filter(v=>v.id!==id);
  saveVault();
  const badge=document.getElementById('vaultCount'); if(badge) badge.textContent=wrongVault.length;
}

function stripLabel(text){ return text.replace(/^[A-Za-z]\.\s*/,''); }
function relabel(optsArr){
  const L=['A','B','C','D','E','F'];
  return optsArr.map((o,i)=>L[i]+'. '+stripLabel(o));
}
function prepareQuestion(qOrig){
  let opts=qOrig.opts.slice();
  let correct=qOrig.type==='multi'?qOrig.correct.slice():qOrig.correct;
  if(shuffleAnswers){
    const order=shuffle(opts.map((_,i)=>i));
    const newOpts=order.map(i=>opts[i]);
    if(qOrig.type==='multi'){
      const correctSet=new Set(correct);
      correct=order.map((origIdx,newIdx)=>correctSet.has(origIdx)?newIdx:null).filter(x=>x!==null);
    } else {
      correct=order.indexOf(correct);
    }
    opts=newOpts;
  }
  return {...qOrig, opts:relabel(opts), correct};
}
let quizTotalCounted=new Set();
function renderQuiz(containerId, questions, title, source, indexMap){
  const host=document.getElementById(containerId);
  if(!host)return;
  host.innerHTML='';
  const wrap=document.createElement('div');
  if(title){ const h=document.createElement('h3'); h.textContent='📝 '+title; h.style.color='var(--pink)'; wrap.appendChild(h); }
  questions.forEach((qOrig,localIdx)=>{
    const qi = indexMap ? indexMap[localIdx] : localIdx;
    const q=prepareQuestion(qOrig);
    const qid=containerId+'-'+qi;
    if(!quizTotalCounted.has(qid)){ quizTotalCounted.add(qid); totalTrackable++; }
    const card=document.createElement('div'); card.className='quiz-card';
    const qt=document.createElement('div'); qt.className='q-text'; qt.textContent=(qi+1)+'. '+q.q; card.appendChild(qt);
    const opts=document.createElement('div'); opts.className='opts'; card.appendChild(opts);
    const rat=document.createElement('div'); rat.className='rationale'; rat.innerHTML='<b>Rationale:</b> '+q.rat;
    if(q.type==='multi'){
      const chosen=new Set();
      q.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{ if(chosen.has(i)){chosen.delete(i);btn.classList.remove('sel-multi');}else{chosen.add(i);btn.classList.add('sel-multi');} };
        opts.appendChild(btn);
      });
      const sub=document.createElement('button'); sub.className='submit-multi'; sub.textContent='Check Answer';
      sub.onclick=()=>{
        const correct=new Set(q.correct);
        let allRight=chosen.size===correct.size;
        opts.querySelectorAll('.opt').forEach((b,i)=>{
          b.classList.add('disabled');
          if(correct.has(i))b.classList.add('correct');
          else if(chosen.has(i)){b.classList.add('wrong');allRight=false;}
        });
        if(!allRight){ addToVault({id:qid,q:q.q,opts:q.opts,type:'multi',correct:q.correct,rat:q.rat,source:source||title||''}); }
        rat.classList.add('show'); sub.style.display='none'; bumpProgress(qid);
      };
      card.appendChild(sub);
    } else {
      q.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{
          opts.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));
          if(i===q.correct)btn.classList.add('correct');
          else{
            btn.classList.add('wrong'); opts.querySelectorAll('.opt')[q.correct].classList.add('correct');
            addToVault({id:qid,q:q.q,opts:q.opts,type:'single',correct:q.correct,rat:q.rat,source:source||title||''});
          }
          rat.classList.add('show'); bumpProgress(qid);
        };
        opts.appendChild(btn);
      });
    }
    card.appendChild(rat);
    wrap.appendChild(card);
  });
  host.appendChild(wrap);
}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);}

<script>
document.getElementById('sec-why').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🧠</span> The Why Engine</h2>
<p class="intro-line">Casteel's method: know the WHY behind each disease. If you understand the mechanism, his trick wording can't fool you — the wrong answer just looks wrong. Every Unit 3 topic below traces the chain: cause → <b>because this happens</b> → so you see these signs → <b>which is why</b> we treat it this way.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>🔑 The whole trick</h3>
  <ul class="clean">
    <li>Don't memorize separate lists. <b>Derive</b> the signs and treatment from the mechanism.</li>
    <li>Every sign: ask <b>"WHY does this happen?"</b> Every treatment: <b>"WHY does this fix it?"</b></li>
    <li>On the test, ask <b>"what is physically happening in this patient?"</b> The answer that matches the physiology is right.</li>
  </ul>
  <div class="mnem"><div class="tag">The rule</div><div class="big">"If I can say the BECAUSE out loud, it's trap-proof."</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🩸 Diabetes — the master mechanism</h3>
  <p><b>The one idea everything flows from:</b> insulin is the KEY that lets glucose INTO cells. No insulin (Type 1) or insulin that doesn't work (Type 2) → glucose is stuck in the blood, and the cells are starving even though sugar is everywhere.</p>
  <p class="why-chain"><b>Reason the classic "3 P's" forward:</b><br>
  Glucose piles up in the blood → spills into the urine → drags water with it (osmotic diuresis) → <b>polyuria</b> (peeing a lot).<br>
  All that water loss → dehydration → <b>polydipsia</b> (extreme thirst).<br>
  Cells are starving (glucose can't get in) → the body screams for fuel → <b>polyphagia</b> (hunger) + weight loss + fatigue.<br>
  High blood sugar damages tiny vessels and nerves over time and feeds bacteria → <b>slow healing, infections, blurred vision, numbness</b>.</p>
  <div class="hy">⭐ You never memorize the symptom list — you ask "what happens when sugar is stuck in the blood and cells are starving?" and reason it all out.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🚨 DKA — why it's an acid emergency (Type 1)</h3>
  <p><b>Root cause:</b> NO insulin at all → cells can't use glucose → the body thinks it's starving and burns FAT for fuel instead.</p>
  <p class="why-chain"><b>Reason it forward:</b><br>
  Burning fat produces <b>ketones</b>, which are ACIDS → blood pH drops → <b>metabolic acidosis</b>.<br>
  The lungs try to blow off the acid (CO₂) → <b>deep rapid Kussmaul breathing + fruity/acetone breath</b>.<br>
  Sky-high glucose → massive osmotic diuresis → <b>severe dehydration, polyuria, weak rapid pulse, hypotension</b>.<br>
  <b>The potassium trap:</b> acidosis pushes K⁺ OUT of cells into the blood → serum K⁺ looks HIGH at first — but total body K⁺ is actually LOW, and when you give insulin, K⁺ rushes back into cells and can crash dangerously.</p>
  <p><b>So the treatment makes sense:</b> <b>fluids first</b> (they're profoundly dehydrated) → <b>insulin</b> (stops fat-burning, ends ketone production) → <b>watch K⁺ like a hawk</b> because it will drop as insulin works.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>💧 HHS — why it's dehydration without the acid (Type 2)</h3>
  <p><b>Root cause:</b> Type 2 patients <b>ARE producing insulin</b> — the problem is <b>insulin resistance</b>: their cells don't respond to it well, so glucose can't get pulled out of the blood and into cells the way it should. That glucose just <b>stays stuck/hanging around in the blood</b>, piling higher and higher.</p>
  <p class="why-chain"><b>Reason it forward:</b> here's the key detail — <b>it takes very little insulin to tell the liver "stop burning fat," but a LOT of working insulin to actually move glucose into cells.</b> So even though the cells are resistant enough to let glucose pile up sky-high (often >600), that same circulating insulin is usually still enough to reach the liver and <b>block fat breakdown/ketone production</b>. <b>Because</b> fat is never broken down, there are no ketones and no acid — which is why glucose climbs insanely high → enormous osmotic diuresis → <b>profound dehydration, hyperosmolality, altered mental status/seizures</b> — but there's <b>no Kussmaul breathing, no fruity breath, no acidosis</b>. That's the whole difference from DKA.</p>
  <div class="hy">⭐ <b>DKA vs HHS in one line:</b> DKA (Type 1) = ZERO insulin, so fat-burning is completely unblocked → ketones/acid. HHS (Type 2) = insulin is present but the cells are resistant to its glucose effect — glucose stays in the blood — while that same insulin is often still enough to keep fat-burning/ketone production shut off. Same hormone, two different jobs, two different thresholds.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>📉 Hypoglycemia — why the brain panics</h3>
  <p><b>Root cause:</b> too much insulin / too little food / too much exercise → blood sugar drops below 70. The <b>brain runs on glucose</b> and has no backup.</p>
  <p class="why-chain"><b>Reason it forward:</b> first the body dumps adrenaline to fix it → <b>shaky, sweaty, fast heart, hungry, anxious</b> (adrenergic signs). If it keeps dropping, the brain starves → <b>confusion, slurred speech, seizures, LOC</b> (neuro signs). <b>Because</b> the brain is starving fast, hypoglycemia is a more immediate emergency than high sugar.</p>
  <p><b>So the treatment makes sense:</b> conscious → <b>15 g fast carbs, recheck in 15 min (Rule of 15)</b>. Unconscious/can't swallow → <b>glucagon</b> (tells the liver to dump stored glucose) — never put food in the mouth of someone who can't swallow.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🦶 Diabetic complications — why "sugar wrecks pipes & wires"</h3>
  <p><b>The unifying why:</b> chronic high glucose damages <b>blood vessels (pipes)</b> and <b>nerves (wires)</b> everywhere. Every long-term complication is just "which pipes or wires got wrecked."</p>
  <p class="why-chain">
  <b>Tiny vessels (microvascular):</b> eyes → <b>retinopathy</b> (blindness); kidneys → <b>nephropathy</b> (kidney failure).<br>
  <b>Big vessels (macrovascular):</b> heart/brain/legs → <b>heart attack, stroke, peripheral vascular disease</b>.<br>
  <b>Nerves (neuropathy):</b> can't feel the feet → <b>injuries go unnoticed</b> + poor circulation won't heal them + high sugar feeds bacteria → <b>foot ulcers → amputation</b>.</p>
  <p><b>So foot care makes sense:</b> daily inspection (<b>because</b> they can't FEEL an injury), never barefoot, no heating pads (<b>because</b> they can't feel a burn), glucose control (<b>because</b> it's the root of all of it).</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🛏️ Pressure injuries — why tissue dies</h3>
  <p><b>Root cause:</b> unrelieved pressure (usually over a bony prominence) squeezes the tiny vessels shut → that skin gets no blood → <b>no oxygen → the tissue dies</b>.</p>
  <p class="why-chain"><b>Reason it forward:</b> pressure over the sacrum, heels, hips → capillaries collapse → skin breaks down from the pressure point. <b>Because</b> the cause is unrelieved pressure, the #1 prevention is <b>relieving it — reposition every 2 hours</b>. <b>Because</b> friction and moisture and poor nutrition (low albumin) all speed breakdown, you keep skin clean/dry and feed protein.</p>
  <div class="hy">⭐ <b>Why you NEVER massage a reddened area:</b> the tissue underneath is already damaged and fragile — massaging can rupture those tiny vessels and make it worse. The mechanism tells you the rule.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👁️ Glaucoma — why you lose vision from the edges in</h3>
  <p><b>Root cause:</b> fluid (aqueous humor) is made inside the eye and must drain out. If it can't drain → it backs up → <b>pressure builds inside the eye (high IOP)</b>.</p>
  <p class="why-chain"><b>Reason it forward:</b> that pressure squeezes the <b>optic nerve</b> → the nerve fibers die from the outside in → <b>peripheral vision goes first (tunnel vision)</b>, painless and gradual in open-angle. <b>Because</b> the damage is from pressure on the nerve, treatment = <b>lower the IOP</b> (drops that reduce fluid or improve drainage). <b>Because</b> dead optic nerve doesn't come back, lost vision is permanent — so it's about <b>preventing further loss</b>.</p>
  <div class="hy">⭐ <b>Angle-closure = emergency:</b> sudden total blockage → <b>sudden severe eye pain, halos, nausea, rock-hard eye</b>. This one is acute and needs immediate treatment to save the eye.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👂 Ménière's disease — why the room spins</h3>
  <p><b>Root cause:</b> too much fluid (endolymph) builds up in the inner ear → the pressure disrupts the balance and hearing organs.</p>
  <p class="why-chain"><b>Reason the triad forward:</b> fluid pressure on the <b>balance organ</b> → <b>episodic vertigo</b> (spinning, the worst symptom); on the <b>hearing organ</b> → <b>fluctuating sensorineural hearing loss</b> + <b>tinnitus</b> (ringing) + ear fullness. <b>Because</b> the problem is fluid/sodium retention, the treatment is a <b>low-sodium diet + diuretics</b> to reduce the fluid. <b>Because</b> vertigo attacks cause falls, safety is the priority during an attack.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🌫️ Cataracts — why everything looks cloudy and glary</h3>
  <p><b>Root cause:</b> the lens (normally clear, so light passes straight through to the retina) slowly turns cloudy/opaque with age, UV exposure, or diabetes.</p>
  <p class="why-chain"><b>Reason it forward:</b> light hits the cloudy lens and <b>scatters instead of focusing</b> → <b>blurry vision, glare and halos around lights</b> (worse at night when the pupil is wide and more scattered light gets in), and <b>faded/yellowed colors</b> (the clouded lens filters color). <b>Because</b> the lens itself is the problem — not the retina or the nerve — there's no pain, and <b>vision is fully restored once the cloudy lens is surgically removed and replaced</b> with a clear implant.</p>
  <p><b>So post-op teaching makes sense:</b> avoid bending/lifting/straining (<b>because</b> it raises IOP and can dislodge the healing incision/implant); don't rub the eye; report sudden pain (<b>because</b> that's not a normal part of healing).</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🎯 Macular degeneration — why straight lines go wavy, center-out</h3>
  <p><b>Root cause:</b> the macula (the tiny central part of the retina responsible for sharp, detailed central vision) degenerates with age — from abnormal blood vessels (wet) or gradual tissue thinning (dry).</p>
  <p class="why-chain"><b>Reason it forward:</b> the macula sits at the very CENTER of the retina, so damage there → <b>loss of CENTRAL vision first</b> — straight lines look wavy or distorted, there's a blurry/blank spot right in the middle of what they're looking at, while <b>peripheral (side) vision stays intact</b>. <b>Because</b> this is the opposite structure from glaucoma (which damages the optic nerve from the outside in), the vision-loss pattern is the exact opposite: macular degeneration = center out, glaucoma = edges in.</p>
  <div class="hy">⭐ <b>Trap answer alert:</b> if a question describes losing central vision, that's macular degeneration. Losing peripheral (tunnel) vision = glaucoma. Casteel loves testing this exact contrast.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💥 Retinal detachment — why it's flashes, floaters, and a curtain</h3>
  <p><b>Root cause:</b> the retina (the light-sensing layer lining the back of the eye) tears and peels away from the tissue behind it that feeds it blood and oxygen.</p>
  <p class="why-chain"><b>Reason it forward:</b> as the retina tears and pulls away, it tugs on the vitreous gel and nerve fibers → <b>sudden flashes of light and floaters</b>. As more of the retina peels off, the part of vision it used to send goes dark → a <b>curtain or shadow moving across the visual field</b>. <b>Because</b> the detached retina is no longer getting blood supply, it will die — and that vision loss is <b>permanent</b> — if it isn't surgically reattached quickly. This is a <b>true ophthalmic emergency</b>, not a "wait and see."</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👂 Conductive vs. sensorineural hearing loss — why one comes back and the other doesn't</h3>
  <p><b>The one idea everything flows from:</b> sound has to travel two ways — first mechanically THROUGH the outer/middle ear, then as a nerve signal FROM the inner ear/cochlea to the brain. Ask: which part is blocked, or which part is damaged?</p>
  <p class="why-chain"><b>Conductive (a blockage in the pathway):</b> earwax, fluid, otitis media, or a perforated eardrum physically <b>blocks sound from getting through</b> to the inner ear. <b>Because</b> the inner ear and nerve are fine — the sound just can't get in — removing the blockage (irrigation, treating the infection) <b>restores hearing</b>.</p>
  <p class="why-chain"><b>Sensorineural (damage to the receiver itself):</b> the cochlea's tiny hair cells or the auditory nerve are damaged — by aging (<b>presbycusis</b>), loud noise, or ototoxic drugs. <b>Because</b> the damaged hair cells/nerve don't regenerate, this hearing loss is <b>usually permanent</b> — hearing aids amplify sound, but they can't fix a broken receiver.</p>
  <div class="hy">⭐ <b>Ototoxic drugs</b> (aminoglycosides, loop diuretics like furosemide, high-dose aspirin, some chemo agents) damage the cochlea's hair cells directly → sensorineural loss + tinnitus. <b>Because</b> this damage doesn't reverse, the nursing priority is prevention: report new tinnitus or hearing changes immediately so the drug can be stopped before permanent damage sets in.</div>
</div>

<div id="quiz-why"></div>

`;

renderQuiz('quiz-why',[

   rat:'The trap: options A, C, and D all dodge the actual physiology. The real reason is the loss of protective sensation from neuropathy — pain, the body\'s natural warning system, is gone, so vision has to substitute for feeling. That\'s why "no pain" is exactly the reason inspection is critical, not a reason to skip it.'},

  {q:'A nurse finds a reddened, intact area over a patient\'s sacrum and considers massaging it to "improve circulation." WHY is this the WRONG action?',type:'single',
   opts:['A. Massage is uncomfortable for most patients and should be avoided for comfort reasons alone','B. The tissue underneath is already damaged from pressure, and massaging fragile, compromised capillaries can rupture them and worsen the injury','C. Massage has no measurable effect on skin, so it is simply a waste of time','D. Massage increases the risk of spreading a skin infection to other areas'],correct:1,
   rat:'The trap: C and D sound like reasonable-enough justifications, but they miss the actual mechanism. Redness here signals tissue ALREADY compromised by pressure — massaging that fragile tissue can rupture damaged capillaries and deepen the injury, which is the specific, tested rationale.'},

  {q:'A patient with open-angle glaucoma has 20/20 central visual acuity on a standard eye chart but has already lost significant peripheral vision. WHY does this pattern occur specifically in open-angle glaucoma?',type:'single',
   opts:['A. The macula degenerates first, sparing the peripheral retina until late in the disease','B. Impaired aqueous outflow raises intraocular pressure, which gradually compresses optic nerve fibers from the outer edge inward, sparing central acuity until late','C. The lens becomes progressively cloudy, scattering light most in the peripheral visual field','D. Retinal detachment typically begins at the periphery and moves centrally over time'],correct:1,
   rat:'The trap: A describes macular degeneration (the opposite pattern) and C describes cataracts — both plausible-sounding but wrong mechanisms for glaucoma. The correct mechanism is chronic IOP elevation compressing the optic nerve from the outside in, which is exactly why central acuity (tested by a standard eye chart) can look normal while real damage is already extensive.'},

  {q:'A Ménière\'s patient asks why a low-sodium diet and a diuretic are prescribed when the disease affects the ear, not the kidneys. What is the BEST explanation?',type:'single',
   opts:['A. Sodium and diuretics primarily treat the associated hypertension that often accompanies Ménière\'s disease','B. Ménière\'s disease is caused by excess endolymphatic fluid in the inner ear; reducing sodium and total body fluid volume lowers that inner-ear fluid pressure and reduces attack frequency','C. Low sodium prevents the tinnitus from worsening by protecting the auditory nerve directly','D. Diuretics are given only to counteract fluid retention caused by the antiemetic medications used during attacks'],correct:1,
   rat:'The trap: A and D both misattribute the treatment to something OTHER than the ear itself, and C invents a nerve-protective effect that doesn\'t exist. The real mechanism is systemic: less sodium/fluid intake lowers total body fluid, which lowers the excess endolymph pressure driving the vertigo/tinnitus/hearing symptoms.'},

  {q:'A hypoglycemic patient becomes shaky, diaphoretic, and tachycardic before becoming confused. A student nurse asks why the body produces these signs BEFORE confusion appears. What is the correct explanation?',type:'single',
   opts:['A. Shakiness and sweating are unrelated side effects of low glucose with no protective purpose','B. The adrenal glands release epinephrine as an early counter-regulatory response to raise glucose; if that response fails and glucose keeps falling, the glucose-dependent brain becomes starved, producing neurologic symptoms','C. The heart directly senses low glucose levels and speeds up independently of any hormonal signal','D. Confusion only occurs in patients who have hypoglycemia unawareness from long-standing neuropathy'],correct:1,
   rat:'The trap: D describes a real phenomenon (hypoglycemia unawareness) but misapplies it — that\'s about SKIPPING the adrenergic stage, not explaining why it normally comes first. The correct sequence: epinephrine surge first (adrenergic signs, attempting to raise glucose), then brain starvation (neuroglycopenic signs) if the counter-response isn\'t enough.'},

  {q:'A cataract patient reports that their vision is far worse driving at night than during the day, though both are somewhat blurry. WHY does darkness worsen the glare and haziness specifically?',type:'single',
   opts:['A. The retina requires more light at night and becomes fatigued faster in dim conditions','B. The pupil dilates wider in low light, allowing more light to pass through the cloudy lens, which scatters it and produces more glare/halos than in bright daylight','C. Night driving requires faster eye movements, which the cloudy lens cannot track effectively','D. The optic nerve conducts signals more slowly in low-light conditions'],correct:1,
   rat:'The trap: A, C, and D all invent plausible-sounding but incorrect mechanisms involving the retina, eye movement, or nerve conduction. The actual mechanism is purely optical: a wider pupil at night lets more light hit the cloudy lens, and more of that light scatters — hence worse glare and halos specifically after dark.'},

  {q:'A patient with macular degeneration and a patient with glaucoma both have chronic, painless, progressive vision loss. A student asks how to tell them apart just from the pattern of vision loss. What is the correct distinction?',type:'single',
   opts:['A. Macular degeneration and glaucoma cause an identical pattern of vision loss and cannot be distinguished this way','B. Macular degeneration destroys central vision first because the macula IS the central retina; glaucoma destroys peripheral vision first because it compresses the optic nerve from the outer edge inward','C. Macular degeneration causes peripheral loss first, while glaucoma causes central loss first','D. Both diseases cause sudden, painful vision loss that can only be distinguished by onset speed'],correct:1,
   rat:'The trap: C reverses the actual pattern (a common memorization error), and D is factually wrong since both conditions are painless and gradual. The correct distinction is structural: the macula (center of the retina) failing first vs. the optic nerve being compressed from the outside in — same slow, painless presentation, opposite location of damage.'},

  {q:'A patient reports sudden flashes of light and a shower of new floaters, followed an hour later by a shadow creeping across the edge of their vision. WHY is rapid treatment critical in this presentation?',type:'single',
   opts:['A. The symptoms are uncomfortable but not dangerous, so treatment timing does not significantly affect the outcome','B. The retina has torn and separated from its blood supply; retinal tissue without oxygen begins to die, and that vision loss becomes permanent the longer reattachment is delayed','C. This presentation always resolves spontaneously within 24-48 hours without intervention','D. The flashes and floaters indicate a simple refractive error that glasses can correct'],correct:1,
   rat:'The trap: A, C, and D all minimize a genuine surgical emergency. The mechanism is time-dependent tissue death: once the retina separates from the choroid (its blood/oxygen supply), the clock is running — the longer reattachment is delayed, the more retinal tissue dies and the more vision loss becomes permanent.'},

  {q:'A patient develops sudden hearing loss after several days of high-dose IV gentamicin and asks why the audiologist says this hearing loss likely won\'t improve, unlike the ear infection they had last year. What is the correct explanation?',type:'single',
   opts:['A. Both conditions affect the same structures and should resolve identically over time','B. The infection was a conductive problem (a treatable blockage); gentamicin is ototoxic and damages the cochlea\'s hair cells directly, and those hair cells do not regenerate once destroyed','C. IV antibiotics only cause temporary hearing changes that always resolve once the medication is stopped','D. The new hearing loss is unrelated to the medication and is simply a coincidental recurrence of the prior infection'],correct:1,
   rat:'The trap: A and D both dodge the actual mechanism, and C incorrectly assumes ototoxicity is always reversible. The real distinction is structural: an infection is a conductive (fixable) blockage, while an ototoxic drug destroys the cochlea\'s hair cells (sensorineural damage) — those cells don\'t regenerate, so the damage is typically permanent.'}
],'Explain the WHY');
</script>
<script>
document.getElementById('sec-diabetes').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🩸</span> Diabetes — Core</h2>
<p class="intro-line">The biggest, most-tested topic in Unit 3. Master the mechanism (insulin = the key that lets glucose into cells) and the rest follows.</p>

<div class="card">
  <h3>Type 1 vs Type 2 — the core difference</h3>
  <table class="lab">
    <tr><th></th><th>Type 1</th><th>Type 2</th></tr>
    <tr><td><b>Problem</b></td><td>Autoimmune destruction of beta cells → <b>NO insulin</b></td><td>Insulin <b>resistance</b> + declining production → insulin doesn't work well</td></tr>
    <tr><td><b>Onset</b></td><td>Usually younger, sudden</td><td>Usually >45, gradual (rising in youth from obesity)</td></tr>
    <tr><td><b>Body type</b></td><td>Often thin, weight loss</td><td>Often overweight</td></tr>
    <tr><td><b>Treatment</b></td><td><b>Insulin always</b> (they make none)</td><td>Lifestyle, oral agents, sometimes insulin</td></tr>
    <tr><td><b>Acute crisis</b></td><td><b>DKA</b> (ketoacidosis)</td><td><b>HHS</b> (hyperosmolar, no acid)</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Type 1 = None (no insulin) • Type 2 = Too little / doesn't work"</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🍬 The sugar math (Casteel's favorite way in)</h3>
  <p class="why-chain">Your body only wants about <b>1 teaspoon of sugar circulating in your ENTIRE blood volume</b> at any given moment — roughly <b>7 sugar cubes</b>, about 30 g total, spread across ~1.5 gallons of blood. That's it. That's the target.</p>
  <ul class="clean">
    <li>A single sugary drink or dessert can dump way more than that into your blood at once — your body then has to "whittle it down," moving it into cells or storing it as fat, to get back to that tiny baseline.</li>
    <li>The average person consumes roughly <b>31 teaspoons of sugar a day</b> — many multiples of what's supposed to be circulating at once. Insulin is working constantly just to keep up.</li>
    <li>This is WHY chronic overeating of sugar burns out the system: constant insulin release → cells stop listening (resistance) → sugar backs up in the blood instead of going where it's needed.</li>
  </ul>
  <div class="hy">⭐ Use this with patients: it's a simple, teach-back-friendly way to explain why "just a little" sugar, over and over, adds up to a huge relative load on the body.</div>
</div>

<div class="card">
  <h3>💉 What insulin actually DOES (4 jobs)</h3>
  <ul class="clean">
    <li><b>1. Moves glucose out of the blood</b> and into liver, muscle, and fat cells so they can use it for energy.</li>
    <li><b>2. Stores extra glucose as fat</b> (lipogenesis) once cells have what they need.</li>
    <li><b>3. Blocks fat breakdown</b> (inhibits lipolysis) — this is why, when insulin is missing or ineffective, the body switches to burning fat instead and produces <b>ketones</b> (this is the root of DKA).</li>
    <li><b>4. Helps push potassium INTO cells</b> — this is why IV insulin (with dextrose) is a standard treatment for hyperkalemia, and why starting an insulin drip in DKA makes serum K⁺ drop fast (see DKA section).</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">Insulin = "Let it IN, lock the fat OUT, and push K IN too."</div></div>
</div>

<div class="card" style="border-color:var(--amber)">
  <h3>⚠️ Metabolic syndrome — the risk cluster (very high-yield, often missed)</h3>
  <p class="why-chain">Metabolic syndrome is a cluster of findings that predicts Type 2 diabetes AND heart disease/stroke — it's the "before you get diabetes" warning cluster. A patient usually has <b>3 or more</b> of the following:</p>
  <ul class="clean">
    <li><b>Central (abdominal) obesity</b> — waist circumference >40 in (men), >35 in (women). "Apple-shaped."</li>
    <li><b>Hypertension.</b></li>
    <li><b>Dyslipidemia</b> — low HDL ("good" cholesterol) + high LDL/triglycerides.</li>
    <li><b>Hyperinsulinemia with insulin resistance</b> — high insulin levels that aren't working effectively, alongside elevated fasting glucose.</li>
    <li>Sedentary lifestyle is the lifestyle driver behind most of the above.</li>
  </ul>
  <div class="hy">⭐ This is a risk-factor cluster, NOT a diabetes complication itself — don't confuse the two on an exam question. It raises risk for Type 2 diabetes, cardiovascular disease, stroke, and some cancers.</div>
</div>

<div class="card">
  <h3>🧬 Other types you'll see tested</h3>
  <ul class="clean">
    <li><b>LADA (Latent Autoimmune Diabetes in Adults)</b> — sometimes called "Type 1.5." Same autoimmune beta-cell destruction as Type 1, but slower-onset and in adults, so it often gets misdiagnosed as Type 2 at first. Antibody testing distinguishes it.</li>
    <li><b>Gestational diabetes</b> — develops during pregnancy, more common with larger babies. Usually resolves after delivery, but significantly raises the mother's future risk of Type 2 diabetes.</li>
    <li><b>Prediabetes</b> — fasting glucose 100–125 mg/dL or A1C 5.7–6.4%. Overlaps heavily with metabolic syndrome. <b>Reversible</b> with lifestyle change — this is the window to prevent progression to Type 2.</li>
  </ul>
</div>

<div class="card">
  <h3>The 3 P's + classic signs</h3>
  <ul class="clean">
    <li><b>Polyuria</b> — peeing a lot (glucose drags water into urine).</li>
    <li><b>Polydipsia</b> — extreme thirst (from the water loss).</li>
    <li><b>Polyphagia</b> — hunger (cells are starving despite high blood sugar).</li>
    <li>Plus: fatigue, blurred vision, slow-healing wounds, recurrent infections, numbness/tingling. Type 1 adds sudden weight loss, nausea, abdominal pain.</li>
  </ul>
</div>

<div class="card">
  <h3>🔬 Diagnostic numbers (know these cold)</h3>
  <table class="lab">
    <tr><th>Test</th><th>Diabetes</th><th>Notes</th></tr>
    <tr><td>Fasting plasma glucose</td><td>≥ 126 mg/dL</td><td>no food 8 hrs</td></tr>
    <tr><td>Random plasma glucose</td><td>≥ 200 mg/dL</td><td>with symptoms</td></tr>
    <tr><td><b>A1C</b></td><td>≥ 6.5%</td><td>avg glucose over ~3 months</td></tr>
    <tr><td>2-hr OGTT</td><td>≥ 200 mg/dL</td><td>glucose tolerance test</td></tr>
    <tr><td>Normal fasting</td><td>70–99 mg/dL</td><td>prediabetes 100–125</td></tr>
  </table>
  <div class="hy">⭐ <b>A1C</b> = the "report card" — it reflects average glucose over ~3 months, so it can't be faked by eating well the day before. Goal for most diabetics: <b>&lt;7%</b>.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>💉 Insulin onset/peak/duration</h3>
  <p>Moved to its own dedicated section since it's this dense and this testable — see the <b>💉 Insulin Lab</b> tab for the full comparison table, mixing rules, and a drilling quiz built specifically for onset/peak/duration.</p>
</div>

<div class="card">
  <h3>💊 Oral agents & Glucagon — the ones he's tested you on</h3>
  <ul class="clean">
    <li><b>Metformin</b> (biguanide, first-line for Type 2) — decreases hepatic glucose production, improves insulin sensitivity, does NOT stimulate insulin release (low hypoglycemia risk alone). <b>Hold 48 hrs before/after IV contrast</b> and check eGFR before starting; contraindicated if eGFR &lt;30. Watch for lactic acidosis (rare but serious): unexplained muscle pain, malaise, unusual fatigue.</li>
    <li><b>Glimepiride</b> (2nd-gen sulfonylurea) — stimulates insulin release by closing ATP-sensitive K⁺ channels on beta cells. <b>Glucose-INDEPENDENT</b> — works even when glucose is already low, which is exactly why it can cause hypoglycemia. Give with the first meal of the day; skip the dose if the meal is skipped.</li>
    <li><b>Glyburide</b> (2nd-gen sulfonylurea) — same mechanism as glimepiride, but a <b>longer duration and higher hypoglycemia risk</b>, especially in older adults. <b>On the Beers Criteria list — avoid in elderly patients</b> and use extreme caution with renal impairment (prolonged, severe hypoglycemia risk).</li>
    <li><b>SGLT-2 inhibitors</b> ("-flozin") — cause glucose to be excreted in the urine; watch for UTIs/yeast infections from the glucose-rich urine.</li>
    <li><b>GLP-1 agonists</b> ("-tide," e.g. semaglutide) — incretin-based mechanism, slows gastric emptying and increases satiety (weight-loss benefit); low hypoglycemia risk alone, and it is a scheduled therapy, not a rescue medication.</li>
    <li><b>Glucagon</b> — the antidote for severe hypoglycemia when a patient can't safely take anything by mouth. Stimulates the liver to break down stored glycogen (glycogenolysis) and make new glucose (gluconeogenesis) — <b>requires adequate liver glycogen stores to work</b> (may be ineffective in starvation, chronic alcohol use, or adrenal insufficiency). Position an unconscious patient on their SIDE after giving it (vomiting/aspiration risk during recovery), and give oral carbohydrates as soon as the patient is awake enough to prevent the glucose from dropping again.</li>
  </ul>
  <div class="hy">⭐ <b>Metformin + contrast dye = HOLD.</b> High-yield: hold metformin before/after IV contrast to protect the kidneys and prevent lactic acidosis.</div>
  <div class="hy">⭐ <b>Sulfonylurea safety pattern:</b> both glimepiride and glyburide work whether or not the patient has actually eaten — that's why "never skip a meal on this medication" is core teaching, and why glyburide specifically gets avoided in the elderly and renally impaired.</div>
</div>

<div id="quiz-diabetes"></div>
`;

renderQuiz('quiz-diabetes',[
  {q:'A patient with Type 2 diabetes controlled on metformin is scheduled for a CT scan with IV contrast dye tomorrow morning. Which action is MOST appropriate?',type:'single',
   opts:['A. Administer the metformin dose as scheduled and monitor intake and output afterward','B. Hold the metformin dose before and after the procedure until renal function is confirmed stable','C. Give the metformin dose with an extra glass of water to protect the kidneys','D. Administer half the usual metformin dose the morning of the procedure'],correct:1,
   rat:'A, C, and D all sound like reasonable-enough compromises if you don\'t know the actual protocol, but only B matches it. Metformin plus contrast dye raises the risk of lactic acidosis and acute kidney injury — the standard is to hold it around the procedure and confirm renal function before resuming, not to give a partial dose or "protect" the kidneys with water.'},

  {q:'A patient in DKA is started on an IV insulin drip. Which insulin does the nurse expect to be running?',type:'single',
   opts:['A. NPH insulin','B. Regular insulin','C. Insulin glargine','D. Insulin lispro'],correct:1,
   rat:'All four are real insulins a nurse might reasonably picture running here. Only regular (short-acting) insulin is approved and studied for IV administration — NPH, glargine, and lispro are never given IV, regardless of how their onset/duration profile might otherwise seem to fit the situation.'},

  {q:'A nurse is preparing to mix regular and NPH insulin in one syringe. Which sequence is correct?',type:'single',
   opts:['A. Draw up the NPH first, then the regular insulin','B. Draw up the regular insulin first, then the NPH','C. Draw up whichever insulin has the larger ordered dose first','D. Inject air into the regular insulin vial first, then draw up the NPH'],correct:1,
   rat:'Each sequence sounds like it could be a reasonable technique if you\'re just going by "does the order matter." The actual rule is clear before cloudy — regular insulin is drawn up first so the regular vial never risks contamination from NPH particles, which could alter its profile on future doses.'},

  {q:'A patient asks why their A1C of 8.2% matters more to their provider than today\'s fingerstick glucose of 110 mg/dL. What is the BEST explanation?',type:'single',
   opts:['A. The A1C reflects kidney function over time, while the fingerstick only shows current filtration','B. The A1C reflects average glucose control over the past 2-3 months, while the fingerstick is a single point-in-time value','C. The fingerstick is only accurate when the patient has fasted for at least 12 hours beforehand','D. The two values measure the same thing, so the difference reflects a testing error'],correct:1,
   rat:'A misattributes what A1C actually measures, C attaches a fasting requirement that doesn\'t apply here, and D assumes an error rather than two genuinely different measurements. A1C reflects glucose bound to hemoglobin over the red blood cell\'s ~2-3 month lifespan, so it captures the overall pattern in a way one fingerstick never can.'},

  {q:'Which findings would the nurse expect to find together in a newly diagnosed, untreated diabetic patient? (Select all that apply)',type:'multi',
   opts:['A. Polyuria','B. Polydipsia','C. Polyphagia with unexplained weight loss','D. Polycythemia','E. Bradycardia'],correct:[0,1,2],
   rat:'Polycythemia and bradycardia are both real clinical findings a nurse could encounter, just not from hyperglycemia — that\'s what makes them believable distractors here. The true triad — polyuria, polydipsia, polyphagia — all trace back to glucose stuck in the blood while cells are starved, with polyphagia paired with weight loss in Type 1 as the body burns fat/muscle instead.'},

  {q:'A patient\'s labs show waist circumference 42 inches, BP 134/86, fasting glucose 108 mg/dL, HDL 38 mg/dL, and triglycerides 165 mg/dL. What does this pattern MOST likely represent?',type:'single',
   opts:['A. A diagnosed complication of long-standing Type 2 diabetes','B. Metabolic syndrome — a risk cluster for future Type 2 diabetes and cardiovascular disease','C. Acute diabetic ketoacidosis','D. Well-controlled Type 2 diabetes on current therapy'],correct:1,
   rat:'A misclassifies this as a complication rather than a risk cluster, C misapplies an acute-crisis label to stable outpatient values, and D assumes an existing diabetes diagnosis that these numbers don\'t actually confirm (the glucose here is prediabetic range). This patient meets 4 of the 5 metabolic syndrome criteria — a reversible risk pattern, distinct from all three of those.'},

  {q:'A 45-year-old is diagnosed with diabetes, initially managed successfully with metformin alone, but has positive glutamic acid decarboxylase (GAD) antibodies. Within 18 months, oral agents fail and insulin is required. This progression is MOST consistent with:',type:'single',
   opts:['A. Typical Type 2 diabetes','B. LADA (Latent Autoimmune Diabetes in Adults)','C. Gestational diabetes that persisted after delivery','D. A false-positive antibody result'],correct:1,
   rat:'A is genuinely tempting since Type 2 diabetes does progress over time, and D offers an easy out from an inconvenient lab result. The detail that actually decides this is the antibody positivity combined with the unusually fast failure of oral agents (18 months, not years) — that combination is the signature of LADA.'},

  {q:'Which of the following are direct physiologic effects of insulin, beyond simply moving glucose into cells? (Select all that apply)',type:'multi',
   opts:['A. Promotes storage of excess glucose as fat (lipogenesis)','B. Inhibits the breakdown of fat (lipolysis)','C. Promotes movement of potassium into cells','D. Stimulates the release of glucagon from alpha cells','E. Directly produces ketone bodies as a byproduct'],correct:[0,1,2],
   rat:'D and E both sound like they could plausibly belong on an insulin-function list. Insulin actually opposes glucagon release (they work against each other), and ketones form specifically when insulin is ABSENT — insulin\'s real additional roles are storing glucose as fat, blocking fat breakdown, and driving potassium into cells.'},

  {q:'A client with Type 2 diabetes has been managed on metformin for 6 years. Recent labs show an A1C of 8.9%, up from 7.1% a year ago, despite reported medication adherence. Which explanation for this trend is MOST accurate?',type:'single',
   opts:['A. Metformin absorption typically declines after several years of continuous use','B. Beta-cell function typically continues to decline over time in Type 2 diabetes, so a single oral agent may eventually become insufficient','C. A1C results become less reliable the longer a patient has been diagnosed','D. This pattern indicates the client has developed Type 1 diabetes'],correct:1,
   rat:'A invents a pharmacokinetic effect that isn\'t established, C questions a validated test without basis, and D reclassifies the diabetes type based on a lab trend that doesn\'t actually indicate that. Type 2 diabetes is progressive — beta-cell function keeps declining over years even with perfect adherence, which is why additional therapy often becomes necessary over time.'},

  {q:'A nurse is teaching a client newly started on a GLP-1 receptor agonist (e.g., semaglutide) for Type 2 diabetes. Which statement by the client indicates a correct understanding of this medication class?',type:'single',
   opts:['A. "This medication works the same way as insulin."','B. "This medication may help me feel full sooner and could support some weight loss, along with lowering my blood sugar."','C. "I should expect my blood sugar to drop significantly if I skip a meal."','D. "I should use this medication if I feel a hypoglycemic episode starting."'],correct:1,
   rat:'A, C, and D all describe things that are true of OTHER diabetes medications (insulin\'s mechanism, sulfonylurea-level hypoglycemia risk, and a rescue-style dosing pattern), which is what makes them believable here. GLP-1 agonists work through a different, incretin-based mechanism, carry a low hypoglycemia risk on their own, and are a scheduled ongoing therapy — not a rescue medication.'},

  {q:'What A1C level is used as a diagnostic threshold for diabetes?',type:'single',
   opts:['A. ≥5.0%','B. ≥6.5%','C. ≥9.0%','D. ≥12.0%'],correct:1,
   rat:'This one is exactly what it looks like — no trick here. ≥6.5% is the diagnostic A1C threshold for diabetes, one of the core numbers worth having cold before you start layering on the harder reasoning questions.'},

  {q:'A 60-year-old with Type 2 diabetes, stage 3 CKD (eGFR 38), and a recent HbA1c of 9.1% is being evaluated for medication changes. The provider is considering adding a sulfonylurea. Which additional finding would MOST strongly support choosing glipizide over glyburide specifically?',type:'single',
   opts:['A. The patient\'s preference for once-daily dosing','B. The patient\'s reduced renal clearance, which raises the risk of prolonged hypoglycemia with a longer-acting sulfonylurea','C. The patient\'s A1C being above 9%','D. The patient\'s age alone, independent of any other factor'],correct:1,
   rat:'A and C are both true details in this vignette but neither is the deciding factor for choosing BETWEEN the two sulfonylureas specifically. D isolates age without connecting it to the actual mechanism. The reduced eGFR is what matters most here — glyburide\'s longer duration and renal clearance make it riskier in reduced renal function, which is exactly why glipizide is preferred in this patient.'}
],'Diabetes Core Check');
</script>
<script>
document.getElementById('sec-insulin').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">💉</span> Insulin Lab</h2>
<p class="intro-line">Onset, peak, and duration for every insulin — the single most-tested detail in this unit, since it's WHY hypoglycemia timing makes sense. Built from your own ALT drug cards.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>⏱️ The master comparison table</h3>
  <table class="lab">
    <tr><th>Insulin</th><th>Onset</th><th>Peak</th><th>Duration</th><th>Appearance</th></tr>
    <tr><td><b>Aspart / Lispro</b> (rapid-acting)</td><td>10-20 min</td><td>1-3 hr</td><td>3-5 hr</td><td>Clear</td></tr>
    <tr><td><b>Regular</b> (short-acting)</td><td>30-60 min</td><td>2-4 hr</td><td>5-8 hr</td><td>Clear</td></tr>
    <tr><td><b>NPH</b> (intermediate-acting)</td><td>1-2 hr</td><td>4-12 hr</td><td>14-24 hr</td><td>Cloudy</td></tr>
    <tr><td><b>Glargine</b> (long-acting)</td><td>~1-2 hr</td><td><b>No peak</b></td><td>~24 hr</td><td>Clear</td></tr>
    <tr><td><b>Detemir</b> (long-acting)</td><td>~1-2 hr</td><td><b>No peak</b></td><td>12-24 hr (may need BID)</td><td>Clear</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Rapid in 15, Regular in 30, NPH takes a while, Glargine goes all day and never peaks."</div></div>
  <div class="hy">⭐ <b>The WHY behind hypoglycemia timing:</b> whatever time the PEAK falls at is when a patient is at highest hypoglycemia risk — that's not a coincidence to memorize separately, it's the direct meaning of "peak action." NPH given at breakfast peaks mid-morning; given at bedtime, it peaks around 2-3 AM (classic Somogyi-effect timing).</div>
</div>

<div class="card">
  <h3>💉 Rapid-Acting: Aspart / Lispro</h3>
  <ul class="clean">
    <li><b>Give 0-15 minutes before the meal</b> (or with the meal) — have the tray in front of the patient FIRST.</li>
    <li>Mimics the body's natural first-phase insulin response to eating — the most "physiologic" mealtime coverage.</li>
    <li>Hypoglycemia risk is highest at peak (1-3 hr) — usually mid-meal-to-post-meal.</li>
    <li>Used in basal-bolus regimens (paired with a long-acting insulin) and in insulin pumps.</li>
  </ul>
</div>

<div class="card">

    <li>Call the provider if unable to keep fluids down or glucose/ketones stay high.</li>

  <div class="hy">⭐ Same logic applies in the hospital: surgery and acute illness are physical stressors → cortisol rises → glucose rises. This is why hospitalized diabetics often need MORE frequent monitoring, not less, even when NPO.</div>
</div>

<div id="quiz-dka"></div>

renderQuiz('quiz-dka',[
  {q:'A patient arrives in the ED with glucose 640 mg/dL, serum osmolality 335 mOsm/kg, arterial pH 7.34, negative serum ketones, and profound lethargy. The family reports 3 days of poor oral intake due to a GI illness. Which condition does this presentation represent?',type:'single',
   opts:['A. Diabetic ketoacidosis','B. Hyperosmolar hyperglycemic syndrome','C. Hypoglycemic crisis with a false elevated glucose reading','D. Expected dehydration requiring only oral rehydration'],correct:1,
   rat:'The glucose alone (640) could tempt you toward "the worse-sounding option," but the deciding data here is the pH and ketones — both normal/absent, which rules out DKA no matter how high the glucose climbs. This is the hallmark HHS pattern: enough residual insulin to prevent ketosis, but not enough to control glucose.'},

  {q:'A patient with DKA has the following orders: IV 0.9% NS, an IV regular insulin drip, and potassium replacement once levels are confirmed. The initial serum potassium result is 5.5 mEq/L. What should the nurse do FIRST?',type:'single',
   opts:['A. Request a repeat potassium level before initiating any treatment','B. Begin the insulin drip immediately','C. Begin the IV fluids','D. Administer the ordered potassium replacement now'],correct:2,
   rat:'D is the most tempting option — 5.5 looks high enough to "need" supplementation. But that number reflects acidosis pushing K⁺ OUT of cells; total body K⁺ is actually depleted, and giving potassium now (on top of a still-elevated reading) risks dangerous hyperkalemia. Fluids come first; insulin follows; potassium is added once the level starts dropping as expected.'},

  {q:'A nurse is comparing two diabetic patients, both with glucose readings above 500 mg/dL. Which single finding BEST distinguishes a DKA presentation from an HHS presentation?',type:'single',
   opts:['A. The specific glucose number reached','B. The presence of severe dehydration','C. Kussmaul respirations and a fruity breath odor','D. The patient\'s reported level of thirst'],correct:2,
   rat:'A and B are both real findings in this scenario, which is what makes them tempting — but glucose level and dehydration occur in BOTH conditions, so neither one distinguishes them. Only DKA produces ketoacidosis, which is what causes Kussmaul breathing and fruity breath — that\'s the true differentiator.'},

  {q:'A Type 1 diabetic calls the clinic and reports vomiting for the past 8 hours, unable to eat, and states "I stopped taking my insulin since I\'m not eating anything." Which response from the nurse is BEST?',type:'single',

   rat:'A validates a genuinely common misconception, and C offers a "middle ground" dose that sounds reasonable but has no clinical basis. Illness raises glucose through cortisol/stress hormones regardless of food intake — which is exactly why stopping insulin during illness is the #1 preventable cause of DKA, and why monitoring should increase, not decrease.'},

  {q:'A patient being treated for DKA has a glucose that has fallen from 580 to 260 mg/dL after several hours on the insulin drip. Which change to the treatment plan should the nurse anticipate?',type:'single',
   opts:['A. Discontinuing the insulin drip','B. Adding dextrose to the IV fluids','C. Switching to a long-acting insulin','D. Discontinuing further IV fluids'],correct:1,
   rat:'A is the most tempting option since the glucose is genuinely improving — but stopping insulin too early lets ketone production restart before the acidosis has actually resolved. The correct move once glucose nears 200-250 is adding dextrose so the drip can keep running (still clearing ketones) without dropping the glucose too low.'},

  {q:'A nurse questions why the care team is intentionally slowing the rate of glucose correction in a patient being treated for HHS, rather than correcting it as fast as possible. What is the BEST rationale?',type:'single',

   rat:'A and C both describe plausible secondary benefits but miss the actual safety mechanism. The brain adapts to a hyperosmolar environment during prolonged severe hyperglycemia, so correcting the osmolality too fast pulls water rapidly into brain cells — this is why glucose is lowered gradually rather than as fast as possible, regardless of hemodynamic stability.'},

  {q:'A client in DKA has an arterial blood gas showing pH 7.18, PaCO2 22 mmHg, and HCO3 11 mEq/L. Which interpretation is correct?',type:'single',
   opts:['A. Respiratory acidosis with metabolic compensation','B. Metabolic acidosis with respiratory compensation','C. Metabolic alkalosis with respiratory compensation','D. A normal, expected acid-base balance for DKA'],correct:1,
   rat:'A reverses which system is the primary problem and which is compensating. The low pH and low HCO3 together identify a METABOLIC acidosis (from ketoacids) as the primary problem; the low PaCO2 shows the lungs compensating by blowing off CO2 through Kussmaul respirations — respiratory compensation FOR a metabolic problem, not a respiratory disorder itself.'},

  {q:'A client with DKA has been on an insulin drip for several hours. The provider orders a decrease in the infusion rate only once the anion gap has closed and bicarbonate has normalized, even though the glucose reached goal range earlier. What is the rationale for continuing insulin until this later point?',type:'single',

   rat:'A reverses the actual effect — it\'s an easy trap because faster breathing intuitively sounds like it would bring in (and therefore raise) more of everything, but the whole POINT of Kussmaul breathing is to blow CO2 OUT faster than it\'s produced. C incorrectly separates CO2 from the process entirely. D invents a timeline that isn\'t how this compensation works. Since CO2 is itself an acid in the blood, exhaling more of it (lowering PaCO2) is the lungs\' way of trying to correct the pH — this is why a DKA patient\'s expected pattern is pH LOW, HCO3 LOW, AND PaCO2 LOW, all three moving together, not two down and one normal.'}

<script>
document.getElementById('sec-hypo').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">📉</span> Hypoglycemia</h2>
<p class="intro-line">Blood sugar &lt;70 mg/dL. More immediately dangerous than high sugar — the brain runs on glucose and starves fast.</p>

<div class="card">
  <h3>Causes & the two symptom stages</h3>
  <p><b>Causes:</b> too much insulin/oral agent, too little food, skipped meal, too much exercise.</p>
  <ul class="clean">
    <li><b>Stage 1 — Adrenergic (mild, &lt;70):</b> the body dumps adrenaline → <b>shaky, sweaty, tachycardic, palpitations, anxious, hungry</b>. These are the early warning signs.</li>
    <li><b>Stage 2 — Neuroglycopenic (worse, &lt;54):</b> the brain starves → <b>confusion, headache, slurred speech, blurred/double vision, poor coordination, irritability</b>.</li>
    <li><b>Stage 3 — Severe:</b> seizures, loss of consciousness, can't self-treat.</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Cold & Clammy = need some CANDY (low sugar). Hot & Dry = sugar HIGH."</div><div class="exp">Sweaty/shaky = hypoglycemia. Dehydrated/flushed = hyperglycemia.</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🍬 The Rule of 15 (conscious patient)</h3>
  <ul class="clean">
    <li>Give <b>15 grams of fast-acting carbs</b>: 4 oz juice, 3–4 glucose tablets, 1 tbsp sugar/honey, or hard candy.</li>
    <li><b>Wait 15 minutes, recheck</b> blood glucose.</li>
    <li>Still &lt;70? <b>Repeat another 15 g.</b></li>
    <li>Once stable, give a <b>snack with protein/complex carb</b> to prevent it from dropping again.</li>
  </ul>
  <div class="hy">⭐ <b>Don't over-treat.</b> Give 15 g, wait, recheck — don't dump a huge amount of sugar in at once (causes a rebound high). Fast carbs, not a candy bar with fat that slows absorption.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>🚑 Unconscious / can't swallow</h3>
  <ul class="clean">
    <li><b>NEVER put food or drink in the mouth</b> of someone who can't swallow — aspiration risk.</li>
    <li>Give <b>glucagon</b> 1 mg IM/SubQ (or intranasal) — it tells the liver to release stored glucose.</li>
    <li>In the hospital with IV access → <b>IV dextrose (D50)</b>.</li>
    <li>May take up to 20 min to wake; follow with carbs + snack. Monitor closely.</li>
  </ul>
</div>

<div class="card">
  <h3>⚠️ Hypoglycemia unawareness</h3>
  <p>Some long-term diabetics lose the early adrenergic warning signs (from autonomic neuropathy) — they go straight to confusion without feeling shaky first. These patients need <b>frequent glucose checks</b> and slightly higher glucose targets, and family should be taught to give glucagon.</p>
</div>

<div id="quiz-hypo"></div>
`;
