<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>NUR 256 — Unit 3 Study Lab</title>
<style>
:root{
  color-scheme: light;
  --bg:#e4edff; --bg2:#fff;
  --ink:#0f1f3d; --muted:#4a5f8a;
  --card:#ffffff; --card-border:#bcd3ff;
  --pink:#2563eb; --pink-soft:#dbe8ff;
  --purple:#0284c7; --purple-soft:#dcf3ff;
  --teal:#0891b2; --teal-soft:#cffafe;
  --green:#22c55e; --green-soft:#dcfce7;
  --red:#ef4444; --red-soft:#fee2e2;
  --amber:#f59e0b; --amber-soft:#fef3c7;
  --blue:#1d4ed8; --blue-soft:#dbeafe;
}
[data-theme="night"]{
  color-scheme: dark;
  --bg:#0a0f1e; --bg2:#0f1830;
  --ink:#eef3ff; --muted:#9ab0d9;
  --card:#141d38; --card-border:#2a3a63;
  --pink:#5b9bf5; --pink-soft:#16233f;
  --purple:#4dc8f0; --purple-soft:#122333;
  --teal:#2dd9e8; --teal-soft:#0d2a30;
  --green-soft:#123321; --red-soft:#3a1f1f; --amber-soft:#3a2f12;
  --blue:#7fb4ff; --blue-soft:#16233f;
}
html{background:var(--bg)}
*{box-sizing:border-box}
body{
  margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;
  transition:background .3s,color .3s;padding-bottom:80px;
}
/* BIG TEXT mode */
body.mobile-mode{font-size:1.18rem;line-height:1.7}
body.mobile-mode .grid2,body.mobile-mode .grid3{grid-template-columns:1fr!important;gap:18px}
body.mobile-mode .content{padding:16px}
body.mobile-mode .card{padding:20px 18px;margin-bottom:18px}
body.mobile-mode .card h3{font-size:1.3rem;line-height:1.4}
body.mobile-mode .sec-title{font-size:1.55rem;line-height:1.35}
body.mobile-mode p,body.mobile-mode li,body.mobile-mode td,body.mobile-mode th{font-size:1.12rem;line-height:1.7}
body.mobile-mode .clean li{margin-bottom:12px}
body.mobile-mode .opt{font-size:1.12rem;padding:16px;min-height:54px;line-height:1.5}
body.mobile-mode .q-text{font-size:1.18rem;line-height:1.55}
body.mobile-mode .btn,body.mobile-mode .tbtn{font-size:1.1rem;padding:14px 18px}
body.mobile-mode .nav button{font-size:1.05rem;padding:12px 14px}
body.mobile-mode .rationale{font-size:1.08rem;line-height:1.6}
body.mobile-mode .mnem .big{font-size:1.15rem}
body.mobile-mode .hy{font-size:1.1rem;line-height:1.6;padding:16px}
body.mobile-mode table.lab{font-size:.9rem}
body.mobile-mode .lab td,body.mobile-mode .lab th{padding:9px 7px;font-size:.92rem!important}

/* TOP BAR */
.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  color:#fff;padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;flex-wrap:wrap;
  box-shadow:0 2px 14px rgba(0,0,0,.18);
}
.topbar h1{font-size:1.2rem;margin:0;font-weight:800;letter-spacing:.3px}
.topbar .sub{font-size:.72rem;opacity:.9;font-weight:500;display:block}
.toggles{display:flex;gap:8px;flex-wrap:wrap}
.tbtn{border:none;background:rgba(255,255,255,.25);color:#fff;padding:9px 14px;border-radius:30px;font-weight:700;font-size:.85rem;cursor:pointer;backdrop-filter:blur(4px)}
.tbtn:active{transform:scale(.95)}

.progwrap{padding:10px 16px;background:var(--bg2)}
.progbar-bg{background:var(--card-border);border-radius:20px;height:14px;overflow:hidden}
.progbar{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:20px;transition:width .5s}
.progtext{font-size:.72rem;color:var(--muted);text-align:center;margin-top:4px;font-weight:600}

/* NAV TABS */
.nav{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.nav button{flex:0 0 auto;border:2px solid var(--card-border);background:var(--card);color:var(--ink);padding:9px 15px;border-radius:30px;font-weight:700;font-size:.82rem;cursor:pointer;transition:.2s;white-space:nowrap}
.nav button.active{background:var(--purple);color:#fff;border-color:var(--purple);transform:scale(1.04)}

.content{max-width:920px;margin:0 auto;padding:18px;background:var(--bg)}
.section{display:none;animation:fade .4s;scroll-margin-top:12px}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.sec-title{font-size:1.5rem;font-weight:800;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.sec-emoji{font-size:1.6rem}
.intro-line{color:var(--muted);margin:0 0 16px;font-size:.95rem}

.card{background:var(--card);border:2px solid var(--card-border);border-radius:16px;padding:16px 18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.card h3{margin:0 0 10px;font-size:1.15rem}
.clean{list-style:none;padding:0;margin:8px 0}
.clean li{padding:6px 0 6px 22px;position:relative}
.clean li:before{content:"▸";position:absolute;left:0;color:var(--purple);font-weight:800}
.pill{display:inline-block;background:var(--purple-soft);color:var(--purple);padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:800;margin-left:6px}

.hy{background:var(--amber-soft);border-left:5px solid var(--amber);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.9rem}
.why-chain{background:var(--teal-soft);border-left:4px solid var(--teal);border-radius:10px;padding:12px 14px;margin:10px 0;line-height:1.7}
.mnem{background:var(--purple-soft);border-radius:12px;padding:10px 14px;margin:10px 0}
.mnem .tag{font-size:.68rem;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.5px}
.mnem .big{font-size:1.05rem;font-weight:800;margin:3px 0}
.mnem .exp{font-size:.85rem;color:var(--muted)}
.profnote{background:var(--teal-soft);border-left:5px solid var(--teal);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.9rem}
.profnote .tag{font-size:.68rem;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.5px}

table.lab{width:100%;border-collapse:collapse;margin:10px 0;font-size:.88rem;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(min-width:640px){table.lab{display:table}}
table.lab th{background:var(--purple);color:#fff;padding:8px;text-align:left;font-size:.8rem}
table.lab td{padding:8px;border-bottom:1px solid var(--card-border);min-width:80px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}

/* QUIZ */
.quiz-card{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:16px;margin:12px 0}
.q-text{font-weight:700;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;border:2px solid var(--card-border);background:var(--bg2);color:var(--ink);padding:11px 14px;border-radius:10px;cursor:pointer;font-size:.92rem;transition:.15s}
.opt:hover{border-color:var(--purple)}
.opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.opt.sel-multi{border-color:var(--purple);background:var(--purple-soft)}
.opt.disabled{pointer-events:none;opacity:.85}
.rationale{margin-top:10px;padding:10px 12px;background:var(--blue-soft);border-radius:10px;font-size:.86rem;display:none}
.rationale.show{display:block}
.submit-multi{margin-top:8px;background:linear-gradient(90deg,var(--teal),var(--green));color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:800;cursor:pointer}
.center{text-align:center}
.btn{background:var(--purple);color:#fff;border:none;padding:11px 20px;border-radius:12px;font-weight:800;cursor:pointer;font-size:.95rem}
.btn.ghost{background:var(--card);color:var(--ink);border:2px solid var(--card-border)}
.tipbar{background:var(--teal-soft);border-radius:12px;padding:10px 14px;font-size:.85rem;margin:10px 0}
.kbd{background:var(--card);border:1px solid var(--card-border);border-radius:6px;padding:1px 7px;font-weight:700;font-size:.8rem}
.quiz-score{font-size:1.15rem;font-weight:800;text-align:center;padding:16px;background:var(--purple-soft);border-radius:14px;margin:12px 0}

/* flash game */
.flash-progress{text-align:center;font-size:.85rem;color:var(--muted);margin-bottom:10px;font-weight:700}
.flash-card{background:var(--card);border:3px solid var(--purple);border-radius:20px;padding:34px 22px;min-height:160px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.12rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow,0 4px 18px rgba(0,0,0,.12));transition:transform .15s,background .2s,border-color .2s}
.flash-card:active{transform:scale(.97)}
.flash-card.flipped{border-color:var(--teal);background:var(--teal-soft)}
.flash-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;display:block}
.flash-btns{display:flex;gap:10px;margin-top:14px}
.flash-btn{flex:1;padding:14px;border-radius:14px;border:none;font-weight:800;cursor:pointer;font-size:.92rem}
.flash-btn.learning{background:var(--amber-soft);color:var(--amber);border:2px solid var(--amber)}
.flash-btn.gotit{background:var(--green-soft);color:var(--green);border:2px solid var(--green)}

/* wrong answer vault */
.vault-empty{text-align:center;padding:30px 16px;font-size:1rem}
.vault-tag{display:inline-block;background:var(--purple-soft);color:var(--purple);font-size:.72rem;font-weight:800;border-radius:20px;padding:2px 10px;margin-bottom:8px}
.vault-solved{background:var(--green-soft);border:2px solid var(--green);color:var(--green);border-radius:10px;padding:8px 12px;margin-top:8px;font-size:.85rem;font-weight:700;text-align:center}

/* drill */
.drill-top{display:flex;justify-content:space-between;font-size:.8rem;font-weight:700;margin-bottom:6px}
.drill-bar{height:8px;background:var(--card-border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.drill-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:.3s}
.drill-final{font-size:1.6rem;font-weight:800;color:var(--purple);margin:10px 0}

/* exam */
.exam-mode-toggle{display:flex;gap:10px;margin:12px 0;justify-content:center}
.mode-btn{flex:1;max-width:220px;padding:12px 16px;border-radius:14px;border:2px solid var(--card-border);background:var(--card);color:var(--ink);font-weight:800;font-size:.95rem;cursor:pointer}
.mode-btn.active{background:linear-gradient(90deg,var(--purple),var(--pink));color:#fff;border-color:transparent}
.exam-q{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:16px;margin:10px 0}
.qnum{font-size:.7rem;font-weight:800;color:var(--purple);text-transform:uppercase}
.qtype{font-size:.64rem;font-weight:800;padding:2px 8px;border-radius:20px;background:var(--blue-soft);color:var(--blue);margin-left:6px}
.qtext{font-weight:700;margin:8px 0 12px}
.exam-nav{position:sticky;bottom:0;background:var(--card);border-top:2px solid var(--card-border);padding:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:14px 14px 0 0;margin-top:10px}
.exam-dots{display:flex;flex-wrap:wrap;gap:4px;max-width:60%}
.dot{width:13px;height:13px;border-radius:50%;background:var(--card-border);cursor:pointer}
.dot.answered{background:var(--teal)}
.dot.current{background:var(--pink);transform:scale(1.3)}
.dot.dot-correct{background:var(--green)}
.dot.dot-wrong{background:var(--red)}
</style>
</head>
<body data-theme="day">

<div class="topbar">
  <div>
    <h1>🧪 NUR 256 — Unit 3 Study Lab</h1>
    <span class="sub">Diabetes • Skin/Wounds • Eye • Ear</span>
  </div>
  <div class="toggles">
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">🌙 Night</button>
    <button class="tbtn" id="mobileBtn" onclick="toggleMobile()">🔍 Big Text</button>
  </div>
</div>

<div class="progwrap">
  <div class="progbar-bg"><div class="progbar" id="progbar"></div></div>
  <div class="progtext" id="progtext">0 quiz questions answered • Let's go! 💪</div>
  <div style="text-align:center;margin-top:6px"><button onclick="resetAllProgress()" style="background:none;border:none;color:var(--muted);font-size:.68rem;text-decoration:underline;cursor:pointer">↺ reset my saved progress</button></div>
</div>

<div class="nav" id="nav"></div>
<div class="content" id="content"></div>
<script>
/* ===== THEME + BIG TEXT (persisted) ===== */
function toggleTheme(){
  const b=document.body;
  const night = b.getAttribute('data-theme')!=='night';
  b.setAttribute('data-theme', night?'night':'day');
  const t1=document.getElementById('themeBtn'); if(t1)t1.textContent=night?'☀️ Day':'🌙 Night';
  try{ localStorage.setItem('nur256u3_theme', night?'night':'day'); }catch(e){}
}
function toggleMobile(){
  const b=document.body;
  b.classList.toggle('mobile-mode');
  const on=b.classList.contains('mobile-mode');
  const m1=document.getElementById('mobileBtn'); if(m1)m1.textContent=on?'🔍 Normal Text':'🔍 Big Text';
  try{ localStorage.setItem('nur256u3_bigtext', on?'1':'0'); }catch(e){}
}
(function restorePrefs(){
  try{
    if(localStorage.getItem('nur256u3_theme')==='night'){ document.body.setAttribute('data-theme','night');
      var t1=document.getElementById('themeBtn'); if(t1)t1.textContent='☀️ Day'; }
    if(localStorage.getItem('nur256u3_bigtext')==='1'){ document.body.classList.add('mobile-mode');
      var m1=document.getElementById('mobileBtn'); if(m1)m1.textContent='🔍 Normal Text'; }
  }catch(e){}
})();

/* ===== PROGRESS (persisted) ===== */
let answeredQs=new Set(); let totalTrackable=0;
(function restoreProgress(){ try{ const r=localStorage.getItem('nur256u3_progress'); if(r){ JSON.parse(r).forEach(id=>answeredQs.add(id)); } }catch(e){} })();
function saveProgress(){ try{ localStorage.setItem('nur256u3_progress', JSON.stringify([...answeredQs])); }catch(e){} }
function resetAllProgress(){ if(!confirm('Reset all saved progress (quiz progress + saved exam + vault + flash game)? This cannot be undone.'))return; answeredQs=new Set(); try{ localStorage.removeItem('nur256u3_progress'); }catch(e){} updateProg(); try{ localStorage.removeItem('nur256u3_exam'); }catch(e){} examState={};examIdx=0;examChecked={};examSubmitted=false;examMode='study';quizSet=[]; if(typeof setExamMode==='function'){ try{ setExamMode('study'); localStorage.removeItem('nur256u3_exam'); }catch(e){} } try{ wrongVault=[]; localStorage.removeItem('nur256u3_vault'); const b=document.getElementById('vaultCount'); if(b)b.textContent='0'; if(typeof renderVaultSection==='function') renderVaultSection(); }catch(e){} try{ flashMastered=new Set(); localStorage.removeItem('nur256u3_flashmastered'); if(typeof buildFlashQueue==='function'){ buildFlashQueue(); drawFlashCard(); } }catch(e){} alert('Progress reset. Fresh start! 💜'); }
function bumpProgress(id){ if(!answeredQs.has(id)){answeredQs.add(id);saveProgress();updateProg();} }
function updateProg(){
  const pct=totalTrackable?Math.round(answeredQs.size/totalTrackable*100):0;
  const pb=document.getElementById('progbar'); if(pb)pb.style.width=Math.min(100,pct)+'%';
  const msgs=["Let's go! 💪","Warming up! 🔥","Nice momentum! ⭐","Crushing it! 🚀","Almost there! 🎯","NCLEX-ready! 👑"];
  const m=msgs[Math.min(msgs.length-1,Math.floor(pct/20))];
  const pt=document.getElementById('progtext'); if(pt)pt.textContent=`${answeredQs.size} quiz questions answered • ${m}`;
}

/* ===== NAV / SECTIONS ===== */
const SECTIONS=[
  {id:'home',label:'🏠 Start'},
  {id:'why',label:'🧠 Why Engine'},
  {id:'diabetes',label:'🩸 Diabetes'},
  {id:'dka',label:'🚨 DKA vs HHS'},
  {id:'hypo',label:'📉 Hypoglycemia'},
  {id:'complications',label:'🔗 DM Complications'},
  {id:'skin',label:'🧴 Skin/Wounds'},
  {id:'eye',label:'👁️ Eye'},
  {id:'ear',label:'👂 Ear'},
  {id:'decoder',label:'🩺 Disorder Decoder'},
  {id:'tricks',label:'🎯 Trick Questions'},
  {id:'challenge',label:'🎓 Med-Surg Challenge'},
  {id:'vault',label:'🗄️ Wrong Answer Vault'},
  {id:'flash',label:'🎮 Flash Study Game'},
  {id:'drill',label:'⚡ Rapid Drill'},
  {id:'exam',label:'📝 Exam'},
];
const nav=document.getElementById('nav'), content=document.getElementById('content');
SECTIONS.forEach((s,i)=>{
  const btn=document.createElement('button'); btn.id='nav-'+s.id;
  if(s.id==='vault'){ btn.innerHTML=s.label+' <span id="vaultCount" style="background:var(--red);color:#fff;border-radius:20px;padding:1px 8px;font-size:.72rem;margin-left:2px">0</span>'; }
  else{ btn.textContent=s.label; }
  if(i===0)btn.classList.add('active');
  btn.onclick=()=>showSection(s.id);
  nav.appendChild(btn);
  const sec=document.createElement('div'); sec.className='section'+(i===0?' active':''); sec.id='sec-'+s.id; content.appendChild(sec);
});
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='vault' && typeof renderVaultSection==='function') renderVaultSection();
}

/* ===== QUIZ ENGINE (single + SATA) ===== */
/* ===== WRONG ANSWER VAULT ===== */
let wrongVault=[];
(function restoreVault(){ try{ const r=localStorage.getItem('nur256u3_vault'); if(r) wrongVault=JSON.parse(r); }catch(e){} })();
(function initVaultBadge(){ const b=document.getElementById('vaultCount'); if(b) b.textContent=wrongVault.length; })();
function saveVault(){ try{ localStorage.setItem('nur256u3_vault', JSON.stringify(wrongVault)); }catch(e){} }
function addToVault(entry){
  const idx=wrongVault.findIndex(v=>v.id===entry.id);
  if(idx>=0) wrongVault[idx]=entry; else wrongVault.push(entry);
  saveVault();
  const badge=document.getElementById('vaultCount'); if(badge) badge.textContent=wrongVault.length;
}
function removeFromVault(id){
  wrongVault=wrongVault.filter(v=>v.id!==id);
  saveVault();
  const badge=document.getElementById('vaultCount'); if(badge) badge.textContent=wrongVault.length;
}

function renderQuiz(containerId, questions, title, source){
  const host=document.getElementById(containerId);
  if(!host)return;
  const wrap=document.createElement('div');
  if(title){ const h=document.createElement('h3'); h.textContent='📝 '+title; h.style.color='var(--pink)'; wrap.appendChild(h); }
  questions.forEach((q,qi)=>{
    totalTrackable++;
    const qid=containerId+'-'+qi;
    const card=document.createElement('div'); card.className='quiz-card';
    const qt=document.createElement('div'); qt.className='q-text'; qt.textContent=(qi+1)+'. '+q.q; card.appendChild(qt);
    const opts=document.createElement('div'); opts.className='opts'; card.appendChild(opts);
    const rat=document.createElement('div'); rat.className='rationale'; rat.innerHTML='<b>Rationale:</b> '+q.rat;
    if(q.type==='multi'){
      const chosen=new Set();
      q.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{ if(chosen.has(i)){chosen.delete(i);btn.classList.remove('sel-multi');}else{chosen.add(i);btn.classList.add('sel-multi');} };
        opts.appendChild(btn);
      });
      const sub=document.createElement('button'); sub.className='submit-multi'; sub.textContent='Check Answer';
      sub.onclick=()=>{
        const correct=new Set(q.correct);
        let allRight=chosen.size===correct.size;
        opts.querySelectorAll('.opt').forEach((b,i)=>{
          b.classList.add('disabled');
          if(correct.has(i))b.classList.add('correct');
          else if(chosen.has(i)){b.classList.add('wrong');allRight=false;}
        });
        if(!allRight){ addToVault({id:qid,q:q.q,opts:q.opts,type:'multi',correct:q.correct,rat:q.rat,source:source||title||''}); }
        rat.classList.add('show'); sub.style.display='none'; bumpProgress(qid);
      };
      card.appendChild(sub);
    } else {
      q.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{
          opts.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));
          if(i===q.correct)btn.classList.add('correct');
          else{
            btn.classList.add('wrong'); opts.querySelectorAll('.opt')[q.correct].classList.add('correct');
            addToVault({id:qid,q:q.q,opts:q.opts,type:'single',correct:q.correct,rat:q.rat,source:source||title||''});
          }
          rat.classList.add('show'); bumpProgress(qid);
        };
        opts.appendChild(btn);
      });
    }
    card.appendChild(rat);
    wrap.appendChild(card);
  });
  host.appendChild(wrap);
}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);}
</script>

<script>
document.getElementById('sec-home').innerHTML=`

<h2 class="sec-title"><span class="sec-emoji">🧠</span> The Why Engine</h2>
<p class="intro-line">Casteel's method: know the WHY behind each disease. If you understand the mechanism, his trick wording can't fool you — the wrong answer just looks wrong. Every Unit 3 topic below traces the chain: cause → <b>because this happens</b> → so you see these signs → <b>which is why</b> we treat it this way.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>🔑 The whole trick</h3>
  <ul class="clean">
    <li>Don't memorize separate lists. <b>Derive</b> the signs and treatment from the mechanism.</li>
    <li>Every sign: ask <b>"WHY does this happen?"</b> Every treatment: <b>"WHY does this fix it?"</b></li>
    <li>On the test, ask <b>"what is physically happening in this patient?"</b> The answer that matches the physiology is right.</li>
  </ul>
  <div class="mnem"><div class="tag">The rule</div><div class="big">"If I can say the BECAUSE out loud, it's trap-proof."</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🩸 Diabetes — the master mechanism</h3>
  <p><b>The one idea everything flows from:</b> insulin is the KEY that lets glucose INTO cells. No insulin (Type 1) or insulin that doesn't work (Type 2) → glucose is stuck in the blood, and the cells are starving even though sugar is everywhere.</p>
  <p class="why-chain"><b>Reason the classic "3 P's" forward:</b><br>
  Glucose piles up in the blood → spills into the urine → drags water with it (osmotic diuresis) → <b>polyuria</b> (peeing a lot).<br>
  All that water loss → dehydration → <b>polydipsia</b> (extreme thirst).<br>
  Cells are starving (glucose can't get in) → the body screams for fuel → <b>polyphagia</b> (hunger) + weight loss + fatigue.<br>
  High blood sugar damages tiny vessels and nerves over time and feeds bacteria → <b>slow healing, infections, blurred vision, numbness</b>.</p>
  <div class="hy">⭐ You never memorize the symptom list — you ask "what happens when sugar is stuck in the blood and cells are starving?" and reason it all out.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🚨 DKA — why it's an acid emergency (Type 1)</h3>
  <p><b>Root cause:</b> NO insulin at all → cells can't use glucose → the body thinks it's starving and burns FAT for fuel instead.</p>
  <p class="why-chain"><b>Reason it forward:</b><br>
  Burning fat produces <b>ketones</b>, which are ACIDS → blood pH drops → <b>metabolic acidosis</b>.<br>
  The lungs try to blow off the acid (CO₂) → <b>deep rapid Kussmaul breathing + fruity/acetone breath</b>.<br>
  Sky-high glucose → massive osmotic diuresis → <b>severe dehydration, polyuria, weak rapid pulse, hypotension</b>.<br>
  <b>The potassium trap:</b> acidosis pushes K⁺ OUT of cells into the blood → serum K⁺ looks HIGH at first — but total body K⁺ is actually LOW, and when you give insulin, K⁺ rushes back into cells and can crash dangerously.</p>
  <p><b>So the treatment makes sense:</b> <b>fluids first</b> (they're profoundly dehydrated) → <b>insulin</b> (stops fat-burning, ends ketone production) → <b>watch K⁺ like a hawk</b> because it will drop as insulin works.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>💧 HHS — why it's dehydration without the acid (Type 2)</h3>
  <p><b>Root cause:</b> Type 2 patients <b>ARE producing insulin</b> — the problem is <b>insulin resistance</b>: their cells don't respond to it well, so glucose can't get pulled out of the blood and into cells the way it should. That glucose just <b>stays stuck/hanging around in the blood</b>, piling higher and higher.</p>
  <p class="why-chain"><b>Reason it forward:</b> here's the key detail — <b>it takes very little insulin to tell the liver "stop burning fat," but a LOT of working insulin to actually move glucose into cells.</b> So even though the cells are resistant enough to let glucose pile up sky-high (often >600), that same circulating insulin is usually still enough to reach the liver and <b>block fat breakdown/ketone production</b>. <b>Because</b> fat is never broken down, there are no ketones and no acid — which is why glucose climbs insanely high → enormous osmotic diuresis → <b>profound dehydration, hyperosmolality, altered mental status/seizures</b> — but there's <b>no Kussmaul breathing, no fruity breath, no acidosis</b>. That's the whole difference from DKA.</p>
  <div class="hy">⭐ <b>DKA vs HHS in one line:</b> DKA (Type 1) = ZERO insulin, so fat-burning is completely unblocked → ketones/acid. HHS (Type 2) = insulin is present but the cells are resistant to its glucose effect — glucose stays in the blood — while that same insulin is often still enough to keep fat-burning/ketone production shut off. Same hormone, two different jobs, two different thresholds.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>📉 Hypoglycemia — why the brain panics</h3>
  <p><b>Root cause:</b> too much insulin / too little food / too much exercise → blood sugar drops below 70. The <b>brain runs on glucose</b> and has no backup.</p>
  <p class="why-chain"><b>Reason it forward:</b> first the body dumps adrenaline to fix it → <b>shaky, sweaty, fast heart, hungry, anxious</b> (adrenergic signs). If it keeps dropping, the brain starves → <b>confusion, slurred speech, seizures, LOC</b> (neuro signs). <b>Because</b> the brain is starving fast, hypoglycemia is a more immediate emergency than high sugar.</p>
  <p><b>So the treatment makes sense:</b> conscious → <b>15 g fast carbs, recheck in 15 min (Rule of 15)</b>. Unconscious/can't swallow → <b>glucagon</b> (tells the liver to dump stored glucose) — never put food in the mouth of someone who can't swallow.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🦶 Diabetic complications — why "sugar wrecks pipes & wires"</h3>
  <p><b>The unifying why:</b> chronic high glucose damages <b>blood vessels (pipes)</b> and <b>nerves (wires)</b> everywhere. Every long-term complication is just "which pipes or wires got wrecked."</p>
  <p class="why-chain">
  <b>Tiny vessels (microvascular):</b> eyes → <b>retinopathy</b> (blindness); kidneys → <b>nephropathy</b> (kidney failure).<br>
  <b>Big vessels (macrovascular):</b> heart/brain/legs → <b>heart attack, stroke, peripheral vascular disease</b>.<br>
  <b>Nerves (neuropathy):</b> can't feel the feet → <b>injuries go unnoticed</b> + poor circulation won't heal them + high sugar feeds bacteria → <b>foot ulcers → amputation</b>.</p>
  <p><b>So foot care makes sense:</b> daily inspection (<b>because</b> they can't FEEL an injury), never barefoot, no heating pads (<b>because</b> they can't feel a burn), glucose control (<b>because</b> it's the root of all of it).</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🛏️ Pressure injuries — why tissue dies</h3>
  <p><b>Root cause:</b> unrelieved pressure (usually over a bony prominence) squeezes the tiny vessels shut → that skin gets no blood → <b>no oxygen → the tissue dies</b>.</p>
  <p class="why-chain"><b>Reason it forward:</b> pressure over the sacrum, heels, hips → capillaries collapse → skin breaks down from the pressure point. <b>Because</b> the cause is unrelieved pressure, the #1 prevention is <b>relieving it — reposition every 2 hours</b>. <b>Because</b> friction and moisture and poor nutrition (low albumin) all speed breakdown, you keep skin clean/dry and feed protein.</p>
  <div class="hy">⭐ <b>Why you NEVER massage a reddened area:</b> the tissue underneath is already damaged and fragile — massaging can rupture those tiny vessels and make it worse. The mechanism tells you the rule.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👁️ Glaucoma — why you lose vision from the edges in</h3>
  <p><b>Root cause:</b> fluid (aqueous humor) is made inside the eye and must drain out. If it can't drain → it backs up → <b>pressure builds inside the eye (high IOP)</b>.</p>
  <p class="why-chain"><b>Reason it forward:</b> that pressure squeezes the <b>optic nerve</b> → the nerve fibers die from the outside in → <b>peripheral vision goes first (tunnel vision)</b>, painless and gradual in open-angle. <b>Because</b> the damage is from pressure on the nerve, treatment = <b>lower the IOP</b> (drops that reduce fluid or improve drainage). <b>Because</b> dead optic nerve doesn't come back, lost vision is permanent — so it's about <b>preventing further loss</b>.</p>
  <div class="hy">⭐ <b>Angle-closure = emergency:</b> sudden total blockage → <b>sudden severe eye pain, halos, nausea, rock-hard eye</b>. This one is acute and needs immediate treatment to save the eye.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👂 Ménière's disease — why the room spins</h3>
  <p><b>Root cause:</b> too much fluid (endolymph) builds up in the inner ear → the pressure disrupts the balance and hearing organs.</p>
  <p class="why-chain"><b>Reason the triad forward:</b> fluid pressure on the <b>balance organ</b> → <b>episodic vertigo</b> (spinning, the worst symptom); on the <b>hearing organ</b> → <b>fluctuating sensorineural hearing loss</b> + <b>tinnitus</b> (ringing) + ear fullness. <b>Because</b> the problem is fluid/sodium retention, the treatment is a <b>low-sodium diet + diuretics</b> to reduce the fluid. <b>Because</b> vertigo attacks cause falls, safety is the priority during an attack.</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🌫️ Cataracts — why everything looks cloudy and glary</h3>
  <p><b>Root cause:</b> the lens (normally clear, so light passes straight through to the retina) slowly turns cloudy/opaque with age, UV exposure, or diabetes.</p>
  <p class="why-chain"><b>Reason it forward:</b> light hits the cloudy lens and <b>scatters instead of focusing</b> → <b>blurry vision, glare and halos around lights</b> (worse at night when the pupil is wide and more scattered light gets in), and <b>faded/yellowed colors</b> (the clouded lens filters color). <b>Because</b> the lens itself is the problem — not the retina or the nerve — there's no pain, and <b>vision is fully restored once the cloudy lens is surgically removed and replaced</b> with a clear implant.</p>
  <p><b>So post-op teaching makes sense:</b> avoid bending/lifting/straining (<b>because</b> it raises IOP and can dislodge the healing incision/implant); don't rub the eye; report sudden pain (<b>because</b> that's not a normal part of healing).</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🎯 Macular degeneration — why straight lines go wavy, center-out</h3>
  <p><b>Root cause:</b> the macula (the tiny central part of the retina responsible for sharp, detailed central vision) degenerates with age — from abnormal blood vessels (wet) or gradual tissue thinning (dry).</p>
  <p class="why-chain"><b>Reason it forward:</b> the macula sits at the very CENTER of the retina, so damage there → <b>loss of CENTRAL vision first</b> — straight lines look wavy or distorted, there's a blurry/blank spot right in the middle of what they're looking at, while <b>peripheral (side) vision stays intact</b>. <b>Because</b> this is the opposite structure from glaucoma (which damages the optic nerve from the outside in), the vision-loss pattern is the exact opposite: macular degeneration = center out, glaucoma = edges in.</p>
  <div class="hy">⭐ <b>Trap answer alert:</b> if a question describes losing central vision, that's macular degeneration. Losing peripheral (tunnel) vision = glaucoma. Casteel loves testing this exact contrast.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💥 Retinal detachment — why it's flashes, floaters, and a curtain</h3>
  <p><b>Root cause:</b> the retina (the light-sensing layer lining the back of the eye) tears and peels away from the tissue behind it that feeds it blood and oxygen.</p>
  <p class="why-chain"><b>Reason it forward:</b> as the retina tears and pulls away, it tugs on the vitreous gel and nerve fibers → <b>sudden flashes of light and floaters</b>. As more of the retina peels off, the part of vision it used to send goes dark → a <b>curtain or shadow moving across the visual field</b>. <b>Because</b> the detached retina is no longer getting blood supply, it will die — and that vision loss is <b>permanent</b> — if it isn't surgically reattached quickly. This is a <b>true ophthalmic emergency</b>, not a "wait and see."</p>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>👂 Conductive vs. sensorineural hearing loss — why one comes back and the other doesn't</h3>
  <p><b>The one idea everything flows from:</b> sound has to travel two ways — first mechanically THROUGH the outer/middle ear, then as a nerve signal FROM the inner ear/cochlea to the brain. Ask: which part is blocked, or which part is damaged?</p>
  <p class="why-chain"><b>Conductive (a blockage in the pathway):</b> earwax, fluid, otitis media, or a perforated eardrum physically <b>blocks sound from getting through</b> to the inner ear. <b>Because</b> the inner ear and nerve are fine — the sound just can't get in — removing the blockage (irrigation, treating the infection) <b>restores hearing</b>.</p>
  <p class="why-chain"><b>Sensorineural (damage to the receiver itself):</b> the cochlea's tiny hair cells or the auditory nerve are damaged — by aging (<b>presbycusis</b>), loud noise, or ototoxic drugs. <b>Because</b> the damaged hair cells/nerve don't regenerate, this hearing loss is <b>usually permanent</b> — hearing aids amplify sound, but they can't fix a broken receiver.</p>
  <div class="hy">⭐ <b>Ototoxic drugs</b> (aminoglycosides, loop diuretics like furosemide, high-dose aspirin, some chemo agents) damage the cochlea's hair cells directly → sensorineural loss + tinnitus. <b>Because</b> this damage doesn't reverse, the nursing priority is prevention: report new tinnitus or hearing changes immediately so the drug can be stopped before permanent damage sets in.</div>
</div>

<p class="intro-line">The biggest, most-tested topic in Unit 3. Master the mechanism (insulin = the key that lets glucose into cells) and the rest follows.</p>

<div class="card">

  <table class="lab">
    <tr><th></th><th>Type 1</th><th>Type 2</th></tr>

    <tr><td><b>Acute crisis</b></td><td><b>DKA</b> (ketoacidosis)</td><td><b>HHS</b> (hyperosmolar, no acid)</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Type 1 = None (no insulin) • Type 2 = Too little / doesn't work"</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🍬 The sugar math (Casteel's favorite way in)</h3>
  <p class="why-chain">Your body only wants about <b>1 teaspoon of sugar circulating in your ENTIRE blood volume</b> at any given moment — roughly <b>7 sugar cubes</b>, about 30 g total, spread across ~1.5 gallons of blood. That's it. That's the target.</p>
  <ul class="clean">
    <li>A single sugary drink or dessert can dump way more than that into your blood at once — your body then has to "whittle it down," moving it into cells or storing it as fat, to get back to that tiny baseline.</li>
    <li>The average person consumes roughly <b>31 teaspoons of sugar a day</b> — many multiples of what's supposed to be circulating at once. Insulin is working constantly just to keep up.</li>
    <li>This is WHY chronic overeating of sugar burns out the system: constant insulin release → cells stop listening (resistance) → sugar backs up in the blood instead of going where it's needed.</li>
  </ul>
  <div class="hy">⭐ Use this with patients: it's a simple, teach-back-friendly way to explain why "just a little" sugar, over and over, adds up to a huge relative load on the body.</div>
</div>

<div class="card">
  <h3>💉 What insulin actually DOES (4 jobs)</h3>
  <ul class="clean">
    <li><b>1. Moves glucose out of the blood</b> and into liver, muscle, and fat cells so they can use it for energy.</li>
    <li><b>2. Stores extra glucose as fat</b> (lipogenesis) once cells have what they need.</li>
    <li><b>3. Blocks fat breakdown</b> (inhibits lipolysis) — this is why, when insulin is missing or ineffective, the body switches to burning fat instead and produces <b>ketones</b> (this is the root of DKA).</li>
    <li><b>4. Helps push potassium INTO cells</b> — this is why IV insulin (with dextrose) is a standard treatment for hyperkalemia, and why starting an insulin drip in DKA makes serum K⁺ drop fast (see DKA section).</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">Insulin = "Let it IN, lock the fat OUT, and push K IN too."</div></div>
</div>

<div class="card" style="border-color:var(--amber)">
  <h3>⚠️ Metabolic syndrome — the risk cluster (very high-yield, often missed)</h3>
  <p class="why-chain">Metabolic syndrome is a cluster of findings that predicts Type 2 diabetes AND heart disease/stroke — it's the "before you get diabetes" warning cluster. A patient usually has <b>3 or more</b> of the following:</p>
  <ul class="clean">
    <li><b>Central (abdominal) obesity</b> — waist circumference >40 in (men), >35 in (women). "Apple-shaped."</li>
    <li><b>Hypertension.</b></li>
    <li><b>Dyslipidemia</b> — low HDL ("good" cholesterol) + high LDL/triglycerides.</li>
    <li><b>Hyperinsulinemia with insulin resistance</b> — high insulin levels that aren't working effectively, alongside elevated fasting glucose.</li>
    <li>Sedentary lifestyle is the lifestyle driver behind most of the above.</li>
  </ul>
  <div class="hy">⭐ This is a risk-factor cluster, NOT a diabetes complication itself — don't confuse the two on an exam question. It raises risk for Type 2 diabetes, cardiovascular disease, stroke, and some cancers.</div>
</div>

<div class="card">
  <h3>🧬 Other types you'll see tested</h3>
  <ul class="clean">
    <li><b>LADA (Latent Autoimmune Diabetes in Adults)</b> — sometimes called "Type 1.5." Same autoimmune beta-cell destruction as Type 1, but slower-onset and in adults, so it often gets misdiagnosed as Type 2 at first. Antibody testing distinguishes it.</li>
    <li><b>Gestational diabetes</b> — develops during pregnancy, more common with larger babies. Usually resolves after delivery, but significantly raises the mother's future risk of Type 2 diabetes.</li>
    <li><b>Prediabetes</b> — fasting glucose 100–125 mg/dL or A1C 5.7–6.4%. Overlaps heavily with metabolic syndrome. <b>Reversible</b> with lifestyle change — this is the window to prevent progression to Type 2.</li>
  </ul>
</div>

<div class="card">
  <h3>The 3 P's + classic signs</h3>
  <ul class="clean">
    <li><b>Polyuria</b> — peeing a lot (glucose drags water into urine).</li>
    <li><b>Polydipsia</b> — extreme thirst (from the water loss).</li>
    <li><b>Polyphagia</b> — hunger (cells are starving despite high blood sugar).</li>
    <li>Plus: fatigue, blurred vision, slow-healing wounds, recurrent infections, numbness/tingling. Type 1 adds sudden weight loss, nausea, abdominal pain.</li>
  </ul>
</div>

<div class="card">
  <h3>🔬 Diagnostic numbers (know these cold)</h3>
  <table class="lab">
    <tr><th>Test</th><th>Diabetes</th><th>Notes</th></tr>
    <tr><td>Fasting plasma glucose</td><td>≥ 126 mg/dL</td><td>no food 8 hrs</td></tr>
    <tr><td>Random plasma glucose</td><td>≥ 200 mg/dL</td><td>with symptoms</td></tr>
    <tr><td><b>A1C</b></td><td>≥ 6.5%</td><td>avg glucose over ~3 months</td></tr>
    <tr><td>2-hr OGTT</td><td>≥ 200 mg/dL</td><td>glucose tolerance test</td></tr>
    <tr><td>Normal fasting</td><td>70–99 mg/dL</td><td>prediabetes 100–125</td></tr>
  </table>
  <div class="hy">⭐ <b>A1C</b> = the "report card" — it reflects average glucose over ~3 months, so it can't be faked by eating well the day before. Goal for most diabetics: <b>&lt;7%</b>.</div>
</div>

<div class="card">
  <h3>💉 Insulin — the essentials</h3>
  <table class="lab">
    <tr><th>Type</th><th>Example</th><th>Onset / Peak</th></tr>
    <tr><td><b>Rapid</b></td><td>lispro, aspart</td><td>~15 min / ~1 hr — give WITH food</td></tr>
    <tr><td><b>Short</b></td><td>regular</td><td>~30–60 min / 2–3 hr — the ONLY IV insulin</td></tr>
    <tr><td><b>Intermediate</b></td><td>NPH</td><td>~2 hr / 4–12 hr (cloudy)</td></tr>
    <tr><td><b>Long</b></td><td>glargine, detemir</td><td>steady, ~no peak — never mix, never IV</td></tr>
  </table>
  <ul class="clean">
    <li><b>Peak = when hypoglycemia risk is highest.</b> Know when a patient's insulin peaks so you know when to watch for lows.</li>
    <li><b>Mixing NPH + regular:</b> draw up <b>clear before cloudy</b> (regular first, then NPH) — "RN" (Regular before NPH).</li>
    <li><b>Rotate sites</b> to prevent lipohypertrophy. Abdomen absorbs fastest.</li>
    <li>Only <b>regular insulin</b> can be given IV (in DKA).</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Clear before cloudy" • draw Regular before NPH</div></div>
</div>

<div class="card">
  <h3>💊 Oral agents — the big one</h3>
  <ul class="clean">
    <li><b>Metformin</b> (biguanide) = first-line for Type 2. Lowers glucose production by the liver, doesn't cause hypoglycemia alone. <b>Hold before contrast dye/surgery</b> (risk of lactic acidosis / kidney stress). GI upset common.</li>
    <li><b>Sulfonylureas</b> (glipizide, glyburide) — squeeze more insulin out → CAN cause hypoglycemia.</li>
    <li><b>SGLT-2 inhibitors</b> ("-flozin") — dump glucose in the urine; watch for UTIs/yeast.</li>
    <li><b>GLP-1 agonists</b> ("-tide") — slow gastric emptying, aid weight loss.</li>
  </ul>
  <div class="hy">⭐ <b>Metformin + contrast dye = HOLD.</b> High-yield: hold metformin before/after IV contrast to protect the kidneys and prevent lactic acidosis.</div>
</div>

<div id="quiz-diabetes"></div>
`;

  {q:'A patient in DKA is started on an IV insulin drip. Which insulin is the nurse correct to expect running in that drip, and WHY is it the only option?',type:'single',

  {q:'Which findings would the nurse expect to find together in a newly diagnosed, untreated diabetic patient? (Select all that apply)',type:'multi',

  {q:'A patient\'s labs show waist circumference 42 inches, BP 134/86, fasting glucose 108 mg/dL, HDL 38 mg/dL, and triglycerides 165 mg/dL. What does this pattern MOST likely represent?',type:'single',

   rat:'The trap: A treats this as a diabetes complication (it isn\'t — the glucose here is prediabetic range, not diagnostic), and C misapplies an acute-crisis label to chronic risk-factor data. This patient meets 4 of the 5 metabolic syndrome criteria (waist, BP, HDL, triglycerides) — a reversible risk cluster, not a diagnosis or a complication.'},

  {q:'A 45-year-old is diagnosed with diabetes, initially managed successfully with metformin alone, but has positive glutamic acid decarboxylase (GAD) antibodies. Within 18 months, oral agents fail and insulin is required. This progression is MOST consistent with:',type:'single',

   rat:'The trap: A is tempting because typical Type 2 diabetes does progress over decades, but the KEY detail is the antibody positivity plus the unusually rapid failure of oral agents (18 months, not years) — that combination is the signature of LADA, not classic Type 2 or a lab error.'},

  {q:'Which of the following are direct physiologic effects of insulin, beyond simply moving glucose into cells? (Select all that apply)',type:'multi',

   rat:'The traps: insulin does NOT stimulate glucagon release (they act in opposition to each other) and does NOT produce ketones — ketones are produced specifically when insulin is ABSENT or ineffective and lipolysis is unblocked. The three correct actions (fat storage, blocking lipolysis, driving K⁺ into cells) explain both DKA\'s ketone production and the hypokalemia risk of insulin therapy.'},

  {q:'A client with Type 2 diabetes has been managed on metformin for 6 years. Recent labs show an A1C of 8.9%, up from 7.1% a year ago, despite reported medication adherence. Which explanation for this trend is MOST accurate?',type:'single',

   rat:'The trap: A invents a nonexistent absorption failure, C dismisses a validated, standard diagnostic tool, and D misdiagnoses a progression pattern that is completely normal in TYPE 2 diabetes. Type 2 diabetes is progressive — beta-cell function keeps declining over years even with perfect adherence, which is exactly why additional or different medications are often needed over time, not a sign anything was done wrong.'},

  {q:'A nurse is teaching a client newly started on a GLP-1 receptor agonist (e.g., semaglutide) for Type 2 diabetes. Which statement by the client indicates a correct understanding of this medication class?',type:'single',

   rat:'The trap: A conflates a GLP-1 agonist with insulin itself, which is inaccurate — they work through a different, incretin-based mechanism. C overstates hypoglycemia risk (GLP-1 agonists carry a LOW risk of hypoglycemia on their own, unlike sulfonylureas or insulin). D fundamentally misunderstands the medication as a rescue treatment when it is a scheduled, ongoing therapy. GLP-1 agonists slow gastric emptying and increase satiety (weight loss benefit) while improving glucose control.'}
