<script>
document.getElementById('sec-complications').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🔗</span> Long-Term Complications</h2>
<p class="intro-line">One mechanism: chronic high glucose wrecks blood vessels (pipes) and nerves (wires). Every complication is "which pipes or wires got damaged."</p>

<div class="card">
  <h3>🩸 Macrovascular (big vessels)</h3>
  <p>Accelerated atherosclerosis in large vessels → the leading cause of death in diabetes.</p>
  <ul class="clean">
    <li><b>Coronary artery disease</b> → heart attack (may be "silent" — no chest pain — due to neuropathy).</li>
    <li><b>Cerebrovascular disease</b> → stroke.</li>
    <li><b>Peripheral vascular disease</b> → poor leg circulation → wounds won't heal.</li>
  </ul>
</div>

<div class="card">
  <h3>🔬 Microvascular (tiny vessels)</h3>
  <ul class="clean">
    <li><b>Retinopathy</b> — damaged retinal vessels → leading cause of blindness in working-age adults. <b>Painless</b>; symptoms (floaters, blurred/spotty vision) come late. Type 1: first eye exam within 5 yrs; Type 2: at diagnosis. Control glucose + BP to prevent.</li>
    <li><b>Nephropathy</b> — damaged kidney vessels → protein leaks into urine (albuminuria) → kidney failure. Diabetes is the #1 cause of ESRD. Screen with urine albumin + eGFR. <b>ACE inhibitors/ARBs</b> protect the kidneys; avoid nephrotoxic drugs and contrast dye.</li>
  </ul>
  <div class="hy">⭐ Micro = <b>eyes + kidneys</b> (tiny vessels). Macro = <b>heart, brain, legs</b> (big vessels). Both driven by the same chronic hyperglycemia.</div>
</div>

<div class="card" style="border-color:var(--red)">
  <h3>💊 Renal-impairment drug alerts — what to question</h3>
  <p class="why-chain"><b>The mechanism behind ALL of these:</b> failing kidneys can't clear/filter drugs normally, so anything that is (1) cleared by the kidneys, (2) directly toxic to kidney tissue, or (3) risks a dangerous electrolyte shift becomes a bigger problem in renal disease. Ask "does this drug rely on the kidneys, hurt the kidneys, or raise potassium?"</p>
  <ul class="clean">
    <li><b>NSAIDs</b> (ibuprofen, ketorolac, naproxen) — nephrotoxic; reduce blood flow to the kidneys. <b>Question/avoid</b> in CKD, especially with other nephrotoxic drugs.</li>
    <li><b>Aminoglycosides</b> (gentamicin, tobramycin) — directly nephrotoxic AND ototoxic; requires trough level monitoring in renal impairment.</li>
    <li><b>IV contrast dye</b> — nephrotoxic on its own; combined with metformin raises lactic acidosis risk too.</li>
    <li><b>Metformin</b> — reduced renal clearance → lactic acidosis risk; held around contrast and in significant renal impairment (low eGFR).</li>
    <li><b>Sulfonylureas</b>, especially <b>glyburide</b> — cleared by the kidneys; renal impairment → drug accumulates → prolonged, dangerous hypoglycemia. Glipizide is the safer choice if a sulfonylurea is still needed.</li>
    <li><b>Insulin</b> — the kidneys help clear/break down insulin. In renal failure, insulin sticks around LONGER than expected → higher hypoglycemia risk even at a "normal" dose. Doses are often reduced, not increased.</li>
    <li><b>Potassium-sparing diuretics</b> (spironolactone) — risk of dangerous hyperkalemia in renal impairment, especially combined with an ACE inhibitor/ARB.</li>
    <li><b>Magnesium- or aluminum-containing antacids</b> — normally excreted renally; accumulate and can cause toxicity in renal failure.</li>
    <li><b>Meperidine (Demerol)</b> — its toxic metabolite accumulates in renal failure and can cause seizures; generally avoided in this population.</li>
    <li><b>Digoxin</b> — renally cleared; needs a lower dose and closer monitoring for toxicity.</li>
    <li><b>Vancomycin</b> — nephrotoxic; requires trough level monitoring, dosed by renal function.</li>
  </ul>
  <div class="hy">⭐ <b>The ACE inhibitor/ARB nuance he'll test:</b> these are the PROTECTIVE drugs for chronic diabetic nephropathy (they lower pressure inside the glomerulus and slow progression) — but they're not automatically safe in every renal scenario. <b>Question/hold</b> if: the patient develops acute kidney injury, potassium becomes significantly elevated, there's known bilateral renal artery stenosis, or creatinine rises more than about 30% after starting (a small initial rise is expected and not itself a reason to stop).</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>💊 Eye medication alerts — what to question</h3>
  <ul class="clean">
    <li><b>Anticholinergic/mydriatic drops</b> (atropine, cyclopentolate) — dilate the pupil. <b>Contraindicated/use extreme caution</b> in a patient with (or at risk for) <b>angle-closure glaucoma</b> — dilating the pupil can push the iris into the drainage angle and trigger an acute attack.</li>
    <li><b>Beta-blocker drops</b> (timolol) — can be absorbed systemically. <b>Question/use caution</b> in patients with asthma/COPD (bronchospasm risk) or bradycardia/heart block (can worsen it), even though it's just an eye drop.</li>
    <li><b>Steroid eye drops</b> (long-term use) — can raise IOP (glaucoma risk) and contribute to cataract formation — ties directly back to why steroid use is a recognized cataract cause.</li>
    <li><b>Prostaglandin analogs</b> (latanoprost) — generally safe/first-line for glaucoma, but can permanently darken iris color and lengthen/darken eyelashes — a cosmetic effect worth mentioning in patient teaching, not a safety contraindication.</li>
  </ul>
</div>

<div class="card">
  <h3>🦵 Neuropathy (damaged nerves)</h3>
  <ul class="clean">
    <li><b>Peripheral (sensorimotor):</b> "stocking-glove" — numbness/burning/tingling starting in toes and fingers. <b>Loss of protective sensation</b> → can't feel injuries → foot ulcers. Also loss of proprioception → unsteady gait, falls.</li>
    <li><b>Autonomic:</b> affects automatic functions — <b>fixed tachycardia, orthostatic hypotension, silent MI, delayed gastric emptying (gastroparesis), bladder retention, ED, hypoglycemia unawareness</b>.</li>
  </ul>
</div>

<div class="card" style="border-color:var(--amber)">
  <h3>🦶 Diabetic foot care (VERY high-yield)</h3>
  <p class="why-chain"><b>Why feet are so vulnerable:</b> neuropathy (can't feel injury) + peripheral vascular disease (won't heal) + high sugar (feeds infection) = small wound → ulcer → amputation. 20% of foot ulcers lead to amputation.</p>
  <ul class="clean">
    <li><b>Inspect feet daily</b> (use a mirror for soles) — because they can't feel injuries.</li>
    <li><b>Never go barefoot</b>; wear well-fitting shoes; check inside shoes for objects.</li>
    <li><b>No heating pads / hot water</b> — they can't feel a burn.</li>
    <li>Wash + dry feet daily (dry between toes); moisturize but NOT between toes.</li>
    <li>Cut nails straight across; see a podiatrist for calluses/corns — never cut them yourself.</li>
    <li><b>Control glucose</b> — the root cause of all of it.</li>
  </ul>
</div>

<div id="quiz-complications"></div>
`;

   opts:['A. NSAIDs','B. ACE inhibitors or ARBs','C. Beta-blockers','D. Loop diuretics'],correct:1,

  {q:'A long-standing diabetic patient is later found to have had a myocardial infarction with minimal chest pain reported at the time. Which underlying mechanism BEST explains this presentation?',type:'single',
   opts:['A. Diabetic patients tend to have a naturally higher pain tolerance','B. Autonomic neuropathy can blunt or eliminate the typical chest-pain warning signal of an MI','C. This patient\'s heart was not significantly affected by the infarction','D. This presentation suggests the MI diagnosis should be reconsidered'],correct:1,
   rat:'C and D both use the mild symptom severity to argue the event wasn\'t serious or didn\'t really happen — a natural but incorrect inference. Autonomic neuropathy specifically can blunt the pain-signaling pathway during an MI, which is exactly why diabetics need vigilant cardiac monitoring even when the classic chest-pain complaint is minimal or absent.'},

  {q:'A client with diabetic autonomic neuropathy reports lightheadedness and dizziness specifically when standing up from a seated position, with blood pressure dropping from 128/78 to 98/60 upon standing. What is the underlying mechanism?',type:'single',
   opts:['A. Impaired reflex vasoconstriction from autonomic neuropathy, resulting in orthostatic hypotension','B. Dehydration alone, unrelated to the diabetes diagnosis','C. An early sign of developing DKA','D. A normal, expected finding in all older adults'],correct:0,
   rat:'B offers a plausible alternative explanation on its own, and D generalizes a genuine complication as universal aging rather than a diabetes-specific mechanism. Autonomic neuropathy impairs the nervous system\'s ability to trigger compensatory vasoconstriction when standing — a distinct, diabetes-related complication requiring its own safety precautions (rising slowly, fall precautions).'},

  {q:'Which combination of findings in a client with long-standing diabetes is MOST consistent with early diabetic nephropathy?',type:'single',
   opts:['A. Elevated fasting glucose with mild peripheral edema','B. Microalbuminuria with a normal serum creatinine','C. Elevated serum creatinine with normal urine protein','D. Polyuria and polydipsia without any lab abnormalities'],correct:1,
   rat:'A, C, and D all describe findings that could plausibly appear somewhere in a diabetic patient\'s chart, which is what makes them tempting. Microalbuminuria — small amounts of protein leaking into the urine before creatinine even rises — is specifically the earliest detectable marker of nephropathy, often preceding any creatinine change at all.'},

  {q:'A client with diabetic nephropathy and an eGFR of 25 mL/min is newly prescribed glyburide for glucose control. What is the nurse\'s BEST action?',type:'single',
   opts:['A. Administer the medication as ordered without further action','B. Question the order, since glyburide is renally cleared and can accumulate, causing prolonged hypoglycemia in significant renal impairment','C. Administer the medication but double the ordered dose to compensate for reduced absorption','D. Hold the medication indefinitely and notify the pharmacy to discontinue all diabetes medications'],correct:1,
   rat:'A treats the order as routine, which is reasonable UNLESS you know the renal-clearance issue with this specific drug. C invents a compensation strategy with no basis, and D overcorrects by stopping all diabetes treatment rather than questioning the one problematic order. Glyburide specifically accumulates in renal impairment; glipizide is the safer sulfonylurea choice if one is still needed.'},

  {q:'A client with CKD is ordered ibuprofen for musculoskeletal pain. What is the nurse\'s BEST action?',type:'single',
   opts:['A. Administer the medication as ordered since it is available over-the-counter','B. Question the order, since NSAIDs are nephrotoxic and can further reduce renal blood flow','C. Administer the medication with a full glass of water to protect the kidneys','D. Give the medication only at bedtime to minimize its effect on the kidneys'],correct:1,
   rat:'A reasons from availability rather than safety, which is an easy trap since ibuprofen is so commonly used without a prescription. C and D both invent workarounds that don\'t address the actual mechanism. NSAIDs reduce renal blood flow and are nephrotoxic — this order should be questioned in a patient with CKD regardless of timing or hydration.'},

  {q:'A patient with a history of angle-closure glaucoma is about to receive dilating drops (a mydriatic/anticholinergic agent) before a routine eye exam. What is the nurse\'s BEST action?',type:'single',
   opts:['A. Administer the drops as ordered, since dilating drops are routine for eye exams','B. Question the order, since dilating the pupil can push the iris into the drainage angle and trigger an acute angle-closure attack','C. Administer the drops but patch the eye immediately afterward to prevent complications','D. Administer only half the ordered dose to reduce the risk'],correct:1,
   rat:'A treats this as routine, which is true for most patients — but a history of angle-closure glaucoma is the specific exception, since dilating the pupil can precipitate the exact mechanism (angle blockage) that causes an acute attack. C and D both invent workarounds rather than actually questioning the order.'},

  {q:'Diabetic retinopathy and nephropathy are both classified as which type of complication?',type:'single',
   opts:['A. Macrovascular','B. Microvascular','C. Neuropathic','D. Autoimmune'],correct:1,
   rat:'Straight recall — retinopathy and nephropathy are both microvascular complications, damage to small vessels from chronic hyperglycemia.'},

  {q:'A client with a 15-year history of Type 2 diabetes has the following findings at a routine visit: BP 148/92, urine microalbumin elevated, eGFR 52, and a new complaint of feeling full quickly after small meals with occasional bloating. Which single underlying process connects ALL of these findings?',type:'single',
   opts:['A. Four separate, unrelated age-related changes that happen to occur together','B. Diabetic microvascular and autonomic nerve damage — affecting the kidneys (nephropathy) and GI motility (gastroparesis) through the same chronic hyperglycemia mechanism','C. An acute infectious process affecting multiple organ systems simultaneously','D. Medication side effects unrelated to the underlying diabetes'],correct:1,
   rat:'A treats these as coincidental, separate findings, which is tempting given how different they seem (kidney labs vs. GI symptoms). C and D both look for a cause outside the diabetes itself. All of these findings — elevated BP, microalbuminuria, reduced eGFR, and early satiety/bloating — trace back to the SAME long-term hyperglycemia damaging small vessels (nephropathy) and autonomic nerves (gastroparesis) simultaneously; recognizing one underlying process instead of four separate problems is the actual clinical reasoning skill being tested.'}
],'Complications Check');
</script>
<script>
document.getElementById('sec-skin').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🧴</span> Skin, Wounds & Pressure Injuries</h2>
<p class="intro-line">Pressure injuries are the classic NCLEX topic here. Know the staging, prevention, and the mechanism (pressure → no blood → tissue death).</p>

<div class="card">
  <h3>🔍 Assessing skin color (esp. dark skin tones)</h3>
  <table class="lab">
    <tr><th>Finding</th><th>What it means</th><th>Where to check in dark skin</th></tr>
    <tr><td><b>Cyanosis</b></td><td>Low oxygen (bluish)</td><td>Appears grayish; check lips, nail beds, conjunctivae</td></tr>
    <tr><td><b>Jaundice</b></td><td>High bilirubin (yellow)</td><td>Check sclerae, hard palate, mucous membranes</td></tr>
    <tr><td><b>Pallor</b></td><td>Low blood flow/anemia</td><td>Check conjunctivae, oral mucosa</td></tr>
    <tr><td><b>Erythema</b></td><td>Redness/inflammation</td><td>May look purple-gray; palpate for warmth</td></tr>
  </table>
  <div class="hy">⭐ In darker skin tones, color changes are harder to see — <b>check mucous membranes, sclerae, nail beds, and conjunctivae</b>, and palpate for warmth/temperature changes.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🗣️ Skin assessment — the actual questions to ask (Casteel's own examples)</h3>
  <p><b>If you see a RASH,</b> ask open-ended questions: How long has it been there? Does it itch? Any new soaps, detergents, lotions, or products? Any known allergies?</p>
  <p><b>If you see ECCHYMOSIS (bruising)</b> on a hospitalized patient, ask: How did you get this? Was there an injury or bump? What medications are you taking (anticoagulants, aspirin, and steroids all increase bruising)?</p>
  <div class="hy">⭐ <b>Pattern recognition matters:</b> bruising in typical locations (shins, forearms, from a bump) is usually explainable. Bruising that is widespread, in unusual/protected locations, or inconsistent with the story given should raise concern and prompt further assessment — this applies to any patient, but is a especially important safety consideration in elderly or dependent patients.</div>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Duration, itch, and what touched it" for a rash. "How, when, and what meds" for a bruise.</div></div>
</div>

<div class="card">
  <h3>✋ Quick fact: thickest &amp; thinnest skin on the body</h3>
  <p><b>Thickest skin:</b> the palms of the hands and the soles of the feet.</p>
  <p><b>Thinnest skin:</b> the eyelids and the genital/perineal area.</p>
  <div class="hy">⭐ Flagged directly by the instructor as a testable detail — easy to overlook because it seems trivial, but it's exactly the kind of small fact that shows up as a distractor or a direct question.</div>
</div>

<div class="card" style="border-color:var(--amber)">
  <h3>🛏️ Pressure injury STAGING (know all four + the two special ones)</h3>
  <table class="lab">
    <tr><th>Stage</th><th>What you see</th></tr>
    <tr><td><b>Stage 1</b></td><td><b>Intact skin</b>, non-blanchable redness (doesn't turn white when pressed)</td></tr>
    <tr><td><b>Stage 2</b></td><td><b>Partial-thickness</b> — shallow open ulcer or blister; epidermis/dermis</td></tr>
    <tr><td><b>Stage 3</b></td><td><b>Full-thickness</b> — fat visible, may have slough; no bone/tendon</td></tr>
    <tr><td><b>Stage 4</b></td><td><b>Full-thickness</b> with visible <b>bone, tendon, or muscle</b></td></tr>
    <tr><td><b>Unstageable</b></td><td>Base covered by <b>slough/eschar</b> — can't see depth until removed</td></tr>
    <tr><td><b>Deep tissue injury</b></td><td>Intact skin, <b>purple/maroon</b> discoloration</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"1 = Red intact • 2 = Broken shallow • 3 = Fat • 4 = Bone. Covered = Unstageable."</div></div>
</div>

<div class="card">
  <h3>🛡️ Prevention (the mechanism drives every rule)</h3>
  <ul class="clean">
    <li><b>Reposition every 2 hours</b> — the #1 intervention (relieves the pressure that's the cause).</li>
    <li><b>Keep the head of the bed at or below 45°</b> when possible — a higher angle causes the body to slide down, creating shear force on the sacrum as skin drags against the sheets while bone moves underneath it.</li>
    <li><b>NEVER massage reddened/bony areas</b> — the tissue is already damaged; massage worsens it.</li>
    <li>Keep skin clean and dry; manage moisture/incontinence (moisture macerates skin).</li>
    <li>Use pressure-redistribution surfaces, pillows to bridge bony prominences, and lift (don't drag) to avoid shear/friction.</li>
    <li><b>Nutrition:</b> adequate protein — albumin <b>&lt;3 g/dL</b> raises risk and slows healing.</li>
    <li>Use the <b>Braden scale</b> to assess risk (see the domains below).</li>
    <li><b>Disease-related risk factors to know:</b> diabetes (poor perfusion), paralysis/stroke (immobility + impaired sensation), obesity (increased pressure + harder to reposition), and PVD/PAD (peripheral vascular/arterial disease — poor circulation prevents healing).</li>
    <li>Most common sites: <b>sacrum, heels</b>, ischial tuberosities, greater trochanter, elbows.</li>
    <li><b>Turning schedule by situation:</b> in bed → turn <b>every 2 hours</b>; in a chair/wheelchair → reposition <b>every 15 minutes</b>; if able, stand <b>every hour</b>.</li>
    <li><b>If a pressure injury already exists, the main goal is to OFFLOAD</b> the area — remove all pressure from it to restore circulation and let it heal.</li>
  </ul>
</div>

<div class="card">
  <h3>🧭 Pressure points BY POSITION (know these)</h3>
  <p>Different lying positions put weight on different bony prominences. Casteel-style questions love asking which area to check for a given position.</p>
  <table class="lab">
    <tr><th>Position</th><th>High-risk pressure points</th></tr>
    <tr><td><b>Supine</b> (on back)</td><td>Back of head, shoulders, spine, elbows, <b>sacrum</b>, <b>heels</b></td></tr>
    <tr><td><b>Prone</b> (on stomach)</td><td>Cheek/ear, collar bone, breasts (women), genitalia (men), hips, knees, toes</td></tr>
    <tr><td><b>Side-lying</b> (lateral)</td><td>Ear, collar bone, ribs, <b>hip</b>, <b>iliac crest</b>, knee, toes</td></tr>
  </table>
  <div class="hy">⭐ <b>Sacrum and heels</b> are the most common overall (supine is the most common hospital position). For side-lying, the <b>hip and iliac crest</b> take the weight. Match the position to the bony prominence.</div>
</div>

<div class="card">
  <h3>📋 Braden scale — the 6 domains it scores</h3>
  <p>The Braden scale predicts pressure injury risk (severe / high / moderate / mild). It scores six areas:</p>
  <ul class="clean">
    <li><b>Sensory</b> perception (can they feel/respond to discomfort?)</li>
    <li><b>Moisture</b> (skin exposure to wetness)</li>
    <li><b>Activity</b> (level of physical activity)</li>
    <li><b>Mobility</b> (ability to change position)</li>
    <li><b>Nutrition</b> (usual food intake)</li>
    <li><b>Friction &amp; shear</b> (rubbing/sliding against surfaces)</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Some Moist Areas Make Nurses Frown" — Sensory, Moisture, Activity, Mobility, Nutrition, Friction.</div></div>
</div>

<div class="card">
  <h3>🛠️ Pressure-reducing devices & measures</h3>
  <ul class="clean">
    <li><b>Reduce pressure points</b> — the best way to prevent injury.</li>
    <li>Devices: <b>air/pressure-redistribution mattress</b>, <b>float boots</b> (offload heels), <b>positioning wedges</b>, pillows, padding under oxygen tubing/lines.</li>
    <li><b>Remove lines/drains from under the patient's skin</b> (they create pressure points).</li>
    <li><b>Keep linens smooth and wrinkle-free</b>; limit layers of linens and briefs (bunched fabric = pressure + moisture).</li>
    <li>Deep tissue injury feels <b>boggy</b> and looks <b>purple/maroon</b> with intact skin — a warning that damage is happening underneath.</li>
  </ul>
</div>

<div class="card">
  <h3>🩹 Wound care & debridement</h3>
  <ul class="clean">
    <li><b>Debridement</b> = removing dead (necrotic) tissue so the wound can heal:</li>
    <li><b>Autolytic</b> — the body's own enzymes under a moist occlusive dressing (slowest, most selective).</li>
    <li><b>Enzymatic/chemical</b> — collagenase applied to break down dead tissue.</li>
    <li><b>Mechanical/surgical</b> — physically removing tissue (fastest).</li>
    <li>A wound heals best in a <b>moist</b> (not wet, not dry) environment. Match the dressing to the wound: absorptive for drainage, hydrating for dry wounds.</li>
  </ul>
</div>

<div id="quiz-skin"></div>
`;

renderQuiz('quiz-skin',[
  {q:'A nurse assesses a patient\'s sacral area and finds intact skin with redness that does NOT blanch when pressed, and no open areas. How should this be staged?',type:'single',
   opts:['A. Stage 1','B. Stage 2','C. Deep tissue injury','D. This does not require staging'],correct:0,
   rat:'B over-assumes that redness alone means the skin has broken, and C jumps to a more severe classification than the findings actually support. Stage 1 is specifically defined as intact skin with non-blanchable erythema — only once the skin actually opens does staging progress further.'},

  {q:'A wound assessment reveals the base is completely covered with thick, dry black eschar, making it impossible to see how deep the wound extends. How should the nurse document this injury\'s stage?',type:'single',
   opts:['A. Stage 3','B. Stage 4','C. Unstageable','D. Deep tissue injury'],correct:2,
   rat:'A and B both assign a specific depth based on the presence of eschar alone, which is tempting since eschar often does mean significant damage. But the defining feature of "unstageable" is precisely that the depth CANNOT be assessed until the obscuring dead tissue is removed — D also doesn\'t fit, since DTI describes intact, not open, skin.'},

  {q:'An immobile patient is at high risk for pressure injury. Which nursing intervention has the STRONGEST evidence for preventing injury development?',type:'single',
   opts:['A. Applying moisturizing lotion to bony prominences twice daily','B. Repositioning the patient at least every 2 hours','C. Elevating the head of the bed to 60-90 degrees for most of the day','D. Massaging bony prominences during every position change'],correct:1,
   rat:'A and D both sound like reasonable skin-care habits, and C sounds like a comfortable, elevated position — but none of them address the root cause (sustained pressure), and C actually increases shear force on the sacrum at that angle. Scheduled repositioning that physically relieves pressure is the intervention with the strongest evidence.'},

  {q:'A nurse finds a reddened, intact area over a bedridden patient\'s sacrum during a routine skin check. Which action is appropriate?',type:'single',
   opts:['A. Massage the area firmly for several minutes','B. Reposition the patient to relieve pressure on the area','C. Apply a warm compress to the area','D. Document the finding with no further action since the skin remains intact'],correct:1,
   rat:'A and C both apply a "stimulate healing" logic that sounds reasonable but is actually harmful — the tissue is already compromised, and massage or heat can worsen fragile, damaged capillaries. D under-reacts to a genuine early warning sign that still needs an active response.'},

  {q:'Which of the following patients are at INCREASED risk for pressure injury development? (Select all that apply)',type:'multi',
   opts:['A. A patient with urinary incontinence requiring frequent linen changes','B. A patient with a serum albumin of 2.4 g/dL','C. A patient repositioned every 2 hours per a strict turning schedule','D. A patient with diminished sensation following a spinal cord injury','E. A bedbound patient with a BMI in the underweight range'],correct:[0,1,3,4],
   rat:'C describes exactly the PROTECTIVE intervention (scheduled repositioning) rather than a risk factor, which is easy to mix up if you\'re scanning for anything related to positioning. Incontinence/moisture, poor nutrition (low albumin), impaired sensation, and being underweight are the genuine risk factors here.'},

  {q:'A patient spends most of the day in a wheelchair due to lower-extremity paralysis. What is the appropriate repositioning frequency to prevent pressure injury while seated?',type:'single',
   opts:['A. Every 2 hours','B. Every 15 minutes','C. Once every shift if a pressure-redistribution cushion is used','D. Only when the patient reports discomfort or numbness'],correct:1,
   rat:'A applies the standard bed-patient interval, which seems reasonable but doesn\'t account for how sitting concentrates pressure differently. C assumes a cushion alone is sufficient without active repositioning. Because sitting concentrates the entire body weight over the small area of the ischial tuberosities, the evidence-based interval is much more frequent than for a patient lying in bed.'},

  {q:'A patient positioned side-lying (lateral) for an extended period is at HIGHEST risk for pressure injury at which locations?',type:'single',
   opts:['A. Sacrum and heels','B. Hip (greater trochanter) and iliac crest','C. Breasts and genitalia','D. Occiput and shoulder blades'],correct:1,
   rat:'A generalizes the supine pressure points to every position, and C and D describe the pressure points from prone and supine positioning, respectively — all three are real pressure points, just for different positions. Side-lying specifically loads the hip and iliac crest (plus ear, ribs, and ankle).'},

  {q:'A patient already has an established Stage 2 pressure ulcer on the sacrum. What is the PRIMARY goal of ongoing care for this existing wound?',type:'single',
   opts:['A. Keep the area consistently moist with heavy ointment application regardless of position changes','B. Offload all pressure from the wound to restore blood flow','C. Maintain the patient in a single, consistent position to avoid disturbing the healing tissue','D. Apply firm compression dressings to stabilize the wound edges'],correct:1,
   rat:'C sounds intuitively protective ("don\'t disturb it") but is actually backwards — an unmoved patient continues to apply the same pressure that caused the wound in the first place. Once an ulcer exists, the priority is fully offloading that specific area so circulation can return and healing can occur.'},

  {q:'A nurse assesses intact skin over a patient\'s heel and finds it is purple/maroon in color and feels boggy/mushy compared to surrounding tissue. Which is the correct interpretation?',type:'single',
   opts:['A. Stage 1 pressure injury','B. Deep tissue injury','C. Normal bruising from an unrelated minor trauma','D. This cannot represent a pressure injury since there is no open wound'],correct:1,
   rat:'A classifies this as the mildest stage based on intact skin alone, which misses the specific purple/maroon, boggy quality that distinguishes deep tissue injury from ordinary Stage 1 erythema. DTI represents SIGNIFICANT underlying damage despite an intact-looking surface, not a minor or reassuring finding.'},

  {q:'A hospitalized patient is noted to have new bruising on both forearms. Which question is MOST important for the nurse to ask FIRST?',type:'single',
   opts:['A. "Have you been sleeping well lately?"','B. "Can you tell me how you got these bruises, and are you currently taking any medications like blood thinners or steroids?"','C. "Would you like me to apply lotion to the area?"','D. "Do you want the lights dimmed in your room?"'],correct:1,
   rat:'A, C, and D are all reasonable-sounding comfort questions a nurse might genuinely ask, which is what makes them tempting here. Asking about mechanism of injury and medication use is the assessment question that actually informs whether this bruising is expected or concerning.'},

  {q:'A nurse notices bruising in unusual locations on an elderly, dependent patient that does not match the explanation given by a caregiver. What is the MOST appropriate nursing action?',type:'single',
   opts:['A. Document the finding exactly as explained by the caregiver','B. Further assess the pattern and report the inconsistent finding per facility policy','C. Apply ice to the bruised areas and recheck in 24 hours','D. Ask the patient to keep the affected areas covered during future visits'],correct:1,
   rat:'A accepts an explanation at face value, which feels respectful but skips necessary clinical judgment. C and D both sidestep the actual concern with a plausible-sounding alternative action. Bruising that is inconsistent with the given explanation is a recognized pattern warranting further assessment and reporting.'},

  {q:'A nurse is caring for a bedbound patient and keeps the head of the bed elevated to 75 degrees for most of the day for comfort. What is the MOST likely consequence of this positioning?',type:'single',
   opts:['A. Improved pressure redistribution across the back and hips','B. Increased shear force on the sacrum as the body slides downward against the sheets','C. No significant effect on skin integrity as long as the patient is repositioned every 2 hours','D. Decreased risk of aspiration, which outweighs any other positioning concern'],correct:1,
   rat:'C assumes repositioning alone cancels out the risk from a high bed angle, and D describes a real, separate benefit that doesn\'t address the skin consequence being asked about. Angles greater than the recommended 45° cause the body to slide, creating shear as skin drags against linens while the sacrum keeps moving.'},

  {q:'Which areas of the body have the THICKEST skin, and which have the THINNEST?',type:'single',
   opts:['A. Thickest: scalp and back; Thinnest: palms and soles','B. Thickest: palms of the hands and soles of the feet; Thinnest: eyelids and genital/perineal area','C. Thickest: eyelids and lips; Thinnest: palms and soles','D. Skin thickness is uniform across the body'],correct:1,
   rat:'A and C both invert the correct pairing in different ways, which makes this an easy one to second-guess. The palms and soles are actually the thickest skin on the body, while the eyelids and genital/perineal region are the thinnest.'},

  {q:'A wound care nurse documents a sacral pressure injury as full-thickness tissue loss with visible subcutaneous fat, but no exposed bone, tendon, or muscle. Slough is present but does not obscure the wound base. How should this be staged?',type:'single',
   opts:['A. Stage 2','B. Stage 3','C. Stage 4','D. Unstageable'],correct:1,
   rat:'A misreads the presence of any slough as automatically shallower, and C assumes all full-thickness wounds with slough are automatically the most severe stage. D over-applies the "unstageable" rule, which only fits when slough/eschar OBSCURES the wound base — here the base is still visible, so this is Stage 3.'},

  {q:'A client with a Braden Scale score of 14 is being cared for on a medical floor. Which combination of interventions is MOST appropriate based on this score?',type:'single',
   opts:['A. No specific pressure-injury prevention measures are needed','B. Scheduled repositioning, a pressure-redistribution surface, and ongoing skin assessment','C. Immediate referral for surgical debridement','D. Discontinuing all repositioning to avoid disrupting the client\'s sleep'],correct:1,
   rat:'A treats 14 as if it were a reassuring, low-risk number, and C jumps to an intervention appropriate for an existing wound rather than prevention. A Braden score of 14 actually falls within the moderate-risk range (≤18 is considered at-risk overall) — this calls for active preventive interventions, not a "wait and see" approach.'},

  {q:'How often should a bedbound patient be repositioned to help prevent pressure injuries?',type:'single',
   opts:['A. Every 30 minutes','B. Every 2 hours','C. Every 8 hours','D. Once per day'],correct:1,
   rat:'A plain recall question — reposition bedbound patients at least every 2 hours. (Chair-bound patients need more frequent repositioning, about every 15 minutes, since sitting concentrates pressure over a smaller area.)'},

  {q:'A patient with diabetes, a Braden score of 13, and a history of a prior healed heel ulcer is recovering from surgery. Post-op, the care team orders a sequential compression device (SCD) on both lower legs, to remain in place continuously except for short removal periods for skin checks. On day 2, the nurse notes the heel area under the SCD boot is intact but appears slightly duskier than the surrounding skin. What is the MOST appropriate action?',type:'single',
   opts:['A. Continue the current plan unchanged, since the skin remains intact and SCDs are a standard, expected post-op device','B. Remove the SCD device from that leg entirely for the remainder of the admission','C. Inspect the area more closely and closely reassess it at each skin check, since discoloration under a device in a high-risk patient warrants closer monitoring for early pressure/device-related injury','D. Apply a heating pad to the area to improve circulation before the next check'],correct:2,
   rat:'A treats the device itself as automatically safe just because it\'s standard equipment, which overlooks that ANY device can cause pressure injury in a high-risk patient (low Braden score, diabetes, prior heel ulcer). B overcorrects by removing a medically necessary device entirely rather than addressing the actual concern. D repeats a genuinely harmful action from earlier in this guide — a heating pad on compromised skin risks a burn. The correct response is heightened surveillance of a discoloration that, in this specific high-risk patient, could be early tissue damage, without discarding necessary care or applying a harmful "fix."'}
],'Skin & Wounds Check');
</script>

<h2 class="sec-title"><span class="sec-emoji">👁️</span> Eye & Vision</h2>
<p class="intro-line">Glaucoma and cataracts are the big two. Know the mechanism: glaucoma = pressure damages the nerve (peripheral loss); cataract = cloudy lens (blurry, glare). But first — the foundational eye basics he explicitly said to know cold.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>👁️ What the lens actually does (3 jobs)</h3>
  <ul class="clean">
    <li><b>UV filter</b> — blocks damaging ultraviolet light from reaching the retina.</li>
    <li><b>Accommodation</b> — the lens changes SHAPE (gets rounder for near objects, flatter for distance) to keep the image in focus.</li>
    <li><b>Refraction</b> — the lens bends incoming light so it focuses precisely on the retina.</li>
  </ul>
  <div class="hy">⭐ <b>Why this matters:</b> as we age, the lens gradually thickens and stiffens, which directly limits its ability to accommodate — that's the mechanism behind presbyopia (below). Everything downstream starts here.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>🔍 Refractive errors — where does the light actually focus?</h3>
  <table class="lab">
    <tr><th>Term</th><th>What's happening</th></tr>
    <tr><td><b>Emmetropia</b></td><td>Normal — light focuses directly ON the retina without correction. This is 20/20.</td></tr>
    <tr><td><b>Myopia</b></td><td>Nearsighted — light focuses IN FRONT of the retina (eyeball too long / cornea too curved). Close objects clear, distance blurry.</td></tr>
    <tr><td><b>Hyperopia</b></td><td>Farsighted — light focuses BEHIND the retina (eyeball too short). Distance clear, close objects blurry.</td></tr>
    <tr><td><b>Astigmatism</b></td><td>Irregular curvature of the cornea/lens — causes blurred or distorted vision at ANY distance, near or far.</td></tr>
    <tr><td><b>Presbyopia</b></td><td>Age-related loss of accommodation (usually >40) — the lens has stiffened and can no longer focus up close. This is why reading glasses become necessary with age even in people who never needed correction before.</td></tr>
  </table>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Myopia = can't see the MOUNTAIN (far). Hyperopia = can't see what's HANDHELD (near)."</div></div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>👀 Pupil response &amp; pupil size — the terms he wants you to distinguish</h3>
  <ul class="clean">
    <li><b>Direct response:</b> shine light in ONE eye → THAT SAME eye's pupil constricts.</li>
    <li><b>Consensual response:</b> shine light in ONE eye → the OTHER eye's pupil ALSO constricts, even though no light was shone into it directly (the two sides are neurologically linked).</li>
    <li><b>Miosis</b> = pupil CONSTRICTION (gets smaller). Caused by opioids, pilocarpine, bright light, parasympathetic response.</li>
    <li><b>Mydriasis</b> = pupil DILATION (gets bigger). Caused by anticholinergics, dim light, sympathetic ("fight or flight") response, some abnormal neuro findings.</li>
  </ul>
  <div class="hy">⭐ <b>Don't mix these two pairs up</b> — direct/consensual describes HOW you're testing (which eye reacts), while miosis/mydriasis describes WHICH DIRECTION the pupil is changing. A question can test either pairing separately.</div>
</div>

<div class="card" style="border-color:var(--purple)">
  <h3>📏 Visual acuity — how to actually read the fraction</h3>
  <p class="why-chain">The Snellen fraction is <b>[distance the patient stands from the chart] / [distance a person with NORMAL vision could read that same line from]</b>. The patient always stands 20 feet away — it's the BOTTOM number that changes and tells you how good or bad their vision is.</p>
  <div class="hy">⭐ <b>Worked example:</b> a person with <b>20/40</b> vision can see from 20 feet what a person with normal (20/20) vision could see from <b>40 feet</b> away. In other words, they have to be CLOSER to see what someone with normal vision can see from farther back — so a LARGER bottom number always means WORSE vision, not better.</div>
</div>

<div class="card">
  <h3>👓 Glaucoma — pressure kills the optic nerve</h3>
  <p class="why-chain"><b>Mechanism:</b> aqueous humor can't drain → intraocular pressure (IOP) rises → pressure damages the <b>optic nerve</b> → vision lost from the <b>periphery inward</b> (tunnel vision). Normal IOP = <b>10–21 mmHg</b>.</p>
  <table class="lab">
    <tr><th></th><th>Open-angle (common)</th><th>Angle-closure (emergency)</th></tr>
    <tr><td><b>Onset</b></td><td>Gradual, painless</td><td>SUDDEN</td></tr>
    <tr><td><b>Symptoms</b></td><td>Peripheral vision loss (tunnel vision), halos; often silent early</td><td>Severe eye pain, headache, halos, nausea/vomiting, blurred vision, rock-hard eye, fixed pupil</td></tr>
    <tr><td><b>Priority</b></td><td>Lifelong drops to lower IOP</td><td><b>MEDICAL EMERGENCY</b> — treat immediately to save sight</td></tr>
  </table>
  <ul class="clean">
    <li><b>Treatment:</b> eye drops that lower IOP (reduce fluid production or improve drainage) — e.g., beta-blockers (timolol), prostaglandins, miotics.</li>
    <li><b>Lost vision is permanent</b> — treatment prevents further loss, doesn't restore it. So adherence to drops is critical.</li>
  </ul>
  <div class="hy">⭐ <b>Glaucoma = peripheral loss first (tunnel vision).</b> Contrast with macular degeneration = <b>central</b> vision loss. Casteel loves this contrast.</div>
</div>

<div class="card">
  <h3>🌫️ Cataracts — cloudy lens</h3>
  <ul class="clean">
    <li><b>Mechanism:</b> the lens becomes opaque/cloudy → light can't pass through clearly.</li>
    <li><b>Key causes to know:</b> <b>aging (#1 cause)</b>, <b>eye injury/trauma</b>, <b>diabetes</b> (glucose alters lens proteins), and <b>beta-blocker use</b>.</li>
    <li><b>Symptoms:</b> painless, gradual <b>blurred/hazy vision, glare, halos around lights, difficulty at night</b>, faded colors.</li>
    <li><b>Treatment:</b> surgical lens removal + intraocular lens implant (only real fix).</li>
    <li><b>Post-op teaching:</b> avoid bending, lifting, straining, coughing (raises IOP); wear eye shield especially at night; report sudden pain or vision changes (could signal complication).</li>
  </ul>
</div>

<div class="card">
  <h3>👁️ Two more to know</h3>
  <ul class="clean">
    <li><b>Macular degeneration (AMD):</b> loss of <b>CENTRAL</b> vision (opposite of glaucoma); peripheral stays. Uses the <b>Amsler grid</b> to monitor (report wavy/distorted lines). Leading cause of vision loss in older adults.</li>
    <li><b>Retinal detachment:</b> the retina peels away → <b>sudden floaters, flashes of light, "curtain" coming down over vision</b>. This is an <b>emergency</b> — needs prompt surgery to save vision.</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Glaucoma = Gone from the sides. Macular = Missing the middle."</div></div>
</div>

<h2 class="sec-title"><span class="sec-emoji">👂</span> Ear & Hearing</h2>
<p class="intro-line">Ménière's disease is the star here. Also know conductive vs sensorineural hearing loss and basic ear safety.</p>

<div class="card" style="border-color:var(--amber);background:var(--amber-soft)">

<div class="card" style="border-color:var(--teal)">
  <h3>🌀 Ménière's Disease — the triad</h3>
  <p class="why-chain"><b>Mechanism:</b> too much fluid (endolymph) builds up in the inner ear → pressure disrupts the balance and hearing organs.</p>
  <p><b>The classic TRIAD (know these three):</b></p>
  <ul class="clean">
    <li><b>1. Episodic vertigo</b> — severe spinning (the worst symptom); lasts minutes to hours, often with nausea/vomiting.</li>
    <li><b>2. Tinnitus</b> — ringing/roaring in the ear.</li>
    <li><b>3. Fluctuating sensorineural hearing loss</b> — comes and goes.</li>
    <li>Plus a feeling of <b>fullness/pressure</b> in the ear.</li>
  </ul>
  <p><b>Management:</b></p>
  <ul class="clean">
    <li><b>Low-sodium diet (&lt;2000 mg/day) + diuretics</b> — reduce the fluid/pressure (this is the mechanism-based key).</li>
    <li>Meds for attacks: antihistamines (meclizine) and antiemetics for nausea/vertigo; diazepam for severe vertigo.</li>
    <li><b>Safety during an attack:</b> lie still in a quiet, dark room; help prevent falls; move slowly.</li>
  </ul>
  <div class="mnem"><div class="tag">Mnemonic</div><div class="big">"Ménière's = the spinning Triad: Vertigo + Tinnitus + Hearing loss. Fix it with LOW SALT."</div></div>
</div>

<div class="card">
  <h3>🔊 Conductive vs Sensorineural hearing loss</h3>
  <table class="lab">
    <tr><th></th><th>Conductive</th><th>Sensorineural</th></tr>
    <tr><td><b>Problem</b></td><td>Sound can't get IN (outer/middle ear)</td><td>Nerve/cochlea damage (inner ear)</td></tr>
    <tr><td><b>Causes</b></td><td>Earwax, fluid, otitis media, perforated drum</td><td>Aging (presbycusis), noise, ototoxic drugs, Ménière's</td></tr>

  </table>
  <ul class="clean">
    <li><b>Presbycusis</b> — age-related sensorineural loss; high-frequency sounds go first.</li>
    <li><b>Ototoxic drugs</b> (can damage hearing): aminoglycosides, loop diuretics (furosemide), high-dose aspirin, some chemo — monitor for tinnitus/hearing changes.</li>
  </ul>
</div>

<div class="card">

  <ul class="clean">

    <li><b>Communication with hearing loss:</b> face the person, speak clearly at normal-to-slightly-slower pace, reduce background noise, don't shout (distorts sound), use gestures/writing.</li>

</div>

<script>
document.getElementById('sec-decoder').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🩺</span> Disorder Decoder</h2>
<p class="intro-line">Casteel's framework — every Unit 3 disorder in Cause → Manifests → Treatment. Quick reference before the exam.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>🗝️ The 3-question key (use it on every disorder)</h3>
  <ul class="clean">
    <li><b>1. Cause / pathophysiology</b> — what's physically going wrong? (This explains everything else.)</li>
    <li><b>2. Manifestations</b> — what will you SEE, HEAR, and what will the patient FEEL/REPORT? (signs + symptoms)</li>
    <li><b>3. Treatment</b> — meds, nursing interventions, priorities, and patient teaching.</li>
  </ul>
  <div class="mnem"><div class="tag">🧠 Mnemonic</div><div class="big">"Cause → Clues → Cure"</div><div class="exp">Why it happens → how it shows up → what we do about it.</div></div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🩸 Type 1 Diabetes</h3>
  <p><b>Cause:</b> <b>autoimmune T-cell attack destroys the pancreatic beta cells</b> that make insulin. Genetic predisposition + a triggering event (often viral) is suspected. By the time symptoms appear, <b>~80-90% of beta cells are already gone</b>. Absolute insulin deficiency — the pancreas makes essentially <b>ZERO insulin</b>.</p>
  <p><b>Manifests:</b> rapid onset, often in childhood/young adulthood. Classic <b>3 P's (polyuria, polydipsia, polyphagia)</b> PLUS <b>unexplained weight loss despite eating more</b> (cells can't use the glucose, so the body breaks down fat/muscle instead). Fatigue, blurred vision. Diagnostic: <b>fasting glucose ≥126 mg/dL, random ≥200 mg/dL with symptoms, A1C ≥6.5%</b>. May present in <b>DKA as the FIRST sign of diagnosis</b>.</p>
  <p><b>Treatment:</b> <b>lifelong exogenous insulin</b> — no oral agents work (there's no residual insulin production to stimulate). Typically <b>basal-bolus regimen</b>: long-acting (glargine) once daily + rapid-acting (lispro/aspart) with meals, or an insulin pump. Carb counting, frequent glucose monitoring (4+ times/day), rotate injection sites to prevent lipohypertrophy.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🩸 Type 2 Diabetes</h3>
  <p><b>Cause:</b> two-part mechanism — (1) <b>insulin resistance</b>: cells (especially muscle/fat/liver) stop responding normally to insulin, so glucose can't get in despite insulin being present; (2) the pancreas compensates by secreting MORE insulin, but <b>beta-cell function gradually declines over years</b> until it can no longer keep up. Strongly linked to <b>obesity, sedentary lifestyle, age >45, family history, and metabolic syndrome</b>.</p>
  <p><b>Manifests:</b> <b>gradual onset over years</b> — often asymptomatic or mild (fatigue, blurred vision, slow-healing cuts, recurrent yeast/UTI infections) until caught on routine labs or a complication appears. Same diagnostic numbers as Type 1 (FPG ≥126, A1C ≥6.5%, random ≥200 with symptoms). Because onset is silent, <b>many patients already have microvascular damage AT diagnosis</b>.</p>
  <p><b>Treatment:</b> stepwise — lifestyle changes (weight loss, diet, exercise) first; <b>metformin is first-line pharmacologic therapy</b> (decreases hepatic glucose production, improves insulin sensitivity, does NOT cause hypoglycemia alone). If A1C goal not met, add a second agent: SGLT-2 inhibitor, GLP-1 agonist, sulfonylurea, or DPP-4 inhibitor. Insulin may eventually be needed as beta-cell function declines further. <b>Hold metformin 24-48 hrs around IV contrast</b> (lactic acidosis risk with reduced renal clearance).</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>🚨 DKA (Diabetic Ketoacidosis)</h3>
  <p><b>Cause:</b> <b>near-total insulin deficiency (classically Type 1 diabetes)</b> — usually precipitated by missed insulin doses, new-onset undiagnosed Type 1, infection/illness, or physiologic stress (surgery, MI). Without insulin, cells can't use glucose, so the body shifts to breaking down fat for fuel → free fatty acids converted to <b>ketone bodies</b> (acetone, acetoacetate, beta-hydroxybutyrate) → these are ACIDS → <b>metabolic acidosis with an elevated anion gap</b>.</p>
  <p><b>Manifests:</b> glucose typically <b>>250 mg/dL</b> (can be higher), arterial <b>pH <7.3</b>, serum <b>bicarbonate <18 mEq/L</b>, positive serum/urine ketones. <b>Kussmaul respirations</b> (deep, rapid — blowing off CO₂ to compensate for the acidosis), <b>fruity/acetone breath odor</b>. Severe dehydration from osmotic diuresis: dry mucous membranes, poor skin turgor, tachycardia, hypotension. N/V, abdominal pain (can mimic an acute abdomen), altered mental status as it progresses. Onset over hours to ~1 day.</p>
  <p><b>Treatment:</b> (1) <b>IV isotonic fluids (0.9% NS) FIRST</b> to correct volume depletion; (2) <b>IV regular insulin drip (the ONLY insulin given IV)</b> to stop ketone production and lower glucose; (3) monitor potassium closely — acidosis pushes K⁺ out of cells so serum levels look falsely normal/high initially, but total body K⁺ is depleted, and insulin therapy will drive it back into cells, dropping serum levels fast — replace once urine output is confirmed and K⁺ is <5.0-5.2; (4) <b>add dextrose once glucose reaches ~200-250 mg/dL</b> so insulin can keep running (clearing ketones) without causing hypoglycemia. Continuous ECG and hourly glucose checks.</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>💧 HHS (Hyperosmolar Hyperglycemic Syndrome)</h3>
  <p><b>Cause:</b> <b>occurs almost exclusively in Type 2 diabetes</b> — these patients are still <b>producing insulin</b>, but their cells are <b>resistant to it</b>, so glucose can't be pulled into cells and instead stays/builds up in the blood. That same circulating insulin, however, usually only needs to be present in small amounts to keep the liver from breaking down fat — so it's <b>enough to suppress fat breakdown/ketone production, but not enough to overcome the resistance and control glucose</b>. Usually triggered by infection (especially pneumonia/UTI), inadequate fluid intake (common in older adults with impaired thirst response), or a new medication (steroids, diuretics). Develops <b>much more slowly than DKA — over days</b>.</p>
  <p><b>Manifests:</b> glucose extremely high, often <b>>600 mg/dL</b> and sometimes >1000. Serum <b>osmolality markedly elevated (>320 mOsm/kg)</b>. Blood <b>pH stays near-normal (>7.3)</b>, bicarbonate near-normal, <b>ketones absent or minimal — NO Kussmaul breathing, NO fruity breath</b> (this is the key differentiator from DKA). Profound dehydration is the dominant feature: severe hypotension, tachycardia, and neurologic changes ranging from confusion to seizures to coma (from the extreme hyperosmolality itself, not from acidosis).</p>
  <p><b>Treatment:</b> <b>aggressive IV fluid replacement is the TOP priority</b> (fluid deficits are often larger than in DKA) — typically starts with 0.9% NS, may switch to 0.45% NS once hemodynamically stable, then add dextrose once glucose approaches ~250-300. Lower-dose insulin drip than DKA (fluids alone often drop glucose significantly). Correct electrolytes. Watch closely for fluid overload in older patients with cardiac/renal history. <b>Mortality is HIGHER than DKA</b> due to the degree of dehydration and comorbidities in the typical (older, Type 2) patient.</p>
</div>
<div class="card" style="border-color:var(--amber)">
  <h3>📉 Hypoglycemia</h3>
  <p><b>Cause:</b> <b>glucose <70 mg/dL</b> — from too much insulin/sulfonylurea relative to intake, a skipped or delayed meal after rapid-acting insulin, increased/unplanned exercise, alcohol without food (blocks gluconeogenesis), or insulin peak-timing errors.</p>
  <p><b>Manifests in 2 stages:</b> <b>Adrenergic (mild, glucose ~54-70):</b> the sympathetic nervous system fires first — diaphoresis, tremor, tachycardia, palpitations, hunger, anxiety. <b>Neuroglycopenic (worse, <54):</b> the brain itself is starved of fuel — confusion, headache, slurred speech, visual disturbance, irritability, poor coordination, progressing to seizures and loss of consciousness if untreated. <b>Autonomic neuropathy can blunt/eliminate the adrenergic warning stage</b> ("hypoglycemia unawareness"), so the patient goes straight to neuro symptoms.</p>
  <p><b>Treatment:</b> conscious + able to swallow → <b>Rule of 15</b>: 15 g fast-acting carbohydrate (4 oz juice, glucose tablets), recheck glucose in 15 minutes, repeat if still <70, then follow with a protein/complex-carb snack. <b>Unconscious or unable to swallow → NEVER give anything by mouth</b> (aspiration risk) — give <b>glucagon 1 mg IM/SubQ/intranasal</b> (mobilizes stored liver glycogen) or, with IV access in a facility, IV dextrose (D50). May take up to 20 minutes to regain consciousness after glucagon.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🛏️ Pressure Injury</h3>
  <p><b>Cause:</b> unrelieved external pressure (usually over a bony prominence) compresses capillaries against the underlying bone → local blood flow stops → <b>tissue hypoxia and cell death</b>. Shear (tissue layers sliding, e.g., sliding down in bed) and friction accelerate damage; moisture (incontinence) and poor nutrition (low albumin) impair skin integrity and healing.</p>
  <p><b>Manifests (staged by depth):</b> <b>Stage 1</b> — intact skin, non-blanchable redness. <b>Stage 2</b> — partial-thickness loss, shallow open ulcer or intact/ruptured blister, no slough. <b>Stage 3</b> — full-thickness loss, subcutaneous fat visible, no bone/tendon/muscle exposed. <b>Stage 4</b> — full-thickness with bone, tendon, or muscle exposed. <b>Unstageable</b> — base obscured by slough/eschar (depth can't be determined until debrided). <b>Deep tissue injury</b> — intact or non-intact skin with a localized area of persistent, non-blanchable deep red/maroon/purple discoloration or blood-filled blister (damage is happening below the surface).</p>
  <p><b>Treatment:</b> <b>reposition at least every 2 hours in bed (every 15 minutes if in a wheelchair)</b>, use pressure-redistribution surfaces, keep skin clean/dry, optimize protein/caloric intake (<b>albumin <3 g/dL impairs healing</b>), <b>NEVER massage a reddened area</b> (ruptures already-fragile capillaries). Moist wound healing environment for open wounds; autolytic, mechanical, sharp, or surgical debridement to remove dead tissue as appropriate. Braden Scale used to assess and score ongoing risk.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>👓 Glaucoma</h3>
  <p><b>Cause:</b> aqueous humor is continuously produced inside the eye and must drain through the trabecular meshwork/canal of Schlemm. <b>Open-angle (most common, ~90%):</b> the drainage angle is anatomically open but drains too slowly — pressure builds gradually over years. <b>Angle-closure:</b> the iris physically blocks the drainage angle — pressure spikes suddenly and severely.</p>
  <p><b>Manifests:</b> normal <b>IOP = 10-21 mmHg</b>. <b>Open-angle</b> — gradual, <b>PAINLESS peripheral (tunnel) vision loss</b> as the optic nerve is compressed from the outside in; often not noticed until significant loss has occurred, sometimes found incidentally on routine eye exam. <b>Angle-closure</b> — <b>sudden severe eye pain, blurred vision, halos around lights, nausea/vomiting, a red eye, and a firm/hard globe</b> on palpation — a true ophthalmic EMERGENCY.</p>
  <p><b>Treatment:</b> open-angle — lifelong topical drops to lower IOP (prostaglandin analogs like latanoprost increase outflow; beta-blockers like timolol decrease production), sometimes laser trabeculoplasty or surgery; <b>lost vision is PERMANENT</b>, so the goal is preventing further loss. Angle-closure — <b>emergency IOP-lowering medications</b> (IV/oral) followed by laser iridotomy; treat as a same-day emergency, not a routine follow-up.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🌫️ Cataracts</h3>
  <p><b>Cause:</b> progressive clouding/opacification of the normally clear crystalline lens — from <b>aging (most common)</b>, UV exposure, <b>diabetes</b> (glucose alters lens proteins), steroid use, <b>beta-blocker use</b>, or <b>eye trauma/injury</b>. Light can no longer pass through and focus cleanly on the retina.</p>
  <p><b>Manifests:</b> <b>painless</b>, progressive blurry/hazy vision, increased glare and halos around lights (worse at night with a dilated pupil letting in more scattered light), difficulty with night driving, and colors appearing faded/yellowed. <b>No sudden pain, no redness</b> — a purely gradual, mechanical lens problem.</p>
  <p><b>Treatment:</b> the <b>ONLY definitive treatment is surgical removal of the cloudy lens with intraocular lens implant</b> (typically outpatient). Post-op teaching: <b>avoid bending, heavy lifting, and straining</b> (raises IOP and risks disrupting the healing incision), don't rub the eye, use prescribed antibiotic/steroid drops, wear the protective shield at night, and <b>report sudden pain, vision loss, or increased redness immediately</b> (signs of infection or hemorrhage).</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🌀 Ménière's Disease</h3>
  <p><b>Cause:</b> <b>excess endolymphatic fluid</b> builds up within the inner ear's membranous labyrinth (endolymphatic hydrops), distorting both the balance (vestibular) and hearing (cochlear) structures. Exact cause often unclear; linked to fluid/sodium retention.</p>
  <p><b>Manifests as a classic triad</b> occurring in unpredictable episodic attacks: <b>episodic vertigo</b> (severe spinning, can last 20 min-several hours — the most disabling symptom), <b>tinnitus</b> (ringing/roaring), and <b>fluctuating sensorineural hearing loss</b> (often low-frequency, may partially recover between attacks then worsen permanently over years); plus a sensation of aural fullness/pressure. Attacks can be triggered by high sodium intake, caffeine, alcohol, or stress.</p>
  <p><b>Treatment:</b> <b>low-sodium diet (major cornerstone) + diuretics</b> to reduce endolymph volume/pressure; antiemetics and antihistamines/anticholinergics (e.g., meclizine) for acute attack symptoms. During an attack — priority is <b>FALL SAFETY</b>: have the patient lie still in a quiet, dark room and avoid sudden head movement. Severe/refractory cases may need intratympanic injections or surgical intervention (labyrinthectomy = last resort, sacrifices hearing in that ear).</p>
</div>
<div class="card" style="border-color:var(--amber)">
  <h3>⚠️ Metabolic Syndrome</h3>
  <p><b>Cause:</b> chronic insulin resistance and hyperinsulinemia driven by visceral (central) obesity and sedentary lifestyle — a <b>cluster of risk factors, NOT a disease or diabetes complication itself</b>. Diagnosed when a patient has <b>3 or more</b> of the specific criteria below.</p>
  <p><b>Manifests (diagnostic criteria — need ≥3):</b> <b>central/abdominal obesity (waist circumference >40 in men, >35 in women)</b>; <b>blood pressure ≥130/85 mmHg</b>; <b>fasting triglycerides ≥150 mg/dL</b>; <b>HDL <40 mg/dL (men) or <50 mg/dL (women)</b>; <b>fasting glucose ≥100 mg/dL</b>. The combination dramatically raises risk for both Type 2 diabetes AND cardiovascular disease/stroke — more than any single factor alone.</p>
  <p><b>Treatment:</b> <b>lifestyle modification is first-line and can fully reverse it</b> — weight loss (even 5-10% of body weight helps significantly), regular exercise, reduced saturated fat/sodium/refined sugar intake. Pharmacologic treatment of individual components (antihypertensives, statins, metformin for prediabetes) if lifestyle changes alone aren't sufficient.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🧬 LADA & Gestational Diabetes</h3>
  <p><b>Cause — LADA ("Type 1.5"):</b> <b>autoimmune beta-cell destruction</b> identical in mechanism to Type 1, but progressing much more slowly, so it presents in adulthood and initially spares enough insulin production to respond to oral agents. <b>Cause — Gestational:</b> <b>placental hormones</b> (human placental lactogen, cortisol, progesterone) cause insulin resistance that the mother's pancreas can't fully overcome, usually appearing in the 2nd-3rd trimester.</p>
  <p><b>Manifests — LADA:</b> initially resembles Type 2 (adult onset, responds to metformin) but <b>confirmed by positive islet cell/GAD antibodies</b>; typically progresses to insulin dependence within a few years — faster than typical Type 2. <b>Manifests — Gestational:</b> usually asymptomatic, caught on routine <b>24-28 week glucose screening</b> (1-hr glucose tolerance test); risk factors include obesity, prior gestational diabetes, and a larger-than-average fetus (macrosomia) on ultrasound.</p>
  <p><b>Treatment — LADA:</b> <b>insulin is typically started earlier</b> than in classic Type 2, since oral agents lose effectiveness faster as beta-cell function keeps declining. <b>Treatment — Gestational:</b> diet/exercise first-line; <b>insulin if glucose targets aren't met</b> (oral agents like metformin/glyburide used more selectively — insulin is preferred in pregnancy); usually resolves after delivery but the mother needs <b>postpartum glucose testing</b> and carries a significantly elevated lifetime risk of developing Type 2 diabetes.</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>🦶 Diabetic Foot Ulcer</h3>
  <p><b>Cause:</b> a <b>three-hit combination</b> unique to diabetes — (1) <b>peripheral neuropathy</b> removes protective sensation so injury goes unfelt, (2) <b>peripheral vascular disease</b>/microvascular damage impairs blood flow so wounds can't heal normally, (3) <b>chronic hyperglycemia</b> impairs white blood cell function and feeds bacterial growth. A minor unnoticed injury (blister, cut, ingrown nail) becomes a chronic non-healing wound.</p>
  <p><b>Manifests:</b> typically <b>painless</b> (due to neuropathy) despite significant tissue damage — often first noticed as drainage, odor, or a family member spotting it. Poor granulation tissue, slow/absent healing, surrounding redness/warmth/swelling if infected, possible exposed deeper tissue in advanced cases. Often located over pressure points (plantar surface, under the great toe, heel).</p>
  <p><b>Treatment:</b> <b>daily self-inspection (mirror for soles)</b> to catch injuries before they progress; <b>strict glucose control</b> (the root cause enabler); offloading pressure from the wound (special footwear, total contact casting); wound debridement and moisture-balanced dressings; treat any infection promptly (may require IV antibiotics or surgical debridement); vascular referral if circulation is severely impaired. <b>Untreated, progresses to osteomyelitis and risks amputation</b>.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>🎯 Macular Degeneration</h3>
  <p><b>Cause:</b> degeneration specifically of the <b>macula</b> — the small central portion of the retina responsible for sharp, detailed vision (reading, faces, fine detail). <b>Dry form (~90%):</b> gradual thinning/atrophy of macular tissue with drusen (yellow deposits) accumulation. <b>Wet form (~10%, more severe/rapid):</b> abnormal, fragile blood vessels grow under the retina and leak fluid/blood.</p>
  <p><b>Manifests:</b> <b>painless loss of CENTRAL vision specifically</b> — straight lines appear wavy or distorted (a hallmark early sign, tested with an Amsler grid), a blurry or blank spot develops in the center of the visual field, faces become hard to recognize. <b>Peripheral vision is preserved</b> — the EXACT OPPOSITE pattern from glaucoma, which is a frequent exam contrast point.</p>
  <p><b>Treatment:</b> dry form — no cure; AREDS2 vitamin formulations (vitamin C/E, zinc, copper, lutein/zeaxanthin) may slow progression; low-vision aids and adaptive devices. Wet form — <b>anti-VEGF intravitreal injections</b> (e.g., bevacizumab, ranibizumab) can slow or partially reverse vision loss by stopping the abnormal vessel growth; needs ongoing periodic injections. <b>Amsler grid used at home for self-monitoring</b> between visits.</p>
</div>
<div class="card" style="border-color:var(--red)">
  <h3>💥 Retinal Detachment</h3>
  <p><b>Cause:</b> the retina (light-sensing layer) <b>tears and separates from the underlying choroid</b>, which supplies its blood and oxygen. Risk factors: severe myopia, previous eye surgery/trauma, aging (vitreous shrinkage pulls on the retina).</p>
  <p><b>Manifests:</b> <b>sudden onset of flashes of light (photopsia) and a shower of new floaters</b> as the vitreous tugs on the retina during the tear, followed by a <b>dark curtain or shadow progressively covering part of the visual field</b> as more retina detaches. Painless. This progression (<b>flashes → floaters → curtain</b>) is the classic symptom sequence tested on exams.</p>
  <p><b>Treatment:</b> true ophthalmic <b>surgical EMERGENCY</b> — options include pneumatic retinopexy, scleral buckle, or vitrectomy to reattach the retina, ideally within hours to a few days. Because detached retinal tissue without blood supply will die and vision loss becomes <b>PERMANENT</b>, patient teaching emphasizes <b>seeking care IMMEDIATELY</b> for these symptoms rather than waiting for a routine appointment.</p>
</div>
<div class="card" style="border-color:var(--teal)">
  <h3>👂 Conductive vs. Sensorineural Hearing Loss</h3>
  <p><b>Cause — Conductive:</b> a <b>mechanical blockage</b> prevents sound from traveling through the outer or middle ear to reach the inner ear — cerumen impaction, otitis media with effusion, perforated tympanic membrane, otosclerosis. <b>Cause — Sensorineural:</b> <b>damage to the cochlea's hair cells or the auditory (CN VIII) nerve</b> itself — presbycusis (age-related, high frequencies first), prolonged noise exposure, ototoxic medications (aminoglycosides, loop diuretics like furosemide, high-dose aspirin/salicylates, some chemotherapy agents), or acoustic neuroma.</p>
  <p><b>Manifests:</b> conductive loss often affects all frequencies more uniformly and may include a sensation of ear fullness/blockage; <b>typically reversible once the obstruction is treated</b>. Sensorineural loss classically affects <b>HIGH frequencies first</b> (difficulty with consonants/speech clarity in noisy environments), often accompanied by tinnitus, and <b>does NOT reverse once the hair cells/nerve are damaged</b>.</p>
  <p><b>Treatment — Conductive:</b> treat the underlying cause — cerumen removal/irrigation, antibiotics or myringotomy tubes for otitis media, surgical repair for otosclerosis/perforation. <b>Treatment — Sensorineural:</b> hearing aids (amplify sound to the damaged system) or cochlear implants for severe loss (bypass the damaged cochlea entirely) — <b>neither restores normal hearing</b>, they compensate for it. Nursing priority: <b>discontinue/report any ototoxic drug immediately</b> if new tinnitus or hearing changes are noticed, since that damage is preventable if caught early but permanent if not.</p>
</div>

  {q:'A 38-year-old is newly diagnosed with diabetes. Labs show positive islet cell antibodies, but the patient initially responded to metformin alone and does not yet require insulin. Which explanation BEST fits this presentation?',type:'single',
   opts:['A. This is classic Type 1 diabetes — antibody-positive results always mean rapid insulin dependence','B. This is most consistent with LADA — autoimmune beta-cell destruction with a slower course than Type 1, often mistaken for Type 2 at first','C. This is Type 2 diabetes, and the antibody result should be repeated as a likely lab error','D. This is gestational diabetes, since the antibody response is triggered by hormonal changes'],correct:1,
