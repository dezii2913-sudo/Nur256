   opts:['A. Patient A is in HHS because the glucose is lower than Patient B\'s','B. Patient B is in DKA because the glucose is higher than Patient A\'s','C. Patient A is in DKA (acidotic, low bicarbonate, Kussmaul breathing); Patient B is in HHS (near-normal pH, no significant acidosis despite the higher glucose)','D. Both patients have the same acute complication since both are hyperglycemic and hypotensive'],correct:2,
   rat:'The trap: glucose number alone does NOT determine DKA vs HHS — Patient B\'s glucose is actually higher. The deciding factor is the ACID picture: Patient A\'s low pH/bicarbonate/Kussmaul = DKA; Patient B\'s normal pH/bicarbonate despite extreme hyperglycemia = HHS. Never diagnose by glucose number alone.'},

  {q:'All of the following are appropriate actions for a hypoglycemic patient who is unconscious with no IV access EXCEPT:',type:'single',
   opts:['A. Positioning the patient to protect the airway','B. Administering glucagon IM or subcutaneously','C. Placing glucose gel inside the cheek so it can absorb through the mucosa','D. Notifying the provider and rechecking glucose after treatment'],correct:2,
   rat:'EXCEPT = the wrong action. Placing anything in the mouth of a patient who cannot safely swallow risks aspiration, regardless of where it\'s placed — an unconscious patient cannot reliably protect their airway. Glucagon is the correct route without IV access.'},

  {q:'A nurse is assessing four hospitalized diabetic patients during morning rounds. Which requires the nurse\'s attention FIRST?',type:'single',
   opts:['A. Blood glucose 210 mg/dL two hours after breakfast, patient asymptomatic','B. Blood glucose 58 mg/dL, patient diaphoretic and trembling, last insulin dose 45 minutes ago','C. Blood glucose 178 mg/dL, patient reports mild thirst','D. An A1C result of 7.8% reviewed during morning labs'],correct:1,
   rat:'The trap: several options look like they need attention, but only one is an acute, evolving emergency. A glucose of 58 with adrenergic symptoms and a recent insulin dose is actively dropping — this patient needs treatment now, not just documentation.'},

  {q:'A patient with new-onset peripheral neuropathy from diabetes has intact skin, no current wounds, but reports "my feet feel like they\'re wearing socks all the time." Which nursing diagnosis is the PRIORITY?',type:'single',
   opts:['A. Deficient knowledge related to the new diagnosis','B. Risk for injury related to decreased sensory perception in the lower extremities','C. Ineffective coping related to chronic illness','D. Disturbed body image related to altered sensation'],correct:1,
   rat:'The trap: "newly diagnosed" pulls toward a knowledge-deficit answer, but the physiological safety risk (unfelt injury → unnoticed ulcer → amputation) outranks a knowledge or psychosocial diagnosis on a Maslow-based priority question — even before any wound exists.'},

  {q:'Which of the following is NOT an appropriate discharge goal for a patient recovering from a first DKA episode caused by missed insulin doses during a stomach virus?',type:'single',
   opts:['A. Patient will verbalize the sick-day rule of never stopping insulin during illness','B. Patient will identify signs of hyperglycemia and ketosis that require provider notification','C. Patient will demonstrate correct glucose and ketone testing technique','D. Patient will stop checking blood glucose once the current illness resolves'],correct:3,
   rat:'NOT = the unsafe/incorrect goal. Glucose monitoring is a permanent part of diabetes management, not something tied to a single illness episode. The other three goals directly target the root cause of this admission and are realistic, measurable, and safe.'},

  {q:'A patient in DKA has orders for IV 0.9% NS, an IV regular insulin drip, and potassium replacement once levels are known. Initial labs show serum potassium of 5.6 mEq/L. What is the correct sequence of nursing actions?',type:'single',
   opts:['A. Start potassium replacement immediately since the level is already elevated, then start fluids and insulin','B. Start the insulin drip first, since lowering the dangerously high glucose is always the top priority','C. Start IV fluids first to correct the profound dehydration and circulatory volume, then start insulin, monitoring potassium closely as it will likely fall once insulin begins working','D. Hold all treatment until the potassium level normalizes on its own'],correct:2,
   rat:'The trap: an elevated initial potassium (5.6) looks like it needs immediate replacement, but in DKA that number is misleading — acidosis has pushed K⁺ out of cells while total body K⁺ is actually depleted. Fluids come first (profound dehydration), then insulin, while WATCHING potassium fall rather than replacing it prematurely.'},

  {q:'A nurse provided sick-day teaching to a Type 1 diabetic before discharge. Which statement by the patient indicates the teaching was UNSUCCESSFUL?',type:'single',
   opts:['A. "I\'ll check my blood sugar and ketones more often when I\'m sick."','B. "I\'ll keep taking my insulin even if I can\'t eat much."','C. "I\'ll skip my insulin dose if I\'m vomiting and not eating."','D. "I\'ll call my provider if I can\'t keep fluids down."'],correct:2,
   rat:'UNSUCCESSFUL = the statement that reveals a misunderstanding. Statement C describes exactly the behavior that causes DKA — illness raises glucose independent of food intake, so insulin should never be stopped. The other three statements reflect correct sick-day teaching.'},

  {q:'A patient with Type 2 diabetes for 15 years is admitted with glucose 780 mg/dL, serum osmolality 340 mOsm/kg, pH 7.38, negative urine ketones, and profound lethargy. Family reports the patient has been unable to keep fluids down for three days due to a GI illness. What is the PRIORITY nursing intervention?',type:'single',
   opts:['A. Administer sodium bicarbonate to correct the underlying acidosis','B. Begin aggressive IV fluid replacement to correct the profound dehydration driving the hyperosmolar state','C. Withhold all fluids until an insulin drip has brought the glucose down to a safe range','D. Administer an oral rehydration solution since the patient can likely tolerate small sips'],correct:1,
   rat:'The vignette describes HHS: extreme hyperglycemia, high osmolality, normal pH, NO ketones. There is no acidosis to correct with bicarbonate (trap A), the patient explicitly cannot tolerate PO intake (trap D), and withholding fluids (trap C) ignores that dehydration — not glucose alone — is driving the crisis. Aggressive IV rehydration is the priority.'},

  {q:'A nurse is caring for a patient with both diabetic retinopathy and peripheral neuropathy. Which nursing actions are appropriate? (Select all that apply)',type:'multi',
   opts:['A. Encourage the patient to inspect their feet daily, using a mirror to check the soles','B. Recommend a heating pad on the feet at bedtime to improve circulation and comfort','C. Reinforce the importance of annual dilated eye exams','D. Explain that vision changes from retinopathy are usually painless and may go unnoticed until advanced','E. Instruct the patient to walk barefoot indoors so the feet can "breathe" between checks'],correct:[0,2,3],
   rat:'The traps (B and E) sound like reasonable comfort/self-care advice but are both contraindicated: a heating pad risks an unfelt burn from neuropathy, and walking barefoot risks an unfelt injury. Daily foot inspection, annual eye exams, and knowing retinopathy is painless are all correct teaching points.'},

  {q:'A patient asks the nurse to explain why their vision loss from macular degeneration is different from a family member\'s vision loss from glaucoma. Which explanation is correct?',type:'single',
   opts:['A. Both diseases cause identical vision loss patterns because they both involve the retina','B. Macular degeneration destroys central vision first because the macula is the retina\'s central detail-vision structure, while glaucoma destroys peripheral vision first from optic nerve compression at the edges','C. Macular degeneration is caused by high eye pressure, the same mechanism as glaucoma, just affecting a different area','D. Glaucoma causes painless central vision loss, while macular degeneration causes sudden painful peripheral loss'],correct:1,
   rat:'The trap pairing: both are chronic, painless, and progressive, which tempts a "they\'re basically the same" answer (A) or swapped mechanisms (C, D). The actual distinguishing mechanism is WHERE the damage starts — center-out for macular degeneration (macula = central retina) versus edges-in for glaucoma (optic nerve compression).'},

  {q:'A client with Type 2 diabetes for 10 years presents with a resting heart rate of 110 bpm that does not vary with position change or the Valsalva maneuver, along with early satiety and bloating after meals. What underlying process explains BOTH findings together?',type:'single',
   opts:['A. Coincidental, unrelated cardiac and GI conditions requiring separate unrelated workups','B. Diabetic autonomic neuropathy, which can affect both cardiac rate variability (a persistently fixed heart rate) and GI motility (gastroparesis, causing early satiety/bloating)','C. Acute DKA, since tachycardia and GI symptoms are both classic DKA findings','D. A normal, expected finding with no diabetes-related significance'],correct:1,
   rat:'The trap: A treats two related findings as coincidental separate problems, C misapplies an acute-crisis label to a chronic presentation, and D dismisses genuinely significant findings. Autonomic neuropathy is a single underlying process that can affect MULTIPLE organ systems — a fixed heart rate that doesn\'t respond normally to position/vagal maneuvers, and gastroparesis causing early satiety/bloating, are both downstream effects of the same autonomic nerve damage.'},

  {q:'A client with diabetic peripheral neuropathy and a history of a prior healed foot ulcer asks why their provider recommends custom orthotic shoe inserts even though they currently have no open wounds. What is the BEST explanation?',type:'single',
   opts:['A. Orthotics are purely a comfort measure with no relationship to future wound risk','B. Redistributing pressure away from prior ulcer sites and bony prominences reduces the risk of a new, unfelt injury recurring in a high-risk area','C. Orthotics are only necessary if a new wound has already developed','D. This recommendation is unrelated to the client\'s diabetes and is a general foot-comfort suggestion'],correct:1,
   rat:'The trap: A, C, and D all dismiss the preventive, mechanism-based reasoning behind the recommendation. Since neuropathy means an early injury may go completely unfelt, and a previously ulcerated site is at especially high risk for recurrence, redistributing pressure proactively — BEFORE any new wound develops — is the actual goal, not comfort or a reaction to an existing problem.'}
],'Decode It — Cause, Manifests, Treatment & Clinical Reasoning');
</script>
<script>
document.getElementById('sec-studymode').innerHTML=`
<h2 class="sec-title"><span class="sec-emoji">🧩</span> Study Mode: Breaking Down a Question</h2>
<p class="intro-line">Before you can pick the right answer, you have to know what's actually being asked. Most wrong answers on his exams come from answering the WRONG question, not from not knowing the content. This is the 5-step process to slow down and read correctly.</p>

<div class="card" style="border-color:var(--purple)">
  <h3>🪜 The 5 steps, every time</h3>
  <ol style="padding-left:20px;line-height:1.9">
    <li><b>Read the STEM alone first</b> — cover the answer choices with your hand/finger. What TYPE of question is this: assessment, priority, teaching, intervention, or evaluation? Answer it in your own words before you ever look at A/B/C/D.</li>
    <li><b>Circle the keyword.</b> FIRST, BEST, PRIORITY, MOST, INITIAL, EXCEPT, NOT, ONLY. These words change what "correct" even means — a "first" question and a "best long-term" question can have different right answers from the exact same scenario.</li>
    <li><b>Identify the framework the question is testing.</b> Is this an ABC (airway/breathing/circulation) question? A Maslow's hierarchy question (physiologic safety beats psychosocial)? A nursing-process question (assessment before intervention, intervention before evaluation)? Naming the framework tells you HOW to rank the options.</li>
    <li><b>Eliminate anything absolute or unsafe FIRST.</b> Options with "always," "never," "only if," or that skip a safety step are usually wrong before you even compare them to the "good" options.</li>
    <li><b>Compare what's left against your OWN answer from step 1</b> — not against each other. Pick the option that matches what you already decided the question was asking, not the option that just "sounds most detailed."</li>
  </ol>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🔍 Worked example #1 — a straightforward-looking question that isn't</h3>
  <p><b>Stem:</b> "A nurse is caring for a patient with DKA who has an order for an insulin drip, IV fluids, and potassium replacement once levels are known. The initial potassium is 5.5 mEq/L. What should the nurse do FIRST?"</p>
  <p><b>Step 1 — what type of question is this?</b> This is a PRIORITY/sequencing question — it's asking what happens first among several correct-sounding orders, not "which of these is ever appropriate."</p>
  <p><b>Step 2 — keyword:</b> "FIRST." That means more than one option might eventually be correct — the question is about the correct ORDER, not about eliminating three "wrong" treatments.</p>
  <p><b>Step 3 — framework:</b> this is a sequencing/prioritization question built on the DKA mechanism — fluids before insulin, because the patient is profoundly dehydrated first.</p>
  <p><b>Step 4 — eliminate the absolute/unsafe option:</b> giving potassium replacement immediately, just because 5.5 "looks high," ignores that acidosis is artificially inflating that number — an unsafe assumption to act on first.</p>
  <p><b>Step 5 — match to your own answer:</b> you already know from the mechanism that fluids come first in DKA. The option that says "begin IV fluids" matches that — not the option that sounds like it's "doing the most" by treating the potassium right away.</p>
  <div class="hy">⭐ Notice: knowing the DKA mechanism (fluids → insulin → potassium) made step 5 almost automatic. That's the whole point of the Why Engine — mechanism does the sorting for you.</div>
</div>

<div class="card" style="border-color:var(--teal)">
  <h3>🔍 Worked example #2 — a keyword that flips the entire answer</h3>
  <p><b>Stem:</b> "Which of the following is NOT an appropriate discharge goal for a patient recovering from a first DKA episode caused by missed insulin doses during a stomach virus?"</p>
  <p><b>Step 1 — what type of question is this?</b> This is a PLANNING/goal-setting question from the nursing process — but phrased backwards from how these questions usually read.</p>
  <p><b>Step 2 — keyword:</b> "NOT." This is the single most important word in the whole stem. Skip it, and you'll instinctively pick the BEST goal instead of the ONE THAT DOESN'T BELONG — which is the exact opposite of what's being asked.</p>
  <p><b>Step 3 — framework:</b> realistic vs. unsafe discharge goals — a good goal should target the actual root cause of this admission (the missed insulin doses).</p>
  <p><b>Step 4 — eliminate the absolute/unsafe option:</b> a goal like "stop checking blood glucose once the illness resolves" is the unsafe one — glucose monitoring is permanent, not tied to one illness episode.</p>
  <p><b>Step 5 — match to your own answer:</b> because the keyword is NOT, the "wrong-sounding" goal is actually the CORRECT answer to select. This is where most points get lost — not from lack of knowledge, but from answering as if the keyword wasn't there.</p>
  <div class="hy">⭐ Whenever you see NOT or EXCEPT, physically say "which one is the ODD ONE OUT" in your head before reading the options — it resets your brain to look for the wrong-fitting choice instead of the best-sounding one.</div>
</div>

<div class="card" style="border-color:var(--amber)">
  <h3>⚠️ The most common ways students misread a question</h3>
  <ul class="clean">
    <li><b>Missing the keyword</b> (NOT/EXCEPT/FIRST) and answering the opposite question.</li>
    <li><b>Picking the longest, most detailed-sounding option</b> instead of the one that actually fits the stem — length is not a reliability signal.</li>
    <li><b>Answering with outside knowledge instead of the stem's own data</b> — if the stem gives you a pH of 7.34, use THAT number, don't assume "DKA" just because ketones were mentioned earlier in the unit.</li>
    <li><b>Confusing "what's abnormal" with "what's most urgent."</b> A stem can list three abnormal findings and one truly urgent one — the urgent one wins, not the "most abnormal-looking" one.</li>
    <li><b>Forgetting what TYPE of question it is.</b> An assessment question wants data-gathering; an intervention question wants action; mixing these up leads to picking "monitor" when the question wanted "act," or vice versa.</li>
  </ul>
</div>

<div id="quiz-studymode"></div>
`;

renderQuiz('quiz-studymode',[
  {q:'PRACTICE — "A nurse is caring for four patients. Which patient should the nurse assess FIRST?" What TYPE of question is this, and what does the keyword tell you?',type:'single',
   opts:['A. An evaluation question; the keyword tells you to check if a prior intervention worked','B. A priority question; the keyword tells you multiple patients may need attention, but one needs it before the others','C. A teaching question; the keyword tells you to focus on patient education needs','D. This keyword has no real effect on how the question should be answered'],correct:1,
   rat:'This is a classic priority/triage stem. "FIRST" doesn\'t mean the other three patients are fine — it means you\'re ranking urgency among several legitimate needs, which is exactly why skimming past this word leads people to just pick "the sickest-sounding" patient without actually comparing all four.'},

  {q:'PRACTICE — "All of the following are expected findings in DKA EXCEPT:" Before reading the options, what should you tell yourself about how to approach this question?',type:'single',
   opts:['A. Look for the BEST expected finding among the four options','B. Look for the one finding that does NOT belong with the others — the odd one out','C. Assume all four options are correct and pick the most severe one','D. This phrasing means the question has no single correct answer'],correct:1,
   rat:'The EXCEPT keyword flips the entire task: instead of finding the best/most correct option, you\'re hunting for the ONE that doesn\'t fit the pattern the other three share. Missing this word is one of the single most common ways students lose easy points on well-known content.'},

  {q:'PRACTICE — A question describes a patient with glucose 640, pH 7.34, and no ketones, then asks "which condition does this represent?" A classmate assumes DKA because the glucose is so high. What did they do wrong?',type:'single',
   opts:['A. Nothing — DKA is the correct pattern-match for very high glucose','B. They answered from a general assumption about glucose severity instead of using the SPECIFIC pH and ketone data actually given in the stem','C. They should have assumed HHS instead, since HHS always has lower glucose than DKA','D. The question is unanswerable without additional labs'],correct:1,
   rat:'This mirrors a very common mistake: reacting to the most dramatic-sounding number (640) instead of using the data that actually differentiates the two conditions. The stem GIVES you the deciding information — normal pH, no ketones — which points to HHS regardless of how high the glucose climbs.'}
],'Practice: Spot the Question Type');
</script>

<h2 class="sec-title"><span class="sec-emoji">🎯</span> Trick Questions</h2>
<p class="intro-line">Casteel loves NOT / EXCEPT / BEST / FIRST / ONLY. Circle the key word before you read the answers. With mechanism knowledge, the trap answer looks wrong.</p>

<div class="card" style="border-color:var(--red)">
  <h3>⚠️ The rule for all of these</h3>
  <ul class="clean">
    <li>Cover the answers, read the stem, <b>circle the key word</b>: NOT, EXCEPT, BEST, FIRST, ONLY, PRIORITY.</li>
    <li>For NOT/EXCEPT: label each option True/False, pick the odd one out.</li>
    <li>For BEST/FIRST: several are correct — run them through ABC → safety → mechanism.</li>
    <li>Answer in your head FIRST, then look — so the traps can't lead you.</li>
  </ul>
</div>

renderFilteredQuiz('quiz-tricks',[
  {topic:'general',q:'All of the following are expected findings in DKA EXCEPT:',type:'single',
   opts:['A. Kussmaul respirations from metabolic acidosis','B. Fruity/acetone breath odor from ketones','C. Positive serum and urine ketones','D. Blood pH within the normal range'],correct:3,
   rat:'EXCEPT = the odd one out. Kussmaul breathing, fruity breath, and positive ketones are all core DKA findings. A normal pH is the impostor — DKA is defined by metabolic ACIDosis, so pH must be LOW, not normal.'},

  {topic:'general',q:'Which of the following is NOT an appropriate nursing action for a reddened, intact area over a bony prominence?',type:'single',
   opts:['A. Reposition the patient to relieve pressure on the area','B. Massage the area firmly to stimulate local blood flow','C. Keep the surrounding skin clean and dry','D. Document and continue monitoring the area closely'],correct:1,
   rat:'NOT = the incorrect action. Repositioning, keeping skin clean/dry, and monitoring are all appropriate. Massaging is contraindicated — the tissue is already compromised by pressure, and massage can rupture fragile capillaries and worsen the damage.'},

  {topic:'general',q:'The ONLY insulin formulation approved for intravenous administration is:',type:'single',
   opts:['A. NPH (intermediate-acting)','B. Glargine (long-acting)','C. Regular (short-acting)','D. Lispro (rapid-acting)'],correct:2,
   rat:'This is a true absolute — don\'t second-guess it just because the stem says "only." Regular insulin is the sole formulation given IV (used in DKA drips); NPH, glargine, and lispro are never administered intravenously.'},

  {topic:'general',q:'A patient with Type 2 diabetes taking metformin is scheduled for a contrast CT scan tomorrow. Which nursing action is BEST?',type:'single',
   opts:['A. Administer an extra metformin dose tonight to preemptively protect the kidneys','B. Hold the metformin before and after the contrast per facility protocol','C. Replace the metformin with an equivalent insulin dose for the day of the scan','D. Cancel the scan until the patient is no longer taking metformin'],correct:1,
   rat:'BEST = the safest, evidence-based action. Metformin plus contrast dye raises lactic acidosis/kidney injury risk, so it\'s held around the procedure. Giving an extra dose (A) is dangerous, an insulin swap (C) is unnecessary, and cancelling the scan (D) is an overreaction.'},

  {topic:'eye',q:'A nurse is assigned four patients at the start of the shift. Which patient should the nurse assess FIRST?',type:'single',
   opts:['A. A Type 2 diabetic with a fingerstick glucose of 180 mg/dL and no symptoms','B. A Type 1 diabetic who is confused, diaphoretic, and visibly shaking','C. A patient with a healing Stage 2 pressure injury scheduled for a dressing change','D. A glaucoma patient due for a routine dose of eye drops'],correct:1,
   rat:'FIRST = the acute, rapidly evolving threat. Confusion + diaphoresis + shaking in a diabetic is the classic hypoglycemia pattern — a brain emergency in progress. A glucose of 180 is mildly elevated but stable, and the other two patients have routine, non-urgent care needs.'},

  {topic:'general',q:'All of the following increase a patient\'s risk for pressure injury EXCEPT:',type:'single',
   opts:['A. Immobility','B. Urinary or fecal incontinence','C. Being repositioned on a strict every-2-hour schedule','D. Serum albumin of 2.5 g/dL'],correct:2,
   rat:'EXCEPT = the one that doesn\'t belong. Immobility, incontinence (moisture), and low albumin (poor nutrition) all raise risk. Scheduled repositioning is the PROTECTIVE intervention that lowers risk — it\'s the impostor precisely because it sounds like it belongs on a "risk factor" list.'},

  {topic:'general',q:'A conscious patient reports feeling shaky with a fingerstick glucose of 55 mg/dL. Which is the BEST first action?',type:'single',
   opts:['A. Administer glucagon intramuscularly','B. Give 15 g of fast-acting carbohydrate and recheck glucose in 15 minutes','C. Provide a large meal containing protein and fat','D. Administer the patient\'s scheduled insulin dose as ordered'],correct:1,
   rat:'BEST/FIRST for a conscious, swallowing-capable hypoglycemic patient is the Rule of 15. Glucagon (A) is reserved for patients who cannot safely swallow; a large fatty meal (C) slows carbohydrate absorption; and giving insulin (D) would dangerously worsen the hypoglycemia.'},

  {topic:'eye',q:'A patient with glaucoma asks which type of vision loss occurs FIRST in their condition. Which is the ONLY correct answer?',type:'single',
   opts:['A. Central vision, affecting reading and face recognition first','B. Peripheral (side) vision, producing a gradual tunnel-vision effect','C. Color vision, causing colors to appear faded','D. Near vision, similar to normal age-related presbyopia'],correct:1,
   rat:'ONLY correct = peripheral vision loss, since glaucoma damages the optic nerve from the outer edge inward. Central vision loss (A) describes macular degeneration instead — a frequently tested trap pairing between these two conditions.'},

  {topic:'general',q:'Which statement about HHS is NOT true?',type:'single',
   opts:['A. It occurs almost exclusively in patients with Type 2 diabetes','B. It involves severe hyperglycemia and profound dehydration','C. It typically causes significant ketoacidosis with Kussmaul respirations','D. Blood glucose levels are often above 600 mg/dL'],correct:2,
   rat:'NOT true = the false statement to identify. HHS does NOT cause significant ketoacidosis or Kussmaul breathing — that combination belongs to DKA. HHS patients retain just enough insulin to prevent ketone production, which is the entire mechanism distinguishing the two conditions.'},

  {topic:'eye',q:'Which of the following findings is the ONLY true medical emergency requiring immediate same-day treatment?',type:'single',
   opts:['A. Gradual peripheral vision loss occurring over several months','B. Sudden severe eye pain with halos, nausea, and a firm, hard globe','C. Painless, slowly progressive blurry vision from cataracts','D. Mild eye dryness and occasional irritation'],correct:1,
   rat:'ONLY emergency = acute angle-closure glaucoma. The sudden severe pain, halos, nausea, and firm globe together signal a rapid IOP spike threatening permanent vision loss within hours — the other three findings are all chronic and non-urgent by comparison.'},

  {topic:'eye',q:'All of the following are TRUE about macular degeneration EXCEPT:',type:'single',
   opts:['A. It causes loss of central vision','B. Peripheral vision is generally preserved','C. It typically presents with sudden, severe eye pain','D. Straight lines may appear wavy or distorted'],correct:2,
   rat:'EXCEPT = the false statement. Macular degeneration is painless and gradual — sudden severe pain belongs to angle-closure glaucoma, not this condition. Central loss, spared periphery, and wavy-line distortion are all true hallmarks of macular degeneration.'},

  {topic:'eye',q:'A nurse is teaching a client the difference between conductive and sensorineural hearing loss, and separately reviewing why open-angle glaucoma is dangerous. Which statement reflects a correct understanding of BOTH topics?',type:'single',
   opts:['A. "Both conditions are painless and can progress without the person noticing right away."','B. "Both conditions cause sudden, severe pain as their first symptom."','C. "Both conditions are fully reversible with early treatment."','D. "Neither condition has any warning signs at all."'],correct:0,
   rat:'B is a much better fit for angle-closure glaucoma\'s presentation, not open-angle glaucoma or gradual hearing loss — both of which are notably painless. C overstates reversibility for both (glaucoma damage is permanent, sensorineural loss usually is too). D is simply false, since both have detectable patterns/signs even if subtle. The one true shared feature is that BOTH can progress quietly, painlessly, without the person noticing until real damage has occurred.'},

  {topic:'eye',q:'The ONLY definitive treatment for a cataract is:',type:'single',
   opts:['A. Prescription eyeglasses updated regularly','B. Surgical removal of the lens with an intraocular lens implant','C. Long-term use of lubricating eye drops','D. Anti-VEGF injections into the eye'],correct:1,
   rat:'This is a genuine absolute — don\'t talk yourself out of it just because the stem says "only." Glasses can help manage symptoms temporarily, drops don\'t address the cloudy lens itself, and anti-VEGF injections are for macular degeneration, not cataracts. Surgical removal/replacement is the only true fix.'},

  {topic:'eye',q:'Which of the following statements about pupil terminology is NOT correct?',type:'single',
   opts:['A. Miosis refers to pupil constriction','B. Mydriasis refers to pupil dilation','C. A consensual response means the SAME eye that received light reacts','D. A direct response means the SAME eye that received light reacts'],correct:2,
   rat:'NOT correct = the false statement. A consensual response is specifically about the OTHER eye reacting, not the same one — that description actually belongs to the direct response (D), which IS correctly stated. A and B are both accurate as written.'}
],'Spot-the-Trap Practice');
</script>

renderFilteredQuiz('quiz-challenge',[
  {topic:'general',q:'The nurse reviews morning labs for four clinic patients. Which result meets the diagnostic criteria for diabetes and requires provider follow-up today?',type:'single',
   opts:['A. A 48-year-old with a hemoglobin A1C of 6.1%','B. A 58-year-old with a fasting blood glucose of 111 mg/dL','C. A 62-year-old with a hemoglobin A1C of 8.4%','D. A 40-year-old with a random glucose of 150 mg/dL and no symptoms'],correct:2,
   rat:'The trap: B (111) and A (6.1%) both fall in the PREDIABETES range, not diagnostic — easy to overreact to. D is an isolated random glucose without symptoms, which doesn\'t meet criteria alone. An A1C of 8.4% is well above the ≥6.5% diagnostic threshold and reflects sustained hyperglycemia — this is the one that needs same-day follow-up.'},

  {topic:'general',q:'A client asks how their insulin pump works. Which explanation is correct?',type:'single',
   opts:['A. It releases programmed doses of NPH insulin into the bloodstream at set intervals throughout the day','B. It delivers a small continuous dose of rapid- or short-acting insulin subcutaneously, with the client able to self-administer a bolus before meals','C. It is surgically attached to the pancreas and delivers regular insulin directly into pancreatic tissue','D. It continuously infuses NPH insulin while automatically adjusting the rate based on continuous glucose readings'],correct:1,
   rat:'The trap: A and D both insert NPH into the answer — NPH is never used in insulin pumps because pumps require a rapid- or short-acting insulin for the basal/bolus model to work safely. C invents a surgical attachment that doesn\'t exist. Pumps deliver continuous subcutaneous basal insulin with patient-triggered mealtime boluses.'},

  {topic:'general',q:'A client with DKA has an initial glucose of 950 mg/dL. After several hours on an IV insulin drip with 0.9% NS, the glucose is now 240 mg/dL. What should the nurse prepare to administer next?',type:'single',
   opts:['A. An ampule of 50% dextrose to prevent further glucose drop','B. NPH insulin subcutaneously to transition off the drip','C. IV fluids containing dextrose so the insulin drip can safely continue','D. Phenytoin to prevent seizures from the rapid glucose change'],correct:2,
   rat:'The trap: A treats the glucose drop as an emergency requiring a large dextrose bolus, when the correct move is a controlled addition of dextrose-containing fluids so the drip can keep running. B introduces the wrong insulin type at the wrong time (NPH is never used to "transition off" an active DKA drip). D is an unrelated and unsupported intervention. Once glucose approaches ~200-250, dextrose is added to the IV fluids so the insulin can keep clearing ketones without causing hypoglycemia.'},

  {topic:'general',q:'An older adult with type 2 diabetes is admitted with pneumonia, glucose 620 mg/dL, and serum osmolality 330 mOsm/kg. Which nursing action is the PRIORITY?',type:'single',
   opts:['A. Continuous cardiac monitoring, since fluid and insulin therapy will shift potassium significantly','B. Administering sodium bicarbonate to correct the expected acidosis','C. Encouraging light exercise to help lower the blood glucose','D. Preparing for likely endotracheal intubation given the severity of the hyperglycemia'],correct:0,
   rat:'The trap: B assumes DKA-style acidosis is present, but this vignette is HHS — no acidosis to correct. C is actively dangerous in a profoundly dehydrated, hyperosmolar patient. D isn\'t indicated by anything in the vignette. Cardiac monitoring is the priority because HHS treatment (fluids + insulin) causes major potassium shifts, and this patient is older with likely cardiac vulnerability.'},

  {topic:'general',q:'The nurse is caring for four patients on a medical-surgical floor. Which patient should the nurse assess FIRST?',type:'single',
   opts:['A. A patient with a Braden Scale score of 18 who was just repositioned','B. A patient with type 2 diabetes and a glucose of 180 mg/dL after breakfast','C. A patient with a healing Stage 2 pressure injury due for a scheduled dressing change','D. A patient with a Braden Scale score of 9 who has not been repositioned in 3 hours'],correct:3,
   rat:'The trap: A Braden score of 18 sounds low-risk-adjacent but is actually the cutoff for "at risk" — not the most urgent finding here. B is a mildly elevated, expected postprandial glucose. C is routine, scheduled care. A Braden score of 9 indicates SEVERE risk, and combined with 3 hours without repositioning, this patient has the highest immediate risk for a new pressure injury — assess and reposition first.'},

  {topic:'general',q:'A patient is positioned in the right lateral recumbent position for an extended period. Which sites are at HIGHEST risk for pressure injury in this position? (Select all that apply)',type:'multi',
   opts:['A. Right hip (greater trochanter)','B. Right ear','C. Sacrum','D. Right shoulder','E. Right ankle/malleolus'],correct:[0,1,3,4],
   rat:'The trap: sacrum (C) is a SUPINE pressure point, not a side-lying one — a common mix-up. In right lateral recumbent, weight bears on the right-side structures: ear, shoulder, hip/greater trochanter, and ankle/malleolus (plus ribs and knee) — not the sacrum, which only bears weight when lying on the back.'},

  {topic:'eye',q:'A client is scheduled for cataract surgery in 5 days. Which instruction should the nurse reinforce for the pre-operative period?',type:'single',
   opts:['A. Continue all home medications, including aspirin, exactly as prescribed until the day of surgery','B. Avoid lifting or straining with objects heavier than approximately 10-15 pounds even before surgery','C. Plan for a 2-3 day inpatient hospital stay following the procedure','D. Begin using an eye patch continuously starting 3 days before surgery'],correct:1,
   rat:'The trap: A ignores that medications increasing bleeding risk (like aspirin) are typically addressed before eye surgery per provider instruction, C wildly overstates the length of stay (cataract surgery is same-day outpatient), and D describes a post-op measure, not a pre-op one. Avoiding heavy lifting/straining (which raises IOP) is reinforced both before and especially after surgery.'},

  {topic:'eye',q:'A client had retinal detachment surgery with gas tamponade placed to help flatten the retina. Which nursing action is the PRIORITY immediately post-op?',type:'single',
   opts:['A. Encourage ambulation to promote circulation','B. Position the client\'s head as specifically prescribed by the surgeon','C. Apply a warm compress to reduce swelling','D. Remove the eye shield to assess visual acuity hourly'],correct:1,
   rat:'The trap: A, C, and D all sound like generic post-surgical care but miss what\'s unique here — with a gas bubble in place, HEAD POSITIONING is what keeps the bubble pressed against the detached area to help it heal. Positioning per the surgeon\'s specific instructions (often face-down or a particular tilt) is the priority, and the shield stays on per protocol rather than being removed for frequent checks.'},

  {topic:'eye',q:'A client with early dry age-related macular degeneration asks what single lifestyle change would MOST slow disease progression. What is the BEST response?',type:'single',
   opts:['A. "Quitting smoking has been shown to significantly slow the progression of macular degeneration."','B. "Wearing dark sunglasses indoors will prevent further vision loss."','C. "Avoiding all screen time will protect your remaining central vision."','D. "Taking a daily multivitamin will reverse the damage already done."'],correct:0,
   rat:'The trap: B, C, and D all sound like reasonable protective habits but aren\'t supported — indoor sunglasses and screen avoidance don\'t meaningfully change progression, and no supplement reverses existing damage (AREDS2-type formulations may slow, not reverse, progression). Smoking cessation has the strongest evidence for slowing dry AMD progression specifically.'},

  {topic:'eye',q:'A client with chronic open-angle glaucoma, well-controlled on topical drops, reports subtle, gradual changes in their vision over the past month. What should the nurse recognize this finding as requiring?',type:'single',
   opts:['A. Reassurance, since gradual changes are expected and not clinically significant in treated glaucoma','B. Reassessment of intraocular pressure, since gradual vision changes can indicate the current regimen is no longer adequately controlling IOP','C. An urgent same-day emergency evaluation for angle-closure glaucoma','D. Discontinuation of the current eye drops due to treatment failure'],correct:1,
   rat:'The trap: A dismisses a finding that actually warrants follow-up, C escalates to the WRONG type of glaucoma emergency (angle-closure presents with sudden severe pain, not gradual change), and D jumps straight to stopping treatment without reassessment first. Gradual vision change in a previously stable glaucoma patient signals the IOP may no longer be adequately controlled and needs to be checked — not ignored, and not treated as the acute angle-closure emergency.'},

  {topic:'general',q:'Which task related to a diabetic client\'s foot care can the RN safely delegate to unlicensed assistive personnel (UAP)?',type:'single',
   opts:['A. Assessing a new client\'s feet for the first time and documenting baseline neuropathy findings','B. Teaching the client how to perform daily foot inspections at home','C. Reporting to the RN if the UAP notices redness, drainage, or a new wound while helping with morning hygiene care','D. Determining whether a callus should be trimmed by the client or referred to a podiatrist'],correct:2,
   rat:'The trap: A, B, and D all involve assessment, teaching, or clinical decision-making, which remain RN responsibilities and cannot be delegated. Reporting an observation the UAP happens to notice during routine hygiene care (not performing a clinical assessment) is within their scope — they observe and report, the RN assesses and decides.'},

  {topic:'general',q:'A nurse reviews four sets of vital signs and glucose values at the start of a shift. Which combination of findings requires the MOST immediate action?',type:'single',
   opts:['A. Glucose 68 mg/dL, patient asymptomatic, due for breakfast in 10 minutes','B. Glucose 250 mg/dL, patient asymptomatic, scheduled insulin due in 30 minutes','C. Glucose 48 mg/dL, patient diaphoretic and confused, last rapid-acting insulin given 40 minutes ago','D. Glucose 190 mg/dL, patient reports mild thirst'],correct:2,
   rat:'The trap: A looks low but is asymptomatic with food imminent — reasonable to monitor rather than treat aggressively. B and D are both mild-to-moderate hyperglycemia findings that can wait for scheduled care. C combines a genuinely low glucose WITH active neuroglycopenic symptoms (confusion) during the insulin\'s likely peak action window — this patient needs treatment now, not after rounds.'},

  {topic:'general',q:'A client recovering from DKA has a repeat potassium of 3.0 mEq/L six hours after starting the insulin drip, down from an initial 5.3 mEq/L. What does the nurse recognize about this trend?',type:'single',
   opts:['A. This is an unexpected and dangerous lab error that should be immediately repeated before any action is taken','B. This is the expected effect of insulin therapy driving potassium back into cells, and it requires close monitoring with likely potassium replacement','C. This indicates the insulin drip should be discontinued immediately due to overcorrection','D. This indicates the patient is developing a new, unrelated renal problem'],correct:1,
   rat:'The trap: A dismisses a real and anticipated trend as an error, C jumps to stopping a needed treatment, and D invents an unrelated diagnosis. Insulin therapy is EXPECTED to drive serum potassium down as it shifts back into cells — this drop from 5.3 to 3.0 is the anticipated trend that requires close monitoring and replacement, not alarm or treatment cessation.'},

  {topic:'general',q:'A 68-year-old with Type 2 diabetes (on glyburide and lisinopril), stage 3 CKD (eGFR 42), and a Braden score of 15 is admitted for a scheduled cardiac catheterization requiring IV contrast. Pre-procedure labs show potassium 5.2 mEq/L. Which combination of actions should the nurse anticipate or question?',type:'single',
   opts:['A. Continue all home medications unchanged and proceed with the procedure as scheduled','B. Question continuing the glyburide given the renal function, anticipate holding the lisinopril given the potassium level, and confirm a plan for post-procedure renal monitoring given the contrast exposure','C. Discontinue all diabetes and blood pressure medications permanently in preparation for the procedure','D. Proceed as scheduled, since none of these findings are related to each other'],correct:1,
   rat:'A treats every home medication as automatically safe to continue despite three separate red flags in this vignette. C overcorrects with a permanent discontinuation instead of a procedure-specific hold. D misses that all three findings — reduced renal clearance, an ACE/ARB-related hyperkalemia risk, and contrast exposure — connect through the same kidney-function thread. The correct synthesis questions glyburide (renal clearance risk), anticipates holding lisinopril (potassium already elevated), and flags the contrast\'s added renal burden — three related concerns from one underlying issue, not three coincidences.'},

  {topic:'general',q:'A client with Type 1 diabetes and a Braden score of 16 is recovering from a DKA admission. On day 2, the nurse notes the client has been NPO since midnight for a procedure, the sliding-scale insulin order is still active, and the client\'s heel appears intact but slightly duskier than surrounding skin under a pressure-relief boot. Which of the following reflects the BEST synthesis of priorities for this shift?',type:'single',
   opts:['A. Hold all insulin since the client is NPO, and address the heel finding at the end of the shift once the procedure is complete','B. Clarify the insulin order given the NPO status (basal needs still exist even without meals), and reassess the heel finding now given the client\'s combined diabetes/pressure-injury risk factors','C. Administer the full scheduled insulin dose as if the client were eating normally, and remove the pressure-relief boot until after the procedure','D. Defer both issues until the primary provider is available, since neither is an emergency'],correct:1,
   rat:'A treats "NPO" as synonymous with "no insulin needed," which ignores that basal insulin needs continue independent of eating — a common and dangerous assumption. C makes the opposite error by ignoring the NPO status entirely, and also removes a protective device without justification. D defers two findings that both warrant action within the shift, not at end-of-shift or by a provider not yet available. The correct synthesis: clarify/adjust the insulin plan for NPO status without stopping it outright, AND address the early skin finding promptly given this client\'s combined risk factors (diabetes impairs perfusion/healing, Braden 16 is at-risk) — two related, same-shift priorities, not one deferred to later and one handled incorrectly.'},

  {topic:'eye',q:'A client with diabetes, hypertension, and a recent diagnosis of early diabetic retinopathy is being evaluated for a new medication regimen. The provider is considering a beta-blocker for blood pressure control. Which additional client history detail would be MOST important for the nurse to clarify before this medication is started?',type:'single',
   opts:['A. Whether the client has a personal or family history of cataracts, since beta-blockers are a recognized cataract risk factor and this adds relevant information to the client\'s overall eye-health picture','B. Whether the client prefers tablets or liquid formulations','C. Whether the client has ever had a seasonal allergy','D. Whether the client\'s last eye exam was more than 5 years ago, since retinopathy findings expire after that time'],correct:0,
   rat:'B and C are both reasonable-sounding routine intake questions but have no particular relevance to this specific clinical decision. D invents a rule about retinopathy findings "expiring" that isn\'t how monitoring for a progressive condition works. Since beta-blocker use is a recognized cataract risk factor, and this client already has documented early retinopathy (indicating active diabetic eye disease), clarifying cataract history adds relevant context to the overall risk-benefit picture for this specific medication choice — connecting a systemic medication decision back to this client\'s existing eye findings is the actual clinical reasoning skill being tested.'},

  {topic:'eye',q:'Match each finding to the condition it belongs to. A client reports: (1) a blank spot in the center of their vision with wavy lines when reading, (2) sudden flashes with a shadow creeping across one side of vision, (3) gradual loss of side vision with normal reading vision, (4) painless glare and haziness that\'s worse driving at night. Which condition pairs correctly with finding (2)?',type:'single',
   opts:['A. Macular degeneration','B. Retinal detachment','C. Open-angle glaucoma','D. Cataracts'],correct:1,
   rat:'Finding (1) is macular degeneration, (3) is glaucoma, and (4) is cataracts — all real matches embedded in the same vignette, which is exactly the multi-item matching format to expect. Finding (2), the sudden flashes with a shadow/curtain crossing the vision, is the classic retinal detachment sequence.'},

  {topic:'eye',q:'Which of the following are TRUE statements about intraocular pressure and glaucoma? (Select all that apply)',type:'multi',
   opts:['A. Normal IOP is roughly 10-21 mmHg','B. Open-angle glaucoma typically presents with a sudden, severely painful eye','C. Angle-closure glaucoma can cause the globe to feel firm or hard on palpation','D. Vision already lost from glaucoma can be restored with consistent drop use','E. Glaucoma medications are generally a lifelong treatment, not a cure'],correct:[0,2,4],
   rat:'B describes angle-closure\'s presentation, not open-angle (which is gradual and painless) — a reversed-pairing trap. D is a dangerous misconception: glaucoma damage is permanent, drops only prevent further loss. A, C, and E are all accurate.'},

  {topic:'eye',q:'A client is 2 hours post-op from cataract surgery and reports mild itching around the eye shield and a scratchy sensation, rated 1/10. Vital signs are stable. What is the nurse\'s BEST action?',type:'single',
   opts:['A. Remove the shield to inspect the eye and relieve the itching','B. Reassure the client that mild itching/scratchiness is expected post-op and reinforce not to rub the eye','C. Notify the surgeon immediately for a possible complication','D. Apply ice directly to the surgical eye'],correct:1,
   rat:'A removes a protective device over a mild, expected finding — the shield stays on per protocol regardless of minor discomfort. C escalates a benign, expected sensation to an urgent report, which could cause "alarm fatigue" if overused for non-concerning findings. Mild itching/scratchiness after eye surgery is expected; the teaching point is reassurance plus reinforcing not to rub, not to remove protective equipment or escalate unnecessarily.'},

  {topic:'eye',q:'Place the following in the correct order a nurse should suspect and respond to sudden flashes of light with new floaters in one eye, progressing over an hour to a shadow across part of the visual field: (1) recognize this as a possible retinal detachment, (2) notify the ophthalmology provider urgently, (3) obtain a focused history of onset and progression, (4) prepare the client for likely urgent surgical evaluation. Which comes FIRST?',type:'single',
   opts:['A. Notify the ophthalmology provider urgently','B. Obtain a focused history of onset and progression','C. Prepare the client for likely urgent surgical evaluation','D. Recognize this as a possible retinal detachment'],correct:3,
   rat:'This is a sequencing/ordered-response style item — several of these steps DO need to happen quickly, which is what makes picking the very first one tricky. Before you can gather focused history, notify the provider, or prepare for surgery, you first have to RECOGNIZE the pattern (flashes → floaters → curtain) as a possible retinal detachment — recognition drives everything that follows.'}
],'Med-Surg 1 Level Challenge');
</script>

<script>
/* ===== WRONG ANSWER VAULT SECTION ===== */
function renderVaultSection(){
  const host=document.getElementById('sec-vault');
  if(!host)return;
  if(wrongVault.length===0){
    host.innerHTML=`
    <h2 class="sec-title"><span class="sec-emoji">🗄️</span> Wrong Answer Vault</h2>
    <p class="intro-line">Every question you miss anywhere in this guide — Why Engine, Decoder, Diabetes, DKA/HHS, all of it — automatically lands here so you can drill your actual weak spots instead of re-reviewing everything.</p>
    <div class="card"><div class="vault-empty">🎉<br><b>Your vault is empty!</b><br>Either you haven't missed anything yet, or you've already cleared it out. Go answer some questions — anything you get wrong will show up here automatically.</div></div>`;
    return;
  }
  let html=`
    <h2 class="sec-title"><span class="sec-emoji">🗄️</span> Wrong Answer Vault</h2>
    <p class="intro-line">These are the exact questions you've missed, pulled from every section. Re-answer them here — get one right and it clears itself out of the vault.</p>
    <div class="card" style="border-color:var(--red)">
      <h3>📋 ${wrongVault.length} question${wrongVault.length===1?'':'s'} to review</h3>
      <button class="btn" style="background:var(--red)" onclick="if(confirm('Clear the entire vault? This cannot be undone.')){wrongVault=[];saveVault();document.getElementById('vaultCount').textContent='0';renderVaultSection();}">🗑️ Clear entire vault</button>
    </div>
  `;
  wrongVault.forEach(entry=>{
    html+=`<div class="card" id="vaultcard-${entry.id.replace(/[^a-zA-Z0-9-]/g,'')}">
      <span class="vault-tag">${entry.source||'Review'}</span>
      <div class="q-text">${entry.q}</div>
      <div class="opts" id="vopts-${entry.id.replace(/[^a-zA-Z0-9-]/g,'')}"></div>
      <div class="rationale" id="vrat-${entry.id.replace(/[^a-zA-Z0-9-]/g,'')}"><b>Rationale:</b> ${entry.rat}</div>
    </div>`;
  });
  host.innerHTML=html;
  wrongVault.forEach(rawEntry=>{
    const entry=prepareQuestion(rawEntry);
    const safeId=rawEntry.id.replace(/[^a-zA-Z0-9-]/g,'');
    const optsHost=document.getElementById('vopts-'+safeId);
    const ratHost=document.getElementById('vrat-'+safeId);
    if(entry.type==='multi'){
      const chosen=new Set();
      entry.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{ if(chosen.has(i)){chosen.delete(i);btn.classList.remove('sel-multi');}else{chosen.add(i);btn.classList.add('sel-multi');} };
        optsHost.appendChild(btn);
      });
      const sub=document.createElement('button'); sub.className='submit-multi'; sub.textContent='Check Answer';
      sub.onclick=()=>{
        const correct=new Set(entry.correct);
        let allRight=chosen.size===correct.size;
        optsHost.querySelectorAll('.opt').forEach((b,i)=>{
          b.classList.add('disabled');
          if(correct.has(i))b.classList.add('correct');
          else if(chosen.has(i)){b.classList.add('wrong');allRight=false;}
        });
        ratHost.classList.add('show'); sub.style.display='none';
        if(allRight){
          const solved=document.createElement('div'); solved.className='vault-solved'; solved.textContent='✅ Correct! Removing from vault...';
          optsHost.parentElement.appendChild(solved);
          setTimeout(()=>{ removeFromVault(rawEntry.id); const el=document.getElementById('vaultcard-'+safeId); if(el)el.remove(); if(wrongVault.length===0)renderVaultSection(); },900);
        }
      };
      optsHost.appendChild(sub);
    } else {
      entry.opts.forEach((o,i)=>{
        const btn=document.createElement('button'); btn.className='opt'; btn.innerHTML=o;
        btn.onclick=()=>{
          optsHost.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));
          const gotItRight = i===entry.correct;
          if(gotItRight)btn.classList.add('correct');
          else{ btn.classList.add('wrong'); optsHost.querySelectorAll('.opt')[entry.correct].classList.add('correct'); }
          ratHost.classList.add('show');
          if(gotItRight){
            const solved=document.createElement('div'); solved.className='vault-solved'; solved.textContent='✅ Correct! Removing from vault...';
            optsHost.parentElement.appendChild(solved);
            setTimeout(()=>{ removeFromVault(entry.id); const el=document.getElementById('vaultcard-'+safeId); if(el)el.remove(); if(wrongVault.length===0)renderVaultSection(); },900);
          }
        };
        optsHost.appendChild(btn);
      });
    }
  });
}
</script>

<script>
/* ===== FLASH STUDY GAME ===== */
const FLASH_DECK=[
  {topic:'monday',front:'What causes Type 1 diabetes?',back:'Autoimmune destruction of pancreatic beta cells → little to no insulin production.'},
  {topic:'monday',front:'What causes Type 2 diabetes?',back:'Insulin resistance in cells, plus a gradual decline in beta-cell insulin production over time.'},
  {topic:'monday',front:'Diagnostic A1C for diabetes?',back:'≥6.5%'},
  {topic:'monday',front:'Diagnostic fasting glucose for diabetes?',back:'≥126 mg/dL'},
  {topic:'monday',front:'Diagnostic random glucose (with symptoms) for diabetes?',back:'≥200 mg/dL'},
  {topic:'monday',front:'Prediabetes A1C range?',back:'5.7–6.4%'},
  {topic:'monday',front:'Prediabetes fasting glucose range?',back:'100–125 mg/dL'},
  {topic:'monday',front:'What are the classic "3 P\'s" of diabetes?',back:'Polyuria, polydipsia, polyphagia.'},
  {topic:'monday',front:'First-line oral medication for Type 2 diabetes?',back:'Metformin.'},
  {topic:'monday',front:'Why is metformin held around IV contrast dye?',back:'Combined risk of lactic acidosis and acute kidney injury.'},
  {topic:'monday',front:'DKA occurs almost exclusively in which type of diabetes?',back:'Type 1 — near-total insulin deficiency.'},
  {topic:'monday',front:'HHS occurs almost exclusively in which type of diabetes?',back:'Type 2 — insulin is present but cells are resistant to it.'},
  {topic:'monday',front:'Typical glucose level in DKA?',back:'Usually >250 mg/dL.'},
  {topic:'monday',front:'Typical glucose level in HHS?',back:'Often >600 mg/dL, sometimes >1000.'},
  {topic:'monday',front:'Blood pH in DKA?',back:'<7.3 — metabolic acidosis.'},
  {topic:'monday',front:'Blood pH in HHS?',back:'Near-normal (>7.3) — no significant acidosis.'},
  {topic:'monday',front:'Why does DKA produce ketones but HHS does not?',back:'It takes very little insulin to block fat breakdown but a lot to move glucose into resistant cells — HHS patients still have enough insulin to block ketone production even though glucose stays high.'},
  {topic:'monday',front:'What are Kussmaul respirations, and why do they happen?',back:'Deep, rapid breathing — the body blows off CO₂ to compensate for the metabolic acidosis of DKA.'},
  {topic:'monday',front:'What is the treatment order for DKA/HHS?',back:'1) IV fluids first, 2) IV regular insulin, 3) monitor/replace potassium, 4) add dextrose once glucose nears 200-250.'},
  {topic:'monday',front:'Why give fluids before insulin in DKA/HHS?',back:'The patient is severely dehydrated — insulin first can worsen hypotension and cause dangerous fluid shifts.'},
  {topic:'monday',front:'What happens to serum potassium in DKA once insulin therapy starts?',back:'It drops — insulin drives K⁺ back into cells, so a seemingly normal/high initial K⁺ can crash quickly.'},
  {topic:'monday',front:'Which insulin is the only one given IV?',back:'Regular (short-acting) insulin.'},
  {topic:'monday',front:'What glucose level defines hypoglycemia?',back:'Below 70 mg/dL.'},
  {topic:'monday',front:'Treatment for a CONSCIOUS hypoglycemic patient?',back:'Rule of 15 — 15g fast-acting carbohydrate, recheck glucose in 15 minutes, repeat if still low.'},
  {topic:'monday',front:'Treatment for an UNCONSCIOUS hypoglycemic patient with no IV access?',back:'Glucagon IM or subcutaneously.'},
  {topic:'monday',front:'Why never give oral treatment to an unconscious patient?',back:'Aspiration risk — they cannot safely protect their airway or swallow.'},
  {topic:'monday',front:'Adrenergic (early) signs of hypoglycemia?',back:'Shaky, sweaty, tachycardic, hungry, anxious.'},
  {topic:'monday',front:'Neuroglycopenic (late) signs of hypoglycemia?',back:'Confusion, slurred speech, seizures, loss of consciousness.'},
  {topic:'monday',front:'What is "hypoglycemia unawareness" and what causes it?',back:'Autonomic neuropathy blunts the early adrenergic warning signs, so the patient jumps straight to neuro symptoms.'},
  {topic:'monday',front:'How many criteria are needed to diagnose metabolic syndrome?',back:'3 or more (out of 5): central obesity, high BP, high triglycerides, low HDL, elevated fasting glucose.'},
  {topic:'monday',front:'Metabolic syndrome waist circumference cutoffs?',back:'>40 inches in men, >35 inches in women.'},
  {topic:'monday',front:'What is LADA?',back:'"Type 1.5" — slow-onset autoimmune beta-cell destruction that presents in adulthood, often mistaken for Type 2 at first.'},
  {topic:'monday',front:'When is gestational diabetes typically screened for?',back:'24–28 weeks of pregnancy.'},
  {topic:'monday',front:'What is the "three-hit combo" behind diabetic foot ulcers?',back:'Neuropathy (can\'t feel injury) + peripheral vascular disease (can\'t heal) + hyperglycemia (feeds infection).'},
  {topic:'monday',front:'Describe a Stage 1 pressure injury.',back:'Intact skin with non-blanchable redness.'},
  {topic:'monday',front:'Describe a Stage 2 pressure injury.',back:'Partial-thickness loss — shallow open wound or blister.'},
  {topic:'monday',front:'Describe a Stage 3 pressure injury.',back:'Full-thickness loss with visible fat; no bone/tendon/muscle exposed.'},
  {topic:'monday',front:'Describe a Stage 4 pressure injury.',back:'Full-thickness loss with exposed bone, tendon, or muscle.'},
  {topic:'monday',front:'What makes a pressure injury "unstageable"?',back:'The base is covered by slough/eschar, so the true depth can\'t be determined until it\'s removed.'},
  {topic:'monday',front:'What does a deep tissue injury (DTI) look like?',back:'Intact skin that is purple/maroon and boggy — significant damage is happening underneath.'},
  {topic:'monday',front:'Braden Scale score cutoff for high risk?',back:'≤18.'},
  {topic:'monday',front:'How often should you reposition a patient in bed vs. in a chair?',back:'Every 2 hours in bed; every 15 minutes in a chair/wheelchair.'},
  {topic:'monday',front:'Why should you NEVER massage a reddened area over a bony prominence?',back:'The tissue is already damaged — massage can rupture fragile capillaries and worsen the injury.'},
  {topic:'eye',front:'What vision loss pattern does open-angle glaucoma cause?',back:'Gradual, painless peripheral (tunnel) vision loss.'},
  {topic:'eye',front:'What does acute angle-closure glaucoma look like?',back:'Sudden severe eye pain, halos, nausea, a firm/hard globe — a true emergency.'},
  {topic:'eye',front:'Normal intraocular pressure (IOP) range?',back:'10–21 mmHg.'},
  {topic:'eye',front:'What causes cataracts?',back:'Progressive clouding/opacification of the normally clear lens.'},
  {topic:'eye',front:'Classic cataract symptoms?',back:'Painless blurry/hazy vision, glare and halos, worse at night, faded colors.'},

  {topic:'eye',front:'What are the 3 functions of the eye\'s lens?',back:'UV filter, accommodation (changing shape to focus), and refraction (bending light onto the retina).'},
  {topic:'eye',front:'What is myopia and what causes it?',back:'Nearsightedness — light focuses IN FRONT of the retina (eyeball too long or cornea too curved). Near is clear, distance is blurry.'},

  {topic:'eye',front:'What is astigmatism?',back:'Irregular curvature of the cornea/lens causing blurred or distorted vision at ANY distance.'},
  {topic:'eye',front:'What is presbyopia and who does it affect?',back:'Age-related loss of accommodation (usually >40) from a stiffening lens — makes it hard to focus up close.'},

/* ===== EXAM ENGINE (Study Mode + Test Mode 50-scramble + persistence) ===== */
let examState={}, examIdx=0, examSubmitted=false, examMode='study', examChecked={};
let quizSet=[], examShuffleMap={};
function getExamQ(qi){
  const base=EXAM[qi];
  if(!examShuffleMap[qi]){
    const order=shuffleAnswers?shuffle(base.o.map((_,i)=>i)):base.o.map((_,i)=>i);
    examShuffleMap[qi]=order;
  }
  const order=examShuffleMap[qi];
  const opts=relabel(order.map(i=>base.o[i]));
  let correct;
  if(base.t==='multi'){
    const cset=new Set(base.c);
    correct=order.map((origIdx,newIdx)=>cset.has(origIdx)?newIdx:null).filter(x=>x!==null);
  } else {
    correct=order.indexOf(base.c);
  }
  return {q:base.q, r:base.r, t:base.t, o:opts, c:correct};
}
function saveExam(){ try{ localStorage.setItem('nur256u3_exam', JSON.stringify({mode:examMode,set:quizSet,state:examState,checked:examChecked,idx:examIdx,submitted:examSubmitted,shuffle:examShuffleMap})); }catch(e){} }
function loadExam(){ try{ const r=localStorage.getItem('nur256u3_exam'); return r?JSON.parse(r):null; }catch(e){ return null; } }
function clearExamSave(){ try{ localStorage.removeItem('nur256u3_exam'); }catch(e){} }
function shuffleArr(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);}
function renderExam(){
  const c=document.getElementById('sec-exam');
  c.innerHTML=`
    <h2 class="sec-title"><span class="sec-emoji">📝</span> Practice Exam <span style="font-size:.6em;opacity:.7">(${EXAM.length}-question bank)</span></h2>
    <p class="intro-line">NextGen NCLEX style — multiple choice + Select All That Apply.</p>
    <div class="exam-mode-toggle">
      <button class="mode-btn" id="modeStudyBtn" onclick="setExamMode('study')">📖 Study Mode</button>
      <button class="mode-btn" id="modeTestBtn" onclick="setExamMode('test')">📝 Test Mode</button>
    </div>
    <div class="center" style="margin:8px 0">
      <button class="btn vision-toggle-btn" onclick="toggleVisionOnly()" style="background:var(--purple)">🎯 Vision Only: OFF (tap to focus on vision)</button>
    </div>
    <div class="tipbar" id="examModeTip"></div>
    <div id="examBody"></div>
    <div class="exam-nav">
      <button class="btn ghost" onclick="examPrev()">⬅️ Prev</button>
      <div class="exam-dots" id="examDots"></div>
      <button class="btn" onclick="examNext()">Next ➡️</button>
    </div>
    <div class="center" id="submitWrap" style="margin-top:14px"><button class="btn" onclick="submitExam()" style="background:linear-gradient(90deg,var(--teal),var(--green))">✅ Submit Exam & See Score</button></div>
    <div id="examResult"></div>`;
  const saved=loadExam();
  if(saved && saved.set && saved.set.length){
    examMode=saved.mode||'study'; quizSet=saved.set; examState=saved.state||{}; examChecked=saved.checked||{}; examIdx=saved.idx||0; examSubmitted=saved.submitted||false; examShuffleMap=saved.shuffle||{};
    applyModeUI(examMode); drawExamQ();
  } else { setExamMode(examMode); }
}
function buildQuizSet(m){
  let all=EXAM.map((_,i)=>i);
  if(visionOnlyGlobal) all=all.filter(i=>EXAM[i].topic==='eye');
  quizSet = m==='test' ? shuffleArr(all).slice(0,Math.min(50,all.length)) : all;
}
function applyModeUI(m){
  const sb=document.getElementById('modeStudyBtn'), tb=document.getElementById('modeTestBtn');
  sb.classList.toggle('active',m==='study'); tb.classList.toggle('active',m==='test');
  const tip=document.getElementById('examModeTip'); const submitWrap=document.getElementById('submitWrap');
  if(m==='study'){
    tip.innerHTML='📖 <b>Study Mode:</b> all '+EXAM.length+' questions in order. Tap an answer to instantly see right/wrong + rationale. SATA uses Check Answer. Progress saves automatically.';
    submitWrap.style.display='none';
  } else {
    tip.innerHTML='📝 <b>Test Mode:</b> <b>50 random questions, scrambled</b> — like the real exam. No feedback until you submit. Tap 📝 Test Mode again for a fresh 50.';
    submitWrap.style.display='block';
  }
}
function setExamMode(m){
  examMode=m; examChecked={}; examState={}; examIdx=0; examSubmitted=false; examShuffleMap={};
  document.getElementById('examResult').innerHTML='';
  buildQuizSet(m); applyModeUI(m); saveExam(); drawExamQ();
}
function drawExamQ(){
  if(!quizSet.length)buildQuizSet(examMode);
  const qi=quizSet[examIdx]; const q=getExamQ(qi);
  const body=document.getElementById('examBody');
  const typeLabel=q.t==='multi'?'Select All That Apply':'Multiple Choice';
  const checked = examMode==='study' && examChecked[qi];
  let html=`<div class="exam-q"><div><span class="qnum">QUESTION ${examIdx+1} of ${quizSet.length}</span><span class="qtype">${typeLabel}</span></div><div class="qtext">${q.q}</div>`;
  q.o.forEach((opt,i)=>{
    const letter=String.fromCharCode(65+i);
    let cls='opt'; const cur=examState[qi];
    const isSel = q.t==='multi' ? (cur&&cur.includes(i)) : (cur===i);
    if(isSel)cls+=' sel-multi';
    if(checked){ const isCorrectOpt = q.t==='multi'?q.c.includes(i):q.c===i; if(isCorrectOpt)cls+=' correct'; else if(isSel)cls+=' wrong'; }
    html+=`<button class="${cls}" ${checked?'disabled':''} onclick="examPick(${i})">${opt}</button>`;
  });
  html+=`</div>`;
  if(examMode==='study'){
    if(q.t==='multi' && !checked){ html+=`<div class="center"><button class="btn" onclick="checkExamQ()" style="background:linear-gradient(90deg,var(--teal),var(--green))">✓ Check Answer</button></div>`; }
    if(checked){
      const ans=examState[qi]; const isCorrect = q.t==='multi'?arrEq(ans,q.c):ans===q.c;
      const correctTxt = q.t==='multi'?q.c.map(x=>String.fromCharCode(65+x)).sort().join(', '):String.fromCharCode(65+q.c);
      html+=`<div class="rationale show" style="border-color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'✅ <b>Correct!</b>':'❌ <b>Not quite.</b> Correct: <b>'+correctTxt+'</b>'}<br><b>Rationale:</b> ${q.r}</div>`;
    }
  }
  body.innerHTML=html; drawDots();
}
function drawDots(){
  const d=document.getElementById('examDots'); d.innerHTML='';
  quizSet.forEach((qi,pos)=>{
    const dot=document.createElement('div'); dot.className='dot';
    const answered = examState[qi]!==undefined && !(Array.isArray(examState[qi])&&examState[qi].length===0);
    if(examMode==='study'){ if(examChecked[qi]){ const eq=getExamQ(qi); const ok=eq.t==='multi'?arrEq(examState[qi],eq.c):examState[qi]===eq.c; dot.classList.add(ok?'dot-correct':'dot-wrong'); } }
    else { if(answered)dot.classList.add('answered'); }
    if(pos===examIdx)dot.classList.add('current');
    dot.onclick=()=>{examIdx=pos;drawExamQ();saveExam();};
    d.appendChild(dot);
  });
}
function examPick(i){
  const qi=quizSet[examIdx]; const q=getExamQ(qi);
  if(examMode==='study' && examChecked[qi]) return;
  if(q.t==='multi'){
    if(!examState[qi])examState[qi]=[]; const arr=examState[qi]; const idx=arr.indexOf(i);
    if(idx>-1)arr.splice(idx,1); else arr.push(i); drawExamQ();
  } else { examState[qi]=i; if(examMode==='study'){ examChecked[qi]=true; bumpProgress('exam-'+qi); } drawExamQ(); }
  saveExam();
}
function checkExamQ(){
  const qi=quizSet[examIdx]; const ans=examState[qi];
  if(ans===undefined||(Array.isArray(ans)&&ans.length===0))return;
  examChecked[qi]=true; bumpProgress('exam-'+qi); drawExamQ(); saveExam();
}
function examNext(){ if(examIdx<quizSet.length-1){examIdx++;drawExamQ();saveExam();window.scrollTo({top:0,behavior:'smooth'});} }
function examPrev(){ if(examIdx>0){examIdx--;drawExamQ();saveExam();window.scrollTo({top:0,behavior:'smooth'});} }
function arrEq(a,b){if(!a||!b)return false;a=[...a].sort();b=[...b].sort();return a.length===b.length&&a.every((v,i)=>v===b[i]);}
function submitExam(){
  let correct=0;
  quizSet.forEach(qi=>{ const q=getExamQ(qi); const ans=examState[qi]; if(q.t==='multi'){if(arrEq(ans,q.c))correct++;}else{if(ans===q.c)correct++;} });
  const total=quizSet.length; const pct=Math.round(correct/total*100);
  examSubmitted=true; saveExam();
  let msg = pct>=85?'🌟 Outstanding — exam-ready!':pct>=75?'✅ Passing! Polish the misses.':pct>=60?'💪 Getting there — review and retake.':'📚 Keep grinding — revisit the sections.';
  let html=`<div class="quiz-score">You scored ${correct} / ${total} (${pct}%)<br>${msg}</div><h3 style="color:var(--pink)">📖 Full Review</h3>`;
  quizSet.forEach((qi,pos)=>{
    const q=getExamQ(qi); const ans=examState[qi]; let isCorrect = q.t==='multi'?arrEq(ans,q.c):ans===q.c;
    const yourTxt = ans===undefined||(Array.isArray(ans)&&ans.length===0)?'(no answer)':(q.t==='multi'?ans.map(x=>String.fromCharCode(65+x)).sort().join(', '):String.fromCharCode(65+ans));
    const correctTxt = q.t==='multi'?q.c.map(x=>String.fromCharCode(65+x)).sort().join(', '):String.fromCharCode(65+q.c);
    html+=`<div class="exam-q" style="border-color:${isCorrect?'var(--green)':'var(--red)'}"><div class="qnum">Q${pos+1} ${isCorrect?'✅':'❌'}</div><div class="qtext" style="font-size:.92rem">${q.q}</div><div style="font-size:.85rem"><b>Your answer:</b> ${yourTxt} &nbsp;|&nbsp; <b>Correct:</b> ${correctTxt}</div><div class="rationale show" style="margin-top:8px"><b>Rationale:</b> ${q.r}</div></div>`;
  });
  html+=`<div class="center"><button class="btn" onclick="resetExam()">🔄 New Test (fresh 50)</button></div>`;
  document.getElementById('examResult').innerHTML=html;
  const _er=document.getElementById('examResult'); if(_er.scrollIntoView)_er.scrollIntoView({behavior:'smooth'});
}
function resetExam(){ examState={}; examIdx=0; examSubmitted=false; examChecked={}; examShuffleMap={}; document.getElementById('examResult').innerHTML=''; buildQuizSet(examMode); saveExam(); drawExamQ(); window.scrollTo({top:0,behavior:'smooth'}); }
renderExam();
</script>

<script>/* init progress total */ updateProg(); if(typeof updateVisionToggleButtons==='function') updateVisionToggleButtons();</script>
</body>
</html>
